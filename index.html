<html lang="zh-CN">
<head>

<title>AI打卡网 · 2026-06-02</title>
<style>

  .nav-date-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .main { max-width: 960px; margin: 0 auto; padding: 24px 16px 60px; }
  .section-header {

  }
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    box-shadow: var(--card-shadow);
    transition: transform var(--transition), box-shadow var(--transition), opacity var(--transition), border-color var(--transition);

    transform: translateY(18px);
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }
  .card.visible { opacity: 1; transform: translateY(0); }
  .card.read { opacity: 0.5; }
  .card.read::after {

    position: absolute;
    top: 12px;
    right: 12px;
    background: var(--bg4);
    color: var(--text3);

  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); border-color: var(--accent); }
  .card.hidden { display: none !important; }
  .card.highlight { border-color: var(--accent2); background: rgba(232,98,42,0.06); }
  .card-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px; height: 24px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    border-radius: 6px;
    margin-bottom: 10px;
    flex-shrink: 0;
  }
  .card-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }

  .card-summary {

  .card-summary.collapsed {
    max-height: 4.95em;

  }
  .card-summary.expanded {

  .card-footer { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }
  .expand-btn {
    background: none;
    border: none;
    color: var(--accent2);

    cursor: pointer;
    font-family: var(--font);

  }
  .expand-btn:hover { color: var(--accent); }
  .source-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    text-decoration: none;
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 12px;

  }
  .source-btn:hover { opacity: 0.85; }
  .read-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    color: var(--text3);
    cursor: pointer;
    font-family: var(--font);
    transition: all var(--transition);
  }
  .read-btn:hover { border-color: var(--accent); color: var(--accent); }
  .time-badge { font-size: 11px; color: var(--text3); display: block; margin-bottom: 8px; }
  .analytics-wrap {
    display: grid;

  }
  .analytics-card {

</head>
<body>
<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>查看历史日報</h3>

    <div class="modal-btns">
      <button class="modal-btn secondary" onclick="closeModal()">取消</button>
      <button class="modal-btn primary" onclick="goToDate()">前往</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="hero">
  <div class="hero-inner">
    <div class="hero-top">

    </div>
  </div>
</div>

  </div>
</div>

  <div class="search-box">

  </div>

</div>

  <div class="analytics-wrap" id="analyticsWrap"></div>

  </div>
</div>

AI政策与政治倡导方面的立场，包括对透明度、深思熟虑的监管以及AI安全的支持。同时，公司明确表示，任何外部政治组织均不能代表OpenAI发言。", "category": "industry"}, {"id": "cmpvf63k406b0sl0zv0ef9647", "title": "Anthropic 保密向 SEC 提交 S-1 草案", "title_en": "Anthropic confidentially submits draft S-1 to the SEC", "url": "https://www.anthropic.com/news/confidential-draft-s1-sec", "source": "Anthropic：Newsroom（网页）", "publishedAt": "2026-06-01T16:24:52.982Z", "summary": "Anthropic， PBC 今日保密向美国证券交易委员会提交了 S-1 表格草案，计划进行普通股的首次公开发行。这使其在 SEC 完成审核后拥有上市的选择权。IPO 的具体发行股数和价格尚未确定，将取决于市场条件等因素。公司近期刚完成由 Altimeter Capital 等领投的 650 亿美元 H 轮融资，估值达 9650 亿美元，并发布了 Claude Opus 4.8 模型。", "category": "industry"}, {"id": "cmpvf8bjd06blsl0zwmfpzvmr", "title": "Gemini Omni支持创建个人数字分身", "title_en": "Easily add yourself to your video creations in Gemini. Here's how to create your own digital avatar…", "url": "https://x.com/GeminiApp/status/2061480944905982276", "source": "X：Gemini (@GeminiApp)", "publishedAt": "2026-06-01T16:12:12.000Z", "summary": "轻松将自己添加到Gemini的视频创作中。\n\n以下是如何使用Gemini Omni创建一个外观和声音都像你的数字分身。🧵", "category": "tip"}, {"id": "cmpvf7a5k06b9sl0zz7qam8wm", "title": "Auto Router 新增成本质量权衡参数", "title_en": "The Auto Router now lets you tune how it weighs cost against quality. New `cost_quality_tradeoff` p…", "url": "https://x.com/OpenRouter/status/2061476882470580329", "source": "X：OpenRouter (@OpenRouter)", "publishedAt": "2026-06-01T15:56:03.000Z", "summary": "Auto Router 现在允许你调整其在成本与质量之间的权衡。\n新增 `cost_quality_tradeoff` 参数，范围 0 到 10：\n设为 0 时，它总是选择最强大的模型，无论价格如何。设为 10 时，最便宜的模型胜出。", "category": "ai-products"}, {"id": "cmpvej11l065tsl0zrvg9kj3a", "title": "智谱：建议 A 股发行并在科创板上市", "title_en": null, "url": "https://www.ithome.com/0/958/444.htm", "source": "IT之家（RSS）", "publishedAt": "2026-06-01T15:53:42.000Z", "summary": "智谱计划向中国监管机构申请发行A股并在科创板上市。发行股份数量占发行完成后总股本的2%至8%，预计全部为新股，原股东不发售。本次发行募集资金净额将投资于人工智能通用基座大模型、大模型MaaS一站式服务平台及补充流动资金。此外，公司拟将英文名称由\"Knowledge Atlas Technology Joint Stock Company Limited\"变更为\"Z.AI Co.， Ltd.\"。", "category": "industry"}, {"id": "cmpvfn56c06fxsl0zknga1ztr", "title": "介绍 Mellum2：JetBrains 推出的 12B 混合专家模型", "title_en": "Introducing Mellum2： A 12B Mixture-of-Experts Model by JetBrains", "url": "https://huggingface.co/blog/JetBrains/mellum2-launch", "source": "Hugging Face：Blog（RSS）", "publishedAt": "2026-06-01T15:45:17.000Z", "summary": "JetBrains 在 Hugging Face 发布博客，介绍其新发布的 Mellum2 模型。该模型采用混合专家架构，参数规模为 12B。", "category": "ai-models"}, {"id": "cmpvdctkr05ubsl0zpszj9cor", "title": "SenseNova新模型解决AI图表生成难题", "title_en": "Getting charts and diagrams right with #AI 📊 Most AI models sti…", "url": "https://x.com/SenseTime_AI/status/2061465029959209106", "source": "X：商汤 SenseTime (@SenseTime_AI)", "publishedAt": "2026-06-01T15:08:57.000Z", "summary": "大多数AI模型在生成图表时存在数值错误（如负值显示为正）、柱状图位置偏移、元素关系混乱等问题。SenseNova-U1-8B-MoT-Infographic（SenseNova-U1）专为解决此类图表生成问题而设计，能够生成准确的图表，并支持实时调整设计和布局。项目在Hugging Face提供了模型，并在GitHub展示了效果案例。", "category": "ai-models"}, {"id": "cmpvcojae05ppsl0zvu5vzvcf", "title": "Luma成立开放物理AI实验室攻克泛化难题", "title_en": "To improve human life， AI systems must be able to help us improve the physical world. What stands be…", "url": "https://x.com/LumaLabsAI/status/2061460217616027961", "source": "X：Luma AI (@LumaLabsAI)", "publishedAt": "2026-06-01T14:49:50.000Z", "summary": "为改善人类生活，AI系统必须能帮助我们改善物理世界。阻碍我们迈向这一繁荣未来的是物理AI的泛化问题。\n\n为解决此问题，我们在Luma建立了一个新的开放科学物理AI实验室。\n\n阅读更多 → https：//lumalabs.ai/news/luma-open-physical-ai-lab", "category": "industry"}, {"id": "cmpvawxj9057csl0z0lkh0nj3", "title": "构建每周千美元预算上限的智能体教程", "title_en": "Video tutorial： how to build an agent capped at $1000/week with a model denylist &amp； custom data r…", "url": "https://x.com/OpenRouter/status/2061452942385783050", "source": "X：OpenRouter (@OpenRouter)", "publishedAt": "2026-06-01T14:20:56.000Z", "summary": "视频教程：如何构建一个每周预算上限为1000美元的智能体，包含模型拒绝列表与自定义数据保留\n\n使用了新的、可堆叠的护栏架构：\n\n【引用 @OpenRouter】：OpenRouter 上的护栏是市场上最强大的：为您的 AI 流量提供集中式安全与治理\n\n预算限制、ZDR、模型与提供商限制、提示词注入防御以及 DLP / 敏感信息检测，分层为您控制的规则！🧵", "category": "tip"}, {"id": "cmpva42zm0501sl0z1dba5bm8", "title": "AI Pulse 探讨智能体时代新指标 DAA", "title_en": "ICYMI： Our latest AI Pulse looked at Daily Active Agents （DAA） - a metric for measuring value in the…", "url": "https://x.com/Baidu_Inc/status/2061447687028039854", "source": "X：百度 Baidu (@Baidu_Inc)", "publishedAt": "2026-06-01T14:00:03.000Z", "summary": "ICYMI：我们最新的 AI Pulse 探讨了日活跃智能体（DAA）--一个衡量智能体时代价值的指标--以及我们的智能体组合。", "category": "tip"}, {"id": "cmpvbcpap05btsl0z009cpj2r", "title": "超越LLM：为何可扩展的企业AI采用取决于智能体逻辑", "title_en": "Beyond LLMs： Why Scalable Enterprise AI Adoption Depends on Agent Logic", "url": "https://huggingface.co/blog/ibm-research/agent-logic-and-scalable-ai-adoption", "source": "Hugging Face：Blog（RSS）", "publishedAt": "2026-06-01T13:51:18.000Z", "summary": "可扩展的企业AI采用需超越大语言模型，依靠智能体逻辑来引导模型执行动态、长周期且受约束的企业工作流，从而提升质量、降低成本并建立信任。文中以IBM watsonx Code Assistant for Z为例，展示了智能体逻辑如何通过程序分析等技术，在理解大型遗留代码库时，相比纯LLM基线方法，能以约30倍更低的token消耗达到更优性能。在加速测试生成任务中，该方法亦能使代码覆盖度提升20%-45%，同时token消耗降低最高达15倍。", "category": "tip"}, {"id": "cmpva52tg050lsl0zkrhafd9j", "title": "作者分享使用 Codex App 开发的开源项目合集", "title_en": "http：//x.com/i/article/2061439796745297920", "url": "https://x.com/vista8/status/2061443708374208769", "source": "X：Vista (@vista8)", "publishedAt": "2026-06-01T13:44:14.000Z", "summary": "作者分享了使用 Codex App 等工具开发的一系列开源项目，包括4个 Chrome 插件（如快捷提示词、新标签页）、4个网站（如艺术家风格对比、音乐展示）和5个 AI Skill（如论文解读、阅读助手）。项目基于 GPT-Image-2 API、Suno 等技术，并整合了 Read-frog、Hyperframe 等开源项目。", "category": "tip"}, {"id": "cmpv9u8cg04wusl0z8612dg3n", "title": "微软研究聚焦：智能体评估与价值对齐", "title_en": "Evaluating agentic behaviors at scale， making the case for repositories over documents， and inviting…", "url": "https://x.com/MSFTResearch/status/2061440352859361521", "source": "X：Microsoft Research (@MSFTResearch)", "publishedAt": "2026-06-01T13:30:54.000Z", "summary": "大规模评估智能体行为，论证代码库优于文档，并邀请全球研究人员共同解决价值对齐问题。深入了解最新研究焦点。", "category": "tip"}, {"id": "cmpva81zh051rsl0zxs0dee2n", "title": "开源与闭源模型在不同的增长曲线上", "title_en": "Open and closed models are on different exponentials", "url": "https://www.interconnects.ai/p/open-and-closed-models-are-on-different", "source": "Nathan Lambert：Interconnects（RSS）", "publishedAt": "2026-06-01T13:03:48.000Z", "summary": "当模型智能的微小提升能直接转化为实际价值时，开源与闭源模型正沿着不同的增长路径发展。闭源模型通过在特定场景下提供更高的边际智能来创造价值，而开源模型则在其他维度寻找增长点，两者形成了差异化的竞争格局。", "category": "tip"}, {"id": "cmpv8b6wa04jvsl0zc4newlns", "title": "OpenBMB发布UltraData两大开源数据集，登顶HuggingFace趋势榜", "title_en": "🏆 Big news！ UltraData just hit #1 AND #2 on HuggingFace Trending worldwide！ 🎉 Released by OpenBMB …", "url": "https://x.com/OpenBMB/status/2061432928492810535", "source": "X：面壁智能 OpenBMB (@OpenBMB)", "publishedAt": "2026-06-01T13:01:24.000Z", "summary": "OpenBMB联合清华NLP与Modelbest发布两个开源数据集：Ultra-FineWeb-L3（预训练合成数据）包含600B+ tokens（超400B英文、200B+中文），是迄今最大开源中文预训练合成数据集；UltraData-SFT-2605（后训练SFT数据）包含15M+样本，是中国首个开源且包含思考与非思考标注的大规模SFT数据集，覆盖数学、代码、知识和指令遵循。两者均基于UltraData L0-L4框架构建，并在MiniCPM5-1B训练中完成验证。数据集已在HuggingFace免费开放。", "category": "ai-products"}, {"id": "cmpv8241x04hdsl0zyngfkobk", "title": "王兴：美团 AI Agent\"小美\"与腾讯元宝即将深度合作，用户订单无缝连接", "title_en": null, "url": "https://www.ithome.com/0/958/410.htm", "source": "IT之家（RSS）", "publishedAt": "2026-06-01T12:34:05.000Z", "summary": "美团2026年第一季度财报显示营收910.39亿元，净利润亏损68.27亿元。财报电话会上，CEO王兴透露其AI Agent\"小美\"将与腾讯元宝深度合作。用户在腾讯元宝中提交本地服务需求，将被无缝连接至美团的外卖点餐、配送等生态。王兴强调，面向智能体的服务（To A）正变得日益重要，美团已将AI助手\"小团\"置于App核心位置，并拓展AI服务外延。", "category": "industry"}, {"id": "cmpv7freg04b4sl0zormcu964", "title": "使用Claude Opus 4.8将书籍转化为AI技能的教程", "title_en": "http：//x.com/i/article/2061406941541240838", "url": "https://x.com/AYi_AInotes/status/2061419197154857286", "source": "X：阿易 AI Notes (@AYi_AInotes)", "publishedAt": "2026-06-01T12:06:50.000Z", "summary": "本文以《非暴力沟通》为例，提供了一个将书籍转化为可调用AI技能（Skill）的六步教程。作者使用Claude Opus 4.8模型，因其具备100万token上下文窗口、结构化输出及多步智能体（Agent）能力，能一次性处理全书逻辑。流程包含文本准备、全局结构分析、五类提炼（框架/原则/技法/反模式/作者声音）、技能生成及关键的自检步骤。生成的技能保留了书中原始框架命名（如OFNR四要素、长颈鹿语言），并将触发词优化为\"怎么提意见不像在指责\"等日常表达。整个流程耗时约45分钟，消耗约30万token，成本不到20元人民币。", "category": "tip"}, {"id": "cmpvlaey600deslfpl35rf3t5", "title": "OpenAI在密歇根州启动Stargate 1GW数据中心建设", "title_en": "Building the infrastructure for the Intelligence Age in Michigan", "url": "https://openai.com/index/stargate-michigan-data-center", "source": "OpenAI：官网动态（RSS · 排除企业/客户案例）", "publishedAt": "2026-06-01T12:00:00.000Z", "summary": "OpenAI在密歇根州启动了名为Stargate的1GW数据中心项目。作为AI基础设施建设的一部分，该项目旨在扩大人工智能技术的可及性、为当地创造就业机会并支持社区发展。", "category": "industry"}, {"id": "cmpv3pmle03drsl0zpaegquwp", "title": "Apache RocketMQ 发布 AI 专用消息引擎", "title_en": "🚀 Apache RocketMQ just leveled up for AI！ Introducing RocketMQ for AI-a new message engine built fo…", "url": "https://x.com/alibaba_cloud/status/2061400724018217381", "source": "X：阿里云 / Alibaba Cloud (@alibaba_cloud)", "publishedAt": "2026-06-01T10:53:26.000Z", "summary": "🚀 Apache RocketMQ 为 AI 升级！推出 RocketMQ for AI--一个专为长时间会话、多智能体工作流和公平资源调度构建的新消息引擎。凭借 Lite-Topics、有序消息和智能流量整形，它解决了状态丢失、级联故障和突发负载问题。由阿里云大规模构建，现已开源。\n\n了解更多： https：//int.alibabacloud.com/m/1000413178/\n\n#RocketMQ #AI #CloudNative", "category": "ai-products"}, {"id": "cmpv2byxq02zxsl0z1ea4vm86", "title": "Runway 在伦敦设立欧洲总部及世界模型研究中心", "title_en": "Runway Opens London HQ， Bringing World Model Research Hub to the UK and Europe", "url": "https://runwayml.com/news/runway-opens-london-hq", "source": "Runway：News（网页）", "publishedAt": "2026-06-01T10:24:49.447Z", "summary": "Runway 宣布在伦敦建立新的欧洲总部和专注于通用世界模型的研究中心。公司计划在未来18个月向英国AI生态投资$100M，到2028年投资额将翻倍以上。过去12个月，其在欧洲的订阅销量增长了50%，企业客户占比超20%。新总部将扩大其在欧洲的研究与商业布局，公司正招聘欧洲负责人以组建跨研究、产品、工程和销售的团队，并深化与BBC、Fremantle、WPP等企业的合作。世界模型是其研究的核心，旨在将生成式AI的应用扩展至机器人、科学研究与工业模拟等领域。", "category": "industry"}, {"id": "cmpvqq6bd00ubslukf8jsko23", "title": "OpenAI前沿模型与Codex现可在AWS上使用", "title_en": "OpenAI frontier models and Codex are now available on AWS", "url": "https://openai.com/index/openai-frontier-models-and-codex-are-now-available-on-aws", "source": "OpenAI：官网动态（RSS · 排除企业/客户案例）", "publishedAt": "2026-06-01T10:00:00.000Z", "summary": "OpenAI的前沿模型与Codex现已在AWS上全面可用。企业客户可通过其现有的AWS环境、控制与采购流程来使用OpenAI的AI技术，从而加速从评估到生产部署的过程。", "category": "ai-products"}, {"id": "cmpuzjn4q02bzsl0zm8pgfo93", "title": "腾讯混元发布智能体长期记忆插件Hy-Memory", "title_en": "🚀We're excited to officially release Hy-Memory - a powerful memory plugin built specifically for lo…", "url": "https://x.com/TencentHunyuan/status/2061372535267357029", "source": "X：腾讯混元 (@TencentHunyuan)", "publishedAt": "2026-06-01T09:01:25.000Z", "summary": "腾讯混元正式发布专为OpenClaw等长期协作智能体（Agent）设计的记忆插件 Hy-Memory。它基于6层记忆框架、System1/System2双系统与三层进化链构建，旨在成为智能体的\"第二大脑\"。该插件解决了记忆碎片化问题，实现了显著性能提升：记忆数量减少70%以上，单条记忆信息密度提升45%以上，在超长上下文场景中token消耗降低35%，记忆更新速度提升20%。", "category": "ai-products"}, {"id": "cmpvtskbb01lusluksydtav6e", "title": "Cursor Teams计划定价方案更新", "title_en": "Improvements to Teams Pricing", "url": "https://cursor.com/blog/teams-pricing-june-2026", "source": "Cursor Blog", "publishedAt": "2026-06-01T07:00:00.000Z", "summary": "Cursor Teams计划推出三项更新：增加Composer特定使用池，将第一方模型（Composer和Auto）与第三方API的使用额度分开计费；推出Premium席位，提供5倍于标准席位（$40/月）的使用量，价格为$96/月（年付）；仪表盘现可实时显示用户额度使用情况，管理员可通过Slack或邮件配置智能提醒。", "category": "ai-products"}, {"id": "cmpurl8qd009dsl0zyghfa9kw", "title": "介绍Cosmos Coalition", "title_en": "Introducing the Cosmos Coalition", "url": "https://runwayml.com/news/introducing-cosmos-coalition", "source": "Runway：News（网页）", "publishedAt": "2026-06-01T05:24:22.746Z", "summary": "Runway宣布作为创始成员加入Cosmos Coalition，该联盟与NVIDIA及多家领先AI实验室合作，旨在构建并开源面向物理AI的前沿世界模型。首个项目将由Runway与NVIDIA共同开发一个基础模型，以推动下一代开放世界模型的研究与发展。", "category": "industry"}, {"id": "cmpw7vhfp00h0slsnrhevyrua", "title": "NVIDIA AI Cloud生态系统全球扩张，满足AI算力需求", "title_en": "NVIDIA AI Cloud Ecosystem Expands Worldwide to Meet Global AI Compute Demand", "url": "https://blogs.nvidia.com/blog/ai-cloud-ecosystem", "source": "NVIDIA Blog：Agentic AI（网页）", "publishedAt": "2026-06-01T05:00:56.000Z", "summary": "NVIDIA AI Cloud生态系统正通过与CoreWeave、Firmus、IREN、Nscale等全球合作伙伴合作，加速在六大洲建设AI工厂基础设施。该生态系统结合NVIDIA的加速计算、网络和AI软件，帮助合作伙伴为模型训练、微调、推理以及智能体AI（agentic AI）应用提供服务。此举旨在满足前沿模型开发、企业AI、电信及国家AI计划的需求，并支持亚太、美洲和非洲等地区的区域性与主权AI产能发展。", "category": "industry"}, {"id": "cmpu2kv1z001eslagcgl0irro", "title": "NVIDIA与Google Cloud助力下一波AI构建者", "title_en": "NVIDIA and Google Cloud Empower the Next Wave of AI Builders", "url": "https://blogs.nvidia.com/blog/category/enterprise/cloud-2", "source": "NVIDIA Blog：Generative AI（网页）", "publishedAt": "2026-06-01T05:00:56.000Z", "summary": "在Google I/O大会上，NVIDIA与Google Cloud宣布深化合作，旨在支持其联合开发者社区中超过10万名开发者。合作将重点提供NVIDIA L4 Tensor Core GPU以优化AI推理与图形工作负载，并通过支持Vertex AI平台来增强Gemini模型性能。双方还将提供开源软件工具，以简化AI应用的构建与部署流程。", "category": "industry"}, {"id": "cmpw7vhj300h7slsnx8o52dv4", "title": "NVIDIA 工厂运营蓝图为工厂打造 AI 大脑", "title_en": "NVIDIA Factory Operations Blueprint Gives Factories a New AI Brain", "url": "https://blogs.nvidia.com/blog/factory-operations-fox-blueprint-ai-brain", "source": "NVIDIA Blog：Generative AI（网页）", "publishedAt": "2026-06-01T05:00:47.000Z", "summary": "NVIDIA发布了工厂运营蓝图（FOX），这是一项用于构建自主工厂管理AI智能体的参考设计。该蓝图基于NVIDIA NemoClaw、AI-Q Blueprint及Nemotron开源模型构建，并针对DGX Station工作站进行了优化，可在配备GB300 Grace Blackwell Ultra芯片的本地环境运行。台湾制造商富士康、和硕、研华和纬创是首批部署FOX蓝图的厂商。其中，富士康基于该蓝图构建了MoMClaw多智能体系统，预计将根因分析时间缩短80%，劳动生产率提升15%，机器故障率降低10%。", "category": "ai-products"}], "sections": [{"label": "模型发布/更新", "slug": "ai-models", "count": 4, "items": [{"idx": 1, "title": "Holo3.1：快速本地计算机使用智能体", "summary": "Holo3.1 是基于 Qwen 模型家族的计算机使用智能体系列，旨在提升在桌面、网页和移动环境中的鲁棒性。新模型提供 0.8B、4B、9B 和 35B-A3B 四种尺寸，并首次发布量化检查点，包括 FP8、Q4 GGUF 和 NVFP4，以优化本地推理。在 AndroidWorld 基准测试中，35B-A3B 模型得分从 67% 提升至 79.3%。在 DGX Spark 上，NVFP4 量化相比 BF16 实现 1.74 倍 token 吞吐量提升，并将平均步骤时间从 6.8 秒缩短至 3.3 秒。模型支持函数调用协议，可在第三方智能体框架中部署。", "publishedAt": "2026-06-02T14:13:23.000Z", "category": "ai-models", "sourceName": "Hugging Face：Blog（RSS）", "sourceUrl": "https://huggingface.co/blog/Hcompany/holo31"}, {"idx": 2, "title": "阶跃星辰Step 3.7 Flash发布，专为高效推理设计", "summary": "阶跃星辰发布其推理优化型模型Step 3.7 Flash。该模型为196B MoE架构，从设计之初就专注于推理效率。其采用多矩阵分解注意力机制，使KV-cache成本仅为DeepSeek模型的约22%；同时通过注意力与FFN解耦技术，实现了硬件优化的高效服务。该模型已通过Fireworks AI提供，采用Apache 2.0许可，并可用于构建智能体应用。", "publishedAt": "2026-06-02T03:45:56.000Z", "category": "ai-models", "sourceName": "X：阶跃星辰 StepFun (@StepFun_ai)", "sourceUrl": "https://x.com/StepFun_ai/status/2061655529731342402"}, {"idx": 3, "title": "介绍 Mellum2：JetBrains 推出的 12B 混合专家模型", "summary": "JetBrains 在 Hugging Face 发布博客，介绍其新发布的 Mellum2 模型。该模型采用混合专家架构，参数规模为 12B。", "publishedAt": "2026-06-01T15:45:17.000Z", "category": "ai-models", "sourceName": "Hugging Face：Blog（RSS）", "sourceUrl": "https://huggingface.co/blog/JetBrains/mellum2-launch"}, {"idx": 4, "title": "SenseNova新模型解决AI图表生成难题", "summary": "大多数AI模型在生成图表时存在数值错误（如负值显示为正）、柱状图位置偏移、元素关系混乱等问题。SenseNova-U1-8B-MoT-Infographic（SenseNova-U1）专为解决此类图表生成问题而设计，能够生成准确的图表，并支持实时调整设计和布局。项目在Hugging Face提供了模型，并在GitHub展示了效果案例。", "publishedAt": "2026-06-01T15:08:57.000Z", "category": "ai-models", "sourceName": "X：商汤 SenseTime (@SenseTime_AI)", "sourceUrl": "https://x.com/SenseTime_AI/status/2061465029959209106"}]}, {"label": "产品发布/更新", "slug": "ai-products", "count": 14, "items": [{"idx": 5, "title": "MiniCPM-V 4.6 现已支持 vLLM v0.22.0", "summary": "MiniCPM-V 4.6 现已完全支持 vLLM v0.22.0！\n无需自定义分支，无需额外编译。\n只需拉取预构建包即可运行。\n非常感谢 @vllm_project 的顺畅集成！ 🤝\n🤗 http：//huggingface.co/openbmb/MiniCPM-V-4.6", "publishedAt": "2026-06-02T14:02:37.000Z", "category": "ai-products", "sourceName": "X：面壁智能 OpenBMB (@OpenBMB)", "sourceUrl": "https://x.com/OpenBMB/status/2061810723169415205"}, {"idx": 6, "title": "阿里云发布AgentScope Java 1.1及Claw等新功能", "summary": "🚀 AgentScope Java 1.1：构建可自我进化的智能体\n✨ Claw：具备Shell访问权限的本地\"MinQwenPaw\"\n✨ Builder：多租户、零代码企业平台\n✨ 工作区驱动的进化与分布式隔离\n从笔记本电脑到集群无缝扩展。👇\nhttps：//int.alibabacloud.com/m/1000413896/\n\n#AgentScope #AIAgents #Java", "publishedAt": "2026-06-02T09:43:03.000Z", "category": "ai-products", "sourceName": "X：阿里云 / Alibaba Cloud (@alibaba_cloud)", "sourceUrl": "https://x.com/alibaba_cloud/status/2061745401393291554"}, {"idx": 7, "title": "NVIDIA JetPack 7.2支持内存优化的边缘智能体部署", "summary": "NVIDIA JetPack 7.2发布，支持一键部署开源NVIDIA NemoClaw堆栈，该堆栈为OpenClaw添加了隐私与安全控制。同时引入NVIDIA agent skills for Jetson，为Jetson设备提供智能体技能。该版本优化了内存效率，旨在加速AI代理从数字世界向物理环境的边缘部署。", "publishedAt": "2026-06-02T02:00:00.000Z", "category": "ai-products", "sourceName": "NVIDIA Technical Blog（开发者技术博客 · RSS）", "sourceUrl": "https://developer.nvidia.com/blog/deploy-agentic-ready-ai-at-the-edge-with-memory-efficiency-in-nvidia-jetpack-7-2"}, {"idx": 8, "title": "ChatGPT 新增长文编辑与保存功能", "summary": "长文写作需要更多空间。\n\n现在你可以在全屏模式下编辑更长的文章，并将其保存到你的资料库中，以便稍后继续。", "publishedAt": "2026-06-01T22:11:55.000Z", "category": "ai-products", "sourceName": "X：ChatGPT (@ChatGPTapp)", "sourceUrl": "https://x.com/ChatGPTapp/status/2061571468992126982"}, {"idx": 9, "title": "Krea AI 开放 Krea 2 LoRAs 全员使用", "summary": "Krea 2 LoRAs 现已向所有人开放。\n试试下面这个 👇", "publishedAt": "2026-06-01T21:04:22.000Z", "category": "ai-products", "sourceName": "X：Krea AI (@krea_ai)", "sourceUrl": "https://x.com/krea_ai/status/2061554472925696128"}, {"idx": 10, "title": "Replit 用单个提示词构建完整业务", "summary": "你能用单个提示词免费构建一个真实的业务吗？\n\n从今天起，在 Replit 上，答案是肯定的。\n\n从一个提示词开始，获得一个网站、移动应用、幻灯片和发布视频。\n此外，还能解锁使用 @stripe @atlas， @QuickBooks， @mercury & @doolaHQ 运营业务的福利。", "publishedAt": "2026-06-01T19:46:02.000Z", "category": "ai-products", "sourceName": "X：Replit (@Replit)", "sourceUrl": "https://x.com/Replit/status/2061534759520760112"}, {"idx": 11, "title": "Perplexity发布Search as Code搜索架构", "summary": "推出Search as Code，我们为AI智能体打造的全新搜索架构。\n\n它直接编写Python代码调用我们的搜索栈，而非逐个循环函数调用。\n\n现已在Perplexity Agent API中提供，并成为Computer的默认选项。\n\nhttps：//research.perplexity.ai/articles/rethinking-search-as-code-generation", "publishedAt": "2026-06-01T17:53:11.000Z", "category": "ai-products", "sourceName": "X：Perplexity (@perplexity_ai)", "sourceUrl": "https://x.com/perplexity_ai/status/2061506359326384319"}, {"idx": 12, "title": "Auto Router 新增成本质量权衡参数", "summary": "Auto Router 现在允许你调整其在成本与质量之间的权衡。\n新增 `cost_quality_tradeoff` 参数，范围 0 到 10：\n设为 0 时，它总是选择最强大的模型，无论价格如何。设为 10 时，最便宜的模型胜出。", "publishedAt": "2026-06-01T15:56:03.000Z", "category": "ai-products", "sourceName": "X：OpenRouter (@OpenRouter)", "sourceUrl": "https://x.com/OpenRouter/status/2061476882470580329"}, {"idx": 13, "title": "OpenBMB发布UltraData两大开源数据集，登顶HuggingFace趋势榜", "summary": "OpenBMB联合清华NLP与Modelbest发布两个开源数据集：Ultra-FineWeb-L3（预训练合成数据）包含600B+ tokens（超400B英文、200B+中文），是迄今最大开源中文预训练合成数据集；UltraData-SFT-2605（后训练SFT数据）包含15M+样本，是中国首个开源且包含思考与非思考标注的大规模SFT数据集，覆盖数学、代码、知识和指令遵循。两者均基于UltraData L0-L4框架构建，并在MiniCPM5-1B训练中完成验证。数据集已在HuggingFace免费开放。", "publishedAt": "2026-06-01T13:01:24.000Z", "category": "ai-products", "sourceName": "X：面壁智能 OpenBMB (@OpenBMB)", "sourceUrl": "https://x.com/OpenBMB/status/2061432928492810535"}, {"idx": 14, "title": "Apache RocketMQ 发布 AI 专用消息引擎", "summary": "🚀 Apache RocketMQ 为 AI 升级！推出 RocketMQ for AI--一个专为长时间会话、多智能体工作流和公平资源调度构建的新消息引擎。凭借 Lite-Topics、有序消息和智能流量整形，它解决了状态丢失、级联故障和突发负载问题。由阿里云大规模构建，现已开源。\n\n了解更多： https：//int.alibabacloud.com/m/1000413178/\n\n#RocketMQ #AI #CloudNative", "publishedAt": "2026-06-01T10:53:26.000Z", "category": "ai-products", "sourceName": "X：阿里云 / Alibaba Cloud (@alibaba_cloud)", "sourceUrl": "https://x.com/alibaba_cloud/status/2061400724018217381"}, {"idx": 15, "title": "OpenAI前沿模型与Codex现可在AWS上使用", "summary": "OpenAI的前沿模型与Codex现已在AWS上全面可用。企业客户可通过其现有的AWS环境、控制与采购流程来使用OpenAI的AI技术，从而加速从评估到生产部署的过程。", "publishedAt": "2026-06-01T10:00:00.000Z", "category": "ai-products", "sourceName": "OpenAI：官网动态（RSS · 排除企业/客户案例）", "sourceUrl": "https://openai.com/index/openai-frontier-models-and-codex-are-now-available-on-aws"}, {"idx": 16, "title": "腾讯混元发布智能体长期记忆插件Hy-Memory", "summary": "腾讯混元正式发布专为OpenClaw等长期协作智能体（Agent）设计的记忆插件 Hy-Memory。它基于6层记忆框架、System1/System2双系统与三层进化链构建，旨在成为智能体的\"第二大脑\"。该插件解决了记忆碎片化问题，实现了显著性能提升：记忆数量减少70%以上，单条记忆信息密度提升45%以上，在超长上下文场景中token消耗降低35%，记忆更新速度提升20%。", "publishedAt": "2026-06-01T09:01:25.000Z", "category": "ai-products", "sourceName": "X：腾讯混元 (@TencentHunyuan)", "sourceUrl": "https://x.com/TencentHunyuan/status/2061372535267357029"}, {"idx": 17, "title": "Cursor Teams计划定价方案更新", "summary": "Cursor Teams计划推出三项更新：增加Composer特定使用池，将第一方模型（Composer和Auto）与第三方API的使用额度分开计费；推出Premium席位，提供5倍于标准席位（$40/月）的使用量，价格为$96/月（年付）；仪表盘现可实时显示用户额度使用情况，管理员可通过Slack或邮件配置智能提醒。", "publishedAt": "2026-06-01T07:00:00.000Z", "category": "ai-products", "sourceName": "Cursor Blog", "sourceUrl": "https://cursor.com/blog/teams-pricing-june-2026"}, {"idx": 18, "title": "NVIDIA 工厂运营蓝图为工厂打造 AI 大脑", "summary": "NVIDIA发布了工厂运营蓝图（FOX），这是一项用于构建自主工厂管理AI智能体的参考设计。该蓝图基于NVIDIA NemoClaw、AI-Q Blueprint及Nemotron开源模型构建，并针对DGX Station工作站进行了优化，可在配备GB300 Grace Blackwell Ultra芯片的本地环境运行。台湾制造商富士康、和硕、研华和纬创是首批部署FOX蓝图的厂商。其中，富士康基于该蓝图构建了MoMClaw多智能体系统，预计将根因分析时间缩短80%，劳动生产率提升15%，机器故障率降低10%。", "publishedAt": "2026-06-01T05:00:47.000Z", "category": "ai-products", "sourceName": "NVIDIA Blog：Generative AI（网页）", "sourceUrl": "https://blogs.nvidia.com/blog/factory-operations-fox-blueprint-ai-brain"}]}, {"label": "行业动态", "slug": "industry", "count": 16, "items": [{"idx": 19, "title": "Nathan Lambert离开Ai2，结束2.5年OLMO等项目工作", "summary": "Ai2（Allen Institute for AI）研究员Nathan Lambert宣布离职。他在Ai2工作超过2.5年，期间主导或参与了OLMO和Tulu等开源模型项目，称其为职业生涯的巅峰。他表示将暂时休息，未来仍会继续深耕开源模型与开放科学领域。", "publishedAt": "2026-06-02T14:13:06.000Z", "category": "industry", "sourceName": "X：Nathan Lambert (@natolambert)", "sourceUrl": "https://x.com/natolambert/status/2061813361848029631"}, {"idx": 20, "title": "Anthropic扩展Project Glasswing计划", "summary": "Anthropic正将其Project Glasswing计划扩展至约150个新组织，此前首批约50个合作伙伴。新伙伴分布于十五个多国家，覆盖电力、水务、医疗、通信和硬件等关键基础设施行业。这些合作伙伴的共同点在于，其代码库若遭成功攻击，后果可能极其严重，影响或超1亿人。项目旨在利用Claude Mythos Preview等前沿模型扫描漏洞并协助修复，以应对AI驱动的网络安全挑战。同时，Anthropic推出了基于Claude Opus 4.8等公开模型的Claude Security产品，用于扫描代码并建议补丁。", "publishedAt": "2026-06-02T13:28:13.607Z", "category": "industry", "sourceName": "Anthropic：Newsroom（网页）", "sourceUrl": "https://www.anthropic.com/news/expanding-project-glasswing"}, {"idx": 21, "title": "SK会长崔泰源：SK海力士计划未来五年内晶圆产能翻倍", "summary": "SK海力士会长崔泰源宣布，计划在未来五年内将整体晶圆产能提高一倍，以应对AI普及带来的持续存储供应短缺。他预测AI数据中心和AI PC的普及将持续拉动存储需求，供需紧张局面可能延续至2030年。SK海力士将投入大规模资金用于设备、建设等扩张，尽管面临前置时间长（新建晶圆厂至少三年）和资源成本上涨等挑战。目前，SK海力士市值已首次突破1万亿美元。", "publishedAt": "2026-06-02T08:31:12.000Z", "category": "industry", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/958/810.htm"}, {"idx": 22, "title": "Alphabet将通过发行股票筹集800亿美元用于AI支出计划", "summary": "Alphabet正在通过发行股票等方式筹集800亿美元资金，其中包括与Berkshire Hathaway的投资协议，以资助其雄心勃勃的AI支出计划。", "publishedAt": "2026-06-01T20:50:33.000Z", "category": "industry", "sourceName": "Bloomberg：Technology（RSS）", "sourceUrl": "https://www.bloomberg.com/news/articles/2026-06-01/alphabet-to-raise-80-billion-in-equity-capital-for-ai-spending"}, {"idx": 23, "title": "Meta的AI被利用来劫持Instagram账号", "summary": "Meta的AI聊天机器人被发现存在安全漏洞，黑客可以通过请求该AI关联一个新的电子邮件地址，从而接管目标用户的Instagram账号。该漏洞利用了AI智能体直接执行账户管理操作的能力。", "publishedAt": "2026-06-01T19:20:47.000Z", "category": "industry", "sourceName": "The Verge：订阅版科技（RSS）", "sourceUrl": "https://www.theverge.com/tech/941179/meta-instagram-ai-support-chatbot-exploit-hacked"}, {"idx": 24, "title": "佛罗里达州起诉OpenAI与Sam Altman：涉多起ChatGPT相关谋杀案", "summary": "佛罗里达州对OpenAI及其CEO Sam Altman提起诉讼。该州总检察长指控Altman对人命\"完全漠视\"，案件与多起涉及ChatGPT的谋杀事件相关。", "publishedAt": "2026-06-01T18:52:19.000Z", "category": "industry", "sourceName": "Ars Technica：AI（RSS）", "sourceUrl": "https://arstechnica.com/tech-policy/2026/06/florida-sues-openai-sam-altman-after-multiple-chatgpt-linked-murders"}, {"idx": 25, "title": "OpenAI的AI政策与政治倡导观点", "summary": "OpenAI阐述了其在AI政策与政治倡导方面的立场，包括对透明度、深思熟虑的监管以及AI安全的支持。同时，公司明确表示，任何外部政治组织均不能代表OpenAI发言。", "publishedAt": "2026-06-01T17:00:00.000Z", "category": "industry", "sourceName": "OpenAI：官网动态（RSS · 排除企业/客户案例）", "sourceUrl": "https://openai.com/index/our-views-on-ai-policy-and-political-advocacy"}, {"idx": 26, "title": "Anthropic 保密向 SEC 提交 S-1 草案", "summary": "Anthropic， PBC 今日保密向美国证券交易委员会提交了 S-1 表格草案，计划进行普通股的首次公开发行。这使其在 SEC 完成审核后拥有上市的选择权。IPO 的具体发行股数和价格尚未确定，将取决于市场条件等因素。公司近期刚完成由 Altimeter Capital 等领投的 650 亿美元 H 轮融资，估值达 9650 亿美元，并发布了 Claude Opus 4.8 模型。", "publishedAt": "2026-06-01T16:24:52.982Z", "category": "industry", "sourceName": "Anthropic：Newsroom（网页）", "sourceUrl": "https://www.anthropic.com/news/confidential-draft-s1-sec"}, {"idx": 27, "title": "智谱：建议 A 股发行并在科创板上市", "summary": "智谱计划向中国监管机构申请发行A股并在科创板上市。发行股份数量占发行完成后总股本的2%至8%，预计全部为新股，原股东不发售。本次发行募集资金净额将投资于人工智能通用基座大模型、大模型MaaS一站式服务平台及补充流动资金。此外，公司拟将英文名称由\"Knowledge Atlas Technology Joint Stock Company Limited\"变更为\"Z.AI Co.， Ltd.\"。", "publishedAt": "2026-06-01T15:53:42.000Z", "category": "industry", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/958/444.htm"}, {"idx": 28, "title": "Luma成立开放物理AI实验室攻克泛化难题", "summary": "为改善人类生活，AI系统必须能帮助我们改善物理世界。阻碍我们迈向这一繁荣未来的是物理AI的泛化问题。\n\n为解决此问题，我们在Luma建立了一个新的开放科学物理AI实验室。\n\n阅读更多 → https：//lumalabs.ai/news/luma-open-physical-ai-lab", "publishedAt": "2026-06-01T14:49:50.000Z", "category": "industry", "sourceName": "X：Luma AI (@LumaLabsAI)", "sourceUrl": "https://x.com/LumaLabsAI/status/2061460217616027961"}, {"idx": 29, "title": "王兴：美团 AI Agent\"小美\"与腾讯元宝即将深度合作，用户订单无缝连接", "summary": "美团2026年第一季度财报显示营收910.39亿元，净利润亏损68.27亿元。财报电话会上，CEO王兴透露其AI Agent\"小美\"将与腾讯元宝深度合作。用户在腾讯元宝中提交本地服务需求，将被无缝连接至美团的外卖点餐、配送等生态。王兴强调，面向智能体的服务（To A）正变得日益重要，美团已将AI助手\"小团\"置于App核心位置，并拓展AI服务外延。", "publishedAt": "2026-06-01T12:34:05.000Z", "category": "industry", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/958/410.htm"}, {"idx": 30, "title": "OpenAI在密歇根州启动Stargate 1GW数据中心建设", "summary": "OpenAI在密歇根州启动了名为Stargate的1GW数据中心项目。作为AI基础设施建设的一部分，该项目旨在扩大人工智能技术的可及性、为当地创造就业机会并支持社区发展。", "publishedAt": "2026-06-01T12:00:00.000Z", "category": "industry", "sourceName": "OpenAI：官网动态（RSS · 排除企业/客户案例）", "sourceUrl": "https://openai.com/index/stargate-michigan-data-center"}, {"idx": 31, "title": "Runway 在伦敦设立欧洲总部及世界模型研究中心", "summary": "Runway 宣布在伦敦建立新的欧洲总部和专注于通用世界模型的研究中心。公司计划在未来18个月向英国AI生态投资$100M，到2028年投资额将翻倍以上。过去12个月，其在欧洲的订阅销量增长了50%，企业客户占比超20%。新总部将扩大其在欧洲的研究与商业布局，公司正招聘欧洲负责人以组建跨研究、产品、工程和销售的团队，并深化与BBC、Fremantle、WPP等企业的合作。世界模型是其研究的核心，旨在将生成式AI的应用扩展至机器人、科学研究与工业模拟等领域。", "publishedAt": "2026-06-01T10:24:49.447Z", "category": "industry", "sourceName": "Runway：News（网页）", "sourceUrl": "https://runwayml.com/news/runway-opens-london-hq"}, {"idx": 32, "title": "介绍Cosmos Coalition", "summary": "Runway宣布作为创始成员加入Cosmos Coalition，该联盟与NVIDIA及多家领先AI实验室合作，旨在构建并开源面向物理AI的前沿世界模型。首个项目将由Runway与NVIDIA共同开发一个基础模型，以推动下一代开放世界模型的研究与发展。", "publishedAt": "2026-06-01T05:24:22.746Z", "category": "industry", "sourceName": "Runway：News（网页）", "sourceUrl": "https://runwayml.com/news/introducing-cosmos-coalition"}, {"idx": 33, "title": "NVIDIA AI Cloud生态系统全球扩张，满足AI算力需求", "summary": "NVIDIA AI Cloud生态系统正通过与CoreWeave、Firmus、IREN、Nscale等全球合作伙伴合作，加速在六大洲建设AI工厂基础设施。该生态系统结合NVIDIA的加速计算、网络和AI软件，帮助合作伙伴为模型训练、微调、推理以及智能体AI（agentic AI）应用提供服务。此举旨在满足前沿模型开发、企业AI、电信及国家AI计划的需求，并支持亚太、美洲和非洲等地区的区域性与主权AI产能发展。", "publishedAt": "2026-06-01T05:00:56.000Z", "category": "industry", "sourceName": "NVIDIA Blog：Agentic AI（网页）", "sourceUrl": "https://blogs.nvidia.com/blog/ai-cloud-ecosystem"}, {"idx": 34, "title": "NVIDIA与Google Cloud助力下一波AI构建者", "summary": "在Google I/O大会上，NVIDIA与Google Cloud宣布深化合作，旨在支持其联合开发者社区中超过10万名开发者。合作将重点提供NVIDIA L4 Tensor Core GPU以优化AI推理与图形工作负载，并通过支持Vertex AI平台来增强Gemini模型性能。双方还将提供开源软件工具，以简化AI应用的构建与部署流程。", "publishedAt": "2026-06-01T05:00:56.000Z", "category": "industry", "sourceName": "NVIDIA Blog：Generative AI（网页）", "sourceUrl": "https://blogs.nvidia.com/blog/category/enterprise/cloud-2"}]}, {"label": "论文研究", "slug": "paper", "count": 2, "items": [{"idx": 35, "title": "Anthropic可解释性研究：区分因果效应相似的特征", "summary": "Anthropic可解释性团队介绍了其Circuits研究的新进展。为区分那些激活模式相似但因果效应不同的模型特征，团队提出一种新方法。该方法通过分析特征的下游连接来预测其实际影响，并使用基于共激活统计的TWERA（虚拟权重）对连接进行加权排序。实验表明，借助下游连接信息能更准确地判断哪个特征会引导特定输出。此方法为识别模型内部真正的因果组件提供了新途径。", "publishedAt": "2026-06-02T09:52:20.287Z", "category": "paper", "sourceName": "Anthropic：Transformer Circuits（可解释性研究）", "sourceUrl": "https://transformer-circuits.pub/2026/may-update/index.html"}, {"idx": 36, "title": "Codex正在成为每个人的生产力工具", "summary": "The Next Era of Knowledge Work报告指出，Codex正通过AI增强的研究、数据分析、工作流自动化与内容创作，变革知识工作的生产力。", "publishedAt": "2026-06-02T02:00:00.000Z", "category": "paper", "sourceName": "OpenAI：官网动态（RSS · 排除企业/客户案例）", "sourceUrl": "https://openai.com/index/codex-for-knowledge-work"}]}, {"label": "技巧与观点", "slug": "tip", "count": 14, "items": [{"idx": 37, "title": "Gemini Spark：最令人印象深刻也最可怕的AI体验", "summary": "Google DeepMind的AI模型Gemini Spark提供了一次极为深刻但同时令人感到不安的用户体验。该模型展现的强大能力令人印象深刻，但其带来的影响和潜力也引发了深刻的恐惧感。", "publishedAt": "2026-06-02T12:38:08.000Z", "category": "tip", "sourceName": "The Verge：订阅版科技（RSS）", "sourceUrl": "https://www.theverge.com/ai-artificial-intelligence/941388/gemini-spark-ai-agent-trip-planning"}, {"idx": 38, "title": "为了不花那120刀，我把电脑清理软件做成了开源skill", "summary": "作者受一条推文启发，使用Codex对自己的MacBook进行了只读存储分析，发现了B站缓存视频等大量可清理空间（激进方案超140G）。为替代收费软件CleanMyMac，作者制作并开源了一个跨平台（支持Mac/Windows）的AI清理skill。该skill会扫描文件并生成可交互的HTML报告，通过三色分级（绿灯可放心清理、黄灯需人工判断、红灯禁止动）直观展示，并提供安全执行按钮。实测清理后释放了近120G空间，相比CleanMyMac仅扫描出的15.8G，其信息更透明、建议更详细。", "publishedAt": "2026-06-02T04:42:58.000Z", "category": "tip", "sourceName": "X：卡兹克 (@Khazix0918)", "sourceUrl": "https://x.com/Khazix0918/status/2061669881725309048"}, {"idx": 39, "title": "Anthropic 开发者分享 Claude Code「理解验证」工作流", "summary": "Anthropic 核心开发者分享了一套用于 Claude Code 的「理解验证」工作流。该工作流将 AI 定位为\"高效且睿智的教师\"，成功标准不仅是完成任务，更是确保人类对问题、方案及影响有可复述、可辩护的掌握。它通过增量教学、用户复述、清单+测验等方式，围绕问题域、方案域和语境域三条轴线展开，具体包含8个可执行步骤，强调在进入下一阶段前需确认用户已真正理解。此工作流旨在对抗长会话中人类易沦为\"审批按钮\"的\"智能体黑箱\"问题，强制沉淀决策上下文，实现可审计的深度理解。", "publishedAt": "2026-06-02T00:55:00.000Z", "category": "tip", "sourceName": "X：邵猛 (@shao__meng)", "sourceUrl": "https://x.com/shao__meng/status/2061612512580346245"}, {"idx": 40, "title": "Karpathy 分享学习方法论", "summary": "🎯 Andrej Karpathy 谈如何学习。", "publishedAt": "2026-06-02T00:12:00.000Z", "category": "tip", "sourceName": "X：Rohan Paul (@rohanpaul_ai)", "sourceUrl": "https://x.com/rohanpaul_ai/status/2061601689841648120"}, {"idx": 41, "title": "Sam Altman强调AI发展应以人为本", "summary": "Sam Altman在采访中表示，AI不应被设计为追求脱离人类需求的目标，人类必须始终处于AI发展的中心。他批判了行业内\"AI将摧毁大量工作\"等言论，认为人们担忧的并非AI带来的好处，而是自身在未来的角色、经济前景与自主权。他指出，AI行业的失败在于未能清晰解释人类如何在每一步保持对未来的控制权，以及如何在AI时代继续拥有充实、有意义的生活。", "publishedAt": "2026-06-01T23:10:22.000Z", "category": "tip", "sourceName": "X：Rohan Paul (@rohanpaul_ai)", "sourceUrl": "https://x.com/rohanpaul_ai/status/2061586179292831774"}, {"idx": 42, "title": "Google AI 展示并行子智能体自动整理文件", "summary": "从杂乱到清晰。观看 @Antigravity 中的并行子智能体对数百个营销资产进行分类和重命名，消除手动文件管理。", "publishedAt": "2026-06-01T18:28:13.000Z", "category": "tip", "sourceName": "X：Google AI for Developers (@googleaidevs)", "sourceUrl": "https://x.com/googleaidevs/status/2061515177166844317"}, {"idx": 43, "title": "Gemini Omni支持创建个人数字分身", "summary": "轻松将自己添加到Gemini的视频创作中。\n\n以下是如何使用Gemini Omni创建一个外观和声音都像你的数字分身。🧵", "publishedAt": "2026-06-01T16:12:12.000Z", "category": "tip", "sourceName": "X：Gemini (@GeminiApp)", "sourceUrl": "https://x.com/GeminiApp/status/2061480944905982276"}, {"idx": 44, "title": "构建每周千美元预算上限的智能体教程", "summary": "视频教程：如何构建一个每周预算上限为1000美元的智能体，包含模型拒绝列表与自定义数据保留\n\n使用了新的、可堆叠的护栏架构：\n\n【引用 @OpenRouter】：OpenRouter 上的护栏是市场上最强大的：为您的 AI 流量提供集中式安全与治理\n\n预算限制、ZDR、模型与提供商限制、提示词注入防御以及 DLP / 敏感信息检测，分层为您控制的规则！🧵", "publishedAt": "2026-06-01T14:20:56.000Z", "category": "tip", "sourceName": "X：OpenRouter (@OpenRouter)", "sourceUrl": "https://x.com/OpenRouter/status/2061452942385783050"}, {"idx": 45, "title": "AI Pulse 探讨智能体时代新指标 DAA", "summary": "ICYMI：我们最新的 AI Pulse 探讨了日活跃智能体（DAA）--一个衡量智能体时代价值的指标--以及我们的智能体组合。", "publishedAt": "2026-06-01T14:00:03.000Z", "category": "tip", "sourceName": "X：百度 Baidu (@Baidu_Inc)", "sourceUrl": "https://x.com/Baidu_Inc/status/2061447687028039854"}, {"idx": 46, "title": "超越LLM：为何可扩展的企业AI采用取决于智能体逻辑", "summary": "可扩展的企业AI采用需超越大语言模型，依靠智能体逻辑来引导模型执行动态、长周期且受约束的企业工作流，从而提升质量、降低成本并建立信任。文中以IBM watsonx Code Assistant for Z为例，展示了智能体逻辑如何通过程序分析等技术，在理解大型遗留代码库时，相比纯LLM基线方法，能以约30倍更低的token消耗达到更优性能。在加速测试生成任务中，该方法亦能使代码覆盖度提升20%-45%，同时token消耗降低最高达15倍。", "publishedAt": "2026-06-01T13:51:18.000Z", "category": "tip", "sourceName": "Hugging Face：Blog（RSS）", "sourceUrl": "https://huggingface.co/blog/ibm-research/agent-logic-and-scalable-ai-adoption"}, {"idx": 47, "title": "作者分享使用 Codex App 开发的开源项目合集", "summary": "作者分享了使用 Codex App 等工具开发的一系列开源项目，包括4个 Chrome 插件（如快捷提示词、新标签页）、4个网站（如艺术家风格对比、音乐展示）和5个 AI Skill（如论文解读、阅读助手）。项目基于 GPT-Image-2 API、Suno 等技术，并整合了 Read-frog、Hyperframe 等开源项目。", "publishedAt": "2026-06-01T13:44:14.000Z", "category": "tip", "sourceName": "X：Vista (@vista8)", "sourceUrl": "https://x.com/vista8/status/2061443708374208769"}, {"idx": 48, "title": "微软研究聚焦：智能体评估与价值对齐", "summary": "大规模评估智能体行为，论证代码库优于文档，并邀请全球研究人员共同解决价值对齐问题。深入了解最新研究焦点。", "publishedAt": "2026-06-01T13:30:54.000Z", "category": "tip", "sourceName": "X：Microsoft Research (@MSFTResearch)", "sourceUrl": "https://x.com/MSFTResearch/status/2061440352859361521"}, {"idx": 49, "title": "开源与闭源模型在不同的增长曲线上", "summary": "当模型智能的微小提升能直接转化为实际价值时，开源与闭源模型正沿着不同的增长路径发展。闭源模型通过在特定场景下提供更高的边际智能来创造价值，而开源模型则在其他维度寻找增长点，两者形成了差异化的竞争格局。", "publishedAt": "2026-06-01T13:03:48.000Z", "category": "tip", "sourceName": "Nathan Lambert：Interconnects（RSS）", "sourceUrl": "https://www.interconnects.ai/p/open-and-closed-models-are-on-different"}, {"idx": 50, "title": "使用Claude Opus 4.8将书籍转化为AI技能的教程", "summary": "本文以《非暴力沟通》为例，提供了一个将书籍转化为可调用AI技能（Skill）的六步教程。作者使用Claude Opus 4.8模型，因其具备100万token上下文窗口、结构化输出及多步智能体（Agent）能力，能一次性处理全书逻辑。流程包含文本准备、全局结构分析、五类提炼（框架/原则/技法/反模式/作者声音）、技能生成及关键的自检步骤。生成的技能保留了书中原始框架命名（如OFNR四要素、长颈鹿语言），并将触发词优化为\"怎么提意见不像在指责\"等日常表达。整个流程耗时约45分钟，消耗约30万token，成本不到20元人民币。", "publishedAt": "2026-06-01T12:06:50.000Z", "category": "tip", "sourceName": "X：阿易 AI Notes (@AYi_AInotes)", "sourceUrl": "https://x.com/AYi_AInotes/status/2061419197154857286"}]}]}
</script>
<script>
const EMBEDDED_DATA = JSON.parse(document.getElementById("dataSrc").textContent);
const SECTION_CONFIG = {"模型发布/更新": {"icon": "🤖", "color": "#7f6af0"}, "产品发布/更新": {"icon": "📦", "color": "#e8622a"}, "行业动态": {"icon": "🏭", "color": "#1d9e75"}, "论文研究": {"icon": "📄", "color": "#378add"}, "技巧与观点": {"icon": "💡", "color": "#e8a020"}};
const DAILY_STR = "2026-06-02";
const DAILY_MAX = "2026-06-02";

let currentData = null;
let currentDate = DAILY_STR;
let readSet = new Set();
let showOnlyUnread = false;
let currentFilter = 'all';
let currentSearch = '';
let isDark = true;

function reloadToday() {
  location.reload();
}
window.addEventListener('DOMContentLoaded', function() {
  try { readSet = new Set(JSON.parse(localStorage.getItem('aidaka_read_' + currentDate) || '[]')); } catch(e) {}
  try {
    var saved = localStorage.getItem('aidaka_theme');
    if (saved === 'light') { isDark = false; document.body.classList.add('light'); }
  } catch(e) {}
  updateThemeBtn();
  renderAll(EMBEDDED_DATA);
  setTimeout(function() {
    document.getElementById('loadingOverlay').style.opacity = '0';
    setTimeout(function() { document.getElementById('loadingOverlay').style.display = 'none'; }, 400);
  }, 300);
});

function renderAll(data) {
  currentData = data;
  var sections = data.sections || [];
  var total = sections.reduce(function(a, s) { return a + s.items.length; }, 0);
  var dateStr = fmtDate(data.date);
  document.getElementById('heroTitle').textContent = 'AI打卡网 · ' + dateStr;
  var gen = data.generatedAt ? new Date(data.generatedAt) : new Date();
  document.getElementById('heroSubtitle').textContent = '共收录 ' + total + ' 条资讯 · 来源精选 · 生成于 ' + relTime(gen);
  document.getElementById('navDateLabel').textContent = data.date;
  document.title = 'AI打卡网 · ' + data.date + ' (' + total + '条)';

  var statsEl = document.getElementById('heroStats');
  statsEl.innerHTML = '<div class="stat-chip" onclick="reloadToday()" title="刷新今日数据"><div class="num">' + total + '</div><div class="lbl">今日总条数</div></div>'
    + sections.map(function(s) {
      var cfg = SECTION_CONFIG[s.label] || { icon: '📌', color: '#888' };
      return '<div class="stat-chip" onclick="filterSection(\'' + s.label.replace(/'/g, "\\'") + '\'); scrollToSection(\'' + s.label.replace(/'/g, "\\'") + '\');" title="跳转到 ' + s.label + '"><div class="num" style="font-size:22px">' + cfg.icon + '</div><div class="lbl">' + s.label.replace('/更新','').replace('/观点','') + ' ' + s.items.length + '</div></div>';
    }).join('');

  renderDonut(sections);
  var navEl = document.getElementById('navInner');
  var dateArea = navEl.querySelector('.nav-date-area');
  navEl.querySelectorAll('.nav-sec-link').forEach(function(el) { el.remove(); });
  sections.forEach(function(s) {
    var cfg = SECTION_CONFIG[s.label] || { icon: '📌', color: '#888' };
    var a = document.createElement('a');
    a.className = 'nav-link nav-sec-link';
    a.href = '#sec-' + slugify(s.label);
    a.innerHTML = cfg.icon + ' ' + s.label + ' <span class="nav-badge">' + s.items.length + '</span>';
    a.onclick = function(e) { e.preventDefault(); filterSection(s.label, a); scrollToSection(s.label); };
    navEl.insertBefore(a, dateArea);
  });
  renderAnalytics(sections);
  var main = document.getElementById('main');
  main.querySelectorAll('.dyn-section').forEach(function(el) { el.remove(); });
  var globalIdx = 0;
  var frag = document.createDocumentFragment();
  sections.forEach(function(s) {
    var cfg = SECTION_CONFIG[s.label] || { icon: '📌', color: '#888' };
    var secDiv = document.createElement('div');
    secDiv.className = 'dyn-section';
    secDiv.id = 'sec-' + slugify(s.label);
    var header = document.createElement('div');
    header.className = 'section-header';
    header.innerHTML = '<div class="section-icon" style="background:' + cfg.color + '22; color:' + cfg.color + '">' + cfg.icon + '</div>'
      + '<span class="section-title">' + s.label + '</span>'
      + '<span class="section-count">' + s.items.length + ' 条</span>';
    secDiv.appendChild(header);
    if (s.items.length === 0) {
      secDiv.innerHTML += '<p style="color:var(--text3);font-size:13px;padding:12px 0">今日暂无相关资讯</p>';
    } else {
      var grid = document.createElement('div');
      grid.className = 'card-grid';
      s.items.forEach(function(item) {
        globalIdx++;
        var cardEl = buildCard(item, globalIdx);
        grid.appendChild(cardEl);
      });
      secDiv.appendChild(grid);
    }
    frag.appendChild(secDiv);
  });
  main.insertBefore(frag, main.querySelector('#noResults'));
  updateReadProgress(total);
  updateDateNav(data.date);
  document.getElementById('footerEl').innerHTML = '共 ' + total + ' 条资讯 · 数据来源 <a href="https://aihot.virxact.com" target="_blank" rel="noopener noreferrer" style="color:var(--accent)">aihot.virxact.com</a> · AI打卡网 每日晨报';
  setTimeout(initScrollAnim, 100);
}

function buildCard(item, idx) {
  var isRead = readSet.has(String(idx));
  var card = document.createElement('div');
  card.className = 'card' + (isRead ? ' read' : '');
  card.dataset.idx = idx;
  card.dataset.title = (item.title || '').toLowerCase();
  card.dataset.summary = (item.summary || '').toLowerCase();
  card.dataset.source = (item.sourceName || '').toLowerCase();
  var srcShort = shortSource(item.sourceName || '');
  var titleSafe = escHtml(item.title || '');
  var sourceNameSafe = escHtml(item.sourceName || '');
  var summaryRaw = item.summary || '';
  // Truncate summary to ~60 chars for display
  var summaryShort = summaryRaw.length > 65 ? summaryRaw.slice(0, 62) + '...' : summaryRaw;
  var summarySafe = escHtml(summaryShort);
  var summaryFull = escHtml(summaryRaw);
  var timeStr = item.publishedAt ? relTimeStr(item.publishedAt) : '';
  var sourceHtml = item.sourceUrl ? '<a class="source-btn" href="' + escHtml(item.sourceUrl) + '" target="_blank" rel="noopener noreferrer">原文</a>' : '';

  var inner = '<div class="card-header"><span class="card-num">' + idx + '</span><span class="card-title">' + titleSafe + '</span></div>';
  if (timeStr) { inner += '<span class="time-badge">' + escHtml(timeStr) + '</span>'; }
  inner += '<span class="card-source" title="' + sourceNameSafe + '">' + escHtml(srcShort) + '</span>'
    + '<div class="card-summary collapsed" id="sum-' + idx + '" data-full="' + escHtml(summaryRaw).replace(/"/g, '&quot;') + '">' + summarySafe + '</div>'
    + '<div class="card-footer">'
    + '<button class="expand-btn" onclick="toggleExpand(' + idx + ', this)">展开全文</button>'
    + '<div style="display:flex;gap:8px">'
    + '<button class="read-btn" onclick="markRead(' + idx + ', this)" id="rbtn-' + idx + '">' + (isRead ? '标为未读' : '打卡') + '</button>'
    + sourceHtml
    + '</div></div>';
  card.innerHTML = inner;
  // 点击卡片任意位置展开全文（按钮除外）
  card.addEventListener('click', function(e) {
    var target = e.target;
    if (target.closest('.read-btn') || target.closest('.source-btn') || target.closest('.expand-btn')) return;
    toggleExpand(idx, card.querySelector('.expand-btn'));
  });
  return card;
}

function renderDonut(sections) {
  var total = sections.reduce(function(a, s) { return a + s.items.length; }, 0);
  if (total === 0) return;
  var svgEl = document.getElementById('donutSvg');
  var legendEl = document.getElementById('donutLegend');
  svgEl.innerHTML = '';
  legendEl.innerHTML = '';
  var cx = 50, cy = 50, r = 36, inner = 22;
  var startAngle = -Math.PI / 2;
  sections.forEach(function(s) {
    if (s.items.length === 0) return;
    var cfg = SECTION_CONFIG[s.label] || { icon: '📌', color: '#888' };
    var angle = (s.items.length / total) * Math.PI * 2;
    var endAngle = startAngle + angle;
    var x1 = cx + r * Math.cos(startAngle), y1 = cy + r * Math.sin(startAngle);
    var x2 = cx + r * Math.cos(endAngle), y2 = cy + r * Math.sin(endAngle);
    var ix1 = cx + inner * Math.cos(startAngle), iy1 = cy + inner * Math.sin(startAngle);
    var ix2 = cx + inner * Math.cos(endAngle), iy2 = cy + inner * Math.sin(endAngle);
    var lg = angle > Math.PI ? 1 : 0;
    var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', 'M ' + ix1 + ' ' + iy1 + ' L ' + x1 + ' ' + y1 + ' A ' + r + ' ' + r + ' 0 ' + lg + ' 1 ' + x2 + ' ' + y2 + ' L ' + ix2 + ' ' + iy2 + ' A ' + inner + ' ' + inner + ' 0 ' + lg + ' 0 ' + ix1 + ' ' + iy1 + ' Z');
    path.setAttribute('fill', cfg.color);
    path.setAttribute('opacity', '0.85');
    path.style.cursor = 'pointer';
    path.addEventListener('click', (function(label) { return function() { filterSection(label); scrollToSection(label); }; })(s.label));
    svgEl.appendChild(path);
    startAngle = endAngle;
    var li = document.createElement('div');
    li.className = 'donut-legend-item';
    li.innerHTML = '<span class="dot" style="background:' + cfg.color + '"></span>' + s.label + ' <strong style="color:rgba(255,255,255,0.95)">' + s.items.length + '</strong>';
    li.onclick = (function(label) { return function() { filterSection(label); scrollToSection(label); }; })(s.label);
    legendEl.appendChild(li);
  });
  var text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  text.setAttribute('x', cx); text.setAttribute('y', cy + 1);
  text.setAttribute('text-anchor', 'middle'); text.setAttribute('dominant-baseline', 'middle');
  text.setAttribute('fill', 'rgba(255,255,255,0.9)'); text.setAttribute('font-size', '12');
  text.setAttribute('font-weight', '700'); text.textContent = total;
  svgEl.appendChild(text);
  var sub = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  sub.setAttribute('x', cx); sub.setAttribute('y', cy + 13);
  sub.setAttribute('text-anchor', 'middle'); sub.setAttribute('fill', 'rgba(255,255,255,0.6)'); sub.setAttribute('font-size', '7');
  sub.textContent = '条';
  svgEl.appendChild(sub);
}

function renderAnalytics(sections) {
  var wrap = document.getElementById('analyticsWrap');
  var sourceMap = {};
  sections.forEach(function(s) {
    s.items.forEach(function(item) {
      var src = shortSource(item.sourceName || '未知');
      sourceMap[src] = (sourceMap[src] || 0) + 1;
    });
  });
  var sorted = Object.entries(sourceMap).sort(function(a,b) { return b[1]-a[1]; }).slice(0, 6);
  var maxCount = sorted[0] ? sorted[0][1] : 1;
  var srcHtml = '<div class="analytics-card"><div class="analytics-title">来源排行</div>';
  sorted.forEach(function(entry) {
    var name = entry[0], count = entry[1];
    var pct = Math.round(count / maxCount * 100);
    srcHtml += '<div class="source-rank-item" style="cursor:pointer" onclick="filterBySource(\'' + escHtml(name).replace(/'/g,"\\'") + '\')" title="查看 ' + escHtml(name).replace(/'/g,"\\'") + ' 的全部文章"><span class="source-rank-name">' + escHtml(name) + '</span><div class="source-rank-bar-bg"><div class="source-rank-bar" style="width:' + pct + '%"></div></div><span class="source-rank-count">' + count + '</span></div>';
  });
  srcHtml += '</div>';
  var stopWords = new Set(['的','了','在','是','与','和','AI','以','将','被','其','已','于','从','到','并','为','但','还','也','都','该','这','其中','能够','通过','实现','用于','可以','以及','可能','提供','包含','包括','无需','用户','产品','模型','支持','系统','功能','未','使用','工作','进行','没有']);
  var wordCount = {};
  sections.forEach(function(s) {
    s.items.forEach(function(item) {
      var words = (item.title + ' ' + (item.summary || '')).replace(/[，。、！？【】《》"'·\s]+/g, ' ').split(' ');
      words.forEach(function(w) {
        w = w.trim();
        if (w.length >= 2 && w.length <= 8 && !stopWords.has(w) && !/^[a-zA-Z0-9]{1,2}$/.test(w)) {
          wordCount[w] = (wordCount[w] || 0) + 1;
        }
      });
    });
  });
  var topWords = Object.entries(wordCount).sort(function(a,b) { return b[1]-a[1]; }).slice(0, 18);
  var colors = ['#e8622a','#f08040','#1d9e75','#378add','#7f6af0','#e8a020','#d4537e','#0f6e56','#993c1d','#185fa5'];
  var hotHtml = '<div class="analytics-card"><div class="analytics-title">热词标签</div><div class="hotwords-wrap">';
  topWords.forEach(function(entry, i) {
    var word = entry[0], cnt = entry[1];
    var sz = Math.max(11, Math.min(16, 11 + cnt * 2));
    var col = colors[i % colors.length];
    hotHtml += '<span class="hotword-chip" style="background:' + col + ';font-size:' + sz + 'px;opacity:' + (0.7 + cnt * 0.1) + '" onclick="document.getElementById(\'searchInput\').value=\'' + escHtml(word).replace(/'/g, "\\'") + '\';doSearch(\'' + escHtml(word).replace(/'/g, "\\'") + '\')">' + escHtml(word) + '</span>';
  });
  hotHtml += '</div></div>';
  wrap.innerHTML = srcHtml + hotHtml;
}

function doSearch(val) {
  currentSearch = val.toLowerCase().trim();
  document.getElementById('searchClear').className = 'search-clear' + (val ? ' show' : '');
  applyFilters();
}
function clearSearch() {
  document.getElementById('searchInput').value = '';
  doSearch('');
}
function applyFilters() {
  var cards = document.querySelectorAll('.card');
  var visible = 0;
  cards.forEach(function(card) {
    var secEl = card.closest('.dyn-section');
    var matchSection = currentFilter === 'all' || slugify(currentFilter) === (secEl ? secEl.id.replace('sec-','') : '');
    var matchSearch = !currentSearch
      || card.dataset.title.indexOf(currentSearch) >= 0
      || card.dataset.summary.indexOf(currentSearch) >= 0
      || card.dataset.source.indexOf(currentSearch) >= 0;
    var matchRead = !showOnlyUnread || !readSet.has(card.dataset.idx);
    if (matchSection && matchSearch && matchRead) {
      card.classList.remove('hidden'); visible++;
      if (currentSearch) highlightCard(card, currentSearch); else clearHighlight(card);
    } else {
      card.classList.add('hidden'); clearHighlight(card);
    }
  });
  document.getElementById('searchCount').textContent = currentSearch ? (visible > 0 ? '找到 ' + visible + ' 条' : '') : '';
  document.getElementById('noResults').className = 'no-results' + (visible === 0 && (currentSearch || showOnlyUnread || currentFilter !== 'all') ? ' show' : '');
}
function highlightCard(card, q) {
  var titleEl = card.querySelector('.card-title');
  if (!titleEl) return;
  var orig = titleEl.textContent;
  var re = new RegExp('(' + escRe(q) + ')', 'gi');
  titleEl.innerHTML = escHtml(orig).replace(re, '<mark>$1</mark>');
}
function clearHighlight(card) {
  var titleEl = card.querySelector('.card-title');
  if (titleEl) titleEl.innerHTML = escHtml(titleEl.textContent);
}
function filterSection(label, el) {
  currentFilter = label;
  currentSearch = '';
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.nav-link').forEach(function(a) { a.classList.remove('active'); });
  if (el) el.classList.add('active');
  else { document.querySelectorAll('.nav-link').forEach(function(a) { if (a.textContent.indexOf(label) >= 0) a.classList.add('active'); }); }
  applyFilters();
}
function filterBySource(sourceName) {
  currentFilter = 'all';
  currentSearch = sourceName;
  document.querySelectorAll('.nav-link').forEach(function(a) { a.classList.remove('active'); });
  document.querySelectorAll('.nav-link').forEach(function(a) { if (a.textContent.indexOf('全部') >= 0) a.classList.add('active'); });
  // Set search to the source name so only cards from that source remain visible
  document.getElementById('searchInput').value = sourceName;
  doSearch(sourceName);
  scrollTo(0, 0);
  showToast('已筛选：' + sourceName);
}
function scrollToSection(label) {
  var id = 'sec-' + slugify(label);
  var el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
function toggleExpand(idx, btn) {
  var sum = document.getElementById('sum-' + idx);
  if (!sum) return;
  var full = sum.dataset.full || '';
  if (sum.classList.contains('collapsed')) {
    sum.classList.replace('collapsed', 'expanded');
    sum.textContent = full;
    btn.textContent = '收起';
  } else {
    sum.classList.replace('expanded', 'collapsed');
    var short = full.length > 65 ? full.slice(0, 62) + '...' : full;
    sum.textContent = short;
    btn.textContent = '展开全文';
  }
}
function markRead(idx, btn) {
  var key = String(idx);
  var card = document.querySelector('.card[data-idx="' + key + '"]');
  if (readSet.has(key)) {
    readSet.delete(key);
    if (card) card.classList.remove('read');
    if (btn) btn.textContent = '打卡';
  } else {
    readSet.add(key);
    if (card) card.classList.add('read');
    if (btn) btn.textContent = '已打卡';
  }
  try { localStorage.setItem('aidaka_read_' + currentDate, JSON.stringify(Array.from(readSet))); } catch(e) {}
  var total = document.querySelectorAll('.card').length;
  updateReadProgress(total);
  if (showOnlyUnread) applyFilters();
}
function toggleReadFilter() {
  showOnlyUnread = !showOnlyUnread;
  var btn = document.getElementById('readProgress');
  if (showOnlyUnread) { btn.style.opacity = '0.7'; btn.title = '点击显示全部'; }
  else { btn.style.opacity = '1'; btn.title = '点击筛选未读'; }
  applyFilters();
}
function updateReadProgress(total) {
  var count = readSet.size;
  var pct = total > 0 ? Math.round(count / total * 100) : 0;
  var icon = count >= total && total > 0 ? '✅' : '🕐';
  var label = count >= total && total > 0 ? '今日已读完' : '已打卡 ' + count + '/' + total;
  document.getElementById('readLabel').innerHTML = '<span class="read-progress-label"><span class="icon">' + icon + '</span><span>' + label + '</span></span>';
  document.getElementById('readBarFill').style.width = pct + '%';
}
function toggleTheme() {
  isDark = !isDark;
  document.body.classList.toggle('light', !isDark);
  try { localStorage.setItem('aidaka_theme', isDark ? 'dark' : 'light'); } catch(e) {}
  updateThemeBtn();
}
function updateThemeBtn() {
  document.getElementById('themeBtn').textContent = isDark ? '亮色模式' : '暗色模式';
}
function updateDateNav(dateStr) {
  // For items-based view, we use daily API for history nav
  document.getElementById('nextBtn').disabled = (dateStr >= DAILY_MAX);
  document.getElementById('prevBtn').disabled = false;
}
function navigateDate(delta) {
  var d = new Date(currentDate + 'T00:00:00');
  d.setDate(d.getDate() + delta);
  var newDateRaw = d.toISOString().slice(0, 10);
  if (newDateRaw > DAILY_MAX) { showToast('已是最新日期'); return; }
  loadDate(newDateRaw);
}
function openModal() {
  document.getElementById('datePicker').value = currentDate;
  document.getElementById('datePicker').max = DAILY_MAX;
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }
function goToDate() {
  var val = document.getElementById('datePicker').value;
  closeModal();
  if (val && val !== currentDate && val <= DAILY_MAX) loadDate(val);
  else if (val > DAILY_MAX) showToast('不能选择未来日期');
}
function loadDate(dateStr) {
  currentDate = dateStr;
  document.getElementById('loadingOverlay').style.display = 'flex';
  document.getElementById('loadingOverlay').style.opacity = '1';
  try { readSet = new Set(JSON.parse(localStorage.getItem('aidaka_read_' + dateStr) || '[]')); } catch(e) { readSet = new Set(); }
  document.querySelectorAll('.dyn-section').forEach(function(el) { el.remove(); });
  currentSearch = ''; currentFilter = 'all';
  showOnlyUnread = false;
  document.getElementById('searchInput').value = '';
  document.getElementById('searchCount').textContent = '';
  document.getElementById('readProgress').style.opacity = '1';
  document.getElementById('readProgress').title = '点击筛选未读';
  // Try loading 50 items from items API for the selected date
  var sinceStr = dateStr + 'T00:00:00Z';
  fetch('https://aihot.virxact.com/api/public/items?mode=selected&since=' + sinceStr + '&take=50')
    .then(function(r) { return r.json(); })
    .then(function(apiData) {
      // Transform items API response to daily-like format
      var categories = {
        'ai-models': '模型发布/更新',
        'ai-products': '产品发布/更新',
        'industry': '行业动态',
        'paper': '论文研究',
        'tip': '技巧与观点'
      };
      var sectionMap = {};
      var idx = 0;
      (apiData.items || []).forEach(function(item) {
        var cat = item.category || '';
        var label = categories[cat] || '行业动态';
        if (!sectionMap[label]) {
          sectionMap[label] = { label: label, items: [] };
        }
        idx++;
        sectionMap[label].items.push({
          idx: idx,
          title: item.title,
          sourceName: item.source || '',
          sourceUrl: item.url || '',
          summary: item.summary || '',
          publishedAt: item.publishedAt || ''
        });
      });
      var sections = [];
      var order = ['模型发布/更新','产品发布/更新','行业动态','论文研究','技巧与观点'];
      order.forEach(function(lbl) {
        if (sectionMap[lbl]) sections.push(sectionMap[lbl]);
        else sections.push({ label: lbl, items: [] });
      });
      var transformed = {
        date: dateStr,
        generatedAt: apiData.items && apiData.items.length > 0 ? apiData.items[0].publishedAt : new Date().toISOString(),
        lead: null,
        sections: sections
      };
      renderAll(transformed);
      document.getElementById('loadingOverlay').style.opacity = '0';
      setTimeout(function() { document.getElementById('loadingOverlay').style.display = 'none'; }, 400);
      showToast('已加载 ' + dateStr + ' (' + idx + '条)');
    })
    .catch(function() {
      // Fallback to daily API
      fetch('https://aihot.virxact.com/api/public/daily/' + dateStr)
        .then(function(r) { return r.json(); })
        .then(function(dailyData) {
          renderAll(dailyData);
          document.getElementById('loadingOverlay').style.opacity = '0';
          setTimeout(function() { document.getElementById('loadingOverlay').style.display = 'none'; }, 400);
          showToast('已加载 ' + dateStr + ' 日报');
        })
        .catch(function() {
          showToast('加载失败，网络请求受限');
          document.getElementById('loadingOverlay').style.opacity = '0';
          setTimeout(function() { document.getElementById('loadingOverlay').style.display = 'none'; }, 400);
        });
    });
}
function initScrollAnim() {
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }
    });
  }, { threshold: 0.05, rootMargin: '0px 0px -20px 0px' });
  document.querySelectorAll('.card').forEach(function(c) { observer.observe(c); });
}
var toastTimer;
function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.classList.remove('show'); }, 2500);
}
function slugify(s) { return s.replace(/[\/\s]/g, '-'); }
function escHtml(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
function shortSource(name) {
  if (!name) return '';
  // Group all X/Twitter sources under "X"
  if (/^X[：:]/.test(name)) return 'X';
  var trimmed = name.replace(/（.*?）/g,'').replace(/\(.*?\)/g,'').trim();
  return trimmed.length > 16 ? trimmed.slice(0, 16) + '...' : trimmed;
}
function fmtDate(dateStr) {
  if (!dateStr) return '';
  var d = new Date(dateStr + 'T00:00:00+08:00');
  var mm = d.getMonth() + 1;
  var dd = d.getDate();
  var days = ['日','一','二','三','四','五','六'];
  return mm + ' 月 ' + dd + ' 日 周' + days[d.getDay()];
}
function fmtDateShort(iso) { return iso ? iso.slice(0, 10) : ''; }
function relTime(date) {
  var now = Date.now();
  var diff = now - date.getTime();
  var mins = Math.floor(diff / 60000);
  var hours = Math.floor(mins / 60);
  if (diff < 0) return '刚刚';
  if (mins < 1) return '刚刚';
  if (mins < 60) return mins + ' 分钟前';
  if (hours < 24) {
    var hh = String(date.getHours()).padStart(2,'0');
    var mm = String(date.getMinutes()).padStart(2,'0');
    var period = date.getHours() < 12 ? '上午' : (date.getHours() < 18 ? '下午' : '晚上');
    return '今天' + period + ' ' + hh + ':' + mm;
  }
  return fmtDateShort(date.toISOString());
}
function relTimeStr(isoStr) {
  if (!isoStr) return '';
  var d = new Date(isoStr);
  return relTime(d);
}
</script>
