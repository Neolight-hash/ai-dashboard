<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI打卡网 · 2026-06-13</title>
<style>
  :root {

  .light {

    --text: #1a1a1a;

  .theme-btn {

  .read-progress-label .icon { font-size: 16px; }

    background: rgba(255,255,255,0.25);

  }

  }
  .search-count {

  }
  .nav-date-area {

  }
  .nav-date-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 12px;
    color: var(--text2);
    cursor: pointer;
    transition: all var(--transition);
    font-family: var(--font);
  }
  .nav-date-btn:hover:not(:disabled) { background: var(--accent); color: #fff; border-color: var(--accent); }
  .nav-date-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .nav-date-label { font-size: 12px; color: var(--text3); }
  .main { max-width: 960px; margin: 0 auto; padding: 24px 16px 60px; }
  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 40px 0 20px;
    padding-bottom: 12px;
    border-bottom: 2px solid var(--border);
  }
  .section-header:first-child { margin-top: 8px; }
  .section-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px;
    flex-shrink: 0;
  }
  .section-title { font-size: 18px; font-weight: 700; color: var(--text); }
  .section-count {
    background: var(--bg3);
    border-radius: 10px;
    padding: 2px 10px;
    font-size: 12px;
    color: var(--text3);
    margin-left: auto;
  }
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    box-shadow: var(--card-shadow);
    transition: transform var(--transition), box-shadow var(--transition), opacity var(--transition), border-color var(--transition);
    opacity: 0;
    transform: translateY(18px);
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }
  .card.visible { opacity: 1; transform: translateY(0); }
  .card.read { opacity: 0.5; }
  .card.read::after {
    content: '已读';
    position: absolute;
    top: 12px;
    right: 12px;
    background: var(--bg4);
    color: var(--text3);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 6px;
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); border-color: var(--accent); }
  .card.hidden { display: none !important; }
  .card.highlight { border-color: var(--accent2); background: rgba(232,98,42,0.06); }
  .card-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px; height: 24px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    border-radius: 6px;
    margin-bottom: 10px;
    flex-shrink: 0;
  }
  .card-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
  .card-title { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.5; flex: 1; }
  .card-title mark {
    background: rgba(232,98,42,0.3);
    color: var(--accent2);
    border-radius: 2px;
    padding: 0 2px;
  }
  .card-source {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 9px;
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 10px;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .card-summary {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.65;
    margin-bottom: 12px;
    overflow: hidden;
    transition: max-height 0.35s ease;
    word-break: break-word;
  }
  .card-summary.collapsed {
    max-height: 4.95em;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-summary.expanded {
    -webkit-line-clamp: unset;
    display: block;
    max-height: 800px;
  }
  .card-footer { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }
  .expand-btn {
    background: none;
    border: none;
    color: var(--accent2);
    font-size: 12px;
    cursor: pointer;
    font-family: var(--font);
    padding: 0;
    transition: color var(--transition);
  }
  .expand-btn:hover { color: var(--accent); }
  .source-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    text-decoration: none;
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    transition: opacity var(--transition);
  }
  .source-btn:hover { opacity: 0.85; }
  .read-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    color: var(--text3);
    cursor: pointer;
    font-family: var(--font);
    transition: all var(--transition);
  }
  .read-btn:hover { border-color: var(--accent); color: var(--accent); }
  .time-badge { font-size: 11px; color: var(--text3); display: block; margin-bottom: 8px; }
  .analytics-wrap {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 32px;
  }
  .analytics-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
  }
  .analytics-title { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 14px; }
  .source-rank-item { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 13px; cursor: pointer; transition: opacity var(--transition); }
  .source-rank-item:hover { opacity: 0.75; }
  .source-rank-bar-bg { flex: 1; height: 6px; background: var(--bg4); border-radius: 3px; overflow: hidden; }
  .source-rank-bar { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }

  .source-rank-count { width: 20px; color: var(--text3); text-align: right; font-size: 12px; }
  .hotwords-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
  .hotword-chip {
    padding: 4px 12px;
    border-radius: 16px;
    font-size: 12px;
    color: #fff;
    cursor: pointer;
    transition: transform var(--transition);
  }
  .hotword-chip:hover { transform: scale(1.08); }
  .no-results { text-align: center; padding: 60px 20px; color: var(--text3); display: none; }

  .no-results-icon { font-size: 36px; margin-bottom: 12px; }
  .loading-overlay {

    justify-content: center;

    max-width: 960px;

  }

    justify-content: center;

    padding: 28px;

    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;

    .hero-title { font-size: 28px; }
    .card-grid { grid-template-columns: 1fr; }

  }

</head>
<body>
<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>查看历史日報</h3>
    <input type="date" class="date-picker" id="datePicker" value="2026-06-13" max="2026-06-13">
    <div class="modal-btns">
      <button class="modal-btn secondary" onclick="closeModal()">取消</button>
      <button class="modal-btn primary" onclick="goToDate()">前往</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="hero">
  <div class="hero-inner">
    <div class="hero-top">
      <span class="hero-badge">AI打卡网 · 每日晨报</span>
      <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">亮色模式</button>
    </div>
    <h1 class="hero-title" id="heroTitle">AI打卡网</h1>
    <p class="hero-subtitle" id="heroSubtitle">加载中…</p>
    <div class="hero-stats" id="heroStats"></div>
    <div class="donut-wrap" id="donutWrap">
      <svg class="donut-svg" id="donutSvg" width="100" height="100" viewBox="0 0 100 100"></svg>
      <div class="donut-legend" id="donutLegend"></div>
    </div>
  </div>
</div>
<div class="sticky-nav">
  <div class="nav-inner" id="navInner">
    <a class="nav-link active" href="#top" onclick="reloadToday()">全部</a>
    <div class="nav-date-area">
      <button class="nav-date-btn" id="prevBtn" onclick="navigateDate(-1)">昨天</button>
      <span class="nav-date-label" id="navDateLabel">2026-06-13</span>
      <button class="nav-date-btn" id="nextBtn" onclick="navigateDate(1)" disabled>明天</button>
      <button class="nav-date-btn" onclick="openModal()">日历</button>
    </div>
  </div>
</div>
<div class="toolbar">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="searchInput" type="text" placeholder="搜索标题、来源、摘要…" oninput="doSearch(this.value)">
    <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
  </div>
  <div class="read-progress" id="readProgress" onclick="toggleReadFilter()">
    <span id="readLabel"><span class="read-progress-label"><span class="icon">🕐</span><span>已打卡 0/0</span></span></span>
    <div class="read-bar"><div class="read-bar-fill" id="readBarFill" style="width:0%"></div></div>
  </div>
  <span class="search-count" id="searchCount"></span>
</div>
<div class="main" id="main">
  <div class="analytics-wrap" id="analyticsWrap"></div>
  <div id="noResults" class="no-results">
    <div class="no-results-icon">🔎</div>
    <p>没有找到匹配的资讯</p>
    <p style="font-size:12px; margin-top:6px">试试其他关键词？</p>
  </div>
</div>

s", "url": "https://www.anthropic.com/news/claude-corps", "source": "Anthropic：Newsroom（网页）", "publishedAt": "2026-06-11T13:12:25.934Z", "summary": "Anthropic 推出 Claude Corps 奖学金项目，面向早期职业生涯的年轻人，培训 1，000 名研究员使用 Claude，并匹配给美国非营利组织全职工作一年。研究员年薪 85，000 美元及福利，每周接受 5 小时持续培训。Anthropic 初始投入 1.5 亿美元，合作方为 CodePath 和 Social Finance。至少 400 家非营利组织将参与接待，包括 Braven、Code the Dream、Heartland Forward 等。", "category": "industry", "score": 61, "selected": true}, {"id": "cmq9rpndz0emkslldcjukgjn5", "title": "Cursor 推出 Auto-review 机制：用分类器智能体动态管控智能体自主权限", "title_en": "Governing agent autonomy with Auto-review", "url": "https://cursor.com/blog/auto-review", "source": "Cursor Blog", "publishedAt": "2026-06-11T12:00:00.000Z", "summary": "Cursor 近日推出 Auto-review，通过一个专门的分类器智能体在工具调用前审查动作风险。该分类器根据上下文判断动作是否与用户意图一致，高风险时阻止并返回解释给父智能体，低风险时放行。分类器采用小模型，运行在智能体循环内以避免额外延迟，并能读取工作区文件辅助判断。测试基于约12小时内部开发会话生成的6122条标签数据，以及针对读取密钥、操作生产数据等危险场景的合成数据。设计目标是在不频繁阻断日常开发的前提下，拦截风险动作。", "category": "ai-products", "score": 74, "selected": true}, {"id": "cmq9ck1s90amsslldrz73effj", "title": "Hermes Agent Desktop 发布，硅基流动支持一键切换", "title_en": "@NousResearch has shipped Hermes Agent Desktop - and it's now even easier to use frontier open-sourc…", "url": "https://x.com/SiliconFlowAI/status/2065015632215912879", "source": "X：硅基流动 SiliconFlow (@SiliconFlowAI)", "publishedAt": "2026-06-11T10:17:47.000Z", "summary": "@NousResearch 发布了 Hermes Agent Desktop--现在通过 @硅基流动 SiliconFlow 使用前沿开源模型更加便捷 🔥\n\n→ 一键随时切换模型--DeepSeek-V4、GLM-5.1、Kimi-K2.6、MiniMax-M3 等，均在硅基流动上\n… …\n通过硅基流动开启你的 Hermes 之旅的完整指南 👇🧵", "category": "tip", "score": 71, "selected": true}, {"id": "cmq9ax93k0a7lslldcqadlkhv", "title": "Codex 维护仓库：5分钟循环并行自治", "title_en": "Here's a simple loop： Tell codex to maintain your repos， wake up every 5 minutes and direct work to …", "url": "https://x.com/steipete/status/2064998499780084154", "source": "X：Peter Steinberger (@steipete)", "publishedAt": "2026-06-11T09:09:42.000Z", "summary": "一个简单的循环：告诉 Codex 维护你的仓库，每5分钟唤醒一次，将工作直接分配到线程。这样可以轻松按需并行化和导向工作。\n\n我使用一个编排器技能，结合我的分类+自动审查+计算机使用技能，因此部分工作可以自主落地。", "category": "tip", "score": 78, "selected": true}, {"id": "cmq9asgdq0a6mslld6xdabp77", "title": "阿里云发布 Meoo CLI：本地 AI 编程项目可一键部署上线", "title_en": "阿里云秒悟 Meoo CLI 发布：本地 AI 编程项目可一键部署上线，支持 Claude Code、Codex 等", "url": "https://www.ithome.com/0/963/009.htm", "source": "IT之家（RSS）", "publishedAt": "2026-06-11T08:50:49.000Z", "summary": "阿里云今日推出 Meoo（秒悟）开源命令行工具 Meoo CLI，面向开发者，支持 Claude Code、Codex、Cursor 等本地 AI 编程助手。通过调用阿里云云端能力，可自动完成数据库接入、用户登录、文件存储及项目发布，将本地项目一键部署上线并生成可分享的访问链接。该工具定位为本地 Agent 与秒悟云端能力的连接入口，已开放下载，支持主流 Linux、macOS 及 Windows 平台。", "category": "ai-products", "score": 71, "selected": true}, {"id": "cmq99p86d09wisllduyfqf5mn", "title": "千问推出首个足球预测AI助手，竞猜赢奖并捐建球场", "title_en": "猜到了！这届美加墨冠军是--", "url": "https://mp.weixin.qq.com/s/G36ugI8tuSLUkDzL_sJNkQ", "source": "公众号：千问APP（阿里）", "publishedAt": "2026-06-11T08:40:14.000Z", "summary": "千问上线首个足球预测AI助手，基于海量大数据（含历史比赛、球员数据、伤病、美加墨地貌及天气等）。以6月22日挪威对塞内加尔为例，预测\"1：1平局\"，理由为气候差异。活动：参与全部104场竞猜，预测超80场且准确率超千问可抽万元大奖（100个名额）；预测超32场可抽千问AI眼镜G1（1000副），该眼镜支持赛后分析、拍屏识球员及赛事结果订阅。累积积分将向乡村学校捐建足球场，目标至少50所。", "category": "ai-products", "score": 72, "selected": true}, {"id": "cmq99cd9g09skslldniw7u2ub", "title": "腾讯混元 AI Infra 新开源：HPC-Ops 推理核心算子全面升级", "title_en": null, "url": "https://mp.weixin.qq.com/s/y0vd1cpvWXLSssL1kXxguw", "source": "公众号：腾讯混元", "publishedAt": "2026-06-11T08:34:59.000Z", "summary": "腾讯混元 AI Infra 团队开源升级 HPC-Ops 推理算子库，推出五大核心算子。Attention 采用运行时动态负载调度，长文本最高加速 2.95x，端到端 QPM 提升 17%；Router GEMM 以双 BF16 组合实现 FP32 精度，对比 CuBLAS FP32 最高提速 3.22x；FusedMoE 相对 vLLM、SGLang 性能提升 1.2x~1.6x；Fused AllReduce+Norm 对比主流方案最高提速 1.68x；Sampler 将解码采样融合为 2 个 CUDA Kernel，相对 vLLM 提速 4.0x~7.5x。所有能力均来自生产实践并完全开源。", "category": "ai-products", "score": 78, "selected": true}, {"id": "cmq98bstr09i4slldkrky14cd", "title": "Deezer 推出面向其他流媒体服务的 AI 音乐检测器", "title_en": "Deezer launches an AI music detector for other streaming services", "url": "https://www.theverge.com/ai-artificial-intelligence/948153/deezer-ai-music-detector-spotify-apple", "source": "The Verge：AI（RSS）", "publishedAt": "2026-06-11T08:00:00.000Z", "summary": "Deezer 将扫描用户在其它流媒体平台的播放列表，检测其中的 AI 生成音乐。Deezer 是最早标记 AI 生成音乐的大型流媒体服务之一，曾向其他平台提供该技术但少有采纳。Deezer CEO Alexis Lanternier 表示，由于没有其他公司跟进，他们决定让用户无论使用哪个平台，都能检查自己的播放列表中是否包含合成音乐。", "category": "ai-products", "score": 73, "selected": true}, {"id": "cmq954qjy08p2slldtang9e2v", "title": "baoyu-design skill 更新：支持导入 Figma 本地文件重建设计系统", "title_en": "baoyu-design skill （让你本地运行 Claude Design 的 Skill）更新，现在支持导入 figma 本地文件（Figma可以保存成 xxx.fig 文件）。比如你有一个设…", "url": "https://x.com/dotey/status/2064959133535658144", "source": "X：宝玉 (@dotey)", "publishedAt": "2026-06-11T06:33:17.000Z", "summary": "baoyu-design skill 更新，现已支持导入 Figma 本地文件（.fig），可在本地重建设计系统，效果与 Claude Design 在线版一致。该功能依赖 Claude Fable 5 辅助（Token 不够用）。安装后提供 Figma 文件路径即可导入为 Design System，后续新建设计项目可复用。同时支持在新建项目时添加已导入的 Design System，保留了 Claude Design 原始的导入和编译方式，用户可通过提问选择设计系统。安装命令：`npx skills add JimLiu/baoyu-design`。项目地址：https：//github.com/jimliu/baoyu-design。", "category": "tip", "score": 77, "selected": true}, {"id": "cmq958epc08qasllddc5u86n8", "title": "AI浪潮引发中国担忧：官媒呼吁保护劳动者权益", "title_en": "AI Wave Sparks Alarm in China With Call to Protect Worker Rights", "url": "https://www.bloomberg.com/news/articles/2026-06-11/ai-wave-sparks-alarm-in-china-with-call-to-protect-worker-rights", "source": "Bloomberg：Technology（RSS）", "publishedAt": "2026-06-11T06:19:13.000Z", "summary": "中国工作场所快速采用人工智能，引发官媒异常直白地呼吁保护劳工权利。北京正在考虑如何控制这项新技术带来的风险。", "category": "industry", "score": 71, "selected": true}, {"id": "cmq94c8iu08i6slld2kpggdra", "title": "Anthropic CEO 阿莫迪：AI 可能会造成大规模、长期性的岗位流失", "title_en": null, "url": "https://www.ithome.com/0/962/854.htm", "source": "IT之家（RSS）", "publishedAt": "2026-06-11T05:53:41.000Z", "summary": "Anthropic CEO 达里奥・阿莫迪警告，AI造成的大规模岗位流失是技术固有属性--AI系统旨在复刻人类认知，失业将成为结构性必然结果。他提出应对思路：完善劳动力市场监测、推行薪资保障与留岗税收优惠、发放培训补贴；若人力需求永久下降，则需通过征税推行全民基本收入等长期收入保障。Anthropic目标非削减人力成本，而是帮企业开拓新营收、盘活现有员工产能。", "category": "tip", "score": 71, "selected": true}, {"id": "cmq8zcaxy076fslldrds65pvu", "title": "Midjourney V8.1 已成为默认模型", "title_en": "V8.1 is now the default model on Midjourney！", "url": "https://updates.midjourney.com/v8-1-is-now-the-default-model", "source": "Midjourney：Updates（RSS）", "publishedAt": "2026-06-11T04:08:51.000Z", "summary": "Midjourney 已将默认模型从 V7 升级为 V8.1。V8.1 在智能性、连贯性、对详细提示的遵循度以及文本渲染效果上均有提升，HD 模式也已支持。", "category": "ai-models", "score": 64, "selected": true}, {"id": "cmq8whekl06eyslldxzkd9dzi", "title": "从0到1速通WorkBuddy：国内通用Agent产品教程", "title_en": "从0到1带你速通WorkBuddy，这可能是最适合国内的Agent产品。", "url": "https://mp.weixin.qq.com/s/nFSSzluc57xPv50Zbh4owg", "source": "公众号：数字生命卡兹克", "publishedAt": "2026-06-11T01:58:00.000Z", "summary": "WorkBuddy是面向国内用户的通用Agent产品，支持Windows和Mac，提供免费版和58元/月个人专业版，企业版已推出。内置代码开发、日常办公、设计创意三种场景模式及100多个行业领域AI专家。模型集成腾讯混元、DeepSeek（推荐V4 Pro）、GLM、Kimi等国产大模型，也支持接入兼容OpenAI协议的外部API。拥有Skills市场和MCP连接器生态，可打通QQ邮箱、腾讯会议、腾讯文档等服务。教程通过公众号周报生成和功能网页开发两个案例演示实际用法。", "category": "tip", "score": 70, "selected": true}, {"id": "cmq8svjva05grslldediy0tpk", "title": "mlx-vlm v0.6.3 发布，Day-0 支持 Google DeepMind DiffusionGemma 和 Cohere North Mini Code 1.0", "title_en": "Prince Canuma直接把Google刚发布的DiffusionGemma和Cohere North Mini Code当天塞进Mac本地MLX，零等待直接把玩咯！ mlx-vlm v0.6….", "url": "https://x.com/berryxia/status/2064875107278098769", "source": "X：Berry Xia (@berryxia)", "publishedAt": "2026-06-11T00:59:23.000Z", "summary": "mlx-vlm v0.6.3 上线，首发支持 DiffusionGemma 和 North Mini Code 1.0。DiffusionGemma 采用全新架构：以 256 token 块为单位并行生成、双向注意力、迭代自纠错；26B MoE 仅激活 3.8B，量化后 18GB 即可运行。North Mini Code 1.0 为 30B MoE，仅激活 3B，BF16 下约 66 tok/s。两款模型均通过深度合作实现 Day-0 MLX 支持，可在 Mac 本地运行。可通过 `uv pip install -U mlx-vlm` 安装体验。", "category": "ai-products", "score": 76, "selected": true}, {"id": "cmq8qsjfr04wqslld2epey16c", "title": "在写完这篇文章后 我把配图过程蒸馏成了一个「橙线插画」Skill 免费开源 安装地址： https：//github.com/orange2ai/orange-line-illustration", "title_en": null, "url": "https://x.com/oran_ge/status/2064861625883222114", "source": "X：Oran Ge (@oran_ge)", "publishedAt": "2026-06-11T00:05:49.000Z", "summary": "在写完这篇文章后\n我把配图过程蒸馏成了一个「橙线插画」Skill\n\n免费开源\n安装地址：\nhttps：//github.com/orange2ai/orange-line-illustration\n\n【引用 @oran_ge】：http：//x.com/i/article/2064857003743391744", "category": "tip", "score": 76, "selected": true}, {"id": "cmqap4xzd0njdsllde7pwfwe3", "title": "HYDRA-X： 原生统一多模态模型与整体视觉分词器", "title_en": "HYDRA-X： Native Unified Multimodal Models with Holistic Visual Tokenizers", "url": "https://arxiv.org/abs/2606.13289", "source": "HuggingFace Daily Papers（社区热门论文）", "publishedAt": "2026-06-11T00:00:00.000Z", "summary": "HYDRA-X 是首个在单个 Vision Transformer （ViT） 中统一图像与视频 tokenization 的统一多模态模型。通过帧级因果时间注意力实现视觉重建，并采用层级时间压缩替代单步压缩。轻量级解压器在联合图像-视频教师监督下上采样时间压缩特征。编辑管线中，源-目标交互在分词器内部潜在层面而非 LLM 语义层面进行，提升编辑一致性与收敛速度。7B 密集模型在图像与视频理解及生成任务上表现强劲。", "category": "paper", "score": 73, "selected": true}, {"id": "cmqaipftg0ltyslldbhrdenba", "title": "MiniMax Sparse Attention（MSA）块状稀疏注意力", "title_en": "MiniMax Sparse Attention", "url": "https://arxiv.org/abs/2606.13392", "source": "HuggingFace Daily Papers（社区热门论文）", "publishedAt": "2026-06-11T00:00:00.000Z", "summary": "MiniMax 提出块状稀疏注意力 MSA，基于 GQA 构建。轻量级 Index Branch 为每个 GQA 组独立选择 Top-k KV 块，Main Branch 仅对选中块执行精确块稀疏注意力。在 109B 参数多模态模型上，MSA 与 GQA 性能持平，1M 上下文下每 token 注意力计算减少 28.4 倍。配合协同设计的 GPU 内核，H800 上实现 14.2 倍 prefill 和 7.6 倍 decoding 端到端加速。推理内核与基于 MSA 的多模态模型已公开发布。", "category": "paper", "score": 77, "selected": true}, {"id": "cmqac9xug0k4rslldyycltabh", "title": "EurekAgent：环境工程化实现自主科学发现", "title_en": "EurekAgent： Agent Environment Engineering is All You Need For Autonomous Scientific Discovery", "url": "https://arxiv.org/abs/2606.13662", "source": "HuggingFace Daily Papers（社区热门论文）", "publishedAt": "2026-06-11T00:00:00.000Z", "summary": "EurekAgent 是一个环境工程化的大语言模型智能体系统，专为度量驱动的自主科学发现设计。它从权限工程（可控执行与隔离评估）、产物工程（文件系统与 Git 协作）、预算工程（成本感知探索）和人在回路工程（简便监督干预）四个维度构建执行环境。EurekAgent 在数学、内核工程和机器学习任务上取得新 SOTA，包括以不到 11 美元总 API 成本发现新的 26 圆填充结果。代码与结果已开源。", "category": "paper", "score": 70, "selected": true}, {"id": "cmqac9xuf0k4pslld3pzhn7m3", "title": "WEAVER：一种更优、更快、更长的机器人操作世界模型", "title_en": "WEAVER， Better， Faster， Longer： An Effective World Model for Robotic Manipulation", "url": "https://arxiv.org/abs/2606.13672", "source": "HuggingFace Daily Papers（社区热门论文）", "publishedAt": "2026-06-11T00:00:00.000Z", "summary": "WEAVER是一种多视图世界模型架构，通过流匹配损失训练预测未来潜变量和奖励值，满足保真度、一致性和效率三个要求。在机器人操作任务上，WEAVER在政策评估中与真实成功率的相关系数ρ=0.870，在π0.5基础模型基础上实现政策改进成功率提升38%，测试时规划成功率提升14%，且速度比先前世界模型快5-10倍。在分布外场景下表现也优于先前世界模型。代码、模型和视频已开源。", "category": "paper", "score": 75, "selected": true}, {"id": "cmq9s8u4a0et6slldp9ssbb96", "title": "BBVA 将 AI 置于银行业务核心，与 OpenAI 合作", "title_en": "BBVA puts AI at the core of banking with OpenAI", "url": "https://openai.com/index/bbva", "source": "OpenAI：官网动态（RSS · 排除企业/客户案例）", "publishedAt": "2026-06-11T00:00:00.000Z", "summary": "BBVA 将 ChatGPT Enterprise 推广至 10 万名员工，并与 OpenAI 达成合作，加速全球银行业 AI 驱动的转型。", "category": "industry", "score": 60, "selected": true}], "sections": [{"label": "模型发布/更新", "slug": "ai-models", "count": 4, "items": [{"idx": 1, "title": "MiniMax M3 开源权重模型发布，已上架 HuggingFace", "summary": "MiniMax 发布开源权重模型 M3，约 428B 总参数、23B 激活参数，已上传 HuggingFace。该模型融合三种前沿能力：编码与智能体方面达 59.0% SWE-Bench Pro、66.0% Terminal Bench 2.1、34.8% SWE-fficiency、28.8% KernelBench Hard、74.2% MCP Atlas；采用 MiniMax 稀疏注意力将上下文窗口扩展至 1M token；原生多模态。同步上线 MiniMax Code 工具及 API 平台。权重与技术报告预计约 10 天后发布。", "publishedAt": "2026-06-12T14:11:53.000Z", "category": "ai-models", "sourceName": "X：MiniMax (@MiniMax_AI)", "sourceUrl": "https://x.com/MiniMax_AI/status/2065436935188058208"}, {"idx": 2, "title": "Kimi 发布并开源最新代码模型 Kimi-K2.7-Code", "summary": "Kimi 发布并开源最新代码模型 Kimi-K2.7-Code。相比 K2.6，其在 Kimi Code Bench v2 上提升 +21.8%，Program Bench 提升 +11.0%，MLS Bench Lite 提升 +31.5%。推理效率改进，推理 token 使用量降低 30%，长时编码任务中指令遵循和端到端成功率均提升。6x 高速模式即将推出，即日起可通过 Kimi API 和 Kimi Code 使用。", "publishedAt": "2026-06-12T10:16:02.000Z", "category": "ai-models", "sourceName": "X：Kimi.ai (@Kimi_Moonshot)", "sourceUrl": "https://x.com/Kimi_Moonshot/status/2065377579130142937"}, {"idx": 3, "title": "Gemini Omni Flash 视频任务达 SOTA", "summary": "Gemini Omni Flash 在图像到视频、文本到视频和视频编辑方面达到了 SATA ： ）\n\n很高兴很快能将这一能力通过 API 提供给开发者！", "publishedAt": "2026-06-11T17:05:00.000Z", "category": "ai-models", "sourceName": "X：Logan Kilpatrick (@OfficialLoganK)", "sourceUrl": "https://x.com/OfficialLoganK/status/2065118111360303414"}, {"idx": 4, "title": "Midjourney V8.1 已成为默认模型", "summary": "Midjourney 已将默认模型从 V7 升级为 V8.1。V8.1 在智能性、连贯性、对详细提示的遵循度以及文本渲染效果上均有提升，HD 模式也已支持。", "publishedAt": "2026-06-11T04:08:51.000Z", "category": "ai-models", "sourceName": "Midjourney：Updates（RSS）", "sourceUrl": "https://updates.midjourney.com/v8-1-is-now-the-default-model"}]}, {"label": "产品发布/更新", "slug": "ai-products", "count": 17, "items": [{"idx": 5, "title": "olmo-eval：面向模型开发循环的评估工作台", "summary": "olmo-eval 是基于 OLMES 标准构建的评估工作台，专为 LLM 持续开发中的反复评测场景设计。相比 OLMES，它减少了新增评测的实现工作量，支持 agentic 和多轮评测作为一等用例，并允许根据基准需求选择轻量直接运行或容器化隔离运行。采用模块化架构，模型、工具、容器环境、辅助模型均可独立替换。评测结果同时报告分数、标准误差和最小可检测效应。与 Harbor 侧重于发布不同，olmo-eval 聚焦开发阶段快速迭代，可逐问题对比检查点输出以区分真实改进与噪声。", "publishedAt": "2026-06-12T15:56:10.000Z", "category": "ai-products", "sourceName": "Hugging Face：Blog（RSS）", "sourceUrl": "https://huggingface.co/blog/allenai/olmo-eval"}, {"idx": 6, "title": "字节豆包上线\"任务模式\"：支持定时执行与文件生成，\"思考模式\"升级为\"专家模式\"", "summary": "6月12日，字节跳动旗下AI应用豆包大范围上线\"任务模式\"，支持定时执行、零代码网页生成、一键PPT生成、数据可视化分析等全链路Agent执行。原\"思考模式\"升级为\"专家模式\"，调用豆包大模型2.0 Pro版本，强化深度推理能力。App顶部模式切换改为\"快速、专家、任务\"。基础功能免费，高阶服务付费，专业版三档：标准版68元/月或688元/年，加强版200元/月或2048元/年，专业版500元/月或5088元/年。", "publishedAt": "2026-06-12T15:33:19.000Z", "category": "ai-products", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/963/725.htm"}, {"idx": 7, "title": "苹果 iOS 27 健康 App 大改：卡片布局、营养识别、围绝经期追踪", "summary": "苹果在 iOS 27 中优化健康 App，将列表改为卡片布局并增加导航栏。新增视觉智能营养识别，用户通过相机 Siri 模式拍摄食物可获取加工程度、蛋白质、含糖量等信息及营养价值评级，不提供精确卡路里，需 iPhone 15 Pro 及以上。经期追踪扩展支持围绝经期，可分析长期周期异常模式并推送提醒与指导。Fitness+ 新增围绝经期和绝经期课程。数据同步速度提升，GymKit 扩展至 iPhone，无需 Apple Watch 即可与健身设备配对同步数据。", "publishedAt": "2026-06-12T02:06:41.000Z", "category": "ai-products", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/963/302.htm"}, {"idx": 8, "title": "Codex 推出浏览器开发者模式", "summary": "为 Chrome 和 Codex 内置浏览器引入开发者模式。\n\nCodex 可以使用 Chrome DevTools 协议（CDP）来调试浏览器问题，通过分析 JavaScript 性能、检查控制台输出、网络流量和页面状态。", "publishedAt": "2026-06-12T00:15:07.000Z", "category": "ai-products", "sourceName": "X：OpenAI Developers (@OpenAIDevs)", "sourceUrl": "https://x.com/OpenAIDevs/status/2065226355495895521"}, {"idx": 9, "title": "OpenAI Codex 推出速率重置攒存功能", "summary": "我们听说您希望能在自己方便的时候使用 Codex 速率限制重置。\n从今天起，我们开始推出将速率限制重置保留到以后使用的功能。\n我们从 Go、Plus、Pro 和 Business 用户开始，每人提供一次免费重置：", "publishedAt": "2026-06-12T00:11:11.000Z", "category": "ai-products", "sourceName": "X：OpenAI (@OpenAI)", "sourceUrl": "https://x.com/OpenAI/status/2065225362544726371"}, {"idx": 10, "title": "Replit 与 Databricks 集成升级，公开预览开放", "summary": "Replit 与 @databricks 集成刚刚升级了。\n\n构建应用，让每个用户只看到他们应该看到的内容。你的 HR 分析师可以为 CEO 构建完整的组织视图，而无需访问底层数据。\n\n公开预览已开放注册！了解更多 →\n\nhttps：//replit.com/blog/databricksjune2026", "publishedAt": "2026-06-11T21:49:43.000Z", "category": "ai-products", "sourceName": "X：Replit (@Replit)", "sourceUrl": "https://x.com/Replit/status/2065189762365813089"}, {"idx": 11, "title": "Replit Agent 新增自定义指令与技能功能", "summary": "AI 智能体很强大，但它们不记得你的偏好。\n\n所以你总是重复指令--如何组织项目、你的品牌指南。\n\n现在你可以通过自定义指令和技能让 Replit Agent 学会你的惯例。\n\n它会在每个项目中自动将这些考虑进去。", "publishedAt": "2026-06-11T18:58:07.000Z", "category": "ai-products", "sourceName": "X：Replit (@Replit)", "sourceUrl": "https://x.com/Replit/status/2065146579326271883"}, {"idx": 12, "title": "Perplexity Computer 集成 Deep Research", "summary": "我们正在将 Deep Research 作为原生技能集成到 Computer 中。\n\n它现在连接到驱动 Computer 的智能体框架，可访问搜索即代码生成、长运行沙箱、连接器、工具和授权数据。\n\nPro 和 Max 订阅者现已可用。", "publishedAt": "2026-06-11T17:32:06.000Z", "category": "ai-products", "sourceName": "X：Perplexity (@perplexity_ai)", "sourceUrl": "https://x.com/perplexity_ai/status/2065124930463916317"}, {"idx": 13, "title": "DeepSeek-R1 的开源实现", "summary": "DeepSeek-R1 的开源复现项目已在 GitHub 发布，在 Hacker News 上获得 101 个积分。该项目旨在以开源方式复现 DeepSeek-R1 模型。", "publishedAt": "2026-06-11T17:07:18.181Z", "category": "ai-products", "sourceName": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://github.com/huggingface/open-r1"}, {"idx": 14, "title": "OpenRouter 基准探索器：10项帕累托曲线", "summary": "使用我们的基准探索器，为10个不同基准绘制帕累托曲线。\n\n更多功能即将推出！https：//openrouter.ai/rankings#benchmarks", "publishedAt": "2026-06-11T15:32:17.000Z", "category": "ai-products", "sourceName": "X：OpenRouter (@OpenRouter)", "sourceUrl": "https://x.com/OpenRouter/status/2065094780271329729"}, {"idx": 15, "title": "Krea 2 推出生成式滑块控制图像属性", "summary": "推出生成式滑块。\n现在您可以控制使用 Krea 2 生成的任何图像的强度、复杂度和运动。\n你希望看到哪些新控制？👇", "publishedAt": "2026-06-11T15:00:02.000Z", "category": "ai-products", "sourceName": "X：Krea AI (@krea_ai)", "sourceUrl": "https://x.com/krea_ai/status/2065086662166901114"}, {"idx": 16, "title": "Cursor 推出 Auto-review 机制：用分类器智能体动态管控智能体自主权限", "summary": "Cursor 近日推出 Auto-review，通过一个专门的分类器智能体在工具调用前审查动作风险。该分类器根据上下文判断动作是否与用户意图一致，高风险时阻止并返回解释给父智能体，低风险时放行。分类器采用小模型，运行在智能体循环内以避免额外延迟，并能读取工作区文件辅助判断。测试基于约12小时内部开发会话生成的6122条标签数据，以及针对读取密钥、操作生产数据等危险场景的合成数据。设计目标是在不频繁阻断日常开发的前提下，拦截风险动作。", "publishedAt": "2026-06-11T12:00:00.000Z", "category": "ai-products", "sourceName": "Cursor Blog", "sourceUrl": "https://cursor.com/blog/auto-review"}, {"idx": 17, "title": "阿里云发布 Meoo CLI：本地 AI 编程项目可一键部署上线", "summary": "阿里云今日推出 Meoo（秒悟）开源命令行工具 Meoo CLI，面向开发者，支持 Claude Code、Codex、Cursor 等本地 AI 编程助手。通过调用阿里云云端能力，可自动完成数据库接入、用户登录、文件存储及项目发布，将本地项目一键部署上线并生成可分享的访问链接。该工具定位为本地 Agent 与秒悟云端能力的连接入口，已开放下载，支持主流 Linux、macOS 及 Windows 平台。", "publishedAt": "2026-06-11T08:50:49.000Z", "category": "ai-products", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/963/009.htm"}, {"idx": 18, "title": "千问推出首个足球预测AI助手，竞猜赢奖并捐建球场", "summary": "千问上线首个足球预测AI助手，基于海量大数据（含历史比赛、球员数据、伤病、美加墨地貌及天气等）。以6月22日挪威对塞内加尔为例，预测\"1：1平局\"，理由为气候差异。活动：参与全部104场竞猜，预测超80场且准确率超千问可抽万元大奖（100个名额）；预测超32场可抽千问AI眼镜G1（1000副），该眼镜支持赛后分析、拍屏识球员及赛事结果订阅。累积积分将向乡村学校捐建足球场，目标至少50所。", "publishedAt": "2026-06-11T08:40:14.000Z", "category": "ai-products", "sourceName": "公众号：千问APP（阿里）", "sourceUrl": "https://mp.weixin.qq.com/s/G36ugI8tuSLUkDzL_sJNkQ"}, {"idx": 19, "title": "腾讯混元 AI Infra 新开源：HPC-Ops 推理核心算子全面升级", "summary": "腾讯混元 AI Infra 团队开源升级 HPC-Ops 推理算子库，推出五大核心算子。Attention 采用运行时动态负载调度，长文本最高加速 2.95x，端到端 QPM 提升 17%；Router GEMM 以双 BF16 组合实现 FP32 精度，对比 CuBLAS FP32 最高提速 3.22x；FusedMoE 相对 vLLM、SGLang 性能提升 1.2x~1.6x；Fused AllReduce+Norm 对比主流方案最高提速 1.68x；Sampler 将解码采样融合为 2 个 CUDA Kernel，相对 vLLM 提速 4.0x~7.5x。所有能力均来自生产实践并完全开源。", "publishedAt": "2026-06-11T08:34:59.000Z", "category": "ai-products", "sourceName": "公众号：腾讯混元", "sourceUrl": "https://mp.weixin.qq.com/s/y0vd1cpvWXLSssL1kXxguw"}, {"idx": 20, "title": "Deezer 推出面向其他流媒体服务的 AI 音乐检测器", "summary": "Deezer 将扫描用户在其它流媒体平台的播放列表，检测其中的 AI 生成音乐。Deezer 是最早标记 AI 生成音乐的大型流媒体服务之一，曾向其他平台提供该技术但少有采纳。Deezer CEO Alexis Lanternier 表示，由于没有其他公司跟进，他们决定让用户无论使用哪个平台，都能检查自己的播放列表中是否包含合成音乐。", "publishedAt": "2026-06-11T08:00:00.000Z", "category": "ai-products", "sourceName": "The Verge：AI（RSS）", "sourceUrl": "https://www.theverge.com/ai-artificial-intelligence/948153/deezer-ai-music-detector-spotify-apple"}, {"idx": 21, "title": "mlx-vlm v0.6.3 发布，Day-0 支持 Google DeepMind DiffusionGemma 和 Cohere North Mini Code 1.0", "summary": "mlx-vlm v0.6.3 上线，首发支持 DiffusionGemma 和 North Mini Code 1.0。DiffusionGemma 采用全新架构：以 256 token 块为单位并行生成、双向注意力、迭代自纠错；26B MoE 仅激活 3.8B，量化后 18GB 即可运行。North Mini Code 1.0 为 30B MoE，仅激活 3B，BF16 下约 66 tok/s。两款模型均通过深度合作实现 Day-0 MLX 支持，可在 Mac 本地运行。可通过 `uv pip install -U mlx-vlm` 安装体验。", "publishedAt": "2026-06-11T00:59:23.000Z", "category": "ai-products", "sourceName": "X：Berry Xia (@berryxia)", "sourceUrl": "https://x.com/berryxia/status/2064875107278098769"}]}, {"label": "行业动态", "slug": "industry", "count": 6, "items": [{"idx": 22, "title": "全自主无人机首次击毙了人类士兵", "summary": "据《新科学家》6月10日报道，全自主无人机首次击毙了人类士兵。这是有记录以来第一次由完全自主运行的无人机执行致命攻击，标志着自主武器系统在实战中的新进展。该报道来自《新科学家》网站，目前尚无更多细节公布。", "publishedAt": "2026-06-11T19:29:06.279Z", "category": "industry", "sourceName": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://www.newscientist.com/article/2529849-fully-autonomous-drones-have-killed-human-soldiers-for-the-first-time"}, {"idx": 23, "title": "Prometheus 融资120亿美元，估值410亿美元，定位\"人工通用工程师\"", "summary": "杰夫·贝佐斯旗下AI公司Prometheus在成立仅7个月、尚无任何产品交付的情况下，以410亿美元估值完成120亿美元融资（最初估值62亿美元）。该公司定位为\"人工通用工程师\"，目标是将设计到制造的循环压缩10倍以上。但物理经济无法像互联网数据那样抓取，缺乏制造业训练数据。为此，Prometheus计划斥资1000亿美元收购传统工业企业，通过获取工厂生成的数据构建护城河。", "publishedAt": "2026-06-11T15:45:02.000Z", "category": "industry", "sourceName": "X：Kim (@kimmonismus)", "sourceUrl": "https://x.com/kimmonismus/status/2065097988859744503"}, {"idx": 24, "title": "Runway与Lionsgate扩大战略合作", "summary": "全球内容巨头Lionsgate与生成式AI研究公司Runway今日宣布扩大战略合作。Lionsgate已取得Runway股权，双方将启动联合开发项目，共同创作并制作新IP，首推一部基于Lionsgate现有IP和Runway生成模型的短剧系列。此外，Lionsgate将作为主持伙伴参与6月举行的Runway AI电影节。这是双方继2024年9月首次合作后的深化，Lionsgate此前已在预可视化、故事板及最终帧制作中应用Runway工具。", "publishedAt": "2026-06-11T14:31:51.811Z", "category": "industry", "sourceName": "Runway：News（网页）", "sourceUrl": "https://runwayml.com/news/runway-and-lionsgate-expand-partnership"}, {"idx": 25, "title": "Anthropic 启动 Claude Corps 全国奖学金项目", "summary": "Anthropic 推出 Claude Corps 奖学金项目，面向早期职业生涯的年轻人，培训 1，000 名研究员使用 Claude，并匹配给美国非营利组织全职工作一年。研究员年薪 85，000 美元及福利，每周接受 5 小时持续培训。Anthropic 初始投入 1.5 亿美元，合作方为 CodePath 和 Social Finance。至少 400 家非营利组织将参与接待，包括 Braven、Code the Dream、Heartland Forward 等。", "publishedAt": "2026-06-11T13:12:25.934Z", "category": "industry", "sourceName": "Anthropic：Newsroom（网页）", "sourceUrl": "https://www.anthropic.com/news/claude-corps"}, {"idx": 26, "title": "AI浪潮引发中国担忧：官媒呼吁保护劳动者权益", "summary": "中国工作场所快速采用人工智能，引发官媒异常直白地呼吁保护劳工权利。北京正在考虑如何控制这项新技术带来的风险。", "publishedAt": "2026-06-11T06:19:13.000Z", "category": "industry", "sourceName": "Bloomberg：Technology（RSS）", "sourceUrl": "https://www.bloomberg.com/news/articles/2026-06-11/ai-wave-sparks-alarm-in-china-with-call-to-protect-worker-rights"}, {"idx": 27, "title": "BBVA 将 AI 置于银行业务核心，与 OpenAI 合作", "summary": "BBVA 将 ChatGPT Enterprise 推广至 10 万名员工，并与 OpenAI 达成合作，加速全球银行业 AI 驱动的转型。", "publishedAt": "2026-06-11T00:00:00.000Z", "category": "industry", "sourceName": "OpenAI：官网动态（RSS · 排除企业/客户案例）", "sourceUrl": "https://openai.com/index/bbva"}]}, {"label": "论文研究", "slug": "paper", "count": 5, "items": [{"idx": 28, "title": "研究模拟显示：LLM 在 95% 的模拟中会使用战术核武器", "summary": "一项模拟研究显示，大型语言模型（LLM）在 95% 的模拟场景中会选择使用战术核武器。该研究未指明具体模型名称与版本，结果引发对 AI 决策行为的关注。", "publishedAt": "2026-06-11T22:23:17.154Z", "category": "paper", "sourceName": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://www.kennethpayne.uk/p/shall-we-play-a-game"}, {"idx": 29, "title": "HYDRA-X： 原生统一多模态模型与整体视觉分词器", "summary": "HYDRA-X 是首个在单个 Vision Transformer （ViT） 中统一图像与视频 tokenization 的统一多模态模型。通过帧级因果时间注意力实现视觉重建，并采用层级时间压缩替代单步压缩。轻量级解压器在联合图像-视频教师监督下上采样时间压缩特征。编辑管线中，源-目标交互在分词器内部潜在层面而非 LLM 语义层面进行，提升编辑一致性与收敛速度。7B 密集模型在图像与视频理解及生成任务上表现强劲。", "publishedAt": "2026-06-11T00:00:00.000Z", "category": "paper", "sourceName": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2606.13289"}, {"idx": 30, "title": "MiniMax Sparse Attention（MSA）块状稀疏注意力", "summary": "MiniMax 提出块状稀疏注意力 MSA，基于 GQA 构建。轻量级 Index Branch 为每个 GQA 组独立选择 Top-k KV 块，Main Branch 仅对选中块执行精确块稀疏注意力。在 109B 参数多模态模型上，MSA 与 GQA 性能持平，1M 上下文下每 token 注意力计算减少 28.4 倍。配合协同设计的 GPU 内核，H800 上实现 14.2 倍 prefill 和 7.6 倍 decoding 端到端加速。推理内核与基于 MSA 的多模态模型已公开发布。", "publishedAt": "2026-06-11T00:00:00.000Z", "category": "paper", "sourceName": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2606.13392"}, {"idx": 31, "title": "EurekAgent：环境工程化实现自主科学发现", "summary": "EurekAgent 是一个环境工程化的大语言模型智能体系统，专为度量驱动的自主科学发现设计。它从权限工程（可控执行与隔离评估）、产物工程（文件系统与 Git 协作）、预算工程（成本感知探索）和人在回路工程（简便监督干预）四个维度构建执行环境。EurekAgent 在数学、内核工程和机器学习任务上取得新 SOTA，包括以不到 11 美元总 API 成本发现新的 26 圆填充结果。代码与结果已开源。", "publishedAt": "2026-06-11T00:00:00.000Z", "category": "paper", "sourceName": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2606.13662"}, {"idx": 32, "title": "WEAVER：一种更优、更快、更长的机器人操作世界模型", "summary": "WEAVER是一种多视图世界模型架构，通过流匹配损失训练预测未来潜变量和奖励值，满足保真度、一致性和效率三个要求。在机器人操作任务上，WEAVER在政策评估中与真实成功率的相关系数ρ=0.870，在π0.5基础模型基础上实现政策改进成功率提升38%，测试时规划成功率提升14%，且速度比先前世界模型快5-10倍。在分布外场景下表现也优于先前世界模型。代码、模型和视频已开源。", "publishedAt": "2026-06-11T00:00:00.000Z", "category": "paper", "sourceName": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2606.13672"}]}, {"label": "技巧与观点", "slug": "tip", "count": 18, "items": [{"idx": 33, "title": "Oran Ge 开源《人味儿写作心法.skill》解决AI写作缺人味", "summary": "Oran Ge 让 Claude Fable 5 打磨文案三遍，发现改稿越来越讲究却缺\"人味儿\"。他与 AI 讨论后得出结论：人写的文字背后有\"存在感\"--作者在具体位置付出过具体代价，而 AI 无法复现。为此他制作了《人味儿写作心法.skill》，专用于自写文章或口述后让 AI 改稿的场景，旨在保留文字的人味。该技能已开源免费发布在 GitHub。", "publishedAt": "2026-06-12T22:48:15.000Z", "category": "tip", "sourceName": "X：Oran Ge (@oran_ge)", "sourceUrl": "https://x.com/oran_ge/status/2065566882774868125"}, {"idx": 34, "title": "Anthropic首次公众调查：近半美国人盼AI治愈疾病，超六成担忧失业", "summary": "Anthropic对近5.2万美国人调查显示：48%将治愈癌症等疾病列为首要期望，36%希望AI帮助残障人士。64%担忧AI导致失业，56%担忧认知依赖，52%担忧信息误导。超70%支持政府监管，最关注隐私（56%）、儿童安全（52%）和责任归属（49%）。仅15%信任AI公司决策。多数议题上观点不因党派或地域严重分裂。调查于2025年11-12月由YouGov线上执行并加权至人口普查基准。", "publishedAt": "2026-06-12T16:14:59.887Z", "category": "tip", "sourceName": "Anthropic：Newsroom（网页）", "sourceUrl": "https://www.anthropic.com/news/anthropic-public-record"}, {"idx": 35, "title": "如何在OpenRouter上获得最低成本的LLM推理", "summary": "在OpenRouter上追加`：floor`可获取最便宜提供商，通过`max_price`设定花费上限，并可免费使用20多个零成本模型。同时需注意避免计费陷阱。", "publishedAt": "2026-06-12T16:00:00.000Z", "category": "tip", "sourceName": "OpenRouter：Announcements（RSS）", "sourceUrl": "https://openrouter.ai/blog/tutorials/how-to-get-the-lowest-cost-llm-inference-on-openrouter"}, {"idx": 36, "title": "OpenAI 推出面向新时代工作的新 Academy 课程", "summary": "OpenAI 发布三门 Academy 课程，帮助用户掌握实用 AI 技能、创建可重复工作流，并在日常工作中应用 AI 智能体。", "publishedAt": "2026-06-12T10:00:00.000Z", "category": "tip", "sourceName": "OpenAI：官网动态（RSS · 排除企业/客户案例）", "sourceUrl": "https://openai.com/index/academy-courses-applying-ai-at-work"}, {"idx": 37, "title": "小互开源公众号自动排版技能组合", "summary": "小互（@xiaohu）升级了公众号排版技能组合，实现一句话完成排版、封面生成并一键发送到公众号草稿箱。该工具已开源，提供20种主题颜色可选，可自动分析内容进行排版，支持非Markdown文件。用户只需在Claude Code、Codex或OpenClaw中提供文章链接或文档位置，即可获得可视化预览界面进行选择，全程无需手动操作。", "publishedAt": "2026-06-12T03:40:42.000Z", "category": "tip", "sourceName": "X：小互 (@xiaohu)", "sourceUrl": "https://x.com/xiaohu/status/2065278092441268246"}, {"idx": 38, "title": "qiaomu-ai-prd：面向AI的PRD生成Prompt", "summary": "推文提出AI Agent开发中人类与AI对PRD的需求不同，为此发布了一个专门服务于AI的PRD文档生成Prompt（命名为qiaomu-ai-prd）。开发者先使用该Prompt生成文档，再交给AI开发，可显著提升功能完整度和丰富性。安装指令为：`npx skills add joeseesun/qiaomu-ai-prd`，开源地址及Prompt见评论区。", "publishedAt": "2026-06-12T02:46:44.000Z", "category": "tip", "sourceName": "X：Vista (@vista8)", "sourceUrl": "https://x.com/vista8/status/2065264509170876417"}, {"idx": 39, "title": "Spec 驱动开发（SDD）的三个 Skills：覆盖 Spec→Implement→Verify 闭环", "summary": "邵猛分享 Spec 驱动开发（SDD）方法，用三个 Skills（/write-product-spec、/write-tech-spec、/validate-changes-match-specs）覆盖 Spec→Implement→Verify 闭环。规格分两层：PRODUCT.md（用户故事、不变量）和 TECH.md（架构、实现策略），均放在 specs/<issue>/ 目录，随 PR 提交。五步流程：写产品规格、写技术规格、Agent 按规格实现、一致性校验、计算机操作端到端验证。Skills 可移植，不绑定 Warp。开源仓库 warpdotdev/common-skills，安装：npx skills add warpdotdev/common-skills。", "publishedAt": "2026-06-12T00:46:02.000Z", "category": "tip", "sourceName": "X：邵猛 (@shao__meng)", "sourceUrl": "https://x.com/shao__meng/status/2065234132431675439"}, {"idx": 40, "title": "Replit 专家级提示词技巧", "summary": "如何像专家一样使用 Replit 进行提示 🤖\n\n模糊的提示词只会导致更多重写。以下是如何让 Agent 第一次就构建出正确的东西。\n\n🧵 展开线程 ↓", "publishedAt": "2026-06-11T22:00:10.000Z", "category": "tip", "sourceName": "X：Replit (@Replit)", "sourceUrl": "https://x.com/Replit/status/2065192392718733327"}, {"idx": 41, "title": "什么是 LLM 网关？应用与 AI 模型之间缺失的一层", "summary": "缺少 LLM 网关时，供应商中断会直接变成用户可见的错误，AI 支出也难以追踪。文章从路由、合规性和设置时间三个维度比较了最佳方案。", "publishedAt": "2026-06-11T16:00:00.000Z", "category": "tip", "sourceName": "OpenRouter：Announcements（RSS）", "sourceUrl": "https://openrouter.ai/blog/insights/llm-gateway"}, {"idx": 42, "title": "Codex Goal指令生成Skill发布：一句话需求转目标", "summary": "针对如何给Codex写Goal指令的问题，作者发布了一个Skill，可将一句话需求自动转化为目标，实现\"睡前写指令、模型自动开发、第二天收菜\"。安装命令：`npx skills add joeseesun/qiaomu-goal-meta-skill`。源码免费开源（见评论区），旨在简化4w字文档的阅读负担。", "publishedAt": "2026-06-11T15:15:16.000Z", "category": "tip", "sourceName": "X：Vista (@vista8)", "sourceUrl": "https://x.com/vista8/status/2065090494972174821"}, {"idx": 43, "title": "Claude Fable 5 一句话生成桌面台球游戏", "summary": "Claude Fable 5 一句话生成的桌面台球！\n\n念念不忘的蝗虫群梗彻底终结。\n\n提示词：设计一个完整的能玩的3D桌球游戏，一个网页就能运行", "publishedAt": "2026-06-11T14:32:12.000Z", "category": "tip", "sourceName": "X：Vista (@vista8)", "sourceUrl": "https://x.com/vista8/status/2065079656324407345"}, {"idx": 44, "title": "OpenAI 正酝酿\"大幅\"降价，Gary Marcus 视其为示弱信号", "summary": "OpenAI 正考虑大幅降价，Gary Marcus 认为这暴露了公司的疲软竞争力。", "publishedAt": "2026-06-11T13:34:49.000Z", "category": "tip", "sourceName": "Gary Marcus：The Road to AI We Can Trust（RSS）", "sourceUrl": "https://garymarcus.substack.com/p/breaking-openai-is-pondering-drastic"}, {"idx": 45, "title": "Hermes Agent Desktop 发布，硅基流动支持一键切换", "summary": "@NousResearch 发布了 Hermes Agent Desktop--现在通过 @硅基流动 SiliconFlow 使用前沿开源模型更加便捷 🔥\n\n→ 一键随时切换模型--DeepSeek-V4、GLM-5.1、Kimi-K2.6、MiniMax-M3 等，均在硅基流动上\n… …\n通过硅基流动开启你的 Hermes 之旅的完整指南 👇🧵", "publishedAt": "2026-06-11T10:17:47.000Z", "category": "tip", "sourceName": "X：硅基流动 SiliconFlow (@SiliconFlowAI)", "sourceUrl": "https://x.com/SiliconFlowAI/status/2065015632215912879"}, {"idx": 46, "title": "Codex 维护仓库：5分钟循环并行自治", "summary": "一个简单的循环：告诉 Codex 维护你的仓库，每5分钟唤醒一次，将工作直接分配到线程。这样可以轻松按需并行化和导向工作。\n\n我使用一个编排器技能，结合我的分类+自动审查+计算机使用技能，因此部分工作可以自主落地。", "publishedAt": "2026-06-11T09:09:42.000Z", "category": "tip", "sourceName": "X：Peter Steinberger (@steipete)", "sourceUrl": "https://x.com/steipete/status/2064998499780084154"}, {"idx": 47, "title": "baoyu-design skill 更新：支持导入 Figma 本地文件重建设计系统", "summary": "baoyu-design skill 更新，现已支持导入 Figma 本地文件（.fig），可在本地重建设计系统，效果与 Claude Design 在线版一致。该功能依赖 Claude Fable 5 辅助（Token 不够用）。安装后提供 Figma 文件路径即可导入为 Design System，后续新建设计项目可复用。同时支持在新建项目时添加已导入的 Design System，保留了 Claude Design 原始的导入和编译方式，用户可通过提问选择设计系统。安装命令：`npx skills add JimLiu/baoyu-design`。项目地址：https：//github.com/jimliu/baoyu-design。", "publishedAt": "2026-06-11T06:33:17.000Z", "category": "tip", "sourceName": "X：宝玉 (@dotey)", "sourceUrl": "https://x.com/dotey/status/2064959133535658144"}, {"idx": 48, "title": "Anthropic CEO 阿莫迪：AI 可能会造成大规模、长期性的岗位流失", "summary": "Anthropic CEO 达里奥・阿莫迪警告，AI造成的大规模岗位流失是技术固有属性--AI系统旨在复刻人类认知，失业将成为结构性必然结果。他提出应对思路：完善劳动力市场监测、推行薪资保障与留岗税收优惠、发放培训补贴；若人力需求永久下降，则需通过征税推行全民基本收入等长期收入保障。Anthropic目标非削减人力成本，而是帮企业开拓新营收、盘活现有员工产能。", "publishedAt": "2026-06-11T05:53:41.000Z", "category": "tip", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/962/854.htm"}, {"idx": 49, "title": "从0到1速通WorkBuddy：国内通用Agent产品教程", "summary": "WorkBuddy是面向国内用户的通用Agent产品，支持Windows和Mac，提供免费版和58元/月个人专业版，企业版已推出。内置代码开发、日常办公、设计创意三种场景模式及100多个行业领域AI专家。模型集成腾讯混元、DeepSeek（推荐V4 Pro）、GLM、Kimi等国产大模型，也支持接入兼容OpenAI协议的外部API。拥有Skills市场和MCP连接器生态，可打通QQ邮箱、腾讯会议、腾讯文档等服务。教程通过公众号周报生成和功能网页开发两个案例演示实际用法。", "publishedAt": "2026-06-11T01:58:00.000Z", "category": "tip", "sourceName": "公众号：数字生命卡兹克", "sourceUrl": "https://mp.weixin.qq.com/s/nFSSzluc57xPv50Zbh4owg"}, {"idx": 50, "title": "在写完这篇文章后 我把配图过程蒸馏成了一个「橙线插画」Skill 免费开源 安装地址： https：//github.com/orange2ai/orange-line-illustration", "summary": "在写完这篇文章后\n我把配图过程蒸馏成了一个「橙线插画」Skill\n\n免费开源\n安装地址：\nhttps：//github.com/orange2ai/orange-line-illustration\n\n【引用 @oran_ge】：http：//x.com/i/article/2064857003743391744", "publishedAt": "2026-06-11T00:05:49.000Z", "category": "tip", "sourceName": "X：Oran Ge (@oran_ge)", "sourceUrl": "https://x.com/oran_ge/status/2064861625883222114"}]}]}
</script>
<script>
const EMBEDDED_DATA = JSON.parse(document.getElementById("dataSrc").textContent);
const SECTION_CONFIG = {"模型发布/更新": {"icon": "🤖", "color": "#7f6af0"}, "产品发布/更新": {"icon": "📦", "color": "#e8622a"}, "行业动态": {"icon": "🏭", "color": "#1d9e75"}, "论文研究": {"icon": "📄", "color": "#378add"}, "技巧与观点": {"icon": "💡", "color": "#e8a020"}};
const DAILY_STR = "2026-06-13";
const DAILY_MAX = "2026-06-13";

let currentData = null;
let currentDate = DAILY_STR;
let readSet = new Set();
let showOnlyUnread = false;
let currentFilter = 'all';
let currentSearch = '';
let isDark = true;

function reloadToday() {
  location.reload();
}
window.addEventListener('DOMContentLoaded', function() {
  try { readSet = new Set(JSON.parse(localStorage.getItem('aidaka_read_' + currentDate) || '[]')); } catch(e) {}
  try {
    var saved = localStorage.getItem('aidaka_theme');
    if (saved === 'light') { isDark = false; document.body.classList.add('light'); }
  } catch(e) {}
  updateThemeBtn();
  renderAll(EMBEDDED_DATA);
  setTimeout(function() {
    document.getElementById('loadingOverlay').style.opacity = '0';
    setTimeout(function() { document.getElementById('loadingOverlay').style.display = 'none'; }, 400);
  }, 300);
});

function renderAll(data) {
  currentData = data;
  var sections = data.sections || [];
  var total = sections.reduce(function(a, s) { return a + s.items.length; }, 0);
  var dateStr = fmtDate(data.date);
  document.getElementById('heroTitle').textContent = 'AI打卡网 · ' + dateStr;
  var gen = data.generatedAt ? new Date(data.generatedAt) : new Date();
  document.getElementById('heroSubtitle').textContent = '共收录 ' + total + ' 条资讯 · 来源精选 · 生成于 ' + relTime(gen);
  document.getElementById('navDateLabel').textContent = data.date;
  document.title = 'AI打卡网 · ' + data.date + ' (' + total + '条)';

  var statsEl = document.getElementById('heroStats');
  statsEl.innerHTML = '<div class="stat-chip" onclick="reloadToday()" title="刷新今日数据"><div class="num">' + total + '</div><div class="lbl">今日总条数</div></div>'
    + sections.map(function(s) {
      var cfg = SECTION_CONFIG[s.label] || { icon: '📌', color: '#888' };
      return '<div class="stat-chip" onclick="filterSection(\'' + s.label.replace(/'/g, "\\'") + '\'); scrollToSection(\'' + s.label.replace(/'/g, "\\'") + '\');" title="跳转到 ' + s.label + '"><div class="num" style="font-size:22px">' + cfg.icon + '</div><div class="lbl">' + s.label.replace('/更新','').replace('/观点','') + ' ' + s.items.length + '</div></div>';
    }).join('');

  renderDonut(sections);
  var navEl = document.getElementById('navInner');
  var dateArea = navEl.querySelector('.nav-date-area');
  navEl.querySelectorAll('.nav-sec-link').forEach(function(el) { el.remove(); });
  sections.forEach(function(s) {
    var cfg = SECTION_CONFIG[s.label] || { icon: '📌', color: '#888' };
    var a = document.createElement('a');
    a.className = 'nav-link nav-sec-link';
    a.href = '#sec-' + slugify(s.label);
    a.innerHTML = cfg.icon + ' ' + s.label + ' <span class="nav-badge">' + s.items.length + '</span>';
    a.onclick = function(e) { e.preventDefault(); filterSection(s.label, a); scrollToSection(s.label); };
    navEl.insertBefore(a, dateArea);
  });
  renderAnalytics(sections);
  var main = document.getElementById('main');
  main.querySelectorAll('.dyn-section').forEach(function(el) { el.remove(); });
  var globalIdx = 0;
  var frag = document.createDocumentFragment();
  sections.forEach(function(s) {
    var cfg = SECTION_CONFIG[s.label] || { icon: '📌', color: '#888' };
    var secDiv = document.createElement('div');
    secDiv.className = 'dyn-section';
    secDiv.id = 'sec-' + slugify(s.label);
    var header = document.createElement('div');
    header.className = 'section-header';
    header.innerHTML = '<div class="section-icon" style="background:' + cfg.color + '22; color:' + cfg.color + '">' + cfg.icon + '</div>'
      + '<span class="section-title">' + s.label + '</span>'
      + '<span class="section-count">' + s.items.length + ' 条</span>';
    secDiv.appendChild(header);
    if (s.items.length === 0) {
      secDiv.innerHTML += '<p style="color:var(--text3);font-size:13px;padding:12px 0">今日暂无相关资讯</p>';
    } else {
      var grid = document.createElement('div');
      grid.className = 'card-grid';
      s.items.forEach(function(item) {
        globalIdx++;
        var cardEl = buildCard(item, globalIdx);
        grid.appendChild(cardEl);
      });
      secDiv.appendChild(grid);
    }
    frag.appendChild(secDiv);
  });
  main.insertBefore(frag, main.querySelector('#noResults'));
  updateReadProgress(total);
  updateDateNav(data.date);
  document.getElementById('footerEl').innerHTML = '共 ' + total + ' 条资讯 · 数据来源 <a href="https://aihot.virxact.com" target="_blank" rel="noopener noreferrer" style="color:var(--accent)">aihot.virxact.com</a> · AI打卡网 每日晨报';
  setTimeout(initScrollAnim, 100);
}

function buildCard(item, idx) {
  var isRead = readSet.has(String(idx));
  var card = document.createElement('div');
  card.className = 'card' + (isRead ? ' read' : '');
  card.dataset.idx = idx;
  card.dataset.title = (item.title || '').toLowerCase();
  card.dataset.summary = (item.summary || '').toLowerCase();
  card.dataset.source = (item.sourceName || '').toLowerCase();
  var srcShort = shortSource(item.sourceName || '');
  var titleSafe = escHtml(item.title || '');
  var sourceNameSafe = escHtml(item.sourceName || '');
  var summaryRaw = item.summary || '';
  // Truncate summary to ~60 chars for display
  var summaryShort = summaryRaw.length > 65 ? summaryRaw.slice(0, 62) + '...' : summaryRaw;
  var summarySafe = escHtml(summaryShort);
  var summaryFull = escHtml(summaryRaw);
  var timeStr = item.publishedAt ? relTimeStr(item.publishedAt) : '';
  var sourceHtml = item.sourceUrl ? '<a class="source-btn" href="' + escHtml(item.sourceUrl) + '" target="_blank" rel="noopener noreferrer">原文</a>' : '';

  var inner = '<div class="card-header"><span class="card-num">' + idx + '</span><span class="card-title">' + titleSafe + '</span></div>';
  if (timeStr) { inner += '<span class="time-badge">' + escHtml(timeStr) + '</span>'; }
  inner += '<span class="card-source" title="' + sourceNameSafe + '">' + escHtml(srcShort) + '</span>'
    + '<div class="card-summary collapsed" id="sum-' + idx + '" data-full="' + escHtml(summaryRaw).replace(/"/g, '&quot;') + '">' + summarySafe + '</div>'
    + '<div class="card-footer">'
    + '<button class="expand-btn" onclick="toggleExpand(' + idx + ', this)">展开全文</button>'
    + '<div style="display:flex;gap:8px">'
    + '<button class="read-btn" onclick="markRead(' + idx + ', this)" id="rbtn-' + idx + '">' + (isRead ? '标为未读' : '打卡') + '</button>'
    + sourceHtml
    + '</div></div>';
  card.innerHTML = inner;
  // 点击卡片任意位置展开全文（按钮除外）
  card.addEventListener('click', function(e) {
    var target = e.target;
    if (target.closest('.read-btn') || target.closest('.source-btn') || target.closest('.expand-btn')) return;
    toggleExpand(idx, card.querySelector('.expand-btn'));
  });
  return card;
}

function renderDonut(sections) {
  var total = sections.reduce(function(a, s) { return a + s.items.length; }, 0);
  if (total === 0) return;
  var svgEl = document.getElementById('donutSvg');
  var legendEl = document.getElementById('donutLegend');
  svgEl.innerHTML = '';
  legendEl.innerHTML = '';
  var cx = 50, cy = 50, r = 36, inner = 22;
  var startAngle = -Math.PI / 2;
  sections.forEach(function(s) {
    if (s.items.length === 0) return;
    var cfg = SECTION_CONFIG[s.label] || { icon: '📌', color: '#888' };
    var angle = (s.items.length / total) * Math.PI * 2;
    var endAngle = startAngle + angle;
    var x1 = cx + r * Math.cos(startAngle), y1 = cy + r * Math.sin(startAngle);
    var x2 = cx + r * Math.cos(endAngle), y2 = cy + r * Math.sin(endAngle);
    var ix1 = cx + inner * Math.cos(startAngle), iy1 = cy + inner * Math.sin(startAngle);
    var ix2 = cx + inner * Math.cos(endAngle), iy2 = cy + inner * Math.sin(endAngle);
    var lg = angle > Math.PI ? 1 : 0;
    var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', 'M ' + ix1 + ' ' + iy1 + ' L ' + x1 + ' ' + y1 + ' A ' + r + ' ' + r + ' 0 ' + lg + ' 1 ' + x2 + ' ' + y2 + ' L ' + ix2 + ' ' + iy2 + ' A ' + inner + ' ' + inner + ' 0 ' + lg + ' 0 ' + ix1 + ' ' + iy1 + ' Z');
    path.setAttribute('fill', cfg.color);
    path.setAttribute('opacity', '0.85');
    path.style.cursor = 'pointer';
    path.addEventListener('click', (function(label) { return function() { filterSection(label); scrollToSection(label); }; })(s.label));
    svgEl.appendChild(path);
    startAngle = endAngle;
    var li = document.createElement('div');
    li.className = 'donut-legend-item';
    li.innerHTML = '<span class="dot" style="background:' + cfg.color + '"></span>' + s.label + ' <strong style="color:rgba(255,255,255,0.95)">' + s.items.length + '</strong>';
    li.onclick = (function(label) { return function() { filterSection(label); scrollToSection(label); }; })(s.label);
    legendEl.appendChild(li);
  });
  var text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  text.setAttribute('x', cx); text.setAttribute('y', cy + 1);
  text.setAttribute('text-anchor', 'middle'); text.setAttribute('dominant-baseline', 'middle');
  text.setAttribute('fill', 'rgba(255,255,255,0.9)'); text.setAttribute('font-size', '12');
  text.setAttribute('font-weight', '700'); text.textContent = total;
  svgEl.appendChild(text);
  var sub = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  sub.setAttribute('x', cx); sub.setAttribute('y', cy + 13);
  sub.setAttribute('text-anchor', 'middle'); sub.setAttribute('fill', 'rgba(255,255,255,0.6)'); sub.setAttribute('font-size', '7');
  sub.textContent = '条';
  svgEl.appendChild(sub);
}

function renderAnalytics(sections) {
  var wrap = document.getElementById('analyticsWrap');
  var sourceMap = {};
  sections.forEach(function(s) {
    s.items.forEach(function(item) {
      var src = shortSource(item.sourceName || '未知');
      sourceMap[src] = (sourceMap[src] || 0) + 1;
    });
  });
  var sorted = Object.entries(sourceMap).sort(function(a,b) { return b[1]-a[1]; }).slice(0, 6);
  var maxCount = sorted[0] ? sorted[0][1] : 1;
  var srcHtml = '<div class="analytics-card"><div class="analytics-title">来源排行</div>';
  sorted.forEach(function(entry) {
    var name = entry[0], count = entry[1];
    var pct = Math.round(count / maxCount * 100);
    srcHtml += '<div class="source-rank-item" style="cursor:pointer" onclick="filterBySource(\'' + escHtml(name).replace(/'/g,"\\'") + '\')" title="查看 ' + escHtml(name).replace(/'/g,"\\'") + ' 的全部文章"><span class="source-rank-name">' + escHtml(name) + '</span><div class="source-rank-bar-bg"><div class="source-rank-bar" style="width:' + pct + '%"></div></div><span class="source-rank-count">' + count + '</span></div>';
  });
  srcHtml += '</div>';
  var stopWords = new Set(['的','了','在','是','与','和','AI','以','将','被','其','已','于','从','到','并','为','但','还','也','都','该','这','其中','能够','通过','实现','用于','可以','以及','可能','提供','包含','包括','无需','用户','产品','模型','支持','系统','功能','未','使用','工作','进行','没有']);
  var wordCount = {};
  sections.forEach(function(s) {
    s.items.forEach(function(item) {
      var words = (item.title + ' ' + (item.summary || '')).replace(/[，。、！？【】《》"'·\s]+/g, ' ').split(' ');
      words.forEach(function(w) {
        w = w.trim();
        if (w.length >= 2 && w.length <= 8 && !stopWords.has(w) && !/^[a-zA-Z0-9]{1,2}$/.test(w)) {
          wordCount[w] = (wordCount[w] || 0) + 1;
        }
      });
    });
  });
  var topWords = Object.entries(wordCount).sort(function(a,b) { return b[1]-a[1]; }).slice(0, 18);
  var colors = ['#e8622a','#f08040','#1d9e75','#378add','#7f6af0','#e8a020','#d4537e','#0f6e56','#993c1d','#185fa5'];
  var hotHtml = '<div class="analytics-card"><div class="analytics-title">热词标签</div><div class="hotwords-wrap">';
  topWords.forEach(function(entry, i) {
    var word = entry[0], cnt = entry[1];
    var sz = Math.max(11, Math.min(16, 11 + cnt * 2));
    var col = colors[i % colors.length];
    hotHtml += '<span class="hotword-chip" style="background:' + col + ';font-size:' + sz + 'px;opacity:' + (0.7 + cnt * 0.1) + '" onclick="document.getElementById(\'searchInput\').value=\'' + escHtml(word).replace(/'/g, "\\'") + '\';doSearch(\'' + escHtml(word).replace(/'/g, "\\'") + '\')">' + escHtml(word) + '</span>';
  });
  hotHtml += '</div></div>';
  wrap.innerHTML = srcHtml + hotHtml;
}

function doSearch(val) {
  currentSearch = val.toLowerCase().trim();
  document.getElementById('searchClear').className = 'search-clear' + (val ? ' show' : '');
  applyFilters();
}
function clearSearch() {
  document.getElementById('searchInput').value = '';
  doSearch('');
}
function applyFilters() {
  var cards = document.querySelectorAll('.card');
  var visible = 0;
  cards.forEach(function(card) {
    var secEl = card.closest('.dyn-section');
    var matchSection = currentFilter === 'all' || slugify(currentFilter) === (secEl ? secEl.id.replace('sec-','') : '');
    var matchSearch = !currentSearch
      || card.dataset.title.indexOf(currentSearch) >= 0
      || card.dataset.summary.indexOf(currentSearch) >= 0
      || card.dataset.source.indexOf(currentSearch) >= 0;
    var matchRead = !showOnlyUnread || !readSet.has(card.dataset.idx);
    if (matchSection && matchSearch && matchRead) {
      card.classList.remove('hidden'); visible++;
      if (currentSearch) highlightCard(card, currentSearch); else clearHighlight(card);
    } else {
      card.classList.add('hidden'); clearHighlight(card);
    }
  });
  document.getElementById('searchCount').textContent = currentSearch ? (visible > 0 ? '找到 ' + visible + ' 条' : '') : '';
  document.getElementById('noResults').className = 'no-results' + (visible === 0 && (currentSearch || showOnlyUnread || currentFilter !== 'all') ? ' show' : '');
}
function highlightCard(card, q) {
  var titleEl = card.querySelector('.card-title');
  if (!titleEl) return;
  var orig = titleEl.textContent;
  var re = new RegExp('(' + escRe(q) + ')', 'gi');
  titleEl.innerHTML = escHtml(orig).replace(re, '<mark>$1</mark>');
}
function clearHighlight(card) {
  var titleEl = card.querySelector('.card-title');
  if (titleEl) titleEl.innerHTML = escHtml(titleEl.textContent);
}
function filterSection(label, el) {
  currentFilter = label;
  currentSearch = '';
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.nav-link').forEach(function(a) { a.classList.remove('active'); });
  if (el) el.classList.add('active');
  else { document.querySelectorAll('.nav-link').forEach(function(a) { if (a.textContent.indexOf(label) >= 0) a.classList.add('active'); }); }
  applyFilters();
}
function filterBySource(sourceName) {
  currentFilter = 'all';
  currentSearch = sourceName;
  document.querySelectorAll('.nav-link').forEach(function(a) { a.classList.remove('active'); });
  document.querySelectorAll('.nav-link').forEach(function(a) { if (a.textContent.indexOf('全部') >= 0) a.classList.add('active'); });
  // Set search to the source name so only cards from that source remain visible
  document.getElementById('searchInput').value = sourceName;
  doSearch(sourceName);
  scrollTo(0, 0);
  showToast('已筛选：' + sourceName);
}
function scrollToSection(label) {
  var id = 'sec-' + slugify(label);
  var el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
function toggleExpand(idx, btn) {
  var sum = document.getElementById('sum-' + idx);
  if (!sum) return;
  var full = sum.dataset.full || '';
  if (sum.classList.contains('collapsed')) {
    sum.classList.replace('collapsed', 'expanded');
    sum.textContent = full;
    btn.textContent = '收起';
  } else {
    sum.classList.replace('expanded', 'collapsed');
    var short = full.length > 65 ? full.slice(0, 62) + '...' : full;
    sum.textContent = short;
    btn.textContent = '展开全文';
  }
}
function markRead(idx, btn) {
  var key = String(idx);
  var card = document.querySelector('.card[data-idx="' + key + '"]');
  if (readSet.has(key)) {
    readSet.delete(key);
    if (card) card.classList.remove('read');
    if (btn) btn.textContent = '打卡';
  } else {
    readSet.add(key);
    if (card) card.classList.add('read');
    if (btn) btn.textContent = '已打卡';
  }
  try { localStorage.setItem('aidaka_read_' + currentDate, JSON.stringify(Array.from(readSet))); } catch(e) {}
  var total = document.querySelectorAll('.card').length;
  updateReadProgress(total);
  if (showOnlyUnread) applyFilters();
}
function toggleReadFilter() {
  showOnlyUnread = !showOnlyUnread;
  var btn = document.getElementById('readProgress');
  if (showOnlyUnread) { btn.style.opacity = '0.7'; btn.title = '点击显示全部'; }
  else { btn.style.opacity = '1'; btn.title = '点击筛选未读'; }
  applyFilters();
}
function updateReadProgress(total) {
  var count = readSet.size;
  var pct = total > 0 ? Math.round(count / total * 100) : 0;
  var icon = count >= total && total > 0 ? '✅' : '🕐';
  var label = count >= total && total > 0 ? '今日已读完' : '已打卡 ' + count + '/' + total;
  document.getElementById('readLabel').innerHTML = '<span class="read-progress-label"><span class="icon">' + icon + '</span><span>' + label + '</span></span>';
  document.getElementById('readBarFill').style.width = pct + '%';
}
function toggleTheme() {
  isDark = !isDark;
  document.body.classList.toggle('light', !isDark);
  try { localStorage.setItem('aidaka_theme', isDark ? 'dark' : 'light'); } catch(e) {}
  updateThemeBtn();
}
function updateThemeBtn() {
  document.getElementById('themeBtn').textContent = isDark ? '亮色模式' : '暗色模式';
}
function updateDateNav(dateStr) {
  // For items-based view, we use daily API for history nav
  document.getElementById('nextBtn').disabled = (dateStr >= DAILY_MAX);
  document.getElementById('prevBtn').disabled = false;
}
function navigateDate(delta) {
  var d = new Date(currentDate + 'T00:00:00');
  d.setDate(d.getDate() + delta);
  var newDateRaw = d.toISOString().slice(0, 10);
  if (newDateRaw > DAILY_MAX) { showToast('已是最新日期'); return; }
  loadDate(newDateRaw);
}
function openModal() {
  document.getElementById('datePicker').value = currentDate;
  document.getElementById('datePicker').max = DAILY_MAX;
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }
function goToDate() {
  var val = document.getElementById('datePicker').value;
  closeModal();
  if (val && val !== currentDate && val <= DAILY_MAX) loadDate(val);
  else if (val > DAILY_MAX) showToast('不能选择未来日期');
}
function loadDate(dateStr) {
  currentDate = dateStr;
  document.getElementById('loadingOverlay').style.display = 'flex';
  document.getElementById('loadingOverlay').style.opacity = '1';
  try { readSet = new Set(JSON.parse(localStorage.getItem('aidaka_read_' + dateStr) || '[]')); } catch(e) { readSet = new Set(); }
  document.querySelectorAll('.dyn-section').forEach(function(el) { el.remove(); });
  currentSearch = ''; currentFilter = 'all';
  showOnlyUnread = false;
  document.getElementById('searchInput').value = '';
  document.getElementById('searchCount').textContent = '';
  document.getElementById('readProgress').style.opacity = '1';
  document.getElementById('readProgress').title = '点击筛选未读';
  // Try loading 50 items from items API for the selected date
  var sinceStr = dateStr + 'T00:00:00Z';
  fetch('https://aihot.virxact.com/api/public/items?mode=selected&since=' + sinceStr + '&take=50')
    .then(function(r) { return r.json(); })
    .then(function(apiData) {
      // Transform items API response to daily-like format
      var categories = {
        'ai-models': '模型发布/更新',
        'ai-products': '产品发布/更新',
        'industry': '行业动态',
        'paper': '论文研究',
        'tip': '技巧与观点'
      };
      var sectionMap = {};
      var idx = 0;
      (apiData.items || []).forEach(function(item) {
        var cat = item.category || '';
        var label = categories[cat] || '行业动态';
        if (!sectionMap[label]) {
          sectionMap[label] = { label: label, items: [] };
        }
        idx++;
        sectionMap[label].items.push({
          idx: idx,
          title: item.title,
          sourceName: item.source || '',
          sourceUrl: item.url || '',
          summary: item.summary || '',
          publishedAt: item.publishedAt || ''
        });
      });
      var sections = [];
      var order = ['模型发布/更新','产品发布/更新','行业动态','论文研究','技巧与观点'];
      order.forEach(function(lbl) {
        if (sectionMap[lbl]) sections.push(sectionMap[lbl]);
        else sections.push({ label: lbl, items: [] });
      });
      var transformed = {
        date: dateStr,
        generatedAt: apiData.items && apiData.items.length > 0 ? apiData.items[0].publishedAt : new Date().toISOString(),
        lead: null,
        sections: sections
      };
      renderAll(transformed);
      document.getElementById('loadingOverlay').style.opacity = '0';
      setTimeout(function() { document.getElementById('loadingOverlay').style.display = 'none'; }, 400);
      showToast('已加载 ' + dateStr + ' (' + idx + '条)');
    })
    .catch(function() {
      // Fallback to daily API
      fetch('https://aihot.virxact.com/api/public/daily/' + dateStr)
        .then(function(r) { return r.json(); })
        .then(function(dailyData) {
          renderAll(dailyData);
          document.getElementById('loadingOverlay').style.opacity = '0';
          setTimeout(function() { document.getElementById('loadingOverlay').style.display = 'none'; }, 400);
          showToast('已加载 ' + dateStr + ' 日报');
        })
        .catch(function() {
          showToast('加载失败，网络请求受限');
          document.getElementById('loadingOverlay').style.opacity = '0';
          setTimeout(function() { document.getElementById('loadingOverlay').style.display = 'none'; }, 400);
        });
    });
}
function initScrollAnim() {
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }
    });
  }, { threshold: 0.05, rootMargin: '0px 0px -20px 0px' });
  document.querySelectorAll('.card').forEach(function(c) { observer.observe(c); });
}
var toastTimer;
function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.classList.remove('show'); }, 2500);
}
function slugify(s) { return s.replace(/[\/\s]/g, '-'); }
function escHtml(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
function shortSource(name) {
  if (!name) return '';
  // Group all X/Twitter sources under "X"
  if (/^X[：:]/.test(name)) return 'X';
  var trimmed = name.replace(/（.*?）/g,'').replace(/\(.*?\)/g,'').trim();
  return trimmed.length > 16 ? trimmed.slice(0, 16) + '...' : trimmed;
}
function fmtDate(dateStr) {
  if (!dateStr) return '';
  var d = new Date(dateStr + 'T00:00:00+08:00');
  var mm = d.getMonth() + 1;
  var dd = d.getDate();
  var days = ['日','一','二','三','四','五','六'];
  return mm + ' 月 ' + dd + ' 日 周' + days[d.getDay()];
}
function fmtDateShort(iso) { return iso ? iso.slice(0, 10) : ''; }
function relTime(date) {
  var now = Date.now();
  var diff = now - date.getTime();
  var mins = Math.floor(diff / 60000);
  var hours = Math.floor(mins / 60);
  if (diff < 0) return '刚刚';
  if (mins < 1) return '刚刚';
  if (mins < 60) return mins + ' 分钟前';
  if (hours < 24) {
    var hh = String(date.getHours()).padStart(2,'0');
    var mm = String(date.getMinutes()).padStart(2,'0');
    var period = date.getHours() < 12 ? '上午' : (date.getHours() < 18 ? '下午' : '晚上');
    return '今天' + period + ' ' + hh + ':' + mm;
  }
  return fmtDateShort(date.toISOString());
}
function relTimeStr(isoStr) {
  if (!isoStr) return '';
  var d = new Date(isoStr);
  return relTime(d);
}
</script>
