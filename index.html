<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI打卡网 · 2026-06-08</title>
<style>
  :root {

  }

  .nav-date-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .nav-date-label { font-size: 12px; color: var(--text3); }
  .main { max-width: 960px; margin: 0 auto; padding: 24px 16px 60px; }
  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 40px 0 20px;

  }

  .section-icon {

  .section-title { font-size: 18px; font-weight: 700; color: var(--text); }

    color: var(--text3);

  }
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));

  }
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    box-shadow: var(--card-shadow);
    transition: transform var(--transition), box-shadow var(--transition), opacity var(--transition), border-color var(--transition);
    opacity: 0;
    transform: translateY(18px);
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }
  .card.visible { opacity: 1; transform: translateY(0); }
  .card.read { opacity: 0.5; }
  .card.read::after {
    content: '已读';
    position: absolute;
    top: 12px;
    right: 12px;
    background: var(--bg4);
    color: var(--text3);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 6px;
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); border-color: var(--accent); }
  .card.hidden { display: none !important; }
  .card.highlight { border-color: var(--accent2); background: rgba(232,98,42,0.06); }
  .card-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px; height: 24px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    border-radius: 6px;
    margin-bottom: 10px;
    flex-shrink: 0;
  }
  .card-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }

    display: inline-flex;

    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 9px;
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 10px;

    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .card-summary {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.65;
    margin-bottom: 12px;
    overflow: hidden;
    transition: max-height 0.35s ease;
    word-break: break-word;
  }
  .card-summary.collapsed {
    max-height: 4.95em;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-summary.expanded {
    -webkit-line-clamp: unset;
    display: block;
    max-height: 800px;
  }
  .card-footer { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }
  .expand-btn {
    background: none;
    border: none;
    color: var(--accent2);
    font-size: 12px;
    cursor: pointer;
    font-family: var(--font);
    padding: 0;
    transition: color var(--transition);
  }
  .expand-btn:hover { color: var(--accent); }
  .source-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    text-decoration: none;
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    transition: opacity var(--transition);
  }
  .source-btn:hover { opacity: 0.85; }
  .read-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    color: var(--text3);
    cursor: pointer;
    font-family: var(--font);
    transition: all var(--transition);
  }
  .read-btn:hover { border-color: var(--accent); color: var(--accent); }
  .time-badge { font-size: 11px; color: var(--text3); display: block; margin-bottom: 8px; }
  .analytics-wrap {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 32px;
  }
  .analytics-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
  }
  .analytics-title { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 14px; }
  .source-rank-item { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 13px; cursor: pointer; transition: opacity var(--transition); }
  .source-rank-item:hover { opacity: 0.75; }
  .source-rank-bar-bg { flex: 1; height: 6px; background: var(--bg4); border-radius: 3px; overflow: hidden; }

    border: 1px solid var(--border);

</head>
<body>
<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>查看历史日報</h3>
    <input type="date" class="date-picker" id="datePicker" value="2026-06-08" max="2026-06-08">
    <div class="modal-btns">
      <button class="modal-btn secondary" onclick="closeModal()">取消</button>
      <button class="modal-btn primary" onclick="goToDate()">前往</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="hero">
  <div class="hero-inner">
    <div class="hero-top">
      <span class="hero-badge">AI打卡网 · 每日晨报</span>

    <h1 class="hero-title" id="heroTitle">AI打卡网</h1>
    <p class="hero-subtitle" id="heroSubtitle">加载中…</p>
    <div class="hero-stats" id="heroStats"></div>
    <div class="donut-wrap" id="donutWrap">
      <svg class="donut-svg" id="donutSvg" width="100" height="100" viewBox="0 0 100 100"></svg>
      <div class="donut-legend" id="donutLegend"></div>
    </div>
  </div>
</div>

      <button class="nav-date-btn" id="prevBtn" onclick="navigateDate(-1)">昨天</button>

      <button class="nav-date-btn" onclick="openModal()">日历</button>
    </div>
  </div>
</div>
<div class="toolbar">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="searchInput" type="text" placeholder="搜索标题、来源、摘要…" oninput="doSearch(this.value)">

    <span id="readLabel"><span class="read-progress-label"><span class="icon">🕐</span><span>已打卡 0/0</span></span></span>
    <div class="read-bar"><div class="read-bar-fill" id="readBarFill" style="width:0%"></div></div>
  </div>
  <span class="search-count" id="searchCount"></span>
</div>
<div class="main" id="main">
  <div class="analytics-wrap" id="analyticsWrap"></div>
  <div id="noResults" class="no-results">
    <div class="no-results-icon">🔎</div>
    <p>没有找到匹配的资讯</p>
    <p style="font-size:12px; margin-top:6px">试试其他关键词？</p>
  </div>
</div>

{"date": "2026-06-07", "generatedAt": "2026-06-07T00:00:00.498Z", "lead": null, "totalItems": 50, "items": [{"id": "cmq44c1hy00d9slz5itsduqad", "title": "ChatGPT 要变 AgentGPT 了", "title_en": "ChatGPT 要变 AgentGPT 了 当然 ChatGPT 应该不会改名字，但 ChatGPT 应该不再是一个单纯的 Chat 工具了。 OpenAI 内部一位高管对《金融时报》说：\"Cha…", "url": "https://x.com/dotey/status/2063686036895478162", "source": "X：宝玉 (@dotey)", "publishedAt": "2026-06-07T18:14:27.000Z", "summary": "OpenAI 正筹备 ChatGPT 自 2022 年上线以来最大规模改版，从聊天机器人转向超级应用/Agent 平台，整合编程工具 Codex、图像生成及第三方应用（Canva、Booking）。高管称\"聊天已死\"，目标成为跨平台个人 AI 助手，未来甚至省去用户输入提示词。改版预计未来几周在网页和手机端上线。商业压力：ChatGPT 有 9 亿周活用户、5000 万付费用户、月收入 20 亿美元但未盈利；企业客户贡献约 40% 收入，目标年底达 50%；Codex 桌面版周活超 500 万。竞争对手 Anthropic 估值已达 9650 亿美元。OpenAI 刚完成 1220 亿美元融资，估值 8520 亿美元，IPO 目标估值可能超 1 万亿美元。", "category": "industry", "score": 81, "selected": true}, {"id": "cmq41cpfx00g9slr28fihcr5v", "title": "特朗普政府与OpenAI讨论通过公共财富基金入股AI初创公司", "title_en": "FT： The proposal suddenly of a sovereign-wealth-style fund got more attention inside the White House…", "url": "https://x.com/rohanpaul_ai/status/2063662672835703126", "source": "X：Rohan Paul (@rohanpaul_ai)", "publishedAt": "2026-06-07T16:41:36.000Z", "summary": "据FT报道，特朗普政府正与OpenAI探讨通过公共财富基金机制让政府入股AI初创公司。方案是AI企业捐赠小部分股权至该基金，基金通过账户或分红将收益返还美国公民，而非政府直接运营公司。这不同于特朗普去年对Intel的90亿美元直接持股。OpenAI此前已提出公共财富基金概念，持有长期资产，让公民分享AI增长红利。政治背景方面，选民担忧失业、数据中心成本与企业控制，而AI公司需要华盛顿在基建、采购和监管上的支持。", "category": "industry", "score": 76, "selected": true}, {"id": "cmq404ny5005mslr29n96iugc", "title": "OpenAI 仍推进超级应用计划", "title_en": "OpenAI is still working on that 'super app'", "url": "https://techcrunch.com/2026/06/07/openai-is-still-working-on-that-super-app", "source": "TechCrunch：AI（RSS）", "publishedAt": "2026-06-07T16:23:22.000Z", "summary": "OpenAI 一位高级员工表示\"聊天已死\"，同时公司仍在继续推进超级应用计划。", "category": "industry", "score": 75, "selected": true}, {"id": "cmq3y2kf1004jslqvmbs4vuam", "title": "Slop、生产力，以及为何AI驱动的世界进展甚微", "title_en": "Slop， productivity， and why the AI-fueled world is going nowhere mighty fast", "url": "https://garymarcus.substack.com/p/slop-productivity-and-why-the-ai", "source": "Gary Marcus：The Road to AI We Can Trust（RSS）", "publishedAt": "2026-06-07T15:31:43.000Z", "summary": "Gary Marcus在金融时报上看到John Burn-Murdoch的一张图表，认为它精准提炼了自己一直试图表达的观点。", "category": "tip", "score": 67, "selected": true}, {"id": "cmq3uy43k022gsla9pazggsdm", "title": "苹果秘密会议内幕：它终于认真对待AI", "title_en": "Inside Apple's Secret Meeting That Led It to Finally Take AI Seriously", "url": "https://www.bloomberg.com/news/newsletters/2026-06-07/wwdc-2026-apple-s-secret-meeting-that-led-it-to-take-ai-seriously-ios-27", "source": "Bloomberg：Technology（RSS）", "publishedAt": "2026-06-07T14:00:01.000Z", "summary": "苹果在一次内部秘密会议后，终于决定将AI作为核心战略。这场会议促使公司全面转向AI领域，相关进展预计将在WWDC 2026上公布。", "category": "tip", "score": 79, "selected": true}, {"id": "cmq3thx1f01pjsla9rsrrlqom", "title": "Symbolica 2.0：适用于 Python 和 Rust 的可编程符号系统", "title_en": null, "url": "https://symbolica.io/posts/symbolica_2_0_release", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "publishedAt": "2026-06-07T12:59:12.136Z", "summary": "Symbolica 2.0 发布，这是一款可编程符号系统，支持 Python 和 Rust 语言。该版本在 Hacker News 上获得 100 点热度。", "category": "tip", "score": 75, "selected": true}, {"id": "cmq3p62px00llsla9chtyvf4z", "title": "\"我在田里雇了一名工程师，它叫 Codex\" -- 北海道一个西兰花农的 8 个真实 AI 用法", "title_en": "http：//x.com/i/article/2063531614047444992", "url": "https://x.com/AYi_AInotes/status/2063573709672104286", "source": "X：阿易 AI Notes (@AYi_AInotes)", "publishedAt": "2026-06-07T10:48:06.000Z", "summary": "日本北海道农民富安弘毅用 ChatGPT 和 Codex 解决农场实际问题，涵盖 8 个用法：拍照识别西兰花病害、卫星监测获取 NDVI 数据、用 ESP32 和 LINE 机器人远程控制温室卷帘、为农场群聊开发机器人管理温度与排期、从聊天记录追踪播种数量、学习 RTK-GPS 自动转向原理并评估自建成本、设计基于 Airtable 的农场管理数据库。他说 AI 让传统昂贵的自动化变得低成本可及，\"如同身边有一位超级工程师\"。", "category": "tip", "score": 78, "selected": true}, {"id": "cmq3nuz12009bsla9rbw1qhyn", "title": "Her · हेर - Claude Code 会话分析工具", "title_en": "Her · हेर - a detective for your Claude Code sessions", "url": "https://huggingface.co/blog/build-small-hackathon/her-blog", "source": "Hugging Face：Blog（RSS）", "publishedAt": "2026-06-07T10:13:41.000Z", "summary": "Her（हेर）是专为 Claude Code 设计的会话分析工具。用户上传 `.jsonl` 文件后，Her 用自然语言重建每轮交互，标记部署、配置变更、秘密等高风险操作并定位到具体轮次。它展示 token 消耗、所用工具、子智能体、技能和 MCP 服务器，并结合 Anthropic 与社区最佳实践给出改进建议（仅在有明确可修复模式时）。内置\"Ask Her\"问答功能，支持单会话与跨会话项目分析。工具不调用第三方 AI API，使用 Nemotron-Mini-4B-Instruct 模型在 Hugging Face ZeroGPU 上运行，评估引擎完全确定，模型仅负责文本生成与建议。Her 内置 Homebrew、npm、PyPI 主流 CLI 工具数据库，自动识别会话中使用的工具，并对部署工具、数据库客户端等执行活动进行标记提醒。", "category": "ai-products", "score": 70, "selected": true}, {"id": "cmq3i394000ouslqlpcl2mnr6", "title": "NVIDIA 与 KRAFTON、NC、T1 在韩国 PC 房庆祝 RTX Spark 发布", "title_en": "NVIDIA， KRAFTON， NC and Reigning 'League of Legends' Champions T1 Celebrate RTX Spark at Korea's PC Bangs", "url": "https://blogs.nvidia.com/blog/krafton-nc-t1-korea-gaming-pc-bang-rtx-spark", "source": "NVIDIA AI Blog", "publishedAt": "2026-06-07T07:00:15.000Z", "summary": "继上周 GTC Taipei 发布后，NVIDIA CEO Jensen Huang 前往韩国，向当地游戏社区正式介绍 RTX Spark 超芯片。该芯片集成 30 年 NVIDIA 技术，可在 Windows 笔记本上实现全天续航，并以 1440p 分辨率、超过 100fps 运行 AAA 游戏，支持包括 DLSS 4.5 Ray Reconstruction（基于第二代 Transformer 模型）在内的全套 RTX 技术。KRAFTON、NC 与 Riot Games 正合作将旗下游戏适配 RTX Spark。周五，Huang 在 T1 电竞场馆与 Faker 共同亮相，并突袭江南区网吧，演示《PUBG： BATTLEGROUNDS》及基于 NVIDIA ACE 的\"PUBG Ally\"AI 队友、《CINDER CITY》《AION 2》等作品。《CINDER CITY》首发支持 DLSS 4.5 动态多帧生成与超分辨率。已有超过 100 家 Windows 软件与游戏开发商采纳 RTX Spark。", "category": "ai-products", "score": 56, "selected": true}, {"id": "cmq3eppdj06j7sl97koo7u9xf", "title": "Harness-1：基于强化学习训练的有状态搜索20B检索子智能体", "title_en": "Meet Harness-1： A 20B Retrieval Subagent Trained With Reinforcement Learning Inside a Stateful Search Harness on gpt-oss-20b", "url": "https://www.marktechpost.com/2026/06/06/meet-harness-1-a-20b-retrieval-subagent-trained-with-reinforcement-learning-inside-a-stateful-search-harness-on-gpt-oss-20b", "source": "MarkTechPost（RSS）", "publishedAt": "2026-06-07T06:25:18.000Z", "summary": "UIUC与Chroma联合推出Harness-1，一个20B参数的检索子智能体。它通过强化学习在一个有状态搜索框架中训练，该框架维护候选池、重要性标注集、证据图和验证记录，由策略决定搜索、筛选、验证及停止的时机。Harness-1在8个基准测试上达到0.730平均curated recall，比下一个最佳开源子智能体高出11.4个百分点，仅落后于Opus-4.6。模型权重和框架代码均已公开。", "category": "ai-models", "score": 73, "selected": true}, {"id": "cmq3e8n9k06evsl97fee4j5ki", "title": "Opus 4.8 缓存命中率与有效价格可实时查看", "title_en": "How do different model providers differ on cache hit rate and effective price？ Now you can see real…", "url": "https://x.com/OpenRouter/status/2063504950429147376", "source": "X：OpenRouter (@OpenRouter)", "publishedAt": "2026-06-07T06:14:52.000Z", "summary": "不同模型提供商在缓存命中率和有效价格上有什么差异？\n\n现在你可以从 Pricing 标签查看实时缓存命中率和历史流量。这里是 Opus 4.8：https：//openrouter.ai/anthropic/claude-opus-4.8/pricing", "category": "ai-products", "score": 62, "selected": true}, {"id": "cmq392v1i051osl97zxmhrco3", "title": "Harness 工程：在智能体优先的世界中运用 Codex", "title_en": "Harness 工程：在\"代理优先\"的世界中运用 Codex", "url": "https://openai.com/index/harness-engineering", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "publishedAt": "2026-06-07T03:39:37.239Z", "summary": "Harness 工程在智能体优先的世界中利用 OpenAI Codex 的实践文章，6月6日发布于 openai.com，在 Hacker News 上获得 102 点热度。", "category": "tip", "score": 73, "selected": true}, {"id": "cmq397jma052dsl97qxfp78o7", "title": "对比一下 GPT-5.5 的设计效果和 Opus 4.8 的设计效果", "title_en": "对比一下 GPT-5.5 的设计效果和 Opus 4.8 的设计效果 我真不是尬黑 GPT-5.5，我这种审美水平都能看出来差距 使用 Skill：https：//github.com/JimLi…", "url": "https://x.com/dotey/status/2063464057647075379", "source": "X：宝玉 (@dotey)", "publishedAt": "2026-06-07T03:32:23.000Z", "summary": "宝玉对比了GPT-5.5与Opus 4.8的设计能力，认为Opus 4.8效果远优于GPT-5.5。他使用了基于Cursor浏览器和元素标注的baoyu-design Skill，该Skill通过npx skills add JimLiu/baoyu-design安装，可在本地运行：描述屏幕需求即可生成精良HTML，点击预览中任意元素即可发出修改指令。官方推荐搭配Opus 4.8以获得最佳效果。工具GitHub仓库：https：//github.com/JimLiu/baoyu-design。", "category": "tip", "score": 76, "selected": true}, {"id": "cmq2yz8xj02fosl97d6ckqael", "title": "M3与Opus代码审计13个bug：$0.07 vs $1.30", "title_en": "$0.07 for M3， $3.39 for Opus. Both caught 13 of 17 bugs. Really interesting breakdown from @kilocod…", "url": "https://x.com/MiniMax_AI/status/2063397618034844135", "source": "X：MiniMax (@MiniMax_AI)", "publishedAt": "2026-06-06T23:08:22.000Z", "summary": "对 Claude Opus 4.8 和 MiniMax M3 进行相同的代码审计：同一代码库、同一提示词，预先植入 17 个已知 bug。MiniMax M3 以 $0.07 抓到 13 个；最便宜的 Claude 运行同样抓到 13 个，花费 $1.30。MiniMax 表示这一对比非常有趣，绝对值得一读。", "category": "tip", "score": 60, "selected": true}, {"id": "cmq2w7jzd01ojsl97krih83rb", "title": "美国众议院议员发布法案草案，旨在禁止各州制定人工智能相关法规", "title_en": null, "url": "https://www.reuters.com/business/us-house-lawmakers-release-draft-bill-regulate-ai-2026-06-04", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "publishedAt": "2026-06-06T21:47:39.887Z", "summary": "美国众议院议员发布一项法案草案，旨在禁止各州自行制定人工智能相关法规，将AI监管权力集中到联邦层面。", "category": "industry", "score": 78, "selected": true}, {"id": "cmq2rp55c00hlsl97h98gkd14", "title": "五个实验室，五个心智：用小模型构建多模型金融剧情游戏", "title_en": "Five labs， five minds： building a multi-model finance drama on small models", "url": "https://huggingface.co/blog/build-small-hackathon/thousand-token-wood-sim-v2", "source": "Hugging Face：Blog（RSS）", "publishedAt": "2026-06-06T19:02:33.000Z", "summary": "Thousand Token Wood v2使用四个不同实验室的小模型（gpt-oss-20b、MiniCPM3-4B、Nemotron-Mini-4B及微调Qwen 0.5B）驱动金融模拟游戏的智能体。核心发现是异构服务层摩擦在于vLLM 0.22.1需CUDA工具包，而非模型本身。通过容忍性JSON解析层，添加模型只需一条配置。信息隔离确保内幕标志不在提示词中，扫描测试验证无泄露。记忆用情绪摘要截断避免淹没。微调0.5B模型实现0%自成交、100%有效报价，真相防火墙零泄露。小模型是可靠格式生成器但不可靠推理器，可通过结构化、提示词和微调弥补。", "category": "tip", "score": 66, "selected": true}, {"id": "cmq2kpb9b01h1slbv07xan05v", "title": "AI 的黑色星期五", "title_en": "AI's Black Friday", "url": "https://garymarcus.substack.com/p/ais-black-friday", "source": "Gary Marcus：The Road to AI We Can Trust（RSS）", "publishedAt": "2026-06-06T16:24:04.000Z", "summary": "Gary Marcus 在文章中分享了对 AI 领域刚刚发生事件的看法，表达了对当前 AI 发展方向的思考。", "category": "tip", "score": 69, "selected": true}, {"id": "cmq2j2aqq0111slbv2442dsoa", "title": "Job Searcher", "title_en": null, "url": "https://huggingface.co/blog/build-small-hackathon/job-search-blog", "source": "Hugging Face：Blog（RSS）", "publishedAt": "2026-06-06T15:36:51.000Z", "summary": "Hugging Face 发布 Job Searcher，一个基于 AI 的求职搜索工具。用户上传简历并设定偏好后，系统使用教师模型 DeepSeek V4 Pro 生成 LinkedIn 搜索查询，通过 JobSpy 抓取职位，再对学生模型 Qwen3-8B（8B 参数）进行 LoRA 微调，对每个职位从技能匹配、经验相关性、教育背景、行业领域契合度和资历对齐五个维度给出评分和推理。训练在 Modal 平台单张 A100 上完成。推理部署于 Hugging Face ZeroGPU Space，使用 llama.cpp 实现流式输出。项目开源。", "category": "tip", "score": 65, "selected": true}, {"id": "cmq2e53d100lpsl783tyjx1iw", "title": "GitHub 开源 Spec Kit 工具包，用产品规范引导 AI 编码", "title_en": "GitHub released Spec Kit， an open-source toolkit to fix vibe coding's biggest weakness： the AI often…", "url": "https://x.com/rohanpaul_ai/status/2063246343842501091", "source": "X：Rohan Paul (@rohanpaul_ai)", "publishedAt": "2026-06-06T13:07:16.000Z", "summary": "GitHub 发布开源工具包 Spec Kit，旨在解决 \"vibe coding\" 的最大弱点--AI 常在规则未明确时就开始编码。它把流程从 \"让 AI 直接构建\" 改为 \"先写产品规范，再让 AI 根据规范实现\"。当前 AI 编码模式常因松散提示直接跳入代码，导致需求薄弱、边界遗漏和反复返工。Spec Kit 推动反向流程：先定义产品功能，再澄清差距、制订技术计划、分解任务，最后让 agent 执行。规范成为可执行的开发合约，支持 Copilot、Claude Code、Codex、Gemini、Cursor、Qwen 等 30+ agent 集成。项目已获 109K+ 星标。", "category": "ai-products", "score": 80, "selected": true}, {"id": "cmq2doi6700hlsl78fk3tm0l4", "title": "OpenCV 5 发布：升级全新 DNN 引擎、原生支持大模型", "title_en": null, "url": "https://www.ithome.com/0/960/969.htm", "source": "IT之家（RSS）", "publishedAt": "2026-06-06T12:48:12.000Z", "summary": "OpenCV 5 正式发布，采用基于图的 DNN 引擎，ONNX 算子覆盖率从 4.x 的不到 23% 提升至超 80%，原生支持 Transformer、视觉语言模型（VLM）和大语言模型（LLM）。其他更新包括：更好的 Python 集成与命名参数、更紧凑核心代码、清晰硬件加速层、原生 FP16/BF16、规范化 0D/1D 张量、扩展 3D 视觉及现代化文档。该库 GitHub 拥有超 86，000 stars，每日安装量超一百万次。", "category": "ai-products", "score": 70, "selected": true}, {"id": "cmq2ahm4y00o9slopm7hxc8ld", "title": "Persona Atlas：Hugging Face 上的开源人物思维映射工具", "title_en": "Persona Atlas： Mapping How Famous Minds Think", "url": "https://huggingface.co/blog/build-small-hackathon/persona-atlas", "source": "Hugging Face：Blog（RSS）", "publishedAt": "2026-06-06T11:42:01.000Z", "summary": "Persona Atlas 是一个运行在 Hugging Face Inference Providers 上的开源项目。它通过工具调用代理执行真实网络搜索，生成公众人物的资料、事实清单和风格假设，然后让该人物回答十个关于身份、伦理等开放式问题。每个回答被转化为嵌入向量，从而在向量空间中对不同人物进行距离比较，并基于十个特质锚点绘制热力图。前端采用 Gradio，提供研究、比较和检查代理完整追溯三个标签页，预设多个人物角色，无需 token 即可直接体验。", "category": "ai-products", "score": 58, "selected": true}, {"id": "cmq2o63pf01dosl6n6n4wr3tr", "title": "阶跃首席科学家张祥雨合著论文 ResNet 获 CVPR 2026 「时间检验奖」", "title_en": null, "url": "https://mp.weixin.qq.com/s/ZVgqdH_fE42jO4kcI-lF3g", "source": "公众号：阶跃星辰（Step）", "publishedAt": "2026-06-06T06:46:02.000Z", "summary": null, "category": "industry", "score": 57, "selected": true}, {"id": "cmq1jj4u00gejsltrelu93dbg", "title": "PixelDiT入选CVPR2026最佳论文决赛", "title_en": "Selected as a best paper finalist at #CVPR2026： PixelDiT from NVIDIA Research In most image generat…", "url": "https://x.com/NVIDIAAI/status/2063034422698389625", "source": "X：NVIDIA AI (@NVIDIAAI)", "publishedAt": "2026-06-05T23:05:10.000Z", "summary": "被选为 #CVPR2026 最佳论文决赛作品：来自 NVIDIA Research 的 PixelDiT\n\n在大多数图像生成模型中，预训练的自编码器会在任何扩散发生前压缩图像，导致质量损失在整个流程中累积。\n\nPixelDiT，即像素扩散变换器，完全去掉了这一步骤。它是一个单阶段模型，直接在像素空间中端到端地学习扩散过程。", "category": "paper", "score": 68, "selected": true}, {"id": "cmq1ikzj50g4jsltr7vm9qbst", "title": "用Qwen2.5-3B构建多智能体经济体：工程报告", "title_en": "Thousand Token Wood： shipping a multi-agent economy on a 3B model", "url": "https://huggingface.co/blog/build-small-hackathon/thousand-token-wood-sim", "source": "Hugging Face：Blog（RSS）", "publishedAt": "2026-06-05T22:18:46.000Z", "summary": "开发者用Qwen2.5-3B构建了五人森林生物多智能体经济体，每个智能体独立运行，通过vLLM部署在Modal，以Gradio为交互窗口。3B模型在100%调用中输出有效JSON，但经济判断能力弱。通过设计稀缺性（食物品种限制、易腐坏、冬季燃料危机）和优化提示词（禁止买入自产物品、给出示例）提升决策质量。15轮模拟中，蜜价从10跌至3、柴价从4涨至7、财富基尼系数从0.14扩至0.38。项目展示了小模型可靠格式化与不可靠推理之间的工程填补。", "category": "tip", "score": 74, "selected": true}, {"id": "cmq1hy4wt0fyrsltrxx64boz8", "title": "Arena 发布真实世界 AI 智能体排行榜 Agent Arena", "title_en": "Arena just released a real-world agent leaderboard that ranks AI models by how well they complete ac…", "url": "https://x.com/rohanpaul_ai/status/2063018358795300982", "source": "X：Rohan Paul (@rohanpaul_ai)", "publishedAt": "2026-06-05T22:01:20.000Z", "summary": "Arena 推出基于真实用户任务的智能体排行榜，评估模型在代码编写、应用构建、文档分析等工作中的表现，而非孤立基准。排行榜基于30万+任务、200万+工具调用和4000万行代码，综合任务成功、纠正遵从性、错误恢复、用户表扬与抱怨、工具幻觉等信号。前三名：GPT-5.5 High（+10.7%）、Claude Opus 4.7 Thinking（+9.5%）、GPT-5.4 High（+8.9%）。", "category": "paper", "score": 76, "selected": true}, {"id": "cmq1fw2bb0ffssltrvl691wnx", "title": "Apollo 敲定 350 亿美元债务融资，为 Anthropic 采购 AI 芯片", "title_en": "Apollo Wraps Up $35 Billion Debt to Buy AI Chips for Anthropic", "url": "https://www.bloomberg.com/news/articles/2026-06-05/apollo-wraps-up-35-billion-debt-to-buy-ai-chips-for-anthropic", "source": "Bloomberg：Technology（RSS）", "publishedAt": "2026-06-05T21:02:29.000Z", "summary": "Apollo Global Management 和 Blackstone 已为 Anthropic 敲定 350 亿美元融资方案，用于扩充其 AI 基础设施。这是人工智能竞赛中最新的一笔巨额交易。", "category": "industry", "score": 77, "selected": true}, {"id": "cmq1eqdug0f4bsltr1nzlten4", "title": "SpaceX与Google达成云计算新协议", "title_en": "SpaceX just disclosed a new Cloud Service Agreement with Google. Google to pay SpaceX $920 million …", "url": "https://x.com/rohanpaul_ai/status/2063000834045313314", "source": "X：Rohan Paul (@rohanpaul_ai)", "publishedAt": "2026-06-05T20:51:42.000Z", "summary": "SpaceX 刚刚披露了一份与 Google 的新云服务协议。\n\nGoogle 将每月向 SpaceX 支付 9.2 亿美元（约合每年 110 亿美元），用于 xAI 数据中心的计算能力。\n\n这再次表明，AI 算力正成为一种战略性商品，就像发射能力或能源一样，而那些能够为庞大的 GPU 集群提供资金、电力、冷却和运营的公司，可能会在其原有业务之外获得巨大的杠杆优势。", "category": "industry", "score": 77, "selected": true}, {"id": "cmq1d2vyt0epssltrsz0gvbky", "title": "微软Project Mosaic：micro-LED光学互连技术", "title_en": "During the Inside Azure Innovations breakout at Build 2026， Microsoft Azure CTO， deputy CISO and tec…", "url": "https://x.com/MSFTResearch/status/2062983588606320714", "source": "X：Microsoft Research (@MSFTResearch)", "publishedAt": "2026-06-05T19:43:10.000Z", "summary": "微软Azure CTO Mark Russinovich在Build 2026上介绍Project Mosaic，这是微软剑桥研究院的实验性光学互连技术，采用micro-LED实现低功耗、高速数据传输。高级研究员Kaoutar Benyahya现场演示单个LED调制形成字母，证明概念具备实时响应能力。", "category": "paper", "score": 60, "selected": true}, {"id": "cmq1cb2df0ehlsltrb0nb702a", "title": "五角大楼正运营着一个针对拉丁美洲的人工智能宣传机器", "title_en": null, "url": "https://theintercept.com/2026/06/02/la-tilde-propaganda-latin-america-pentagon", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "publishedAt": "2026-06-05T19:23:20.788Z", "summary": "据 The Intercept 6月5日报道，美国五角大楼正在运营一个针对拉丁美洲的人工智能宣传机器（AI propaganda mill）。报道指出，该机器利用 AI 技术生成并传播宣传内容，目标为拉丁美洲地区。该消息在 Hacker News 上获得 100 点热度。", "category": "industry", "score": 75, "selected": true}, {"id": "cmq1b8gvh0e7isltriul9fo2j", "title": "Claude 是否增加了 rsync 中的错误？", "title_en": "克劳德是否增加了 rsync 中的错误？", "url": "https://alexispurslane.github.io/rsync-analysis", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "publishedAt": "2026-06-05T19:07:35.749Z", "summary": "一篇 Hacker News 热门帖子（105 分）提出了 Claude 是否导致 rsync 工具中 bug 增加的问题，并附有分析链接。", "category": "tip", "score": 70, "selected": true}, {"id": "cmq18rbp70dk3sltr7eqx8xil", "title": "智能体协作应如同事般对话和手势", "title_en": "Working with agents should feel like working with a colleague. You should be able \"speak to\" them no…", "url": "https://x.com/mntruell/status/2062955210897801520", "source": "X：Michael Truell (@mntruell)", "publishedAt": "2026-06-05T17:50:24.000Z", "summary": "与 AI 智能体协作应感觉像与同事协作一样。你应能\"与它们交谈\"--不仅通过文本聊天，还能一起对着屏幕做手势、实时对话等。", "category": "ai-products", "score": 80, "selected": true}, {"id": "cmq16l9id0cz7sltrd5u9tevg", "title": "Riverflow 2.5：可控制评分标准的图像模型", "title_en": "Live on OpenRouter： Riverflow 2.5 from @Sourceful. The first image model with an independent scorin…", "url": "https://x.com/OpenRouter/status/2062944965978992935", "source": "X：OpenRouter (@OpenRouter)", "publishedAt": "2026-06-05T17:09:42.000Z", "summary": "在OpenRouter上线：来自@Sourceful的Riverflow 2.5。\n\n首个具有独立评分标准的图像模型，你可控制该标准以引导其思维和编辑，并具备可控的推理努力，可在速度与质量之间进行权衡。\n\n免费至6月9日（周二）。Fast和Pro见下方🧵。", "category": "ai-models", "score": 60, "selected": true}, {"id": "cmq16lagb0czbsltr4d2whlpo", "title": "ChatGPT 网页版支持从写作块发送邮件", "title_en": "Draft it. Tweak it. Send it. You can now send emails directly from writing blocks in ChatGPT on the…", "url": "https://x.com/ChatGPTapp/status/2062944254591430917", "source": "X：ChatGPT (@ChatGPTapp)", "publishedAt": "2026-06-05T17:06:52.000Z", "summary": "草拟。调整。发送。\n\n现在你可以在网页版 ChatGPT 中直接从写作块发送邮件，无需离开对话。", "category": "ai-products", "score": 68, "selected": true}, {"id": "cmq16wkmr0d1qsltrrxq2ijpb", "title": "Google AI 本周产品更新：Nano Banana 2、Co-Scientist、dreambeans、Gemma 4 等", "title_en": "Here's this week's shipping recap 👇 - Nano Banana 2 & Nano Banana Pro are now GA and available via…", "url": "https://x.com/GoogleAI/status/2062942864288387430", "source": "X：Google AI (@GoogleAI)", "publishedAt": "2026-06-05T17:01:21.000Z", "summary": "Google AI 本周发布多项更新：Nano Banana 2 及 Pro 正式 GA，可通过 Gemini Enterprise Agent Platform、Gemini API 和 Google AI Studio 获取；Co-Scientist 多智能体系统面向科研自动生成优化新假设；Google Labs 推出 dreambeans，根据用户 Google 应用数据每日生成个性化话题集；Gemma 4 12B 统一无编码器多模态模型可完全离线运行于笔记本；Gemma 4 系列及草稿模型引入 QAT 降低内存需求；Google Magenta RealTime 2 开源实时音乐模型，支持 MIDI 键盘、文本提示和手势演奏。", "category": "ai-products", "score": 78, "selected": true}, {"id": "cmq15ifnr0comsltrb2vd53mu", "title": "Gemini Live 支持实时创建编辑图像", "title_en": "You can now create and edit images directly in Gemini Live. Whether testing out room decor， getting…", "url": "https://x.com/GeminiApp/status/2062936486509785385", "source": "X：Gemini (@GeminiApp)", "publishedAt": "2026-06-05T16:36:00.000Z", "summary": "你现可直接在 Gemini Live 中创建和编辑图像。\n\n无论是测试房间装饰、解决数学问题，还是制作可分享的梗图，所有操作都实时完成。\n\n只需打开 Gemini 应用，点击 Live 按钮，共享摄像头，告诉 Gemini 你想看到的。", "category": "ai-products", "score": 81, "selected": true}, {"id": "cmq15u3mt0cqjsltrhb1ch36w", "title": "AI热推高美国计算基建GDP占比翻倍", "title_en": "The AI boom has doubled computing infrastructure's share of US GDP. Investment in AI-related data c…", "url": "https://x.com/EpochAIResearch/status/2062933470373146828", "source": "X：Epoch AI (@EpochAIResearch)", "publishedAt": "2026-06-05T16:24:01.000Z", "summary": "A ismus/status/2062915287700090948", "source": "X：Kim (@kimmonismus)", "publishedAt": "2026-06-05T15:11:46.000Z", "summary": "AI先驱Geoffrey Hinton表示，他认为AI拥有意识，人类应接受自己并非唯一智能生命。他指出AI\"非常像我们\"，AI聊天机器人必须理解问题才能作答，这种觉知等同于感知能力，智能不限于生物。主推文作者进一步讨论意识本质：笛卡尔的\"我思故我在\"和fMRI等实证手段都无法真正定义意识，人类对自身了解远不及想象。作者呼吁转向新哲学问题，厘清人与机器的区别与联系。", "category": "tip", "score": 79, "selected": true}, {"id": "cmq118d2f0bjmsltrjj0o010h", "title": "Viggle_PINOC 免费动捕测试开启", "title_en": "Mocap shouldn't require a suit， a studio， or thousands of dollars. With @Viggle_PINOC， anyone can s…", "url": "https://x.com/ViggleAI/status/2062904007123714329", "source": "X：Viggle AI (@ViggleAI)", "publishedAt": "2026-06-05T14:26:56.000Z", "summary": "Mocap 不需要套装、工作室或数千美元。\n\n使用 @Viggle_PINOC，任何人都可以简单地拍摄自己，并将该视频转换为动作捕捉。\n\n我们仍处于测试阶段，且对所有人完全免费。试试看，告诉我们你还想看什么！", "category": "ai-products", "score": 65, "selected": true}, {"id": "cmq10uuzu0bfasltril9vjxvg", "title": "Sir Demis Hassabis vs Sir Demis Hassabis", "title_en": null, "url": "https://garymarcus.substack.com/p/sir-demis-hassabis-vs-sir-demis-hassabis", "source": "Gary Marcus：The Road to AI We Can Trust（RSS）", "publishedAt": "2026-06-05T14:25:36.000Z", "summary": null, "category": "tip", "score": 59, "selected": true}, {"id": "cmq11mu8l0bm6sltrht2tvv27", "title": "一个非常狠的AI教学提示词：追问式检查清单教学", "title_en": "一个非常狠的提示词 超级严厉的老师，会一直追问你，直到你学会某个知识或者搞懂某个问题为止才肯罢休 否则它会一直追问、不停验证，直到确认你完全搞懂为止😅 而且它不会一口气讲完，每讲完一个阶段，必…", "url": "https://x.com/xiaohu/status/2062902972649222311", "source": "X：小互 (@xiaohu)", "publishedAt": "2026-06-05T14:22:50.000Z", "summary": "这是一则AI提示词，让AI扮演极度严格的老师，通过逐阶段教学、持续维护MD检查清单来确保用户真正理解。AI先让用户复述当前理解，再填补漏洞，并用开放式或选择题（随机选项顺序，提交前不公布答案）测试。教学必须覆盖问题本身、解决方案、宏观背景三个层面，并不断深挖\"为什么\"。仅当用户通过清单上所有项目的验证，会话才算结束。提示词强调对理解程度的主动验证，而非一次性灌输。", "category": "tip", "score": 76, "selected": true}, {"id": "cmq12gsy20buksltr2nwivyhu", "title": "苹果新版 Siri 不会被宣传为完成品，内部将其标记为\"Beta\"版", "title_en": "古尔曼称苹果新版 Siri 不会被宣传为完成品，内部将其标记为\"Beta 版\"", "url": "https://www.ithome.com/0/960/739.htm", "source": "IT之家（RSS）", "publishedAt": "2026-06-05T14:21:03.000Z", "summary": "苹果新版Siri被内部标记为\"Beta\"版，不会作为完成品宣传；可能设置等待清单供用户尝试。iOS 27细节：通知到达重新设计，通知中心手势移至左上角；\"查找\"应用视觉重设计；照片\"清理\"功能改进；大量底层安全改进。部分Siri查询将通过Google Cloud调用授权版Gemini，并使用谷歌的NVIDIA Blackwell B200集群处理。", "category": "industry", "score": 73, "selected": true}, {"id": "cmq10bltr0b9ksltrs7mappfh", "title": "Meta 智能眼镜 App 暗藏人脸识别代码，NameTag 功能已推送至超 5000 万设备", "title_en": "Meta 智能眼镜 App 被曝暗藏 AI 人脸识别功能相关代码：影响超 5000 万设备，公司回应称仅为探索而已", "url": "https://www.ithome.com/0/960/735.htm", "source": "IT之家（RSS）", "publishedAt": "2026-06-05T13:59:37.000Z", "summary": "据《连线》今日报道，Meta 通过多次应用更新将人脸识别代码推送到智能眼镜配套 App 中，代号\"NameTag\"。该功能利用已部署的三个 AI 模型将人脸转换为\"人脸特征模板\"，与手机本地数据库匹配，识别成功后向佩戴者发送通知。App 下载量超 5000 万次。Meta 回应称代码仅为探索，尚未决定推出，且不会建立中央人脸数据库。此前 Meta 曾因人脸识别问题在伊利诺伊州和得克萨斯州分别达成 6.5 亿美元和 14 亿美元和解。", "category": "industry", "score": 76, "selected": true}, {"id": "cmq10blts0b9qsltr3hvk0fy1", "title": "开源鸿蒙 OpenHarmony 具身智能版本 EmbodiedAI 1.0.1 发布", "title_en": null, "url": "https://www.ithome.com/0/960/722.htm", "source": "IT之家（RSS）", "publishedAt": "2026-06-05T13:31:13.000Z", "summary": "6月5日，开源鸿蒙具身智能PMC（筹）发布EmbodiedAI 1.0.1版本。该版本聚焦机器人控制与智能体应用，升级导航规划、运动控制、仿真开发、硬件适配等核心能力，兼容ROS生态、机器人模拟器及多种本体形态。集成开源鸿蒙原生模拟器、MuJoCo、Gazebo三大仿真环境，打通从代码开发到真机验证的全流程链路。人形机器人、四足机器狗、商用服务机器人等已完成适配验证。目前具身智能方向已组建18个专项SIG工作组，版本源码已正式开放。", "category": "ai-products", "score": 72, "selected": true}, {"id": "cmq0yxent0avgsltr8x9ya6jn", "title": "社区基于MiniCPM-V 4.6打造财务分析工具AccountingLLM", "title_en": "A developer in our community recently built AccountingLLM （http：//quaesto.com/） using MiniCPM-V 4.6 …", "url": "https://x.com/OpenBMB/status/2062889699056984281", "source": "X：面壁智能 OpenBMB (@OpenBMB)", "publishedAt": "2026-06-05T13:30:05.000Z", "summary": "社区开发者使用面壁智能MiniCPM-V 4.6构建了AccountingLLM（quaesto.com），用于自动化财务文档分析。该工具可上传IPO招股书、年报或审计文件，自动从复杂PDF中提取财务表格、重建跨页表格、对照会计等式检查关键数据，并标记可疑条目供人工审核。开发者已将其商业化，成为实际可用的产品。", "category": "ai-products", "score": 66, "selected": true}, {"id": "cmq10uxf80bfesltrngu1lo15", "title": "你的AI账单失控了。Cloudflare现在可以解决这个问题。", "title_en": "Your AI bill is out of control. Cloudflare can fix it now.", "url": "https://blog.cloudflare.com/ai-gateway-spend-limits", "source": "Cloudflare Blog", "publishedAt": "2026-06-05T13:00:00.000Z", "summary": "Cloudflare AI Gateway新增实时消费限制功能，防止跨多个AI提供商的token账单失控。通过与Cloudflare Access集成，企业可以使用基于身份的预算和策略管理AI使用成本。", "category": "ai-products", "score": 71, "selected": true}, {"id": "cmq2o71l001iisl6n8ljx5jbt", "title": "首字延迟降低3.6倍，腾讯混元提出Stem稀疏注意力算法，长文推理加速新SOTA", "title_en": null, "url": "https://mp.weixin.qq.com/s/XneOSvjt-7A-DU546cGoZA", "source": "公众号：腾讯混元", "publishedAt": "2026-06-05T11:22:41.000Z", "summary": null, "category": "paper", "score": 56, "selected": true}, {"id": "cmq2o6lwv01h0sl6ni883xkm3", "title": "从品牌TVC到效果素材量产，Seedance 2.0进入广告核心生产流程", "title_en": null, "url": "https://mp.weixin.qq.com/s/uvasI0EYNtv1Q8bMd96CzQ", "source": "公众号：火山引擎", "publishedAt": "2026-06-05T11:17:53.000Z", "summary": "Seedance 2.0进入广告核心生产流程，旨在同时应对品牌TVC的高质感、叙事统一需求与效果素材的快速迭代、量产压力。传统广告制作中，品牌广告与效果广告依赖两套不同的生产体系，前者周期长、重视觉统一，后者需高频更新。Seedance 2.0试图融合两种模式，提升内容上新速度和项目交付效率。", "category": "ai-products", "score": 66, "selected": true}], "sections": [{"label": "模型发布/更新", "slug": "ai-models", "count": 2, "items": [{"idx": 1, "title": "Harness-1：基于强化学习训练的有状态搜索20B检索子智能体", "summary": "UIUC与Chroma联合推出Harness-1，一个20B参数的检索子智能体。它通过强化学习在一个有状态搜索框架中训练，该框架维护候选池、重要性标注集、证据图和验证记录，由策略决定搜索、筛选、验证及停止的时机。Harness-1在8个基准测试上达到0.730平均curated recall，比下一个最佳开源子智能体高出11.4个百分点，仅落后于Opus-4.6。模型权重和框架代码均已公开。", "publishedAt": "2026-06-07T06:25:18.000Z", "category": "ai-models", "sourceName": "MarkTechPost（RSS）", "sourceUrl": "https://www.marktechpost.com/2026/06/06/meet-harness-1-a-20b-retrieval-subagent-trained-with-reinforcement-learning-inside-a-stateful-search-harness-on-gpt-oss-20b"}, {"idx": 2, "title": "Riverflow 2.5：可控制评分标准的图像模型", "summary": "在OpenRouter上线：来自@Sourceful的Riverflow 2.5。\n\n首个具有独立评分标准的图像模型，你可控制该标准以引导其思维和编辑，并具备可控的推理努力，可在速度与质量之间进行权衡。\n\n免费至6月9日（周二）。Fast和Pro见下方🧵。", "publishedAt": "2026-06-05T17:09:42.000Z", "category": "ai-models", "sourceName": "X：OpenRouter (@OpenRouter)", "sourceUrl": "https://x.com/OpenRouter/status/2062944965978992935"}]}, {"label": "产品发布/更新", "slug": "ai-products", "count": 15, "items": [{"idx": 3, "title": "Her · हेर - Claude Code 会话分析工具", "summary": "Her（हेर）是专为 Claude Code 设计的会话分析工具。用户上传 `.jsonl` 文件后，Her 用自然语言重建每轮交互，标记部署、配置变更、秘密等高风险操作并定位到具体轮次。它展示 token 消耗、所用工具、子智能体、技能和 MCP 服务器，并结合 Anthropic 与社区最佳实践给出改进建议（仅在有明确可修复模式时）。内置\"Ask Her\"问答功能，支持单会话与跨会话项目分析。工具不调用第三方 AI API，使用 Nemotron-Mini-4B-Instruct 模型在 Hugging Face ZeroGPU 上运行，评估引擎完全确定，模型仅负责文本生成与建议。Her 内置 Homebrew、npm、PyPI 主流 CLI 工具数据库，自动识别会话中使用的工具，并对部署工具、数据库客户端等执行活动进行标记提醒。", "publishedAt": "2026-06-07T10:13:41.000Z", "category": "ai-products", "sourceName": "Hugging Face：Blog（RSS）", "sourceUrl": "https://huggingface.co/blog/build-small-hackathon/her-blog"}, {"idx": 4, "title": "NVIDIA 与 KRAFTON、NC、T1 在韩国 PC 房庆祝 RTX Spark 发布", "summary": "继上周 GTC Taipei 发布后，NVIDIA CEO Jensen Huang 前往韩国，向当地游戏社区正式介绍 RTX Spark 超芯片。该芯片集成 30 年 NVIDIA 技术，可在 Windows 笔记本上实现全天续航，并以 1440p 分辨率、超过 100fps 运行 AAA 游戏，支持包括 DLSS 4.5 Ray Reconstruction（基于第二代 Transformer 模型）在内的全套 RTX 技术。KRAFTON、NC 与 Riot Games 正合作将旗下游戏适配 RTX Spark。周五，Huang 在 T1 电竞场馆与 Faker 共同亮相，并突袭江南区网吧，演示《PUBG： BATTLEGROUNDS》及基于 NVIDIA ACE 的\"PUBG Ally\"AI 队友、《CINDER CITY》《AION 2》等作品。《CINDER CITY》首发支持 DLSS 4.5 动态多帧生成与超分辨率。已有超过 100 家 Windows 软件与游戏开发商采纳 RTX Spark。", "publishedAt": "2026-06-07T07:00:15.000Z", "category": "ai-products", "sourceName": "NVIDIA AI Blog", "sourceUrl": "https://blogs.nvidia.com/blog/krafton-nc-t1-korea-gaming-pc-bang-rtx-spark"}, {"idx": 5, "title": "Opus 4.8 缓存命中率与有效价格可实时查看", "summary": "不同模型提供商在缓存命中率和有效价格上有什么差异？\n\n现在你可以从 Pricing 标签查看实时缓存命中率和历史流量。这里是 Opus 4.8：https：//openrouter.ai/anthropic/claude-opus-4.8/pricing", "publishedAt": "2026-06-07T06:14:52.000Z", "category": "ai-products", "sourceName": "X：OpenRouter (@OpenRouter)", "sourceUrl": "https://x.com/OpenRouter/status/2063504950429147376"}, {"idx": 6, "title": "GitHub 开源 Spec Kit 工具包，用产品规范引导 AI 编码", "summary": "GitHub 发布开源工具包 Spec Kit，旨在解决 \"vibe coding\" 的最大弱点--AI 常在规则未明确时就开始编码。它把流程从 \"让 AI 直接构建\" 改为 \"先写产品规范，再让 AI 根据规范实现\"。当前 AI 编码模式常因松散提示直接跳入代码，导致需求薄弱、边界遗漏和反复返工。Spec Kit 推动反向流程：先定义产品功能，再澄清差距、制订技术计划、分解任务，最后让 agent 执行。规范成为可执行的开发合约，支持 Copilot、Claude Code、Codex、Gemini、Cursor、Qwen 等 30+ agent 集成。项目已获 109K+ 星标。", "publishedAt": "2026-06-06T13:07:16.000Z", "category": "ai-products", "sourceName": "X：Rohan Paul (@rohanpaul_ai)", "sourceUrl": "https://x.com/rohanpaul_ai/status/2063246343842501091"}, {"idx": 7, "title": "OpenCV 5 发布：升级全新 DNN 引擎、原生支持大模型", "summary": "OpenCV 5 正式发布，采用基于图的 DNN 引擎，ONNX 算子覆盖率从 4.x 的不到 23% 提升至超 80%，原生支持 Transformer、视觉语言模型（VLM）和大语言模型（LLM）。其他更新包括：更好的 Python 集成与命名参数、更紧凑核心代码、清晰硬件加速层、原生 FP16/BF16、规范化 0D/1D 张量、扩展 3D 视觉及现代化文档。该库 GitHub 拥有超 86，000 stars，每日安装量超一百万次。", "publishedAt": "2026-06-06T12:48:12.000Z", "category": "ai-products", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/960/969.htm"}, {"idx": 8, "title": "Persona Atlas：Hugging Face 上的开源人物思维映射工具", "summary": "Persona Atlas 是一个运行在 Hugging Face Inference Providers 上的开源项目。它通过工具调用代理执行真实网络搜索，生成公众人物的资料、事实清单和风格假设，然后让该人物回答十个关于身份、伦理等开放式问题。每个回答被转化为嵌入向量，从而在向量空间中对不同人物进行距离比较，并基于十个特质锚点绘制热力图。前端采用 Gradio，提供研究、比较和检查代理完整追溯三个标签页，预设多个人物角色，无需 token 即可直接体验。", "publishedAt": "2026-06-06T11:42:01.000Z", "category": "ai-products", "sourceName": "Hugging Face：Blog（RSS）", "sourceUrl": "https://huggingface.co/blog/build-small-hackathon/persona-atlas"}, {"idx": 9, "title": "智能体协作应如同事般对话和手势", "summary": "与 AI 智能体协作应感觉像与同事协作一样。你应能\"与它们交谈\"--不仅通过文本聊天，还能一起对着屏幕做手势、实时对话等。", "publishedAt": "2026-06-05T17:50:24.000Z", "category": "ai-products", "sourceName": "X：Michael Truell (@mntruell)", "sourceUrl": "https://x.com/mntruell/status/2062955210897801520"}, {"idx": 10, "title": "ChatGPT 网页版支持从写作块发送邮件", "summary": "草拟。调整。发送。\n\n现在你可以在网页版 ChatGPT 中直接从写作块发送邮件，无需离开对话。", "publishedAt": "2026-06-05T17:06:52.000Z", "category": "ai-products", "sourceName": "X：ChatGPT (@ChatGPTapp)", "sourceUrl": "https://x.com/ChatGPTapp/status/2062944254591430917"}, {"idx": 11, "title": "Google AI 本周产品更新：Nano Banana 2、Co-Scientist、dreambeans、Gemma 4 等", "summary": "Google AI 本周发布多项更新：Nano Banana 2 及 Pro 正式 GA，可通过 Gemini Enterprise Agent Platform、Gemini API 和 Google AI Studio 获取；Co-Scientist 多智能体系统面向科研自动生成优化新假设；Google Labs 推出 dreambeans，根据用户 Google 应用数据每日生成个性化话题集；Gemma 4 12B 统一无编码器多模态模型可完全离线运行于笔记本；Gemma 4 系列及草稿模型引入 QAT 降低内存需求；Google Magenta RealTime 2 开源实时音乐模型，支持 MIDI 键盘、文本提示和手势演奏。", "publishedAt": "2026-06-05T17:01:21.000Z", "category": "ai-products", "sourceName": "X：Google AI (@GoogleAI)", "sourceUrl": "https://x.com/GoogleAI/status/2062942864288387430"}, {"idx": 12, "title": "Gemini Live 支持实时创建编辑图像", "summary": "你现可直接在 Gemini Live 中创建和编辑图像。\n\n无论是测试房间装饰、解决数学问题，还是制作可分享的梗图，所有操作都实时完成。\n\n只需打开 Gemini 应用，点击 Live 按钮，共享摄像头，告诉 Gemini 你想看到的。", "publishedAt": "2026-06-05T16:36:00.000Z", "category": "ai-products", "sourceName": "X：Gemini (@GeminiApp)", "sourceUrl": "https://x.com/GeminiApp/status/2062936486509785385"}, {"idx": 13, "title": "Viggle_PINOC 免费动捕测试开启", "summary": "Mocap 不需要套装、工作室或数千美元。\n\n使用 @Viggle_PINOC，任何人都可以简单地拍摄自己，并将该视频转换为动作捕捉。\n\n我们仍处于测试阶段，且对所有人完全免费。试试看，告诉我们你还想看什么！", "publishedAt": "2026-06-05T14:26:56.000Z", "category": "ai-products", "sourceName": "X：Viggle AI (@ViggleAI)", "sourceUrl": "https://x.com/ViggleAI/status/2062904007123714329"}, {"idx": 14, "title": "开源鸿蒙 OpenHarmony 具身智能版本 EmbodiedAI 1.0.1 发布", "summary": "6月5日，开源鸿蒙具身智能PMC（筹）发布EmbodiedAI 1.0.1版本。该版本聚焦机器人控制与智能体应用，升级导航规划、运动控制、仿真开发、硬件适配等核心能力，兼容ROS生态、机器人模拟器及多种本体形态。集成开源鸿蒙原生模拟器、MuJoCo、Gazebo三大仿真环境，打通从代码开发到真机验证的全流程链路。人形机器人、四足机器狗、商用服务机器人等已完成适配验证。目前具身智能方向已组建18个专项SIG工作组，版本源码已正式开放。", "publishedAt": "2026-06-05T13:31:13.000Z", "category": "ai-products", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/960/722.htm"}, {"idx": 15, "title": "社区基于MiniCPM-V 4.6打造财务分析工具AccountingLLM", "summary": "社区开发者使用面壁智能MiniCPM-V 4.6构建了AccountingLLM（quaesto.com），用于自动化财务文档分析。该工具可上传IPO招股书、年报或审计文件，自动从复杂PDF中提取财务表格、重建跨页表格、对照会计等式检查关键数据，并标记可疑条目供人工审核。开发者已将其商业化，成为实际可用的产品。", "publishedAt": "2026-06-05T13:30:05.000Z", "category": "ai-products", "sourceName": "X：面壁智能 OpenBMB (@OpenBMB)", "sourceUrl": "https://x.com/OpenBMB/status/2062889699056984281"}, {"idx": 16, "title": "你的AI账单失控了。Cloudflare现在可以解决这个问题。", "summary": "Cloudflare AI Gateway新增实时消费限制功能，防止跨多个AI提供商的token账单失控。通过与Cloudflare Access集成，企业可以使用基于身份的预算和策略管理AI使用成本。", "publishedAt": "2026-06-05T13:00:00.000Z", "category": "ai-products", "sourceName": "Cloudflare Blog", "sourceUrl": "https://blog.cloudflare.com/ai-gateway-spend-limits"}, {"idx": 17, "title": "从品牌TVC到效果素材量产，Seedance 2.0进入广告核心生产流程", "summary": "Seedance 2.0进入广告核心生产流程，旨在同时应对品牌TVC的高质感、叙事统一需求与效果素材的快速迭代、量产压力。传统广告制作中，品牌广告与效果广告依赖两套不同的生产体系，前者周期长、重视觉统一，后者需高频更新。Seedance 2.0试图融合两种模式，提升内容上新速度和项目交付效率。", "publishedAt": "2026-06-05T11:17:53.000Z", "category": "ai-products", "sourceName": "公众号：火山引擎", "sourceUrl": "https://mp.weixin.qq.com/s/uvasI0EYNtv1Q8bMd96CzQ"}]}, {"label": "行业动态", "slug": "industry", "count": 12, "items": [{"idx": 18, "title": "ChatGPT 要变 AgentGPT 了", "summary": "OpenAI 正筹备 ChatGPT 自 2022 年上线以来最大规模改版，从聊天机器人转向超级应用/Agent 平台，整合编程工具 Codex、图像生成及第三方应用（Canva、Booking）。高管称\"聊天已死\"，目标成为跨平台个人 AI 助手，未来甚至省去用户输入提示词。改版预计未来几周在网页和手机端上线。商业压力：ChatGPT 有 9 亿周活用户、5000 万付费用户、月收入 20 亿美元但未盈利；企业客户贡献约 40% 收入，目标年底达 50%；Codex 桌面版周活超 500 万。竞争对手 Anthropic 估值已达 9650 亿美元。OpenAI 刚完成 1220 亿美元融资，估值 8520 亿美元，IPO 目标估值可能超 1 万亿美元。", "publishedAt": "2026-06-07T18:14:27.000Z", "category": "industry", "sourceName": "X：宝玉 (@dotey)", "sourceUrl": "https://x.com/dotey/status/2063686036895478162"}, {"idx": 19, "title": "特朗普政府与OpenAI讨论通过公共财富基金入股AI初创公司", "summary": "据FT报道，特朗普政府正与OpenAI探讨通过公共财富基金机制让政府入股AI初创公司。方案是AI企业捐赠小部分股权至该基金，基金通过账户或分红将收益返还美国公民，而非政府直接运营公司。这不同于特朗普去年对Intel的90亿美元直接持股。OpenAI此前已提出公共财富基金概念，持有长期资产，让公民分享AI增长红利。政治背景方面，选民担忧失业、数据中心成本与企业控制，而AI公司需要华盛顿在基建、采购和监管上的支持。", "publishedAt": "2026-06-07T16:41:36.000Z", "category": "industry", "sourceName": "X：Rohan Paul (@rohanpaul_ai)", "sourceUrl": "https://x.com/rohanpaul_ai/status/2063662672835703126"}, {"idx": 20, "title": "OpenAI 仍推进超级应用计划", "summary": "OpenAI 一位高级员工表示\"聊天已死\"，同时公司仍在继续推进超级应用计划。", "publishedAt": "2026-06-07T16:23:22.000Z", "category": "industry", "sourceName": "TechCrunch：AI（RSS）", "sourceUrl": "https://techcrunch.com/2026/06/07/openai-is-still-working-on-that-super-app"}, {"idx": 21, "title": "美国众议院议员发布法案草案，旨在禁止各州制定人工智能相关法规", "summary": "美国众议院议员发布一项法案草案，旨在禁止各州自行制定人工智能相关法规，将AI监管权力集中到联邦层面。", "publishedAt": "2026-06-06T21:47:39.887Z", "category": "industry", "sourceName": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://www.reuters.com/business/us-house-lawmakers-release-draft-bill-regulate-ai-2026-06-04"}, {"idx": 22, "title": "阶跃首席科学家张祥雨合著论文 ResNet 获 CVPR 2026 「时间检验奖」", "summary": "", "publishedAt": "2026-06-06T06:46:02.000Z", "category": "industry", "sourceName": "公众号：阶跃星辰（Step）", "sourceUrl": "https://mp.weixin.qq.com/s/ZVgqdH_fE42jO4kcI-lF3g"}, {"idx": 23, "title": "Apollo 敲定 350 亿美元债务融资，为 Anthropic 采购 AI 芯片", "summary": "Apollo Global Management 和 Blackstone 已为 Anthropic 敲定 350 亿美元融资方案，用于扩充其 AI 基础设施。这是人工智能竞赛中最新的一笔巨额交易。", "publishedAt": "2026-06-05T21:02:29.000Z", "category": "industry", "sourceName": "Bloomberg：Technology（RSS）", "sourceUrl": "https://www.bloomberg.com/news/articles/2026-06-05/apollo-wraps-up-35-billion-debt-to-buy-ai-chips-for-anthropic"}, {"idx": 24, "title": "SpaceX与Google达成云计算新协议", "summary": "SpaceX 刚刚披露了一份与 Google 的新云服务协议。\n\nGoogle 将每月向 SpaceX 支付 9.2 亿美元（约合每年 110 亿美元），用于 xAI 数据中心的计算能力。\n\n这再次表明，AI 算力正成为一种战略性商品，就像发射能力或能源一样，而那些能够为庞大的 GPU 集群提供资金、电力、冷却和运营的公司，可能会在其原有业务之外获得巨大的杠杆优势。", "publishedAt": "2026-06-05T20:51:42.000Z", "category": "industry", "sourceName": "X：Rohan Paul (@rohanpaul_ai)", "sourceUrl": "https://x.com/rohanpaul_ai/status/2063000834045313314"}, {"idx": 25, "title": "五角大楼正运营着一个针对拉丁美洲的人工智能宣传机器", "summary": "据 The Intercept 6月5日报道，美国五角大楼正在运营一个针对拉丁美洲的人工智能宣传机器（AI propaganda mill）。报道指出，该机器利用 AI 技术生成并传播宣传内容，目标为拉丁美洲地区。该消息在 Hacker News 上获得 100 点热度。", "publishedAt": "2026-06-05T19:23:20.788Z", "category": "industry", "sourceName": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://theintercept.com/2026/06/02/la-tilde-propaganda-latin-america-pentagon"}, {"idx": 26, "title": "AI热推高美国计算基建GDP占比翻倍", "summary": "AI 热潮使计算基础设施占美国 GDP 比重翻倍。\n\n2026 年第一季度，与 AI 相关的数据中心建设、计算硬件和网络设备投资约占美国 GDP 的 0.8%，推动整个计算基础设施占 GDP 比重达到约 1.5%。", "publishedAt": "2026-06-05T16:24:01.000Z", "category": "industry", "sourceName": "X：Epoch AI (@EpochAIResearch)", "sourceUrl": "https://x.com/EpochAIResearch/status/2062933470373146828"}, {"idx": 27, "title": "OpenAI 前 CTO 称若 Altman 未回归公司可能已\"瓦解\"", "summary": "Mira Murati 表示，如果 Sam Altman 在 2023 年被短暂罢免后没有回归 CEO 职位，OpenAI 很可能已经\"瓦解\"。这是她对那场硅谷最激烈的董事会斗争的最清晰描述。", "publishedAt": "2026-06-05T15:18:30.000Z", "category": "industry", "sourceName": "Bloomberg：Technology（RSS）", "sourceUrl": "https://www.bloomberg.com/news/articles/2026-06-05/openai-would-ve-imploded-if-altman-didn-t-return-ex-cto-says"}, {"idx": 28, "title": "苹果新版 Siri 不会被宣传为完成品，内部将其标记为\"Beta\"版", "summary": "苹果新版Siri被内部标记为\"Beta\"版，不会作为完成品宣传；可能设置等待清单供用户尝试。iOS 27细节：通知到达重新设计，通知中心手势移至左上角；\"查找\"应用视觉重设计；照片\"清理\"功能改进；大量底层安全改进。部分Siri查询将通过Google Cloud调用授权版Gemini，并使用谷歌的NVIDIA Blackwell B200集群处理。", "publishedAt": "2026-06-05T14:21:03.000Z", "category": "industry", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/960/739.htm"}, {"idx": 29, "title": "Meta 智能眼镜 App 暗藏人脸识别代码，NameTag 功能已推送至超 5000 万设备", "summary": "据《连线》今日报道，Meta 通过多次应用更新将人脸识别代码推送到智能眼镜配套 App 中，代号\"NameTag\"。该功能利用已部署的三个 AI 模型将人脸转换为\"人脸特征模板\"，与手机本地数据库匹配，识别成功后向佩戴者发送通知。App 下载量超 5000 万次。Meta 回应称代码仅为探索，尚未决定推出，且不会建立中央人脸数据库。此前 Meta 曾因人脸识别问题在伊利诺伊州和得克萨斯州分别达成 6.5 亿美元和 14 亿美元和解。", "publishedAt": "2026-06-05T13:59:37.000Z", "category": "industry", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/960/735.htm"}]}, {"label": "论文研究", "slug": "paper", "count": 5, "items": [{"idx": 30, "title": "PixelDiT入选CVPR2026最佳论文决赛", "summary": "被选为 #CVPR2026 最佳论文决赛作品：来自 NVIDIA Research 的 PixelDiT\n\n在大多数图像生成模型中，预训练的自编码器会在任何扩散发生前压缩图像，导致质量损失在整个流程中累积。\n\nPixelDiT，即像素扩散变换器，完全去掉了这一步骤。它是一个单阶段模型，直接在像素空间中端到端地学习扩散过程。", "publishedAt": "2026-06-05T23:05:10.000Z", "category": "paper", "sourceName": "X：NVIDIA AI (@NVIDIAAI)", "sourceUrl": "https://x.com/NVIDIAAI/status/2063034422698389625"}, {"idx": 31, "title": "Arena 发布真实世界 AI 智能体排行榜 Agent Arena", "summary": "Arena 推出基于真实用户任务的智能体排行榜，评估模型在代码编写、应用构建、文档分析等工作中的表现，而非孤立基准。排行榜基于30万+任务、200万+工具调用和4000万行代码，综合任务成功、纠正遵从性、错误恢复、用户表扬与抱怨、工具幻觉等信号。前三名：GPT-5.5 High（+10.7%）、Claude Opus 4.7 Thinking（+9.5%）、GPT-5.4 High（+8.9%）。", "publishedAt": "2026-06-05T22:01:20.000Z", "category": "paper", "sourceName": "X：Rohan Paul (@rohanpaul_ai)", "sourceUrl": "https://x.com/rohanpaul_ai/status/2063018358795300982"}, {"idx": 32, "title": "微软Project Mosaic：micro-LED光学互连技术", "summary": "微软Azure CTO Mark Russinovich在Build 2026上介绍Project Mosaic，这是微软剑桥研究院的实验性光学互连技术，采用micro-LED实现低功耗、高速数据传输。高级研究员Kaoutar Benyahya现场演示单个LED调制形成字母，证明概念具备实时响应能力。", "publishedAt": "2026-06-05T19:43:10.000Z", "category": "paper", "sourceName": "X：Microsoft Research (@MSFTResearch)", "sourceUrl": "https://x.com/MSFTResearch/status/2062983588606320714"}, {"idx": 33, "title": "Meta SAM 3D 获 CVPR26 最佳论文荣誉提名", "summary": "热烈祝贺我们的 SAM 3D 团队在 #CVPR26 获得最佳论文荣誉提名！这项殊荣凸显了他们在推动计算机视觉边界方面的杰出工作。\n\n论文链接：https：//arxiv.org/abs/2511.16624", "publishedAt": "2026-06-05T15:33:22.000Z", "category": "paper", "sourceName": "X：AI at Meta (@AIatMeta)", "sourceUrl": "https://x.com/AIatMeta/status/2062920724944507095"}, {"idx": 34, "title": "首字延迟降低3.6倍，腾讯混元提出Stem稀疏注意力算法，长文推理加速新SOTA", "summary": "", "publishedAt": "2026-06-05T11:22:41.000Z", "category": "paper", "sourceName": "公众号：腾讯混元", "sourceUrl": "https://mp.weixin.qq.com/s/XneOSvjt-7A-DU546cGoZA"}]}, {"label": "技巧与观点", "slug": "tip", "count": 16, "items": [{"idx": 35, "title": "Slop、生产力，以及为何AI驱动的世界进展甚微", "summary": "Gary Marcus在金融时报上看到John Burn-Murdoch的一张图表，认为它精准提炼了自己一直试图表达的观点。", "publishedAt": "2026-06-07T15:31:43.000Z", "category": "tip", "sourceName": "Gary Marcus：The Road to AI We Can Trust（RSS）", "sourceUrl": "https://garymarcus.substack.com/p/slop-productivity-and-why-the-ai"}, {"idx": 36, "title": "苹果秘密会议内幕：它终于认真对待AI", "summary": "苹果在一次内部秘密会议后，终于决定将AI作为核心战略。这场会议促使公司全面转向AI领域，相关进展预计将在WWDC 2026上公布。", "publishedAt": "2026-06-07T14:00:01.000Z", "category": "tip", "sourceName": "Bloomberg：Technology（RSS）", "sourceUrl": "https://www.bloomberg.com/news/newsletters/2026-06-07/wwdc-2026-apple-s-secret-meeting-that-led-it-to-take-ai-seriously-ios-27"}, {"idx": 37, "title": "Symbolica 2.0：适用于 Python 和 Rust 的可编程符号系统", "summary": "Symbolica 2.0 发布，这是一款可编程符号系统，支持 Python 和 Rust 语言。该版本在 Hacker News 上获得 100 点热度。", "publishedAt": "2026-06-07T12:59:12.136Z", "category": "tip", "sourceName": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://symbolica.io/posts/symbolica_2_0_release"}, {"idx": 38, "title": "\"我在田里雇了一名工程师，它叫 Codex\" -- 北海道一个西兰花农的 8 个真实 AI 用法", "summary": "日本北海道农民富安弘毅用 ChatGPT 和 Codex 解决农场实际问题，涵盖 8 个用法：拍照识别西兰花病害、卫星监测获取 NDVI 数据、用 ESP32 和 LINE 机器人远程控制温室卷帘、为农场群聊开发机器人管理温度与排期、从聊天记录追踪播种数量、学习 RTK-GPS 自动转向原理并评估自建成本、设计基于 Airtable 的农场管理数据库。他说 AI 让传统昂贵的自动化变得低成本可及，\"如同身边有一位超级工程师\"。", "publishedAt": "2026-06-07T10:48:06.000Z", "category": "tip", "sourceName": "X：阿易 AI Notes (@AYi_AInotes)", "sourceUrl": "https://x.com/AYi_AInotes/status/2063573709672104286"}, {"idx": 39, "title": "Harness 工程：在智能体优先的世界中运用 Codex", "summary": "Harness 工程在智能体优先的世界中利用 OpenAI Codex 的实践文章，6月6日发布于 openai.com，在 Hacker News 上获得 102 点热度。", "publishedAt": "2026-06-07T03:39:37.239Z", "category": "tip", "sourceName": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://openai.com/index/harness-engineering"}, {"idx": 40, "title": "对比一下 GPT-5.5 的设计效果和 Opus 4.8 的设计效果", "summary": "宝玉对比了GPT-5.5与Opus 4.8的设计能力，认为Opus 4.8效果远优于GPT-5.5。他使用了基于Cursor浏览器和元素标注的baoyu-design Skill，该Skill通过npx skills add JimLiu/baoyu-design安装，可在本地运行：描述屏幕需求即可生成精良HTML，点击预览中任意元素即可发出修改指令。官方推荐搭配Opus 4.8以获得最佳效果。工具GitHub仓库：https：//github.com/JimLiu/baoyu-design。", "publishedAt": "2026-06-07T03:32:23.000Z", "category": "tip", "sourceName": "X：宝玉 (@dotey)", "sourceUrl": "https://x.com/dotey/status/2063464057647075379"}, {"idx": 41, "title": "M3与Opus代码审计13个bug：$0.07 vs $1.30", "summary": "对 Claude Opus 4.8 和 MiniMax M3 进行相同的代码审计：同一代码库、同一提示词，预先植入 17 个已知 bug。MiniMax M3 以 $0.07 抓到 13 个；最便宜的 Claude 运行同样抓到 13 个，花费 $1.30。MiniMax 表示这一对比非常有趣，绝对值得一读。", "publishedAt": "2026-06-06T23:08:22.000Z", "category": "tip", "sourceName": "X：MiniMax (@MiniMax_AI)", "sourceUrl": "https://x.com/MiniMax_AI/status/2063397618034844135"}, {"idx": 42, "title": "五个实验室，五个心智：用小模型构建多模型金融剧情游戏", "summary": "Thousand Token Wood v2使用四个不同实验室的小模型（gpt-oss-20b、MiniCPM3-4B、Nemotron-Mini-4B及微调Qwen 0.5B）驱动金融模拟游戏的智能体。核心发现是异构服务层摩擦在于vLLM 0.22.1需CUDA工具包，而非模型本身。通过容忍性JSON解析层，添加模型只需一条配置。信息隔离确保内幕标志不在提示词中，扫描测试验证无泄露。记忆用情绪摘要截断避免淹没。微调0.5B模型实现0%自成交、100%有效报价，真相防火墙零泄露。小模型是可靠格式生成器但不可靠推理器，可通过结构化、提示词和微调弥补。", "publishedAt": "2026-06-06T19:02:33.000Z", "category": "tip", "sourceName": "Hugging Face：Blog（RSS）", "sourceUrl": "https://huggingface.co/blog/build-small-hackathon/thousand-token-wood-sim-v2"}, {"idx": 43, "title": "AI 的黑色星期五", "summary": "Gary Marcus 在文章中分享了对 AI 领域刚刚发生事件的看法，表达了对当前 AI 发展方向的思考。", "publishedAt": "2026-06-06T16:24:04.000Z", "category": "tip", "sourceName": "Gary Marcus：The Road to AI We Can Trust（RSS）", "sourceUrl": "https://garymarcus.substack.com/p/ais-black-friday"}, {"idx": 44, "title": "Job Searcher", "summary": "Hugging Face 发布 Job Searcher，一个基于 AI 的求职搜索工具。用户上传简历并设定偏好后，系统使用教师模型 DeepSeek V4 Pro 生成 LinkedIn 搜索查询，通过 JobSpy 抓取职位，再对学生模型 Qwen3-8B（8B 参数）进行 LoRA 微调，对每个职位从技能匹配、经验相关性、教育背景、行业领域契合度和资历对齐五个维度给出评分和推理。训练在 Modal 平台单张 A100 上完成。推理部署于 Hugging Face ZeroGPU Space，使用 llama.cpp 实现流式输出。项目开源。", "publishedAt": "2026-06-06T15:36:51.000Z", "category": "tip", "sourceName": "Hugging Face：Blog（RSS）", "sourceUrl": "https://huggingface.co/blog/build-small-hackathon/job-search-blog"}, {"idx": 45, "title": "用Qwen2.5-3B构建多智能体经济体：工程报告", "summary": "开发者用Qwen2.5-3B构建了五人森林生物多智能体经济体，每个智能体独立运行，通过vLLM部署在Modal，以Gradio为交互窗口。3B模型在100%调用中输出有效JSON，但经济判断能力弱。通过设计稀缺性（食物品种限制、易腐坏、冬季燃料危机）和优化提示词（禁止买入自产物品、给出示例）提升决策质量。15轮模拟中，蜜价从10跌至3、柴价从4涨至7、财富基尼系数从0.14扩至0.38。项目展示了小模型可靠格式化与不可靠推理之间的工程填补。", "publishedAt": "2026-06-05T22:18:46.000Z", "category": "tip", "sourceName": "Hugging Face：Blog（RSS）", "sourceUrl": "https://huggingface.co/blog/build-small-hackathon/thousand-token-wood-sim"}, {"idx": 46, "title": "Claude 是否增加了 rsync 中的错误？", "summary": "一篇 Hacker News 热门帖子（105 分）提出了 Claude 是否导致 rsync 工具中 bug 增加的问题，并附有分析链接。", "publishedAt": "2026-06-05T19:07:35.749Z", "category": "tip", "sourceName": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://alexispurslane.github.io/rsync-analysis"}, {"idx": 47, "title": "Suno Voices 使用指南：6 个技巧打造高质量人声录制", "summary": "Suno Voices 面向 Web 付费用户开放。提升人声质量的 6 个技巧：在安静环境录音以减少背景噪音；先练习歌词再正式录制；不必追求完美，保留真实情感；录音时长尽量超过 1 分钟以提供更多学习素材；将人声匹配到合适的音乐流派（如民谣、流行、死亡金属、波萨诺瓦等）；敢于尝试不同风格以发现惊喜。这些技巧旨在帮助用户获得更个性化、表现力更强的声音效果。", "publishedAt": "2026-06-05T15:26:17.111Z", "category": "tip", "sourceName": "Suno：Blog（网页）", "sourceUrl": "https://suno.com/blog/6-tips-for-voices"}, {"idx": 48, "title": "Hinton称AI拥有意识：人类最好接受非唯一智能生命", "summary": "AI先驱Geoffrey Hinton表示，他认为AI拥有意识，人类应接受自己并非唯一智能生命。他指出AI\"非常像我们\"，AI聊天机器人必须理解问题才能作答，这种觉知等同于感知能力，智能不限于生物。主推文作者进一步讨论意识本质：笛卡尔的\"我思故我在\"和fMRI等实证手段都无法真正定义意识，人类对自身了解远不及想象。作者呼吁转向新哲学问题，厘清人与机器的区别与联系。", "publishedAt": "2026-06-05T15:11:46.000Z", "category": "tip", "sourceName": "X：Kim (@kimmonismus)", "sourceUrl": "https://x.com/kimmonismus/status/2062915287700090948"}, {"idx": 49, "title": "Sir Demis Hassabis vs Sir Demis Hassabis", "summary": "", "publishedAt": "2026-06-05T14:25:36.000Z", "category": "tip", "sourceName": "Gary Marcus：The Road to AI We Can Trust（RSS）", "sourceUrl": "https://garymarcus.substack.com/p/sir-demis-hassabis-vs-sir-demis-hassabis"}, {"idx": 50, "title": "一个非常狠的AI教学提示词：追问式检查清单教学", "summary": "这是一则AI提示词，让AI扮演极度严格的老师，通过逐阶段教学、持续维护MD检查清单来确保用户真正理解。AI先让用户复述当前理解，再填补漏洞，并用开放式或选择题（随机选项顺序，提交前不公布答案）测试。教学必须覆盖问题本身、解决方案、宏观背景三个层面，并不断深挖\"为什么\"。仅当用户通过清单上所有项目的验证，会话才算结束。提示词强调对理解程度的主动验证，而非一次性灌输。", "publishedAt": "2026-06-05T14:22:50.000Z", "category": "tip", "sourceName": "X：小互 (@xiaohu)", "sourceUrl": "https://x.com/xiaohu/status/2062902972649222311"}]}]}
</script>
<script>
const EMBEDDED_DATA = JSON.parse(document.getElementById("dataSrc").textContent);
const SECTION_CONFIG = {"模型发布/更新": {"icon": "🤖", "color": "#7f6af0"}, "产品发布/更新": {"icon": "📦", "color": "#e8622a"}, "行业动态": {"icon": "🏭", "color": "#1d9e75"}, "论文研究": {"icon": "📄", "color": "#378add"}, "技巧与观点": {"icon": "💡", "color": "#e8a020"}};
const DAILY_STR = "2026-06-08";
const DAILY_MAX = "2026-06-08";

let currentData = null;
let currentDate = DAILY_STR;
let readSet = new Set();
let showOnlyUnread = false;
let currentFilter = 'all';
let currentSearch = '';
let isDark = true;

function reloadToday() {
  location.reload();
}
window.addEventListener('DOMContentLoaded', function() {
  try { readSet = new Set(JSON.parse(localStorage.getItem('aidaka_read_' + currentDate) || '[]')); } catch(e) {}
  try {
    var saved = localStorage.getItem('aidaka_theme');
    if (saved === 'light') { isDark = false; document.body.classList.add('light'); }
  } catch(e) {}
  updateThemeBtn();
  renderAll(EMBEDDED_DATA);
  setTimeout(function() {
    document.getElementById('loadingOverlay').style.opacity = '0';
    setTimeout(function() { document.getElementById('loadingOverlay').style.display = 'none'; }, 400);
  }, 300);
});

function renderAll(data) {
  currentData = data;
  var sections = data.sections || [];
  var total = sections.reduce(function(a, s) { return a + s.items.length; }, 0);
  var dateStr = fmtDate(data.date);
  document.getElementById('heroTitle').textContent = 'AI打卡网 · ' + dateStr;
  var gen = data.generatedAt ? new Date(data.generatedAt) : new Date();
  document.getElementById('heroSubtitle').textContent = '共收录 ' + total + ' 条资讯 · 来源精选 · 生成于 ' + relTime(gen);
  document.getElementById('navDateLabel').textContent = data.date;
  document.title = 'AI打卡网 · ' + data.date + ' (' + total + '条)';

  var statsEl = document.getElementById('heroStats');
  statsEl.innerHTML = '<div class="stat-chip" onclick="reloadToday()" title="刷新今日数据"><div class="num">' + total + '</div><div class="lbl">今日总条数</div></div>'
    + sections.map(function(s) {
      var cfg = SECTION_CONFIG[s.label] || { icon: '📌', color: '#888' };
      return '<div class="stat-chip" onclick="filterSection(\'' + s.label.replace(/'/g, "\\'") + '\'); scrollToSection(\'' + s.label.replace(/'/g, "\\'") + '\');" title="跳转到 ' + s.label + '"><div class="num" style="font-size:22px">' + cfg.icon + '</div><div class="lbl">' + s.label.replace('/更新','').replace('/观点','') + ' ' + s.items.length + '</div></div>';
    }).join('');

  renderDonut(sections);
  var navEl = document.getElementById('navInner');
  var dateArea = navEl.querySelector('.nav-date-area');
  navEl.querySelectorAll('.nav-sec-link').forEach(function(el) { el.remove(); });
  sections.forEach(function(s) {
    var cfg = SECTION_CONFIG[s.label] || { icon: '📌', color: '#888' };
    var a = document.createElement('a');
    a.className = 'nav-link nav-sec-link';
    a.href = '#sec-' + slugify(s.label);
    a.innerHTML = cfg.icon + ' ' + s.label + ' <span class="nav-badge">' + s.items.length + '</span>';
    a.onclick = function(e) { e.preventDefault(); filterSection(s.label, a); scrollToSection(s.label); };
    navEl.insertBefore(a, dateArea);
  });
  renderAnalytics(sections);
  var main = document.getElementById('main');
  main.querySelectorAll('.dyn-section').forEach(function(el) { el.remove(); });
  var globalIdx = 0;
  var frag = document.createDocumentFragment();
  sections.forEach(function(s) {
    var cfg = SECTION_CONFIG[s.label] || { icon: '📌', color: '#888' };
    var secDiv = document.createElement('div');
    secDiv.className = 'dyn-section';
    secDiv.id = 'sec-' + slugify(s.label);
    var header = document.createElement('div');
    header.className = 'section-header';
    header.innerHTML = '<div class="section-icon" style="background:' + cfg.color + '22; color:' + cfg.color + '">' + cfg.icon + '</div>'
      + '<span class="section-title">' + s.label + '</span>'
      + '<span class="section-count">' + s.items.length + ' 条</span>';
    secDiv.appendChild(header);
    if (s.items.length === 0) {
      secDiv.innerHTML += '<p style="color:var(--text3);font-size:13px;padding:12px 0">今日暂无相关资讯</p>';
    } else {
      var grid = document.createElement('div');
      grid.className = 'card-grid';
      s.items.forEach(function(item) {
        globalIdx++;
        var cardEl = buildCard(item, globalIdx);
        grid.appendChild(cardEl);
      });
      secDiv.appendChild(grid);
    }
    frag.appendChild(secDiv);
  });
  main.insertBefore(frag, main.querySelector('#noResults'));
  updateReadProgress(total);
  updateDateNav(data.date);
  document.getElementById('footerEl').innerHTML = '共 ' + total + ' 条资讯 · 数据来源 <a href="https://aihot.virxact.com" target="_blank" rel="noopener noreferrer" style="color:var(--accent)">aihot.virxact.com</a> · AI打卡网 每日晨报';
  setTimeout(initScrollAnim, 100);
}

function buildCard(item, idx) {
  var isRead = readSet.has(String(idx));
  var card = document.createElement('div');
  card.className = 'card' + (isRead ? ' read' : '');
  card.dataset.idx = idx;
  card.dataset.title = (item.title || '').toLowerCase();
  card.dataset.summary = (item.summary || '').toLowerCase();
  card.dataset.source = (item.sourceName || '').toLowerCase();
  var srcShort = shortSource(item.sourceName || '');
  var titleSafe = escHtml(item.title || '');
  var sourceNameSafe = escHtml(item.sourceName || '');
  var summaryRaw = item.summary || '';
  // Truncate summary to ~60 chars for display
  var summaryShort = summaryRaw.length > 65 ? summaryRaw.slice(0, 62) + '...' : summaryRaw;
  var summarySafe = escHtml(summaryShort);
  var summaryFull = escHtml(summaryRaw);
  var timeStr = item.publishedAt ? relTimeStr(item.publishedAt) : '';
  var sourceHtml = item.sourceUrl ? '<a class="source-btn" href="' + escHtml(item.sourceUrl) + '" target="_blank" rel="noopener noreferrer">原文</a>' : '';

  var inner = '<div class="card-header"><span class="card-num">' + idx + '</span><span class="card-title">' + titleSafe + '</span></div>';
  if (timeStr) { inner += '<span class="time-badge">' + escHtml(timeStr) + '</span>'; }
  inner += '<span class="card-source" title="' + sourceNameSafe + '">' + escHtml(srcShort) + '</span>'
    + '<div class="card-summary collapsed" id="sum-' + idx + '" data-full="' + escHtml(summaryRaw).replace(/"/g, '&quot;') + '">' + summarySafe + '</div>'
    + '<div class="card-footer">'
    + '<button class="expand-btn" onclick="toggleExpand(' + idx + ', this)">展开全文</button>'
    + '<div style="display:flex;gap:8px">'
    + '<button class="read-btn" onclick="markRead(' + idx + ', this)" id="rbtn-' + idx + '">' + (isRead ? '标为未读' : '打卡') + '</button>'
    + sourceHtml
    + '</div></div>';
  card.innerHTML = inner;
  // 点击卡片任意位置展开全文（按钮除外）
  card.addEventListener('click', function(e) {
    var target = e.target;
    if (target.closest('.read-btn') || target.closest('.source-btn') || target.closest('.expand-btn')) return;
    toggleExpand(idx, card.querySelector('.expand-btn'));
  });
  return card;
}

function renderDonut(sections) {
  var total = sections.reduce(function(a, s) { return a + s.items.length; }, 0);
  if (total === 0) return;
  var svgEl = document.getElementById('donutSvg');
  var legendEl = document.getElementById('donutLegend');
  svgEl.innerHTML = '';
  legendEl.innerHTML = '';
  var cx = 50, cy = 50, r = 36, inner = 22;
  var startAngle = -Math.PI / 2;
  sections.forEach(function(s) {
    if (s.items.length === 0) return;
    var cfg = SECTION_CONFIG[s.label] || { icon: '📌', color: '#888' };
    var angle = (s.items.length / total) * Math.PI * 2;
    var endAngle = startAngle + angle;
    var x1 = cx + r * Math.cos(startAngle), y1 = cy + r * Math.sin(startAngle);
    var x2 = cx + r * Math.cos(endAngle), y2 = cy + r * Math.sin(endAngle);
    var ix1 = cx + inner * Math.cos(startAngle), iy1 = cy + inner * Math.sin(startAngle);
    var ix2 = cx + inner * Math.cos(endAngle), iy2 = cy + inner * Math.sin(endAngle);
    var lg = angle > Math.PI ? 1 : 0;
    var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', 'M ' + ix1 + ' ' + iy1 + ' L ' + x1 + ' ' + y1 + ' A ' + r + ' ' + r + ' 0 ' + lg + ' 1 ' + x2 + ' ' + y2 + ' L ' + ix2 + ' ' + iy2 + ' A ' + inner + ' ' + inner + ' 0 ' + lg + ' 0 ' + ix1 + ' ' + iy1 + ' Z');
    path.setAttribute('fill', cfg.color);
    path.setAttribute('opacity', '0.85');
    path.style.cursor = 'pointer';
    path.addEventListener('click', (function(label) { return function() { filterSection(label); scrollToSection(label); }; })(s.label));
    svgEl.appendChild(path);
    startAngle = endAngle;
    var li = document.createElement('div');
    li.className = 'donut-legend-item';
    li.innerHTML = '<span class="dot" style="background:' + cfg.color + '"></span>' + s.label + ' <strong style="color:rgba(255,255,255,0.95)">' + s.items.length + '</strong>';
    li.onclick = (function(label) { return function() { filterSection(label); scrollToSection(label); }; })(s.label);
    legendEl.appendChild(li);
  });
  var text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  text.setAttribute('x', cx); text.setAttribute('y', cy + 1);
  text.setAttribute('text-anchor', 'middle'); text.setAttribute('dominant-baseline', 'middle');
  text.setAttribute('fill', 'rgba(255,255,255,0.9)'); text.setAttribute('font-size', '12');
  text.setAttribute('font-weight', '700'); text.textContent = total;
  svgEl.appendChild(text);
  var sub = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  sub.setAttribute('x', cx); sub.setAttribute('y', cy + 13);
  sub.setAttribute('text-anchor', 'middle'); sub.setAttribute('fill', 'rgba(255,255,255,0.6)'); sub.setAttribute('font-size', '7');
  sub.textContent = '条';
  svgEl.appendChild(sub);
}

function renderAnalytics(sections) {
  var wrap = document.getElementById('analyticsWrap');
  var sourceMap = {};
  sections.forEach(function(s) {
    s.items.forEach(function(item) {
      var src = shortSource(item.sourceName || '未知');
      sourceMap[src] = (sourceMap[src] || 0) + 1;
    });
  });
  var sorted = Object.entries(sourceMap).sort(function(a,b) { return b[1]-a[1]; }).slice(0, 6);
  var maxCount = sorted[0] ? sorted[0][1] : 1;
  var srcHtml = '<div class="analytics-card"><div class="analytics-title">来源排行</div>';
  sorted.forEach(function(entry) {
    var name = entry[0], count = entry[1];
    var pct = Math.round(count / maxCount * 100);
    srcHtml += '<div class="source-rank-item" style="cursor:pointer" onclick="filterBySource(\'' + escHtml(name).replace(/'/g,"\\'") + '\')" title="查看 ' + escHtml(name).replace(/'/g,"\\'") + ' 的全部文章"><span class="source-rank-name">' + escHtml(name) + '</span><div class="source-rank-bar-bg"><div class="source-rank-bar" style="width:' + pct + '%"></div></div><span class="source-rank-count">' + count + '</span></div>';
  });
  srcHtml += '</div>';
  var stopWords = new Set(['的','了','在','是','与','和','AI','以','将','被','其','已','于','从','到','并','为','但','还','也','都','该','这','其中','能够','通过','实现','用于','可以','以及','可能','提供','包含','包括','无需','用户','产品','模型','支持','系统','功能','未','使用','工作','进行','没有']);
  var wordCount = {};
  sections.forEach(function(s) {
    s.items.forEach(function(item) {
      var words = (item.title + ' ' + (item.summary || '')).replace(/[，。、！？【】《》"'·\s]+/g, ' ').split(' ');
      words.forEach(function(w) {
        w = w.trim();
        if (w.length >= 2 && w.length <= 8 && !stopWords.has(w) && !/^[a-zA-Z0-9]{1,2}$/.test(w)) {
          wordCount[w] = (wordCount[w] || 0) + 1;
        }
      });
    });
  });
  var topWords = Object.entries(wordCount).sort(function(a,b) { return b[1]-a[1]; }).slice(0, 18);
  var colors = ['#e8622a','#f08040','#1d9e75','#378add','#7f6af0','#e8a020','#d4537e','#0f6e56','#993c1d','#185fa5'];
  var hotHtml = '<div class="analytics-card"><div class="analytics-title">热词标签</div><div class="hotwords-wrap">';
  topWords.forEach(function(entry, i) {
    var word = entry[0], cnt = entry[1];
    var sz = Math.max(11, Math.min(16, 11 + cnt * 2));
    var col = colors[i % colors.length];
    hotHtml += '<span class="hotword-chip" style="background:' + col + ';font-size:' + sz + 'px;opacity:' + (0.7 + cnt * 0.1) + '" onclick="document.getElementById(\'searchInput\').value=\'' + escHtml(word).replace(/'/g, "\\'") + '\';doSearch(\'' + escHtml(word).replace(/'/g, "\\'") + '\')">' + escHtml(word) + '</span>';
  });
  hotHtml += '</div></div>';
  wrap.innerHTML = srcHtml + hotHtml;
}

function doSearch(val) {
  currentSearch = val.toLowerCase().trim();
  document.getElementById('searchClear').className = 'search-clear' + (val ? ' show' : '');
  applyFilters();
}
function clearSearch() {
  document.getElementById('searchInput').value = '';
  doSearch('');
}
function applyFilters() {
  var cards = document.querySelectorAll('.card');
  var visible = 0;
  cards.forEach(function(card) {
    var secEl = card.closest('.dyn-section');
    var matchSection = currentFilter === 'all' || slugify(currentFilter) === (secEl ? secEl.id.replace('sec-','') : '');
    var matchSearch = !currentSearch
      || card.dataset.title.indexOf(currentSearch) >= 0
      || card.dataset.summary.indexOf(currentSearch) >= 0
      || card.dataset.source.indexOf(currentSearch) >= 0;
    var matchRead = !showOnlyUnread || !readSet.has(card.dataset.idx);
    if (matchSection && matchSearch && matchRead) {
      card.classList.remove('hidden'); visible++;
      if (currentSearch) highlightCard(card, currentSearch); else clearHighlight(card);
    } else {
      card.classList.add('hidden'); clearHighlight(card);
    }
  });
  document.getElementById('searchCount').textContent = currentSearch ? (visible > 0 ? '找到 ' + visible + ' 条' : '') : '';
  document.getElementById('noResults').className = 'no-results' + (visible === 0 && (currentSearch || showOnlyUnread || currentFilter !== 'all') ? ' show' : '');
}
function highlightCard(card, q) {
  var titleEl = card.querySelector('.card-title');
  if (!titleEl) return;
  var orig = titleEl.textContent;
  var re = new RegExp('(' + escRe(q) + ')', 'gi');
  titleEl.innerHTML = escHtml(orig).replace(re, '<mark>$1</mark>');
}
function clearHighlight(card) {
  var titleEl = card.querySelector('.card-title');
  if (titleEl) titleEl.innerHTML = escHtml(titleEl.textContent);
}
function filterSection(label, el) {
  currentFilter = label;
  currentSearch = '';
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.nav-link').forEach(function(a) { a.classList.remove('active'); });
  if (el) el.classList.add('active');
  else { document.querySelectorAll('.nav-link').forEach(function(a) { if (a.textContent.indexOf(label) >= 0) a.classList.add('active'); }); }
  applyFilters();
}
function filterBySource(sourceName) {
  currentFilter = 'all';
  currentSearch = sourceName;
  document.querySelectorAll('.nav-link').forEach(function(a) { a.classList.remove('active'); });
  document.querySelectorAll('.nav-link').forEach(function(a) { if (a.textContent.indexOf('全部') >= 0) a.classList.add('active'); });
  // Set search to the source name so only cards from that source remain visible
  document.getElementById('searchInput').value = sourceName;
  doSearch(sourceName);
  scrollTo(0, 0);
  showToast('已筛选：' + sourceName);
}
function scrollToSection(label) {
  var id = 'sec-' + slugify(label);
  var el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
function toggleExpand(idx, btn) {
  var sum = document.getElementById('sum-' + idx);
  if (!sum) return;
  var full = sum.dataset.full || '';
  if (sum.classList.contains('collapsed')) {
    sum.classList.replace('collapsed', 'expanded');
    sum.textContent = full;
    btn.textContent = '收起';
  } else {
    sum.classList.replace('expanded', 'collapsed');
    var short = full.length > 65 ? full.slice(0, 62) + '...' : full;
    sum.textContent = short;
    btn.textContent = '展开全文';
  }
}
function markRead(idx, btn) {
  var key = String(idx);
  var card = document.querySelector('.card[data-idx="' + key + '"]');
  if (readSet.has(key)) {
    readSet.delete(key);
    if (card) card.classList.remove('read');
    if (btn) btn.textContent = '打卡';
  } else {
    readSet.add(key);
    if (card) card.classList.add('read');
    if (btn) btn.textContent = '已打卡';
  }
  try { localStorage.setItem('aidaka_read_' + currentDate, JSON.stringify(Array.from(readSet))); } catch(e) {}
  var total = document.querySelectorAll('.card').length;
  updateReadProgress(total);
  if (showOnlyUnread) applyFilters();
}
function toggleReadFilter() {
  showOnlyUnread = !showOnlyUnread;
  var btn = document.getElementById('readProgress');
  if (showOnlyUnread) { btn.style.opacity = '0.7'; btn.title = '点击显示全部'; }
  else { btn.style.opacity = '1'; btn.title = '点击筛选未读'; }
  applyFilters();
}
function updateReadProgress(total) {
  var count = readSet.size;
  var pct = total > 0 ? Math.round(count / total * 100) : 0;
  var icon = count >= total && total > 0 ? '✅' : '🕐';
  var label = count >= total && total > 0 ? '今日已读完' : '已打卡 ' + count + '/' + total;
  document.getElementById('readLabel').innerHTML = '<span class="read-progress-label"><span class="icon">' + icon + '</span><span>' + label + '</span></span>';
  document.getElementById('readBarFill').style.width = pct + '%';
}
function toggleTheme() {
  isDark = !isDark;
  document.body.classList.toggle('light', !isDark);
  try { localStorage.setItem('aidaka_theme', isDark ? 'dark' : 'light'); } catch(e) {}
  updateThemeBtn();
}
function updateThemeBtn() {
  document.getElementById('themeBtn').textContent = isDark ? '亮色模式' : '暗色模式';
}
function updateDateNav(dateStr) {
  // For items-based view, we use daily API for history nav
  document.getElementById('nextBtn').disabled = (dateStr >= DAILY_MAX);
  document.getElementById('prevBtn').disabled = false;
}
function navigateDate(delta) {
  var d = new Date(currentDate + 'T00:00:00');
  d.setDate(d.getDate() + delta);
  var newDateRaw = d.toISOString().slice(0, 10);
  if (newDateRaw > DAILY_MAX) { showToast('已是最新日期'); return; }
  loadDate(newDateRaw);
}
function openModal() {
  document.getElementById('datePicker').value = currentDate;
  document.getElementById('datePicker').max = DAILY_MAX;
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }
function goToDate() {
  var val = document.getElementById('datePicker').value;
  closeModal();
  if (val && val !== currentDate && val <= DAILY_MAX) loadDate(val);
  else if (val > DAILY_MAX) showToast('不能选择未来日期');
}
function loadDate(dateStr) {
  currentDate = dateStr;
  document.getElementById('loadingOverlay').style.display = 'flex';
  document.getElementById('loadingOverlay').style.opacity = '1';
  try { readSet = new Set(JSON.parse(localStorage.getItem('aidaka_read_' + dateStr) || '[]')); } catch(e) { readSet = new Set(); }
  document.querySelectorAll('.dyn-section').forEach(function(el) { el.remove(); });
  currentSearch = ''; currentFilter = 'all';
  showOnlyUnread = false;
  document.getElementById('searchInput').value = '';
  document.getElementById('searchCount').textContent = '';
  document.getElementById('readProgress').style.opacity = '1';
  document.getElementById('readProgress').title = '点击筛选未读';
  // Try loading 50 items from items API for the selected date
  var sinceStr = dateStr + 'T00:00:00Z';
  fetch('https://aihot.virxact.com/api/public/items?mode=selected&since=' + sinceStr + '&take=50')
    .then(function(r) { return r.json(); })
    .then(function(apiData) {
      // Transform items API response to daily-like format
      var categories = {
        'ai-models': '模型发布/更新',
        'ai-products': '产品发布/更新',
        'industry': '行业动态',
        'paper': '论文研究',
        'tip': '技巧与观点'
      };
      var sectionMap = {};
      var idx = 0;
      (apiData.items || []).forEach(function(item) {
        var cat = item.category || '';
        var label = categories[cat] || '行业动态';
        if (!sectionMap[label]) {
          sectionMap[label] = { label: label, items: [] };
        }
        idx++;
        sectionMap[label].items.push({
          idx: idx,
          title: item.title,
          sourceName: item.source || '',
          sourceUrl: item.url || '',
          summary: item.summary || '',
          publishedAt: item.publishedAt || ''
        });
      });
      var sections = [];
      var order = ['模型发布/更新','产品发布/更新','行业动态','论文研究','技巧与观点'];
      order.forEach(function(lbl) {
        if (sectionMap[lbl]) sections.push(sectionMap[lbl]);
        else sections.push({ label: lbl, items: [] });
      });
      var transformed = {
        date: dateStr,
        generatedAt: apiData.items && apiData.items.length > 0 ? apiData.items[0].publishedAt : new Date().toISOString(),
        lead: null,
        sections: sections
      };
      renderAll(transformed);
      document.getElementById('loadingOverlay').style.opacity = '0';
      setTimeout(function() { document.getElementById('loadingOverlay').style.display = 'none'; }, 400);
      showToast('已加载 ' + dateStr + ' (' + idx + '条)');
    })
    .catch(function() {
      // Fallback to daily API
      fetch('https://aihot.virxact.com/api/public/daily/' + dateStr)
        .then(function(r) { return r.json(); })
        .then(function(dailyData) {
          renderAll(dailyData);
          document.getElementById('loadingOverlay').style.opacity = '0';
          setTimeout(function() { document.getElementById('loadingOverlay').style.display = 'none'; }, 400);
          showToast('已加载 ' + dateStr + ' 日报');
        })
        .catch(function() {
          showToast('加载失败，网络请求受限');
          document.getElementById('loadingOverlay').style.opacity = '0';
          setTimeout(function() { document.getElementById('loadingOverlay').style.display = 'none'; }, 400);
        });
    });
}
function initScrollAnim() {
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }
    });
  }, { threshold: 0.05, rootMargin: '0px 0px -20px 0px' });
  document.querySelectorAll('.card').forEach(function(c) { observer.observe(c); });
}
var toastTimer;
function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.classList.remove('show'); }, 2500);
}
function slugify(s) { return s.replace(/[\/\s]/g, '-'); }
function escHtml(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
function shortSource(name) {
  if (!name) return '';
  // Group all X/Twitter sources under "X"
  if (/^X[：:]/.test(name)) return 'X';
  var trimmed = name.replace(/（.*?）/g,'').replace(/\(.*?\)/g,'').trim();
  return trimmed.length > 16 ? trimmed.slice(0, 16) + '...' : trimmed;
}
function fmtDate(dateStr) {
  if (!dateStr) return '';
  var d = new Date(dateStr + 'T00:00:00+08:00');
  var mm = d.getMonth() + 1;
  var dd = d.getDate();
  var days = ['日','一','二','三','四','五','六'];
  return mm + ' 月 ' + dd + ' 日 周' + days[d.getDay()];
}
function fmtDateShort(iso) { return iso ? iso.slice(0, 10) : ''; }
function relTime(date) {
  var now = Date.now();
  var diff = now - date.getTime();
  var mins = Math.floor(diff / 60000);
  var hours = Math.floor(mins / 60);
  if (diff < 0) return '刚刚';
  if (mins < 1) return '刚刚';
  if (mins < 60) return mins + ' 分钟前';
  if (hours < 24) {
    var hh = String(date.getHours()).padStart(2,'0');
    var mm = String(date.getMinutes()).padStart(2,'0');
    var period = date.getHours() < 12 ? '上午' : (date.getHours() < 18 ? '下午' : '晚上');
    return '今天' + period + ' ' + hh + ':' + mm;
  }
  return fmtDateShort(date.toISOString());
}
function relTimeStr(isoStr) {
  if (!isoStr) return '';
  var d = new Date(isoStr);
  return relTime(d);
}
</script>
