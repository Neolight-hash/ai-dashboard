<html lang="zh-CN">
<head>

  .main { max-width: 960px; margin: 0 auto; padding: 24px 16px 60px; }

  .card.visible { opacity: 1; transform: translateY(0); }

    font-size: 11px;

  .source-btn {

  .read-btn {

    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    color: var(--text3);

  }

  .time-badge { font-size: 11px; color: var(--text3); display: block; margin-bottom: 8px; }

<body>
<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>

      <button class="modal-btn secondary" onclick="closeModal()">取消</button>

  </div>
</div>
<div class="toast" id="toast"></div>
<div class="hero">

  </div>

"title_en": "OpenClaw 龙虾之父教你省钱：开源 Skill 给你的 Skill 减肥", "url": "https://www.ithome.com/0/955/269.htm", "source": "IT之家（RSS）", "publishedAt": "2026-05-26T05:37:26.000Z", "summary": "\"龙虾之父\"Peter 开源了 skill-cleaner 工具，用于诊断和优化 AI 智能体的技能提示词。该工具包含5项核心功能，包括技能提示词预算审计、重复技能检测、未使用技能筛查、技能根目录审计和描述精简优化。其脚本采用标准 token 预算核算逻辑，旨在帮助减少冗长描述对 token 预算和上下文窗口的占用。已有用户实践显示，将技能描述从90多词精简至40词以内，能提升智能体选择技能的准确率。", "category": "tip"}, {"id": "cmpm8mi1b0miusl01tr5zuge8", "title": "面壁智能开源 MiniCPM5-1B：在 AA-Index 上超越所有 2B 参数以下模型，能跑在手机、浏览器上", "title_en": null, "url": "https://www.ithome.com/0/955/267.htm", "source": "IT之家（RSS）", "publishedAt": "2026-05-26T05:13:08.000Z", "summary": "面壁智能开源其新一代端侧大语言模型MiniCPM5-1B。该模型仅1B参数，在AA-Index榜单上超越所有2B参数以下模型，相比3个月前的Qwen3.5-2B效果更优且参数量减半。经INT4量化后权重仅0.5GB，支持在手机和浏览器上运行。其Base Model版本由面壁智能自主研发的AI训练框架ForgeTrain预训练完成，现已全面开源模型权重、训练数据集与部署方案。", "category": "ai-models"}, {"id": "cmpm6hb7i0m09sl01wqopbsoh", "title": "谷歌 AI 框架 AlphaProof Nexus 攻克 2 道悬置 56 年数学难题", "title_en": null, "url": "https://www.ithome.com/0/955/261.htm", "source": "IT之家（RSS）", "publishedAt": "2026-05-26T04:54:06.000Z", "summary": null, "category": "ai-models"}, {"id": "cmpm48qo90leysl017xmm4vhl", "title": "Kling AI驱动《大卫之家》实现多项行业首创", "title_en": "Jon Erwin - Founder & CCO of Wonder Project， CEO of Innovative Dreams， Creator of Amazon Prime hit s…", "url": "https://x.com/Kling_ai/status/2059121691385622761", "source": "X：可灵 Kling AI (@Kling_ai)", "publishedAt": "2026-05-26T03:57:22.000Z", "summary": "Jon Erwin - Wonder Project创始人兼首席创意官，Innovative Dreams首席执行官，亚马逊Prime热门剧集《大卫之家》创作者：\n\n\"Kling AI是《大卫之家》第一季和第二季背后的核心力量。最让我兴奋的是它实现了多项行业首创：在完成的剧集中首次使用AI生成场景，首个原生4K模型。其运动控制功能也使我们能够在AI生成中保留演员真实的情感和感受。\"", "category": "ai-products"}, {"id": "cmpm1qxvl0ktesl01chbln28n", "title": "腾讯混元新翻译模型双榜亮眼，小程序发布", "title_en": "🙏 Thank you all for the incredible love and support！ Our latest Tencent Hunyuan translation model…", "url": "https://x.com/TencentHunyuan/status/2059104921778352626", "source": "X：腾讯混元 (@TencentHunyuan)", "publishedAt": "2026-05-26T02:50:44.000Z", "summary": "腾讯混元发布翻译模型 Hy-MT2，在 Hugging Face 开源模型趋势排行榜上表现突出：1.8B 版本排名第一，30B-A3B（MoE）版本排名第四，下载量已超 7K。官方同步推出了基于该模型的\"腾讯混译\"微信小程序，支持语音输入与离线翻译，并可自定义翻译风格与指令。模型代码与权重已开源。", "category": "ai-models"}, {"id": "cmplvrbvr0ja8sl01cwts44vh", "title": "Anthropic 新模型震动金融圈，欧洲央行紧急开会要求升级网络防御", "title_en": null, "url": "https://www.ithome.com/0/955/090.htm", "source": "IT之家（RSS）", "publishedAt": "2026-05-25T23:53:30.000Z", "summary": null, "category": "industry"}, {"id": "cmplva72h0j6jsl01yvgbp7mk", "title": "微软 Copilot Cowork 存在文件泄露问题", "title_en": null, "url": "https://www.promptarmor.com/resources/microsoft-copilot-cowork-exfiltrates-files", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "publishedAt": "2026-05-25T23:25:48.799Z", "summary": null, "category": "paper"}, {"id": "cmpltm5n30is2sl015yqdvfvt", "title": "OpenAI GPT-5.6 模型曝下月发布：AI 上下文 150 万 tokens", "title_en": null, "url": "https://www.ithome.com/0/955/078.htm", "source": "IT之家（RSS）", "publishedAt": "2026-05-25T22:59:12.000Z", "summary": "多名开发者在 OpenAI Codex 后端日志中发现未官宣的 GPT-5.6 模型，内部代号 iris-alpha。该模型将支持 150 万 token 的上下文窗口，较当前 GPT-5.5 的 105 万 token 提升约 43%，有望于今年 6 月发布。测试显示，在输入达到 90 万 token 时仍能流畅响应。同系列还发现了 ember-alpha 与 beacon-alpha 版本。此外，GPT-5.6 在前端界面生成能力上也有所提升。基于爆料信息，Anthropic Claude、Google Gemini 及 xAI Grok 也可能瞄准同期发布新模型。", "category": "industry"}, {"id": "cmplmpmdq0h63sl013njdyiug", "title": "苹果据称正使用定制版1.2T参数Google模型重塑下一代Siri", "title_en": "Apple isn't just adding Gemini to Siri. It is reportedly using a custom 1.2T-parameter Google model …", "url": "https://x.com/kimmonismus/status/2058997271803674991", "source": "X：Kim (@kimmonismus)", "publishedAt": "2026-05-25T19:42:58.000Z", "summary": "据报道，苹果为改造下一代Siri，正使用一个定制版、参数规模达1.2T的Google大模型作为其核心，这显著大于预估约300B参数的Gemini 3.5 Flash。该模型将驱动Siri的部分功能，其中简单查询预期会在本地设备运行。苹果面临的关键挑战是确保该大模型能够足够快速地响应日常问题。此外，下个月AI领域预计将有多项重要发布，包括WWDC上的Apple Intelligence与Gemini整合、GPT-5.6、可能的Sonnet 4.8/Opus 4.8，以及已确认的Gemini 3.5 Pro。", "category": "industry"}, {"id": "cmplkklsy0gnysl019nmpl677", "title": "Anthropic联合创始人Chris Olah在教皇通谕发布会上的讲话", "title_en": "Anthropic co-founder Chris Olah's remarks on Pope Leo XIV's encyclical \"Magnifica humanitas\"", "url": "https://www.anthropic.com/news/chris-olah-pope-leo-encyclical", "source": "Anthropic：Newsroom（网页）", "publishedAt": "2026-05-25T18:58:16.220Z", "summary": "Anthropic联合创始人Chris Olah在梵蒂冈出席教皇Leo XIV关于AI的通谕发布会。他指出，所有前沿AI实验室都面临商业、研究及地缘政治等多重压力，这可能与做正确的事相冲突，因此外部监督至关重要。他强调，AI模型并非像飞机那样被工程化构建，而是基于人类语言和思想\"生长\"出来的，其内在性质可能复杂难解。他提出三个需审慎思考的问题：如何确保AI发展的全球收益公平分享、如何思考AI时代的人类繁荣，以及AI模型内在性质的本质。他呼吁社会各界，尤其是宗教与民间团体，严肃审视AI发展并引导其向善。", "category": "tip"}, {"id": "cmplja6yg0gb1sl01686zrkeo", "title": "Grok Build Beta版向SuperGrok用户开放", "title_en": "Grok Build is now available in Beta for all SuperGrok and X Premium+ users. Use Plan Mode， create i…", "url": "https://x.com/xai/status/2058973760708091907", "source": "X：xAI (@xai)", "publishedAt": "2026-05-25T18:09:33.000Z", "summary": "Grok Build 现已面向所有 SuperGrok 和 X Premium+ 用户推出 Beta 版。\n使用 Plan Mode，通过 Imagine 创建图像和视频，并使用 CLI 构建自动化或编排器。\n访问 http：//x.ai/cli 开始使用。", "category": "ai-products"}, {"id": "cmpldyuyz0f2nsl01au9kw3uf", "title": "Qwen3.7-Max隐式缓存功能上线", "title_en": "✅Implicit caching is now live on Qwen3.7-Max - kicks in automatically， no setup needed. ⚡️Faster + …", "url": "https://x.com/Alibaba_Qwen/status/2058932656797368619", "source": "X：通义千问 / Qwen (@Alibaba_Qwen)", "publishedAt": "2026-05-25T15:26:13.000Z", "summary": "✅隐式缓存现已在Qwen3.7-Max上线--自动启用，无需设置。\n⚡️开箱即用，更快更便宜。\n\n需要更高、更确定的命中率？请尝试显式缓存。🙌\n🔗最佳实践🔗：https：//www.alibabacloud.com/help/en/model-studio/explicit-cache-best-practice", "category": "ai-products"}, {"id": "cmpldcxz10ew3sl01caeact4o", "title": "教皇里奥呼吁在AI时代保持\"深刻的人性\"", "title_en": "Pope Leo calls for being 'profoundly human' in the age of AI", "url": "https://www.theverge.com/news/936945/pope-leo-letter-encyclical-ai-anthropic-labor-warfare", "source": "The Verge：AI（RSS）", "publishedAt": "2026-05-25T15:05:07.000Z", "summary": "教皇里奥十四世在首份重要通谕《Magnifica Humanitas》中警告了AI及不受约束的技术力量带来的风险。该通谕于2026年5月15日发布，是教皇关于\"在人工智能时代守护人\"的宣言。文件重点讨论了AI驱动战争的危险、AI对劳动的影响，以及建立新的法律和伦理框架来规范技术的必要性，强调AI的快速普及正造成经济和社会动荡，对个人的保护不足威胁着人类尊严。", "category": "industry"}, {"id": "cmpkr0wyr09fisl01izzkuo8q", "title": "华为何庭波\"韬定律\"论文发布，逻辑折叠技术提升芯片性能", "title_en": "不依赖新光刻工艺！麒麟 2027、昇腾 990 芯片在路上，华为何庭波\"韬定律\"论文要点大揭秘", "url": "https://www.ithome.com/0/954/778.htm", "source": "IT之家（RSS）", "publishedAt": "2026-05-25T04:27:21.000Z", "summary": "华为何庭波在ISCAS 2026上提出\"韬定律\"，并介绍逻辑折叠（LogicFolding）技术。该技术通过三维空间拓扑重组提升芯片性能，不依赖新光刻工艺。在麒麟2026芯片测试中，晶体管密度从155 MTr/mm2提升至238 MTr/mm2，性能核心能效提高41%，最大时钟频率提升近13%。论文显示，麒麟2027芯片已进入Silicon状态，后续规划包括麒麟2028、2029。AI芯片方面，昇腾990计划在2030年左右引入逻辑折叠，硬件集成预计到2035年提高超过100倍。", "category": "paper"}, {"id": "cmpkovqp508w4sl01zz63gssx", "title": "面壁智能联合清华等开源中国首个基于华为昇腾训练的 1.58-bit 端侧大模型 BitCPM-CANN", "title_en": null, "url": "https://www.ithome.com/0/954/759.htm", "source": "IT之家（RSS）", "publishedAt": "2026-05-25T03:48:30.000Z", "summary": null, "category": "ai-models"}, {"id": "cmpm8v6b70mknsl01qf8lgf1r", "title": "通过奖励倾斜分布匹配强化少步生成器", "title_en": "Reinforcing Few-step Generators via Reward-Tilted Distribution Matching", "url": "https://arxiv.org/abs/2605.26108", "source": "HuggingFace Daily Papers（社区热门论文）", "publishedAt": "2026-05-25T00:00:00.000Z", "summary": "本文提出奖励倾斜分布匹配蒸馏（RTDMD），这是一个将分布匹配蒸馏与奖励引导强化学习统一应用于少步流生成器的两阶段框架。该方法通过最小化到奖励倾斜教师分布的KL散度，自然分解为分布匹配项与奖励最大化项。第一阶段引入环境一致分布匹配蒸馏（AC-DMD），在子区间进行分布匹配，并通过一致性正则化辅助分数模型追踪生成器分布。第二阶段联合优化两项，并推导混合策略梯度及步子集GRPO（SubGRPO）以降低方差。在SD3、SD3.5和FLUX.2上的实验表明，RTDMD仅用4步推理即可在偏好、美学和组合指标上达到新的 state-of-the-art。", "category": "paper"}, {"id": "cmpleus3t0f8rsl01ztd88k2u", "title": "Harness、Scaffold 与 AI 智能体术语辨析", "title_en": "Harness， Scaffold， and the AI Agent Terms Worth Getting Right", "url": "https://huggingface.co/blog/agent-glossary", "source": "Hugging Face：Blog（RSS）", "publishedAt": "2026-05-25T00:00:00.000Z", "summary": "本文旨在厘清 AI 智能体领域中易混淆的关键术语。文章指出，模型（如 Claude、GPT）本身是无记忆、无循环的大语言模型。其行为由\"Scaffolding\"（行为定义层，如系统提示、工具描述）塑造，而\"Harness\"（执行层）负责调用模型、处理工具调用与控制循环，是智能体运行的核心。两者结合，模型才能成为智能体。文章以 Claude Code、Codex 为例，说明同一模型搭配不同 Harness 会产生迥异体验，并提出了 Agent = Model + Harness 的常见理解框架。术语尚未统一，本文旨在提供一个实用的心智模型。", "category": "tip"}, {"id": "cmpkd0u6q05zssl01cy9jq6ro", "title": "Luma Agents 实现规模化真实 UGC 广告生成", "title_en": "Authenticity at scale used to be a contradiction. Not anymore. Define the brief. Set the style. Lum…", "url": "https://x.com/LumaLabsAI/status/2058672731705503959", "source": "X：Luma AI (@LumaLabsAI)", "publishedAt": "2026-05-24T22:13:22.000Z", "summary": "规模化的真实性曾是矛盾，如今已成现实。\n定义简报，设定风格，Luma Agents 从这里构建每一条 UGC 风格广告。\n让它真实 → http：//lumalabs.ai/app", "category": "ai-products"}, {"id": "cmpk417ey03vssl01z5zsemms", "title": "DeepSeek将对其旗舰AI模型实施永久性75%折扣", "title_en": null, "url": "https://www.bloomberg.com/news/articles/2026-05-23/deepseek-to-make-permanent-75-discount-on-flagship-ai-model", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "publishedAt": "2026-05-24T18:08:57.964Z", "summary": null, "category": "industry"}, {"id": "cmpk270zc03fusl01q0nprvlc", "title": "面向 Codex 的自我优化提示词框架", "title_en": "self improvement prompt for codex", "url": "https://x.com/gdb/status/2058598608224858442", "source": "X：Greg Brockman (@gdb)", "publishedAt": "2026-05-24T17:18:49.000Z", "summary": "这是一个结构化的提示词，用于指导 Codex 自动分析其历史记录以识别并固化重复工作流。该框架要求 Codex 回顾会话、Memories 等数据，找出重复、耗时且有明确复用价值的任务。筛选标准包括至少出现两次、输入稳定、可提升效率等。最终，Codex 应以\"技能\"、子智能体或自动化工具等最小实用形式创建或扩展现有资产，避免冗余。流程包括生成候选清单、执行创建，并汇报结果与待验证项。", "category": "tip"}, {"id": "cmpjzqznj02vssl01si4neefz", "title": "TrapDoor供应链攻击：AI助手成新型攻击面", "title_en": "A coordinated supply chain attack called \"TrapDoor\" just hit npm， PyPI， and Crates. io simultaneousl…", "url": "https://x.com/kimmonismus/status/2058584943052161488", "source": "X：Kim (@kimmonismus)", "publishedAt": "2026-05-24T16:24:31.000Z", "summary": "一场名为\"TrapDoor\"的协调供应链攻击同时袭击了npm、PyPI和Crates.io，涉及34个恶意包，旨在窃取加密货币、AI和安全开发者的钱包、SSH密钥和云凭证。攻击的新手段是向流行开源项目提交Pull Request，注入被操纵的`CLAUDE.md`和`.cursorrules`配置文件。当开发者克隆仓库并使用Claude Code或Cursor等AI助手时，AI智能体会将这些文件当作可信指令执行，可能在开发者不知情下运行恶意命令。这是首次将AI助手作为攻击面。", "category": "industry"}, {"id": "cmpjxfqq702cosl01objnyl15", "title": "Pixverse角色设计工作流测试", "title_en": "Character design workflow test in Pixverse GPT Image 2.0 for Lucas' visual identity， Seedance 2.0 fo…", "url": "https://x.com/PixVerse_/status/2058564994669727803", "source": "X：PixVerse (@PixVerse_)", "publishedAt": "2026-05-24T15:05:15.000Z", "summary": "在Pixverse中进行角色设计工作流测试\n使用GPT Image 2.0为Lucas创建视觉形象，使用Seedance 2.0制作动画弹跳表演。\n从静态概念图到电影级动态效果。\nRT + Follow + Reply = 工作流", "category": "tip"}, {"id": "cmpjvghde01ussl01m021o6bq", "title": "格雷格·布罗克曼：那段差点让OpenAI覆灭的72小时", "title_en": null, "url": "https://fs.blog/knowledge-project-podcast/greg-brockman", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "publishedAt": "2026-05-24T14:09:49.425Z", "summary": null, "category": "tip"}, {"id": "cmpjqgwu200n8sl01vthwo9pr", "title": "Claude Code自动模式：多任务并行的关键技巧", "title_en": "People often ask what my biggest tip is for getting the most out of Claude Code. These days my #1 t…", "url": "https://x.com/bcherny/status/2058519809214607704", "source": "X：Boris Cherny (@bcherny)", "publishedAt": "2026-05-24T12:05:42.000Z", "summary": "人们常问我，用好Claude Code的最大技巧是什么。\n如今我的头号技巧是：使用自动模式。\n自动模式意味着不再有权限提示。它是实现\"多Claude并行\"的关键构件：启动一个会话，然后在其运行时，并行处理另一个会话。", "category": "tip"}, {"id": "cmpj9ln4013s6sljw06oz5ujz", "title": "OpenClaw 2026.5.22发布：性能优化与安全加固", "title_en": "OpenClaw 2026.5.22 is live ⚡ Gateway/model startup paths got leaner 🧠 /models drops to ~5ms 🔒 npm…", "url": "https://x.com/openclaw/status/2058397616124072274", "source": "X：OpenClaw (@openclaw)", "publishedAt": "2026-05-24T04:00:09.000Z", "summary": "OpenClaw 2026.5.22 已上线\n\n⚡ Gateway/模型启动路径更精简\n🧠 /models 响应时间降至约5毫秒\n🔒 npm包现提供锁定依赖项\n🪟 Windows安装/更新路径更安全\n\n等待更少，意外更少。\nhttps：//github.com/openclaw/openclaw/releases/tag/v2026.5.22", "category": "ai-products"}, {"id": "cmpivt5vv10hnsljwzwzhpe7k", "title": "StepAudio 2.5实时语音发布：副语言感知与人格化交互", "title_en": "StepAudio 2.5 Realtime is live！ Real-time voice that picks up what you actually mean - tone， pace，…", "url": "https://x.com/StepFun_ai/status/2058303294544425197", "source": "X：阶跃星辰 StepFun (@StepFun_ai)", "publishedAt": "2026-05-23T21:45:21.000Z", "summary": "StepAudio 2.5 Realtime是一款实时语音模型，能够深度理解用户语音中的语气、语速、停顿乃至微表情等副语言特征。它支持通过API接入自定义人格，允许设定个性、背景故事和语言风格，并提供了上万种原生人格选项，可组合出数百万种特征。产品还内置了5个可直接体验的预设人格，并经过RLHF调优，确保在复杂的角色扮演压力测试中也能保持角色一致性。该模型支持中文和英文。", "category": "ai-products"}, {"id": "cmpiq2r6p0z5bsljwnmtrw2la", "title": "Replit Agent与Squidler集成，实现全自动化AI质量保障", "title_en": "Replit Agent builds your app. Squidler tests it like a real user. Replit Agent fixes what's broken. …", "url": "https://x.com/Replit/status/2058261705998602548", "source": "X：Replit (@Replit)", "publishedAt": "2026-05-23T19:00:06.000Z", "summary": "Replit Agent与Squidler已完成集成，形成一套完整的AI驱动质量保障闭环。用户可通过自然语言描述应用功能，由Replit Agent负责构建。构建完成后，Squidler会像真实用户一样对线上应用进行自动化测试，无需编写任何测试脚本。测试中发现的问题会自动反馈给Replit Agent进行修复。该流程已通过Squidler加入Replit的MCP库正式上线，实现了从构建、测试到修复的全自动化，显著降低了应用测试与维护的门槛。", "category": "ai-products"}, {"id": "cmpijo6pj0xnmsljwps8cgh8g", "title": "消息称 Anthropic 最快下周完成逾 300 亿美元融资，有望推动估值反超 OpenAI", "title_en": null, "url": "https://www.ithome.com/0/954/452.htm", "source": "IT之家（RSS）", "publishedAt": "2026-05-23T15:12:40.000Z", "summary": "据彭博社报道，Anthropic即将完成一轮超300亿美元的融资，最快可能于下周敲定。此轮融资将使其估值突破9000亿美元，正式超越OpenAI，成为全球估值最高的AI初创企业。融资的迅速推进反映了市场的强烈追捧。同时，公司营收高速增长，预计第二季度营收将达109亿美元，环比增长超一倍，有望迎来首个盈利季度。", "category": "industry"}, {"id": "cmpi5yk550udosljwr18jxglb", "title": "加倍投入科学以赢得工业AI", "title_en": "Doubling Down on Science to Win Industrial AI May 22， 2026 Mistral AI", "url": "https://mistral.ai/news/science-to-win-industrial-ai", "source": "Mistral AI：News（网页）", "publishedAt": "2026-05-23T09:46:00.745Z", "summary": "Mistral AI宣布与物理AI先驱Emmi AI达成最终收购协议，旨在加强其在工业AI领域的领导地位。通过整合Emmi AI在物理仿真与数字孪生方面的专长，Mistral AI将提升其工程解决方案能力，并加速科学研发路线。Emmi AI的30余名研究员与工程师将加入Mistral AI团队，共同构建由物理AI驱动的综合技术栈。此次合作将为航空航天、汽车等高风险行业提供实时仿真与复杂问题解决平台，推动工业研发的突破性进展。", "category": "industry"}, {"id": "cmpi0q0io0t35sljw0xlwakj6", "title": "飞书-Claude Code桥接开源项目", "title_en": "如果你同时用飞书和 Claude Code 的话，Zara Zhang这个开源项目 feishu-claude-code-bridge 值得一试，它可以让你在飞书里面直接连接 Claude Code，…", "url": "https://x.com/dotey/status/2058084478459826432", "source": "X：宝玉 (@dotey)", "publishedAt": "2026-05-23T07:15:51.000Z", "summary": "feishu-claude-code-bridge是一个开源项目，可实现飞书与本机Claude Code CLI的双向连接。用户能从飞书消息中直接指挥Claude Code执行任务，Claude也能读取飞书中的工作上下文并创建、编辑飞书文档。其工作原理是将飞书消息转为Prompt通过命令行调用Claude CLI，并将流式输出实时同步回飞书。该模式可扩展连接Codex等其他本地工具。需注意，2026年6月15日起，Claude订阅计划对`claude -p`模式将独立计费。", "category": "tip"}, {"id": "cmphwpi4y0s4ysljwoypw5kck", "title": "微软称，使用人工智能的成本高于支付人工工资", "title_en": null, "url": "https://fortune.com/2026/05/22/microsoft-ai-cost-problem-tokens-agents", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "publishedAt": "2026-05-23T05:23:21.531Z", "summary": "微软发布报告指出，在特定工作场景中，部署和使用人工智能（AI）的成本目前已高于支付相应的人工工资。报告分析了基于\"tokens\"（令牌）和\"agents\"（智能体）的AI使用模式，发现其综合开销超过了雇佣人类员工完成同类任务的费用。这一发现揭示了当前企业应用AI技术面临的现实经济挑战。", "category": "industry"}, {"id": "cmphqn8pz0qnlsljwi7q35oae", "title": "Kling AI亮相戛纳，推动AI赋能电影制作", "title_en": "Debut in Cannes | Kling AI Conference Highlights On May 18， Kling AI hosted its official conference…", "url": "https://x.com/Kling_ai/status/2058013861404684739", "source": "X：可灵 Kling AI (@Kling_ai)", "publishedAt": "2026-05-23T02:35:15.000Z", "summary": "Kling AI在戛纳电影市场（Marché du Film）举办官方会议，首次登上这一世界顶级电影舞台。会议汇集全球电影专业人士，共同探讨AI如何融入实际电影制作流程。Kling AI已证明其能力可服务于动画长片、好莱坞剧集、实验短片及影院电影等多种创作形式。未来，Kling AI将继续推进电影级AI影像技术，与全球创作者合作，将更多\"不可能\"的故事呈现在银幕上。", "category": "industry"}, {"id": "cmphp7csm0qaxsljwnztpsgpc", "title": "Models.dev：一个关于人工智能模型规格、定价和功能的开源数据库", "title_en": null, "url": "https://github.com/anomalyco/models.dev", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "publishedAt": "2026-05-23T01:39:14.985Z", "summary": "近期发布了开源数据库Models.dev，专门收录人工智能模型的各项规格、定价及功能信息。该项目在GitHub公开，便于开发者查询和比较不同AI模型。其在Hacker News社区获得101点关注度，显示出技术社区对这类集中化、透明化的模型信息资源的较大兴趣。", "category": "ai-products"}, {"id": "cmphmn2560pnrsljwzrhpl8vs", "title": "扩大与新加坡合作，推动AI安全规模化部署", "title_en": "We're expanding our partnership with Singapore to help safely deploy AI at scale. 🇸🇬 Together wit…", "url": "https://x.com/GoogleDeepMind/status/2057985225100235022", "source": "X：Google DeepMind (@GoogleDeepMind)", "publishedAt": "2026-05-23T00:41:27.000Z", "summary": "我们正在扩大与新加坡的合作，以帮助安全地大规模部署AI。🇸🇬\n\n与各国专家合作，我们的新项目将重点加速科学发现、加强大流行病防范并改善医疗保健。\n\n了解更多 → https：//goo.gle/49jGwjv", "category": "industry"}, {"id": "cmphld9mr0pcfsljwy8xhd1kg", "title": "AI 替代入门级工作：科技行业受裁员冲击最重，74% CEO 冻结或缩减招聘", "title_en": null, "url": "https://www.ithome.com/0/954/235.htm", "source": "IT之家（RSS）", "publishedAt": "2026-05-23T00:05:55.000Z", "summary": "奥纬咨询研究发现，AI工具正被广泛用于入门级任务，导致企业招聘重心转向高级岗位，年轻人求职难度加大。科技行业受冲击最严重，74%的CEO已冻结或缩减招聘。计划削减初级岗位的比例从17%跃升至43%，而招聘转向中层岗位的比例则升至30%。尽管超90%的企业在部署AI，但多数仍处试点阶段。报告警告，过快裁员或忽视初级人才储备，可能对人才梯队造成长远风险。", "category": "industry"}, {"id": "cmphlmb8l0peosljw5rpq8dt2", "title": "Nemotron-Labs 扩散语言模型实现光速级文本生成", "title_en": "Towards Speed-of-Light Text Generation with Nemotron-Labs Diffusion Language Models", "url": "https://huggingface.co/blog/nvidia/nemotron-labs-diffusion", "source": "Hugging Face：Blog（RSS）", "publishedAt": "2026-05-23T00:02:03.000Z", "summary": "NVIDIA 在 Hugging Face 发布了关于 Nemotron-Labs 扩散语言模型的技术博客。该研究聚焦于通过扩散语言模型架构大幅提升文本生成速度，目标是逼近\"光速级\"生成效率。文章可能介绍了该模型在生成速度上的突破，以及相较于传统自回归模型在延迟和吞吐量方面的性能优势。具体技术细节或对比数据需参考原文。", "category": "paper"}, {"id": "cmphirw6f0oqmsljw84zngzfo", "title": "AlphaProof Nexus：用形式化验证驱动AI数学证明搜索", "title_en": "Google DeepMind's new paper. Shows that AI can now search formal mathematics proofs， but only insid…", "url": "https://x.com/rohanpaul_ai/status/2057954067146781151", "source": "X：Rohan Paul (@rohanpaul_ai)", "publishedAt": "2026-05-22T22:37:39.000Z", "summary": "Google DeepMind提出了AlphaProof Nexus系统，它将大型语言模型与Lean形式化验证工具相结合。该系统允许LLM在生成证明的过程中，不断读取Lean的编译错误并进行修正，还可调用更强的工具辅助解决子问题。这一机制迫使模型将每一步逻辑都转化为可编译、可验证的代码，从而将其角色从\"令人信服的叙述者\"转变为\"候选方案生成器\"。在针对353个Erdős问题和492个开放猜想的测试中，系统成功解决了9个Erdős问题并证明了44个序列猜想。该研究展示了形式化验证在暴露AI逻辑错误、建立\"人类提问-模型探索-验证器把关\"新分工中的关键作用。", "category": "paper"}, {"id": "cmphj83pb0oufsljw1o50bxte", "title": "黄仁勋：AI 基建年度开支要冲到 4 万亿美元！", "title_en": null, "url": "https://www.ithome.com/0/954/223.htm", "source": "IT之家（RSS）", "publishedAt": "2026-05-22T22:30:03.000Z", "summary": "英伟达发布2027财年Q1财报，营收816亿美元，同比增长85%，净利润583亿美元，翻两倍多，市值达5.7万亿美元，已超德国2026年GDP预测。黄仁勋预测，超大规模云厂商的AI基建年度开支将从当前的1万亿美元，增长至3-4万亿美元，远超华尔街预期。财报同时显示，数据中心业务营收752亿美元，占比超九成。值得注意的是，AI基建的高能耗正推高居民电费，数据中心用电成本转嫁效应已初步显现。", "category": "industry"}, {"id": "cmphi58uq0olfsljw5hm9fmom", "title": "动作捕捉与角色动画制作更轻松", "title_en": "motion capture and character animation have never been easier. keep building &amp； more features c…", "url": "https://x.com/ViggleAI/status/2057947352195858568", "source": "X：Viggle AI (@ViggleAI)", "publishedAt": "2026-05-22T22:10:58.000Z", "summary": "动作捕捉和角色动画制作从未如此简单。\n\n持续构建，更多功能即将推出！", "category": "ai-products"}, {"id": "cmphhu4x20ohusljw43utrbfd", "title": "v2.1.149 更新摘要", "title_en": "v2.1.149", "url": "https://github.com/anthropics/claude-code/releases/tag/v2.1.149", "source": "Claude Code：GitHub Releases（RSS）", "publishedAt": "2026-05-22T22:09:29.000Z", "summary": "本次 v2.1.149 更新包含功能增强、企业设置和多项修复。新增 `/usage` 命令的使用量分类显示功能，可区分技能、子代理、插件及每个 MCP 服务器的消耗；`/diff` 详情视图支持键盘滚动；Markdown 输出兼容 GFM 任务列表。企业版新增 `allowAllClaudeAiMcps` 设置以加载云 MCP 连接器。修复了 PowerShell 权限绕过、Git 工作树沙盒写入白名单越界、脚本路径含空格时 `otelHeadersHelper` 静默失败等安全问题。改进了 `/feedback` 报告，包含上下文压缩前的对话内容，便于排查长会话中的早期问题。", "category": "ai-products"}, {"id": "cmphi2mo10ojusljwzc35z3mk", "title": "Claude自动模式新增Pro计划与模型支持", "title_en": "Two updates to auto mode： · Now available on the Pro plan · Sonnet 4.6 is now supported， alongside …", "url": "https://x.com/ClaudeDevs/status/2057946803685974482", "source": "X：Claude Devs (@ClaudeDevs)", "publishedAt": "2026-05-22T22:08:47.000Z", "summary": "自动模式的两项更新：\n\n· 现已在Pro计划中提供\n· 现已支持Sonnet 4.6，以及Opus 4.7\n\n按下Shift+tab，让Claude运行。", "category": "ai-products"}, {"id": "cmphdt39c0njesljw5m72ds3y", "title": "新增差异标记样式设置选项", "title_en": "Shipped papercut： new diff markers setting in Appearance. Prefer classic + / - markers when reviewi…", "url": "https://x.com/OpenAIDevs/status/2057918624841728349", "source": "X：OpenAI Developers (@OpenAIDevs)", "publishedAt": "2026-05-22T20:16:49.000Z", "summary": "已发布剪纸功能：外观设置中新增差异标记样式。\n\n在查看差异时更喜欢经典的 + / - 标记？现在你可以选择使用它们，而不仅仅是彩色差异条。\n\n默认设置保持不变，除非你主动选择启用。", "category": "ai-products"}, {"id": "cmphbp5r30n1asljwb1oaa1ly", "title": "ChatGPT语音模式实现表单语音填写", "title_en": "Paperwork is better when you can just talk through it. With Images in ChatGPT and voice mode， you c…", "url": "https://x.com/ChatGPTapp/status/2057908052968521902", "source": "X：ChatGPT (@ChatGPTapp)", "publishedAt": "2026-05-22T19:34:48.000Z", "summary": "用对话处理文书工作更轻松。\n\n借助ChatGPT的图像功能和语音模式，您可以上传表单，说出要填写的内容，即可获得填写完成的版本。", "category": "ai-products"}, {"id": "cmph8trkr0mc4sljwb6bn498k", "title": "回顾Google I/O 2026对话环节", "title_en": "Catch up on the Dialogues stage at Google I/O 2026.", "url": "https://blog.google/innovation-and-ai/technology/ai/io-2026-dialogues-recap", "source": "Google Blog：AI（RSS）", "publishedAt": "2026-05-22T18:00:00.000Z", "summary": "在2026年Google I/O开发者大会上，对话环节聚焦于未来科技趋势。行业领导者围绕人工智能、量子计算、机器人学以及创造力等核心议题展开了深入探讨，旨在勾勒这些前沿领域的技术演进路径与发展蓝图。", "category": "industry"}, {"id": "cmph7lr9h0m0xsljwkodm366y", "title": "Kakuna：自动化加固代码库的AI代理工具", "title_en": "Kakuna： skills with checklists that only know how to harden your codebase /plan with it then let it…", "url": "https://x.com/swyx/status/2057876022553690327", "source": "X：swyx (@swyx)", "publishedAt": "2026-05-22T17:27:31.000Z", "summary": "Kakuna是一款AI代理工具，旨在将早期快速原型自动转化为可维护的生产级代码库。它通过内置的检查清单和\"计划-目标\"工作流，模拟人类开发与运维流程，在保持功能不变的前提下，自动执行代码审查、测试补充、重构等\"无聊\"工作，并强调子代理并行以提升效率。该工具是为\"人类与代理协作\"而设计的范例，其核心是\"反熵增\"与\"反代码腐化\"。例如，一次约16小时的运行能生成上百次提交，将一个脆弱的MVP转变为一个结构清晰、可长期构建的稳定项目。", "category": "tip"}, {"id": "cmph7eb1t0m08sljwk4zixd2k", "title": "Warp现已支持OpenRouter接入", "title_en": "OpenRouter is now supported in @warpdotdev！ ❤️", "url": "https://x.com/OpenRouter/status/2057875517391667492", "source": "X：OpenRouter (@OpenRouter)", "publishedAt": "2026-05-22T17:25:31.000Z", "summary": "OpenRouter现已在@warpdotdev中得到支持！❤️\n\n工程师Dagm Assefa展示了如何连接DeepSeek和OpenRouter。\n\n文档：https：//docs.warp.dev/agent-platform/inference/custom-inference-endpoint/ 🔖", "category": "ai-products"}], "sections": [{"label": "模型发布/更新", "slug": "ai-models", "count": 5, "items": [{"idx": 1, "title": "Qwen3.7-Max 成为全球第二AI编程模型", "summary": "Qwen3.7-Max 正式成为全球第二大 AI 编程模型。在 Code Arena 上得分 1541，仅次于 Claude。专为生产环境打造：可运行 35 小时任务、1000+ 次工具调用，并在数小时内交付两周的项目。", "publishedAt": "2026-05-26T06:45:01.000Z", "category": "ai-models", "sourceName": "X：阿里云 / Alibaba Cloud (@alibaba_cloud)", "sourceUrl": "https://x.com/alibaba_cloud/status/2059163881361048011"}, {"idx": 2, "title": "面壁智能开源 MiniCPM5-1B：在 AA-Index 上超越所有 2B 参数以下模型，能跑在手机、浏览器上", "summary": "面壁智能开源其新一代端侧大语言模型MiniCPM5-1B。该模型仅1B参数，在AA-Index榜单上超越所有2B参数以下模型，相比3个月前的Qwen3.5-2B效果更优且参数量减半。经INT4量化后权重仅0.5GB，支持在手机和浏览器上运行。其Base Model版本由面壁智能自主研发的AI训练框架ForgeTrain预训练完成，现已全面开源模型权重、训练数据集与部署方案。", "publishedAt": "2026-05-26T05:13:08.000Z", "category": "ai-models", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/955/267.htm"}, {"idx": 3, "title": "谷歌 AI 框架 AlphaProof Nexus 攻克 2 道悬置 56 年数学难题", "summary": "", "publishedAt": "2026-05-26T04:54:06.000Z", "category": "ai-models", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/955/261.htm"}, {"idx": 4, "title": "腾讯混元新翻译模型双榜亮眼，小程序发布", "summary": "腾讯混元发布翻译模型 Hy-MT2，在 Hugging Face 开源模型趋势排行榜上表现突出：1.8B 版本排名第一，30B-A3B（MoE）版本排名第四，下载量已超 7K。官方同步推出了基于该模型的\"腾讯混译\"微信小程序，支持语音输入与离线翻译，并可自定义翻译风格与指令。模型代码与权重已开源。", "publishedAt": "2026-05-26T02:50:44.000Z", "category": "ai-models", "sourceName": "X：腾讯混元 (@TencentHunyuan)", "sourceUrl": "https://x.com/TencentHunyuan/status/2059104921778352626"}, {"idx": 5, "title": "面壁智能联合清华等开源中国首个基于华为昇腾训练的 1.58-bit 端侧大模型 BitCPM-CANN", "summary": "", "publishedAt": "2026-05-25T03:48:30.000Z", "category": "ai-models", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/954/759.htm"}]}, {"label": "产品发布/更新", "slug": "ai-products", "count": 14, "items": [{"idx": 6, "title": "Kling AI驱动《大卫之家》实现多项行业首创", "summary": "Jon Erwin - Wonder Project创始人兼首席创意官，Innovative Dreams首席执行官，亚马逊Prime热门剧集《大卫之家》创作者：\n\n\"Kling AI是《大卫之家》第一季和第二季背后的核心力量。最让我兴奋的是它实现了多项行业首创：在完成的剧集中首次使用AI生成场景，首个原生4K模型。其运动控制功能也使我们能够在AI生成中保留演员真实的情感和感受。\"", "publishedAt": "2026-05-26T03:57:22.000Z", "category": "ai-products", "sourceName": "X：可灵 Kling AI (@Kling_ai)", "sourceUrl": "https://x.com/Kling_ai/status/2059121691385622761"}, {"idx": 7, "title": "Grok Build Beta版向SuperGrok用户开放", "summary": "Grok Build 现已面向所有 SuperGrok 和 X Premium+ 用户推出 Beta 版。\n使用 Plan Mode，通过 Imagine 创建图像和视频，并使用 CLI 构建自动化或编排器。\n访问 http：//x.ai/cli 开始使用。", "publishedAt": "2026-05-25T18:09:33.000Z", "category": "ai-products", "sourceName": "X：xAI (@xai)", "sourceUrl": "https://x.com/xai/status/2058973760708091907"}, {"idx": 8, "title": "Qwen3.7-Max隐式缓存功能上线", "summary": "✅隐式缓存现已在Qwen3.7-Max上线--自动启用，无需设置。\n⚡️开箱即用，更快更便宜。\n\n需要更高、更确定的命中率？请尝试显式缓存。🙌\n🔗最佳实践🔗：https：//www.alibabacloud.com/help/en/model-studio/explicit-cache-best-practice", "publishedAt": "2026-05-25T15:26:13.000Z", "category": "ai-products", "sourceName": "X：通义千问 / Qwen (@Alibaba_Qwen)", "sourceUrl": "https://x.com/Alibaba_Qwen/status/2058932656797368619"}, {"idx": 9, "title": "Luma Agents 实现规模化真实 UGC 广告生成", "summary": "规模化的真实性曾是矛盾，如今已成现实。\n定义简报，设定风格，Luma Agents 从这里构建每一条 UGC 风格广告。\n让它真实 → http：//lumalabs.ai/app", "publishedAt": "2026-05-24T22:13:22.000Z", "category": "ai-products", "sourceName": "X：Luma AI (@LumaLabsAI)", "sourceUrl": "https://x.com/LumaLabsAI/status/2058672731705503959"}, {"idx": 10, "title": "OpenClaw 2026.5.22发布：性能优化与安全加固", "summary": "OpenClaw 2026.5.22 已上线\n\n⚡ Gateway/模型启动路径更精简\n🧠 /models 响应时间降至约5毫秒\n🔒 npm包现提供锁定依赖项\n🪟 Windows安装/更新路径更安全\n\n等待更少，意外更少。\nhttps：//github.com/openclaw/openclaw/releases/tag/v2026.5.22", "publishedAt": "2026-05-24T04:00:09.000Z", "category": "ai-products", "sourceName": "X：OpenClaw (@openclaw)", "sourceUrl": "https://x.com/openclaw/status/2058397616124072274"}, {"idx": 11, "title": "StepAudio 2.5实时语音发布：副语言感知与人格化交互", "summary": "StepAudio 2.5 Realtime是一款实时语音模型，能够深度理解用户语音中的语气、语速、停顿乃至微表情等副语言特征。它支持通过API接入自定义人格，允许设定个性、背景故事和语言风格，并提供了上万种原生人格选项，可组合出数百万种特征。产品还内置了5个可直接体验的预设人格，并经过RLHF调优，确保在复杂的角色扮演压力测试中也能保持角色一致性。该模型支持中文和英文。", "publishedAt": "2026-05-23T21:45:21.000Z", "category": "ai-products", "sourceName": "X：阶跃星辰 StepFun (@StepFun_ai)", "sourceUrl": "https://x.com/StepFun_ai/status/2058303294544425197"}, {"idx": 12, "title": "Replit Agent与Squidler集成，实现全自动化AI质量保障", "summary": "Replit Agent与Squidler已完成集成，形成一套完整的AI驱动质量保障闭环。用户可通过自然语言描述应用功能，由Replit Agent负责构建。构建完成后，Squidler会像真实用户一样对线上应用进行自动化测试，无需编写任何测试脚本。测试中发现的问题会自动反馈给Replit Agent进行修复。该流程已通过Squidler加入Replit的MCP库正式上线，实现了从构建、测试到修复的全自动化，显著降低了应用测试与维护的门槛。", "publishedAt": "2026-05-23T19:00:06.000Z", "category": "ai-products", "sourceName": "X：Replit (@Replit)", "sourceUrl": "https://x.com/Replit/status/2058261705998602548"}, {"idx": 13, "title": "Models.dev：一个关于人工智能模型规格、定价和功能的开源数据库", "summary": "近期发布了开源数据库Models.dev，专门收录人工智能模型的各项规格、定价及功能信息。该项目在GitHub公开，便于开发者查询和比较不同AI模型。其在Hacker News社区获得101点关注度，显示出技术社区对这类集中化、透明化的模型信息资源的较大兴趣。", "publishedAt": "2026-05-23T01:39:14.985Z", "category": "ai-products", "sourceName": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://github.com/anomalyco/models.dev"}, {"idx": 14, "title": "动作捕捉与角色动画制作更轻松", "summary": "动作捕捉和角色动画制作从未如此简单。\n\n持续构建，更多功能即将推出！", "publishedAt": "2026-05-22T22:10:58.000Z", "category": "ai-products", "sourceName": "X：Viggle AI (@ViggleAI)", "sourceUrl": "https://x.com/ViggleAI/status/2057947352195858568"}, {"idx": 15, "title": "v2.1.149 更新摘要", "summary": "本次 v2.1.149 更新包含功能增强、企业设置和多项修复。新增 `/usage` 命令的使用量分类显示功能，可区分技能、子代理、插件及每个 MCP 服务器的消耗；`/diff` 详情视图支持键盘滚动；Markdown 输出兼容 GFM 任务列表。企业版新增 `allowAllClaudeAiMcps` 设置以加载云 MCP 连接器。修复了 PowerShell 权限绕过、Git 工作树沙盒写入白名单越界、脚本路径含空格时 `otelHeadersHelper` 静默失败等安全问题。改进了 `/feedback` 报告，包含上下文压缩前的对话内容，便于排查长会话中的早期问题。", "publishedAt": "2026-05-22T22:09:29.000Z", "category": "ai-products", "sourceName": "Claude Code：GitHub Releases（RSS）", "sourceUrl": "https://github.com/anthropics/claude-code/releases/tag/v2.1.149"}, {"idx": 16, "title": "Claude自动模式新增Pro计划与模型支持", "summary": "自动模式的两项更新：\n\n· 现已在Pro计划中提供\n· 现已支持Sonnet 4.6，以及Opus 4.7\n\n按下Shift+tab，让Claude运行。", "publishedAt": "2026-05-22T22:08:47.000Z", "category": "ai-products", "sourceName": "X：Claude Devs (@ClaudeDevs)", "sourceUrl": "https://x.com/ClaudeDevs/status/2057946803685974482"}, {"idx": 17, "title": "新增差异标记样式设置选项", "summary": "已发布剪纸功能：外观设置中新增差异标记样式。\n\n在查看差异时更喜欢经典的 + / - 标记？现在你可以选择使用它们，而不仅仅是彩色差异条。\n\n默认设置保持不变，除非你主动选择启用。", "publishedAt": "2026-05-22T20:16:49.000Z", "category": "ai-products", "sourceName": "X：OpenAI Developers (@OpenAIDevs)", "sourceUrl": "https://x.com/OpenAIDevs/status/2057918624841728349"}, {"idx": 18, "title": "ChatGPT语音模式实现表单语音填写", "summary": "用对话处理文书工作更轻松。\n\n借助ChatGPT的图像功能和语音模式，您可以上传表单，说出要填写的内容，即可获得填写完成的版本。", "publishedAt": "2026-05-22T19:34:48.000Z", "category": "ai-products", "sourceName": "X：ChatGPT (@ChatGPTapp)", "sourceUrl": "https://x.com/ChatGPTapp/status/2057908052968521902"}, {"idx": 19, "title": "Warp现已支持OpenRouter接入", "summary": "OpenRouter现已在@warpdotdev中得到支持！❤️\n\n工程师Dagm Assefa展示了如何连接DeepSeek和OpenRouter。\n\n文档：https：//docs.warp.dev/agent-platform/inference/custom-inference-endpoint/ 🔖", "publishedAt": "2026-05-22T17:25:31.000Z", "category": "ai-products", "sourceName": "X：OpenRouter (@OpenRouter)", "sourceUrl": "https://x.com/OpenRouter/status/2057875517391667492"}]}, {"label": "行业动态", "slug": "industry", "count": 17, "items": [{"idx": 20, "title": "SynthID水印技术扩展合作，覆盖超千亿内容", "summary": "SynthID已为超过1000亿条内容添加水印，但透明度需要行业协作。\n因此，我们正与OpenAI、ElevenLabs和Kakao合作，将SynthID水印技术集成到他们的模型中--这延续了我们与NVIDIA共同推动的全行业趋势。", "publishedAt": "2026-05-26T11:28:20.000Z", "category": "industry", "sourceName": "X：Google DeepMind (@GoogleDeepMind)", "sourceUrl": "https://x.com/GoogleDeepMind/status/2059235181274202500"}, {"idx": 21, "title": "四个月花光全年 AI 预算，Uber 总裁质疑 AI 投入合理性", "summary": "", "publishedAt": "2026-05-26T10:09:46.000Z", "category": "industry", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/955/563.htm"}, {"idx": 22, "title": "阿里云CTO阐述从云原生到智能体原生转型", "summary": "在 #QwenConference2026 上，阿里云CTO、国际业务总裁李飞飞博士阐述了我们从云原生到智能体原生的转变。为了普及AI，我们构建了四大基石：模型、智能体云、工具与服务，以及规模。\n\n👉 敬请关注：https：//click.qwencloud.com/m/20000000187/", "publishedAt": "2026-05-26T07:27:19.000Z", "category": "industry", "sourceName": "X：阿里云 / Alibaba Cloud (@alibaba_cloud)", "sourceUrl": "https://x.com/alibaba_cloud/status/2059174528786268669"}, {"idx": 23, "title": "Anthropic 新模型震动金融圈，欧洲央行紧急开会要求升级网络防御", "summary": "", "publishedAt": "2026-05-25T23:53:30.000Z", "category": "industry", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/955/090.htm"}, {"idx": 24, "title": "OpenAI GPT-5.6 模型曝下月发布：AI 上下文 150 万 tokens", "summary": "多名开发者在 OpenAI Codex 后端日志中发现未官宣的 GPT-5.6 模型，内部代号 iris-alpha。该模型将支持 150 万 token 的上下文窗口，较当前 GPT-5.5 的 105 万 token 提升约 43%，有望于今年 6 月发布。测试显示，在输入达到 90 万 token 时仍能流畅响应。同系列还发现了 ember-alpha 与 beacon-alpha 版本。此外，GPT-5.6 在前端界面生成能力上也有所提升。基于爆料信息，Anthropic Claude、Google Gemini 及 xAI Grok 也可能瞄准同期发布新模型。", "publishedAt": "2026-05-25T22:59:12.000Z", "category": "industry", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/955/078.htm"}, {"idx": 25, "title": "苹果据称正使用定制版1.2T参数Google模型重塑下一代Siri", "summary": "据报道，苹果为改造下一代Siri，正使用一个定制版、参数规模达1.2T的Google大模型作为其核心，这显著大于预估约300B参数的Gemini 3.5 Flash。该模型将驱动Siri的部分功能，其中简单查询预期会在本地设备运行。苹果面临的关键挑战是确保该大模型能够足够快速地响应日常问题。此外，下个月AI领域预计将有多项重要发布，包括WWDC上的Apple Intelligence与Gemini整合、GPT-5.6、可能的Sonnet 4.8/Opus 4.8，以及已确认的Gemini 3.5 Pro。", "publishedAt": "2026-05-25T19:42:58.000Z", "category": "industry", "sourceName": "X：Kim (@kimmonismus)", "sourceUrl": "https://x.com/kimmonismus/status/2058997271803674991"}, {"idx": 26, "title": "教皇里奥呼吁在AI时代保持\"深刻的人性\"", "summary": "教皇里奥十四世在首份重要通谕《Magnifica Humanitas》中警告了AI及不受约束的技术力量带来的风险。该通谕于2026年5月15日发布，是教皇关于\"在人工智能时代守护人\"的宣言。文件重点讨论了AI驱动战争的危险、AI对劳动的影响，以及建立新的法律和伦理框架来规范技术的必要性，强调AI的快速普及正造成经济和社会动荡，对个人的保护不足威胁着人类尊严。", "publishedAt": "2026-05-25T15:05:07.000Z", "category": "industry", "sourceName": "The Verge：AI（RSS）", "sourceUrl": "https://www.theverge.com/news/936945/pope-leo-letter-encyclical-ai-anthropic-labor-warfare"}, {"idx": 27, "title": "DeepSeek将对其旗舰AI模型实施永久性75%折扣", "summary": "", "publishedAt": "2026-05-24T18:08:57.964Z", "category": "industry", "sourceName": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://www.bloomberg.com/news/articles/2026-05-23/deepseek-to-make-permanent-75-discount-on-flagship-ai-model"}, {"idx": 28, "title": "TrapDoor供应链攻击：AI助手成新型攻击面", "summary": "一场名为\"TrapDoor\"的协调供应链攻击同时袭击了npm、PyPI和Crates.io，涉及34个恶意包，旨在窃取加密货币、AI和安全开发者的钱包、SSH密钥和云凭证。攻击的新手段是向流行开源项目提交Pull Request，注入被操纵的`CLAUDE.md`和`.cursorrules`配置文件。当开发者克隆仓库并使用Claude Code或Cursor等AI助手时，AI智能体会将这些文件当作可信指令执行，可能在开发者不知情下运行恶意命令。这是首次将AI助手作为攻击面。", "publishedAt": "2026-05-24T16:24:31.000Z", "category": "industry", "sourceName": "X：Kim (@kimmonismus)", "sourceUrl": "https://x.com/kimmonismus/status/2058584943052161488"}, {"idx": 29, "title": "消息称 Anthropic 最快下周完成逾 300 亿美元融资，有望推动估值反超 OpenAI", "summary": "据彭博社报道，Anthropic即将完成一轮超300亿美元的融资，最快可能于下周敲定。此轮融资将使其估值突破9000亿美元，正式超越OpenAI，成为全球估值最高的AI初创企业。融资的迅速推进反映了市场的强烈追捧。同时，公司营收高速增长，预计第二季度营收将达109亿美元，环比增长超一倍，有望迎来首个盈利季度。", "publishedAt": "2026-05-23T15:12:40.000Z", "category": "industry", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/954/452.htm"}, {"idx": 30, "title": "加倍投入科学以赢得工业AI", "summary": "Mistral AI宣布与物理AI先驱Emmi AI达成最终收购协议，旨在加强其在工业AI领域的领导地位。通过整合Emmi AI在物理仿真与数字孪生方面的专长，Mistral AI将提升其工程解决方案能力，并加速科学研发路线。Emmi AI的30余名研究员与工程师将加入Mistral AI团队，共同构建由物理AI驱动的综合技术栈。此次合作将为航空航天、汽车等高风险行业提供实时仿真与复杂问题解决平台，推动工业研发的突破性进展。", "publishedAt": "2026-05-23T09:46:00.745Z", "category": "industry", "sourceName": "Mistral AI：News（网页）", "sourceUrl": "https://mistral.ai/news/science-to-win-industrial-ai"}, {"idx": 31, "title": "微软称，使用人工智能的成本高于支付人工工资", "summary": "微软发布报告指出，在特定工作场景中，部署和使用人工智能（AI）的成本目前已高于支付相应的人工工资。报告分析了基于\"tokens\"（令牌）和\"agents\"（智能体）的AI使用模式，发现其综合开销超过了雇佣人类员工完成同类任务的费用。这一发现揭示了当前企业应用AI技术面临的现实经济挑战。", "publishedAt": "2026-05-23T05:23:21.531Z", "category": "industry", "sourceName": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://fortune.com/2026/05/22/microsoft-ai-cost-problem-tokens-agents"}, {"idx": 32, "title": "Kling AI亮相戛纳，推动AI赋能电影制作", "summary": "Kling AI在戛纳电影市场（Marché du Film）举办官方会议，首次登上这一世界顶级电影舞台。会议汇集全球电影专业人士，共同探讨AI如何融入实际电影制作流程。Kling AI已证明其能力可服务于动画长片、好莱坞剧集、实验短片及影院电影等多种创作形式。未来，Kling AI将继续推进电影级AI影像技术，与全球创作者合作，将更多\"不可能\"的故事呈现在银幕上。", "publishedAt": "2026-05-23T02:35:15.000Z", "category": "industry", "sourceName": "X：可灵 Kling AI (@Kling_ai)", "sourceUrl": "https://x.com/Kling_ai/status/2058013861404684739"}, {"idx": 33, "title": "扩大与新加坡合作，推动AI安全规模化部署", "summary": "我们正在扩大与新加坡的合作，以帮助安全地大规模部署AI。🇸🇬\n\n与各国专家合作，我们的新项目将重点加速科学发现、加强大流行病防范并改善医疗保健。\n\n了解更多 → https：//goo.gle/49jGwjv", "publishedAt": "2026-05-23T00:41:27.000Z", "category": "industry", "sourceName": "X：Google DeepMind (@GoogleDeepMind)", "sourceUrl": "https://x.com/GoogleDeepMind/status/2057985225100235022"}, {"idx": 34, "title": "AI 替代入门级工作：科技行业受裁员冲击最重，74% CEO 冻结或缩减招聘", "summary": "奥纬咨询研究发现，AI工具正被广泛用于入门级任务，导致企业招聘重心转向高级岗位，年轻人求职难度加大。科技行业受冲击最严重，74%的CEO已冻结或缩减招聘。计划削减初级岗位的比例从17%跃升至43%，而招聘转向中层岗位的比例则升至30%。尽管超90%的企业在部署AI，但多数仍处试点阶段。报告警告，过快裁员或忽视初级人才储备，可能对人才梯队造成长远风险。", "publishedAt": "2026-05-23T00:05:55.000Z", "category": "industry", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/954/235.htm"}, {"idx": 35, "title": "黄仁勋：AI 基建年度开支要冲到 4 万亿美元！", "summary": "英伟达发布2027财年Q1财报，营收816亿美元，同比增长85%，净利润583亿美元，翻两倍多，市值达5.7万亿美元，已超德国2026年GDP预测。黄仁勋预测，超大规模云厂商的AI基建年度开支将从当前的1万亿美元，增长至3-4万亿美元，远超华尔街预期。财报同时显示，数据中心业务营收752亿美元，占比超九成。值得注意的是，AI基建的高能耗正推高居民电费，数据中心用电成本转嫁效应已初步显现。", "publishedAt": "2026-05-22T22:30:03.000Z", "category": "industry", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/954/223.htm"}, {"idx": 36, "title": "回顾Google I/O 2026对话环节", "summary": "在2026年Google I/O开发者大会上，对话环节聚焦于未来科技趋势。行业领导者围绕人工智能、量子计算、机器人学以及创造力等核心议题展开了深入探讨，旨在勾勒这些前沿领域的技术演进路径与发展蓝图。", "publishedAt": "2026-05-22T18:00:00.000Z", "category": "industry", "sourceName": "Google Blog：AI（RSS）", "sourceUrl": "https://blog.google/innovation-and-ai/technology/ai/io-2026-dialogues-recap"}]}, {"label": "论文研究", "slug": "paper", "count": 5, "items": [{"idx": 37, "title": "微软 Copilot Cowork 存在文件泄露问题", "summary": "", "publishedAt": "2026-05-25T23:25:48.799Z", "category": "paper", "sourceName": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://www.promptarmor.com/resources/microsoft-copilot-cowork-exfiltrates-files"}, {"idx": 38, "title": "华为何庭波\"韬定律\"论文发布，逻辑折叠技术提升芯片性能", "summary": "华为何庭波在ISCAS 2026上提出\"韬定律\"，并介绍逻辑折叠（LogicFolding）技术。该技术通过三维空间拓扑重组提升芯片性能，不依赖新光刻工艺。在麒麟2026芯片测试中，晶体管密度从155 MTr/mm2提升至238 MTr/mm2，性能核心能效提高41%，最大时钟频率提升近13%。论文显示，麒麟2027芯片已进入Silicon状态，后续规划包括麒麟2028、2029。AI芯片方面，昇腾990计划在2030年左右引入逻辑折叠，硬件集成预计到2035年提高超过100倍。", "publishedAt": "2026-05-25T04:27:21.000Z", "category": "paper", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/954/778.htm"}, {"idx": 39, "title": "通过奖励倾斜分布匹配强化少步生成器", "summary": "本文提出奖励倾斜分布匹配蒸馏（RTDMD），这是一个将分布匹配蒸馏与奖励引导强化学习统一应用于少步流生成器的两阶段框架。该方法通过最小化到奖励倾斜教师分布的KL散度，自然分解为分布匹配项与奖励最大化项。第一阶段引入环境一致分布匹配蒸馏（AC-DMD），在子区间进行分布匹配，并通过一致性正则化辅助分数模型追踪生成器分布。第二阶段联合优化两项，并推导混合策略梯度及步子集GRPO（SubGRPO）以降低方差。在SD3、SD3.5和FLUX.2上的实验表明，RTDMD仅用4步推理即可在偏好、美学和组合指标上达到新的 state-of-the-art。", "publishedAt": "2026-05-25T00:00:00.000Z", "category": "paper", "sourceName": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2605.26108"}, {"idx": 40, "title": "Nemotron-Labs 扩散语言模型实现光速级文本生成", "summary": "NVIDIA 在 Hugging Face 发布了关于 Nemotron-Labs 扩散语言模型的技术博客。该研究聚焦于通过扩散语言模型架构大幅提升文本生成速度，目标是逼近\"光速级\"生成效率。文章可能介绍了该模型在生成速度上的突破，以及相较于传统自回归模型在延迟和吞吐量方面的性能优势。具体技术细节或对比数据需参考原文。", "publishedAt": "2026-05-23T00:02:03.000Z", "category": "paper", "sourceName": "Hugging Face：Blog（RSS）", "sourceUrl": "https://huggingface.co/blog/nvidia/nemotron-labs-diffusion"}, {"idx": 41, "title": "AlphaProof Nexus：用形式化验证驱动AI数学证明搜索", "summary": "Google DeepMind提出了AlphaProof Nexus系统，它将大型语言模型与Lean形式化验证工具相结合。该系统允许LLM在生成证明的过程中，不断读取Lean的编译错误并进行修正，还可调用更强的工具辅助解决子问题。这一机制迫使模型将每一步逻辑都转化为可编译、可验证的代码，从而将其角色从\"令人信服的叙述者\"转变为\"候选方案生成器\"。在针对353个Erdős问题和492个开放猜想的测试中，系统成功解决了9个Erdős问题并证明了44个序列猜想。该研究展示了形式化验证在暴露AI逻辑错误、建立\"人类提问-模型探索-验证器把关\"新分工中的关键作用。", "publishedAt": "2026-05-22T22:37:39.000Z", "category": "paper", "sourceName": "X：Rohan Paul (@rohanpaul_ai)", "sourceUrl": "https://x.com/rohanpaul_ai/status/2057954067146781151"}]}, {"label": "技巧与观点", "slug": "tip", "count": 9, "items": [{"idx": 42, "title": "\"龙虾之父\"Peter 开源 skill-cleaner，为 AI 智能体技能\"做体检\"", "summary": "\"龙虾之父\"Peter 开源了 skill-cleaner 工具，用于诊断和优化 AI 智能体的技能提示词。该工具包含5项核心功能，包括技能提示词预算审计、重复技能检测、未使用技能筛查、技能根目录审计和描述精简优化。其脚本采用标准 token 预算核算逻辑，旨在帮助减少冗长描述对 token 预算和上下文窗口的占用。已有用户实践显示，将技能描述从90多词精简至40词以内，能提升智能体选择技能的准确率。", "publishedAt": "2026-05-26T05:37:26.000Z", "category": "tip", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/955/269.htm"}, {"idx": 43, "title": "Anthropic联合创始人Chris Olah在教皇通谕发布会上的讲话", "summary": "Anthropic联合创始人Chris Olah在梵蒂冈出席教皇Leo XIV关于AI的通谕发布会。他指出，所有前沿AI实验室都面临商业、研究及地缘政治等多重压力，这可能与做正确的事相冲突，因此外部监督至关重要。他强调，AI模型并非像飞机那样被工程化构建，而是基于人类语言和思想\"生长\"出来的，其内在性质可能复杂难解。他提出三个需审慎思考的问题：如何确保AI发展的全球收益公平分享、如何思考AI时代的人类繁荣，以及AI模型内在性质的本质。他呼吁社会各界，尤其是宗教与民间团体，严肃审视AI发展并引导其向善。", "publishedAt": "2026-05-25T18:58:16.220Z", "category": "tip", "sourceName": "Anthropic：Newsroom（网页）", "sourceUrl": "https://www.anthropic.com/news/chris-olah-pope-leo-encyclical"}, {"idx": 44, "title": "Harness、Scaffold 与 AI 智能体术语辨析", "summary": "本文旨在厘清 AI 智能体领域中易混淆的关键术语。文章指出，模型（如 Claude、GPT）本身是无记忆、无循环的大语言模型。其行为由\"Scaffolding\"（行为定义层，如系统提示、工具描述）塑造，而\"Harness\"（执行层）负责调用模型、处理工具调用与控制循环，是智能体运行的核心。两者结合，模型才能成为智能体。文章以 Claude Code、Codex 为例，说明同一模型搭配不同 Harness 会产生迥异体验，并提出了 Agent = Model + Harness 的常见理解框架。术语尚未统一，本文旨在提供一个实用的心智模型。", "publishedAt": "2026-05-25T00:00:00.000Z", "category": "tip", "sourceName": "Hugging Face：Blog（RSS）", "sourceUrl": "https://huggingface.co/blog/agent-glossary"}, {"idx": 45, "title": "面向 Codex 的自我优化提示词框架", "summary": "这是一个结构化的提示词，用于指导 Codex 自动分析其历史记录以识别并固化重复工作流。该框架要求 Codex 回顾会话、Memories 等数据，找出重复、耗时且有明确复用价值的任务。筛选标准包括至少出现两次、输入稳定、可提升效率等。最终，Codex 应以\"技能\"、子智能体或自动化工具等最小实用形式创建或扩展现有资产，避免冗余。流程包括生成候选清单、执行创建，并汇报结果与待验证项。", "publishedAt": "2026-05-24T17:18:49.000Z", "category": "tip", "sourceName": "X：Greg Brockman (@gdb)", "sourceUrl": "https://x.com/gdb/status/2058598608224858442"}, {"idx": 46, "title": "Pixverse角色设计工作流测试", "summary": "在Pixverse中进行角色设计工作流测试\n使用GPT Image 2.0为Lucas创建视觉形象，使用Seedance 2.0制作动画弹跳表演。\n从静态概念图到电影级动态效果。\nRT + Follow + Reply = 工作流", "publishedAt": "2026-05-24T15:05:15.000Z", "category": "tip", "sourceName": "X：PixVerse (@PixVerse_)", "sourceUrl": "https://x.com/PixVerse_/status/2058564994669727803"}, {"idx": 47, "title": "格雷格·布罗克曼：那段差点让OpenAI覆灭的72小时", "summary": "", "publishedAt": "2026-05-24T14:09:49.425Z", "category": "tip", "sourceName": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://fs.blog/knowledge-project-podcast/greg-brockman"}, {"idx": 48, "title": "Claude Code自动模式：多任务并行的关键技巧", "summary": "人们常问我，用好Claude Code的最大技巧是什么。\n如今我的头号技巧是：使用自动模式。\n自动模式意味着不再有权限提示。它是实现\"多Claude并行\"的关键构件：启动一个会话，然后在其运行时，并行处理另一个会话。", "publishedAt": "2026-05-24T12:05:42.000Z", "category": "tip", "sourceName": "X：Boris Cherny (@bcherny)", "sourceUrl": "https://x.com/bcherny/status/2058519809214607704"}, {"idx": 49, "title": "飞书-Claude Code桥接开源项目", "summary": "feishu-claude-code-bridge是一个开源项目，可实现飞书与本机Claude Code CLI的双向连接。用户能从飞书消息中直接指挥Claude Code执行任务，Claude也能读取飞书中的工作上下文并创建、编辑飞书文档。其工作原理是将飞书消息转为Prompt通过命令行调用Claude CLI，并将流式输出实时同步回飞书。该模式可扩展连接Codex等其他本地工具。需注意，2026年6月15日起，Claude订阅计划对`claude -p`模式将独立计费。", "publishedAt": "2026-05-23T07:15:51.000Z", "category": "tip", "sourceName": "X：宝玉 (@dotey)", "sourceUrl": "https://x.com/dotey/status/2058084478459826432"}, {"idx": 50, "title": "Kakuna：自动化加固代码库的AI代理工具", "summary": "Kakuna是一款AI代理工具，旨在将早期快速原型自动转化为可维护的生产级代码库。它通过内置的检查清单和\"计划-目标\"工作流，模拟人类开发与运维流程，在保持功能不变的前提下，自动执行代码审查、测试补充、重构等\"无聊\"工作，并强调子代理并行以提升效率。该工具是为\"人类与代理协作\"而设计的范例，其核心是\"反熵增\"与\"反代码腐化\"。例如，一次约16小时的运行能生成上百次提交，将一个脆弱的MVP转变为一个结构清晰、可长期构建的稳定项目。", "publishedAt": "2026-05-22T17:27:31.000Z", "category": "tip", "sourceName": "X：swyx (@swyx)", "sourceUrl": "https://x.com/swyx/status/2057876022553690327"}]}]}
</script>
<script>
const EMBEDDED_DATA = JSON.parse(document.getElementById("dataSrc").textContent);
const SECTION_CONFIG = {"模型发布/更新": {"icon": "🤖", "color": "#7f6af0"}, "产品发布/更新": {"icon": "📦", "color": "#e8622a"}, "行业动态": {"icon": "🏭", "color": "#1d9e75"}, "论文研究": {"icon": "📄", "color": "#378add"}, "技巧与观点": {"icon": "💡", "color": "#e8a020"}};
const DAILY_STR = "2026-05-26";
const DAILY_MAX = "2026-05-26";

let currentData = null;
let currentDate = DAILY_STR;
let readSet = new Set();
let showOnlyUnread = false;
let currentFilter = 'all';
let currentSearch = '';
let isDark = true;

function reloadToday() {
  location.reload();
}
window.addEventListener('DOMContentLoaded', function() {
  try { readSet = new Set(JSON.parse(localStorage.getItem('aidaka_read_' + currentDate) || '[]')); } catch(e) {}
  try {
    var saved = localStorage.getItem('aidaka_theme');
    if (saved === 'light') { isDark = false; document.body.classList.add('light'); }
  } catch(e) {}
  updateThemeBtn();
  renderAll(EMBEDDED_DATA);
  setTimeout(function() {
    document.getElementById('loadingOverlay').style.opacity = '0';
    setTimeout(function() { document.getElementById('loadingOverlay').style.display = 'none'; }, 400);
  }, 300);
});

function renderAll(data) {
  currentData = data;
  var sections = data.sections || [];
  var total = sections.reduce(function(a, s) { return a + s.items.length; }, 0);
  var dateStr = fmtDate(data.date);
  document.getElementById('heroTitle').textContent = 'AI打卡网 · ' + dateStr;
  var gen = data.generatedAt ? new Date(data.generatedAt) : new Date();
  document.getElementById('heroSubtitle').textContent = '共收录 ' + total + ' 条资讯 · 来源精选 · 生成于 ' + relTime(gen);
  document.getElementById('navDateLabel').textContent = data.date;
  document.title = 'AI打卡网 · ' + data.date + ' (' + total + '条)';

  var statsEl = document.getElementById('heroStats');
  statsEl.innerHTML = '<div class="stat-chip" onclick="reloadToday()" title="刷新今日数据"><div class="num">' + total + '</div><div class="lbl">今日总条数</div></div>'
    + sections.map(function(s) {
      var cfg = SECTION_CONFIG[s.label] || { icon: '📌', color: '#888' };
      return '<div class="stat-chip" onclick="filterSection(\'' + s.label.replace(/'/g, "\\'") + '\'); scrollToSection(\'' + s.label.replace(/'/g, "\\'") + '\');" title="跳转到 ' + s.label + '"><div class="num" style="font-size:22px">' + cfg.icon + '</div><div class="lbl">' + s.label.replace('/更新','').replace('/观点','') + ' ' + s.items.length + '</div></div>';
    }).join('');

  renderDonut(sections);
  var navEl = document.getElementById('navInner');
  var dateArea = navEl.querySelector('.nav-date-area');
  navEl.querySelectorAll('.nav-sec-link').forEach(function(el) { el.remove(); });
  sections.forEach(function(s) {
    var cfg = SECTION_CONFIG[s.label] || { icon: '📌', color: '#888' };
    var a = document.createElement('a');
    a.className = 'nav-link nav-sec-link';
    a.href = '#sec-' + slugify(s.label);
    a.innerHTML = cfg.icon + ' ' + s.label + ' <span class="nav-badge">' + s.items.length + '</span>';
    a.onclick = function(e) { e.preventDefault(); filterSection(s.label, a); scrollToSection(s.label); };
    navEl.insertBefore(a, dateArea);
  });
  renderAnalytics(sections);
  var main = document.getElementById('main');
  main.querySelectorAll('.dyn-section').forEach(function(el) { el.remove(); });
  var globalIdx = 0;
  var frag = document.createDocumentFragment();
  sections.forEach(function(s) {
    var cfg = SECTION_CONFIG[s.label] || { icon: '📌', color: '#888' };
    var secDiv = document.createElement('div');
    secDiv.className = 'dyn-section';
    secDiv.id = 'sec-' + slugify(s.label);
    var header = document.createElement('div');
    header.className = 'section-header';
    header.innerHTML = '<div class="section-icon" style="background:' + cfg.color + '22; color:' + cfg.color + '">' + cfg.icon + '</div>'
      + '<span class="section-title">' + s.label + '</span>'
      + '<span class="section-count">' + s.items.length + ' 条</span>';
    secDiv.appendChild(header);
    if (s.items.length === 0) {
      secDiv.innerHTML += '<p style="color:var(--text3);font-size:13px;padding:12px 0">今日暂无相关资讯</p>';
    } else {
      var grid = document.createElement('div');
      grid.className = 'card-grid';
      s.items.forEach(function(item) {
        globalIdx++;
        var cardEl = buildCard(item, globalIdx);
        grid.appendChild(cardEl);
      });
      secDiv.appendChild(grid);
    }
    frag.appendChild(secDiv);
  });
  main.insertBefore(frag, main.querySelector('#noResults'));
  updateReadProgress(total);
  updateDateNav(data.date);
  document.getElementById('footerEl').innerHTML = '共 ' + total + ' 条资讯 · 数据来源 <a href="https://aihot.virxact.com" target="_blank" rel="noopener noreferrer" style="color:var(--accent)">aihot.virxact.com</a> · AI打卡网 每日晨报';
  setTimeout(initScrollAnim, 100);
}

function buildCard(item, idx) {
  var isRead = readSet.has(String(idx));
  var card = document.createElement('div');
  card.className = 'card' + (isRead ? ' read' : '');
  card.dataset.idx = idx;
  card.dataset.title = (item.title || '').toLowerCase();
  card.dataset.summary = (item.summary || '').toLowerCase();
  card.dataset.source = (item.sourceName || '').toLowerCase();
  var srcShort = shortSource(item.sourceName || '');
  var titleSafe = escHtml(item.title || '');
  var sourceNameSafe = escHtml(item.sourceName || '');
  var summaryRaw = item.summary || '';
  // Truncate summary to ~60 chars for display
  var summaryShort = summaryRaw.length > 65 ? summaryRaw.slice(0, 62) + '...' : summaryRaw;
  var summarySafe = escHtml(summaryShort);
  var summaryFull = escHtml(summaryRaw);
  var timeStr = item.publishedAt ? relTimeStr(item.publishedAt) : '';
  var sourceHtml = item.sourceUrl ? '<a class="source-btn" href="' + escHtml(item.sourceUrl) + '" target="_blank" rel="noopener noreferrer">原文</a>' : '';

  var inner = '<div class="card-header"><span class="card-num">' + idx + '</span><span class="card-title">' + titleSafe + '</span></div>';
  if (timeStr) { inner += '<span class="time-badge">' + escHtml(timeStr) + '</span>'; }
  inner += '<span class="card-source" title="' + sourceNameSafe + '">' + escHtml(srcShort) + '</span>'
    + '<div class="card-summary collapsed" id="sum-' + idx + '" data-full="' + escHtml(summaryRaw).replace(/"/g, '&quot;') + '">' + summarySafe + '</div>'
    + '<div class="card-footer">'
    + '<button class="expand-btn" onclick="toggleExpand(' + idx + ', this)">展开全文</button>'
    + '<div style="display:flex;gap:8px">'
    + '<button class="read-btn" onclick="markRead(' + idx + ', this)" id="rbtn-' + idx + '">' + (isRead ? '标为未读' : '打卡') + '</button>'
    + sourceHtml
    + '</div></div>';
  card.innerHTML = inner;
  // 点击卡片任意位置展开全文（按钮除外）
  card.addEventListener('click', function(e) {
    var target = e.target;
    if (target.closest('.read-btn') || target.closest('.source-btn') || target.closest('.expand-btn')) return;
    toggleExpand(idx, card.querySelector('.expand-btn'));
  });
  return card;
}

function renderDonut(sections) {
  var total = sections.reduce(function(a, s) { return a + s.items.length; }, 0);
  if (total === 0) return;
  var svgEl = document.getElementById('donutSvg');
  var legendEl = document.getElementById('donutLegend');
  svgEl.innerHTML = '';
  legendEl.innerHTML = '';
  var cx = 50, cy = 50, r = 36, inner = 22;
  var startAngle = -Math.PI / 2;
  sections.forEach(function(s) {
    if (s.items.length === 0) return;
    var cfg = SECTION_CONFIG[s.label] || { icon: '📌', color: '#888' };
    var angle = (s.items.length / total) * Math.PI * 2;
    var endAngle = startAngle + angle;
    var x1 = cx + r * Math.cos(startAngle), y1 = cy + r * Math.sin(startAngle);
    var x2 = cx + r * Math.cos(endAngle), y2 = cy + r * Math.sin(endAngle);
    var ix1 = cx + inner * Math.cos(startAngle), iy1 = cy + inner * Math.sin(startAngle);
    var ix2 = cx + inner * Math.cos(endAngle), iy2 = cy + inner * Math.sin(endAngle);
    var lg = angle > Math.PI ? 1 : 0;
    var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', 'M ' + ix1 + ' ' + iy1 + ' L ' + x1 + ' ' + y1 + ' A ' + r + ' ' + r + ' 0 ' + lg + ' 1 ' + x2 + ' ' + y2 + ' L ' + ix2 + ' ' + iy2 + ' A ' + inner + ' ' + inner + ' 0 ' + lg + ' 0 ' + ix1 + ' ' + iy1 + ' Z');
    path.setAttribute('fill', cfg.color);
    path.setAttribute('opacity', '0.85');
    path.style.cursor = 'pointer';
    path.addEventListener('click', (function(label) { return function() { filterSection(label); scrollToSection(label); }; })(s.label));
    svgEl.appendChild(path);
    startAngle = endAngle;
    var li = document.createElement('div');
    li.className = 'donut-legend-item';
    li.innerHTML = '<span class="dot" style="background:' + cfg.color + '"></span>' + s.label + ' <strong style="color:rgba(255,255,255,0.95)">' + s.items.length + '</strong>';
    li.onclick = (function(label) { return function() { filterSection(label); scrollToSection(label); }; })(s.label);
    legendEl.appendChild(li);
  });
  var text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  text.setAttribute('x', cx); text.setAttribute('y', cy + 1);
  text.setAttribute('text-anchor', 'middle'); text.setAttribute('dominant-baseline', 'middle');
  text.setAttribute('fill', 'rgba(255,255,255,0.9)'); text.setAttribute('font-size', '12');
  text.setAttribute('font-weight', '700'); text.textContent = total;
  svgEl.appendChild(text);
  var sub = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  sub.setAttribute('x', cx); sub.setAttribute('y', cy + 13);
  sub.setAttribute('text-anchor', 'middle'); sub.setAttribute('fill', 'rgba(255,255,255,0.6)'); sub.setAttribute('font-size', '7');
  sub.textContent = '条';
  svgEl.appendChild(sub);
}

function renderAnalytics(sections) {
  var wrap = document.getElementById('analyticsWrap');
  var sourceMap = {};
  sections.forEach(function(s) {
    s.items.forEach(function(item) {
      var src = shortSource(item.sourceName || '未知');
      sourceMap[src] = (sourceMap[src] || 0) + 1;
    });
  });
  var sorted = Object.entries(sourceMap).sort(function(a,b) { return b[1]-a[1]; }).slice(0, 6);
  var maxCount = sorted[0] ? sorted[0][1] : 1;
  var srcHtml = '<div class="analytics-card"><div class="analytics-title">来源排行</div>';
  sorted.forEach(function(entry) {
    var name = entry[0], count = entry[1];
    var pct = Math.round(count / maxCount * 100);
    srcHtml += '<div class="source-rank-item" style="cursor:pointer" onclick="filterBySource(\'' + escHtml(name).replace(/'/g,"\\'") + '\')" title="查看 ' + escHtml(name).replace(/'/g,"\\'") + ' 的全部文章"><span class="source-rank-name">' + escHtml(name) + '</span><div class="source-rank-bar-bg"><div class="source-rank-bar" style="width:' + pct + '%"></div></div><span class="source-rank-count">' + count + '</span></div>';
  });
  srcHtml += '</div>';
  var stopWords = new Set(['的','了','在','是','与','和','AI','以','将','被','其','已','于','从','到','并','为','但','还','也','都','该','这','其中','能够','通过','实现','用于','可以','以及','可能','提供','包含','包括','无需','用户','产品','模型','支持','系统','功能','未','使用','工作','进行','没有']);
  var wordCount = {};
  sections.forEach(function(s) {
    s.items.forEach(function(item) {
      var words = (item.title + ' ' + (item.summary || '')).replace(/[，。、！？【】《》"'·\s]+/g, ' ').split(' ');
      words.forEach(function(w) {
        w = w.trim();
        if (w.length >= 2 && w.length <= 8 && !stopWords.has(w) && !/^[a-zA-Z0-9]{1,2}$/.test(w)) {
          wordCount[w] = (wordCount[w] || 0) + 1;
        }
      });
    });
  });
  var topWords = Object.entries(wordCount).sort(function(a,b) { return b[1]-a[1]; }).slice(0, 18);
  var colors = ['#e8622a','#f08040','#1d9e75','#378add','#7f6af0','#e8a020','#d4537e','#0f6e56','#993c1d','#185fa5'];
  var hotHtml = '<div class="analytics-card"><div class="analytics-title">热词标签</div><div class="hotwords-wrap">';
  topWords.forEach(function(entry, i) {
    var word = entry[0], cnt = entry[1];
    var sz = Math.max(11, Math.min(16, 11 + cnt * 2));
    var col = colors[i % colors.length];
    hotHtml += '<span class="hotword-chip" style="background:' + col + ';font-size:' + sz + 'px;opacity:' + (0.7 + cnt * 0.1) + '" onclick="document.getElementById(\'searchInput\').value=\'' + escHtml(word).replace(/'/g, "\\'") + '\';doSearch(\'' + escHtml(word).replace(/'/g, "\\'") + '\')">' + escHtml(word) + '</span>';
  });
  hotHtml += '</div></div>';
  wrap.innerHTML = srcHtml + hotHtml;
}

function doSearch(val) {
  currentSearch = val.toLowerCase().trim();
  document.getElementById('searchClear').className = 'search-clear' + (val ? ' show' : '');
  applyFilters();
}
function clearSearch() {
  document.getElementById('searchInput').value = '';
  doSearch('');
}
function applyFilters() {
  var cards = document.querySelectorAll('.card');
  var visible = 0;
  cards.forEach(function(card) {
    var secEl = card.closest('.dyn-section');
    var matchSection = currentFilter === 'all' || slugify(currentFilter) === (secEl ? secEl.id.replace('sec-','') : '');
    var matchSearch = !currentSearch
      || card.dataset.title.indexOf(currentSearch) >= 0
      || card.dataset.summary.indexOf(currentSearch) >= 0
      || card.dataset.source.indexOf(currentSearch) >= 0;
    var matchRead = !showOnlyUnread || !readSet.has(card.dataset.idx);
    if (matchSection && matchSearch && matchRead) {
      card.classList.remove('hidden'); visible++;
      if (currentSearch) highlightCard(card, currentSearch); else clearHighlight(card);
    } else {
      card.classList.add('hidden'); clearHighlight(card);
    }
  });
  document.getElementById('searchCount').textContent = currentSearch ? (visible > 0 ? '找到 ' + visible + ' 条' : '') : '';
  document.getElementById('noResults').className = 'no-results' + (visible === 0 && (currentSearch || showOnlyUnread || currentFilter !== 'all') ? ' show' : '');
}
function highlightCard(card, q) {
  var titleEl = card.querySelector('.card-title');
  if (!titleEl) return;
  var orig = titleEl.textContent;
  var re = new RegExp('(' + escRe(q) + ')', 'gi');
  titleEl.innerHTML = escHtml(orig).replace(re, '<mark>$1</mark>');
}
function clearHighlight(card) {
  var titleEl = card.querySelector('.card-title');
  if (titleEl) titleEl.innerHTML = escHtml(titleEl.textContent);
}
function filterSection(label, el) {
  currentFilter = label;
  currentSearch = '';
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.nav-link').forEach(function(a) { a.classList.remove('active'); });
  if (el) el.classList.add('active');
  else { document.querySelectorAll('.nav-link').forEach(function(a) { if (a.textContent.indexOf(label) >= 0) a.classList.add('active'); }); }
  applyFilters();
}
function filterBySource(sourceName) {
  currentFilter = 'all';
  currentSearch = sourceName;
  document.querySelectorAll('.nav-link').forEach(function(a) { a.classList.remove('active'); });
  document.querySelectorAll('.nav-link').forEach(function(a) { if (a.textContent.indexOf('全部') >= 0) a.classList.add('active'); });
  // Set search to the source name so only cards from that source remain visible
  document.getElementById('searchInput').value = sourceName;
  doSearch(sourceName);
  scrollTo(0, 0);
  showToast('已筛选：' + sourceName);
}
function scrollToSection(label) {
  var id = 'sec-' + slugify(label);
  var el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
function toggleExpand(idx, btn) {
  var sum = document.getElementById('sum-' + idx);
  if (!sum) return;
  var full = sum.dataset.full || '';
  if (sum.classList.contains('collapsed')) {
    sum.classList.replace('collapsed', 'expanded');
    sum.textContent = full;
    btn.textContent = '收起';
  } else {
    sum.classList.replace('expanded', 'collapsed');
    var short = full.length > 65 ? full.slice(0, 62) + '...' : full;
    sum.textContent = short;
    btn.textContent = '展开全文';
  }
}
function markRead(idx, btn) {
  var key = String(idx);
  var card = document.querySelector('.card[data-idx="' + key + '"]');
  if (readSet.has(key)) {
    readSet.delete(key);
    if (card) card.classList.remove('read');
    if (btn) btn.textContent = '打卡';
  } else {
    readSet.add(key);
    if (card) card.classList.add('read');
    if (btn) btn.textContent = '已打卡';
  }
  try { localStorage.setItem('aidaka_read_' + currentDate, JSON.stringify(Array.from(readSet))); } catch(e) {}
  var total = document.querySelectorAll('.card').length;
  updateReadProgress(total);
  if (showOnlyUnread) applyFilters();
}
function toggleReadFilter() {
  showOnlyUnread = !showOnlyUnread;
  var btn = document.getElementById('readProgress');
  if (showOnlyUnread) { btn.style.opacity = '0.7'; btn.title = '点击显示全部'; }
  else { btn.style.opacity = '1'; btn.title = '点击筛选未读'; }
  applyFilters();
}
function updateReadProgress(total) {
  var count = readSet.size;
  var pct = total > 0 ? Math.round(count / total * 100) : 0;
  var icon = count >= total && total > 0 ? '✅' : '🕐';
  var label = count >= total && total > 0 ? '今日已读完' : '已打卡 ' + count + '/' + total;
  document.getElementById('readLabel').innerHTML = '<span class="read-progress-label"><span class="icon">' + icon + '</span><span>' + label + '</span></span>';
  document.getElementById('readBarFill').style.width = pct + '%';
}
function toggleTheme() {
  isDark = !isDark;
  document.body.classList.toggle('light', !isDark);
  try { localStorage.setItem('aidaka_theme', isDark ? 'dark' : 'light'); } catch(e) {}
  updateThemeBtn();
}
function updateThemeBtn() {
  document.getElementById('themeBtn').textContent = isDark ? '亮色模式' : '暗色模式';
}
function updateDateNav(dateStr) {
  // For items-based view, we use daily API for history nav
  document.getElementById('nextBtn').disabled = (dateStr >= DAILY_MAX);
  document.getElementById('prevBtn').disabled = false;
}
function navigateDate(delta) {
  var d = new Date(currentDate + 'T00:00:00');
  d.setDate(d.getDate() + delta);
  var newDateRaw = d.toISOString().slice(0, 10);
  if (newDateRaw > DAILY_MAX) { showToast('已是最新日期'); return; }
  loadDate(newDateRaw);
}
function openModal() {
  document.getElementById('datePicker').value = currentDate;
  document.getElementById('datePicker').max = DAILY_MAX;
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }
function goToDate() {
  var val = document.getElementById('datePicker').value;
  closeModal();
  if (val && val !== currentDate && val <= DAILY_MAX) loadDate(val);
  else if (val > DAILY_MAX) showToast('不能选择未来日期');
}
function loadDate(dateStr) {
  currentDate = dateStr;
  document.getElementById('loadingOverlay').style.display = 'flex';
  document.getElementById('loadingOverlay').style.opacity = '1';
  try { readSet = new Set(JSON.parse(localStorage.getItem('aidaka_read_' + dateStr) || '[]')); } catch(e) { readSet = new Set(); }
  document.querySelectorAll('.dyn-section').forEach(function(el) { el.remove(); });
  currentSearch = ''; currentFilter = 'all';
  showOnlyUnread = false;
  document.getElementById('searchInput').value = '';
  document.getElementById('searchCount').textContent = '';
  document.getElementById('readProgress').style.opacity = '1';
  document.getElementById('readProgress').title = '点击筛选未读';
  // Try loading 50 items from items API for the selected date
  var sinceStr = dateStr + 'T00:00:00Z';
  fetch('https://aihot.virxact.com/api/public/items?mode=selected&since=' + sinceStr + '&take=50')
    .then(function(r) { return r.json(); })
    .then(function(apiData) {
      // Transform items API response to daily-like format
      var categories = {
        'ai-models': '模型发布/更新',
        'ai-products': '产品发布/更新',
        'industry': '行业动态',
        'paper': '论文研究',
        'tip': '技巧与观点'
      };
      var sectionMap = {};
      var idx = 0;
      (apiData.items || []).forEach(function(item) {
        var cat = item.category || '';
        var label = categories[cat] || '行业动态';
        if (!sectionMap[label]) {
          sectionMap[label] = { label: label, items: [] };
        }
        idx++;
        sectionMap[label].items.push({
          idx: idx,
          title: item.title,
          sourceName: item.source || '',
          sourceUrl: item.url || '',
          summary: item.summary || '',
          publishedAt: item.publishedAt || ''
        });
      });
      var sections = [];
      var order = ['模型发布/更新','产品发布/更新','行业动态','论文研究','技巧与观点'];
      order.forEach(function(lbl) {
        if (sectionMap[lbl]) sections.push(sectionMap[lbl]);
        else sections.push({ label: lbl, items: [] });
      });
      var transformed = {
        date: dateStr,
        generatedAt: apiData.items && apiData.items.length > 0 ? apiData.items[0].publishedAt : new Date().toISOString(),
        lead: null,
        sections: sections
      };
      renderAll(transformed);
      document.getElementById('loadingOverlay').style.opacity = '0';
      setTimeout(function() { document.getElementById('loadingOverlay').style.display = 'none'; }, 400);
      showToast('已加载 ' + dateStr + ' (' + idx + '条)');
    })
    .catch(function() {
      // Fallback to daily API
      fetch('https://aihot.virxact.com/api/public/daily/' + dateStr)
        .then(function(r) { return r.json(); })
        .then(function(dailyData) {
          renderAll(dailyData);
          document.getElementById('loadingOverlay').style.opacity = '0';
          setTimeout(function() { document.getElementById('loadingOverlay').style.display = 'none'; }, 400);
          showToast('已加载 ' + dateStr + ' 日报');
        })
        .catch(function() {
          showToast('加载失败，网络请求受限');
          document.getElementById('loadingOverlay').style.opacity = '0';
          setTimeout(function() { document.getElementById('loadingOverlay').style.display = 'none'; }, 400);
        });
    });
}
function initScrollAnim() {
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }
    });
  }, { threshold: 0.05, rootMargin: '0px 0px -20px 0px' });
  document.querySelectorAll('.card').forEach(function(c) { observer.observe(c); });
}
var toastTimer;
function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.classList.remove('show'); }, 2500);
}
function slugify(s) { return s.replace(/[\/\s]/g, '-'); }
function escHtml(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
function shortSource(name) {
  if (!name) return '';
  // Group all X/Twitter sources under "X"
  if (/^X[：:]/.test(name)) return 'X';
  var trimmed = name.replace(/（.*?）/g,'').replace(/\(.*?\)/g,'').trim();
  return trimmed.length > 16 ? trimmed.slice(0, 16) + '...' : trimmed;
}
function fmtDate(dateStr) {
  if (!dateStr) return '';
  var d = new Date(dateStr + 'T00:00:00+08:00');
  var mm = d.getMonth() + 1;
  var dd = d.getDate();
  var days = ['日','一','二','三','四','五','六'];
  return mm + ' 月 ' + dd + ' 日 周' + days[d.getDay()];
}
function fmtDateShort(iso) { return iso ? iso.slice(0, 10) : ''; }
function relTime(date) {
  var now = Date.now();
  var diff = now - date.getTime();
  var mins = Math.floor(diff / 60000);
  var hours = Math.floor(mins / 60);
  if (diff < 0) return '刚刚';
  if (mins < 1) return '刚刚';
  if (mins < 60) return mins + ' 分钟前';
  if (hours < 24) {
    var hh = String(date.getHours()).padStart(2,'0');
    var mm = String(date.getMinutes()).padStart(2,'0');
    var period = date.getHours() < 12 ? '上午' : (date.getHours() < 18 ? '下午' : '晚上');
    return '今天' + period + ' ' + hh + ':' + mm;
  }
  return fmtDateShort(date.toISOString());
}
function relTimeStr(isoStr) {
  if (!isoStr) return '';
  var d = new Date(isoStr);
  return relTime(d);
}
</script>
