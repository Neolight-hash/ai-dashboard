<html lang="zh-CN">
<head>

<style>

  .nav-date-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .main { max-width: 960px; margin: 0 auto; padding: 24px 16px 60px; }
  .section-header {

  }
  .card {

    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    box-shadow: var(--card-shadow);
    transition: transform var(--transition), box-shadow var(--transition), opacity var(--transition), border-color var(--transition);

    transform: translateY(18px);

    cursor: pointer;
  }
  .card.visible { opacity: 1; transform: translateY(0); }
  .card.read { opacity: 0.5; }
  .card.read::after {

    position: absolute;
    top: 12px;
    right: 12px;
    background: var(--bg4);

  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); border-color: var(--accent); }
  .card.hidden { display: none !important; }
  .card.highlight { border-color: var(--accent2); background: rgba(232,98,42,0.06); }
  .card-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px; height: 24px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    border-radius: 6px;
    margin-bottom: 10px;
    flex-shrink: 0;
  }

  }
  .card-summary {
    font-size: 13px;

  }
  .card-summary.collapsed {

  }
  .card-summary.expanded {

  .card-footer { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }
  .expand-btn {

    border: none;
    color: var(--accent2);
    font-size: 12px;
    cursor: pointer;
    font-family: var(--font);

  }
  .expand-btn:hover { color: var(--accent); }
  .source-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    text-decoration: none;
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 12px;

  }
  .source-btn:hover { opacity: 0.85; }
  .read-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    color: var(--text3);
    cursor: pointer;
    font-family: var(--font);
    transition: all var(--transition);
  }
  .read-btn:hover { border-color: var(--accent); color: var(--accent); }
  .time-badge { font-size: 11px; color: var(--text3); display: block; margin-bottom: 8px; }
  .analytics-wrap {

  }
  .analytics-card {

</head>
<body>
<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>查看历史日報</h3>

    <div class="modal-btns">
      <button class="modal-btn secondary" onclick="closeModal()">取消</button>
      <button class="modal-btn primary" onclick="goToDate()">前往</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="hero">
  <div class="hero-inner">
    <div class="hero-top">

    </div>
  </div>
</div>

  </div>
</div>

  </div>

</div>

  <div class="analytics-wrap" id="analyticsWrap"></div>

  </div>

T16:00:01.000Z", "summary": "在 Replit 上为你的应用添加登录有两种方式：\n→ Replit Auth：零配置，用户使用其 Replit 账户登录\n→ Clerk Auth：你自己的品牌化登录，开发/生产环境均只需一个提示词。文档和视频见下方 👇\n\n文档：https：//docs.replit.com/learn/projects-and-artifacts/auth#auth", "category": "ai-products"}, {"id": "cmpmt9jei0rnwsl016h1v6av1", "title": "未来展望：2026年5月的一些想法", "title_en": "Some ideas for what comes next， May 2026", "url": "https://www.interconnects.ai/p/some-ideas-for-what-comes-next-may", "source": "Nathan Lambert：Interconnects（RSS）", "publishedAt": "2026-05-26T15:39:02.000Z", "summary": "文章展望了截至2026年5月AI领域的动态。内容涉及 Gemini Flash 3.5 的发布、名为 Mythos 的新产品或项目、开源与闭源生态平衡（open-closed balance）的讨论、美国开源力量的显著增长（America's open-source surge），以及由此引发的新兴权力博弈（emerging power struggles）。", "category": "tip"}, {"id": "cmpmsjd610rghsl01l5zfielj", "title": "KPop 新方法让 Ring-2.6-1T 在 SWE-bench Verified 上突破 76 分", "title_en": "From IcePop to KPop - our team keeps pushing on RL training stability for large MoE models. 👇 KPop…", "url": "https://x.com/AntLingAGI/status/2059292063032918422", "source": "X：蚂蚁百灵 (@AntLingAGI)", "publishedAt": "2026-05-26T15:14:22.000Z", "summary": "团队推出 KPop，用于稳定大规模 MoE 模型的智能体强化学习训练。它用基于二元 KL 散度的自适应掩码机制，替代了此前 IcePop 方法中的固定比例掩码，能根据训练过程中的训练-推理不匹配程度动态调整。这一改进使得 Ring-2.6-1T 模型在无需修改基础设施或路由重放的情况下，仅通过纯 RL 训练，在 SWE-bench Verified 上取得了超过 76 分的成绩。", "category": "paper"}, {"id": "cmpmrg7cj0r67sl01k9re3djr", "title": "SenseNova-U1全训练代码开源，支持多模态多任务训练", "title_en": "🚀 We've open-sourced the full training codebase for Sen…", "url": "https://x.com/SenseTime_AI/status/2059288013994406013", "source": "X：商汤 SenseTime (@SenseTime_AI)", "publishedAt": "2026-05-26T14:58:16.000Z", "summary": "OpenSenseNova开源了SenseNova-U1的完整训练代码库，支持其8B密集模型与A3B MoE架构。该代码库使用一个统一的框架，可同时训练多种多模态任务，包括文本到图像生成、图像编辑、交错生成及文本与视觉理解。工程上为大规模训练设计，支持混合并行、流式可恢复数据管线、环境变量驱动配置以及从1×8 GPUs到多节点集群的扩展能力。代码已在GitHub开源，采用Apache-2.0协议。", "category": "tip"}, {"id": "cmpmqm3d00r0wsl018dub96w0", "title": "Project Luxo：跨越AI媒体的恐怖谷", "title_en": "Project Luxo： Crossing the Uncanny Valley of AI Media", "url": "https://runwayml.com/news/project-luxo", "source": "Runway：News（网页）", "publishedAt": "2026-05-26T14:34:37.143Z", "summary": "Runway通过Project Luxo研究发现，AI生成视频已跨越\"恐怖谷\"。他们向创意生态从业者展示了《The Rogue》等AI短片及广告样片，评估显示观众开始关注故事本身，而非技术瑕疵。所有作品均由单人团队制作，耗时从3周到4小时不等。Runway认为，这标志着AI媒体成熟--当技术足够好以至于\"隐形\"，观众沉浸于故事时，便实现了这一跨越。", "category": "tip"}, {"id": "cmpmq04030qtssl011r5fyxzr", "title": "OpenRouter完成1.13亿美元B轮融资", "title_en": "Today we're announcing our $113M Series B led by @CapitalGVC. Over the last 6 months， weekly volume…", "url": "https://x.com/OpenRouter/status/2059277623629664758", "source": "X：OpenRouter (@OpenRouter)", "publishedAt": "2026-05-26T14:16:59.000Z", "summary": "今天我们宣布完成由@CapitalGVC领投的1.13亿美元B轮融资。\n过去6个月，随着AI从实验快速转向生产，OpenRouter的周处理量从5万亿增长到25万亿token。\n我们对未来充满期待。", "category": "industry"}, {"id": "cmpmpqf390qs1sl0100fxtfz5", "title": "微软亚洲研究院发起全球AI价值观挑战赛", "title_en": "Can AI reason about human values with real-world complexity？ Microsoft Research Asia's new Global AI…", "url": "https://x.com/MSFTResearch/status/2059273348232724565", "source": "X：Microsoft Research (@MSFTResearch)", "publishedAt": "2026-05-26T14:00:00.000Z", "summary": "AI能否理解人类价值观的现实复杂性？微软亚洲研究院的全新全球AI价值观挑战赛，诚邀哲学、伦理、法学和社会科学领域的研究人员共同探索。立即注册：https：//msft.it/6012vk8OO", "category": "industry"}, {"id": "cmpmplk2x0qq8sl01a5szni18", "title": "Sundar Pichai 谈 AI、搜索的未来及网络的变化", "title_en": "Sundar Pichai on AI， the future of search， and what's happening to the web", "url": "https://www.theverge.com/podcast/936445/sundar-pichai-ai-search-google-zero-youtube-web", "source": "The Verge：AI（RSS）", "publishedAt": "2026-05-26T14:00:00.000Z", "summary": "Google 与 Alphabet CEO Sundar Pichai 在 Google I/O 后受访，回顾了公司为应对 ChatGPT 而进行的战略重组与高管调整。访谈聚焦于新的 Gemini 模型及其在产品中的整合，包括全新的智能搜索框与 Gemini Spark 智能体平台，旨在让搜索从提供结果转向启动任务。Pichai 讨论了这些变化对开放网络的持续冲击，回应了主持人此前提出的\"Google Zero\"概念（即来自 Google 的网站流量可能归零），并提及 Google 正利用 YouTube 视频训练模型以改变视频搜索与索引方式。最后，他对 Google DeepMind CEO Demis Hassabis 关于\"处于智能奇点起步阶段\"的言论表示认同，并分享了对 AGI 时间线的看法。", "category": "tip"}, {"id": "cmpmkyxc60pjvsl01xm2idwf8", "title": "SynthID水印技术扩展合作，覆盖超千亿内容", "title_en": "SynthID has already watermarked over 100 billion pieces of content， but transparency is a team sport…", "url": "https://x.com/GoogleDeepMind/status/2059235181274202500", "source": "X：Google DeepMind (@GoogleDeepMind)", "publishedAt": "2026-05-26T11:28:20.000Z", "summary": "SynthID已为超过1000亿条内容添加水印，但透明度需要行业协作。\n因此，我们正与OpenAI、ElevenLabs和Kakao合作，将SynthID水印技术集成到他们的模型中--这延续了我们与NVIDIA共同推动的全行业趋势。", "category": "industry"}, {"id": "cmpmh9qz30oonsl01ee1xgzlj", "title": "四个月花光全年 AI 预算，Uber 总裁质疑 AI 投入合理性", "title_en": null, "url": "https://www.ithome.com/0/955/563.htm", "source": "IT之家（RSS）", "publishedAt": "2026-05-26T10:09:46.000Z", "summary": null, "category": "industry"}, {"id": "cmpmbf43e0n7xsl01lk5yoibm", "title": "阿里云CTO阐述从云原生到智能体原生转型", "title_en": "At #QwenConference2026， Dr. Feifei Li， CTO of Alibaba Cloud， President of International Business， ou…", "url": "https://x.com/alibaba_cloud/status/2059174528786268669", "source": "X：阿里云 / Alibaba Cloud (@alibaba_cloud)", "publishedAt": "2026-05-26T07:27:19.000Z", "summary": "在 #QwenConference2026 上，阿里云CTO、国际业务总裁李飞飞博士阐述了我们从云原生到智能体原生的转变。为了普及AI，我们构建了四大基石：模型、智能体云、工具与服务，以及规模。\n\n👉 敬请关注：https：//click.qwencloud.com/m/20000000187/", "category": "industry"}, {"id": "cmpmacj4m0mxusl014abz5r1f", "title": "Qwen3.7-Max 成为全球第二AI编程模型", "title_en": "Qwen3.7-Max is officially the #2 AI coding model globally. Scoring 1541 on Code Arena， it trails onl…", "url": "https://x.com/alibaba_cloud/status/2059163881361048011", "source": "X：阿里云 / Alibaba Cloud (@alibaba_cloud)", "publishedAt": "2026-05-26T06:45:01.000Z", "summary": "Qwen3.7-Max 正式成为全球第二大 AI 编程模型。在 Code Arena 上得分 1541，仅次于 Claude。专为生产环境打造：可运行 35 小时任务、1000+ 次工具调用，并在数小时内交付两周的项目。", "category": "ai-models"}, {"id": "cmpm8mi1b0missl01956c7w9e", "title": "\"龙虾之父\"Peter 开源 skill-cleaner，为 AI 智能体技能\"做体检\"", "title_en": "OpenClaw 龙虾之父教你省钱：开源 Skill 给你的 Skill 减肥", "url": "https://www.ithome.com/0/955/269.htm", "source": "IT之家（RSS）", "publishedAt": "2026-05-26T05:37:26.000Z", "summary": "\"龙虾之父\"Peter 开源了 skill-cleaner 工具，用于诊断和优化 AI 智能体的技能提示词。该工具包含5项核心功能，包括技能提示词预算审计、重复技能检测、未使用技能筛查、技能根目录审计和描述精简优化。其脚本采用标准 token 预算核算逻辑，旨在帮助减少冗长描述对 token 预算和上下文窗口的占用。已有用户实践显示，将技能描述从90多词精简至40词以内，能提升智能体选择技能的准确率。", "category": "tip"}, {"id": "cmpm8mi1b0miusl01tr5zuge8", "title": "面壁智能开源 MiniCPM5-1B：在 AA-Index 上超越所有 2B 参数以下模型，能跑在手机、浏览器上", "title_en": null, "url": "https://www.ithome.com/0/955/267.htm", "source": "IT之家（RSS）", "publishedAt": "2026-05-26T05:13:08.000Z", "summary": "面壁智能开源其新一代端侧大语言模型MiniCPM5-1B。该模型仅1B参数，在AA-Index榜单上超越所有2B参数以下模型，相比3个月前的Qwen3.5-2B效果更优且参数量减半。经INT4量化后权重仅0.5GB，支持在手机和浏览器上运行。其Base Model版本由面壁智能自主研发的AI训练框架ForgeTrain预训练完成，现已全面开源模型权重、训练数据集与部署方案。", "category": "ai-models"}, {"id": "cmpm6hb7i0m09sl01wqopbsoh", "title": "谷歌 AI 框架 AlphaProof Nexus 攻克 2 道悬置 56 年数学难题", "title_en": null, "url": "https://www.ithome.com/0/955/261.htm", "source": "IT之家（RSS）", "publishedAt": "2026-05-26T04:54:06.000Z", "summary": null, "category": "ai-models"}, {"id": "cmpm48qo90leysl017xmm4vhl", "title": "Kling AI驱动《大卫之家》实现多项行业首创", "title_en": "Jon Erwin - Founder & CCO of Wonder Project， CEO of Innovative Dreams， Creator of Amazon Prime hit s…", "url": "https://x.com/Kling_ai/status/2059121691385622761", "source": "X：可灵 Kling AI (@Kling_ai)", "publishedAt": "2026-05-26T03:57:22.000Z", "summary": "Jon Erwin - Wonder Project创始人兼首席创意官，Innovative Dreams首席执行官，亚马逊Prime热门剧集《大卫之家》创作者：\n\n\"Kling AI是《大卫之家》第一季和第二季背后的核心力量。最让我兴奋的是它实现了多项行业首创：在完成的剧集中首次使用AI生成场景，首个原生4K模型。其运动控制功能也使我们能够在AI生成中保留演员真实的情感和感受。\"", "category": "ai-products"}, {"id": "cmpm1qxvl0ktesl01chbln28n", "title": "腾讯混元新翻译模型双榜亮眼，小程序发布", "title_en": "🙏 Thank you all for the incredible love and support！ Our latest Tencent Hunyuan translation model…", "url": "https://x.com/TencentHunyuan/status/2059104921778352626", "source": "X：腾讯混元 (@TencentHunyuan)", "publishedAt": "2026-05-26T02:50:44.000Z", "summary": "腾讯混元发布翻译模型 Hy-MT2，在 Hugging Face 开源模型趋势排行榜上表现突出：1.8B 版本排名第一，30B-A3B（MoE）版本排名第四，下载量已超 7K。官方同步推出了基于该模型的\"腾讯混译\"微信小程序，支持语音输入与离线翻译，并可自定义翻译风格与指令。模型代码与权重已开源。", "category": "ai-models"}, {"id": "cmpnwyk2c0104slv4ynvin2w3", "title": "Gemini Embedding 2：来自Gemini的原生多模态嵌入模型", "title_en": "Gemini Embedding 2： A Native Multimodal Embedding Model from Gemini", "url": "https://arxiv.org/abs/2605.27295", "source": "HuggingFace Daily Papers（社区热门论文）", "publishedAt": "2026-05-26T00:00:00.000Z", "summary": "Google DeepMind推出Gemini Embedding 2，这是一款原生多模态嵌入模型，支持在统一表示空间中嵌入视频、音频、图像和文本。该模型利用Gemini的多模态能力，通过大规模对比学习实现SOTA性能。在关键基准上表现优异：MSCOCO取得62.9 R@1，Vatex取得68.8 NDCG@10，MTEB multilingual达到69.9，MTEB Code达到84.0，超越了专用模型。其统一能力使其适用于RAG、推荐与搜索等下游任务，并在天文学、生物科学、艺术和烹饪等专业领域展现出强大的零样本性能。", "category": "paper"}, {"id": "cmpnhwile0xr3sl016t6m8soc", "title": "MiniMax-M2系列：微小激活释放最大真实世界智能", "title_en": "The MiniMax-M2 Series： Mini Activations Unleashing Max Real-World Intelligence", "url": "https://arxiv.org/abs/2605.26494", "source": "HuggingFace Daily Papers（社区热门论文）", "publishedAt": "2026-05-26T00:00:00.000Z", "summary": "MiniMax推出M2系列大语言模型。其旗舰模型M2采用混合专家（MoE）架构，总参数229.9B，每个token仅激活9.8B参数。该系列专为智能体部署设计，基于三大组件构建：智能体驱动的数据管道、可扩展的智能体原生强化学习系统Forge，以及展示早期自我进化能力的M2.7检查点。这种设计使其在智能体编码、深度搜索、办公任务及推理基准测试中达到了前沿性能水平。", "category": "paper"}, {"id": "cmpn17grf0tlcsl01fs5lcfjh", "title": "智能体重力：谁在运行你的智能体？", "title_en": "Agent Gravity ： Who's Running Your Agents", "url": "https://www.tomtunguz.com/agent-gravity", "source": "Tomer Tunguz 博客（VC 分析）", "publishedAt": "2026-05-26T00:00:00.000Z", "summary": "在数据时代，数据重力是核心力量；而在智能体时代，智能体重力将扮演同样角色。智能体运行需要巨大算力，主要平台将激烈争夺以将其留在自家生态。平台上的智能体与数据越多，其智能体重力就越强。例如，Databricks在微软平台推出的某个功能，虽未明言此目的，却让用户更容易在Databricks中构建智能体，而非微软自家的Fabric。这可能使用户不知不觉间将高价值的智能体及数据工作负载迁移至该平台。因此，赢得并维持智能体重力，将成为智能体时代的核心竞争主题。", "category": "tip"}, {"id": "cmplvrbvr0ja8sl01cwts44vh", "title": "Anthropic 新模型震动金融圈，欧洲央行紧急开会要求升级网络防御", "title_en": null, "url": "https://www.ithome.com/0/955/090.htm", "source": "IT之家（RSS）", "publishedAt": "2026-05-25T23:53:30.000Z", "summary": null, "category": "industry"}, {"id": "cmplva72h0j6jsl01yvgbp7mk", "title": "微软 Copilot Cowork 存在文件泄露问题", "title_en": null, "url": "https://www.promptarmor.com/resources/microsoft-copilot-cowork-exfiltrates-files", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "publishedAt": "2026-05-25T23:25:48.799Z", "summary": null, "category": "paper"}, {"id": "cmpltm5n30is2sl015yqdvfvt", "title": "OpenAI GPT-5.6 模型曝下月发布：AI 上下文 150 万 tokens", "title_en": null, "url": "https://www.ithome.com/0/955/078.htm", "source": "IT之家（RSS）", "publishedAt": "2026-05-25T22:59:12.000Z", "summary": "多名开发者在 OpenAI Codex 后端日志中发现未官宣的 GPT-5.6 模型，内部代号 iris-alpha。该模型将支持 150 万 token 的上下文窗口，较当前 GPT-5.5 的 105 万 token 提升约 43%，有望于今年 6 月发布。测试显示，在输入达到 90 万 token 时仍能流畅响应。同系列还发现了 ember-alpha 与 beacon-alpha 版本。此外，GPT-5.6 在前端界面生成能力上也有所提升。基于爆料信息，Anthropic Claude、Google Gemini 及 xAI Grok 也可能瞄准同期发布新模型。", "category": "industry"}, {"id": "cmplmpmdq0h63sl013njdyiug", "title": "苹果据称正使用定制版1.2T参数Google模型重塑下一代Siri", "title_en": "Apple isn't just adding Gemini to Siri. It is reportedly using a custom 1.2T-parameter Google model …", "url": "https://x.com/kimmonismus/status/2058997271803674991", "source": "X：Kim (@kimmonismus)", "publishedAt": "2026-05-25T19:42:58.000Z", "summary": "据报道，苹果为改造下一代Siri，正使用一个定制版、参数规模达1.2T的Google大模型作为其核心，这显著大于预估约300B参数的Gemini 3.5 Flash。该模型将驱动Siri的部分功能，其中简单查询预期会在本地设备运行。苹果面临的关键挑战是确保该大模型能够足够快速地响应日常问题。此外，下个月AI领域预计将有多项重要发布，包括WWDC上的Apple Intelligence与Gemini整合、GPT-5.6、可能的Sonnet 4.8/Opus 4.8，以及已确认的Gemini 3.5 Pro。", "category": "industry"}, {"id": "cmplja6yg0gb1sl01686zrkeo", "title": "Grok Build Beta版向SuperGrok用户开放", "title_en": "Grok Build is now available in Beta for all SuperGrok and X Premium+ users. Use Plan Mode， create i…", "url": "https://x.com/xai/status/2058973760708091907", "source": "X：xAI (@xai)", "publishedAt": "2026-05-25T18:09:33.000Z", "summary": "Grok Build 现已面向所有 SuperGrok 和 X Premium+ 用户推出 Beta 版。\n使用 Plan Mode，通过 Imagine 创建图像和视频，并使用 CLI 构建自动化或编排器。\n访问 http：//x.ai/cli 开始使用。", "category": "ai-products"}, {"id": "cmpldyuyz0f2nsl01au9kw3uf", "title": "Qwen3.7-Max隐式缓存功能上线", "title_en": "✅Implicit caching is now live on Qwen3.7-Max - kicks in automatically， no setup needed. ⚡️Faster + …", "url": "https://x.com/Alibaba_Qwen/status/2058932656797368619", "source": "X：通义千问 / Qwen (@Alibaba_Qwen)", "publishedAt": "2026-05-25T15:26:13.000Z", "summary": "✅隐式缓存现已在Qwen3.7-Max上线--自动启用，无需设置。\n⚡️开箱即用，更快更便宜。\n\n需要更高、更确定的命中率？请尝试显式缓存。🙌\n🔗最佳实践🔗：https：//www.alibabacloud.com/help/en/model-studio/explicit-cache-best-practice", "category": "ai-products"}, {"id": "cmpldcxz10ew3sl01caeact4o", "title": "教皇里奥呼吁在AI时代保持\"深刻的人性\"", "title_en": "Pope Leo calls for being 'profoundly human' in the age of AI", "url": "https://www.theverge.com/news/936945/pope-leo-letter-encyclical-ai-anthropic-labor-warfare", "source": "The Verge：AI（RSS）", "publishedAt": "2026-05-25T15:05:07.000Z", "summary": "教皇里奥十四世在首份重要通谕《Magnifica Humanitas》中警告了AI及不受约束的技术力量带来的风险。该通谕于2026年5月15日发布，是教皇关于\"在人工智能时代守护人\"的宣言。文件重点讨论了AI驱动战争的危险、AI对劳动的影响，以及建立新的法律和伦理框架来规范技术的必要性，强调AI的快速普及正造成经济和社会动荡，对个人的保护不足威胁着人类尊严。", "category": "industry"}, {"id": "cmpkr0wyr09fisl01izzkuo8q", "title": "华为何庭波\"韬定律\"论文发布，逻辑折叠技术提升芯片性能", "title_en": "不依赖新光刻工艺！麒麟 2027、昇腾 990 芯片在路上，华为何庭波\"韬定律\"论文要点大揭秘", "url": "https://www.ithome.com/0/954/778.htm", "source": "IT之家（RSS）", "publishedAt": "2026-05-25T04:27:21.000Z", "summary": "华为何庭波在ISCAS 2026上提出\"韬定律\"，并介绍逻辑折叠（LogicFolding）技术。该技术通过三维空间拓扑重组提升芯片性能，不依赖新光刻工艺。在麒麟2026芯片测试中，晶体管密度从155 MTr/mm2提升至238 MTr/mm2，性能核心能效提高41%，最大时钟频率提升近13%。论文显示，麒麟2027芯片已进入Silicon状态，后续规划包括麒麟2028、2029。AI芯片方面，昇腾990计划在2030年左右引入逻辑折叠，硬件集成预计到2035年提高超过100倍。", "category": "paper"}, {"id": "cmpkovqp508w4sl01zz63gssx", "title": "面壁智能联合清华等开源中国首个基于华为昇腾训练的 1.58-bit 端侧大模型 BitCPM-CANN", "title_en": null, "url": "https://www.ithome.com/0/954/759.htm", "source": "IT之家（RSS）", "publishedAt": "2026-05-25T03:48:30.000Z", "summary": null, "category": "ai-models"}, {"id": "cmpm8v6b70mknsl01qf8lgf1r", "title": "通过奖励倾斜分布匹配强化少步生成器", "title_en": "Reinforcing Few-step Generators via Reward-Tilted Distribution Matching", "url": "https://arxiv.org/abs/2605.26108", "source": "HuggingFace Daily Papers（社区热门论文）", "publishedAt": "2026-05-25T00:00:00.000Z", "summary": "本文提出奖励倾斜分布匹配蒸馏（RTDMD），这是一个将分布匹配蒸馏与奖励引导强化学习统一应用于少步流生成器的两阶段框架。该方法通过最小化到奖励倾斜教师分布的KL散度，自然分解为分布匹配项与奖励最大化项。第一阶段引入环境一致分布匹配蒸馏（AC-DMD），在子区间进行分布匹配，并通过一致性正则化辅助分数模型追踪生成器分布。第二阶段联合优化两项，并推导混合策略梯度及步子集GRPO（SubGRPO）以降低方差。在SD3、SD3.5和FLUX.2上的实验表明，RTDMD仅用4步推理即可在偏好、美学和组合指标上达到新的 state-of-the-art。", "category": "paper"}, {"id": "cmpleus3t0f8rsl01ztd88k2u", "title": "Harness、Scaffold 与 AI 智能体术语辨析", "title_en": "Harness， Scaffold， and the AI Agent Terms Worth Getting Right", "url": "https://huggingface.co/blog/agent-glossary", "source": "Hugging Face：Blog（RSS）", "publishedAt": "2026-05-25T00:00:00.000Z", "summary": "本文旨在厘清 AI 智能体领域中易混淆的关键术语。文章指出，模型（如 Claude、GPT）本身是无记忆、无循环的大语言模型。其行为由\"Scaffolding\"（行为定义层，如系统提示、工具描述）塑造，而\"Harness\"（执行层）负责调用模型、处理工具调用与控制循环，是智能体运行的核心。两者结合，模型才能成为智能体。文章以 Claude Code、Codex 为例，说明同一模型搭配不同 Harness 会产生迥异体验，并提出了 Agent = Model + Harness 的常见理解框架。术语尚未统一，本文旨在提供一个实用的心智模型。", "category": "tip"}, {"id": "cmpkd0u6q05zssl01cy9jq6ro", "title": "Luma Agents 实现规模化真实 UGC 广告生成", "title_en": "Authenticity at scale used to be a contradiction. Not anymore. Define the brief. Set the style. Lum…", "url": "https://x.com/LumaLabsAI/status/2058672731705503959", "source": "X：Luma AI (@LumaLabsAI)", "publishedAt": "2026-05-24T22:13:22.000Z", "summary": "规模化的真实性曾是矛盾，如今已成现实。\n定义简报，设定风格，Luma Agents 从这里构建每一条 UGC 风格广告。\n让它真实 → http：//lumalabs.ai/app", "category": "ai-products"}, {"id": "cmpk417ey03vssl01z5zsemms", "title": "DeepSeek将对其旗舰AI模型实施永久性75%折扣", "title_en": null, "url": "https://www.bloomberg.com/news/articles/2026-05-23/deepseek-to-make-permanent-75-discount-on-flagship-ai-model", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "publishedAt": "2026-05-24T18:08:57.964Z", "summary": null, "category": "industry"}, {"id": "cmpk270zc03fusl01q0nprvlc", "title": "面向 Codex 的自我优化提示词框架", "title_en": "self improvement prompt for codex", "url": "https://x.com/gdb/status/2058598608224858442", "source": "X：Greg Brockman (@gdb)", "publishedAt": "2026-05-24T17:18:49.000Z", "summary": "这是一个结构化的提示词，用于指导 Codex 自动分析其历史记录以识别并固化重复工作流。该框架要求 Codex 回顾会话、Memories 等数据，找出重复、耗时且有明确复用价值的任务。筛选标准包括至少出现两次、输入稳定、可提升效率等。最终，Codex 应以\"技能\"、子智能体或自动化工具等最小实用形式创建或扩展现有资产，避免冗余。流程包括生成候选清单、执行创建，并汇报结果与待验证项。", "category": "tip"}], "sections": [{"label": "模型发布/更新", "slug": "ai-models", "count": 5, "items": [{"idx": 1, "title": "Qwen3.7-Max 成为全球第二AI编程模型", "summary": "Qwen3.7-Max 正式成为全球第二大 AI 编程模型。在 Code Arena 上得分 1541，仅次于 Claude。专为生产环境打造：可运行 35 小时任务、1000+ 次工具调用，并在数小时内交付两周的项目。", "publishedAt": "2026-05-26T06:45:01.000Z", "category": "ai-models", "sourceName": "X：阿里云 / Alibaba Cloud (@alibaba_cloud)", "sourceUrl": "https://x.com/alibaba_cloud/status/2059163881361048011"}, {"idx": 2, "title": "面壁智能开源 MiniCPM5-1B：在 AA-Index 上超越所有 2B 参数以下模型，能跑在手机、浏览器上", "summary": "面壁智能开源其新一代端侧大语言模型MiniCPM5-1B。该模型仅1B参数，在AA-Index榜单上超越所有2B参数以下模型，相比3个月前的Qwen3.5-2B效果更优且参数量减半。经INT4量化后权重仅0.5GB，支持在手机和浏览器上运行。其Base Model版本由面壁智能自主研发的AI训练框架ForgeTrain预训练完成，现已全面开源模型权重、训练数据集与部署方案。", "publishedAt": "2026-05-26T05:13:08.000Z", "category": "ai-models", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/955/267.htm"}, {"idx": 3, "title": "谷歌 AI 框架 AlphaProof Nexus 攻克 2 道悬置 56 年数学难题", "summary": "", "publishedAt": "2026-05-26T04:54:06.000Z", "category": "ai-models", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/955/261.htm"}, {"idx": 4, "title": "腾讯混元新翻译模型双榜亮眼，小程序发布", "summary": "腾讯混元发布翻译模型 Hy-MT2，在 Hugging Face 开源模型趋势排行榜上表现突出：1.8B 版本排名第一，30B-A3B（MoE）版本排名第四，下载量已超 7K。官方同步推出了基于该模型的\"腾讯混译\"微信小程序，支持语音输入与离线翻译，并可自定义翻译风格与指令。模型代码与权重已开源。", "publishedAt": "2026-05-26T02:50:44.000Z", "category": "ai-models", "sourceName": "X：腾讯混元 (@TencentHunyuan)", "sourceUrl": "https://x.com/TencentHunyuan/status/2059104921778352626"}, {"idx": 5, "title": "面壁智能联合清华等开源中国首个基于华为昇腾训练的 1.58-bit 端侧大模型 BitCPM-CANN", "summary": "", "publishedAt": "2026-05-25T03:48:30.000Z", "category": "ai-models", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/954/759.htm"}]}, {"label": "产品发布/更新", "slug": "ai-products", "count": 10, "items": [{"idx": 6, "title": "Qoder平台限时半价使用Qwen3.7-Max模型", "summary": "🙌🙌\n\n【引用 @qoder_ai_ide】：Qwen3.7-Max，半价。\n\n从今天起，Qwen3.7-Max--通义千问（Qwen）家族的最新旗舰模型--在Qoder上半价提供。限时活动。\n\n新用户？你每天还能获得100次免费模型调用。自动应用，无需领取，无需开关。\n桌面端、JetBrains插件、CLI、QoderWork、QoderWake--全部覆盖。\n\n现在正是用它处理难题的好时机。", "publishedAt": "2026-05-27T10:43:51.000Z", "category": "ai-products", "sourceName": "X：通义千问 / Qwen (@Alibaba_Qwen)", "sourceUrl": "https://x.com/Alibaba_Qwen/status/2059586373456380225"}, {"idx": 7, "title": "Claude Code v2.1.152 更新发布", "summary": "Claude Code 发布 v2.1.152 版本更新。核心改进包括：`/code-review --fix` 现在会将审查建议直接应用于工作目录；技能与斜杠命令支持通过 frontmatter 的 `disallowed-tools` 移除模型工具；新增 `/reload-skills` 命令可不重启会话重新扫描技能目录；`SessionStart` 钩子现可返回 `reloadSkills： true` 重新扫描技能，并可通过 `hookSpecificOutput.sessionTitle` 设置会话标题；新增 `MessageDisplay` 钩子事件以变换或隐藏助手消息。其他更新涉及插件市场管理、主模型不可用时自动切换至 `--fallback-model`、会话用量统计优化等。同时修复了终端样式退化、沙箱警告显示、思考摘要、MCP 服务器去重、远程会话连接及多种会话卡顿问题。", "publishedAt": "2026-05-27T01:30:59.000Z", "category": "ai-products", "sourceName": "Claude Code：GitHub Releases（RSS）", "sourceUrl": "https://github.com/anthropics/claude-code/releases/tag/v2.1.152"}, {"idx": 8, "title": "Code w/ Claude 伦敦活动：重塑开发体验", "summary": "在Code w/ Claude 伦敦活动上，Anthropic 宣布了 Claude Managed Agents 的两项新能力：自托管沙箱（公开测试版）和 MCP 隧道（研究预览）。这两项功能使 AI 智能体的工具执行环境与企业私有网络内的 MCP 服务器连接均可运行在客户自有基础设施或指定托管服务商处。活动还介绍了如何通过 Claude Code、优化思维预算以及模型努力级别来提升开发体验。目前，包括 Spotify、Base44 和 Legora 在内的客户已在使用这些新功能。", "publishedAt": "2026-05-27T01:04:42.394Z", "category": "ai-products", "sourceName": "Claude：Blog（网页）", "sourceUrl": "https://claude.com/blog/code-w-claude-london-2026-rethinking-how-we-build"}, {"idx": 9, "title": "Claude Code推出安全漏洞识别插件", "summary": "我们为Claude Code发布了一个安全指导插件，可在编写代码时帮助识别和修复漏洞。\n所有Claude Code用户均可使用。从插件市场（/plugins）安装。", "publishedAt": "2026-05-26T21:24:37.000Z", "category": "ai-products", "sourceName": "X：Claude Devs (@ClaudeDevs)", "sourceUrl": "https://x.com/ClaudeDevs/status/2059385239781384341"}, {"idx": 10, "title": "MiMo 2.5 Pro大幅降价，与DeepSeek V4 Pro同价", "summary": "小米MiMo-V2.5系列API价格永久下调，最高降幅达99%，现与DeepSeek V4 Pro同价。Token套餐同步升级，同等价格下可用token量增加5-8倍，计费规则更简单透明。所有现有用户套餐额度将全额重置。此次降价源于MiMo全栈推理优化与服务效率提升，后续将发布技术博客详述细节。MiMo-V2.5-TTS限时免费，新定价于5月26日生效。", "publishedAt": "2026-05-26T19:21:58.000Z", "category": "ai-products", "sourceName": "X：Kim (@kimmonismus)", "sourceUrl": "https://x.com/kimmonismus/status/2059354372643975490"}, {"idx": 11, "title": "Replit 应用添加登录的两种方式", "summary": "在 Replit 上为你的应用添加登录有两种方式：\n→ Replit Auth：零配置，用户使用其 Replit 账户登录\n→ Clerk Auth：你自己的品牌化登录，开发/生产环境均只需一个提示词。文档和视频见下方 👇\n\n文档：https：//docs.replit.com/learn/projects-and-artifacts/auth#auth", "publishedAt": "2026-05-26T16:00:01.000Z", "category": "ai-products", "sourceName": "X：Replit (@Replit)", "sourceUrl": "https://x.com/Replit/status/2059303550375674139"}, {"idx": 12, "title": "Kling AI驱动《大卫之家》实现多项行业首创", "summary": "Jon Erwin - Wonder Project创始人兼首席创意官，Innovative Dreams首席执行官，亚马逊Prime热门剧集《大卫之家》创作者：\n\n\"Kling AI是《大卫之家》第一季和第二季背后的核心力量。最让我兴奋的是它实现了多项行业首创：在完成的剧集中首次使用AI生成场景，首个原生4K模型。其运动控制功能也使我们能够在AI生成中保留演员真实的情感和感受。\"", "publishedAt": "2026-05-26T03:57:22.000Z", "category": "ai-products", "sourceName": "X：可灵 Kling AI (@Kling_ai)", "sourceUrl": "https://x.com/Kling_ai/status/2059121691385622761"}, {"idx": 13, "title": "Grok Build Beta版向SuperGrok用户开放", "summary": "Grok Build 现已面向所有 SuperGrok 和 X Premium+ 用户推出 Beta 版。\n使用 Plan Mode，通过 Imagine 创建图像和视频，并使用 CLI 构建自动化或编排器。\n访问 http：//x.ai/cli 开始使用。", "publishedAt": "2026-05-25T18:09:33.000Z", "category": "ai-products", "sourceName": "X：xAI (@xai)", "sourceUrl": "https://x.com/xai/status/2058973760708091907"}, {"idx": 14, "title": "Qwen3.7-Max隐式缓存功能上线", "summary": "✅隐式缓存现已在Qwen3.7-Max上线--自动启用，无需设置。\n⚡️开箱即用，更快更便宜。\n\n需要更高、更确定的命中率？请尝试显式缓存。🙌\n🔗最佳实践🔗：https：//www.alibabacloud.com/help/en/model-studio/explicit-cache-best-practice", "publishedAt": "2026-05-25T15:26:13.000Z", "category": "ai-products", "sourceName": "X：通义千问 / Qwen (@Alibaba_Qwen)", "sourceUrl": "https://x.com/Alibaba_Qwen/status/2058932656797368619"}, {"idx": 15, "title": "Luma Agents 实现规模化真实 UGC 广告生成", "summary": "规模化的真实性曾是矛盾，如今已成现实。\n定义简报，设定风格，Luma Agents 从这里构建每一条 UGC 风格广告。\n让它真实 → http：//lumalabs.ai/app", "publishedAt": "2026-05-24T22:13:22.000Z", "category": "ai-products", "sourceName": "X：Luma AI (@LumaLabsAI)", "sourceUrl": "https://x.com/LumaLabsAI/status/2058672731705503959"}]}, {"label": "行业动态", "slug": "industry", "count": 16, "items": [{"idx": 16, "title": "阿里云入选Omdia智能体AI市场雷达领导者", "summary": "阿里云在Omdia的智能体AI市场雷达中被评为领导者。Omdia强调了阿里云在每一层的全栈能力，认可其是首个将整个平台围绕智能体范式进行构建的云服务商。", "publishedAt": "2026-05-27T05:39:14.000Z", "category": "industry", "sourceName": "X：阿里云 / Alibaba Cloud (@alibaba_cloud)", "sourceUrl": "https://x.com/alibaba_cloud/status/2059509714854007181"}, {"idx": 17, "title": "我国将加快研究推进人工智能健康发展综合性立法、低空经济立法等", "summary": "", "publishedAt": "2026-05-27T02:54:29.000Z", "category": "industry", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/955/758.htm"}, {"idx": 18, "title": "阿里云成为PyTorch基金会白金会员", "summary": "阿里云宣布以白金会员身份加入PyTorch基金会。作为AI基础设施全球领导者，阿里云是开源模型家族Qwen的缔造方，已在多样化硬件上大规模运行PyTorch，将为社区带来生产级工程经验。", "publishedAt": "2026-05-27T01:56:17.000Z", "category": "industry", "sourceName": "X：阿里云 / Alibaba Cloud (@alibaba_cloud)", "sourceUrl": "https://x.com/alibaba_cloud/status/2059453607075004835"}, {"idx": 19, "title": "消息称高通与字节跳动达成 AI ASIC 芯片合作，采购量在数百万颗级别", "summary": "", "publishedAt": "2026-05-27T01:12:31.000Z", "category": "industry", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/955/674.htm"}, {"idx": 20, "title": "Anthropic任命KiYoung Choi为韩国代表董事", "summary": "Anthropic宣布任命KiYoung Choi为韩国代表董事，以支持其即将在首尔开设的办公室。根据Anthropic的经济指数，韩国是Claude.ai全球最活跃的市场之一，其使用率超过人口规模预期的3.5倍，主要用于技术和创意领域。KiYoung Choi此前曾担任Snowflake韩国区总经理，在Google Cloud、Adobe等公司拥有超过30年的科技行业领导经验。他将在韩国领导市场战略，支持本地企业和初创公司应用Claude，例如法律科技公司Law&Company及韩国电信巨头SK Telecom均已在使用Claude构建产品。", "publishedAt": "2026-05-26T23:34:41.030Z", "category": "industry", "sourceName": "Anthropic：Newsroom（网页）", "sourceUrl": "https://www.anthropic.com/news/kiyoung-choi-representative-director-anthropic-korea"}, {"idx": 21, "title": "据报道Claude Mythos以\"巧妙简洁的证明\"解决了OpenAI里程碑式的Erdős问题", "summary": "Anthropic工程师Sholto Douglas表示，Claude Mythos在周末期间解决了OpenAI提出的Erdős单位距离猜想问题，并给出了一个\"巧妙简洁的证明\"。这一成果被描述为人工智能在数学发现领域存在\"严重超前\"迹象。", "publishedAt": "2026-05-26T18:31:07.000Z", "category": "industry", "sourceName": "The Decoder：AI News（RSS）", "sourceUrl": "https://the-decoder.com/claude-mythos-reportedly-solves-openais-landmark-erdos-problem-with-a-cute-simple-proof"}, {"idx": 22, "title": "OpenRouter完成1.13亿美元B轮融资", "summary": "今天我们宣布完成由@CapitalGVC领投的1.13亿美元B轮融资。\n过去6个月，随着AI从实验快速转向生产，OpenRouter的周处理量从5万亿增长到25万亿token。\n我们对未来充满期待。", "publishedAt": "2026-05-26T14:16:59.000Z", "category": "industry", "sourceName": "X：OpenRouter (@OpenRouter)", "sourceUrl": "https://x.com/OpenRouter/status/2059277623629664758"}, {"idx": 23, "title": "微软亚洲研究院发起全球AI价值观挑战赛", "summary": "AI能否理解人类价值观的现实复杂性？微软亚洲研究院的全新全球AI价值观挑战赛，诚邀哲学、伦理、法学和社会科学领域的研究人员共同探索。立即注册：https：//msft.it/6012vk8OO", "publishedAt": "2026-05-26T14:00:00.000Z", "category": "industry", "sourceName": "X：Microsoft Research (@MSFTResearch)", "sourceUrl": "https://x.com/MSFTResearch/status/2059273348232724565"}, {"idx": 24, "title": "SynthID水印技术扩展合作，覆盖超千亿内容", "summary": "SynthID已为超过1000亿条内容添加水印，但透明度需要行业协作。\n因此，我们正与OpenAI、ElevenLabs和Kakao合作，将SynthID水印技术集成到他们的模型中--这延续了我们与NVIDIA共同推动的全行业趋势。", "publishedAt": "2026-05-26T11:28:20.000Z", "category": "industry", "sourceName": "X：Google DeepMind (@GoogleDeepMind)", "sourceUrl": "https://x.com/GoogleDeepMind/status/2059235181274202500"}, {"idx": 25, "title": "四个月花光全年 AI 预算，Uber 总裁质疑 AI 投入合理性", "summary": "", "publishedAt": "2026-05-26T10:09:46.000Z", "category": "industry", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/955/563.htm"}, {"idx": 26, "title": "阿里云CTO阐述从云原生到智能体原生转型", "summary": "在 #QwenConference2026 上，阿里云CTO、国际业务总裁李飞飞博士阐述了我们从云原生到智能体原生的转变。为了普及AI，我们构建了四大基石：模型、智能体云、工具与服务，以及规模。\n\n👉 敬请关注：https：//click.qwencloud.com/m/20000000187/", "publishedAt": "2026-05-26T07:27:19.000Z", "category": "industry", "sourceName": "X：阿里云 / Alibaba Cloud (@alibaba_cloud)", "sourceUrl": "https://x.com/alibaba_cloud/status/2059174528786268669"}, {"idx": 27, "title": "Anthropic 新模型震动金融圈，欧洲央行紧急开会要求升级网络防御", "summary": "", "publishedAt": "2026-05-25T23:53:30.000Z", "category": "industry", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/955/090.htm"}, {"idx": 28, "title": "OpenAI GPT-5.6 模型曝下月发布：AI 上下文 150 万 tokens", "summary": "多名开发者在 OpenAI Codex 后端日志中发现未官宣的 GPT-5.6 模型，内部代号 iris-alpha。该模型将支持 150 万 token 的上下文窗口，较当前 GPT-5.5 的 105 万 token 提升约 43%，有望于今年 6 月发布。测试显示，在输入达到 90 万 token 时仍能流畅响应。同系列还发现了 ember-alpha 与 beacon-alpha 版本。此外，GPT-5.6 在前端界面生成能力上也有所提升。基于爆料信息，Anthropic Claude、Google Gemini 及 xAI Grok 也可能瞄准同期发布新模型。", "publishedAt": "2026-05-25T22:59:12.000Z", "category": "industry", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/955/078.htm"}, {"idx": 29, "title": "苹果据称正使用定制版1.2T参数Google模型重塑下一代Siri", "summary": "据报道，苹果为改造下一代Siri，正使用一个定制版、参数规模达1.2T的Google大模型作为其核心，这显著大于预估约300B参数的Gemini 3.5 Flash。该模型将驱动Siri的部分功能，其中简单查询预期会在本地设备运行。苹果面临的关键挑战是确保该大模型能够足够快速地响应日常问题。此外，下个月AI领域预计将有多项重要发布，包括WWDC上的Apple Intelligence与Gemini整合、GPT-5.6、可能的Sonnet 4.8/Opus 4.8，以及已确认的Gemini 3.5 Pro。", "publishedAt": "2026-05-25T19:42:58.000Z", "category": "industry", "sourceName": "X：Kim (@kimmonismus)", "sourceUrl": "https://x.com/kimmonismus/status/2058997271803674991"}, {"idx": 30, "title": "教皇里奥呼吁在AI时代保持\"深刻的人性\"", "summary": "教皇里奥十四世在首份重要通谕《Magnifica Humanitas》中警告了AI及不受约束的技术力量带来的风险。该通谕于2026年5月15日发布，是教皇关于\"在人工智能时代守护人\"的宣言。文件重点讨论了AI驱动战争的危险、AI对劳动的影响，以及建立新的法律和伦理框架来规范技术的必要性，强调AI的快速普及正造成经济和社会动荡，对个人的保护不足威胁着人类尊严。", "publishedAt": "2026-05-25T15:05:07.000Z", "category": "industry", "sourceName": "The Verge：AI（RSS）", "sourceUrl": "https://www.theverge.com/news/936945/pope-leo-letter-encyclical-ai-anthropic-labor-warfare"}, {"idx": 31, "title": "DeepSeek将对其旗舰AI模型实施永久性75%折扣", "summary": "", "publishedAt": "2026-05-24T18:08:57.964Z", "category": "industry", "sourceName": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://www.bloomberg.com/news/articles/2026-05-23/deepseek-to-make-permanent-75-discount-on-flagship-ai-model"}]}, {"label": "论文研究", "slug": "paper", "count": 6, "items": [{"idx": 32, "title": "KPop 新方法让 Ring-2.6-1T 在 SWE-bench Verified 上突破 76 分", "summary": "团队推出 KPop，用于稳定大规模 MoE 模型的智能体强化学习训练。它用基于二元 KL 散度的自适应掩码机制，替代了此前 IcePop 方法中的固定比例掩码，能根据训练过程中的训练-推理不匹配程度动态调整。这一改进使得 Ring-2.6-1T 模型在无需修改基础设施或路由重放的情况下，仅通过纯 RL 训练，在 SWE-bench Verified 上取得了超过 76 分的成绩。", "publishedAt": "2026-05-26T15:14:22.000Z", "category": "paper", "sourceName": "X：蚂蚁百灵 (@AntLingAGI)", "sourceUrl": "https://x.com/AntLingAGI/status/2059292063032918422"}, {"idx": 33, "title": "Gemini Embedding 2：来自Gemini的原生多模态嵌入模型", "summary": "Google DeepMind推出Gemini Embedding 2，这是一款原生多模态嵌入模型，支持在统一表示空间中嵌入视频、音频、图像和文本。该模型利用Gemini的多模态能力，通过大规模对比学习实现SOTA性能。在关键基准上表现优异：MSCOCO取得62.9 R@1，Vatex取得68.8 NDCG@10，MTEB multilingual达到69.9，MTEB Code达到84.0，超越了专用模型。其统一能力使其适用于RAG、推荐与搜索等下游任务，并在天文学、生物科学、艺术和烹饪等专业领域展现出强大的零样本性能。", "publishedAt": "2026-05-26T00:00:00.000Z", "category": "paper", "sourceName": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2605.27295"}, {"idx": 34, "title": "MiniMax-M2系列：微小激活释放最大真实世界智能", "summary": "MiniMax推出M2系列大语言模型。其旗舰模型M2采用混合专家（MoE）架构，总参数229.9B，每个token仅激活9.8B参数。该系列专为智能体部署设计，基于三大组件构建：智能体驱动的数据管道、可扩展的智能体原生强化学习系统Forge，以及展示早期自我进化能力的M2.7检查点。这种设计使其在智能体编码、深度搜索、办公任务及推理基准测试中达到了前沿性能水平。", "publishedAt": "2026-05-26T00:00:00.000Z", "category": "paper", "sourceName": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2605.26494"}, {"idx": 35, "title": "微软 Copilot Cowork 存在文件泄露问题", "summary": "", "publishedAt": "2026-05-25T23:25:48.799Z", "category": "paper", "sourceName": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://www.promptarmor.com/resources/microsoft-copilot-cowork-exfiltrates-files"}, {"idx": 36, "title": "华为何庭波\"韬定律\"论文发布，逻辑折叠技术提升芯片性能", "summary": "华为何庭波在ISCAS 2026上提出\"韬定律\"，并介绍逻辑折叠（LogicFolding）技术。该技术通过三维空间拓扑重组提升芯片性能，不依赖新光刻工艺。在麒麟2026芯片测试中，晶体管密度从155 MTr/mm2提升至238 MTr/mm2，性能核心能效提高41%，最大时钟频率提升近13%。论文显示，麒麟2027芯片已进入Silicon状态，后续规划包括麒麟2028、2029。AI芯片方面，昇腾990计划在2030年左右引入逻辑折叠，硬件集成预计到2035年提高超过100倍。", "publishedAt": "2026-05-25T04:27:21.000Z", "category": "paper", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/954/778.htm"}, {"idx": 37, "title": "通过奖励倾斜分布匹配强化少步生成器", "summary": "本文提出奖励倾斜分布匹配蒸馏（RTDMD），这是一个将分布匹配蒸馏与奖励引导强化学习统一应用于少步流生成器的两阶段框架。该方法通过最小化到奖励倾斜教师分布的KL散度，自然分解为分布匹配项与奖励最大化项。第一阶段引入环境一致分布匹配蒸馏（AC-DMD），在子区间进行分布匹配，并通过一致性正则化辅助分数模型追踪生成器分布。第二阶段联合优化两项，并推导混合策略梯度及步子集GRPO（SubGRPO）以降低方差。在SD3、SD3.5和FLUX.2上的实验表明，RTDMD仅用4步推理即可在偏好、美学和组合指标上达到新的 state-of-the-art。", "publishedAt": "2026-05-25T00:00:00.000Z", "category": "paper", "sourceName": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2605.26108"}]}, {"label": "技巧与观点", "slug": "tip", "count": 13, "items": [{"idx": 38, "title": "OpenAI 奥尔特曼称 AI 对白领冲击不如预期般严重：我很高兴自己当时错了", "summary": "", "publishedAt": "2026-05-27T07:48:22.000Z", "category": "tip", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/956/021.htm"}, {"idx": 39, "title": "Gemini Omni 视频提示词使用指南", "summary": "Google 发布了其多模态模型 Gemini Omni 的视频生成功能使用指南。该模型可通过 Gemini 应用、Google Flow 等平台体验。指南包含五项提示词技巧：利用模型已有的现实世界知识进行简洁描述；精确控制文本在视频中的渲染与排版；使用专业镜头指令（如推拉摇移）像电影摄影师一样调度画面；通过迭代编辑高效修改视频；以及在生成中直接调整角色的动作节奏或情绪。其核心在于通过精准的提示词引导模型生成复杂且可控的视频内容。", "publishedAt": "2026-05-26T21:08:38.000Z", "category": "tip", "sourceName": "X：Google AI (@GoogleAI)", "sourceUrl": "https://x.com/GoogleAI/status/2059381218660270435"}, {"idx": 40, "title": "人类与AI分工：教育咨询及文学奖争议", "summary": "我写了一篇新文章，探讨我们需要保留哪些人类特质，以及哪些可以交给AI，其中涉及教育、咨询领域的实验，以及最近关于文学奖的争议。", "publishedAt": "2026-05-26T19:59:41.000Z", "category": "tip", "sourceName": "X：Ethan Mollick (@emollick)", "sourceUrl": "https://x.com/emollick/status/2059363865536668040"}, {"idx": 41, "title": "选择保持人性", "summary": "社交媒体平台上的帖子内容正变得越来越相似。这种趋同现象可能意味着大量内容正在被AI生成或同质化处理，引发了人们对于内容原创性与人类独特视角的讨论。", "publishedAt": "2026-05-26T19:56:01.000Z", "category": "tip", "sourceName": "Ethan Mollick：One Useful Thing（RSS）", "sourceUrl": "https://www.oneusefulthing.org/p/choosing-to-stay-human"}, {"idx": 42, "title": "我们如何对不同产品中的Claude进行隔离控制", "summary": "Anthropic通过三重机制控制Claude智能体的部署风险，包括用户误用、模型异常行为和外部攻击。其防护策略聚焦于三个层面：通过沙箱、虚拟机和网络出口控制限制智能体运行环境；利用系统提示词和模型训练引导其行为；以及对MCP服务器、第三方插件等外部内容实施细粒度权限管理。文章以Claude Code、claude.ai和Claude Cowork为例，阐述了不同产品如何设计对应的隔离架构。", "publishedAt": "2026-05-26T18:11:06.012Z", "category": "tip", "sourceName": "Anthropic：Engineering（事故复盘 + 工程实践 · 网页）", "sourceUrl": "https://www.anthropic.com/engineering/how-we-contain-claude"}, {"idx": 43, "title": "未来展望：2026年5月的一些想法", "summary": "文章展望了截至2026年5月AI领域的动态。内容涉及 Gemini Flash 3.5 的发布、名为 Mythos 的新产品或项目、开源与闭源生态平衡（open-closed balance）的讨论、美国开源力量的显著增长（America's open-source surge），以及由此引发的新兴权力博弈（emerging power struggles）。", "publishedAt": "2026-05-26T15:39:02.000Z", "category": "tip", "sourceName": "Nathan Lambert：Interconnects（RSS）", "sourceUrl": "https://www.interconnects.ai/p/some-ideas-for-what-comes-next-may"}, {"idx": 44, "title": "SenseNova-U1全训练代码开源，支持多模态多任务训练", "summary": "OpenSenseNova开源了SenseNova-U1的完整训练代码库，支持其8B密集模型与A3B MoE架构。该代码库使用一个统一的框架，可同时训练多种多模态任务，包括文本到图像生成、图像编辑、交错生成及文本与视觉理解。工程上为大规模训练设计，支持混合并行、流式可恢复数据管线、环境变量驱动配置以及从1×8 GPUs到多节点集群的扩展能力。代码已在GitHub开源，采用Apache-2.0协议。", "publishedAt": "2026-05-26T14:58:16.000Z", "category": "tip", "sourceName": "X：商汤 SenseTime (@SenseTime_AI)", "sourceUrl": "https://x.com/SenseTime_AI/status/2059288013994406013"}, {"idx": 45, "title": "Project Luxo：跨越AI媒体的恐怖谷", "summary": "Runway通过Project Luxo研究发现，AI生成视频已跨越\"恐怖谷\"。他们向创意生态从业者展示了《The Rogue》等AI短片及广告样片，评估显示观众开始关注故事本身，而非技术瑕疵。所有作品均由单人团队制作，耗时从3周到4小时不等。Runway认为，这标志着AI媒体成熟--当技术足够好以至于\"隐形\"，观众沉浸于故事时，便实现了这一跨越。", "publishedAt": "2026-05-26T14:34:37.143Z", "category": "tip", "sourceName": "Runway：News（网页）", "sourceUrl": "https://runwayml.com/news/project-luxo"}, {"idx": 46, "title": "Sundar Pichai 谈 AI、搜索的未来及网络的变化", "summary": "Google 与 Alphabet CEO Sundar Pichai 在 Google I/O 后受访，回顾了公司为应对 ChatGPT 而进行的战略重组与高管调整。访谈聚焦于新的 Gemini 模型及其在产品中的整合，包括全新的智能搜索框与 Gemini Spark 智能体平台，旨在让搜索从提供结果转向启动任务。Pichai 讨论了这些变化对开放网络的持续冲击，回应了主持人此前提出的\"Google Zero\"概念（即来自 Google 的网站流量可能归零），并提及 Google 正利用 YouTube 视频训练模型以改变视频搜索与索引方式。最后，他对 Google DeepMind CEO Demis Hassabis 关于\"处于智能奇点起步阶段\"的言论表示认同，并分享了对 AGI 时间线的看法。", "publishedAt": "2026-05-26T14:00:00.000Z", "category": "tip", "sourceName": "The Verge：AI（RSS）", "sourceUrl": "https://www.theverge.com/podcast/936445/sundar-pichai-ai-search-google-zero-youtube-web"}, {"idx": 47, "title": "\"龙虾之父\"Peter 开源 skill-cleaner，为 AI 智能体技能\"做体检\"", "summary": "\"龙虾之父\"Peter 开源了 skill-cleaner 工具，用于诊断和优化 AI 智能体的技能提示词。该工具包含5项核心功能，包括技能提示词预算审计、重复技能检测、未使用技能筛查、技能根目录审计和描述精简优化。其脚本采用标准 token 预算核算逻辑，旨在帮助减少冗长描述对 token 预算和上下文窗口的占用。已有用户实践显示，将技能描述从90多词精简至40词以内，能提升智能体选择技能的准确率。", "publishedAt": "2026-05-26T05:37:26.000Z", "category": "tip", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/955/269.htm"}, {"idx": 48, "title": "智能体重力：谁在运行你的智能体？", "summary": "在数据时代，数据重力是核心力量；而在智能体时代，智能体重力将扮演同样角色。智能体运行需要巨大算力，主要平台将激烈争夺以将其留在自家生态。平台上的智能体与数据越多，其智能体重力就越强。例如，Databricks在微软平台推出的某个功能，虽未明言此目的，却让用户更容易在Databricks中构建智能体，而非微软自家的Fabric。这可能使用户不知不觉间将高价值的智能体及数据工作负载迁移至该平台。因此，赢得并维持智能体重力，将成为智能体时代的核心竞争主题。", "publishedAt": "2026-05-26T00:00:00.000Z", "category": "tip", "sourceName": "Tomer Tunguz 博客（VC 分析）", "sourceUrl": "https://www.tomtunguz.com/agent-gravity"}, {"idx": 49, "title": "Harness、Scaffold 与 AI 智能体术语辨析", "summary": "本文旨在厘清 AI 智能体领域中易混淆的关键术语。文章指出，模型（如 Claude、GPT）本身是无记忆、无循环的大语言模型。其行为由\"Scaffolding\"（行为定义层，如系统提示、工具描述）塑造，而\"Harness\"（执行层）负责调用模型、处理工具调用与控制循环，是智能体运行的核心。两者结合，模型才能成为智能体。文章以 Claude Code、Codex 为例，说明同一模型搭配不同 Harness 会产生迥异体验，并提出了 Agent = Model + Harness 的常见理解框架。术语尚未统一，本文旨在提供一个实用的心智模型。", "publishedAt": "2026-05-25T00:00:00.000Z", "category": "tip", "sourceName": "Hugging Face：Blog（RSS）", "sourceUrl": "https://huggingface.co/blog/agent-glossary"}, {"idx": 50, "title": "面向 Codex 的自我优化提示词框架", "summary": "这是一个结构化的提示词，用于指导 Codex 自动分析其历史记录以识别并固化重复工作流。该框架要求 Codex 回顾会话、Memories 等数据，找出重复、耗时且有明确复用价值的任务。筛选标准包括至少出现两次、输入稳定、可提升效率等。最终，Codex 应以\"技能\"、子智能体或自动化工具等最小实用形式创建或扩展现有资产，避免冗余。流程包括生成候选清单、执行创建，并汇报结果与待验证项。", "publishedAt": "2026-05-24T17:18:49.000Z", "category": "tip", "sourceName": "X：Greg Brockman (@gdb)", "sourceUrl": "https://x.com/gdb/status/2058598608224858442"}]}]}
</script>
<script>
const EMBEDDED_DATA = JSON.parse(document.getElementById("dataSrc").textContent);
const SECTION_CONFIG = {"模型发布/更新": {"icon": "🤖", "color": "#7f6af0"}, "产品发布/更新": {"icon": "📦", "color": "#e8622a"}, "行业动态": {"icon": "🏭", "color": "#1d9e75"}, "论文研究": {"icon": "📄", "color": "#378add"}, "技巧与观点": {"icon": "💡", "color": "#e8a020"}};
const DAILY_STR = "2026-05-27";
const DAILY_MAX = "2026-05-27";

let currentData = null;
let currentDate = DAILY_STR;
let readSet = new Set();
let showOnlyUnread = false;
let currentFilter = 'all';
let currentSearch = '';
let isDark = true;

function reloadToday() {
  location.reload();
}
window.addEventListener('DOMContentLoaded', function() {
  try { readSet = new Set(JSON.parse(localStorage.getItem('aidaka_read_' + currentDate) || '[]')); } catch(e) {}
  try {
    var saved = localStorage.getItem('aidaka_theme');
    if (saved === 'light') { isDark = false; document.body.classList.add('light'); }
  } catch(e) {}
  updateThemeBtn();
  renderAll(EMBEDDED_DATA);
  setTimeout(function() {
    document.getElementById('loadingOverlay').style.opacity = '0';
    setTimeout(function() { document.getElementById('loadingOverlay').style.display = 'none'; }, 400);
  }, 300);
});

function renderAll(data) {
  currentData = data;
  var sections = data.sections || [];
  var total = sections.reduce(function(a, s) { return a + s.items.length; }, 0);
  var dateStr = fmtDate(data.date);
  document.getElementById('heroTitle').textContent = 'AI打卡网 · ' + dateStr;
  var gen = data.generatedAt ? new Date(data.generatedAt) : new Date();
  document.getElementById('heroSubtitle').textContent = '共收录 ' + total + ' 条资讯 · 来源精选 · 生成于 ' + relTime(gen);
  document.getElementById('navDateLabel').textContent = data.date;
  document.title = 'AI打卡网 · ' + data.date + ' (' + total + '条)';

  var statsEl = document.getElementById('heroStats');
  statsEl.innerHTML = '<div class="stat-chip" onclick="reloadToday()" title="刷新今日数据"><div class="num">' + total + '</div><div class="lbl">今日总条数</div></div>'
    + sections.map(function(s) {
      var cfg = SECTION_CONFIG[s.label] || { icon: '📌', color: '#888' };
      return '<div class="stat-chip" onclick="filterSection(\'' + s.label.replace(/'/g, "\\'") + '\'); scrollToSection(\'' + s.label.replace(/'/g, "\\'") + '\');" title="跳转到 ' + s.label + '"><div class="num" style="font-size:22px">' + cfg.icon + '</div><div class="lbl">' + s.label.replace('/更新','').replace('/观点','') + ' ' + s.items.length + '</div></div>';
    }).join('');

  renderDonut(sections);
  var navEl = document.getElementById('navInner');
  var dateArea = navEl.querySelector('.nav-date-area');
  navEl.querySelectorAll('.nav-sec-link').forEach(function(el) { el.remove(); });
  sections.forEach(function(s) {
    var cfg = SECTION_CONFIG[s.label] || { icon: '📌', color: '#888' };
    var a = document.createElement('a');
    a.className = 'nav-link nav-sec-link';
    a.href = '#sec-' + slugify(s.label);
    a.innerHTML = cfg.icon + ' ' + s.label + ' <span class="nav-badge">' + s.items.length + '</span>';
    a.onclick = function(e) { e.preventDefault(); filterSection(s.label, a); scrollToSection(s.label); };
    navEl.insertBefore(a, dateArea);
  });
  renderAnalytics(sections);
  var main = document.getElementById('main');
  main.querySelectorAll('.dyn-section').forEach(function(el) { el.remove(); });
  var globalIdx = 0;
  var frag = document.createDocumentFragment();
  sections.forEach(function(s) {
    var cfg = SECTION_CONFIG[s.label] || { icon: '📌', color: '#888' };
    var secDiv = document.createElement('div');
    secDiv.className = 'dyn-section';
    secDiv.id = 'sec-' + slugify(s.label);
    var header = document.createElement('div');
    header.className = 'section-header';
    header.innerHTML = '<div class="section-icon" style="background:' + cfg.color + '22; color:' + cfg.color + '">' + cfg.icon + '</div>'
      + '<span class="section-title">' + s.label + '</span>'
      + '<span class="section-count">' + s.items.length + ' 条</span>';
    secDiv.appendChild(header);
    if (s.items.length === 0) {
      secDiv.innerHTML += '<p style="color:var(--text3);font-size:13px;padding:12px 0">今日暂无相关资讯</p>';
    } else {
      var grid = document.createElement('div');
      grid.className = 'card-grid';
      s.items.forEach(function(item) {
        globalIdx++;
        var cardEl = buildCard(item, globalIdx);
        grid.appendChild(cardEl);
      });
      secDiv.appendChild(grid);
    }
    frag.appendChild(secDiv);
  });
  main.insertBefore(frag, main.querySelector('#noResults'));
  updateReadProgress(total);
  updateDateNav(data.date);
  document.getElementById('footerEl').innerHTML = '共 ' + total + ' 条资讯 · 数据来源 <a href="https://aihot.virxact.com" target="_blank" rel="noopener noreferrer" style="color:var(--accent)">aihot.virxact.com</a> · AI打卡网 每日晨报';
  setTimeout(initScrollAnim, 100);
}

function buildCard(item, idx) {
  var isRead = readSet.has(String(idx));
  var card = document.createElement('div');
  card.className = 'card' + (isRead ? ' read' : '');
  card.dataset.idx = idx;
  card.dataset.title = (item.title || '').toLowerCase();
  card.dataset.summary = (item.summary || '').toLowerCase();
  card.dataset.source = (item.sourceName || '').toLowerCase();
  var srcShort = shortSource(item.sourceName || '');
  var titleSafe = escHtml(item.title || '');
  var sourceNameSafe = escHtml(item.sourceName || '');
  var summaryRaw = item.summary || '';
  // Truncate summary to ~60 chars for display
  var summaryShort = summaryRaw.length > 65 ? summaryRaw.slice(0, 62) + '...' : summaryRaw;
  var summarySafe = escHtml(summaryShort);
  var summaryFull = escHtml(summaryRaw);
  var timeStr = item.publishedAt ? relTimeStr(item.publishedAt) : '';
  var sourceHtml = item.sourceUrl ? '<a class="source-btn" href="' + escHtml(item.sourceUrl) + '" target="_blank" rel="noopener noreferrer">原文</a>' : '';

  var inner = '<div class="card-header"><span class="card-num">' + idx + '</span><span class="card-title">' + titleSafe + '</span></div>';
  if (timeStr) { inner += '<span class="time-badge">' + escHtml(timeStr) + '</span>'; }
  inner += '<span class="card-source" title="' + sourceNameSafe + '">' + escHtml(srcShort) + '</span>'
    + '<div class="card-summary collapsed" id="sum-' + idx + '" data-full="' + escHtml(summaryRaw).replace(/"/g, '&quot;') + '">' + summarySafe + '</div>'
    + '<div class="card-footer">'
    + '<button class="expand-btn" onclick="toggleExpand(' + idx + ', this)">展开全文</button>'
    + '<div style="display:flex;gap:8px">'
    + '<button class="read-btn" onclick="markRead(' + idx + ', this)" id="rbtn-' + idx + '">' + (isRead ? '标为未读' : '打卡') + '</button>'
    + sourceHtml
    + '</div></div>';
  card.innerHTML = inner;
  // 点击卡片任意位置展开全文（按钮除外）
  card.addEventListener('click', function(e) {
    var target = e.target;
    if (target.closest('.read-btn') || target.closest('.source-btn') || target.closest('.expand-btn')) return;
    toggleExpand(idx, card.querySelector('.expand-btn'));
  });
  return card;
}

function renderDonut(sections) {
  var total = sections.reduce(function(a, s) { return a + s.items.length; }, 0);
  if (total === 0) return;
  var svgEl = document.getElementById('donutSvg');
  var legendEl = document.getElementById('donutLegend');
  svgEl.innerHTML = '';
  legendEl.innerHTML = '';
  var cx = 50, cy = 50, r = 36, inner = 22;
  var startAngle = -Math.PI / 2;
  sections.forEach(function(s) {
    if (s.items.length === 0) return;
    var cfg = SECTION_CONFIG[s.label] || { icon: '📌', color: '#888' };
    var angle = (s.items.length / total) * Math.PI * 2;
    var endAngle = startAngle + angle;
    var x1 = cx + r * Math.cos(startAngle), y1 = cy + r * Math.sin(startAngle);
    var x2 = cx + r * Math.cos(endAngle), y2 = cy + r * Math.sin(endAngle);
    var ix1 = cx + inner * Math.cos(startAngle), iy1 = cy + inner * Math.sin(startAngle);
    var ix2 = cx + inner * Math.cos(endAngle), iy2 = cy + inner * Math.sin(endAngle);
    var lg = angle > Math.PI ? 1 : 0;
    var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', 'M ' + ix1 + ' ' + iy1 + ' L ' + x1 + ' ' + y1 + ' A ' + r + ' ' + r + ' 0 ' + lg + ' 1 ' + x2 + ' ' + y2 + ' L ' + ix2 + ' ' + iy2 + ' A ' + inner + ' ' + inner + ' 0 ' + lg + ' 0 ' + ix1 + ' ' + iy1 + ' Z');
    path.setAttribute('fill', cfg.color);
    path.setAttribute('opacity', '0.85');
    path.style.cursor = 'pointer';
    path.addEventListener('click', (function(label) { return function() { filterSection(label); scrollToSection(label); }; })(s.label));
    svgEl.appendChild(path);
    startAngle = endAngle;
    var li = document.createElement('div');
    li.className = 'donut-legend-item';
    li.innerHTML = '<span class="dot" style="background:' + cfg.color + '"></span>' + s.label + ' <strong style="color:rgba(255,255,255,0.95)">' + s.items.length + '</strong>';
    li.onclick = (function(label) { return function() { filterSection(label); scrollToSection(label); }; })(s.label);
    legendEl.appendChild(li);
  });
  var text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  text.setAttribute('x', cx); text.setAttribute('y', cy + 1);
  text.setAttribute('text-anchor', 'middle'); text.setAttribute('dominant-baseline', 'middle');
  text.setAttribute('fill', 'rgba(255,255,255,0.9)'); text.setAttribute('font-size', '12');
  text.setAttribute('font-weight', '700'); text.textContent = total;
  svgEl.appendChild(text);
  var sub = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  sub.setAttribute('x', cx); sub.setAttribute('y', cy + 13);
  sub.setAttribute('text-anchor', 'middle'); sub.setAttribute('fill', 'rgba(255,255,255,0.6)'); sub.setAttribute('font-size', '7');
  sub.textContent = '条';
  svgEl.appendChild(sub);
}

function renderAnalytics(sections) {
  var wrap = document.getElementById('analyticsWrap');
  var sourceMap = {};
  sections.forEach(function(s) {
    s.items.forEach(function(item) {
      var src = shortSource(item.sourceName || '未知');
      sourceMap[src] = (sourceMap[src] || 0) + 1;
    });
  });
  var sorted = Object.entries(sourceMap).sort(function(a,b) { return b[1]-a[1]; }).slice(0, 6);
  var maxCount = sorted[0] ? sorted[0][1] : 1;
  var srcHtml = '<div class="analytics-card"><div class="analytics-title">来源排行</div>';
  sorted.forEach(function(entry) {
    var name = entry[0], count = entry[1];
    var pct = Math.round(count / maxCount * 100);
    srcHtml += '<div class="source-rank-item" style="cursor:pointer" onclick="filterBySource(\'' + escHtml(name).replace(/'/g,"\\'") + '\')" title="查看 ' + escHtml(name).replace(/'/g,"\\'") + ' 的全部文章"><span class="source-rank-name">' + escHtml(name) + '</span><div class="source-rank-bar-bg"><div class="source-rank-bar" style="width:' + pct + '%"></div></div><span class="source-rank-count">' + count + '</span></div>';
  });
  srcHtml += '</div>';
  var stopWords = new Set(['的','了','在','是','与','和','AI','以','将','被','其','已','于','从','到','并','为','但','还','也','都','该','这','其中','能够','通过','实现','用于','可以','以及','可能','提供','包含','包括','无需','用户','产品','模型','支持','系统','功能','未','使用','工作','进行','没有']);
  var wordCount = {};
  sections.forEach(function(s) {
    s.items.forEach(function(item) {
      var words = (item.title + ' ' + (item.summary || '')).replace(/[，。、！？【】《》"'·\s]+/g, ' ').split(' ');
      words.forEach(function(w) {
        w = w.trim();
        if (w.length >= 2 && w.length <= 8 && !stopWords.has(w) && !/^[a-zA-Z0-9]{1,2}$/.test(w)) {
          wordCount[w] = (wordCount[w] || 0) + 1;
        }
      });
    });
  });
  var topWords = Object.entries(wordCount).sort(function(a,b) { return b[1]-a[1]; }).slice(0, 18);
  var colors = ['#e8622a','#f08040','#1d9e75','#378add','#7f6af0','#e8a020','#d4537e','#0f6e56','#993c1d','#185fa5'];
  var hotHtml = '<div class="analytics-card"><div class="analytics-title">热词标签</div><div class="hotwords-wrap">';
  topWords.forEach(function(entry, i) {
    var word = entry[0], cnt = entry[1];
    var sz = Math.max(11, Math.min(16, 11 + cnt * 2));
    var col = colors[i % colors.length];
    hotHtml += '<span class="hotword-chip" style="background:' + col + ';font-size:' + sz + 'px;opacity:' + (0.7 + cnt * 0.1) + '" onclick="document.getElementById(\'searchInput\').value=\'' + escHtml(word).replace(/'/g, "\\'") + '\';doSearch(\'' + escHtml(word).replace(/'/g, "\\'") + '\')">' + escHtml(word) + '</span>';
  });
  hotHtml += '</div></div>';
  wrap.innerHTML = srcHtml + hotHtml;
}

function doSearch(val) {
  currentSearch = val.toLowerCase().trim();
  document.getElementById('searchClear').className = 'search-clear' + (val ? ' show' : '');
  applyFilters();
}
function clearSearch() {
  document.getElementById('searchInput').value = '';
  doSearch('');
}
function applyFilters() {
  var cards = document.querySelectorAll('.card');
  var visible = 0;
  cards.forEach(function(card) {
    var secEl = card.closest('.dyn-section');
    var matchSection = currentFilter === 'all' || slugify(currentFilter) === (secEl ? secEl.id.replace('sec-','') : '');
    var matchSearch = !currentSearch
      || card.dataset.title.indexOf(currentSearch) >= 0
      || card.dataset.summary.indexOf(currentSearch) >= 0
      || card.dataset.source.indexOf(currentSearch) >= 0;
    var matchRead = !showOnlyUnread || !readSet.has(card.dataset.idx);
    if (matchSection && matchSearch && matchRead) {
      card.classList.remove('hidden'); visible++;
      if (currentSearch) highlightCard(card, currentSearch); else clearHighlight(card);
    } else {
      card.classList.add('hidden'); clearHighlight(card);
    }
  });
  document.getElementById('searchCount').textContent = currentSearch ? (visible > 0 ? '找到 ' + visible + ' 条' : '') : '';
  document.getElementById('noResults').className = 'no-results' + (visible === 0 && (currentSearch || showOnlyUnread || currentFilter !== 'all') ? ' show' : '');
}
function highlightCard(card, q) {
  var titleEl = card.querySelector('.card-title');
  if (!titleEl) return;
  var orig = titleEl.textContent;
  var re = new RegExp('(' + escRe(q) + ')', 'gi');
  titleEl.innerHTML = escHtml(orig).replace(re, '<mark>$1</mark>');
}
function clearHighlight(card) {
  var titleEl = card.querySelector('.card-title');
  if (titleEl) titleEl.innerHTML = escHtml(titleEl.textContent);
}
function filterSection(label, el) {
  currentFilter = label;
  currentSearch = '';
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.nav-link').forEach(function(a) { a.classList.remove('active'); });
  if (el) el.classList.add('active');
  else { document.querySelectorAll('.nav-link').forEach(function(a) { if (a.textContent.indexOf(label) >= 0) a.classList.add('active'); }); }
  applyFilters();
}
function filterBySource(sourceName) {
  currentFilter = 'all';
  currentSearch = sourceName;
  document.querySelectorAll('.nav-link').forEach(function(a) { a.classList.remove('active'); });
  document.querySelectorAll('.nav-link').forEach(function(a) { if (a.textContent.indexOf('全部') >= 0) a.classList.add('active'); });
  // Set search to the source name so only cards from that source remain visible
  document.getElementById('searchInput').value = sourceName;
  doSearch(sourceName);
  scrollTo(0, 0);
  showToast('已筛选：' + sourceName);
}
function scrollToSection(label) {
  var id = 'sec-' + slugify(label);
  var el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
function toggleExpand(idx, btn) {
  var sum = document.getElementById('sum-' + idx);
  if (!sum) return;
  var full = sum.dataset.full || '';
  if (sum.classList.contains('collapsed')) {
    sum.classList.replace('collapsed', 'expanded');
    sum.textContent = full;
    btn.textContent = '收起';
  } else {
    sum.classList.replace('expanded', 'collapsed');
    var short = full.length > 65 ? full.slice(0, 62) + '...' : full;
    sum.textContent = short;
    btn.textContent = '展开全文';
  }
}
function markRead(idx, btn) {
  var key = String(idx);
  var card = document.querySelector('.card[data-idx="' + key + '"]');
  if (readSet.has(key)) {
    readSet.delete(key);
    if (card) card.classList.remove('read');
    if (btn) btn.textContent = '打卡';
  } else {
    readSet.add(key);
    if (card) card.classList.add('read');
    if (btn) btn.textContent = '已打卡';
  }
  try { localStorage.setItem('aidaka_read_' + currentDate, JSON.stringify(Array.from(readSet))); } catch(e) {}
  var total = document.querySelectorAll('.card').length;
  updateReadProgress(total);
  if (showOnlyUnread) applyFilters();
}
function toggleReadFilter() {
  showOnlyUnread = !showOnlyUnread;
  var btn = document.getElementById('readProgress');
  if (showOnlyUnread) { btn.style.opacity = '0.7'; btn.title = '点击显示全部'; }
  else { btn.style.opacity = '1'; btn.title = '点击筛选未读'; }
  applyFilters();
}
function updateReadProgress(total) {
  var count = readSet.size;
  var pct = total > 0 ? Math.round(count / total * 100) : 0;
  var icon = count >= total && total > 0 ? '✅' : '🕐';
  var label = count >= total && total > 0 ? '今日已读完' : '已打卡 ' + count + '/' + total;
  document.getElementById('readLabel').innerHTML = '<span class="read-progress-label"><span class="icon">' + icon + '</span><span>' + label + '</span></span>';
  document.getElementById('readBarFill').style.width = pct + '%';
}
function toggleTheme() {
  isDark = !isDark;
  document.body.classList.toggle('light', !isDark);
  try { localStorage.setItem('aidaka_theme', isDark ? 'dark' : 'light'); } catch(e) {}
  updateThemeBtn();
}
function updateThemeBtn() {
  document.getElementById('themeBtn').textContent = isDark ? '亮色模式' : '暗色模式';
}
function updateDateNav(dateStr) {
  // For items-based view, we use daily API for history nav
  document.getElementById('nextBtn').disabled = (dateStr >= DAILY_MAX);
  document.getElementById('prevBtn').disabled = false;
}
function navigateDate(delta) {
  var d = new Date(currentDate + 'T00:00:00');
  d.setDate(d.getDate() + delta);
  var newDateRaw = d.toISOString().slice(0, 10);
  if (newDateRaw > DAILY_MAX) { showToast('已是最新日期'); return; }
  loadDate(newDateRaw);
}
function openModal() {
  document.getElementById('datePicker').value = currentDate;
  document.getElementById('datePicker').max = DAILY_MAX;
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }
function goToDate() {
  var val = document.getElementById('datePicker').value;
  closeModal();
  if (val && val !== currentDate && val <= DAILY_MAX) loadDate(val);
  else if (val > DAILY_MAX) showToast('不能选择未来日期');
}
function loadDate(dateStr) {
  currentDate = dateStr;
  document.getElementById('loadingOverlay').style.display = 'flex';
  document.getElementById('loadingOverlay').style.opacity = '1';
  try { readSet = new Set(JSON.parse(localStorage.getItem('aidaka_read_' + dateStr) || '[]')); } catch(e) { readSet = new Set(); }
  document.querySelectorAll('.dyn-section').forEach(function(el) { el.remove(); });
  currentSearch = ''; currentFilter = 'all';
  showOnlyUnread = false;
  document.getElementById('searchInput').value = '';
  document.getElementById('searchCount').textContent = '';
  document.getElementById('readProgress').style.opacity = '1';
  document.getElementById('readProgress').title = '点击筛选未读';
  // Try loading 50 items from items API for the selected date
  var sinceStr = dateStr + 'T00:00:00Z';
  fetch('https://aihot.virxact.com/api/public/items?mode=selected&since=' + sinceStr + '&take=50')
    .then(function(r) { return r.json(); })
    .then(function(apiData) {
      // Transform items API response to daily-like format
      var categories = {
        'ai-models': '模型发布/更新',
        'ai-products': '产品发布/更新',
        'industry': '行业动态',
        'paper': '论文研究',
        'tip': '技巧与观点'
      };
      var sectionMap = {};
      var idx = 0;
      (apiData.items || []).forEach(function(item) {
        var cat = item.category || '';
        var label = categories[cat] || '行业动态';
        if (!sectionMap[label]) {
          sectionMap[label] = { label: label, items: [] };
        }
        idx++;
        sectionMap[label].items.push({
          idx: idx,
          title: item.title,
          sourceName: item.source || '',
          sourceUrl: item.url || '',
          summary: item.summary || '',
          publishedAt: item.publishedAt || ''
        });
      });
      var sections = [];
      var order = ['模型发布/更新','产品发布/更新','行业动态','论文研究','技巧与观点'];
      order.forEach(function(lbl) {
        if (sectionMap[lbl]) sections.push(sectionMap[lbl]);
        else sections.push({ label: lbl, items: [] });
      });
      var transformed = {
        date: dateStr,
        generatedAt: apiData.items && apiData.items.length > 0 ? apiData.items[0].publishedAt : new Date().toISOString(),
        lead: null,
        sections: sections
      };
      renderAll(transformed);
      document.getElementById('loadingOverlay').style.opacity = '0';
      setTimeout(function() { document.getElementById('loadingOverlay').style.display = 'none'; }, 400);
      showToast('已加载 ' + dateStr + ' (' + idx + '条)');
    })
    .catch(function() {
      // Fallback to daily API
      fetch('https://aihot.virxact.com/api/public/daily/' + dateStr)
        .then(function(r) { return r.json(); })
        .then(function(dailyData) {
          renderAll(dailyData);
          document.getElementById('loadingOverlay').style.opacity = '0';
          setTimeout(function() { document.getElementById('loadingOverlay').style.display = 'none'; }, 400);
          showToast('已加载 ' + dateStr + ' 日报');
        })
        .catch(function() {
          showToast('加载失败，网络请求受限');
          document.getElementById('loadingOverlay').style.opacity = '0';
          setTimeout(function() { document.getElementById('loadingOverlay').style.display = 'none'; }, 400);
        });
    });
}
function initScrollAnim() {
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }
    });
  }, { threshold: 0.05, rootMargin: '0px 0px -20px 0px' });
  document.querySelectorAll('.card').forEach(function(c) { observer.observe(c); });
}
var toastTimer;
function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.classList.remove('show'); }, 2500);
}
function slugify(s) { return s.replace(/[\/\s]/g, '-'); }
function escHtml(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
function shortSource(name) {
  if (!name) return '';
  // Group all X/Twitter sources under "X"
  if (/^X[：:]/.test(name)) return 'X';
  var trimmed = name.replace(/（.*?）/g,'').replace(/\(.*?\)/g,'').trim();
  return trimmed.length > 16 ? trimmed.slice(0, 16) + '...' : trimmed;
}
function fmtDate(dateStr) {
  if (!dateStr) return '';
  var d = new Date(dateStr + 'T00:00:00+08:00');
  var mm = d.getMonth() + 1;
  var dd = d.getDate();
  var days = ['日','一','二','三','四','五','六'];
  return mm + ' 月 ' + dd + ' 日 周' + days[d.getDay()];
}
function fmtDateShort(iso) { return iso ? iso.slice(0, 10) : ''; }
function relTime(date) {
  var now = Date.now();
  var diff = now - date.getTime();
  var mins = Math.floor(diff / 60000);
  var hours = Math.floor(mins / 60);
  if (diff < 0) return '刚刚';
  if (mins < 1) return '刚刚';
  if (mins < 60) return mins + ' 分钟前';
  if (hours < 24) {
    var hh = String(date.getHours()).padStart(2,'0');
    var mm = String(date.getMinutes()).padStart(2,'0');
    var period = date.getHours() < 12 ? '上午' : (date.getHours() < 18 ? '下午' : '晚上');
    return '今天' + period + ' ' + hh + ':' + mm;
  }
  return fmtDateShort(date.toISOString());
}
function relTimeStr(isoStr) {
  if (!isoStr) return '';
  var d = new Date(isoStr);
  return relTime(d);
}
</script>
