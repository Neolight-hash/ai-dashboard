<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI打卡网 · 2026-05-28</title>
<style>
  :root {

  }

  .nav-date-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .nav-date-label { font-size: 12px; color: var(--text3); }
  .main { max-width: 960px; margin: 0 auto; padding: 24px 16px 60px; }
  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 40px 0 20px;

  .section-title { font-size: 18px; font-weight: 700; color: var(--text); }

  }
  .card-grid {
    display: grid;

  }
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    box-shadow: var(--card-shadow);
    transition: transform var(--transition), box-shadow var(--transition), opacity var(--transition), border-color var(--transition);
    opacity: 0;
    transform: translateY(18px);
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }
  .card.visible { opacity: 1; transform: translateY(0); }
  .card.read { opacity: 0.5; }
  .card.read::after {
    content: '已读';
    position: absolute;
    top: 12px;
    right: 12px;
    background: var(--bg4);
    color: var(--text3);
    font-size: 11px;
    padding: 2px 8px;

  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); border-color: var(--accent); }
  .card.hidden { display: none !important; }
  .card.highlight { border-color: var(--accent2); background: rgba(232,98,42,0.06); }
  .card-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px; height: 24px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    border-radius: 6px;
    margin-bottom: 10px;
    flex-shrink: 0;
  }
  .card-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }

    padding: 3px 9px;

  }
  .card-summary {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.65;

    overflow: hidden;
    transition: max-height 0.35s ease;
    word-break: break-word;
  }
  .card-summary.collapsed {
    max-height: 4.95em;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-summary.expanded {
    -webkit-line-clamp: unset;
    display: block;

  }
  .card-footer { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }
  .expand-btn {
    background: none;
    border: none;
    color: var(--accent2);
    font-size: 12px;
    cursor: pointer;
    font-family: var(--font);
    padding: 0;
    transition: color var(--transition);
  }
  .expand-btn:hover { color: var(--accent); }
  .source-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    text-decoration: none;
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;

  }
  .source-btn:hover { opacity: 0.85; }
  .read-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    color: var(--text3);
    cursor: pointer;
    font-family: var(--font);
    transition: all var(--transition);
  }
  .read-btn:hover { border-color: var(--accent); color: var(--accent); }
  .time-badge { font-size: 11px; color: var(--text3); display: block; margin-bottom: 8px; }
  .analytics-wrap {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 32px;
  }
  .analytics-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);

  }
  .analytics-title { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 14px; }

  .source-rank-bar-bg { flex: 1; height: 6px; background: var(--bg4); border-radius: 3px; overflow: hidden; }

</head>
<body>
<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>查看历史日報</h3>
    <input type="date" class="date-picker" id="datePicker" value="2026-05-28" max="2026-05-28">
    <div class="modal-btns">
      <button class="modal-btn secondary" onclick="closeModal()">取消</button>
      <button class="modal-btn primary" onclick="goToDate()">前往</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="hero">
  <div class="hero-inner">
    <div class="hero-top">
      <span class="hero-badge">AI打卡网 · 每日晨报</span>

    <div class="hero-stats" id="heroStats"></div>

      <div class="donut-legend" id="donutLegend"></div>
    </div>
  </div>
</div>

      <button class="nav-date-btn" onclick="openModal()">日历</button>
    </div>
  </div>
</div>
<div class="toolbar">
  <div class="search-box">
    <span class="search-icon">🔍</span>

    <div class="read-bar"><div class="read-bar-fill" id="readBarFill" style="width:0%"></div></div>
  </div>
  <span class="search-count" id="searchCount"></span>
</div>
<div class="main" id="main">
  <div class="analytics-wrap" id="analyticsWrap"></div>
  <div id="noResults" class="no-results">
    <div class="no-results-icon">🔎</div>
    <p>没有找到匹配的资讯</p>

  </div>
</div>

59688584899154134", "source": "X：Replit (@Replit)", "publishedAt": "2026-05-27T17:30:00.000Z", "summary": "Replit 被列入 @Redpoint 的 2026 InfraRed 100 榜单。\n这是一份构建 AI 运行基础设施的公司名单。很荣幸能入选，与 Stripe、Snowflake 和 HashiCorp 等往届入选者并列。\n致每一位在 Replit 上发布产品的构建者：这份荣誉属于你们。\nhttps：//www.redpoint.com/infrared/report/", "category": "industry"}, {"id": "cmpobyo1b04qeslv4jzefv5eu", "title": "ITBench-AA：前沿大模型在首个智能体企业IT任务基准测试中得分均低于50%", "title_en": "ITBench-AA： Frontier Models Score Below 50% on the First Benchmark for Agentic Enterprise IT Tasks - by Artificial Analysis and IBM", "url": "https://huggingface.co/blog/ibm-research/itbench-aa", "source": "Hugging Face：Blog（RSS）", "publishedAt": "2026-05-27T17:20:29.000Z", "summary": "由Artificial Analysis和IBM推出的ITBench-AA SRE基准测试显示，所有前沿大模型得分均未超过50%。Claude Opus 4.7（自适应推理，最大努力）以47%领先，GPT-5.5（xhigh）和Qwen3.7 Max分别得46%和42%。该测试包含59个需要通过Shell命令调查Kubernetes事件快照并提交根因诊断的智能体任务。关键发现是模型推理轮次差异近3倍，但更长的轨迹并不转化为更高准确率，过度调查的模型会因提交误报而受罚。在成本方面，开源模型Gemma 4 31B（Reasoning）以每任务$0.14的成本获得37%得分，优于成本更高但得分更低的闭源模型。", "category": "paper"}, {"id": "cmpoche1204w5slv4kd4tnio9", "title": "我认为 Anthropic 和 OpenAI 找到了产品市场契合点", "title_en": "I think Anthropic and OpenAI have found product-market fit", "url": "https://simonwillison.net/2026/May/27/product-market-fit", "source": "Simon Willison 博客", "publishedAt": "2026-05-27T16:38:35.000Z", "summary": "Anthropic 与 OpenAI 通过编程智能体找到了产品市场契合点，这导致企业客户成本显著上升。两家公司已于 2026 年 4 月前后调整了企业套餐定价，从原先的高额折扣改为与 API 用量挂钩。Anthropic Enterprise 套餐变为每席位 20 美元/月外加 API 费用，OpenAI Codex 则按 API token 用量计费。同期发布的新模型 GPT-5.5（4月23日）和 Opus 4.7（4月16日）的 API 定价也显著高于前代版本。", "category": "tip"}, {"id": "cmpobap4x04leslv4yn3zhvqo", "title": "Fast， faster， Qwen. 🚀", "title_en": "Fast， faster， Qwen. 🚀 Thrilled to see Qwen3.5 reaching a record-breaking 580 tps for agentic workl…", "url": "https://x.com/Alibaba_Qwen/status/2059674574397313277", "source": "X：通义千问 / Qwen (@Alibaba_Qwen)", "publishedAt": "2026-05-27T16:34:20.000Z", "summary": "Qwen3.5在TokenSpeed推理引擎上，针对智能体工作负载达到了创纪录的580 tokens per second （tps）速度。这一成果由通义千问推理团队、lightseekorg Foundation TokenSpeed团队、NVIDIA及Mooncake团队共同实现，并采用了tri_dao的FlashAttention-4 （FA4） 优化。此里程碑标志着开源大语言模型推理性能的边界得到了推动，相关详情可查阅PyTorch社区博客。", "category": "paper"}, {"id": "cmpoad2jr04e6slv4ineho5xm", "title": "与Google搜索产品副总裁Robby Stein的访谈：AI原生搜索时代", "title_en": "I sat down with Robby Stein （@rmstein）， Google's VP of Product for Search， at @Google I/O. Robby is…", "url": "https://x.com/kimmonismus/status/2059668961181004275", "source": "X：Kim (@kimmonismus)", "publishedAt": "2026-05-27T16:12:01.000Z", "summary": "本文记录了与Google搜索产品副总裁Robby Stein在Google I/O的访谈，核心探讨Google Search向\"AI原生\"模式的重大转变。讨论话题包括AI Mode是进化还是重塑、如何将复杂问题拆解为多轮搜索、AI搜索的高运行成本、Google TPU及基础设施的优势、AI时代搜索量不减反增的原因，以及优质AI回答与出版商流量之间的张力。访谈还涉及Google决定展示哪些信息源与链接的逻辑，并围绕一个核心问题展开：如果Google直接给出答案，传统的基于链接的网页生态将走向何方？", "category": "tip"}, {"id": "cmpoa5pky04a6slv42pg4puzp", "title": "Grok编程智能体登陆Kilo IDE平台", "title_en": "Use your SuperGrok or X Premium+ subscription in @kilocode. Try grok-build-0.1 for high speed and …", "url": "https://x.com/xai/status/2059666227115819149", "source": "X：xAI (@xai)", "publishedAt": "2026-05-27T16:01:09.000Z", "summary": "在 @kilocode 中使用您的 SuperGrok 或 X Premium+ 订阅。\n\n尝试 grok-build-0.1，享受高速和智能体编程智能，可在 Kilo IDE 扩展或 CLI 中使用。\n\nhttps：//x.ai/news/grok-kilocode", "category": "ai-products"}, {"id": "cmpo929df03ztslv4z9v93608", "title": "Perplexity开源Unigram分词器降低CPU占用", "title_en": "We're open-sourcing the Unigram tokenizer we rebuilt to reduce CPU utilization by 5-6x. Small reran…", "url": "https://x.com/perplexity_ai/status/2059664738087469511", "source": "X：Perplexity (@perplexity_ai)", "publishedAt": "2026-05-27T15:55:14.000Z", "summary": "我们开源了重新构建的Unigram分词器，可将CPU占用降低5-6倍。\n小型重排序器和嵌入模型在GPU上运行时间仅为个位数毫秒，使得CPU分词成为总延迟的重要组成部分。\nhttp：//github.com/perplexityai/pplx-garden", "category": "ai-products"}, {"id": "cmpo8ubaz03ycslv4xm8w369g", "title": "Claude Marketplace 新增五家合作伙伴", "title_en": "New in the Claude Marketplace： @augmentcode， @boltdotnew， @co 加速整体工作流。", "category": "tip"}, {"id": "cmpnnrtb10z7ksl01i08epdgv", "title": "阿里云入选Omdia智能体AI市场雷达领导者", "title_en": "Alibaba Cloud Has Been Recognized as a Leader in Omdia's Agentic AI Market Radar. Omdia highlights A…", "url": "https://x.com/alibaba_cloud/status/2059509714854007181", "source": "X：阿里云 / Alibaba Cloud (@alibaba_cloud)", "publishedAt": "2026-05-27T05:39:14.000Z", "summary": "阿里云在Omdia的智能体AI市场雷达中被评为领导者。Omdia强调了阿里云在每一层的全栈能力，认可其是首个将整个平台围绕智能体范式进行构建的云服务商。", "category": "industry"}, {"id": "cmpnhpsg40xpgsl01q9fjtegp", "title": "我国将加快研究推进人工智能健康发展综合性立法、低空经济立法等", "title_en": null, "url": "https://www.ithome.com/0/955/758.htm", "source": "IT之家（RSS）", "publishedAt": "2026-05-27T02:54:29.000Z", "summary": null, "category": "industry"}, {"id": "cmpnf5uil0x10sl012miu1575", "title": "阿里云成为PyTorch基金会白金会员", "title_en": "Thrilled to join the @PyTorch Foundationas a Platinum Member！ Excited for what we'll build together….", "url": "https://x.com/alibaba_cloud/status/2059453607075004835", "source": "X：阿里云 / Alibaba Cloud (@alibaba_cloud)", "publishedAt": "2026-05-27T01:56:17.000Z", "summary": "阿里云宣布以白金会员身份加入PyTorch基金会。作为AI基础设施全球领导者，阿里云是开源模型家族Qwen的缔造方，已在多样化硬件上大规模运行PyTorch，将为社区带来生产级工程经验。", "category": "industry"}, {"id": "cmpne4ihk0wscsl012kwlngba", "title": "Claude Code v2.1.152 更新发布", "title_en": "v2.1.152", "url": "https://github.com/anthropics/claude-code/releases/tag/v2.1.152", "source": "Claude Code：GitHub Releases（RSS）", "publishedAt": "2026-05-27T01:30:59.000Z", "summary": "Claude Code 发布 v2.1.152 版本更新。核心改进包括：`/code-review --fix` 现在会将审查建议直接应用于工作目录；技能与斜杠命令支持通过 frontmatter 的 `disallowed-tools` 移除模型工具；新增 `/reload-skills` 命令可不重启会话重新扫描技能目录；`SessionStart` 钩子现可返回 `reloadSkills： true` 重新扫描技能，并可通过 `hookSpecificOutput.sessionTitle` 设置会话标题；新增 `MessageDisplay` 钩子事件以变换或隐藏助手消息。其他更新涉及插件市场管理、主模型不可用时自动切换至 `--fallback-model`、会话用量统计优化等。同时修复了终端样式退化、沙箱警告显示、思考摘要、MCP 服务器去重、远程会话连接及多种会话卡顿问题。", "category": "ai-products"}, {"id": "cmpndfb110wljsl01cqumtfgw", "title": "消息称高通与字节跳动达成 AI ASIC 芯片合作，采购量在数百万颗级别", "title_en": null, "url": "https://www.ithome.com/0/955/674.htm", "source": "IT之家（RSS）", "publishedAt": "2026-05-27T01:12:31.000Z", "summary": null, "category": "industry"}, {"id": "cmpp43j5a0bo3slv47z22fr57", "title": "DenoiseRL：通过恢复嘈杂前缀来引导推理模型", "title_en": "DenoiseRL： Bootstrapping Reasoning Models to Recover from Noisy Prefixes", "url": "https://arxiv.org/abs/2605.28421", "source": "HuggingFace Daily Papers（社区热门论文）", "publishedAt": "2026-05-27T00:00:00.000Z", "summary": "DenoiseRL是一种强化学习框架，旨在提升大语言模型的推理能力。它无需依赖更强的教师模型或精心筛选的困难数据集，而是通过在弱模型产生的失败推理轨迹上进行基于恢复的优化来直接学习，将错误转化为改进机会。这种方法提供了更丰富多样的学习信号，提升了探索效率。实验表明，DenoiseRL在竞争性的数学和通用推理基准测试中，持续优于强在策略RL基线，并能随着训练难度增加促进更强的自我纠正行为。", "category": "paper"}, {"id": "cmpoxnk890a20slv458yalony", "title": "VibeSearchBench：面向真实世界中长期主动搜索的评测基准", "title_en": "VibeSearchBench： Benchmarking Long-horizon Proactive Search in the Wild", "url": "https://arxiv.org/abs/2605.27882", "source": "HuggingFace Daily Papers（社区热门论文）", "publishedAt": "2026-05-27T00:00:00.000Z", "summary": "基于LLM的智能体在现有搜索基准上表现优异，但真实用户体验不佳，这源于现有基准依赖于高度明确的查询、单轮交互和固定格式评估，无法反映用户与智能体通过多轮对话协同澄清模糊意图的真实搜索行为。为此，研究提出了\"VibeSearch\"范式并发布了VibeSearchBench，该基准包含200个手工策划的双语任务，覆盖20个领域，分为专业与日常生活两个子集。评估通过用户模拟器和图匹配框架进行。对七个前沿模型的测试显示，所有模型在VibeSearch任务上表现均不充分（最佳F1分数为30.30），凸显了在长期上下文推理、主动意图激发等方面取得根本进展的必要性。", "category": "paper"}, {"id": "cmpogosle05y4slv4zpqxoocc", "title": "软件之后是AI时代", "title_en": "Software After AI", "url": "https://www.tomtunguz.com/harnessing-ai", "source": "Tomer Tunguz 博客（VC 分析）", "publishedAt": "2026-05-27T00:00:00.000Z", "summary": "软件时代正过渡至\"智能体框架\"时代。AI作为强大但需驯化的\"野马\"，其智能驯化包含七个核心组成部分：上下文与记忆、工具与行动、编排与循环、状态与持久性、沙箱与计算、可观测性与治理、成本与工作流优化。这些组件共同构成了一个生产级的智能体系统。这一转变将重塑软件竞争格局，模型通用化的未来中，最佳的智能体驾驭者将获胜。", "category": "tip"}, {"id": "cmpocoz6704yxslv4wth0r0jw", "title": "2026年选举信息与保障", "title_en": "Election information and safeguards in 2026", "url": "https://openai.com/index/election-safeguards-2026", "source": "OpenAI：官网动态（RSS · 排除企业/客户案例）", "publishedAt": "2026-05-27T00 n的缔造方，已在多样化硬件上大规模运行PyTorch，将为社区带来生产级工程经验。", "publishedAt": "2026-05-27T01:56:17.000Z", "category": "industry", "sourceName": "X：阿里云 / Alibaba Cloud (@alibaba_cloud)", "sourceUrl": "https://x.com/alibaba_cloud/status/2059453607075004835"}, {"idx": 29, "title": "消息称高通与字节跳动达成 AI ASIC 芯片合作，采购量在数百万颗级别", "summary": "", "publishedAt": "2026-05-27T01:12:31.000Z", "category": "industry", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/955/674.htm"}, {"idx": 30, "title": "2026年选举信息与保障", "summary": "在2026年全球选举临近之际，通过帮助公众获取选举信息、支持网络防御者以及提升人工智能透明度这三方面的努力，来为选举提供保障。", "publishedAt": "2026-05-27T00:00:00.000Z", "category": "industry", "sourceName": "OpenAI：官网动态（RSS · 排除企业/客户案例）", "sourceUrl": "https://openai.com/index/election-safeguards-2026"}]}, {"label": "论文研究", "slug": "paper", "count": 7, "items": [{"idx": 31, "title": "塑造产业的物理AI研究", "summary": "Mistral AI通过收购Emmi AI，强化其在推动AI研究前沿与工业工程解决方案方面的投入。其目标是为航空航天、汽车、半导体和能源等塑造物理世界的核心产业构建基础性物理AI模型，以加速工程开发。此项研究基于一系列已发表的突破性成果，包括：用于模拟超音速湍流的3D机翼CFD数据集、计算流体动力学基础模型的前瞻综述、应用于汽车与航空的AB-UPT模型，以及用于聚变等离子体湍流模拟的GyroSwin模型。此前已开源的UPT（通用物理Transformer）和NeuralDEM等成果也为此研究奠定了基础。", "publishedAt": "2026-05-28T10:47:08.820Z", "category": "paper", "sourceName": "Mistral AI：News（网页）", "sourceUrl": "https://mistral.ai/news/physics-ai-research"}, {"idx": 32, "title": "社会科学中的编码智能体", "summary": "一项针对1260名定量社会科学家的调查显示，虽然81%的受访者用过AI聊天机器人，但仅有20%将Claude Code、Codex等编码智能体常规应用于工作。采用率存在显著差异：以男性名字命名的研究者使用率是女性研究者的两倍；顶尖大学研究者可能性高出40%。用户产出更多工作论文和基金申请，但这可能反映早期采用者自身差异。研究者对AI助力撰写可发表论文更乐观，但对重塑整个社会科学领域持保留态度。这是一项初步调查，更深入研究仍在进行中。", "publishedAt": "2026-05-27T23:07:32.187Z", "category": "paper", "sourceName": "Anthropic：Research（发表成果 · 网页）", "sourceUrl": "https://www.anthropic.com/research/coding-agents-social-sciences"}, {"idx": 33, "title": "通过零信任聚合实现的隐私分析", "summary": "Google Research 推出了一种新的隐私分析解决方案。该方案结合了一种新的密码学安全聚合协议与可信执行环境（TEE）的透明性，旨在实现前沿的隐私与安全保证。其核心是基于零信任原则，通过密码学与硬件保护的结合，确保系统仅能获取群体的匿名化聚合洞察。", "publishedAt": "2026-05-27T17:34:02.542Z", "category": "paper", "sourceName": "Google Research：Blog（网页）", "sourceUrl": "https://research.google/blog/private-analytics-via-zero-trust-aggregation"}, {"idx": 34, "title": "ITBench-AA：前沿大模型在首个智能体企业IT任务基准测试中得分均低于50%", "summary": "由Artificial Analysis和IBM推出的ITBench-AA SRE基准测试显示，所有前沿大模型得分均未超过50%。Claude Opus 4.7（自适应推理，最大努力）以47%领先，GPT-5.5（xhigh）和Qwen3.7 Max分别得46%和42%。该测试包含59个需要通过Shell命令调查Kubernetes事件快照并提交根因诊断的智能体任务。关键发现是模型推理轮次差异近3倍，但更长的轨迹并不转化为更高准确率，过度调查的模型会因提交误报而受罚。在成本方面，开源模型Gemma 4 31B（Reasoning）以每任务$0.14的成本获得37%得分，优于成本更高但得分更低的闭源模型。", "publishedAt": "2026-05-27T17:20:29.000Z", "category": "paper", "sourceName": "Hugging Face：Blog（RSS）", "sourceUrl": "https://huggingface.co/blog/ibm-research/itbench-aa"}, {"idx": 35, "title": "Fast， faster， Qwen. 🚀", "summary": "Qwen3.5在TokenSpeed推理引擎上，针对智能体工作负载达到了创纪录的580 tokens per second （tps）速度。这一成果由通义千问推理团队、lightseekorg Foundation TokenSpeed团队、NVIDIA及Mooncake团队共同实现，并采用了tri_dao的FlashAttention-4 （FA4） 优化。此里程碑标志着开源大语言模型推理性能的边界得到了推动，相关详情可查阅PyTorch社区博客。", "publishedAt": "2026-05-27T16:34:20.000Z", "category": "paper", "sourceName": "X：通义千问 / Qwen (@Alibaba_Qwen)", "sourceUrl": "https://x.com/Alibaba_Qwen/status/2059674574397313277"}, {"idx": 36, "title": "DenoiseRL：通过恢复嘈杂前缀来引导推理模型", "summary": "DenoiseRL是一种强化学习框架，旨在提升大语言模型的推理能力。它无需依赖更强的教师模型或精心筛选的困难数据集，而是通过在弱模型产生的失败推理轨迹上进行基于恢复的优化来直接学习，将错误转化为改进机会。这种方法提供了更丰富多样的学习信号，提升了探索效率。实验表明，DenoiseRL在竞争性的数学和通用推理基准测试中，持续优于强在策略RL基线，并能随着训练难度增加促进更强的自我纠正行为。", "publishedAt": "2026-05-27T00:00:00.000Z", "category": "paper", "sourceName": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2605.28421"}, {"idx": 37, "title": "VibeSearchBench：面向真实世界中长期主动搜索的评测基准", "summary": "基于LLM的智能体在现有搜索基准上表现优异，但真实用户体验不佳，这源于现有基准依赖于高度明确的查询、单轮交互和固定格式评估，无法反映用户与智能体通过多轮对话协同澄清模糊意图的真实搜索行为。为此，研究提出了\"VibeSearch\"范式并发布了VibeSearchBench，该基准包含200个手工策划的双语任务，覆盖20个领域，分为专业与日常生活两个子集。评估通过用户模拟器和图匹配框架进行。对七个前沿模型的测试显示，所有模型在VibeSearch任务上表现均不充分（最佳F1分数为30.30），凸显了在长期上下文推理、主动意图激发等方面取得根本进展的必要性。", "publishedAt": "2026-05-27T00:00:00.000Z", "category": "paper", "sourceName": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2605.27882"}]}, {"label": "技巧与观点", "slug": "tip", "count": 13, "items": [{"idx": 38, "title": "pgvector驱动的语义、混合、稀疏与量化向量搜索系统构建编码指南", "summary": "本教程在Google Colab中构建一个完整的pgvector实验环境，展示PostgreSQL如何作为向量数据库服务于现代AI应用。内容涵盖安装PostgreSQL、编译pgvector扩展、通过Psycopg建立连接，并注册向量类型以实现与Python的平滑集成。最后使用SentenceTransformers创建并存储嵌入向量。", "publishedAt": "2026-05-28T08:07:09.000Z", "category": "tip", "sourceName": "MarkTechPost（RSS）", "sourceUrl": "https://www.marktechpost.com/2026/05/28/a-coding-guide-to-implement-a-pgvector-powered-semantic-hybrid-sparse-and-quantized-vector-search-system"}, {"idx": 39, "title": "英伟达推出 AI 框架 Polar，让 Codex 跑分暴涨 594.74%", "summary": "英伟达研究团队开源了智能体强化学习框架 Polar。该框架无需重写现有智能体执行框架（如 Codex CLI、Claude Code、Qwen Code、Pi），通过在模型 API 边界放置智能体来接入 GRPO 训练。实验显示，基于 Qwen3.5-4B 模型，Polar 将 Codex 在 SWE-Bench Verified 上的 pass@1 分数从 3.8% 提升至 26.4%（增涨 594.74%）。效率上，其 prefix_merging 技术将训练步骤从 1185 次降至 218 次，速度提升约 5.39 倍，GPU 平均利用率从 20.4% 升至 87.7%。", "publishedAt": "2026-05-28T02:14:52.000Z", "category": "tip", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/956/293.htm"}, {"idx": 40, "title": "人民日报专访华为何庭波：今年秋季的新麒麟手机芯片，性能等相比去年是\"跳跃性\"提升", "summary": "华为何庭波提出半导体新演进路径\"韬（τ）定律\"，以\"时间缩微\"（如逻辑折叠）替代\"几何缩微\"作为新指导原则。她表示，过去6年华为已基于此自主研发381款芯片。今年秋季将发布新的麒麟手机芯片，这是首个完整的\"韬芯片\"，其性能、集成度相比去年是\"跳跃性\"提升。", "publishedAt": "2026-05-28T01:24:27.000Z", "category": "tip", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/956/274.htm"}, {"idx": 41, "title": "用好 Coding Agent，重点是两头，尤其是开头的部分，如果一开始就走偏了后面怎么改都改不好。", "summary": "用好 Coding Agent 的关键在于初始规划。方法是先将需求整理后，用最强模型（如 GPT-5.5、Claude Opus 4.7）分别在 Codex、Claude Code、Cursor 的 Plan 模式下生成设计方案，选择最优方案并借鉴其他版本。对于复杂计划，可将其拆分为多个 Phases 并明确要求与验证标准，形成 Markdown 文档。执行时按 Phases 进行，并辅以人工审核纠偏。最后的代码审核（Code Review）用 GPT-5.5 审核代码质量与设计符合度即可。应避免让多个智能体交叉 Review，否则可能导致代码越改越多。", "publishedAt": "2026-05-27T23:09:11.000Z", "category": "tip", "sourceName": "X：宝玉 (@dotey)", "sourceUrl": "https://x.com/dotey/status/2059773942500298934"}, {"idx": 42, "title": "使用大语言模型保障源代码安全", "summary": "本文分享了使用 Claude Opus 构建威胁模型、发现代码漏洞并进行验证、分类和修复的最佳实践。其核心流程是一个六步循环：威胁建模、沙箱隔离、漏洞发现、验证、分类和修复。作者指出，漏洞发现现在易于并行化，瓶颈已转移到后续的验证与处理阶段。以他们对开源软件的扫描为例，截至2026年5月22日已披露1，596个漏洞，其中97个已修补。指南建议结合代码库文档和专家访谈来构建准确的威胁模型，以降低误报，提升发现的可利用性。", "publishedAt": "2026-05-27T22:07:31.048Z", "category": "tip", "sourceName": "Claude：Blog（网页）", "sourceUrl": "https://claude.com/blog/using-llms-to-secure-source-code"}, {"idx": 43, "title": "AI智能体的零信任安全框架", "summary": "Anthropic 发布了针对企业部署自主 AI 智能体的安全框架，指出前沿大语言模型正将漏洞利用周期从数月压缩至数小时。部署智能体面临双重风险：基础设施易受 AI 加速攻击，且智能体自身具备自主决策与执行能力。文章提出一个三层零信任架构（基础、高级、优化级）及八阶段实施流程，并概述了提示注入、工具投毒、记忆投毒等特有威胁。", "publishedAt": "2026-05-27T18:06:27.746Z", "category": "tip", "sourceName": "Claude：Blog（网页）", "sourceUrl": "https://claude.com/blog/zero-trust-for-ai-agents"}, {"idx": 44, "title": "我认为 Anthropic 和 OpenAI 找到了产品市场契合点", "summary": "Anthropic 与 OpenAI 通过编程智能体找到了产品市场契合点，这导致企业客户成本显著上升。两家公司已于 2026 年 4 月前后调整了企业套餐定价，从原先的高额折扣改为与 API 用量挂钩。Anthropic Enterprise 套餐变为每席位 20 美元/月外加 API 费用，OpenAI Codex 则按 API token 用量计费。同期发布的新模型 GPT-5.5（4月23日）和 Opus 4.7（4月16日）的 API 定价也显著高于前代版本。", "publishedAt": "2026-05-27T16:38:35.000Z", "category": "tip", "sourceName": "Simon Willison 博客", "sourceUrl": "https://simonwillison.net/2026/May/27/product-market-fit"}, {"idx": 45, "title": "与Google搜索产品副总裁Robby Stein的访谈：AI原生搜索时代", "summary": "本文记录了与Google搜索产品副总裁Robby Stein在Google I/O的访谈，核心探讨Google Search向\"AI原生\"模式的重大转变。讨论话题包括AI Mode是进化还是重塑、如何将复杂问题拆解为多轮搜索、AI搜索的高运行成本、Google TPU及基础设施的优势、AI时代搜索量不减反增的原因，以及优质AI回答与出版商流量之间的张力。访谈还涉及Google决定展示哪些信息源与链接的逻辑，并围绕一个核心问题展开：如果Google直接给出答案，传统的基于链接的网页生态将走向何方？", "publishedAt": "2026-05-27T16:12:01.000Z", "category": "tip", "sourceName": "X：Kim (@kimmonismus)", "sourceUrl": "https://x.com/kimmonismus/status/2059668961181004275"}, {"idx": 46, "title": "藏师傅发布小红书图文排版AI Skill，集成地图与自动配图", "summary": "该推文介绍了guizang-social-card-skill，一款针对小红书图文常见类别进行优化的AI Skill。其亮点在于为旅行博主集成了地图组件，用户输入目的地和线路后，AI能自动在底图上标记并嵌入图片。根据引用，该Skill完全基于HTML和实拍图片生成内容，不会被平台标注为AI生成，并会主动从高质量图片网站寻找对应主题图片，以优化图文排版。", "publishedAt": "2026-05-27T10:50:15.000Z", "category": "tip", "sourceName": "X：歸藏 (@op7418)", "sourceUrl": "https://x.com/op7418/status/2059587983289016348"}, {"idx": 47, "title": "OpenAI 奥尔特曼称 AI 对白领冲击不如预期般严重：我很高兴自己当时错了", "summary": "", "publishedAt": "2026-05-27T07:48:22.000Z", "category": "tip", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/956/021.htm"}, {"idx": 48, "title": "使用 Codex 构建自改进税务智能体", "summary": "OpenAI、Thrive 与 Crete 合作，使用 Codex 构建了一个自改进的税务智能体。该智能体能够自动处理报税流程，提升工作准确性并加速整体工作流。", "publishedAt": "2026-05-27T07:00:00.000Z", "category": "tip", "sourceName": "OpenAI：官网动态（RSS · 排除企业/客户案例）", "sourceUrl": "https://openai.com/index/building-self-improving-tax-agents-with-codex"}, {"idx": 49, "title": "软件之后是AI时代", "summary": "软件时代正过渡至\"智能体框架\"时代。AI作为强大但需驯化的\"野马\"，其智能驯化包含七个核心组成部分：上下文与记忆、工具与行动、编排与循环、状态与持久性、沙箱与计算、可观测性与治理、成本与工作流优化。这些组件共同构成了一个生产级的智能体系统。这一转变将重塑软件竞争格局，模型通用化的未来中，最佳的智能体驾驭者将获胜。", "publishedAt": "2026-05-27T00:00:00.000Z", "category": "tip", "sourceName": "Tomer Tunguz 博客（VC 分析）", "sourceUrl": "https://www.tomtunguz.com/harnessing-ai"}, {"idx": 50, "title": "Reachy Mini 实现完全本地化语音交互", "summary": "Reachy Mini 机器人现可通过 `speech-to-speech` 库实现完全本地化的语音交互，无需依赖云端。该方案采用级联流水线架构，对外提供 Realtime API 兼容的 WebSocket 接口。默认组件包括 Silero VAD 用于语音活动检测、Parakeet-TDT 作为语音转文本模型、通义千问（Qwen3-TTS）作为文本转语音模型。大语言模型推荐使用 llama.cpp 运行 Gemma 4。所有数据均在本地处理，保障了隐私且无 API 费用。", "publishedAt": "2026-05-27T00:00:00.000Z", "category": "tip", "sourceName": "Hugging Face：Blog（RSS）", "sourceUrl": "https://huggingface.co/blog/local-reachy-mini-conversation"}]}]}
</script>
<script>
const EMBEDDED_DATA = JSON.parse(document.getElementById("dataSrc").textContent);
const SECTION_CONFIG = {"模型发布/更新": {"icon": "🤖", "color": "#7f6af0"}, "产品发布/更新": {"icon": "📦", "color": "#e8622a"}, "行业动态": {"icon": "🏭", "color": "#1d9e75"}, "论文研究": {"icon": "📄", "color": "#378add"}, "技巧与观点": {"icon": "💡", "color": "#e8a020"}};
const DAILY_STR = "2026-05-28";
const DAILY_MAX = "2026-05-28";

let currentData = null;
let currentDate = DAILY_STR;
let readSet = new Set();
let showOnlyUnread = false;
let currentFilter = 'all';
let currentSearch = '';
let isDark = true;

function reloadToday() {
  location.reload();
}
window.addEventListener('DOMContentLoaded', function() {
  try { readSet = new Set(JSON.parse(localStorage.getItem('aidaka_read_' + currentDate) || '[]')); } catch(e) {}
  try {
    var saved = localStorage.getItem('aidaka_theme');
    if (saved === 'light') { isDark = false; document.body.classList.add('light'); }
  } catch(e) {}
  updateThemeBtn();
  renderAll(EMBEDDED_DATA);
  setTimeout(function() {
    document.getElementById('loadingOverlay').style.opacity = '0';
    setTimeout(function() { document.getElementById('loadingOverlay').style.display = 'none'; }, 400);
  }, 300);
});

function renderAll(data) {
  currentData = data;
  var sections = data.sections || [];
  var total = sections.reduce(function(a, s) { return a + s.items.length; }, 0);
  var dateStr = fmtDate(data.date);
  document.getElementById('heroTitle').textContent = 'AI打卡网 · ' + dateStr;
  var gen = data.generatedAt ? new Date(data.generatedAt) : new Date();
  document.getElementById('heroSubtitle').textContent = '共收录 ' + total + ' 条资讯 · 来源精选 · 生成于 ' + relTime(gen);
  document.getElementById('navDateLabel').textContent = data.date;
  document.title = 'AI打卡网 · ' + data.date + ' (' + total + '条)';

  var statsEl = document.getElementById('heroStats');
  statsEl.innerHTML = '<div class="stat-chip" onclick="reloadToday()" title="刷新今日数据"><div class="num">' + total + '</div><div class="lbl">今日总条数</div></div>'
    + sections.map(function(s) {
      var cfg = SECTION_CONFIG[s.label] || { icon: '📌', color: '#888' };
      return '<div class="stat-chip" onclick="filterSection(\'' + s.label.replace(/'/g, "\\'") + '\'); scrollToSection(\'' + s.label.replace(/'/g, "\\'") + '\');" title="跳转到 ' + s.label + '"><div class="num" style="font-size:22px">' + cfg.icon + '</div><div class="lbl">' + s.label.replace('/更新','').replace('/观点','') + ' ' + s.items.length + '</div></div>';
    }).join('');

  renderDonut(sections);
  var navEl = document.getElementById('navInner');
  var dateArea = navEl.querySelector('.nav-date-area');
  navEl.querySelectorAll('.nav-sec-link').forEach(function(el) { el.remove(); });
  sections.forEach(function(s) {
    var cfg = SECTION_CONFIG[s.label] || { icon: '📌', color: '#888' };
    var a = document.createElement('a');
    a.className = 'nav-link nav-sec-link';
    a.href = '#sec-' + slugify(s.label);
    a.innerHTML = cfg.icon + ' ' + s.label + ' <span class="nav-badge">' + s.items.length + '</span>';
    a.onclick = function(e) { e.preventDefault(); filterSection(s.label, a); scrollToSection(s.label); };
    navEl.insertBefore(a, dateArea);
  });
  renderAnalytics(sections);
  var main = document.getElementById('main');
  main.querySelectorAll('.dyn-section').forEach(function(el) { el.remove(); });
  var globalIdx = 0;
  var frag = document.createDocumentFragment();
  sections.forEach(function(s) {
    var cfg = SECTION_CONFIG[s.label] || { icon: '📌', color: '#888' };
    var secDiv = document.createElement('div');
    secDiv.className = 'dyn-section';
    secDiv.id = 'sec-' + slugify(s.label);
    var header = document.createElement('div');
    header.className = 'section-header';
    header.innerHTML = '<div class="section-icon" style="background:' + cfg.color + '22; color:' + cfg.color + '">' + cfg.icon + '</div>'
      + '<span class="section-title">' + s.label + '</span>'
      + '<span class="section-count">' + s.items.length + ' 条</span>';
    secDiv.appendChild(header);
    if (s.items.length === 0) {
      secDiv.innerHTML += '<p style="color:var(--text3);font-size:13px;padding:12px 0">今日暂无相关资讯</p>';
    } else {
      var grid = document.createElement('div');
      grid.className = 'card-grid';
      s.items.forEach(function(item) {
        globalIdx++;
        var cardEl = buildCard(item, globalIdx);
        grid.appendChild(cardEl);
      });
      secDiv.appendChild(grid);
    }
    frag.appendChild(secDiv);
  });
  main.insertBefore(frag, main.querySelector('#noResults'));
  updateReadProgress(total);
  updateDateNav(data.date);
  document.getElementById('footerEl').innerHTML = '共 ' + total + ' 条资讯 · 数据来源 <a href="https://aihot.virxact.com" target="_blank" rel="noopener noreferrer" style="color:var(--accent)">aihot.virxact.com</a> · AI打卡网 每日晨报';
  setTimeout(initScrollAnim, 100);
}

function buildCard(item, idx) {
  var isRead = readSet.has(String(idx));
  var card = document.createElement('div');
  card.className = 'card' + (isRead ? ' read' : '');
  card.dataset.idx = idx;
  card.dataset.title = (item.title || '').toLowerCase();
  card.dataset.summary = (item.summary || '').toLowerCase();
  card.dataset.source = (item.sourceName || '').toLowerCase();
  var srcShort = shortSource(item.sourceName || '');
  var titleSafe = escHtml(item.title || '');
  var sourceNameSafe = escHtml(item.sourceName || '');
  var summaryRaw = item.summary || '';
  // Truncate summary to ~60 chars for display
  var summaryShort = summaryRaw.length > 65 ? summaryRaw.slice(0, 62) + '...' : summaryRaw;
  var summarySafe = escHtml(summaryShort);
  var summaryFull = escHtml(summaryRaw);
  var timeStr = item.publishedAt ? relTimeStr(item.publishedAt) : '';
  var sourceHtml = item.sourceUrl ? '<a class="source-btn" href="' + escHtml(item.sourceUrl) + '" target="_blank" rel="noopener noreferrer">原文</a>' : '';

  var inner = '<div class="card-header"><span class="card-num">' + idx + '</span><span class="card-title">' + titleSafe + '</span></div>';
  if (timeStr) { inner += '<span class="time-badge">' + escHtml(timeStr) + '</span>'; }
  inner += '<span class="card-source" title="' + sourceNameSafe + '">' + escHtml(srcShort) + '</span>'
    + '<div class="card-summary collapsed" id="sum-' + idx + '" data-full="' + escHtml(summaryRaw).replace(/"/g, '&quot;') + '">' + summarySafe + '</div>'
    + '<div class="card-footer">'
    + '<button class="expand-btn" onclick="toggleExpand(' + idx + ', this)">展开全文</button>'
    + '<div style="display:flex;gap:8px">'
    + '<button class="read-btn" onclick="markRead(' + idx + ', this)" id="rbtn-' + idx + '">' + (isRead ? '标为未读' : '打卡') + '</button>'
    + sourceHtml
    + '</div></div>';
  card.innerHTML = inner;
  // 点击卡片任意位置展开全文（按钮除外）
  card.addEventListener('click', function(e) {
    var target = e.target;
    if (target.closest('.read-btn') || target.closest('.source-btn') || target.closest('.expand-btn')) return;
    toggleExpand(idx, card.querySelector('.expand-btn'));
  });
  return card;
}

function renderDonut(sections) {
  var total = sections.reduce(function(a, s) { return a + s.items.length; }, 0);
  if (total === 0) return;
  var svgEl = document.getElementById('donutSvg');
  var legendEl = document.getElementById('donutLegend');
  svgEl.innerHTML = '';
  legendEl.innerHTML = '';
  var cx = 50, cy = 50, r = 36, inner = 22;
  var startAngle = -Math.PI / 2;
  sections.forEach(function(s) {
    if (s.items.length === 0) return;
    var cfg = SECTION_CONFIG[s.label] || { icon: '📌', color: '#888' };
    var angle = (s.items.length / total) * Math.PI * 2;
    var endAngle = startAngle + angle;
    var x1 = cx + r * Math.cos(startAngle), y1 = cy + r * Math.sin(startAngle);
    var x2 = cx + r * Math.cos(endAngle), y2 = cy + r * Math.sin(endAngle);
    var ix1 = cx + inner * Math.cos(startAngle), iy1 = cy + inner * Math.sin(startAngle);
    var ix2 = cx + inner * Math.cos(endAngle), iy2 = cy + inner * Math.sin(endAngle);
    var lg = angle > Math.PI ? 1 : 0;
    var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', 'M ' + ix1 + ' ' + iy1 + ' L ' + x1 + ' ' + y1 + ' A ' + r + ' ' + r + ' 0 ' + lg + ' 1 ' + x2 + ' ' + y2 + ' L ' + ix2 + ' ' + iy2 + ' A ' + inner + ' ' + inner + ' 0 ' + lg + ' 0 ' + ix1 + ' ' + iy1 + ' Z');
    path.setAttribute('fill', cfg.color);
    path.setAttribute('opacity', '0.85');
    path.style.cursor = 'pointer';
    path.addEventListener('click', (function(label) { return function() { filterSection(label); scrollToSection(label); }; })(s.label));
    svgEl.appendChild(path);
    startAngle = endAngle;
    var li = document.createElement('div');
    li.className = 'donut-legend-item';
    li.innerHTML = '<span class="dot" style="background:' + cfg.color + '"></span>' + s.label + ' <strong style="color:rgba(255,255,255,0.95)">' + s.items.length + '</strong>';
    li.onclick = (function(label) { return function() { filterSection(label); scrollToSection(label); }; })(s.label);
    legendEl.appendChild(li);
  });
  var text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  text.setAttribute('x', cx); text.setAttribute('y', cy + 1);
  text.setAttribute('text-anchor', 'middle'); text.setAttribute('dominant-baseline', 'middle');
  text.setAttribute('fill', 'rgba(255,255,255,0.9)'); text.setAttribute('font-size', '12');
  text.setAttribute('font-weight', '700'); text.textContent = total;
  svgEl.appendChild(text);
  var sub = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  sub.setAttribute('x', cx); sub.setAttribute('y', cy + 13);
  sub.setAttribute('text-anchor', 'middle'); sub.setAttribute('fill', 'rgba(255,255,255,0.6)'); sub.setAttribute('font-size', '7');
  sub.textContent = '条';
  svgEl.appendChild(sub);
}

function renderAnalytics(sections) {
  var wrap = document.getElementById('analyticsWrap');
  var sourceMap = {};
  sections.forEach(function(s) {
    s.items.forEach(function(item) {
      var src = shortSource(item.sourceName || '未知');
      sourceMap[src] = (sourceMap[src] || 0) + 1;
    });
  });
  var sorted = Object.entries(sourceMap).sort(function(a,b) { return b[1]-a[1]; }).slice(0, 6);
  var maxCount = sorted[0] ? sorted[0][1] : 1;
  var srcHtml = '<div class="analytics-card"><div class="analytics-title">来源排行</div>';
  sorted.forEach(function(entry) {
    var name = entry[0], count = entry[1];
    var pct = Math.round(count / maxCount * 100);
    srcHtml += '<div class="source-rank-item" style="cursor:pointer" onclick="filterBySource(\'' + escHtml(name).replace(/'/g,"\\'") + '\')" title="查看 ' + escHtml(name).replace(/'/g,"\\'") + ' 的全部文章"><span class="source-rank-name">' + escHtml(name) + '</span><div class="source-rank-bar-bg"><div class="source-rank-bar" style="width:' + pct + '%"></div></div><span class="source-rank-count">' + count + '</span></div>';
  });
  srcHtml += '</div>';
  var stopWords = new Set(['的','了','在','是','与','和','AI','以','将','被','其','已','于','从','到','并','为','但','还','也','都','该','这','其中','能够','通过','实现','用于','可以','以及','可能','提供','包含','包括','无需','用户','产品','模型','支持','系统','功能','未','使用','工作','进行','没有']);
  var wordCount = {};
  sections.forEach(function(s) {
    s.items.forEach(function(item) {
      var words = (item.title + ' ' + (item.summary || '')).replace(/[，。、！？【】《》"'·\s]+/g, ' ').split(' ');
      words.forEach(function(w) {
        w = w.trim();
        if (w.length >= 2 && w.length <= 8 && !stopWords.has(w) && !/^[a-zA-Z0-9]{1,2}$/.test(w)) {
          wordCount[w] = (wordCount[w] || 0) + 1;
        }
      });
    });
  });
  var topWords = Object.entries(wordCount).sort(function(a,b) { return b[1]-a[1]; }).slice(0, 18);
  var colors = ['#e8622a','#f08040','#1d9e75','#378add','#7f6af0','#e8a020','#d4537e','#0f6e56','#993c1d','#185fa5'];
  var hotHtml = '<div class="analytics-card"><div class="analytics-title">热词标签</div><div class="hotwords-wrap">';
  topWords.forEach(function(entry, i) {
    var word = entry[0], cnt = entry[1];
    var sz = Math.max(11, Math.min(16, 11 + cnt * 2));
    var col = colors[i % colors.length];
    hotHtml += '<span class="hotword-chip" style="background:' + col + ';font-size:' + sz + 'px;opacity:' + (0.7 + cnt * 0.1) + '" onclick="document.getElementById(\'searchInput\').value=\'' + escHtml(word).replace(/'/g, "\\'") + '\';doSearch(\'' + escHtml(word).replace(/'/g, "\\'") + '\')">' + escHtml(word) + '</span>';
  });
  hotHtml += '</div></div>';
  wrap.innerHTML = srcHtml + hotHtml;
}

function doSearch(val) {
  currentSearch = val.toLowerCase().trim();
  document.getElementById('searchClear').className = 'search-clear' + (val ? ' show' : '');
  applyFilters();
}
function clearSearch() {
  document.getElementById('searchInput').value = '';
  doSearch('');
}
function applyFilters() {
  var cards = document.querySelectorAll('.card');
  var visible = 0;
  cards.forEach(function(card) {
    var secEl = card.closest('.dyn-section');
    var matchSection = currentFilter === 'all' || slugify(currentFilter) === (secEl ? secEl.id.replace('sec-','') : '');
    var matchSearch = !currentSearch
      || card.dataset.title.indexOf(currentSearch) >= 0
      || card.dataset.summary.indexOf(currentSearch) >= 0
      || card.dataset.source.indexOf(currentSearch) >= 0;
    var matchRead = !showOnlyUnread || !readSet.has(card.dataset.idx);
    if (matchSection && matchSearch && matchRead) {
      card.classList.remove('hidden'); visible++;
      if (currentSearch) highlightCard(card, currentSearch); else clearHighlight(card);
    } else {
      card.classList.add('hidden'); clearHighlight(card);
    }
  });
  document.getElementById('searchCount').textContent = currentSearch ? (visible > 0 ? '找到 ' + visible + ' 条' : '') : '';
  document.getElementById('noResults').className = 'no-results' + (visible === 0 && (currentSearch || showOnlyUnread || currentFilter !== 'all') ? ' show' : '');
}
function highlightCard(card, q) {
  var titleEl = card.querySelector('.card-title');
  if (!titleEl) return;
  var orig = titleEl.textContent;
  var re = new RegExp('(' + escRe(q) + ')', 'gi');
  titleEl.innerHTML = escHtml(orig).replace(re, '<mark>$1</mark>');
}
function clearHighlight(card) {
  var titleEl = card.querySelector('.card-title');
  if (titleEl) titleEl.innerHTML = escHtml(titleEl.textContent);
}
function filterSection(label, el) {
  currentFilter = label;
  currentSearch = '';
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.nav-link').forEach(function(a) { a.classList.remove('active'); });
  if (el) el.classList.add('active');
  else { document.querySelectorAll('.nav-link').forEach(function(a) { if (a.textContent.indexOf(label) >= 0) a.classList.add('active'); }); }
  applyFilters();
}
function filterBySource(sourceName) {
  currentFilter = 'all';
  currentSearch = sourceName;
  document.querySelectorAll('.nav-link').forEach(function(a) { a.classList.remove('active'); });
  document.querySelectorAll('.nav-link').forEach(function(a) { if (a.textContent.indexOf('全部') >= 0) a.classList.add('active'); });
  // Set search to the source name so only cards from that source remain visible
  document.getElementById('searchInput').value = sourceName;
  doSearch(sourceName);
  scrollTo(0, 0);
  showToast('已筛选：' + sourceName);
}
function scrollToSection(label) {
  var id = 'sec-' + slugify(label);
  var el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
function toggleExpand(idx, btn) {
  var sum = document.getElementById('sum-' + idx);
  if (!sum) return;
  var full = sum.dataset.full || '';
  if (sum.classList.contains('collapsed')) {
    sum.classList.replace('collapsed', 'expanded');
    sum.textContent = full;
    btn.textContent = '收起';
  } else {
    sum.classList.replace('expanded', 'collapsed');
    var short = full.length > 65 ? full.slice(0, 62) + '...' : full;
    sum.textContent = short;
    btn.textContent = '展开全文';
  }
}
function markRead(idx, btn) {
  var key = String(idx);
  var card = document.querySelector('.card[data-idx="' + key + '"]');
  if (readSet.has(key)) {
    readSet.delete(key);
    if (card) card.classList.remove('read');
    if (btn) btn.textContent = '打卡';
  } else {
    readSet.add(key);
    if (card) card.classList.add('read');
    if (btn) btn.textContent = '已打卡';
  }
  try { localStorage.setItem('aidaka_read_' + currentDate, JSON.stringify(Array.from(readSet))); } catch(e) {}
  var total = document.querySelectorAll('.card').length;
  updateReadProgress(total);
  if (showOnlyUnread) applyFilters();
}
function toggleReadFilter() {
  showOnlyUnread = !showOnlyUnread;
  var btn = document.getElementById('readProgress');
  if (showOnlyUnread) { btn.style.opacity = '0.7'; btn.title = '点击显示全部'; }
  else { btn.style.opacity = '1'; btn.title = '点击筛选未读'; }
  applyFilters();
}
function updateReadProgress(total) {
  var count = readSet.size;
  var pct = total > 0 ? Math.round(count / total * 100) : 0;
  var icon = count >= total && total > 0 ? '✅' : '🕐';
  var label = count >= total && total > 0 ? '今日已读完' : '已打卡 ' + count + '/' + total;
  document.getElementById('readLabel').innerHTML = '<span class="read-progress-label"><span class="icon">' + icon + '</span><span>' + label + '</span></span>';
  document.getElementById('readBarFill').style.width = pct + '%';
}
function toggleTheme() {
  isDark = !isDark;
  document.body.classList.toggle('light', !isDark);
  try { localStorage.setItem('aidaka_theme', isDark ? 'dark' : 'light'); } catch(e) {}
  updateThemeBtn();
}
function updateThemeBtn() {
  document.getElementById('themeBtn').textContent = isDark ? '亮色模式' : '暗色模式';
}
function updateDateNav(dateStr) {
  // For items-based view, we use daily API for history nav
  document.getElementById('nextBtn').disabled = (dateStr >= DAILY_MAX);
  document.getElementById('prevBtn').disabled = false;
}
function navigateDate(delta) {
  var d = new Date(currentDate + 'T00:00:00');
  d.setDate(d.getDate() + delta);
  var newDateRaw = d.toISOString().slice(0, 10);
  if (newDateRaw > DAILY_MAX) { showToast('已是最新日期'); return; }
  loadDate(newDateRaw);
}
function openModal() {
  document.getElementById('datePicker').value = currentDate;
  document.getElementById('datePicker').max = DAILY_MAX;
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }
function goToDate() {
  var val = document.getElementById('datePicker').value;
  closeModal();
  if (val && val !== currentDate && val <= DAILY_MAX) loadDate(val);
  else if (val > DAILY_MAX) showToast('不能选择未来日期');
}
function loadDate(dateStr) {
  currentDate = dateStr;
  document.getElementById('loadingOverlay').style.display = 'flex';
  document.getElementById('loadingOverlay').style.opacity = '1';
  try { readSet = new Set(JSON.parse(localStorage.getItem('aidaka_read_' + dateStr) || '[]')); } catch(e) { readSet = new Set(); }
  document.querySelectorAll('.dyn-section').forEach(function(el) { el.remove(); });
  currentSearch = ''; currentFilter = 'all';
  showOnlyUnread = false;
  document.getElementById('searchInput').value = '';
  document.getElementById('searchCount').textContent = '';
  document.getElementById('readProgress').style.opacity = '1';
  document.getElementById('readProgress').title = '点击筛选未读';
  // Try loading 50 items from items API for the selected date
  var sinceStr = dateStr + 'T00:00:00Z';
  fetch('https://aihot.virxact.com/api/public/items?mode=selected&since=' + sinceStr + '&take=50')
    .then(function(r) { return r.json(); })
    .then(function(apiData) {
      // Transform items API response to daily-like format
      var categories = {
        'ai-models': '模型发布/更新',
        'ai-products': '产品发布/更新',
        'industry': '行业动态',
        'paper': '论文研究',
        'tip': '技巧与观点'
      };
      var sectionMap = {};
      var idx = 0;
      (apiData.items || []).forEach(function(item) {
        var cat = item.category || '';
        var label = categories[cat] || '行业动态';
        if (!sectionMap[label]) {
          sectionMap[label] = { label: label, items: [] };
        }
        idx++;
        sectionMap[label].items.push({
          idx: idx,
          title: item.title,
          sourceName: item.source || '',
          sourceUrl: item.url || '',
          summary: item.summary || '',
          publishedAt: item.publishedAt || ''
        });
      });
      var sections = [];
      var order = ['模型发布/更新','产品发布/更新','行业动态','论文研究','技巧与观点'];
      order.forEach(function(lbl) {
        if (sectionMap[lbl]) sections.push(sectionMap[lbl]);
        else sections.push({ label: lbl, items: [] });
      });
      var transformed = {
        date: dateStr,
        generatedAt: apiData.items && apiData.items.length > 0 ? apiData.items[0].publishedAt : new Date().toISOString(),
        lead: null,
        sections: sections
      };
      renderAll(transformed);
      document.getElementById('loadingOverlay').style.opacity = '0';
      setTimeout(function() { document.getElementById('loadingOverlay').style.display = 'none'; }, 400);
      showToast('已加载 ' + dateStr + ' (' + idx + '条)');
    })
    .catch(function() {
      // Fallback to daily API
      fetch('https://aihot.virxact.com/api/public/daily/' + dateStr)
        .then(function(r) { return r.json(); })
        .then(function(dailyData) {
          renderAll(dailyData);
          document.getElementById('loadingOverlay').style.opacity = '0';
          setTimeout(function() { document.getElementById('loadingOverlay').style.display = 'none'; }, 400);
          showToast('已加载 ' + dateStr + ' 日报');
        })
        .catch(function() {
          showToast('加载失败，网络请求受限');
          document.getElementById('loadingOverlay').style.opacity = '0';
          setTimeout(function() { document.getElementById('loadingOverlay').style.display = 'none'; }, 400);
        });
    });
}
function initScrollAnim() {
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }
    });
  }, { threshold: 0.05, rootMargin: '0px 0px -20px 0px' });
  document.querySelectorAll('.card').forEach(function(c) { observer.observe(c); });
}
var toastTimer;
function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.classList.remove('show'); }, 2500);
}
function slugify(s) { return s.replace(/[\/\s]/g, '-'); }
function escHtml(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
function shortSource(name) {
  if (!name) return '';
  // Group all X/Twitter sources under "X"
  if (/^X[：:]/.test(name)) return 'X';
  var trimmed = name.replace(/（.*?）/g,'').replace(/\(.*?\)/g,'').trim();
  return trimmed.length > 16 ? trimmed.slice(0, 16) + '...' : trimmed;
}
function fmtDate(dateStr) {
  if (!dateStr) return '';
  var d = new Date(dateStr + 'T00:00:00+08:00');
  var mm = d.getMonth() + 1;
  var dd = d.getDate();
  var days = ['日','一','二','三','四','五','六'];
  return mm + ' 月 ' + dd + ' 日 周' + days[d.getDay()];
}
function fmtDateShort(iso) { return iso ? iso.slice(0, 10) : ''; }
function relTime(date) {
  var now = Date.now();
  var diff = now - date.getTime();
  var mins = Math.floor(diff / 60000);
  var hours = Math.floor(mins / 60);
  if (diff < 0) return '刚刚';
  if (mins < 1) return '刚刚';
  if (mins < 60) return mins + ' 分钟前';
  if (hours < 24) {
    var hh = String(date.getHours()).padStart(2,'0');
    var mm = String(date.getMinutes()).padStart(2,'0');
    var period = date.getHours() < 12 ? '上午' : (date.getHours() < 18 ? '下午' : '晚上');
    return '今天' + period + ' ' + hh + ':' + mm;
  }
  return fmtDateShort(date.toISOString());
}
function relTimeStr(isoStr) {
  if (!isoStr) return '';
  var d = new Date(isoStr);
  return relTime(d);
}
</script>
