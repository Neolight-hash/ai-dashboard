<html lang="zh-CN">
<head>

  .main { max-width: 960px; margin: 0 auto; padding: 24px 16px 60px; }

  .card.visible { opacity: 1; transform: translateY(0); }

  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); border-color: var(--accent); }

  .card.highlight { border-color: var(--accent2); background: rgba(232,98,42,0.06); }

    font-size: 11px;

  .card-footer { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }

  .source-btn {
    display: inline-flex;

  }

  .read-btn {

    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    color: var(--text3);
    cursor: pointer;

  }

  .time-badge { font-size: 11px; color: var(--text3); display: block; margin-bottom: 8px; }

<body>
<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>

      <button class="modal-btn secondary" onclick="closeModal()">取消</button>
      <button class="modal-btn primary" onclick="goToDate()">前往</button>

  </div>
</div>
<div class="toast" id="toast"></div>
<div class="hero">

  </div>

</div>

i/article/2070315221424787456", "url": "https://x.com/xiaohu/status/2070317717811540149", "permalink": "https://aihot.virxact.com/items/cmqu93tek02e2sl80iom0bica", "source": "X：小互 (@xiaohu)", "publishedAt": "2026-06-26T01:26:23.000Z", "summary": "博主小互开源个人IP配图技能\"小互IP Studio\"，包含31个原创角色（15个手绘线稿角色+16个谐音梗meme形象）及一套配图方法论。该Agent可自动读取文章、规划配图类型（情绪图/示意图/四格漫画）、生成并自查返工。默认画风为手绘线稿淡彩，另备5种皮肤（3D盲盒、黑白线稿等）可切换。安装仅需Python3，支持Claude Code、Codex等工具，需自备OpenAI兼容的图像API key（默认GPT-image-2）；也可只输出提示词手动生图。", "category": "tip", "score": 81, "selected": true}, {"id": "cmqu5r7al01j7sl80meg0lje3", "title": "@exponentialview 发布《State of the AI Economy》报告：AI经济年化收入超1750亿美元", "title_en": "This is a brilliant report. The State of the AI Economy by @exponentialview - $110B real AI revenue…", "url": "https://x.com/rohanpaul_ai/status/2070288396644491317", "permalink": "https://aihot.virxact.com/items/cmqu5r7al01j7sl80meg0lje3", "source": "X：Rohan Paul (@rohanpaul_ai)", "publishedAt": "2026-06-25T23:29:52.000Z", "summary": "报告基于去重后的消费端AI支出统计，过去12个月实际AI营收达1100亿美元，年化运行率超1750亿美元，增长速度约为移动/互联网普及浪潮的3倍。营收形成速度急剧加快：2023年新增10亿美元收入需180天，现缩短至不足2天。企业AI已脱离试点阶段，但全面推广仍处早期。31%的标普500公司在财报电话会提及AI，仅20%量化影响。Token降价每10%刺激12-18%用量增长，需求价格弹性强。超大规模云厂商AI收入目前大致覆盖基础设施折旧，GPU经济效益依赖6年计算寿命假设。电力供应和数据中心成本仍是未来扩展主要瓶颈。", "category": "tip", "score": 82, "selected": true}, {"id": "cmqu24x8v00lssl8065rajmsy", "title": "Claude Code v2.1.193 发布", "title_en": "v2.1.193", "url": "https://github.com/anthropics/claude-code/releases/tag/v2.1.193", "permalink": "https://aihot.virxact.com/items/cmqu24x8v00lssl8065rajmsy", "source": "Claude Code：GitHub Releases（RSS）", "publishedAt": "2026-06-25T21:45:57.000Z", "summary": "Claude Code v2.1.193 新增 `autoMode.classifyAllShell` 设置，将全部 Bash/PowerShell 命令经自动模式分类器处理。自动模式拒绝原因现加入转录、拒绝提示及 `/permissions` 页面。新增 `claude_code.assistant_response` OpenTelemetry 日志事件（默认不记录，需设置 `OTEL_LOG_ASSISTANT_RESPONSES=1`）。Bash 模式支持实时文件路径自动补全；MCP 服务器需认证时显示启动提示。新增空闲后台 shell 命令自动内存压力回收（可禁用）。修复 `/model` UI 状态滞后、后台任务误取消、子 agent 隐藏同级等问题，并改进了后台 agent 启动指令、MCP 认证重连、插件自动重命名等行为。", "category": "ai-products", "score": 61, "selected": true}, {"id": "cmqu0cbyl006isl80rufd707u", "title": "Codex 在 ChatGPT 移动 App 正式可用", "title_en": "Codex in the ChatGPT mobile app is now generally available. Connect your phone and computer more se…", "url": "https://x.com/OpenAIDevs/status/2070254532911882707", "permalink": "https://aihot.virxact.com/items/cmqu0cbyl006isl80rufd707u", "source": "X：OpenAI Developers (@OpenAIDevs)", "publishedAt": "2026-06-25T21:15:18.000Z", "summary": "OpenAI 宣布 Codex 在 ChatGPT 移动应用中正式开放（GA），并新增一对一设备配对实现更安全的手机与电脑连接。移动端新增通知、目标、侧边聊天、文件预览及内联审阅评论功能。此前预览版已明确，用户可通过 ChatGPT 移动 App 启动新工作、审查输出、引导执行和批准下一步，而 Codex 实际继续在笔记本、Mac mini 或开发机上后台运行。", "category": "ai-products", "score": 66, "selected": true}, {"id": "cmqu0e95l006ysl8097qhn8ny", "title": "美国政府要求OpenAI暂缓GPT-5.6广泛发布", "title_en": "The Information： The US government is asking OpenAI to slow GPT-5.6 into a controlled preview instea…", "url": "https://x.com/rohanpaul_ai/status/2070252433109049466", "permalink": "https://aihot.virxact.com/items/cmqu0e95l006ysl8097qhn8ny", "source": "X：Rohan Paul (@rohanpaul_ai)", "publishedAt": "2026-06-25T21:06:58.000Z", "summary": "The Information 报道，美国政府因安全顾虑要求 OpenAI 暂缓 GPT-5.6 的广泛发布，改为推出受控预览版。OpenAI 计划先向小部分合作伙伴提供早期访问，并由政府逐客户审批准入。这一非常规做法主要担忧模型在自动化高技能网络工作上的能力：既能帮防御者更快发现漏洞，也可能被攻击者用于加速测试漏洞利用。本周四，CEO Sam Altman 已向员工确认该审批流程。", "category": "industry", "score": 76, "selected": true}, {"id": "cmqtvqfrt07aksl0et0cawoue", "title": "Midjourney 预览 V8.2 并加速草稿模式", "title_en": "Two quick updates in image world. Try adding --preview to your prompt for a early peak at V8.2 aesth…", "url": "https://x.com/midjourney/status/2070223272072065228", "permalink": "https://aihot.virxact.com/items/cmqtvqfrt07aksl0et0cawoue", "source": "X：Midjourney (@midjourney)", "publishedAt": "2026-06-25T19:11:05.000Z", "summary": "Midjourney 带来两项更新。一是加入 `--preview` 参数可提前体验 V8.2 的美学与个性化效果；二是此前在 V8.1 推出的大批量草稿模式（生成 24 张低分辨率图，价格仅为标准 4 张的一半，点击 \"Vary\" 可升级为全分辨率）现在支持搭配 `--sref random` 使用，探索风格空间的速度比之前快 24 倍。", "category": "ai-products", "score": 67, "selected": true}, {"id": "cmqtvbv4r076ssl0e588aopiw", "title": "IBM 首度推出亚纳米级芯片技术", "title_en": "IBM首度推出亚纳米级芯片技术", "url": "https://newsroom.ibm.com/2026-06-25-ibm-debuts-worlds-first-sub-1-nanometer-chip-technology", "permalink": "https://aihot.virxact.com/items/cmqtvbv4r076ssl0e588aopiw", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "publishedAt": "2026-06-25T18:52:05.282Z", "summary": "IBM 于 2026 年 6 月 25 日发布全球首款亚纳米级芯片技术，采用 0.7 nm（7 埃米）节点与全新三维纳米堆叠（nanostack）架构。指甲盖大小的芯片集成近 1000 亿个晶体管，密度约为 IBM 2021 年 2 nm 芯片的两倍。相比 2 nm 芯片，性能最高提升 50%，能效最高提升 70%。纳米堆叠架构还实现 SRAM 面积缩减 40%，有助于支撑先进 AI 工作负载的高带宽需求。该技术已在 VLSI 2026 会议上验证，IBM 预计 5 年内量产。", "category": "paper", "score": 78, "selected": true}, {"id": "cmqtv6jlv0766sl0eixynhk6m", "title": "Midjourney V8.1 草稿模式新增随机风格功能", "title_en": "Random styles in draft mode", "url": "https://updates.midjourney.com/random-styles-in-draft-mode", "permalink": "https://aihot.virxact.com/items/cmqtv6jlv0766sl0eixynhk6m", "source": "Midjourney：Updates（RSS）", "publishedAt": "2026-06-25T18:50:16.000Z", "summary": "Midjourney V8.1 的草稿模式（draft mode）添加了随机风格功能。用户在提示词中加入 `--sref random` 即可一键生成 24 张不同风格的图片。开启草稿模式可通过点击提示栏的 ⚡ 图标或添加 `--draft` 参数。", "category": "ai-products", "score": 62, "selected": true}, {"id": "cmqtun7jv06zvsl0ejc2rnrpp", "title": "Runway发布Agent 2.0", "title_en": "Introducing Agent 2.0", "url": "https://runwayml.com/news/introducing-agent-2", "permalink": "https://aihot.virxact.com/items/cmqtun7jv06zvsl0ejc2rnrpp", "source": "Runway：News（网页）", "publishedAt": "2026-06-25T18:41:58.502Z", "summary": "Runway发布Agent 2.0，帮助营销人员创建、测试和优化广告、视频及营销活动。品牌营销人员可在对话中开发活动概念、生成变体并自动本地化；绩效营销人员可上传创意并导入Meta、YouTube、TikTok或Google广告数据，由Agent分析后生成下一轮待测广告。社交媒体营销人员可一次性生成一周内容，自动裁切为9：16、16：9、1：1等格式；产品营销人员可借助Agent确定定位角度并构建活动资产。Agent 2.0面向所有用户开放。", "category": "ai-products", "score": 65, "selected": true}, {"id": "cmqtu9a7r06x3sl0exw2blt0o", "title": "赫库兰尼姆古卷首次被完整虚拟解读", "title_en": "赫库兰尼姆的一卷古卷首次被解读", "url": "https://scrollprize.org/firstscroll", "permalink": "https://aihot.virxact.com/items/cmqtu9a7r06x3sl0exw2blt0o", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "publishedAt": "2026-06-25T18:03:58.685Z", "summary": "研究人员利用高分辨率X射线显微断层扫描和机器学习，在未物理展开的情况下完整虚拟展开并读取了赫库兰尼姆古卷PHerc.1667（Scroll4）。这是首卷被从头到尾连续读取的纸莎草卷，内容为斯多葛哲学论著，提及克里西普斯的侄子Aristocreon。第二卷PHerc.Paris4通过更高分辨率成像使墨水在三维数据中直接可见，独立确认了2023年大奖赛的解读。第三卷PHerc.139确定标题和作者为菲洛德穆《论诸神》第八卷。所有数据与代码已公开。", "category": "paper", "score": 79, "selected": true}, {"id": "cmqtpf8w405opsl0e2ldkd1q1", "title": "OLMo Hybrid vs Transformer：混合模型在实义词上优势明显，但重复短语上几无优势", "title_en": "Which tokens does a hybrid model predict better？", "url": "https://huggingface.co/blog/allenai/hybrid-token-prediction", "permalink": "https://aihot.virxact.com/items/cmqtpf8w405opsl0e2ldkd1q1", "source": "Hugging Face：Blog（RSS）", "publishedAt": "2026-06-25T16:11:42.000Z", "summary": "通过对比7B参数的OLMo 3（Transformer）与OLMo Hybrid（混合架构），实验发现混合模型在大多数token上预测损失更低：对名词、动词、形容词等实义词优势明显（loss gap约0.04），功能词上gap约0.02，且在需上下文推理的代词指代上更好。但在重复出现的n-gram和闭合括号（如`}`）上，混合模型的优势几乎消失，Transformer凭借注意力机制更擅长从输入中直接检索精确信息。", "category": "tip", "score": 65, "selected": true}, {"id": "cmqtp5syl05k5sl0ec5cvuedt", "title": "多数主流AI聊天机器人政治立场偏左，\"反觉醒\"模型也不例外", "title_en": "Most major AI chatbots still lean left on political questions， even \"anti-woke\" models are no exception", "url": "https://the-decoder.com/most-major-ai-chatbots-still-lean-left-on-political-questions-even-anti-woke-models-are-no-exception", "permalink": "https://aihot.virxact.com/items/cmqtp5syl05k5sl0ec5cvuedt", "source": "The Decoder：AI News（RSS）", "publishedAt": "2026-06-25T16:04:32.000Z", "summary": "华盛顿邮报调查显示，多数主流AI聊天机器人在政治问题上明显偏左。OpenAI GPT-5.5在80%回答中仅呈现左派论据；DeepSeek V4 Pro为70%；Anthropic Claude Opus 4.8有43%纯左、57%给出双方观点。xAI的Grok 4.3左倾回答仍多于右倾。右翼平台Gab的Arya左倾回答是右倾的12倍。Google Gemini 3.1 Pro是例外，93%回答同时呈现双方立场。特朗普推动的\"反觉醒\"AI未能改变这一格局。", "category": "tip", "score": 73, "selected": true}, {"id": "cmqtq76j105ubsl0e8j4fy8se", "title": "General Intuition 完成 3.2 亿美元融资，用游戏数据训练通用 AI 智能体", "title_en": "General Intuition raises $2.3B on bet that video games can train AI agents for the real world", "url": "https://techcrunch.com/2026/06/25/from-fortnite-to-robots-general-intuitions-2-3b-bet-that-video-games-can-train-ai-agents-for-the-real-world", "permalink": "https://aihot.virxact.com/items/cmqtq76j105ubsl0e8j4fy8se", "source": "TechCrunch：AI（RSS）", "publishedAt": "2026-06-25T16:00:00.000Z", "summary": "General Intuition 以 23 亿美元估值完成 3.2 亿美元融资，累计披露融资 4.54 亿美元。公司从旗下游戏剪辑平台 Medal 获取数亿小时含精确按键动作标签的游戏操作数据，训练单一模型同时驾驭 Fortnite 等虚拟环境和四足机器人。演示中，AI 智能体在游戏中连续运行 100 小时，机器人仅靠 8 分钟真实街道数据微调即可自主探索办公室。本轮由 Khosla Ventures 领投，General Catalyst、Jeff Bezos、Eric Schmidt 等参投。资金将用于通过 CoreWeave 扩大计算规模、预训练下一代模型，计划夏末前开放 API。", "category": "industry", "score": 71, "selected": true}, {"id": "cmqtp7ycw05lbsl0ei7dpsv19", "title": "Google Finance 全新 Android 应用与投资组合功能上线", "title_en": "Our latest Google Finance upgrades， including a new app", "url": "https://blog.google/products-and-platforms/products/search/google-finance-updates-june-2026", "permalink": "https://aihot.virxact.com/items/cmqtp7ycw05lbsl0ei7dpsv19", "source": "Google Blog：AI（RSS）", "publishedAt": "2026-06-25T16:00:00.000Z", "summary": "本周，Google Finance 推出正式版 Android 应用，同步上线全球投资组合跟踪功能。用户可通过截图、CSV/PDF 上传或文字描述创建组合，并利用 AI 研究工具提问资产配置、固定收益影响等问题。新增市场情报简报功能：用户设定任务（如每日盘前简报），后台自动生成并推送至 Google 应用（Android/iOS）及网页端。Android 应用包含 watchlist、实时数据、金融新闻 feed、AI 研究工具及 AI 驱动的\"关键时刻\"解释股价波动。未来数月将把更多 web 功能（如财报电话、投资组合与任务）迁移至移动端，今年晚些推出 iOS 应用。", "category": "ai-products", "score": 57, "selected": true}, {"id": "cmqtpj36o05pusl0e9ingyoye", "title": "Ornith-1.0 开源模型家族发布，专注 Agentic Coding 全参数规模", "title_en": "卧槽！最近开源大模型太卷了啊！ 这不又一个专注agentic coding的开源模型家族来了，叫Ornith-1.0。 它覆盖了从9B到397B MoE的全尺寸，在Terminal-Bench、S…", "url": "https://x.com/berryxia/status/2070167806700908957", "permalink": "https://aihot.virxact.com/items/cmqtpj36o05pusl0e9ingyoye", "source": "X：Berry Xia (@berryxia)", "publishedAt": "2026-06-25T15:30:41.000Z", "summary": "Ornith-1.0 开源模型家族发布，专注智能体编程（Agentic Coding），覆盖 9B Dense、31B Dense、35B MoE 及 397B MoE 全参数规模。在 Agent Coding 基准上达开源顶尖：SWE-Bench Verified 82.4、SWE-Bench Pro 62.2、Terminal-Bench 2.1 77.5、NL2Repo 48.2、SWE Atlas 41.2 QnA、ClawEval 77.1。基于 gemma4 和 qwen3.5 后训练，采用强化学习联合优化任务脚手架（scaffold）与最终解决方案，让模型自主改进执行框架。全系列 MIT 开源，提供 GGUF 版本，支持 Ollama、Unsloth 等本地运行。", "category": "ai-models", "score": 76, "selected": true}, {"id": "cmquellij03q2sl80f5fm292j", "title": "美团 LongCat 开源 VitaBench 2.0：长期动态智能体基准新标杆", "title_en": null, "url": "https://mp.weixin.qq.com/s/HoiUxYnyJuh2_xdxmg8s8Q", "permalink": "https://aihot.virxact.com/items/cmquellij03q2sl80f5fm292j", "source": "公众号：龙猫LongCat（美团）", "publishedAt": "2026-06-25T11:58:00.000Z", "summary": "美团 LongCat 团队推出 VitaBench 2.0，首个真实生活场景下针对长期动态用户建模的智能体评测基准。包含56名拟真用户、819个复杂任务、超2000个动态偏好及66个可执行工具，每位用户平均2093个交互事件，时间跨度平均1580天。同时支持长文本上下文学习和智能体记忆策略评测。测试显示，最强模型 Claude-Opus-4.6 在\"开卷\"模式下平均分刚过0.5；开启思考模式并不总能提升个性化任务表现；所有模型在需要主动提问的任务上得分断崖式下跌。VitaBench 2.0 已开源。", "category": "ai-products", "score": 69, "selected": true}, {"id": "cmqtc9nw602azsl0e4dvg4t64", "title": "Meta员工警告AI内容审核部署过快", "title_en": "Meta employees warn AI moderation rollout is too fast", "url": "https://the-decoder.com/meta-employees-warn-ai-moderation-rollout-is-too-fast", "permalink": "https://aihot.virxact.com/items/cmqtc9nw602azsl0e4dvg4t64", "source": "The Decoder：AI News（RSS）", "publishedAt": "2026-06-25T10:07:19.000Z", "summary": "Meta在2025年已用大语言模型替换约一半人工审核请求，计划年底前将部分内容类型的AI审核比例提升至90%以上，每年节省数十亿美元。Meta否认成本动机，称自3月测试显示其模型错误率比人类低13%，且多捕捉10%违规。但员工指出模型仍会移除或限流无害内容，缺乏足够监督，快速部署已导致外包裁员。此外，Meta已从使用Google Gemini转向自家新基础模型Muse Spark，该模型基于人工审核员的历史决策训练。", "category": "industry", "score": 73, "selected": true}, {"id": "cmqsy1vs107c5slfu4fmksjzd", "title": "Anthropic称阿里巴巴非法获取了Claude AI模型的功能", "title_en": null, "url": "https://www.reuters.com/world/china/anthropic-says-alibaba-illicitly-extracted-claude-ai-model-capabilities-2026-06-24", "permalink": "https://aihot.virxact.com/items/cmqsy1vs107c5slfu4fmksjzd", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "publishedAt": "2026-06-25T03:07:48.942Z", "summary": "Anthropic指控阿里巴巴未经授权提取了其Claude AI模型的能力。该指控基于Anthropic的调查，认为阿里巴巴通过逆向工程或其他手段复制了Claude的核心技术。目前阿里巴巴尚未公开回应。", "category": "industry", "score": 75, "selected": true}, {"id": "cmqta6kw701sasl0es975w0zc", "title": "OpenAI内部报告：智能体Codex如何改变工作", "title_en": "How agents are transforming work", "url": "https://openai.com/index/how-agents-are-transforming-work", "permalink": "https://aihot.virxact.com/items/cmqta6kw701sasl0es975w0zc", "source": "OpenAI：官网动态（RSS · 排除企业/客户案例）", "publishedAt": "2026-06-25T02:00:00.000Z", "summary": "OpenAI 在2025年8月至2026年6月间观察到，智能体产品 Codex 取代 ChatGPT 成为主要工作工具，各部门输出 token 中 Codex 占比从不足10%升至99.8%。80.6%个体用户曾发起预计等效人类工作时间超30分钟的请求，70.2%超1小时，25.6%超8小时；99百分位用户每日生成超60小时 agent turns。非开发者用户增长迅猛：个体用户增长137倍，组织用户增长189倍。Legal、Finance、Recruiting 部门在2026年4月前后跨过 Codex 使用过半拐点，平均每位律师或招聘人员超85%输出 token 来自 Codex。", "category": "paper", "score": 65, "selected": true}, {"id": "cmqtkuscr04g8sl0eoqzwkdm7", "title": "OpenRouter MCP 服务器发布", "title_en": "The OpenRouter MCP Server", "url": "https://openrouter.ai/blog/announcements/openrouter-mcp-server", "permalink": "https://aihot.virxact.com/items/cmqtkuscr04g8sl0eoqzwkdm7", "source": "OpenRouter：Announcements（RSS）", "publishedAt": "2026-06-25T00:00:00.000Z", "summary": "OpenRouter 推出 MCP 服务器，为编程智能体提供实时模型数据、基准排名、定价和文档查询。开发者通过一键安装（支持 Claude Code、Codex CLI、Cursor 等客户端），即可在编辑器内完成模型筛选、价格对比和测试推理，无需切换标签页。服务器整合 Artificial Analysis、Design Arena 及 OpenRouter 自身排名数据，例如推荐 GLM-5.2 作为性价比最佳的编码模型。工具集包括 models-list、model-get、model-endpoints、benchmarks 等，支持通过 chat-send 发送测试提示，比较不同模型（如 Claude Opus 4.8、GPT-5.5、DeepSeek V4 Pro）的响应、成本和延迟。API 密钥附带 7 天有效期和 10 美元消费上限，可随时撤销。", "category": "ai-products", "score": 71, "selected": true}, {"id": "cmqst0js5060tslfu7s6uxjhf", "title": "盈透证券（Interactive Brokers）与 Grok 集成：组合分析、情景建模与实时交易指令生成", "title_en": "Explore the markets with Interactive Brokers and Grok", "url": "https://x.ai/news/grok-interactive-brokers", "permalink": "https://aihot.virxact.com/items/cmqst0js5060tslfu7s6uxjhf", "source": "xAI：News（网页）", "publishedAt": "2026-06-25T00:00:00.000Z", "summary": "盈透证券（Interactive Brokers）近日与 Grok 集成，用户可在几分钟内免费关联现有账户，无需注册新账户。通过自然语言与 Grok 对话，可完成组合收益分析（如股息与利息预测）、行业/地区/经济事件的风险敞口情景建模、市场趋势研究，并直接生成对冲订单等实时交易指令，实现从数据洞察到执行决策的一体化。", "category": "ai-products", "score": 55, "selected": true}, {"id": "cmqsmijfz04cwslfuwufeuxwz", "title": "AI被认为会取代工程岗位，但新数据显示工程是2025年最具韧性的岗位", "title_en": "AI was supposed to kill engineering jobs， but new data suggests they're the most resilient", "url": "https://techcrunch.com/2026/06/24/ai-was-supposed-to-kill-engineering-jobs-but-new-data-suggests-theyre-the-most-resilient", "permalink": "https://aihot.virxact.com/items/cmqsmijfz04cwslfuwufeuxwz", "source": "TechCrunch：AI（RSS）", "publishedAt": "2026-06-24T21:56:41.000Z", "summary": "风投机构SignalFire追踪8000万家公司数百万员工数据发现，工程是2025年最具韧性的岗位。大型科技公司总招聘较2019年下降25%，工程岗仅降11%；工程岗占Alphabet、Meta等12家\"Tech Majors\"新招员工的55%（2019年为46%）。早期初创公司2025年工程师招聘比2019年增长7%。Anthropic CEO警告AI可能消灭一半入门级白领，但该公司经济主管称尚未看到显著影响。NVIDIA CEO黄仁勋表示AI让工程师更忙碌，是杰文斯悖论的典型例证。", "category": "tip", "score": 70, "selected": true}, {"id": "cmqsjydyy03s2slfu0akeh868", "title": "Notion 使用 Cursor SDK 嵌入编码智能体", "title_en": "How Notion used the Cursor SDK to embed coding agents", "url": "https://cursor.com/blog/notion", "permalink": "https://aihot.virxact.com/items/cmqsjydyy03s2slfu0akeh868", "source": "Cursor Blog", "publishedAt": "2026-06-24T20:55:19.799Z", "summary": "Notion 通过 Cursor SDK 在数周内将编码智能体嵌入产品。用户可在文档中@Cursor、在讨论串中提及或向数据库指派任务，Cursor 即可端到端完成规划、构建、测试、验证并自动创建 PR。集成基于一套 Provider 无关的智能体框架，Notion 的讨论串对应一个 Cursor 智能体，每条消息对应一次智能体运行；结果通过 SSE 流式传输，支持断连恢复。Cursor SDK 提供与生产环境相同的模型、运行时和远程 MCP 支持，让 Notion 无需自建智能体基础设施即可获得完整栈编码能力。用户还可自定义模板、MCP 服务器、技能和子智能体，并设置自动触发规则。", "category": "ai-products", "score": 65, "selected": true}, {"id": "cmqshf6dl0354slfug4vof984", "title": "Perplexity推出Computer for Counsel", "title_en": "Introducing Computer for Counsel. Computer now connects the research databases， document tools， and…", "url": "https://x.com/perplexity_ai/status/2069866668671766804", "permalink": "https://aihot.virxact.com/items/cmqshf6dl0354slfug4vof984", "source": "X：Perplexity (@perplexity_ai)", "publishedAt": "2026-06-24T19:34:04.000Z", "summary": "推出 Computer for Counsel。\n\nComputer 现在连接了律师日常使用的研究数据库、文档工具和案件管理系统。可从中提取可引用来源：@midpageAI、@LegalZoom、@Docusign、@netdocuments 等。\n\n所有 Pro 和 Max 订阅用户均可使用。", "category": "ai-products", "score": 65, "selected": true}, {"id": "cmqsgw1tf0304slfurlccxlvs", "title": "在与Anthropic的纠纷中，NSA失去了对Mythos的访问权限", "title_en": null, "url": "https://www.nytimes.com/2026/06/23/us/politics/nsa-lost-access-anthropic-tool.html", "permalink": "https://aihot.virxact.com/items/cmqsgw1tf0304slfurlccxlvs", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "publishedAt": "2026-06-24T19:08:32.032Z", "summary": "美国国家安全局（NSA）因与人工智能公司Anthropic的纠纷，失去了对Mythos系统的访问权限。", "category": "industry", "score": 71, "selected": true}, {"id": "cmqsef9c302f0slfu6lvuhnu7", "title": "GPT-5.5 Instant 新版本，对话更有趣", "title_en": "We have a new version of GPT-5.5 Instant for you， and it's much more fun to talk to. Our most-used …", "url": "https://x.com/OpenAI/status/2069843083701915755", "permalink": "https://aihot.virxact.com/items/cmqsef9c302f0slfu6lvuhnu7", "source": "X：OpenAI (@OpenAI)", "publishedAt": "2026-06-24T18:00:21.000Z", "summary": "我们为你带来了新版 GPT-5.5 Instant，它现在聊起天来有趣多了。\n\n我们最常用的模型现在能更好地理解问题背后的意图，并相应地调整回应。\n\n它也能更可靠地处理复杂约束，让购物和本地推荐更加实用和连贯。\n\n今天向付费用户推送，明天向免费用户推送。", "category": "ai-models", "score": 67, "selected": true}, {"id": "cmqsbrhhm01o1slfu2kei9qhy", "title": "Figma在Config 2026押注人类判断，画布AI能力却来自第三方", "title_en": "Figma bets on human judgment at Config 2026 while the AI powering its canvas belongs to someone else", "url": "https://the-decoder.com/figma-bets-on-human-judgment-at-config-2026-while-the-ai-powering-its-canvas-belongs-to-someone-else", "permalink": "https://aihot.virxact.com/items/cmqsbrhhm01o1slfu2kei9qhy", "source": "The Decoder：AI News（RSS）", "publishedAt": "2026-06-24T16:49:01.000Z", "summary": "Figma在Config 2026将设计画布扩展至代码、动画、3D深度和着色器效果，并集成去年收购的Weave工作流系统。新功能包括Code Layers（代码与设计并存）、Motion动画、深度层、Shader及Generative Plugins。协作方面，团队可搜索复用AI提示词、保存工作流为技能、共享插件。Figma的AI功能依赖Anthropic、OpenAI和Google等外部模型，推理成本挤压利润率。同时，Anthropic等公司的竞争产品可直接生成界面，构成威胁。", "category": "ai-products", "score": 74, "selected": true}, {"id": "cmqsbthp601p3slfuajayc4gr", "title": "Gemini 3.5 Flash 引入 computer use 功能", "title_en": "Introducing computer use in Gemini 3.5 Flash", "url": "https://deepmind.google/blog/introducing-computer-use-in-gemini-3-5-flash", "permalink": "https://aihot.virxact.com/items/cmqsbthp601p3slfuajayc4gr", "source": "Google DeepMind：Blog（RSS）", "publishedAt": "2026-06-24T16:30:01.000Z", "summary": "Google DeepMind 宣布，computer use 现作为内置工具集成于 Gemini 3.5 Flash，开发者可构建跨浏览器、移动端和桌面的智能体，实现视觉感知、推理与操作。此前该功能仅以独立模型形式存在于 Gemini 2.5。3.5 Flash 已支持函数调用及 Search、Maps 等内置工具，新增的 computer use 可提升持续软件测试和跨专业应用知识工作等长周期企业自动化任务的性能。安全方面采用针对性对抗训练，并可选配两项企业防护系统：要求用户确认敏感操作，以及在检测到间接 prompt 注入时自动停止任务。可通过 Gemini API 和 Gemini Enterprise Agent Platform 使用。", "category": "ai-products", "score": 70, "selected": true}, {"id": "cmqs9yjcy0187slfupnhipvhf", "title": "NVIDIA NeMo AutoModel：一行代码加速Transformer MoE模型微调", "title_en": "Accelerating Transformers Fine-Tuning with NVIDIA NeMo AutoModel", "url": "https://huggingface.co/blog/nvidia/accelerating-fine-tuning-nvidia-nemo-automodel", "permalink": "https://aihot.virxact.com/items/cmqs9yjcy0187slfupnhipvhf", "source": "Hugging Face：Blog（RSS）", "publishedAt": "2026-06-24T16:00:13.000Z", "summary": "NVIDIA NeMo AutoModel 是基于 Transformers v5 的开源库，添加 Expert Parallelism、DeepEP 融合 all-to-all 调度和 TransformerEngine 内核。在 MoE 模型微调中，相比原生 v5，训练吞吐量提升 3.4-3.7 倍，GPU 内存减少 29-32%，仅需改动一行 import。在 16 节点 128 张 H100 上全微调 Nemotron 3 Ultra 550B A55B 时，v5 因内存不足无法运行，而 AutoModel 凭借 EP=64 专家并行使训练可行。单节点 30B MoE 模型（如 Qwen3-30B-A3B）同样获得可量化的性能优势。", "category": "tip", "score": 66, "selected": true}, {"id": "cmqsi8c9303azslfuexk0h241", "title": "OpenRouter 零数据留存（ZDR）实践：97 款新模型，流量占比近半", "title_en": "When Zero Means Zero", "url": "https://openrouter.ai/blog/insights/when-zero-means-zero", "permalink": "https://aihot.virxact.com/items/cmqsi8c9303azslfuexk0h241", "source": "OpenRouter：Announcements（RSS）", "publishedAt": "2026-06-24T16:00:00.000Z", "summary": "OpenRouter 的零数据留存（ZDR）保证用户提示词和模型响应不被存储，元数据一般安全。自 1 月以来新增 97 款支持 ZDR 的模型，月度 token 量增长 4.3 倍，约占全部路由流量一半。ZDR 在三个层面执行：账户级（整个供应商开启）、护栏级（按 API Key 或组织成员限定）、单次请求级（传参数仅路由至 ZDR 端点）。企业用户可灵活选择控制粒度，避免锁定单一供应商。", "category": "tip", "score": 68, "selected": true}, {"id": "cmqs9eic7012cslfuu3w4io4c", "title": "Mistral AI 为 Connectors 推出多项安全与可控新能力", "title_en": "Bringing more control over your connectors June 24， 2026 Mistral AI", "url": "https://mistral.ai/news/more-control-over-connectors", "permalink": "https://aihot.virxact.com/items/cmqs9eic7012cslfuu3w4io4c", "source": "Mistral AI：News（网页）", "publishedAt": "2026-06-24T15:59:47.708Z", "summary": "2026年6月24日，Mistral AI 发布 Connectors 多项新能力：Enriched admin controls（GA）支持按工作空间设置连接器访问权限并单独开关工具；API keys with connector scopes（GA）防止自动化 AI 工作负载中身份冒充；Multi-account connectors（GA）允许单个连接器绑定多个账户；Connectors Debugger（公开预览）对 MCP 连接器进行端到端根因分析；Connectors in Vibe Code（GA）和 Connectors in Workflows（公开预览）分别允许在开发者界面复用连接器及支持长时间运行任务不中断。", "category": "ai-products", "score": 62, "selected": true}, {"id": "cmqs65ogk008hslfuodhruc4w", "title": "里德·霍夫曼称SpaceX\"不是一家人工智能公司\"，xAI则是\"彻底的灾难\"", "title_en": null, "url": "https://fortune.com/2026/06/24/reid-hoffman-spacex-musk-openai-anthropic-gen-z-mistake", "permalink": "https://aihot.virxact.com/items/cmqs65ogk008hslfuodhruc4w", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "publishedAt": "2026-06-24T14:20:14.340Z", "summary": "LinkedIn联合创始人、Anthropic和OpenAI投资者Reid Hoffman在播客中公开批评SpaceX和xAI。他指出SpaceX\"不是一家人工智能公司\"，6月12日上市后收购AI编程工具Cursor属于\"花钱买相关性\"；xAI则是\"彻底的灾难\"，所有11位联合创始人已离职，Grok模型在基准测试中落后于Anthropic和OpenAI。他还批评美国政府6月11日以出口管制为由强制Anthropic下架Fable和Mythos模型，理由仅为Amazon CEO报告Fable 5存在jailbreak漏洞，称此举\"专断随意\"。Hoffman认为Anthropic和OpenAI均有巨大发展空间，但Cursor可能已过巅峰。他建议年轻人不要抵制AI。", "category": "tip", "score": 78, "selected": true}, {"id": "cmqs68cgx0090slfuumt36jny", "title": "字节跳动技术副总裁洪定坤：AI Coding 的实践与探索", "title_en": null, "url": "https://mp.weixin.qq.com/s/mdmaAyUIvxE8WT_GEbF2wQ", "permalink": "https://aihot.virxact.com/items/cmqs68cgx0090slfuumt36jny", "source": "公众号：火山引擎", "publishedAt": "2026-06-24T14:02:42.000Z", "summary": "在火山引擎Force大会，字节跳动技术副总裁洪定坤分享AI Coding实践。过去一年，字节AI代码贡献率增长6倍，tokens消耗增长5倍，但过度关注单一指标可能失真--TRAE团队代码超90%由AI生成，人均需求吞吐率仅提升60%。900次实验显示，主流Coding模型组合代码正确率超80%，但可交付性仅40-60分；结合Harness基建后提升至80分。AI降低编程门槛但需优化指标、治理、协作。字节探索原型驱动开发，能力沉淀至TRAE（日均Token消耗5.6万亿，增长50倍），并推出TRAE Work。", "category": "tip", "score": 74, "selected": true}, {"id": "cmqrxnmqg0p2zslp51p8cc1ln", "title": "火山引擎推出Agent Ready基础设施，AgentKit与ArkClaw企业版升级", "title_en": "火山引擎Agent Infra升级，让Agent真正进入企业工作流", "url": "https://mp.weixin.qq.com/s/83mrPAPgQRKhxLkoSvRgBQ", "permalink": "https://aihot.virxact.com/items/cmqrxnmqg0p2zslp51p8cc1ln", "source": "公众号：火山引擎", "publishedAt": "2026-06-24T10:17:58.000Z", "summary": "火山引擎在FORCE大会推出面向企业智能应用的Agent Ready基础设施，构建AI云与Agent三层架构。AgentKit升级提供Identity、Runtime、Sandbox、Evaluation等模块，实现Agent可靠、可控、可衡量。Identity已接入数千家身份体系，Runtime支持长程任务和分钟级12万沙箱并发。ArkClaw企业版集成Agent广场、技能中心与企业知识库，支持IDP/SSO/OAuth及飞书、钉钉等IM入口统一管控。实践案例：海底捞门店经营Agent将小时级工作压缩到分钟级，人工跟进时长缩减70%，巡检满意度提升50%；创维酷开借助ArkClaw终端版打造AIOS，Token消耗节省50%，支撑百万级终端。", "category": "ai-products", "score": 66, "selected": true}, {"id": "cmqrrgnay0n08slp5phvdk394", "title": "DFlash：块扩散草稿模型实现最高15倍吞吐量提升", "title_en": "DFlash Speculative Decoding Drafts Whole Token Blocks in Parallel for Up to 15x Higher Throughput on NVIDIA Blackwell", "url": "https://www.marktechpost.com/2026/06/24/dflash-speculative-decoding-drafts-whole-token-blocks-in-parallel-for-up-to-15x-higher-throughput-on-nvidia-blackwell", "permalink": "https://aihot.virxact.com/items/cmqrrgnay0n08slp5phvdk394", "source": "MarkTechPost（RSS）", "publishedAt": "2026-06-24T07:21:10.000Z", "summary": "DFlash 由 UC San Diego 团队提出，是一种用于投机解码的轻量块扩散草稿模型。它一次前向推理生成整块 token，再由目标模型并行验证，保证输出无损。相比 EAGLE-3，DFlash 实现最高 2.5 倍加速，在 Qwen3-8B 等多种模型上平均无损加速超过 6 倍（MATH-500 达 6.08×）。在 NVIDIA Blackwell 上（TensorRT-LLM），gpt-oss-120b 模型吞吐量提升最高 15 倍，约为 EAGLE-3 的 1.5 倍。核心创新是将目标模型多层隐藏特征注入草稿模型每一层的 Key-Value 投影，使接受长度随草稿深度增长。", "category": "paper", "score": 74, "selected": true}, {"id": "cmqrqhlvx0mr7slp5atv7dptr", "title": "MiniCPM-V 4.6 在 Apple Core AI 上高速运行", "title_en": "🥳Thanks for sharing this， @MLBoy_DaisukeMajima 🚀 MiniCPM-V 4.6 running at this speed on-device is …", "url": "https://x.com/OpenBMB/status/2069676334381728106", "permalink": "https://aihot.virxact.com/items/cmqrqhlvx0mr7slp5atv7dptr", "source": "X：面壁智能 OpenBMB (@OpenBMB)", "publishedAt": "2026-06-24T06:57:45.000Z", "summary": "🥳感谢分享，@MLBoy_DaisukeMajima 🚀\nMiniCPM-V 4.6 在设备上以这样的速度运行，实在令人印象深刻--尤其是在 Apple Core AI 上以不到 2B 参数跑出。\n干得漂亮，推动高效多模态 AI 向前发展。🫡", "category": "tip", "score": 65, "selected": true}, {"id": "cmqs319vw0qkcslp52gzwr77q", "title": "OpenAI 与 Broadcom 联合发布 LLM 推理芯片 Jalapeño", "title_en": "OpenAI and Broadcom unveil LLM-optimized inference chip", "url": "https://openai.com/index/openai-broadcom-jalapeno-inference-chip", "permalink": "https://aihot.virxact.com/items/cmqs319vw0qkcslp52gzwr77q", "source": "OpenAI：官网动态（RSS · 排除企业/客户案例）", "publishedAt": "2026-06-24T06:00:00.000Z", "summary": "OpenAI 与 Broadcom 发布首款自研推理加速器 Jalapeño，专为当前及未来 LLM 从头设计。早期测试显示，其性能功耗比大幅优于现有 SOTA。工程样片已在实验室以目标频率和功耗运行 GPT-5.3-Codex-Spark 等负载。芯片从设计到流片仅用 9 个月，并利用 OpenAI 模型加速部分流程。OpenAI 计划从 2026 年起与 Microsoft 等合作伙伴部署千兆瓦级数据中心，推出多代计算平台。", "category": "ai-products", "score": 61, "selected": true}, {"id": "cmqrl73460l9gslp5w33pryqi", "title": "OpenAI ChatGPT 语音最大规模升级：双向AI语音模型 Bidi 1 已上线测试", "title_en": "OpenAI ChatGPT 语音最大规模升级：双向 AI 语音模型 Bidi 1 已上线测试", "url": "https://www.ithome.com/0/967/852.htm", "permalink": "https://aihot.virxact.com/items/cmqrl73460l9gslp5w33pryqi", "source": "IT之家（RSS）", "publishedAt": "2026-06-24T04:34:24.000Z", "summary": "6月23日，部分用户反馈 ChatGPT 网页版和 App 版上线了双向 AI 语音模型 Bidi 1，位于设置模型选择器中，与标准语音和高级语音并列。该模型支持边说话边监听，用户可在对话中途打断并发出新指令，例如要求从1数到10时中途喊停倒数，模型会立即切换执行。OpenAI 尚未官宣，预计本周启动更大范围测试。", "category": "ai-models", "score": 74, "selected": true}, {"id": "cmqrdmylf0iyeslp50lteppvq", "title": "今天，豆包正式推出专业版", "title_en": null, "url": "https://mp.weixin.qq.com/s/Sb-NMXTrWFQES1EDO_Gr2g", "permalink": "https://aihot.virxact.com/items/cmqrdmylf0iyeslp50lteppvq", "source": "公众号：豆包（字节）", "publishedAt": "2026-06-24T01:00:00.000Z", "summary": "豆包专业版基于豆包2.1系列大模型上线，面向复杂办公与生产力场景。办公任务模式接入可执行Agent任务的豆包2.1模型，支持操作本地电脑、浏览器、调用Skills技能、定时任务，内置Office办公套件，并可生成带后端数据库的在线应用。免费用户可体验豆包2.1 Turbo版办公任务模式，专业版接入豆包2.1 Pro模型。定价：标准套餐68元/月（连续包月），加强套餐200元/月，高级套餐500元/月。大学生认证后标准套餐38元/月，持续6个月。", "category": "ai-products", "score": 77, "selected": true}, {"id": "cmqsxg0qe0764slfui5djtfyx", "title": "Causal-rCM：自回归视频扩散蒸馏的统一教师强制与自强制开源方案", "title_en": "Causal-rCM： A Unified Teacher-Forcing and Self-Forcing Open Recipe for Autoregressive Diffusion Distillation in Streaming Video Generation and Interactive World Models", "url": "https://arxiv.org/abs/2606.25473", "permalink": "https://aihot.virxact.com/items/cmqsxg0qe0764slfui5djtfyx", "source": "HuggingFace Daily Papers（社区热门论文）", "publishedAt": "2026-06-24T00:00:00.000Z", "summary": "Causal-rCM将扩散蒸馏框架rCM扩展至自回归视频扩散，提出教师强制（TF）与自强制（SF）互补训练范式，并发布统一开源算法与基础设施。通过自定义掩码FlashAttention-2 JVP内核，首次实现基于教师强制的连续时间一致性模型（sCM/MeanFlow）用于自回归视频扩散，收敛速度比离散时间版本快10倍。蒸馏后的2步因果Wan2.1-1.3B模型在仅1或2步采样下取得VBench-T2V分数84.63，仅使用合成数据即达到帧级和块级流式视频生成SOTA。该方法还应用于Cosmos 3全模态世界基础模型，实现动作条件生成的交互式世界模型。", "category": "paper", "score": 70, "selected": true}, {"id": "cmqs9yjcy0188slfu7cf8old7", "title": "FFASR 排行榜发布：真实远场条件下 ASR 评测", "title_en": "Introducing the FFASR Leaderboard： Benchmarking ASR in the Real World", "url": "https://huggingface.co/blog/ffasr-leaderboard", "permalink": "https://aihot.virxact.com/items/cmqs9yjcy0188slfu7cf8old7", "source": "Hugging Face：Blog（RSS）", "publishedAt": "2026-06-24T00:00:00.000Z", "summary": "Treble Technologies 与 Hugging Face 联合推出 FFASR（Far-Field ASR）排行榜，这是首个开源社区驱动的真实远场声学条件 ASR 评测基准。传统近场评测无法反映混响、背景噪声和麦克风距离带来的性能下降。FFASR 使用混合波模拟引擎生成声学数据，涵盖 14 种房间（20-470 m3）和三个信噪比级别（远场高 SNR >14 dB、中 SNR 8-12 dB、低 SNR <6 dB），加上近场干燥条件，共四类条件决定主排名。另有实验室实测/模拟验证轨道和移动声源 beta 版。性能指标同时报告词错误率（WER）和实时因子（RTFx，在 NVIDIA L4 GPU 上评估）。未来将支持多说话人场景、麦克风阵列和回声消除。", "category": "ai-products", "score": 61, "selected": true}, {"id": "cmqr73j5g0h1nslp5g9y52k0v", "title": "AI招聘工具存在种族偏见和系统性排斥；黑人占比26%，亚裔占比15%", "title_en": null, "url": "https://hai.stanford.edu/news/ai-hiring-tools-can-yield-racial-bias-and-systemic-rejection", "permalink": "https://aihot.virxact.com/items/cmqr73j5g0h1nslp5g9y52k0v", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "publishedAt": "2026-06-23T21:48:25.964Z", "summary": "一项覆盖340万人、400万份申请、150家雇主和1700个职位的大规模实地研究发现，AI招聘筛选工具存在显著的种族歧视：26%的黑人申请者和15%的亚裔申请者遭遇算法对其族群的系统性排斥；若AI按推荐率最高群体（通常为白人）标准执行，将有4万份额外申请进入下一轮。多数雇主依赖同一第三方供应商算法，形成\"算法单一文化\"，导致10%提交4份申请者被所有职位拒绝。对比同期未用AI的招聘数据（8.3万份申请、108家财富500强企业），未发现此类模式。研究呼吁对算法招聘进行独立监管。", "category": "paper", "score": 71, "selected": true}, {"id": "cmqr6bnad0gw8slp5xmrffynm", "title": "Runway推出Seedance 4K等三款新模型", "title_en": "Seedance 4K. Seedance Mini. Kling 3.0 Turbo. Available now. The world's best models， in one place. …", "url": "https://x.com/runwayml/status/2069535148450705517", "permalink": "https://aihot.virxact.com/items/cmqr6bnad0gw8slp5xmrffynm", "source": "X：Runway (@runwayml)", "publishedAt": "2026-06-23T21:36:44.000Z", "summary": "Seedance 4K。Seedance Mini。Kling 3.0 Turbo。现已推出。\n全球最佳模型，汇聚一处。\n\n使用优惠码 30RUNWAY，前三个月可享七折优惠。\n\n通过下方链接开始使用。", "category": "ai-products", "score": 72, "selected": true}, {"id": "cmqr4zhkm0gidslp5x8ow892r", "title": "Oracle因AI应用裁员21000人，债务驱动云基础设施投资", "title_en": "Oracle's 21，000 layoffs help drive its debt-fueled AI investments", "url": "https://arstechnica.com/ai/2026/06/oracles-21000-layoffs-help-drive-its-debt-fueled-ai-investments", "permalink": "https://aihot.virxact.com/items/cmqr4zhkm0gidslp5x8ow892r", "source": "Ars Technica：AI（RSS）", "publishedAt": "2026-06-23T20:17:38.000Z", "summary": "Oracle在截至5月31日的财年裁员21000人，员工总数降至141，000人，降幅12.9%。公司称AI技术的采用导致劳动力缩减，同时重组成本达18亿美元，同比增长481%。Oracle计划2026年通过债务和股权筹集450至500亿美元，扩建Oracle Cloud Infrastructure，服务OpenAI、xAI、AMD、Nvidia、Meta等客户。公司债务超1200亿美元。分析人士指出裁员有助于改善现金流，但Oracle也承认大规模裁员可能带来生产力下降、人才短缺和员工士气受损等风险。", "category": "industry", "score": 76, "selected": true}, {"id": "cmqr15pz20fjzslp5eps5gotw", "title": "FastWan-QAD：单卡5090上1.8秒生成5秒视频", "title_en": "（1/5） 5 seconds of video. 1.8s seconds of generation. One NVIDIA GeForce RTX 5090 on FastVideo. 🤯🚀…", "url": "https://x.com/haoailab/status/2069493820732170695", "permalink": "https://aihot.virxact.com/items/cmqr15pz20fjzslp5eps5gotw", "source": "X：Sky Computing Lab (@haoailab)", "publishedAt": "2026-06-23T18:52:30.000Z", "summary": "Sky Computing Lab 发布 FastWan-QAD 视频生成模型系列，基于 FastVideo 的量化感知蒸馏（QAD）方案训练。在单张 NVIDIA GeForce RTX 5090 上，端到端生成一段 5 秒 480P 视频仅需 1.8 秒。模型、代码及博客已开源。", "category": "ai-models", "score": 73, "selected": true}, {"id": "cmqqxfykz0ehkslp55nlmaje0", "title": "Krea 2 技术报告正式发布", "title_en": "our technical report is out. deep dive on the data， architecture， and training techniques used to c…", "url": "https://x.com/krea_ai/status/2069473417804591191", "permalink": "https://aihot.virxact.com/items/cmqqxfykz0ehkslp55nlmaje0", "source": "X：Krea AI (@krea_ai)", "publishedAt": "2026-06-23T17:31:26.000Z", "summary": "我们的技术报告已发布。\n\n深入解析创建 Krea 2 所用的数据、架构及训练技巧。\n\nhttps：//www.krea.ai/blog/krea-2-technical-report", "category": "ai-models", "score": 71, "selected": true}, {"id": "cmqsbr8l701ndslfubzp0hnmi", "title": "思考即回忆：推理如何解锁LLM中的参数化知识", "title_en": "Thinking to recall： How reasoning unlocks parametric knowledge in LLMs", "url": "https://research.google/blog/thinking-to-recall-how-reasoning-unlocks-parametric-knowledge-in-llms", "permalink": "https://aihot.virxact.com/items/cmqsbr8l701ndslfubzp0hnmi", "source": "Google Research：Blog（网页）", "publishedAt": "2026-06-23T16:00:00.000Z", "summary": "Google Research研究发现，推理（chain-of-thought）能帮助大语言模型（LLM）回忆简单事实，即使这些事实无需复杂推导。在Gemini-2.5 Flash和Pro以及Qwen3-32B上，启用推理后模型能够回答原本无法直接回答的简单问题，pass@k显示正确事实存在于输出分布中。该现象由两个机制驱动：一是生成的推理token充当计算缓冲，允许模型进行隐藏计算以提取参数化知识；二是推理过程中产生的相关事实起到启动效应（factual priming），帮助模型激活正确答案。", "category": "paper", "score": 69, "selected": true}], "sections": [{"label": "模型发布/更新", "slug": "ai-models", "count": 5, "items": [{"idx": 1, "title": "Ornith-1.0 开源模型家族发布，专注 Agentic Coding 全参数规模", "summary": "Ornith-1.0 开源模型家族发布，专注智能体编程（Agentic Coding），覆盖 9B Dense、31B Dense、35B MoE 及 397B MoE 全参数规模。在 Agent Coding 基准上达开源顶尖：SWE-Bench Verified 82.4、SWE-Bench Pro 62.2、Terminal-Bench 2.1 77.5、NL2Repo 48.2、SWE Atlas 41.2 QnA、ClawEval 77.1。基于 gemma4 和 qwen3.5 后训练，采用强化学习联合优化任务脚手架（scaffold）与最终解决方案，让模型自主改进执行框架。全系列 MIT 开源，提供 GGUF 版本，支持 Ollama、Unsloth 等本地运行。", "publishedAt": "2026-06-25T15:30:41.000Z", "category": "ai-models", "sourceName": "X：Berry Xia (@berryxia)", "sourceUrl": "https://x.com/berryxia/status/2070167806700908957"}, {"idx": 2, "title": "GPT-5.5 Instant 新版本，对话更有趣", "summary": "我们为你带来了新版 GPT-5.5 Instant，它现在聊起天来有趣多了。\n\n我们最常用的模型现在能更好地理解问题背后的意图，并相应地调整回应。\n\n它也能更可靠地处理复杂约束，让购物和本地推荐更加实用和连贯。\n\n今天向付费用户推送，明天向免费用户推送。", "publishedAt": "2026-06-24T18:00:21.000Z", "category": "ai-models", "sourceName": "X：OpenAI (@OpenAI)", "sourceUrl": "https://x.com/OpenAI/status/2069843083701915755"}, {"idx": 3, "title": "OpenAI ChatGPT 语音最大规模升级：双向AI语音模型 Bidi 1 已上线测试", "summary": "6月23日，部分用户反馈 ChatGPT 网页版和 App 版上线了双向 AI 语音模型 Bidi 1，位于设置模型选择器中，与标准语音和高级语音并列。该模型支持边说话边监听，用户可在对话中途打断并发出新指令，例如要求从1数到10时中途喊停倒数，模型会立即切换执行。OpenAI 尚未官宣，预计本周启动更大范围测试。", "publishedAt": "2026-06-24T04:34:24.000Z", "category": "ai-models", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/967/852.htm"}, {"idx": 4, "title": "FastWan-QAD：单卡5090上1.8秒生成5秒视频", "summary": "Sky Computing Lab 发布 FastWan-QAD 视频生成模型系列，基于 FastVideo 的量化感知蒸馏（QAD）方案训练。在单张 NVIDIA GeForce RTX 5090 上，端到端生成一段 5 秒 480P 视频仅需 1.8 秒。模型、代码及博客已开源。", "publishedAt": "2026-06-23T18:52:30.000Z", "category": "ai-models", "sourceName": "X：Sky Computing Lab (@haoailab)", "sourceUrl": "https://x.com/haoailab/status/2069493820732170695"}, {"idx": 5, "title": "Krea 2 技术报告正式发布", "summary": "我们的技术报告已发布。\n\n深入解析创建 Krea 2 所用的数据、架构及训练技巧。\n\nhttps：//www.krea.ai/blog/krea-2-technical-report", "publishedAt": "2026-06-23T17:31:26.000Z", "category": "ai-models", "sourceName": "X：Krea AI (@krea_ai)", "sourceUrl": "https://x.com/krea_ai/status/2069473417804591191"}]}, {"label": "产品发布/更新", "slug": "ai-products", "count": 19, "items": [{"idx": 6, "title": "Claude Code v2.1.193 发布", "summary": "Claude Code v2.1.193 新增 `autoMode.classifyAllShell` 设置，将全部 Bash/PowerShell 命令经自动模式分类器处理。自动模式拒绝原因现加入转录、拒绝提示及 `/permissions` 页面。新增 `claude_code.assistant_response` OpenTelemetry 日志事件（默认不记录，需设置 `OTEL_LOG_ASSISTANT_RESPONSES=1`）。Bash 模式支持实时文件路径自动补全；MCP 服务器需认证时显示启动提示。新增空闲后台 shell 命令自动内存压力回收（可禁用）。修复 `/model` UI 状态滞后、后台任务误取消、子 agent 隐藏同级等问题，并改进了后台 agent 启动指令、MCP 认证重连、插件自动重命名等行为。", "publishedAt": "2026-06-25T21:45:57.000Z", "category": "ai-products", "sourceName": "Claude Code：GitHub Releases（RSS）", "sourceUrl": "https://github.com/anthropics/claude-code/releases/tag/v2.1.193"}, {"idx": 7, "title": "Codex 在 ChatGPT 移动 App 正式可用", "summary": "OpenAI 宣布 Codex 在 ChatGPT 移动应用中正式开放（GA），并新增一对一设备配对实现更安全的手机与电脑连接。移动端新增通知、目标、侧边聊天、文件预览及内联审阅评论功能。此前预览版已明确，用户可通过 ChatGPT 移动 App 启动新工作、审查输出、引导执行和批准下一步，而 Codex 实际继续在笔记本、Mac mini 或开发机上后台运行。", "publishedAt": "2026-06-25T21:15:18.000Z", "category": "ai-products", "sourceName": "X：OpenAI Developers (@OpenAIDevs)", "sourceUrl": "https://x.com/OpenAIDevs/status/2070254532911882707"}, {"idx": 8, "title": "Midjourney 预览 V8.2 并加速草稿模式", "summary": "Midjourney 带来两项更新。一是加入 `--preview` 参数可提前体验 V8.2 的美学与个性化效果；二是此前在 V8.1 推出的大批量草稿模式（生成 24 张低分辨率图，价格仅为标准 4 张的一半，点击 \"Vary\" 可升级为全分辨率）现在支持搭配 `--sref random` 使用，探索风格空间的速度比之前快 24 倍。", "publishedAt": "2026-06-25T19:11:05.000Z", "category": "ai-products", "sourceName": "X：Midjourney (@midjourney)", "sourceUrl": "https://x.com/midjourney/status/2070223272072065228"}, {"idx": 9, "title": "Midjourney V8.1 草稿模式新增随机风格功能", "summary": "Midjourney V8.1 的草稿模式（draft mode）添加了随机风格功能。用户在提示词中加入 `--sref random` 即可一键生成 24 张不同风格的图片。开启草稿模式可通过点击提示栏的 ⚡ 图标或添加 `--draft` 参数。", "publishedAt": "2026-06-25T18:50:16.000Z", "category": "ai-products", "sourceName": "Midjourney：Updates（RSS）", "sourceUrl": "https://updates.midjourney.com/random-styles-in-draft-mode"}, {"idx": 10, "title": "Runway发布Agent 2.0", "summary": "Runway发布Agent 2.0，帮助营销人员创建、测试和优化广告、视频及营销活动。品牌营销人员可在对话中开发活动概念、生成变体并自动本地化；绩效营销人员可上传创意并导入Meta、YouTube、TikTok或Google广告数据，由Agent分析后生成下一轮待测广告。社交媒体营销人员可一次性生成一周内容，自动裁切为9：16、16：9、1：1等格式；产品营销人员可借助Agent确定定位角度并构建活动资产。Agent 2.0面向所有用户开放。", "publishedAt": "2026-06-25T18:41:58.502Z", "category": "ai-products", "sourceName": "Runway：News（网页）", "sourceUrl": "https://runwayml.com/news/introducing-agent-2"}, {"idx": 11, "title": "Google Finance 全新 Android 应用与投资组合功能上线", "summary": "本周，Google Finance 推出正式版 Android 应用，同步上线全球投资组合跟踪功能。用户可通过截图、CSV/PDF 上传或文字描述创建组合，并利用 AI 研究工具提问资产配置、固定收益影响等问题。新增市场情报简报功能：用户设定任务（如每日盘前简报），后台自动生成并推送至 Google 应用（Android/iOS）及网页端。Android 应用包含 watchlist、实时数据、金融新闻 feed、AI 研究工具及 AI 驱动的\"关键时刻\"解释股价波动。未来数月将把更多 web 功能（如财报电话、投资组合与任务）迁移至移动端，今年晚些推出 iOS 应用。", "publishedAt": "2026-06-25T16:00:00.000Z", "category": "ai-products", "sourceName": "Google Blog：AI（RSS）", "sourceUrl": "https://blog.google/products-and-platforms/products/search/google-finance-updates-june-2026"}, {"idx": 12, "title": "美团 LongCat 开源 VitaBench 2.0：长期动态智能体基准新标杆", "summary": "美团 LongCat 团队推出 VitaBench 2.0，首个真实生活场景下针对长期动态用户建模的智能体评测基准。包含56名拟真用户、819个复杂任务、超2000个动态偏好及66个可执行工具，每位用户平均2093个交互事件，时间跨度平均1580天。同时支持长文本上下文学习和智能体记忆策略评测。测试显示，最强模型 Claude-Opus-4.6 在\"开卷\"模式下平均分刚过0.5；开启思考模式并不总能提升个性化任务表现；所有模型在需要主动提问的任务上得分断崖式下跌。VitaBench 2.0 已开源。", "publishedAt": "2026-06-25T11:58:00.000Z", "category": "ai-products", "sourceName": "公众号：龙猫LongCat（美团）", "sourceUrl": "https://mp.weixin.qq.com/s/HoiUxYnyJuh2_xdxmg8s8Q"}, {"idx": 13, "title": "OpenRouter MCP 服务器发布", "summary": "OpenRouter 推出 MCP 服务器，为编程智能体提供实时模型数据、基准排名、定价和文档查询。开发者通过一键安装（支持 Claude Code、Codex CLI、Cursor 等客户端），即可在编辑器内完成模型筛选、价格对比和测试推理，无需切换标签页。服务器整合 Artificial Analysis、Design Arena 及 OpenRouter 自身排名数据，例如推荐 GLM-5.2 作为性价比最佳的编码模型。工具集包括 models-list、model-get、model-endpoints、benchmarks 等，支持通过 chat-send 发送测试提示，比较不同模型（如 Claude Opus 4.8、GPT-5.5、DeepSeek V4 Pro）的响应、成本和延迟。API 密钥附带 7 天有效期和 10 美元消费上限，可随时撤销。", "publishedAt": "2026-06-25T00:00:00.000Z", "category": "ai-products", "sourceName": "OpenRouter：Announcements（RSS）", "sourceUrl": "https://openrouter.ai/blog/announcements/openrouter-mcp-server"}, {"idx": 14, "title": "盈透证券（Interactive Brokers）与 Grok 集成：组合分析、情景建模与实时交易指令生成", "summary": "盈透证券（Interactive Brokers）近日与 Grok 集成，用户可在几分钟内免费关联现有账户，无需注册新账户。通过自然语言与 Grok 对话，可完成组合收益分析（如股息与利息预测）、行业/地区/经济事件的风险敞口情景建模、市场趋势研究，并直接生成对冲订单等实时交易指令，实现从数据洞察到执行决策的一体化。", "publishedAt": "2026-06-25T00:00:00.000Z", "category": "ai-products", "sourceName": "xAI：News（网页）", "sourceUrl": "https://x.ai/news/grok-interactive-brokers"}, {"idx": 15, "title": "Notion 使用 Cursor SDK 嵌入编码智能体", "summary": "Notion 通过 Cursor SDK 在数周内将编码智能体嵌入产品。用户可在文档中@Cursor、在讨论串中提及或向数据库指派任务，Cursor 即可端到端完成规划、构建、测试、验证并自动创建 PR。集成基于一套 Provider 无关的智能体框架，Notion 的讨论串对应一个 Cursor 智能体，每条消息对应一次智能体运行；结果通过 SSE 流式传输，支持断连恢复。Cursor SDK 提供与生产环境相同的模型、运行时和远程 MCP 支持，让 Notion 无需自建智能体基础设施即可获得完整栈编码能力。用户还可自定义模板、MCP 服务器、技能和子智能体，并设置自动触发规则。", "publishedAt": "2026-06-24T20:55:19.799Z", "category": "ai-products", "sourceName": "Cursor Blog", "sourceUrl": "https://cursor.com/blog/notion"}, {"idx": 16, "title": "Perplexity推出Computer for Counsel", "summary": "推出 Computer for Counsel。\n\nComputer 现在连接了律师日常使用的研究数据库、文档工具和案件管理系统。可从中提取可引用来源：@midpageAI、@LegalZoom、@Docusign、@netdocuments 等。\n\n所有 Pro 和 Max 订阅用户均可使用。", "publishedAt": "2026-06-24T19:34:04.000Z", "category": "ai-products", "sourceName": "X：Perplexity (@perplexity_ai)", "sourceUrl": "https://x.com/perplexity_ai/status/2069866668671766804"}, {"idx": 17, "title": "Figma在Config 2026押注人类判断，画布AI能力却来自第三方", "summary": "Figma在Config 2026将设计画布扩展至代码、动画、3D深度和着色器效果，并集成去年收购的Weave工作流系统。新功能包括Code Layers（代码与设计并存）、Motion动画、深度层、Shader及Generative Plugins。协作方面，团队可搜索复用AI提示词、保存工作流为技能、共享插件。Figma的AI功能依赖Anthropic、OpenAI和Google等外部模型，推理成本挤压利润率。同时，Anthropic等公司的竞争产品可直接生成界面，构成威胁。", "publishedAt": "2026-06-24T16:49:01.000Z", "category": "ai-products", "sourceName": "The Decoder：AI News（RSS）", "sourceUrl": "https://the-decoder.com/figma-bets-on-human-judgment-at-config-2026-while-the-ai-powering-its-canvas-belongs-to-someone-else"}, {"idx": 18, "title": "Gemini 3.5 Flash 引入 computer use 功能", "summary": "Google DeepMind 宣布，computer use 现作为内置工具集成于 Gemini 3.5 Flash，开发者可构建跨浏览器、移动端和桌面的智能体，实现视觉感知、推理与操作。此前该功能仅以独立模型形式存在于 Gemini 2.5。3.5 Flash 已支持函数调用及 Search、Maps 等内置工具，新增的 computer use 可提升持续软件测试和跨专业应用知识工作等长周期企业自动化任务的性能。安全方面采用针对性对抗训练，并可选配两项企业防护系统：要求用户确认敏感操作，以及在检测到间接 prompt 注入时自动停止任务。可通过 Gemini API 和 Gemini Enterprise Agent Platform 使用。", "publishedAt": "2026-06-24T16:30:01.000Z", "category": "ai-products", "sourceName": "Google DeepMind：Blog（RSS）", "sourceUrl": "https://deepmind.google/blog/introducing-computer-use-in-gemini-3-5-flash"}, {"idx": 19, "title": "Mistral AI 为 Connectors 推出多项安全与可控新能力", "summary": "2026年6月24日，Mistral AI 发布 Connectors 多项新能力：Enriched admin controls（GA）支持按工作空间设置连接器访问权限并单独开关工具；API keys with connector scopes（GA）防止自动化 AI 工作负载中身份冒充；Multi-account connectors（GA）允许单个连接器绑定多个账户；Connectors Debugger（公开预览）对 MCP 连接器进行端到端根因分析；Connectors in Vibe Code（GA）和 Connectors in Workflows（公开预览）分别允许在开发者界面复用连接器及支持长时间运行任务不中断。", "publishedAt": "2026-06-24T15:59:47.708Z", "category": "ai-products", "sourceName": "Mistral AI：News（网页）", "sourceUrl": "https://mistral.ai/news/more-control-over-connectors"}, {"idx": 20, "title": "火山引擎推出Agent Ready基础设施，AgentKit与ArkClaw企业版升级", "summary": "火山引擎在FORCE大会推出面向企业智能应用的Agent Ready基础设施，构建AI云与Agent三层架构。AgentKit升级提供Identity、Runtime、Sandbox、Evaluation等模块，实现Agent可靠、可控、可衡量。Identity已接入数千家身份体系，Runtime支持长程任务和分钟级12万沙箱并发。ArkClaw企业版集成Agent广场、技能中心与企业知识库，支持IDP/SSO/OAuth及飞书、钉钉等IM入口统一管控。实践案例：海底捞门店经营Agent将小时级工作压缩到分钟级，人工跟进时长缩减70%，巡检满意度提升50%；创维酷开借助ArkClaw终端版打造AIOS，Token消耗节省50%，支撑百万级终端。", "publishedAt": "2026-06-24T10:17:58.000Z", "category": "ai-products", "sourceName": "公众号：火山引擎", "sourceUrl": "https://mp.weixin.qq.com/s/83mrPAPgQRKhxLkoSvRgBQ"}, {"idx": 21, "title": "OpenAI 与 Broadcom 联合发布 LLM 推理芯片 Jalapeño", "summary": "OpenAI 与 Broadcom 发布首款自研推理加速器 Jalapeño，专为当前及未来 LLM 从头设计。早期测试显示，其性能功耗比大幅优于现有 SOTA。工程样片已在实验室以目标频率和功耗运行 GPT-5.3-Codex-Spark 等负载。芯片从设计到流片仅用 9 个月，并利用 OpenAI 模型加速部分流程。OpenAI 计划从 2026 年起与 Microsoft 等合作伙伴部署千兆瓦级数据中心，推出多代计算平台。", "publishedAt": "2026-06-24T06:00:00.000Z", "category": "ai-products", "sourceName": "OpenAI：官网动态（RSS · 排除企业/客户案例）", "sourceUrl": "https://openai.com/index/openai-broadcom-jalapeno-inference-chip"}, {"idx": 22, "title": "今天，豆包正式推出专业版", "summary": "豆包专业版基于豆包2.1系列大模型上线，面向复杂办公与生产力场景。办公任务模式接入可执行Agent任务的豆包2.1模型，支持操作本地电脑、浏览器、调用Skills技能、定时任务，内置Office办公套件，并可生成带后端数据库的在线应用。免费用户可体验豆包2.1 Turbo版办公任务模式，专业版接入豆包2.1 Pro模型。定价：标准套餐68元/月（连续包月），加强套餐200元/月，高级套餐500元/月。大学生认证后标准套餐38元/月，持续6个月。", "publishedAt": "2026-06-24T01:00:00.000Z", "category": "ai-products", "sourceName": "公众号：豆包（字节）", "sourceUrl": "https://mp.weixin.qq.com/s/Sb-NMXTrWFQES1EDO_Gr2g"}, {"idx": 23, "title": "FFASR 排行榜发布：真实远场条件下 ASR 评测", "summary": "Treble Technologies 与 Hugging Face 联合推出 FFASR（Far-Field ASR）排行榜，这是首个开源社区驱动的真实远场声学条件 ASR 评测基准。传统近场评测无法反映混响、背景噪声和麦克风距离带来的性能下降。FFASR 使用混合波模拟引擎生成声学数据，涵盖 14 种房间（20-470 m3）和三个信噪比级别（远场高 SNR >14 dB、中 SNR 8-12 dB、低 SNR <6 dB），加上近场干燥条件，共四类条件决定主排名。另有实验室实测/模拟验证轨道和移动声源 beta 版。性能指标同时报告词错误率（WER）和实时因子（RTFx，在 NVIDIA L4 GPU 上评估）。未来将支持多说话人场景、麦克风阵列和回声消除。", "publishedAt": "2026-06-24T00:00:00.000Z", "category": "ai-products", "sourceName": "Hugging Face：Blog（RSS）", "sourceUrl": "https://huggingface.co/blog/ffasr-leaderboard"}, {"idx": 24, "title": "Runway推出Seedance 4K等三款新模型", "summary": "Seedance 4K。Seedance Mini。Kling 3.0 Turbo。现已推出。\n全球最佳模型，汇聚一处。\n\n使用优惠码 30RUNWAY，前三个月可享七折优惠。\n\n通过下方链接开始使用。", "publishedAt": "2026-06-23T21:36:44.000Z", "category": "ai-products", "sourceName": "X：Runway (@runwayml)", "sourceUrl": "https://x.com/runwayml/status/2069535148450705517"}]}, {"label": "行业动态", "slug": "industry", "count": 8, "items": [{"idx": 25, "title": "小鹏 CEO 何小鹏：2026 年底自动驾驶可以合法进入全球", "summary": "小鹏汽车 CEO 何小鹏微博透露，VLA 2.0 走向全球进入确定模式。联合国 WP29 缔约国会议批准了 DCAS UNR 171 series 02（对应城区 NGP 法规）与 UNR ADS（对应 L3-L5 自动驾驶法规）。DCAS 将在六个月后成为欧盟强制法规，即 2026 年底自动驾驶可合法进入全球；UNR ADS 为框架性法规，加速 L4 级 Robotaxi 落地。何小鹏称 2027 年海外小鹏汽车将搭载 VLA 和 VLM，支持中英文混合语音对话。", "publishedAt": "2026-06-26T05:40:52.000Z", "category": "industry", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/968/894.htm"}, {"idx": 26, "title": "近400家美国报纸起诉微软和OpenAI：未经授权抓取新闻内容训练AI", "summary": "代表近400家纸媒的出版商联盟向美国纽约南区联邦地区法院起诉微软和OpenAI，指控其未经授权抓取新闻内容用于训练Copilot、ChatGPT等AI模型，侵犯版权并触犯《数字千年版权法》。起诉书称被告\"系统性且秘密地\"爬取网站，复制文章并删除版权管理信息。原告表示AI产品基于其内容创造数十亿美元价值，但出版商分文未得，称此举或成地方新闻业\"丧钟\"。OpenAI回应训练数据基于公开可获取内容且符合合理使用原则，微软未置评。", "publishedAt": "2026-06-26T04:37:58.000Z", "category": "industry", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/968/872.htm"}, {"idx": 27, "title": "美国政府要求OpenAI暂缓GPT-5.6广泛发布", "summary": "The Information 报道，美国政府因安全顾虑要求 OpenAI 暂缓 GPT-5.6 的广泛发布，改为推出受控预览版。OpenAI 计划先向小部分合作伙伴提供早期访问，并由政府逐客户审批准入。这一非常规做法主要担忧模型在自动化高技能网络工作上的能力：既能帮防御者更快发现漏洞，也可能被攻击者用于加速测试漏洞利用。本周四，CEO Sam Altman 已向员工确认该审批流程。", "publishedAt": "2026-06-25T21:06:58.000Z", "category": "industry", "sourceName": "X：Rohan Paul (@rohanpaul_ai)", "sourceUrl": "https://x.com/rohanpaul_ai/status/2070252433109049466"}, {"idx": 28, "title": "General Intuition 完成 3.2 亿美元融资，用游戏数据训练通用 AI 智能体", "summary": "General Intuition 以 23 亿美元估值完成 3.2 亿美元融资，累计披露融资 4.54 亿美元。公司从旗下游戏剪辑平台 Medal 获取数亿小时含精确按键动作标签的游戏操作数据，训练单一模型同时驾驭 Fortnite 等虚拟环境和四足机器人。演示中，AI 智能体在游戏中连续运行 100 小时，机器人仅靠 8 分钟真实街道数据微调即可自主探索办公室。本轮由 Khosla Ventures 领投，General Catalyst、Jeff Bezos、Eric Schmidt 等参投。资金将用于通过 CoreWeave 扩大计算规模、预训练下一代模型，计划夏末前开放 API。", "publishedAt": "2026-06-25T16:00:00.000Z", "category": "industry", "sourceName": "TechCrunch：AI（RSS）", "sourceUrl": "https://techcrunch.com/2026/06/25/from-fortnite-to-robots-general-intuitions-2-3b-bet-that-video-games-can-train-ai-agents-for-the-real-world"}, {"idx": 29, "title": "Meta员工警告AI内容审核部署过快", "summary": "Meta在2025年已用大语言模型替换约一半人工审核请求，计划年底前将部分内容类型的AI审核比例提升至90%以上，每年节省数十亿美元。Meta否认成本动机，称自3月测试显示其模型错误率比人类低13%，且多捕捉10%违规。但员工指出模型仍会移除或限流无害内容，缺乏足够监督，快速部署已导致外包裁员。此外，Meta已从使用Google Gemini转向自家新基础模型Muse Spark，该模型基于人工审核员的历史决策训练。", "publishedAt": "2026-06-25T10:07:19.000Z", "category": "industry", "sourceName": "The Decoder：AI News（RSS）", "sourceUrl": "https://the-decoder.com/meta-employees-warn-ai-moderation-rollout-is-too-fast"}, {"idx": 30, "title": "Anthropic称阿里巴巴非法获取了Claude AI模型的功能", "summary": "Anthropic指控阿里巴巴未经授权提取了其Claude AI模型的能力。该指控基于Anthropic的调查，认为阿里巴巴通过逆向工程或其他手段复制了Claude的核心技术。目前阿里巴巴尚未公开回应。", "publishedAt": "2026-06-25T03:07:48.942Z", "category": "industry", "sourceName": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://www.reuters.com/world/china/anthropic-says-alibaba-illicitly-extracted-claude-ai-model-capabilities-2026-06-24"}, {"idx": 31, "title": "在与Anthropic的纠纷中，NSA失去了对Mythos的访问权限", "summary": "美国国家安全局（NSA）因与人工智能公司Anthropic的纠纷，失去了对Mythos系统的访问权限。", "publishedAt": "2026-06-24T19:08:32.032Z", "category": "industry", "sourceName": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://www.nytimes.com/2026/06/23/us/politics/nsa-lost-access-anthropic-tool.html"}, {"idx": 32, "title": "Oracle因AI应用裁员21000人，债务驱动云基础设施投资", "summary": "Oracle在截至5月31日的财年裁员21000人，员工总数降至141，000人，降幅12.9%。公司称AI技术的采用导致劳动力缩减，同时重组成本达18亿美元，同比增长481%。Oracle计划2026年通过债务和股权筹集450至500亿美元，扩建Oracle Cloud Infrastructure，服务OpenAI、xAI、AMD、Nvidia、Meta等客户。公司债务超1200亿美元。分析人士指出裁员有助于改善现金流，但Oracle也承认大规模裁员可能带来生产力下降、人才短缺和员工士气受损等风险。", "publishedAt": "2026-06-23T20:17:38.000Z", "category": "industry", "sourceName": "Ars Technica：AI（RSS）", "sourceUrl": "https://arstechnica.com/ai/2026/06/oracles-21000-layoffs-help-drive-its-debt-fueled-ai-investments"}]}, {"label": "论文研究", "slug": "paper", "count": 7, "items": [{"idx": 33, "title": "IBM 首度推出亚纳米级芯片技术", "summary": "IBM 于 2026 年 6 月 25 日发布全球首款亚纳米级芯片技术，采用 0.7 nm（7 埃米）节点与全新三维纳米堆叠（nanostack）架构。指甲盖大小的芯片集成近 1000 亿个晶体管，密度约为 IBM 2021 年 2 nm 芯片的两倍。相比 2 nm 芯片，性能最高提升 50%，能效最高提升 70%。纳米堆叠架构还实现 SRAM 面积缩减 40%，有助于支撑先进 AI 工作负载的高带宽需求。该技术已在 VLSI 2026 会议上验证，IBM 预计 5 年内量产。", "publishedAt": "2026-06-25T18:52:05.282Z", "category": "paper", "sourceName": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://newsroom.ibm.com/2026-06-25-ibm-debuts-worlds-first-sub-1-nanometer-chip-technology"}, {"idx": 34, "title": "赫库兰尼姆古卷首次被完整虚拟解读", "summary": "研究人员利用高分辨率X射线显微断层扫描和机器学习，在未物理展开的情况下完整虚拟展开并读取了赫库兰尼姆古卷PHerc.1667（Scroll4）。这是首卷被从头到尾连续读取的纸莎草卷，内容为斯多葛哲学论著，提及克里西普斯的侄子Aristocreon。第二卷PHerc.Paris4通过更高分辨率成像使墨水在三维数据中直接可见，独立确认了2023年大奖赛的解读。第三卷PHerc.139确定标题和作者为菲洛德穆《论诸神》第八卷。所有数据与代码已公开。", "publishedAt": "2026-06-25T18:03:58.685Z", "category": "paper", "sourceName": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://scrollprize.org/firstscroll"}, {"idx": 35, "title": "OpenAI内部报告：智能体Codex如何改变工作", "summary": "OpenAI 在2025年8月至2026年6月间观察到，智能体产品 Codex 取代 ChatGPT 成为主要工作工具，各部门输出 token 中 Codex 占比从不足10%升至99.8%。80.6%个体用户曾发起预计等效人类工作时间超30分钟的请求，70.2%超1小时，25.6%超8小时；99百分位用户每日生成超60小时 agent turns。非开发者用户增长迅猛：个体用户增长137倍，组织用户增长189倍。Legal、Finance、Recruiting 部门在2026年4月前后跨过 Codex 使用过半拐点，平均每位律师或招聘人员超85%输出 token 来自 Codex。", "publishedAt": "2026-06-25T02:00:00.000Z", "category": "paper", "sourceName": "OpenAI：官网动态（RSS · 排除企业/客户案例）", "sourceUrl": "https://openai.com/index/how-agents-are-transforming-work"}, {"idx": 36, "title": "DFlash：块扩散草稿模型实现最高15倍吞吐量提升", "summary": "DFlash 由 UC San Diego 团队提出，是一种用于投机解码的轻量块扩散草稿模型。它一次前向推理生成整块 token，再由目标模型并行验证，保证输出无损。相比 EAGLE-3，DFlash 实现最高 2.5 倍加速，在 Qwen3-8B 等多种模型上平均无损加速超过 6 倍（MATH-500 达 6.08×）。在 NVIDIA Blackwell 上（TensorRT-LLM），gpt-oss-120b 模型吞吐量提升最高 15 倍，约为 EAGLE-3 的 1.5 倍。核心创新是将目标模型多层隐藏特征注入草稿模型每一层的 Key-Value 投影，使接受长度随草稿深度增长。", "publishedAt": "2026-06-24T07:21:10.000Z", "category": "paper", "sourceName": "MarkTechPost（RSS）", "sourceUrl": "https://www.marktechpost.com/2026/06/24/dflash-speculative-decoding-drafts-whole-token-blocks-in-parallel-for-up-to-15x-higher-throughput-on-nvidia-blackwell"}, {"idx": 37, "title": "Causal-rCM：自回归视频扩散蒸馏的统一教师强制与自强制开源方案", "summary": "Causal-rCM将扩散蒸馏框架rCM扩展至自回归视频扩散，提出教师强制（TF）与自强制（SF）互补训练范式，并发布统一开源算法与基础设施。通过自定义掩码FlashAttention-2 JVP内核，首次实现基于教师强制的连续时间一致性模型（sCM/MeanFlow）用于自回归视频扩散，收敛速度比离散时间版本快10倍。蒸馏后的2步因果Wan2.1-1.3B模型在仅1或2步采样下取得VBench-T2V分数84.63，仅使用合成数据即达到帧级和块级流式视频生成SOTA。该方法还应用于Cosmos 3全模态世界基础模型，实现动作条件生成的交互式世界模型。", "publishedAt": "2026-06-24T00:00:00.000Z", "category": "paper", "sourceName": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2606.25473"}, {"idx": 38, "title": "AI招聘工具存在种族偏见和系统性排斥；黑人占比26%，亚裔占比15%", "summary": "一项覆盖340万人、400万份申请、150家雇主和1700个职位的大规模实地研究发现，AI招聘筛选工具存在显著的种族歧视：26%的黑人申请者和15%的亚裔申请者遭遇算法对其族群的系统性排斥；若AI按推荐率最高群体（通常为白人）标准执行，将有4万份额外申请进入下一轮。多数雇主依赖同一第三方供应商算法，形成\"算法单一文化\"，导致10%提交4份申请者被所有职位拒绝。对比同期未用AI的招聘数据（8.3万份申请、108家财富500强企业），未发现此类模式。研究呼吁对算法招聘进行独立监管。", "publishedAt": "2026-06-23T21:48:25.964Z", "category": "paper", "sourceName": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://hai.stanford.edu/news/ai-hiring-tools-can-yield-racial-bias-and-systemic-rejection"}, {"idx": 39, "title": "思考即回忆：推理如何解锁LLM中的参数化知识", "summary": "Google Research研究发现，推理（chain-of-thought）能帮助大语言模型（LLM）回忆简单事实，即使这些事实无需复杂推导。在Gemini-2.5 Flash和Pro以及Qwen3-32B上，启用推理后模型能够回答原本无法直接回答的简单问题，pass@k显示正确事实存在于输出分布中。该现象由两个机制驱动：一是生成的推理token充当计算缓冲，允许模型进行隐藏计算以提取参数化知识；二是推理过程中产生的相关事实起到启动效应（factual priming），帮助模型激活正确答案。", "publishedAt": "2026-06-23T16:00:00.000Z", "category": "paper", "sourceName": "Google Research：Blog（网页）", "sourceUrl": "https://research.google/blog/thinking-to-recall-how-reasoning-unlocks-parametric-knowledge-in-llms"}]}, {"label": "技巧与观点", "slug": "tip", "count": 11, "items": [{"idx": 40, "title": "Claude Code 6个实用Hook玩法", "summary": "Claude Code 内置近30个Hook事件（年初仅13个），本质是写死的规则脚本，运行时不消耗token。6个实用玩法：权限弹窗提醒、开机日程播报（问候+天气+飞书日程）、上下文预压缩时自动生成摘要卡片、结合Skill自动整理下载文件夹、启动后每小时久坐提醒、通过Bark实现手机/手表任务完成/失败推送。让AI从被动聊天框变为事件驱动的自动化系统。", "publishedAt": "2026-06-26T02:02:00.000Z", "category": "tip", "sourceName": "公众号：数字生命卡兹克", "sourceUrl": "https://mp.weixin.qq.com/s/LVj2foSXi_hBRKxjuYaUyw"}, {"idx": 41, "title": "小互开源个人IP配图技能\"小互IP Studio\"，含31个原创角色", "summary": "博主小互开源个人IP配图技能\"小互IP Studio\"，包含31个原创角色（15个手绘线稿角色+16个谐音梗meme形象）及一套配图方法论。该Agent可自动读取文章、规划配图类型（情绪图/示意图/四格漫画）、生成并自查返工。默认画风为手绘线稿淡彩，另备5种皮肤（3D盲盒、黑白线稿等）可切换。安装仅需Python3，支持Claude Code、Codex等工具，需自备OpenAI兼容的图像API key（默认GPT-image-2）；也可只输出提示词手动生图。", "publishedAt": "2026-06-26T01:26:23.000Z", "category": "tip", "sourceName": "X：小互 (@xiaohu)", "sourceUrl": "https://x.com/xiaohu/status/2070317717811540149"}, {"idx": 42, "title": "@exponentialview 发布《State of the AI Economy》报告：AI经济年化收入超1750亿美元", "summary": "报告基于去重后的消费端AI支出统计，过去12个月实际AI营收达1100亿美元，年化运行率超1750亿美元，增长速度约为移动/互联网普及浪潮的3倍。营收形成速度急剧加快：2023年新增10亿美元收入需180天，现缩短至不足2天。企业AI已脱离试点阶段，但全面推广仍处早期。31%的标普500公司在财报电话会提及AI，仅20%量化影响。Token降价每10%刺激12-18%用量增长，需求价格弹性强。超大规模云厂商AI收入目前大致覆盖基础设施折旧，GPU经济效益依赖6年计算寿命假设。电力供应和数据中心成本仍是未来扩展主要瓶颈。", "publishedAt": "2026-06-25T23:29:52.000Z", "category": "tip", "sourceName": "X：Rohan Paul (@rohanpaul_ai)", "sourceUrl": "https://x.com/rohanpaul_ai/status/2070288396644491317"}, {"idx": 43, "title": "OLMo Hybrid vs Transformer：混合模型在实义词上优势明显，但重复短语上几无优势", "summary": "通过对比7B参数的OLMo 3（Transformer）与OLMo Hybrid（混合架构），实验发现混合模型在大多数token上预测损失更低：对名词、动词、形容词等实义词优势明显（loss gap约0.04），功能词上gap约0.02，且在需上下文推理的代词指代上更好。但在重复出现的n-gram和闭合括号（如`}`）上，混合模型的优势几乎消失，Transformer凭借注意力机制更擅长从输入中直接检索精确信息。", "publishedAt": "2026-06-25T16:11:42.000Z", "category": "tip", "sourceName": "Hugging Face：Blog（RSS）", "sourceUrl": "https://huggingface.co/blog/allenai/hybrid-token-prediction"}, {"idx": 44, "title": "多数主流AI聊天机器人政治立场偏左，\"反觉醒\"模型也不例外", "summary": "华盛顿邮报调查显示，多数主流AI聊天机器人在政治问题上明显偏左。OpenAI GPT-5.5在80%回答中仅呈现左派论据；DeepSeek V4 Pro为70%；Anthropic Claude Opus 4.8有43%纯左、57%给出双方观点。xAI的Grok 4.3左倾回答仍多于右倾。右翼平台Gab的Arya左倾回答是右倾的12倍。Google Gemini 3.1 Pro是例外，93%回答同时呈现双方立场。特朗普推动的\"反觉醒\"AI未能改变这一格局。", "publishedAt": "2026-06-25T16:04:32.000Z", "category": "tip", "sourceName": "The Decoder：AI News（RSS）", "sourceUrl": "https://the-decoder.com/most-major-ai-chatbots-still-lean-left-on-political-questions-even-anti-woke-models-are-no-exception"}, {"idx": 45, "title": "AI被认为会取代工程岗位，但新数据显示工程是2025年最具韧性的岗位", "summary": "风投机构SignalFire追踪8000万家公司数百万员工数据发现，工程是2025年最具韧性的岗位。大型科技公司总招聘较2019年下降25%，工程岗仅降11%；工程岗占Alphabet、Meta等12家\"Tech Majors\"新招员工的55%（2019年为46%）。早期初创公司2025年工程师招聘比2019年增长7%。Anthropic CEO警告AI可能消灭一半入门级白领，但该公司经济主管称尚未看到显著影响。NVIDIA CEO黄仁勋表示AI让工程师更忙碌，是杰文斯悖论的典型例证。", "publishedAt": "2026-06-24T21:56:41.000Z", "category": "tip", "sourceName": "TechCrunch：AI（RSS）", "sourceUrl": "https://techcrunch.com/2026/06/24/ai-was-supposed-to-kill-engineering-jobs-but-new-data-suggests-theyre-the-most-resilient"}, {"idx": 46, "title": "NVIDIA NeMo AutoModel：一行代码加速Transformer MoE模型微调", "summary": "NVIDIA NeMo AutoModel 是基于 Transformers v5 的开源库，添加 Expert Parallelism、DeepEP 融合 all-to-all 调度和 TransformerEngine 内核。在 MoE 模型微调中，相比原生 v5，训练吞吐量提升 3.4-3.7 倍，GPU 内存减少 29-32%，仅需改动一行 import。在 16 节点 128 张 H100 上全微调 Nemotron 3 Ultra 550B A55B 时，v5 因内存不足无法运行，而 AutoModel 凭借 EP=64 专家并行使训练可行。单节点 30B MoE 模型（如 Qwen3-30B-A3B）同样获得可量化的性能优势。", "publishedAt": "2026-06-24T16:00:13.000Z", "category": "tip", "sourceName": "Hugging Face：Blog（RSS）", "sourceUrl": "https://huggingface.co/blog/nvidia/accelerating-fine-tuning-nvidia-nemo-automodel"}, {"idx": 47, "title": "OpenRouter 零数据留存（ZDR）实践：97 款新模型，流量占比近半", "summary": "OpenRouter 的零数据留存（ZDR）保证用户提示词和模型响应不被存储，元数据一般安全。自 1 月以来新增 97 款支持 ZDR 的模型，月度 token 量增长 4.3 倍，约占全部路由流量一半。ZDR 在三个层面执行：账户级（整个供应商开启）、护栏级（按 API Key 或组织成员限定）、单次请求级（传参数仅路由至 ZDR 端点）。企业用户可灵活选择控制粒度，避免锁定单一供应商。", "publishedAt": "2026-06-24T16:00:00.000Z", "category": "tip", "sourceName": "OpenRouter：Announcements（RSS）", "sourceUrl": "https://openrouter.ai/blog/insights/when-zero-means-zero"}, {"idx": 48, "title": "里德·霍夫曼称SpaceX\"不是一家人工智能公司\"，xAI则是\"彻底的灾难\"", "summary": "LinkedIn联合创始人、Anthropic和OpenAI投资者Reid Hoffman在播客中公开批评SpaceX和xAI。他指出SpaceX\"不是一家人工智能公司\"，6月12日上市后收购AI编程工具Cursor属于\"花钱买相关性\"；xAI则是\"彻底的灾难\"，所有11位联合创始人已离职，Grok模型在基准测试中落后于Anthropic和OpenAI。他还批评美国政府6月11日以出口管制为由强制Anthropic下架Fable和Mythos模型，理由仅为Amazon CEO报告Fable 5存在jailbreak漏洞，称此举\"专断随意\"。Hoffman认为Anthropic和OpenAI均有巨大发展空间，但Cursor可能已过巅峰。他建议年轻人不要抵制AI。", "publishedAt": "2026-06-24T14:20:14.340Z", "category": "tip", "sourceName": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://fortune.com/2026/06/24/reid-hoffman-spacex-musk-openai-anthropic-gen-z-mistake"}, {"idx": 49, "title": "字节跳动技术副总裁洪定坤：AI Coding 的实践与探索", "summary": "在火山引擎Force大会，字节跳动技术副总裁洪定坤分享AI Coding实践。过去一年，字节AI代码贡献率增长6倍，tokens消耗增长5倍，但过度关注单一指标可能失真--TRAE团队代码超90%由AI生成，人均需求吞吐率仅提升60%。900次实验显示，主流Coding模型组合代码正确率超80%，但可交付性仅40-60分；结合Harness基建后提升至80分。AI降低编程门槛但需优化指标、治理、协作。字节探索原型驱动开发，能力沉淀至TRAE（日均Token消耗5.6万亿，增长50倍），并推出TRAE Work。", "publishedAt": "2026-06-24T14:02:42.000Z", "category": "tip", "sourceName": "公众号：火山引擎", "sourceUrl": "https://mp.weixin.qq.com/s/mdmaAyUIvxE8WT_GEbF2wQ"}, {"idx": 50, "title": "MiniCPM-V 4.6 在 Apple Core AI 上高速运行", "summary": "🥳感谢分享，@MLBoy_DaisukeMajima 🚀\nMiniCPM-V 4.6 在设备上以这样的速度运行，实在令人印象深刻--尤其是在 Apple Core AI 上以不到 2B 参数跑出。\n干得漂亮，推动高效多模态 AI 向前发展。🫡", "publishedAt": "2026-06-24T06:57:45.000Z", "category": "tip", "sourceName": "X：面壁智能 OpenBMB (@OpenBMB)", "sourceUrl": "https://x.com/OpenBMB/status/2069676334381728106"}]}]}
</script>
<script>
const EMBEDDED_DATA = JSON.parse(document.getElementById("dataSrc").textContent);
const SECTION_CONFIG = {"模型发布/更新": {"icon": "🤖", "color": "#7f6af0"}, "产品发布/更新": {"icon": "📦", "color": "#e8622a"}, "行业动态": {"icon": "🏭", "color": "#1d9e75"}, "论文研究": {"icon": "📄", "color": "#378add"}, "技巧与观点": {"icon": "💡", "color": "#e8a020"}};
const DAILY_STR = "2026-06-26";
const DAILY_MAX = "2026-06-26";

let currentData = null;
let currentDate = DAILY_STR;
let readSet = new Set();
let showOnlyUnread = false;
let currentFilter = 'all';
let currentSearch = '';
let isDark = true;

function reloadToday() {
  location.reload();
}
window.addEventListener('DOMContentLoaded', function() {
  try { readSet = new Set(JSON.parse(localStorage.getItem('aidaka_read_' + currentDate) || '[]')); } catch(e) {}
  try {
    var saved = localStorage.getItem('aidaka_theme');
    if (saved === 'light') { isDark = false; document.body.classList.add('light'); }
  } catch(e) {}
  updateThemeBtn();
  renderAll(EMBEDDED_DATA);
  setTimeout(function() {
    document.getElementById('loadingOverlay').style.opacity = '0';
    setTimeout(function() { document.getElementById('loadingOverlay').style.display = 'none'; }, 400);
  }, 300);
});

function renderAll(data) {
  currentData = data;
  var sections = data.sections || [];
  var total = sections.reduce(function(a, s) { return a + s.items.length; }, 0);
  var dateStr = fmtDate(data.date);
  document.getElementById('heroTitle').textContent = 'AI打卡网 · ' + dateStr;
  var gen = data.generatedAt ? new Date(data.generatedAt) : new Date();
  document.getElementById('heroSubtitle').textContent = '共收录 ' + total + ' 条资讯 · 来源精选 · 生成于 ' + relTime(gen);
  document.getElementById('navDateLabel').textContent = data.date;
  document.title = 'AI打卡网 · ' + data.date + ' (' + total + '条)';

  var statsEl = document.getElementById('heroStats');
  statsEl.innerHTML = '<div class="stat-chip" onclick="reloadToday()" title="刷新今日数据"><div class="num">' + total + '</div><div class="lbl">今日总条数</div></div>'
    + sections.map(function(s) {
      var cfg = SECTION_CONFIG[s.label] || { icon: '📌', color: '#888' };
      return '<div class="stat-chip" onclick="filterSection(\'' + s.label.replace(/'/g, "\\'") + '\'); scrollToSection(\'' + s.label.replace(/'/g, "\\'") + '\');" title="跳转到 ' + s.label + '"><div class="num" style="font-size:22px">' + cfg.icon + '</div><div class="lbl">' + s.label.replace('/更新','').replace('/观点','') + ' ' + s.items.length + '</div></div>';
    }).join('');

  renderDonut(sections);
  var navEl = document.getElementById('navInner');
  var dateArea = navEl.querySelector('.nav-date-area');
  navEl.querySelectorAll('.nav-sec-link').forEach(function(el) { el.remove(); });
  sections.forEach(function(s) {
    var cfg = SECTION_CONFIG[s.label] || { icon: '📌', color: '#888' };
    var a = document.createElement('a');
    a.className = 'nav-link nav-sec-link';
    a.href = '#sec-' + slugify(s.label);
    a.innerHTML = cfg.icon + ' ' + s.label + ' <span class="nav-badge">' + s.items.length + '</span>';
    a.onclick = function(e) { e.preventDefault(); filterSection(s.label, a); scrollToSection(s.label); };
    navEl.insertBefore(a, dateArea);
  });
  renderAnalytics(sections);
  var main = document.getElementById('main');
  main.querySelectorAll('.dyn-section').forEach(function(el) { el.remove(); });
  var globalIdx = 0;
  var frag = document.createDocumentFragment();
  sections.forEach(function(s) {
    var cfg = SECTION_CONFIG[s.label] || { icon: '📌', color: '#888' };
    var secDiv = document.createElement('div');
    secDiv.className = 'dyn-section';
    secDiv.id = 'sec-' + slugify(s.label);
    var header = document.createElement('div');
    header.className = 'section-header';
    header.innerHTML = '<div class="section-icon" style="background:' + cfg.color + '22; color:' + cfg.color + '">' + cfg.icon + '</div>'
      + '<span class="section-title">' + s.label + '</span>'
      + '<span class="section-count">' + s.items.length + ' 条</span>';
    secDiv.appendChild(header);
    if (s.items.length === 0) {
      secDiv.innerHTML += '<p style="color:var(--text3);font-size:13px;padding:12px 0">今日暂无相关资讯</p>';
    } else {
      var grid = document.createElement('div');
      grid.className = 'card-grid';
      s.items.forEach(function(item) {
        globalIdx++;
        var cardEl = buildCard(item, globalIdx);
        grid.appendChild(cardEl);
      });
      secDiv.appendChild(grid);
    }
    frag.appendChild(secDiv);
  });
  main.insertBefore(frag, main.querySelector('#noResults'));
  updateReadProgress(total);
  updateDateNav(data.date);
  document.getElementById('footerEl').innerHTML = '共 ' + total + ' 条资讯 · 数据来源 <a href="https://aihot.virxact.com" target="_blank" rel="noopener noreferrer" style="color:var(--accent)">aihot.virxact.com</a> · AI打卡网 每日晨报';
  setTimeout(initScrollAnim, 100);
}

function buildCard(item, idx) {
  var isRead = readSet.has(String(idx));
  var card = document.createElement('div');
  card.className = 'card' + (isRead ? ' read' : '');
  card.dataset.idx = idx;
  card.dataset.title = (item.title || '').toLowerCase();
  card.dataset.summary = (item.summary || '').toLowerCase();
  card.dataset.source = (item.sourceName || '').toLowerCase();
  var srcShort = shortSource(item.sourceName || '');
  var titleSafe = escHtml(item.title || '');
  var sourceNameSafe = escHtml(item.sourceName || '');
  var summaryRaw = item.summary || '';
  // Truncate summary to ~60 chars for display
  var summaryShort = summaryRaw.length > 65 ? summaryRaw.slice(0, 62) + '...' : summaryRaw;
  var summarySafe = escHtml(summaryShort);
  var summaryFull = escHtml(summaryRaw);
  var timeStr = item.publishedAt ? relTimeStr(item.publishedAt) : '';
  var sourceHtml = item.sourceUrl ? '<a class="source-btn" href="' + escHtml(item.sourceUrl) + '" target="_blank" rel="noopener noreferrer">原文</a>' : '';

  var inner = '<div class="card-header"><span class="card-num">' + idx + '</span><span class="card-title">' + titleSafe + '</span></div>';
  if (timeStr) { inner += '<span class="time-badge">' + escHtml(timeStr) + '</span>'; }
  inner += '<span class="card-source" title="' + sourceNameSafe + '">' + escHtml(srcShort) + '</span>'
    + '<div class="card-summary collapsed" id="sum-' + idx + '" data-full="' + escHtml(summaryRaw).replace(/"/g, '&quot;') + '">' + summarySafe + '</div>'
    + '<div class="card-footer">'
    + '<button class="expand-btn" onclick="toggleExpand(' + idx + ', this)">展开全文</button>'
    + '<div style="display:flex;gap:8px">'
    + '<button class="read-btn" onclick="markRead(' + idx + ', this)" id="rbtn-' + idx + '">' + (isRead ? '标为未读' : '打卡') + '</button>'
    + sourceHtml
    + '</div></div>';
  card.innerHTML = inner;
  // 点击卡片任意位置展开全文（按钮除外）
  card.addEventListener('click', function(e) {
    var target = e.target;
    if (target.closest('.read-btn') || target.closest('.source-btn') || target.closest('.expand-btn')) return;
    toggleExpand(idx, card.querySelector('.expand-btn'));
  });
  return card;
}

function renderDonut(sections) {
  var total = sections.reduce(function(a, s) { return a + s.items.length; }, 0);
  if (total === 0) return;
  var svgEl = document.getElementById('donutSvg');
  var legendEl = document.getElementById('donutLegend');
  svgEl.innerHTML = '';
  legendEl.innerHTML = '';
  var cx = 50, cy = 50, r = 36, inner = 22;
  var startAngle = -Math.PI / 2;
  sections.forEach(function(s) {
    if (s.items.length === 0) return;
    var cfg = SECTION_CONFIG[s.label] || { icon: '📌', color: '#888' };
    var angle = (s.items.length / total) * Math.PI * 2;
    var endAngle = startAngle + angle;
    var x1 = cx + r * Math.cos(startAngle), y1 = cy + r * Math.sin(startAngle);
    var x2 = cx + r * Math.cos(endAngle), y2 = cy + r * Math.sin(endAngle);
    var ix1 = cx + inner * Math.cos(startAngle), iy1 = cy + inner * Math.sin(startAngle);
    var ix2 = cx + inner * Math.cos(endAngle), iy2 = cy + inner * Math.sin(endAngle);
    var lg = angle > Math.PI ? 1 : 0;
    var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', 'M ' + ix1 + ' ' + iy1 + ' L ' + x1 + ' ' + y1 + ' A ' + r + ' ' + r + ' 0 ' + lg + ' 1 ' + x2 + ' ' + y2 + ' L ' + ix2 + ' ' + iy2 + ' A ' + inner + ' ' + inner + ' 0 ' + lg + ' 0 ' + ix1 + ' ' + iy1 + ' Z');
    path.setAttribute('fill', cfg.color);
    path.setAttribute('opacity', '0.85');
    path.style.cursor = 'pointer';
    path.addEventListener('click', (function(label) { return function() { filterSection(label); scrollToSection(label); }; })(s.label));
    svgEl.appendChild(path);
    startAngle = endAngle;
    var li = document.createElement('div');
    li.className = 'donut-legend-item';
    li.innerHTML = '<span class="dot" style="background:' + cfg.color + '"></span>' + s.label + ' <strong style="color:rgba(255,255,255,0.95)">' + s.items.length + '</strong>';
    li.onclick = (function(label) { return function() { filterSection(label); scrollToSection(label); }; })(s.label);
    legendEl.appendChild(li);
  });
  var text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  text.setAttribute('x', cx); text.setAttribute('y', cy + 1);
  text.setAttribute('text-anchor', 'middle'); text.setAttribute('dominant-baseline', 'middle');
  text.setAttribute('fill', 'rgba(255,255,255,0.9)'); text.setAttribute('font-size', '12');
  text.setAttribute('font-weight', '700'); text.textContent = total;
  svgEl.appendChild(text);
  var sub = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  sub.setAttribute('x', cx); sub.setAttribute('y', cy + 13);
  sub.setAttribute('text-anchor', 'middle'); sub.setAttribute('fill', 'rgba(255,255,255,0.6)'); sub.setAttribute('font-size', '7');
  sub.textContent = '条';
  svgEl.appendChild(sub);
}

function renderAnalytics(sections) {
  var wrap = document.getElementById('analyticsWrap');
  var sourceMap = {};
  sections.forEach(function(s) {
    s.items.forEach(function(item) {
      var src = shortSource(item.sourceName || '未知');
      sourceMap[src] = (sourceMap[src] || 0) + 1;
    });
  });
  var sorted = Object.entries(sourceMap).sort(function(a,b) { return b[1]-a[1]; }).slice(0, 6);
  var maxCount = sorted[0] ? sorted[0][1] : 1;
  var srcHtml = '<div class="analytics-card"><div class="analytics-title">来源排行</div>';
  sorted.forEach(function(entry) {
    var name = entry[0], count = entry[1];
    var pct = Math.round(count / maxCount * 100);
    srcHtml += '<div class="source-rank-item" style="cursor:pointer" onclick="filterBySource(\'' + escHtml(name).replace(/'/g,"\\'") + '\')" title="查看 ' + escHtml(name).replace(/'/g,"\\'") + ' 的全部文章"><span class="source-rank-name">' + escHtml(name) + '</span><div class="source-rank-bar-bg"><div class="source-rank-bar" style="width:' + pct + '%"></div></div><span class="source-rank-count">' + count + '</span></div>';
  });
  srcHtml += '</div>';
  var stopWords = new Set(['的','了','在','是','与','和','AI','以','将','被','其','已','于','从','到','并','为','但','还','也','都','该','这','其中','能够','通过','实现','用于','可以','以及','可能','提供','包含','包括','无需','用户','产品','模型','支持','系统','功能','未','使用','工作','进行','没有']);
  var wordCount = {};
  sections.forEach(function(s) {
    s.items.forEach(function(item) {
      var words = (item.title + ' ' + (item.summary || '')).replace(/[，。、！？【】《》"'·\s]+/g, ' ').split(' ');
      words.forEach(function(w) {
        w = w.trim();
        if (w.length >= 2 && w.length <= 8 && !stopWords.has(w) && !/^[a-zA-Z0-9]{1,2}$/.test(w)) {
          wordCount[w] = (wordCount[w] || 0) + 1;
        }
      });
    });
  });
  var topWords = Object.entries(wordCount).sort(function(a,b) { return b[1]-a[1]; }).slice(0, 18);
  var colors = ['#e8622a','#f08040','#1d9e75','#378add','#7f6af0','#e8a020','#d4537e','#0f6e56','#993c1d','#185fa5'];
  var hotHtml = '<div class="analytics-card"><div class="analytics-title">热词标签</div><div class="hotwords-wrap">';
  topWords.forEach(function(entry, i) {
    var word = entry[0], cnt = entry[1];
    var sz = Math.max(11, Math.min(16, 11 + cnt * 2));
    var col = colors[i % colors.length];
    hotHtml += '<span class="hotword-chip" style="background:' + col + ';font-size:' + sz + 'px;opacity:' + (0.7 + cnt * 0.1) + '" onclick="document.getElementById(\'searchInput\').value=\'' + escHtml(word).replace(/'/g, "\\'") + '\';doSearch(\'' + escHtml(word).replace(/'/g, "\\'") + '\')">' + escHtml(word) + '</span>';
  });
  hotHtml += '</div></div>';
  wrap.innerHTML = srcHtml + hotHtml;
}

function doSearch(val) {
  currentSearch = val.toLowerCase().trim();
  document.getElementById('searchClear').className = 'search-clear' + (val ? ' show' : '');
  applyFilters();
}
function clearSearch() {
  document.getElementById('searchInput').value = '';
  doSearch('');
}
function applyFilters() {
  var cards = document.querySelectorAll('.card');
  var visible = 0;
  cards.forEach(function(card) {
    var secEl = card.closest('.dyn-section');
    var matchSection = currentFilter === 'all' || slugify(currentFilter) === (secEl ? secEl.id.replace('sec-','') : '');
    var matchSearch = !currentSearch
      || card.dataset.title.indexOf(currentSearch) >= 0
      || card.dataset.summary.indexOf(currentSearch) >= 0
      || card.dataset.source.indexOf(currentSearch) >= 0;
    var matchRead = !showOnlyUnread || !readSet.has(card.dataset.idx);
    if (matchSection && matchSearch && matchRead) {
      card.classList.remove('hidden'); visible++;
      if (currentSearch) highlightCard(card, currentSearch); else clearHighlight(card);
    } else {
      card.classList.add('hidden'); clearHighlight(card);
    }
  });
  document.getElementById('searchCount').textContent = currentSearch ? (visible > 0 ? '找到 ' + visible + ' 条' : '') : '';
  document.getElementById('noResults').className = 'no-results' + (visible === 0 && (currentSearch || showOnlyUnread || currentFilter !== 'all') ? ' show' : '');
}
function highlightCard(card, q) {
  var titleEl = card.querySelector('.card-title');
  if (!titleEl) return;
  var orig = titleEl.textContent;
  var re = new RegExp('(' + escRe(q) + ')', 'gi');
  titleEl.innerHTML = escHtml(orig).replace(re, '<mark>$1</mark>');
}
function clearHighlight(card) {
  var titleEl = card.querySelector('.card-title');
  if (titleEl) titleEl.innerHTML = escHtml(titleEl.textContent);
}
function filterSection(label, el) {
  currentFilter = label;
  currentSearch = '';
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.nav-link').forEach(function(a) { a.classList.remove('active'); });
  if (el) el.classList.add('active');
  else { document.querySelectorAll('.nav-link').forEach(function(a) { if (a.textContent.indexOf(label) >= 0) a.classList.add('active'); }); }
  applyFilters();
}
function filterBySource(sourceName) {
  currentFilter = 'all';
  currentSearch = sourceName;
  document.querySelectorAll('.nav-link').forEach(function(a) { a.classList.remove('active'); });
  document.querySelectorAll('.nav-link').forEach(function(a) { if (a.textContent.indexOf('全部') >= 0) a.classList.add('active'); });
  // Set search to the source name so only cards from that source remain visible
  document.getElementById('searchInput').value = sourceName;
  doSearch(sourceName);
  scrollTo(0, 0);
  showToast('已筛选：' + sourceName);
}
function scrollToSection(label) {
  var id = 'sec-' + slugify(label);
  var el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
function toggleExpand(idx, btn) {
  var sum = document.getElementById('sum-' + idx);
  if (!sum) return;
  var full = sum.dataset.full || '';
  if (sum.classList.contains('collapsed')) {
    sum.classList.replace('collapsed', 'expanded');
    sum.textContent = full;
    btn.textContent = '收起';
  } else {
    sum.classList.replace('expanded', 'collapsed');
    var short = full.length > 65 ? full.slice(0, 62) + '...' : full;
    sum.textContent = short;
    btn.textContent = '展开全文';
  }
}
function markRead(idx, btn) {
  var key = String(idx);
  var card = document.querySelector('.card[data-idx="' + key + '"]');
  if (readSet.has(key)) {
    readSet.delete(key);
    if (card) card.classList.remove('read');
    if (btn) btn.textContent = '打卡';
  } else {
    readSet.add(key);
    if (card) card.classList.add('read');
    if (btn) btn.textContent = '已打卡';
  }
  try { localStorage.setItem('aidaka_read_' + currentDate, JSON.stringify(Array.from(readSet))); } catch(e) {}
  var total = document.querySelectorAll('.card').length;
  updateReadProgress(total);
  if (showOnlyUnread) applyFilters();
}
function toggleReadFilter() {
  showOnlyUnread = !showOnlyUnread;
  var btn = document.getElementById('readProgress');
  if (showOnlyUnread) { btn.style.opacity = '0.7'; btn.title = '点击显示全部'; }
  else { btn.style.opacity = '1'; btn.title = '点击筛选未读'; }
  applyFilters();
}
function updateReadProgress(total) {
  var count = readSet.size;
  var pct = total > 0 ? Math.round(count / total * 100) : 0;
  var icon = count >= total && total > 0 ? '✅' : '🕐';
  var label = count >= total && total > 0 ? '今日已读完' : '已打卡 ' + count + '/' + total;
  document.getElementById('readLabel').innerHTML = '<span class="read-progress-label"><span class="icon">' + icon + '</span><span>' + label + '</span></span>';
  document.getElementById('readBarFill').style.width = pct + '%';
}
function toggleTheme() {
  isDark = !isDark;
  document.body.classList.toggle('light', !isDark);
  try { localStorage.setItem('aidaka_theme', isDark ? 'dark' : 'light'); } catch(e) {}
  updateThemeBtn();
}
function updateThemeBtn() {
  document.getElementById('themeBtn').textContent = isDark ? '亮色模式' : '暗色模式';
}
function updateDateNav(dateStr) {
  // For items-based view, we use daily API for history nav
  document.getElementById('nextBtn').disabled = (dateStr >= DAILY_MAX);
  document.getElementById('prevBtn').disabled = false;
}
function navigateDate(delta) {
  var d = new Date(currentDate + 'T00:00:00');
  d.setDate(d.getDate() + delta);
  var newDateRaw = d.toISOString().slice(0, 10);
  if (newDateRaw > DAILY_MAX) { showToast('已是最新日期'); return; }
  loadDate(newDateRaw);
}
function openModal() {
  document.getElementById('datePicker').value = currentDate;
  document.getElementById('datePicker').max = DAILY_MAX;
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }
function goToDate() {
  var val = document.getElementById('datePicker').value;
  closeModal();
  if (val && val !== currentDate && val <= DAILY_MAX) loadDate(val);
  else if (val > DAILY_MAX) showToast('不能选择未来日期');
}
function loadDate(dateStr) {
  currentDate = dateStr;
  document.getElementById('loadingOverlay').style.display = 'flex';
  document.getElementById('loadingOverlay').style.opacity = '1';
  try { readSet = new Set(JSON.parse(localStorage.getItem('aidaka_read_' + dateStr) || '[]')); } catch(e) { readSet = new Set(); }
  document.querySelectorAll('.dyn-section').forEach(function(el) { el.remove(); });
  currentSearch = ''; currentFilter = 'all';
  showOnlyUnread = false;
  document.getElementById('searchInput').value = '';
  document.getElementById('searchCount').textContent = '';
  document.getElementById('readProgress').style.opacity = '1';
  document.getElementById('readProgress').title = '点击筛选未读';
  // Try loading 50 items from items API for the selected date
  var sinceStr = dateStr + 'T00:00:00Z';
  fetch('https://aihot.virxact.com/api/public/items?mode=selected&since=' + sinceStr + '&take=50')
    .then(function(r) { return r.json(); })
    .then(function(apiData) {
      // Transform items API response to daily-like format
      var categories = {
        'ai-models': '模型发布/更新',
        'ai-products': '产品发布/更新',
        'industry': '行业动态',
        'paper': '论文研究',
        'tip': '技巧与观点'
      };
      var sectionMap = {};
      var idx = 0;
      (apiData.items || []).forEach(function(item) {
        var cat = item.category || '';
        var label = categories[cat] || '行业动态';
        if (!sectionMap[label]) {
          sectionMap[label] = { label: label, items: [] };
        }
        idx++;
        sectionMap[label].items.push({
          idx: idx,
          title: item.title,
          sourceName: item.source || '',
          sourceUrl: item.url || '',
          summary: item.summary || '',
          publishedAt: item.publishedAt || ''
        });
      });
      var sections = [];
      var order = ['模型发布/更新','产品发布/更新','行业动态','论文研究','技巧与观点'];
      order.forEach(function(lbl) {
        if (sectionMap[lbl]) sections.push(sectionMap[lbl]);
        else sections.push({ label: lbl, items: [] });
      });
      var transformed = {
        date: dateStr,
        generatedAt: apiData.items && apiData.items.length > 0 ? apiData.items[0].publishedAt : new Date().toISOString(),
        lead: null,
        sections: sections
      };
      renderAll(transformed);
      document.getElementById('loadingOverlay').style.opacity = '0';
      setTimeout(function() { document.getElementById('loadingOverlay').style.display = 'none'; }, 400);
      showToast('已加载 ' + dateStr + ' (' + idx + '条)');
    })
    .catch(function() {
      // Fallback to daily API
      fetch('https://aihot.virxact.com/api/public/daily/' + dateStr)
        .then(function(r) { return r.json(); })
        .then(function(dailyData) {
          renderAll(dailyData);
          document.getElementById('loadingOverlay').style.opacity = '0';
          setTimeout(function() { document.getElementById('loadingOverlay').style.display = 'none'; }, 400);
          showToast('已加载 ' + dateStr + ' 日报');
        })
        .catch(function() {
          showToast('加载失败，网络请求受限');
          document.getElementById('loadingOverlay').style.opacity = '0';
          setTimeout(function() { document.getElementById('loadingOverlay').style.display = 'none'; }, 400);
        });
    });
}
function initScrollAnim() {
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }
    });
  }, { threshold: 0.05, rootMargin: '0px 0px -20px 0px' });
  document.querySelectorAll('.card').forEach(function(c) { observer.observe(c); });
}
var toastTimer;
function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.classList.remove('show'); }, 2500);
}
function slugify(s) { return s.replace(/[\/\s]/g, '-'); }
function escHtml(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
function shortSource(name) {
  if (!name) return '';
  // Group all X/Twitter sources under "X"
  if (/^X[：:]/.test(name)) return 'X';
  var trimmed = name.replace(/（.*?）/g,'').replace(/\(.*?\)/g,'').trim();
  return trimmed.length > 16 ? trimmed.slice(0, 16) + '...' : trimmed;
}
function fmtDate(dateStr) {
  if (!dateStr) return '';
  var d = new Date(dateStr + 'T00:00:00+08:00');
  var mm = d.getMonth() + 1;
  var dd = d.getDate();
  var days = ['日','一','二','三','四','五','六'];
  return mm + ' 月 ' + dd + ' 日 周' + days[d.getDay()];
}
function fmtDateShort(iso) { return iso ? iso.slice(0, 10) : ''; }
function relTime(date) {
  var now = Date.now();
  var diff = now - date.getTime();
  var mins = Math.floor(diff / 60000);
  var hours = Math.floor(mins / 60);
  if (diff < 0) return '刚刚';
  if (mins < 1) return '刚刚';
  if (mins < 60) return mins + ' 分钟前';
  if (hours < 24) {
    var hh = String(date.getHours()).padStart(2,'0');
    var mm = String(date.getMinutes()).padStart(2,'0');
    var period = date.getHours() < 12 ? '上午' : (date.getHours() < 18 ? '下午' : '晚上');
    return '今天' + period + ' ' + hh + ':' + mm;
  }
  return fmtDateShort(date.toISOString());
}
function relTimeStr(isoStr) {
  if (!isoStr) return '';
  var d = new Date(isoStr);
  return relTime(d);
}
</script>
