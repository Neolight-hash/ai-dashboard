<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI打卡网 · 2026-06-10</title>
<style>
  :root {
    --bg: #0f0f0f;
    --bg2: #1a1a1a;
    --bg3: #222;
    --bg4: #2a2a2a;

    --font: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif;
    --transition: 0.25s ease;
  }
  .light {
    --bg: #fafafa;
    --bg2: #fff;
    --bg3: #f3f3f3;
    --bg4: #e8e8e8;
    --text: #1a1a1a;
    --text2: #555;
    --text3: #999;

    background: var(--bg);
    color: var(--text);
    font-family: var(--font);

  }

  .hero-inner { max-width: 960px; margin: 0 auto; position: relative; z-index: 1; }
  .hero-top { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 16px; }
  .hero-badge {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(8px);

    padding: 4px 14px;
    font-size: 12px;
    color: rgba(255,255,255,0.9);
    letter-spacing: 0.05em;
  }
  .theme-btn {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);

    color: #fff;
    cursor: pointer;
    font-family: var(--font);

  .theme-btn:hover { background: rgba(255,255,255,0.28); }
  .hero-title {

    height: 22px;

  }
  .search-clear:hover { background: var(--accent); color: #fff; }
  .search-clear.show { display: flex; }
  .read-progress {

    border-radius: 16px;
    padding: 10px 20px;

  .read-progress-label { display: flex; align-items: center; gap: 6px; font-size: 13px; }
  .read-progress-label .icon { font-size: 16px; }
  .read-bar {
    height: 6px;
    background: rgba(255,255,255,0.25);
    border-radius: 3px;
    width: 100%;
    overflow: hidden;
  }
  .read-bar-fill {
    height: 100%;
    background: #fff;
    border-radius: 3px;
    transition: width 0.4s ease;
    box-shadow: 0 0 6px rgba(255,255,255,0.5);
  }
  .search-count {
    font-size: 13px;
    color: var(--text3);
    white-space: nowrap;
  }
  .nav-date-area {

    align-items: center;
    gap: 6px;
    margin-left: auto;
    flex-shrink: 0;
  }
  .nav-date-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 12px;
    color: var(--text2);
    cursor: pointer;
    transition: all var(--transition);
    font-family: var(--font);
  }
  .nav-date-btn:hover:not(:disabled) { background: var(--accent); color: #fff; border-color: var(--accent); }
  .nav-date-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .nav-date-label { font-size: 12px; color: var(--text3); }
  .main { max-width: 960px; margin: 0 auto; padding: 24px 16px 60px; }
  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 40px 0 20px;
    padding-bottom: 12px;
    border-bottom: 2px solid var(--border);
  }
  .section-header:first-child { margin-top: 8px; }
  .section-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px;
    flex-shrink: 0;
  }
  .section-title { font-size: 18px; font-weight: 700; color: var(--text); }
  .section-count {
    background: var(--bg3);
    border-radius: 10px;
    padding: 2px 10px;
    font-size: 12px;
    color: var(--text3);
    margin-left: auto;
  }
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    box-shadow: var(--card-shadow);
    transition: transform var(--transition), box-shadow var(--transition), opacity var(--transition), border-color var(--transition);
    opacity: 0;
    transform: translateY(18px);
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }
  .card.visible { opacity: 1; transform: translateY(0); }
  .card.read { opacity: 0.5; }
  .card.read::after {
    content: '已读';
    position: absolute;
    top: 12px;
    right: 12px;
    background: var(--bg4);
    color: var(--text3);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 6px;
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); border-color: var(--accent); }
  .card.hidden { display: none !important; }
  .card.highlight { border-color: var(--accent2); background: rgba(232,98,42,0.06); }
  .card-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px; height: 24px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    border-radius: 6px;
    margin-bottom: 10px;
    flex-shrink: 0;
  }
  .card-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
  .card-title { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.5; flex: 1; }
  .card-title mark {
    background: rgba(232,98,42,0.3);
    color: var(--accent2);
    border-radius: 2px;
    padding: 0 2px;
  }
  .card-source {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 9px;
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 10px;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .card-summary {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.65;
    margin-bottom: 12px;
    overflow: hidden;
    transition: max-height 0.35s ease;
    word-break: break-word;
  }
  .card-summary.collapsed {
    max-height: 4.95em;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-summary.expanded {
    -webkit-line-clamp: unset;
    display: block;
    max-height: 800px;
  }
  .card-footer { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }
  .expand-btn {
    background: none;
    border: none;
    color: var(--accent2);
    font-size: 12px;
    cursor: pointer;
    font-family: var(--font);
    padding: 0;
    transition: color var(--transition);
  }
  .expand-btn:hover { color: var(--accent); }
  .source-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    text-decoration: none;
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    transition: opacity var(--transition);
  }
  .source-btn:hover { opacity: 0.85; }
  .read-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    color: var(--text3);
    cursor: pointer;
    font-family: var(--font);
    transition: all var(--transition);
  }
  .read-btn:hover { border-color: var(--accent); color: var(--accent); }
  .time-badge { font-size: 11px; color: var(--text3); display: block; margin-bottom: 8px; }
  .analytics-wrap {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 32px;
  }
  .analytics-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
  }
  .analytics-title { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 14px; }
  .source-rank-item { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 13px; cursor: pointer; transition: opacity var(--transition); }
  .source-rank-item:hover { opacity: 0.75; }
  .source-rank-bar-bg { flex: 1; height: 6px; background: var(--bg4); border-radius: 3px; overflow: hidden; }
  .source-rank-bar { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
  .source-rank-name { width: 120px; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px; }
  .source-rank-count { width: 20px; color: var(--text3); text-align: right; font-size: 12px; }
  .hotwords-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
  .hotword-chip {
    padding: 4px 12px;
    border-radius: 16px;
    font-size: 12px;
    color: #fff;
    cursor: pointer;
    transition: transform var(--transition);
  }
  .hotword-chip:hover { transform: scale(1.08); }
  .no-results { text-align: center; padding: 60px 20px; color: var(--text3); display: none; }
  .no-results.show { display: block; }
  .no-results-icon { font-size: 36px; margin-bottom: 12px; }
  .loading-overlay {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    transition: opacity 0.4s;
  }
  .spinner {

    border: 3px solid var(--bg4);
    border-top-color: var(--accent);

  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .footer {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 16px 40px;

    font-size: 12px;
    color: var(--text3);
    border-top: 1px solid var(--border);
    padding-top: 24px;
  }

    display: none;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 90%;
    max-width: 400px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .modal h3 { font-size: 16px; margin-bottom: 16px; color: var(--text); }
  .date-picker {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 14px;
    color: var(--text);
    font-family: var(--font);
    margin-bottom: 14px;
    outline: none;

    padding: 10px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    font-family: var(--font);
    transition: all var(--transition);

  .modal-btn.primary:hover { background: var(--accent2); }

    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 20px;
    font-size: 13px;
    color: var(--text);

    white-space: nowrap;
  }

  @media (max-width: 600px) {
    .analytics-wrap { grid-template-columns: 1fr; }
    .hero-title { font-size: 28px; }
    .card-grid { grid-template-columns: 1fr; }
    .nav-date-area { display: none; }
  }
</style>
</head>
<body>
<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>查看历史日報</h3>
    <input type="date" class="date-picker" id="datePicker" value="2026-06-10" max="2026-06-10">
    <div class="modal-btns">
      <button class="modal-btn secondary" onclick="closeModal()">取消</button>
      <button class="modal-btn primary" onclick="goToDate()">前往</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="hero">
  <div class="hero-inner">
    <div class="hero-top">
      <span class="hero-badge">AI打卡网 · 每日晨报</span>
      <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">亮色模式</button>
    </div>
    <h1 class="hero-title" id="heroTitle">AI打卡网</h1>
    <p class="hero-subtitle" id="heroSubtitle">加载中…</p>
    <div class="hero-stats" id="heroStats"></div>
    <div class="donut-wrap" id="donutWrap">
      <svg class="donut-svg" id="donutSvg" width="100" height="100" viewBox="0 0 100 100"></svg>
      <div class="donut-legend" id="donutLegend"></div>
    </div>
  </div>
</div>
<div class="sticky-nav">
  <div class="nav-inner" id="navInner">
    <a class="nav-link active" href="#top" onclick="reloadToday()">全部</a>
    <div class="nav-date-area">
      <button class="nav-date-btn" id="prevBtn" onclick="navigateDate(-1)">昨天</button>
      <span class="nav-date-label" id="navDateLabel">2026-06-10</span>
      <button class="nav-date-btn" id="nextBtn" onclick="navigateDate(1)" disabled>明天</button>
      <button class="nav-date-btn" onclick="openModal()">日历</button>
    </div>
  </div>
</div>
<div class="toolbar">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="searchInput" type="text" placeholder="搜索标题、来源、摘要…" oninput="doSearch(this.value)">
    <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
  </div>
  <div class="read-progress" id="readProgress" onclick="toggleReadFilter()">
    <span id="readLabel"><span class="read-progress-label"><span class="icon">🕐</span><span>已打卡 0/0</span></span></span>
    <div class="read-bar"><div class="read-bar-fill" id="readBarFill" style="width:0%"></div></div>
  </div>
  <span class="search-count" id="searchCount"></span>
</div>
<div class="main" id="main">
  <div class="analytics-wrap" id="analyticsWrap"></div>
  <div id="noResults" class="no-results">
    <div class="no-results-icon">🔎</div>
    <p>没有找到匹配的资讯</p>
    <p style="font-size:12px; margin-top:6px">试试其他关键词？</p>
  </div>
</div>
