<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI打卡网 · 2026-06-03</title>
<style>
  :root {

  .search-count {

  .nav-date-btn {

  }
  .nav-date-btn:hover:not(:disabled) { background: var(--accent); color: #fff; border-color: var(--accent); }
  .nav-date-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .nav-date-label { font-size: 12px; color: var(--text3); }
  .main { max-width: 960px; margin: 0 auto; padding: 24px 16px 60px; }
  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 40px 0 20px;
    padding-bottom: 12px;
    border-bottom: 2px solid var(--border);
  }
  .section-header:first-child { margin-top: 8px; }
  .section-icon {

    flex-shrink: 0;

  .section-title { font-size: 18px; font-weight: 700; color: var(--text); }

    padding: 2px 10px;
    font-size: 12px;
    color: var(--text3);
    margin-left: auto;
  }
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    box-shadow: var(--card-shadow);
    transition: transform var(--transition), box-shadow var(--transition), opacity var(--transition), border-color var(--transition);
    opacity: 0;
    transform: translateY(18px);
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }
  .card.visible { opacity: 1; transform: translateY(0); }
  .card.read { opacity: 0.5; }
  .card.read::after {
    content: '已读';
    position: absolute;
    top: 12px;
    right: 12px;
    background: var(--bg4);
    color: var(--text3);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 6px;
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); border-color: var(--accent); }
  .card.hidden { display: none !important; }
  .card.highlight { border-color: var(--accent2); background: rgba(232,98,42,0.06); }
  .card-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px; height: 24px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    border-radius: 6px;
    margin-bottom: 10px;
    flex-shrink: 0;
  }
  .card-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
  .card-title { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.5; flex: 1; }
  .card-title mark {
    background: rgba(232,98,42,0.3);

    display: inline-flex;

    gap: 4px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 9px;
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 10px;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .card-summary {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.65;
    margin-bottom: 12px;
    overflow: hidden;
    transition: max-height 0.35s ease;
    word-break: break-word;
  }
  .card-summary.collapsed {
    max-height: 4.95em;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-summary.expanded {
    -webkit-line-clamp: unset;
    display: block;
    max-height: 800px;
  }
  .card-footer { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }
  .expand-btn {
    background: none;
    border: none;
    color: var(--accent2);
    font-size: 12px;
    cursor: pointer;
    font-family: var(--font);
    padding: 0;
    transition: color var(--transition);
  }
  .expand-btn:hover { color: var(--accent); }
  .source-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    text-decoration: none;
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    transition: opacity var(--transition);
  }
  .source-btn:hover { opacity: 0.85; }
  .read-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    color: var(--text3);
    cursor: pointer;
    font-family: var(--font);
    transition: all var(--transition);
  }
  .read-btn:hover { border-color: var(--accent); color: var(--accent); }
  .time-badge { font-size: 11px; color: var(--text3); display: block; margin-bottom: 8px; }
  .analytics-wrap {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 32px;
  }
  .analytics-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
  }
  .analytics-title { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 14px; }
  .source-rank-item { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 13px; cursor: pointer; transition: opacity var(--transition); }
  .source-rank-item:hover { opacity: 0.75; }
  .source-rank-bar-bg { flex: 1; height: 6px; background: var(--bg4); border-radius: 3px; overflow: hidden; }

  .hotwords-wrap { display: flex; flex-wrap: wrap; gap: 8px; }

    transition: transform var(--transition);

  .no-results-icon { font-size: 36px; margin-bottom: 12px; }
  .loading-overlay {

    border: 1px solid var(--border);

    .card-grid { grid-template-columns: 1fr; }

</head>
<body>
<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>查看历史日報</h3>
    <input type="date" class="date-picker" id="datePicker" value="2026-06-03" max="2026-06-03">
    <div class="modal-btns">
      <button class="modal-btn secondary" onclick="closeModal()">取消</button>
      <button class="modal-btn primary" onclick="goToDate()">前往</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="hero">
  <div class="hero-inner">
    <div class="hero-top">
      <span class="hero-badge">AI打卡网 · 每日晨报</span>
      <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">亮色模式</button>
    </div>
    <h1 class="hero-title" id="heroTitle">AI打卡网</h1>
    <p class="hero-subtitle" id="heroSubtitle">加载中…</p>
    <div class="hero-stats" id="heroStats"></div>
    <div class="donut-wrap" id="donutWrap">
      <svg class="donut-svg" id="donutSvg" width="100" height="100" viewBox="0 0 100 100"></svg>
      <div class="donut-legend" id="donutLegend"></div>
    </div>
  </div>
</div>

  <div class="nav-inner" id="navInner">
    <a class="nav-link active" href="#top" onclick="reloadToday()">全部</a>

      <button class="nav-date-btn" id="prevBtn" onclick="navigateDate(-1)">昨天</button>

      <button class="nav-date-btn" onclick="openModal()">日历</button>
    </div>
  </div>
</div>
<div class="toolbar">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="searchInput" type="text" placeholder="搜索标题、来源、摘要…" oninput="doSearch(this.value)">

  </div>

    <span id="readLabel"><span class="read-progress-label"><span class="icon">🕐</span><span>已打卡 0/0</span></span></span>
    <div class="read-bar"><div class="read-bar-fill" id="readBarFill" style="width:0%"></div></div>
  </div>
  <span class="search-count" id="searchCount"></span>
</div>
<div class="main" id="main">
  <div class="analytics-wrap" id="analyticsWrap"></div>
  <div id="noResults" class="no-results">
    <div class="no-results-icon">🔎</div>
    <p>没有找到匹配的资讯</p>
    <p style="font-size:12px; margin-top:6px">试试其他关键词？</p>
  </div>
</div>

mmary": "自进化Hermes智能体：随使用而改进的企业AI | Nemotron Labs", "category": "ai-products"}, {"id": "cmpwy5yga01v6sl7900pid5op", "title": "OpenClaw 与微软合作进入企业生态", "title_en": "\"You can run OpenClaw inside your company now.\" Annoucing our work with @Microsoft to bring OpenClaw…", "url": "https://x.com/openclaw/status/2061869633624580452", "source": "X：OpenClaw (@openclaw)", "publishedAt": "2026-06-02T17:56:42.000Z", "summary": "\"你现在可以在公司内部运行 OpenClaw 了。\" 宣布我们与 @Microsoft 的合作，将 OpenClaw 带入微软和 Windows 生态系统。Claws 现在可以在企业环境中安全运行。", "category": "ai-products"}, {"id": "cmpwxvkik01qzsl79wf8zf34a", "title": "GitHub Copilot应用：智能体原生的桌面体验", "title_en": "GitHub Copilot app： The agent-native desktop experience", "url": "https://github.blog/news-insights/product-news/github-copilot-app-the-agent-native-desktop-experience", "source": "GitHub Blog", "publishedAt": "2026-06-02T17:30:03.000Z", "summary": "在微软 Build 2026 大会上，GitHub 发布了新的工具和更新，并将 Copilot 应用定位为\"智能体原生的桌面体验\"。其核心目标是让 AI 智能体能够以用户已经习惯的方式进行工作。", "category": "ai-products"}, {"id": "cmpwwzyh801j7sl79ct5sj0pa", "title": "Google DeepMind 发布 Gemini 多智能体科研系统", "title_en": "We believe AI can be a dedicated research partner to help discover the next breakthrough. Enter Co-…", "url": "https://x.com/GoogleDeepMind/status/2061857539977842793", "source": "X：Google DeepMind (@GoogleDeepMind)", "publishedAt": "2026-06-02T17:08:39.000Z", "summary": "我们相信 AI 可以成为专属研究伙伴，帮助发现下一个突破。\n\n隆重推出 Co-Scientist：我们最新的基于 Gemini 的多智能体系统，能够为复杂科学问题生成、辩论和演进新颖的假设 🧵", "category": "ai-products"}, {"id": "cmpwvc9sl012csl79zvo91150", "title": "Claude Code团队实践：智能体编程如何重塑工程组织与流程", "title_en": "Running an AI-native engineering org", "url": "https://claude.com/blog/running-an-ai-native-engineering-org", "source": "Claude：Blog（网页）", "publishedAt": "2026-06-02T16:45:23.372Z", "summary": "在Code w/ Claude SF 2026活动上，Claude Code工程团队分享了将智能体编程设为默认工作方式后带来的流程与结构变革。核心变化包括：规划转向即时（JIT）模式，强调快速原型与反馈；上下文收集变为\"先问Claude\"；代码审查中Claude处理风格与测试，人工专注于法律、安全等专业判断。新范式下，工程瓶颈从编写代码转向验证、审查与安全维护。", "category": "tip"}, {"id": "cmpwv0pz000zusl79b2q9k21q", "title": "OpenAI Codex 发布 Python SDK，可直接嵌入应用", "title_en": "这个有点厉害，Codex 出 Python SDK了。 安装指令：pip install openai-codex 整合到自己的代码中，相当于直接内置了顶级编程和生图Agent？ 最关键的是，可…", "url": "https://x.com/vista8/status/2061846741885018296", "source": "X：Vista (@vista8)", "publishedAt": "2026-06-02T16:25:45.000Z", "summary": "这个有点厉害，Codex 出 Python SDK了。\n\n安装指令：pip install openai-codex\n\n整合到自己的代码中，相当于直接内置了顶级编程和生图Agent？\n\n最关键的是，可以复用 Codex 登录态。", "category": "ai-products"}, {"id": "cmpwux2bp00ybsl79gk8k3m4c", "title": "OpenAI Codex Sites 功能发布", "title_en": "Building apps has never been easier. With Sites， Codex can turn your work， ideas， and plans into an…", "url": "https://x.com/OpenAI/status/2061845949170045346", "source": "X：OpenAI (@OpenAI)", "publishedAt": "2026-06-02T16:22:36.000Z", "summary": "构建应用从未如此简单。\n通过 Sites，Codex 可以将你的工作、想法和计划转化为一个交互式网站或应用，你的团队可以通过一个 URL 进行探索、使用和分享。\n该功能将首先向 Business 和 Enterprise 计划推出，之后会更广泛地扩展。", "category": "ai-products"}, {"id": "cmpwurmxc00wcsl79be1mbjhr", "title": "DigitalOcean AI云服务上线OpenRouter", "title_en": "⚡ New provider drop： AI-Native Cloud from @digitalocean is now live on OpenRouter. High performance…", "url": "https://x.com/OpenRouter/status/2061840338973806961", "source": "X：OpenRouter (@OpenRouter)", "publishedAt": "2026-06-02T16:00:18.000Z", "summary": "⚡ 新增服务商：DigitalOcean 的 AI-Native Cloud 现已在 OpenRouter 上线。\n提供高性能推理，覆盖热门开源权重模型。在 DeepSeek V3.2 的输出速度和延迟方面排名第一（数据来自 @ArtificialAnlys）。\n查看其数据并试用模型：https：//openrouter.ai/provider/digitalocean", "category": "ai-products"}, {"id": "cmpwuner100vnsl79pq06judg", "title": "Replit Canvas 推出多项新功能", "title_en": "Replit Canvas has a few new updates！ ⭐️ Learn more at： http：//replit.com/canvas Open thread 🧵 ↓", "url": "https://x.com/Replit/status/2061840304534102036", "source": "X：Replit (@Replit)", "publishedAt": "2026-06-02T16:00:10.000Z", "summary": "Replit Canvas 有一些新更新！⭐️\n\n了解更多请访问：http：//replit.com/canvas\n\n展开讨论 🧵 ↓", "category": "ai-products"}, {"id": "cmpwuirwl00tisl79gfmq5mmf", "title": "Gary Marcus：为什么事情终将崩塌", "title_en": "Why things will eventually fall apart", "url": "https://garymarcus.substack.com/p/why-things-will-eventually-fall-apart", "source": "Gary Marcus：The Road to AI We Can Trust（RSS）", "publishedAt": "2026-06-02T15:41:57.000Z", "summary": "知名人工智能批评者Gary Marcus在其关于可信赖AI的专栏中，探讨了人工智能发展面临的根本性挑战。文章开篇即指向问题的核心，指出相关数学理论的局限性与人类心理的复杂性，是导致AI系统最终可能出现问题的根源。", "category": "tip"}, {"id": "cmpwrs3jx004wsl79yv419af3", "title": "商汤开源SenseNova-Skills AI办公技能套件", "title_en": "Power smarter AI agents with #SenseNova-Skills 🚀 An open-source AI o…", "url": "https://x.com/SenseTime_AI/status/2061822148076093625", "source": "X：商汤 SenseTime (@SenseTime_AI)", "publishedAt": "2026-06-02T14:48:01.000Z", "summary": "商汤开源了AI办公技能套件SenseNova-Skills。这是一个为任何技能兼容智能体（如OpenClaw与HermesAgent）设计的开源技能集合，提供四大核心功能：图像信息图表生成（可镜像参考风格）、数据分析（支持多表解析、清洗与可视化）、PPT创建（生成大纲内容并智能排版，输出可编辑文件）以及深度研究（跨学术、技术、社交等多源搜索并生成报告）。该技能套件现已完全开源。", "category": "tip"}, {"id": "cmpwqvwfa05cqslsncgvlgd9q", "title": "Holo3.1：快速本地计算机使用智能体", "title_en": "Holo3.1： Fast & Local Computer Use Agents", "url": "https://huggingface.co/blog/Hcompany/holo31", "source": "Hugging Face：Blog（RSS）", "publishedAt": "2026-06-02T14:13:23.000Z", "summary": "Holo3.1 是基于 Qwen 模型家族的计算机使用智能体系列，旨在提升在桌面、网页和移动环境中的鲁棒性。新模型提供 0.8B、4B、9B 和 35B-A3B 四种尺寸，并首次发布量化检查点，包括 FP8、Q4 GGUF 和 NVFP4，以优化本地推理。在 AndroidWorld 基准测试中，35B-A3B 模型得分从 67% 提升至 79.3%。在 DGX Spark 上，NVFP4 量化相比 BF16 实现 1.74 倍 token 吞吐量提升，并将平均步骤时间从 6.8 秒缩短至 3.3 秒。模型支持函数调用协议，可在第三方智能体框架中部署。", "category": "ai-models"}, {"id": "cmpwqmim605awslsn13ybjfuw", "title": "Nathan Lambert离开Ai2，结束2.5年OLMO等项目工作", "title_en": "My time at Ai2 / @allen_ai has come to an end. Ai2 is a wonderful place. The last 2.5+ years build…", "url": "https://x.com/natolambert/status/2061813361848029631", "source": "X：Nathan Lambert (@natolambert)", "publishedAt": "2026-06-02T14:13:06.000Z", "summary": "Ai2（Allen Institute for AI）研究员Nathan Lambert宣布离职。他在Ai2工作超过2.5年，期间主导或参与了OLMO和Tulu等开源模型项目，称其为职业生涯的巅峰。他表示将暂时休息，未来仍会继续深耕开源模型与开放科学领域。", "category": "industry"}, {"id": "cmpwq7j6k0562slsn6jkahkn5", "title": "MiniCPM-V 4.6 现已支持 vLLM v0.22.0", "title_en": "MiniCPM-V 4.6 is now fully supported in vLLM v0.22.0！ No custom branch. No extra compile. Just pull …", "url": "https://x.com/OpenBMB/status/2061810723169415205", "source": "X：面壁智能 OpenBMB (@OpenBMB)", "publishedAt": "2026-06-02T14:02:37.000Z", "summary": "MiniCPM-V 4.6 现已完全支持 vLLM v0.22.0！\n无需自定义分支，无需额外编译。\n只需拉取预构建包即可运行。\n非常感谢 @vllm_project 的顺畅集成！ 🤝\n🤗 http：//huggingface.co/openbmb/MiniCPM-V-4.6", "category": "ai-products"}, {"id": "cmpxkya4604y3slck1oyytsxu", "title": "世界模型与语言模型：论具体推理与抽象推理的互补性", "title_en": "World Models Meet Language Models： On the Complementarity of Concrete and Abstract Reasoning", "url": "https://arxiv.org/abs/2606.03603", "source": "HuggingFace Daily Papers（社区热门论文）", "publishedAt": "2026-06-02T13:07:49.000Z", "summary": "本研究探讨了世界模型与多模态大语言模型在预测未来状态时的互补性。世界模型可生成具体的视觉未来轨迹，但可能视觉合理却任务错误；多模态大语言模型则擅长抽象推理。为此，研究提出了\"受控的具体推理\"框架，并构建了VRQABench和OpenWorldQA两个基准。同时，提出了Privileged-Future On-Policy Self-Distillation（PF-OPSD）方法，该方法在训练时利用真实未来视频作为特权上下文评估推理轨迹，但部署时无需真实未来。实验结果显示，PF-OPSD在两个基准上分别比基线高出10.6%和10.9%，并提升了对噪声或冲突轨迹的鲁棒性。", "category": "paper"}, {"id": "cmpwndkv504h2slsnenpm5ynd", "title": "Gemini Spark：最令人印象深刻也最可怕的AI体验", "title_en": "Gemini Spark is the most impressive and terrifying AI experience I've had yet", "url": "https://www.theverge.com/ai-artificial-intelligence/941388/gemini-spark-ai-agent-trip-planning", "source": "The Verge：订阅版科技（RSS）", "publishedAt": "2026-06-02T12:38:08.000Z", "summary": "Google DeepMind的AI模型Gemini Spark提供了一次极为深刻但同时令人感到不安的用户体验。该模型展现的强大能力令人印象深刻，但其带来的影响和潜力也引发了深刻的恐惧感。", "category": "tip"}, {"id": "cmpwgl5go02q3slsnw6pl0fs5", "title": "Anthropic可解释性研究：区分因果效应相似的特征", "title_en": "Circuits Updates - May 2026", "url": "https://transformer-circuits.pub/2026/may-update/index.html", "source": "Anthropic：Transformer Circuits（可解释性研究）", "publishedAt": "2026-06-02T09:52:20.287Z", "summary": "Anthropic可解释性团队介绍了其Circuits研究的新进展。为区分那些激活模式相似但因果效应不同的模型特征，团队提出一种新方法。该方法通过分析特征的下游连接来预测其实际影响，并使用基于共激活统计的TWERA（虚拟权重）对连接进行加权排序。实验表明，借助下游连接信息能更准确地判断哪个特征会引导特定输出。此方法为识别模型内部真正的因果组件提供了新途径。", "category": "paper"}, {"id": "cmpwf05rk02d5slsnyqog4n3x", "title": "SK会长崔泰源：SK海力士计划未来五年内晶圆产能翻倍", "title_en": "SK 会长崔泰源：计划未来五年内，SK 海力士晶圆产能实现翻倍", "url": "https://www.ithome.com/0/958/810.htm", "source": "IT之家（RSS）", "publishedAt": "2026-06-02T08:31:12.000Z", "summary": "SK海力士会长崔泰源宣布，计划在未来五年内将整体晶圆产能提高一倍，以应对AI普及带来的持续存储供应短缺。他预测AI数据中心和AI PC的普及将持续拉动存储需求，供需紧张局面可能延续至2030年。SK海力士将投入大规模资金用于设备、建设等扩张，尽管面临前置时间长（新建晶圆厂至少三年）和资源成本上涨等挑战。目前，SK海力士市值已首次突破1万亿美元。", "category": "industry"}, {"id": "cmpwrifyw0017sl79bcjk20i4", "title": "OpenAI呼吁通过全球领导力推进青年AI安全与机遇", "title_en": "Advancing youth safety and opportunity through global leadership", "url": "https://openai.com/index/advancing-youth-safety-and-opportunity-through-global-leadership", "source": "OpenAI：官网动态（RSS · 排除企业/客户案例）", "publishedAt": "2026-06-02T07:00:00.000Z", "summary": "OpenAI呼吁通过设立专门的AI安全研究所，在全球范围内采取行动，以保障青少年在使用AI时的安全，并创造更多发展机遇。", "category": "industry"}, {"id": "cmpwtn26i00l3sl79dy8bjnhq", "title": "为什么金融机构正汇聚在交易基础模型上来构建自身智能", "title_en": "Why Financial Institutions Are Converging on Transaction Foundation Models to Build Their Own Intelligence", "url": "https://blogs.nvidia.com/blog/financial-institutions-transaction-foundation-models", "source": "NVIDIA AI Blog", "publishedAt": "2026-06-02T06:00:36.000Z", "summary": "金融机构正从为每个业务线构建独立AI模型，转向采用基于Transformer的交易基础模型，以统一理解消费者行为并克服数据孤岛限制。NVIDIA报告显示，65%的金融机构已使用AI，近90%正在部署或评估。实践案例包括：Revolut与NVIDIA合作构建了PRAGMA模型系列，在240亿事件上训练，单个模型在信用评分等领域超越特定任务模型；Mastercard正开发专有大型表格基础模型；Adyen的模型处理了1万亿美元支付；Stripe利用相关平台构建模型，去年阻止了近1120亿美元欺诈。", "category": "ai-products"}, {"id": "cmpw5sd9k00agsl1un4z8njv7", "title": "为了不花那120刀，我把电脑清理软件做成了开源skill", "title_en": "http：//x.com/i/article/2061667400723156992", "url": "https://x.com/Khazix0918/status/2061669881725309048", "source": "X：卡兹克 (@Khazix0918)", "publishedAt": "2026-06-02T04:42:58.000Z", "summary": "作者受一条推文启发，使用Codex对自己的MacBook进行了只读存储分析，发现了B站缓存视频等大量可清理空间（激进方案超140G）。为替代收费软件CleanMyMac，作者制作并开源了一个跨平台（支持Mac/Windows）的AI清理skill。该skill会扫描文件并生成可交互的HTML报告，通过三色分级（绿灯可放心清理、黄灯需人工判断、红灯禁止动）直观展示，并提供安全执行按钮。实测清理后释放了近120G空间，相比CleanMyMac仅扫描出的15.8G，其信息更透明、建议更详细。", "category": "tip"}, {"id": "cmpwf5ekt02dvslsnxsj6m2rp", "title": "Codex正在成为每个人的生产力工具", "title_en": "Codex is becoming a productivity tool for everyone", "url": "https://openai.com/index/codex-for-knowledge-work", "source": "OpenAI：官网动态（RSS · 排除企业/客户案例）", "publishedAt": "2026-06-02T02:00:00.000Z", "summary": "The Next Era of Knowledge Work报告指出，Codex正通过AI增强的研究、数据分析、工作流自动化与内容创作，变革知识工作的生产力。", "category": "paper"}, {"id": "cmpvzrkrk0347slukwn0rkg8r", "title": "NVIDIA JetPack 7.2支持内存优化的边缘智能体部署", "title_en": "Deploy Agentic-Ready AI at the Edge with Memory Efficiency in NVIDIA JetPack 7.2", "url": "https://developer.nvidia.com/blog/deploy-agentic-ready-ai-at-the-edge-with-memory-efficiency-in-nvidia-jetpack-7-2", "source": "NVIDIA Technical Blog（开发者技术博客 · RSS）", "publishedAt": "2026-06-02T02:00:00.000Z", "summary": "NVIDIA JetPack 7.2发布，支持一键部署开源NVIDIA NemoClaw堆栈，该堆栈为OpenClaw添加了隐私与安全控制。同时引入NVIDIA agent skills for Jetson，为Jetson设备提供智能体技能。该版本优化了内存效率，旨在加速AI代理从数字世界向物理环境的边缘部署。", "category": "ai-products"}], "sections": [{"label": "模型发布/更新", "slug": "ai-models", "count": 2, "items": [{"idx": 1, "title": "微软首款高级推理AI模型MAI-Thinking-1发布", "summary": "微软在Build 2026上发布了其首款高级推理AI模型MAI-Thinking-1。该模型被定位为\"中等规模\"，能在\"关键\"软件工程基准测试中达到领先模型的水平。微软称其完全从头使用干净数据进行训练，未涉及从第三方模型进行知识蒸馏。这标志着微软在自研AI模型上迈出重要一步，此前其主要依赖OpenAI。近期两家公司已重新协商合作协议，关系有所松绑。", "publishedAt": "2026-06-02T18:12:44.000Z", "category": "ai-models", "sourceName": "The Verge：AI（RSS）", "sourceUrl": "https://www.theverge.com/tech/941664/microsoft-ai-model-reasoning-mai-thinking-1-build-2026"}, {"idx": 2, "title": "Holo3.1：快速本地计算机使用智能体", "summary": "Holo3.1 是基于 Qwen 模型家族的计算机使用智能体系列，旨在提升在桌面、网页和移动环境中的鲁棒性。新模型提供 0.8B、4B、9B 和 35B-A3B 四种尺寸，并首次发布量化检查点，包括 FP8、Q4 GGUF 和 NVFP4，以优化本地推理。在 AndroidWorld 基准测试中，35B-A3B 模型得分从 67% 提升至 79.3%。在 DGX Spark 上，NVFP4 量化相比 BF16 实现 1.74 倍 token 吞吐量提升，并将平均步骤时间从 6.8 秒缩短至 3.3 秒。模型支持函数调用协议，可在第三方智能体框架中部署。", "publishedAt": "2026-06-02T14:13:23.000Z", "category": "ai-models", "sourceName": "Hugging Face：Blog（RSS）", "sourceUrl": "https://huggingface.co/blog/Hcompany/holo31"}]}, {"label": "产品发布/更新", "slug": "ai-products", "count": 21, "items": [{"idx": 3, "title": "Meta 面向 WhatsApp Business 的 AI 智能体现已全球上线", "summary": "Meta 为 WhatsApp Business 打造的 AI 智能体面向全球商家开放，将按照模型 token 使用量向企业收费。", "publishedAt": "2026-06-03T13:40:00.000Z", "category": "ai-products", "sourceName": "TechCrunch：AI（RSS）", "sourceUrl": "https://techcrunch.com/2026/06/03/metas-ai-agent-for-whatsapp-business-is-now-available-globally"}, {"idx": 4, "title": "介绍 Claude Partner Network 的 Services Track 和 Partner Hub", "summary": "Anthropic 扩展 Claude Partner Network，推出 Services Track 分级体系和 Partner Hub 门户。Services Track 设 Select、Preferred、Global Premier 三级，按认证人数、投产客户数及客户推荐信量化评定。Partner Hub 提供每日更新仪表盘和公开目录，方便合作伙伴查看进展、客户寻找供应商。该网络三月启动以来已有超 4 万家公司申请，逾 1 万顾问获认证；Accenture 训练 3 万人，Cognizant 部署约 35 万员工，Deloitte 惠及 47 万人，KPMG 覆盖 27.6 万，Infosys 构建行业智能体，PwC 先在美推广再扩至全球。", "publishedAt": "2026-06-03T13:30:21.674Z", "category": "ai-products", "sourceName": "Anthropic：Newsroom（网页）", "sourceUrl": "https://www.anthropic.com/news/services-track-partner-hub"}, {"idx": 5, "title": "NousResearch 发布 Hermes Agent 桌面应用公测版", "summary": "官方 Hermes Agent 桌面应用现已推出！", "publishedAt": "2026-06-03T05:24:52.000Z", "category": "ai-products", "sourceName": "X：硅基流动 SiliconFlow (@SiliconFlowAI)", "sourceUrl": "https://x.com/SiliconFlowAI/status/2062042813852995899"}, {"idx": 6, "title": "Google DeepMind 开源科学智能体工具包", "summary": "构建用于科学发现的自主智能体？🧬🤖\n\n@GoogleDeepMind Science Skills 现已在 GitHub 上发布。我们已开源这个专用工具包，以科学基础和更高的 token 效率加速您的智能体工作流。\n\n立即下载 ↓\nhttps：//github.com/google-deepmind/science-skills", "publishedAt": "2026-06-02T21:34:37.000Z", "category": "ai-products", "sourceNa AI Blog", "sourceUrl": "https://blogs.nvidia.com/blog/financial-institutions-transaction-foundation-models"}, {"idx": 23, "title": "NVIDIA JetPack 7.2支持内存优化的边缘智能体部署", "summary": "NVIDIA JetPack 7.2发布，支持一键部署开源NVIDIA NemoClaw堆栈，该堆栈为OpenClaw添加了隐私与安全控制。同时引入NVIDIA agent skills for Jetson，为Jetson设备提供智能体技能。该版本优化了内存效率，旨在加速AI代理从数字世界向物理环境的边缘部署。", "publishedAt": "2026-06-02T02:00:00.000Z", "category": "ai-products", "sourceName": "NVIDIA Technical Blog（开发者技术博客 · RSS）", "sourceUrl": "https://developer.nvidia.com/blog/deploy-agentic-ready-ai-at-the-edge-with-memory-efficiency-in-nvidia-jetpack-7-2"}]}, {"label": "行业动态", "slug": "industry", "count": 11, "items": [{"idx": 24, "title": "欧盟公布全面技术主权计划，推动芯片与AI自主发展", "summary": "欧盟公布一项全面技术主权计划，旨在扩大本土半导体、人工智能和云计算供应链，以减少对美国和亚洲的依赖。该计划覆盖芯片制造、AI基础设施及云计算服务等多个关键领域，目标是增强欧洲在核心技术上的自主能力。", "publishedAt": "2026-06-03T12:12:15.000Z", "category": "industry", "sourceName": "Bloomberg：Technology（RSS）", "sourceUrl": "https://www.bloomberg.com/news/articles/2026-06-03/europe-unveils-sweeping-tech-sovereignty-plan-to-boost-chips-ai"}, {"idx": 25, "title": "Qwen Cloud全球AI黑客马拉松启动", "summary": "首届Qwen Cloud全球AI黑客马拉松现已启动！\n\n参与5大高级赛道，在全球舞台上挑战AI智能体极限。\n\n总奖金池超过70，000美元（赛道冠军1万美元）。\n\n立即在Devpost报名：https：//click.qwencloud.com/m/20000000281/", "publishedAt": "2026-06-03T10:05:06.000Z", "category": "industry", "sourceName": "X：阿里云 / Alibaba Cloud (@alibaba_cloud)", "sourceUrl": "https://x.com/alibaba_cloud/status/2062113338994172169"}, {"idx": 26, "title": "消息称 DeepSeek 首轮融资拟筹集 500 亿元，腾讯、宁德时代等参投", "summary": "DeepSeek 计划在首轮融资中从腾讯、宁德时代等投资方处筹集约 500 亿元人民币。融资落地后，其投后估值预计在 3500 亿至 4000 亿元。创始人梁文峰将出资 200 亿元，腾讯和宁德时代分别拟投资 100 亿元和 50 亿元，成为最大外部投资者。DeepSeek 去年凭借 V3 大模型与 R1 推理模型获得广泛认可。此次融资凸显了中国正打造从大模型到算力能源基建的全链条 AI 产业。", "publishedAt": "2026-06-03T04:36:30.000Z", "category": "industry", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/959/249.htm"}, {"idx": 27, "title": "Satya Nadella 谈微软 Build 大会主旨演讲", "summary": "与我们共同构建前沿智能生态系统。\n\n今早我在 Microsoft Build 上的主旨演讲亮点。", "publishedAt": "2026-06-03T04:02:24.000Z", "category": "industry", "sourceName": "X：Satya Nadella (@satyanadella)", "sourceUrl": "https://x.com/satyanadella/status/2062022060176801826"}, {"idx": 28, "title": "宏利香港与阿里云达成AI战略合作", "summary": "宏利香港宣布与阿里云建立战略合作伙伴关系，旨在构建一个专注于推进负责任的AI创新，并加速AI技术在业务中部署的合作框架。", "publishedAt": "2026-06-03T03:00:56.000Z", "category": "industry", "sourceName": "X：阿里云 / Alibaba Cloud (@alibaba_cloud)", "sourceUrl": "https://x.com/alibaba_cloud/status/2062006591377829922"}, {"idx": 29, "title": "Sensor Tower：OpenAI 旗下 ChatGPT 月活已破 10 亿，史上最快", "summary": "据市场情报机构 Sensor Tower 估计，OpenAI 旗下 ChatGPT 全球月活跃用户在 2025 年 5 月突破 10 亿，成为达成此里程碑最快的应用，增速超过 Google Maps、TikTok 等。同期，其竞争对手 Anthropic 的 Claude 月活达 5600 万，同比增幅约 640%，增长势头迅猛。数据显示，部分用户已开始在 Claude 与 ChatGPT 间切换使用。在达成用户里程碑之际，Anthropic 已秘密递交 IPO 申请，OpenAI 也计划筹备上市。", "publishedAt": "2026-06-03T01:31:15.000Z", "category": "industry", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/959/083.htm"}, {"idx": 30, "title": "Anthropic支持美国AI行政令实施", "summary": "这项行政令是加强美国AI领导地位的重要一步。\n\n我们期待与白宫合作，支持其实施。\n\nhttps：//www.whitehouse.gov/presidential-actions/2026/06/promoting-advanced-artificial-intelligence-innovation-and-security/", "publishedAt": "2026-06-02T21:35:03.000Z", "category": "industry", "sourceName": "X：Anthropic (@AnthropicAI)", "sourceUrl": "https://x.com/AnthropicAI/status/2061924580222968183"}, {"idx": 31, "title": "Alphabet拟融资800亿美元 Anthropic提交IPO申请", "summary": "Alphabet宣布拟通过股权融资800亿美元，用于扩展AI基础设施。Anthropic已秘密提交IPO申请，在上市竞赛中领先于竞争对手OpenAI。此外，SpaceX正与华尔街机构协商其IPO的承销费用，HPE则因AI基础设施需求旺盛，年度销售预期超出市场估计。", "publishedAt": "2026-06-02T18:39:17.000Z", "category": "industry", "sourceName": "Bloomberg：Technology（RSS）", "sourceUrl": "https://www.bloomberg.com/news/videos/2026-06-02/bloomberg-tech-6-2-2026-video"}, {"idx": 32, "title": "Nathan Lambert离开Ai2，结束2.5年OLMO等项目工作", "summary": "Ai2（Allen Institute for AI）研究员Nathan Lambert宣布离职。他在Ai2工作超过2.5年，期间主导或参与了OLMO和Tulu等开源模型项目，称其为职业生涯的巅峰。他表示将暂时休息，未来仍会继续深耕开源模型与开放科学领域。", "publishedAt": "2026-06-02T14:13:06.000Z", "category": "industry", "sourceName": "X：Nathan Lambert (@natolambert)", "sourceUrl": "https://x.com/natolambert/status/2061813361848029631"}, {"idx": 33, "title": "SK会长崔泰源：SK海力士计划未来五年内晶圆产能翻倍", "summary": "SK海力士会长崔泰源宣布，计划在未来五年内将整体晶圆产能提高一倍，以应对AI普及带来的持续存储供应短缺。他预测AI数据中心和AI PC的普及将持续拉动存储需求，供需紧张局面可能延续至2030年。SK海力士将投入大规模资金用于设备、建设等扩张，尽管面临前置时间长（新建晶圆厂至少三年）和资源成本上涨等挑战。目前，SK海力士市值已首次突破1万亿美元。", "publishedAt": "2026-06-02T08:31:12.000Z", "category": "industry", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/958/810.htm"}, {"idx": 34, "title": "OpenAI呼吁通过全球领导力推进青年AI安全与机遇", "summary": "OpenAI呼吁通过设立专门的AI安全研究所，在全球范围内采取行动，以保障青少年在使用AI时的安全，并创造更多发展机遇。", "publishedAt": "2026-06-02T07:00:00.000Z", "category": "industry", "sourceName": "OpenAI：官网动态（RSS · 排除企业/客户案例）", "sourceUrl": "https://openai.com/index/advancing-youth-safety-and-opportunity-through-global-leadership"}]}, {"label": "论文研究", "slug": "paper", "count": 6, "items": [{"idx": 35, "title": "Anthropic 分析 832 个 AI 恶意账户：中高风险攻击者半年从 33% 跃至 56%", "summary": "Anthropic 分析 2025 年 3 月至 2026 年 3 月间 832 个被封禁的恶意账户，映射至 MITRE ATT&CK 框架。67.3% 使用 AI 编写恶意软件，6.5% 用于横向移动。六个月间中高风险攻击者占比从 33% 升至 56%。AI 用于账户发现增长 8.9%，AI 辅助钓鱼下降 8.6%。传统基于技术数量或平台（Claude Code、API、聊天界面）的威胁评估失效，而 MITRE ATT&CK 框架尚未收录此类智能体编排行为。", "publishedAt": "2026-06-03T09:51:21.088Z", "category": "paper", "sourceName": "Anthropic：Research（发表成果 · 网页）", "sourceUrl": "https://www.anthropic.com/news/AI-enabled-cyber-threats-mitre-attack"}, {"idx": 36, "title": "斯坦福大学法学院研究：人工智能的表现优于法学教授", "summary": "斯坦福大学法学院的一项研究表明，人工智能的表现优于法学教授。该发现引发了广泛关注，在Hacker News平台获得了104个Points。", "publishedAt": "2026-06-03T02:33:56.784Z", "category": "paper", "sourceName": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://law.stanford.edu/press/ai-outperforms-law-professors-in-stanford-law-study"}, {"idx": 37, "title": "微软研究：Aurora天气预报速度超传统超算数千倍", "summary": "天气预报速度比传统超级计算机快数千倍。听听Kenji Takeda在#MSBuild微软研究实验室关于Aurora的分享。了解更多：https：//msft.it/6018vjGUA", "publishedAt": "2026-06-02T21:45:25.000Z", "category": "paper", "sourceName": "X：Microsoft Research (@MSFTResearch)", "sourceUrl": "https://x.com/MSFTResearch/status/2061927189977727450"}, {"idx": 38, "title": "世界模型与语言模型：论具体推理与抽象推理的互补性", "summary": "本研究探讨了世界模型与多模态大语言模型在预测未来状态时的互补性。世界模型可生成具体的视觉未来轨迹，但可能视觉合理却任务错误；多模态大语言模型则擅长抽象推理。为此，研究提出了\"受控的具体推理\"框架，并构建了VRQABench和OpenWorldQA两个基准。同时，提出了Privileged-Future On-Policy Self-Distillation（PF-OPSD）方法，该方法在训练时利用真实未来视频作为特权上下文评估推理轨迹，但部署时无需真实未来。实验结果显示，PF-OPSD在两个基准上分别比基线高出10.6%和10.9%，并提升了对噪声或冲突轨迹的鲁棒性。", "publishedAt": "2026-06-02T13:07:49.000Z", "category": "paper", "sourceName": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2606.03603"}, {"idx": 39, "title": "Anthropic可解释性研究：区分因果效应相似的特征", "summary": "Anthropic可解释性团队介绍了其Circuits研究的新进展。为区分那些激活模式相似但因果效应不同的模型特征，团队提出一种新方法。该方法通过分析特征的下游连接来预测其实际影响，并使用基于共激活统计的TWERA（虚拟权重）对连接进行加权排序。实验表明，借助下游连接信息能更准确地判断哪个特征会引导特定输出。此方法为识别模型内部真正的因果组件提供了新途径。", "publishedAt": "2026-06-02T09:52:20.287Z", "category": "paper", "sourceName": "Anthropic：Transformer Circuits（可解释性研究）", "sourceUrl": "https://transformer-circuits.pub/2026/may-update/index.html"}, {"idx": 40, "title": "Codex正在成为每个人的生产力工具", "summary": "The Next Era of Knowledge Work报告指出，Codex正通过AI增强的研究、数据分析、工作流自动化与内容创作，变革知识工作的生产力。", "publishedAt": "2026-06-02T02:00:00.000Z", "category": "paper", "sourceName": "OpenAI：官网动态（RSS · 排除企业/客户案例）", "sourceUrl": "https://openai.com/index/codex-for-knowledge-work"}]}, {"label": "技巧与观点", "slug": "tip", "count": 10, "items": [{"idx": 41, "title": "超越聊天机器人的直接偏好优化", "summary": "Dharma-AI 在 Hugging Face 博客发文，探讨直接偏好优化（Direct Preference Optimization，DPO）在聊天机器人之外的更广泛应用场景。", "publishedAt": "2026-06-03T12:55:11.000Z", "category": "tip", "sourceName": "Hugging Face：Blog（RSS）", "sourceUrl": "https://huggingface.co/blog/Dharma-AI/direct-preference-optimization-beyond-chatbots"}, {"idx": 42, "title": "Karpathy 的 llm-wiki 项目获超五千星", "summary": "@karpathy 的 llm-wiki 在几周内获得了 5，000+ 颗星。\n\n其理念是：停止在每个会话中重新发现知识。让一个大语言模型构建并维护一个维基，每次使用时它都会变得更智能。\n\n以下是如何使用 @opencode + @justsisyphus OMO + SiliconFlow 构建你自己的版本 🧵", "publishedAt": "2026-06-03T06:12:41.000Z", "category": "tip", "sourceName": "X：硅基流动 SiliconFlow (@SiliconFlowAI)", "sourceUrl": "https://x.com/SiliconFlowAI/status/2062054848762450324"}, {"idx": 43, "title": "智能体工程实战窍门全录", "summary": "该内容源自@mvanhorn的分享，介绍了\"智能体工程\"如何重塑软件开发。其核心是从\"人主导编码\"转向\"人主导方向、智能体执行\"，中心从IDE变为终端与计划文件。方法论遵循Research → Plan → Work循环，核心是让plan.md约束智能体行为。分享者总结了22条实战技巧，涵盖规划、并行执行、输入方式、远程控制等方面，并列出了完整的工具栈。", "publishedAt": "2026-06-03T00:55:20.000Z", "category": "tip", "sourceName": "X：邵猛 (@shao__meng)", "sourceUrl": "https://x.com/shao__meng/status/2061974983094755575"}, {"idx": 44, "title": "智能性价比", "summary": "微软在模型发布卡中首次加入平均token使用量指标。其模型在SWE-Bench Verified上达71.6分，仅消耗约Claude Haiku 4.5三分之一的token。Artificial Analysis的Intelligence Index显示GPT 5.5与Claude Opus 4.8得分相近（约60分），但Opus 4.8运行成本高出40%（$4，685 vs $3，357）。Uber因四个月内AI预算超支而限制员工使用；Salesforce花费$3亿购买Anthropic tokens并冻结工程招聘。模型公司如今需同时在性能和成本两个维度竞争。", "publishedAt": "2026-06-03T00:00:00.000Z", "category": "tip", "sourceName": "Tomer Tunguz 博客（VC 分析）", "sourceUrl": "https://www.tomtunguz.com/tokens-per-result"}, {"idx": 45, "title": "Claude Code 自我检查与反馈闭环技巧", "summary": "如何让 Claude Code 在交回工作前检查自己的成果？\n看看如何编码你的手动检查，让 Claude 自己关闭反馈循环：", "publishedAt": "2026-06-02T19:59:06.000Z", "category": "tip", "sourceName": "X：Claude Devs (@ClaudeDevs)", "sourceUrl": "https://x.com/ClaudeDevs/status/2061900434722496604"}, {"idx": 46, "title": "Claude Code团队实践：智能体编程如何重塑工程组织与流程", "summary": "在Code w/ Claude SF 2026活动上，Claude Code工程团队分享了将智能体编程设为默认工作方式后带来的流程与结构变革。核心变化包括：规划转向即时（JIT）模式，强调快速原型与反馈；上下文收集变为\"先问Claude\"；代码审查中Claude处理风格与测试，人工专注于法律、安全等专业判断。新范式下，工程瓶颈从编写代码转向验证、审查与安全维护。", "publishedAt": "2026-06-02T16:45:23.372Z", "category": "tip", "sourceName": "Claude：Blog（网页）", "sourceUrl": "https://claude.com/blog/running-an-ai-native-engineering-org"}, {"idx": 47, "title": "Gary Marcus：为什么事情终将崩塌", "summary": "知名人工智能批评者Gary Marcus在其关于可信赖AI的专栏中，探讨了人工智能发展面临的根本性挑战。文章开篇即指向问题的核心，指出相关数学理论的局限性与人类心理的复杂性，是导致AI系统最终可能出现问题的根源。", "publishedAt": "2026-06-02T15:41:57.000Z", "category": "tip", "sourceName": "Gary Marcus：The Road to AI We Can Trust（RSS）", "sourceUrl": "https://garymarcus.substack.com/p/why-things-will-eventually-fall-apart"}, {"idx": 48, "title": "商汤开源SenseNova-Skills AI办公技能套件", "summary": "商汤开源了AI办公技能套件SenseNova-Skills。这是一个为任何技能兼容智能体（如OpenClaw与HermesAgent）设计的开源技能集合，提供四大核心功能：图像信息图表生成（可镜像参考风格）、数据分析（支持多表解析、清洗与可视化）、PPT创建（生成大纲内容并智能排版，输出可编辑文件）以及深度研究（跨学术、技术、社交等多源搜索并生成报告）。该技能套件现已完全开源。", "publishedAt": "2026-06-02T14:48:01.000Z", "category": "tip", "sourceName": "X：商汤 SenseTime (@SenseTime_AI)", "sourceUrl": "https://x.com/SenseTime_AI/status/2061822148076093625"}, {"idx": 49, "title": "Gemini Spark：最令人印象深刻也最可怕的AI体验", "summary": "Google DeepMind的AI模型Gemini Spark提供了一次极为深刻但同时令人感到不安的用户体验。该模型展现的强大能力令人印象深刻，但其带来的影响和潜力也引发了深刻的恐惧感。", "publishedAt": "2026-06-02T12:38:08.000Z", "category": "tip", "sourceName": "The Verge：订阅版科技（RSS）", "sourceUrl": "https://www.theverge.com/ai-artificial-intelligence/941388/gemini-spark-ai-agent-trip-planning"}, {"idx": 50, "title": "为了不花那120刀，我把电脑清理软件做成了开源skill", "summary": "作者受一条推文启发，使用Codex对自己的MacBook进行了只读存储分析，发现了B站缓存视频等大量可清理空间（激进方案超140G）。为替代收费软件CleanMyMac，作者制作并开源了一个跨平台（支持Mac/Windows）的AI清理skill。该skill会扫描文件并生成可交互的HTML报告，通过三色分级（绿灯可放心清理、黄灯需人工判断、红灯禁止动）直观展示，并提供安全执行按钮。实测清理后释放了近120G空间，相比CleanMyMac仅扫描出的15.8G，其信息更透明、建议更详细。", "publishedAt": "2026-06-02T04:42:58.000Z", "category": "tip", "sourceName": "X：卡兹克 (@Khazix0918)", "sourceUrl": "https://x.com/Khazix0918/status/2061669881725309048"}]}]}
</script>
<script>
const EMBEDDED_DATA = JSON.parse(document.getElementById("dataSrc").textContent);
const SECTION_CONFIG = {"模型发布/更新": {"icon": "🤖", "color": "#7f6af0"}, "产品发布/更新": {"icon": "📦", "color": "#e8622a"}, "行业动态": {"icon": "🏭", "color": "#1d9e75"}, "论文研究": {"icon": "📄", "color": "#378add"}, "技巧与观点": {"icon": "💡", "color": "#e8a020"}};
const DAILY_STR = "2026-06-03";
const DAILY_MAX = "2026-06-03";

let currentData = null;
let currentDate = DAILY_STR;
let readSet = new Set();
let showOnlyUnread = false;
let currentFilter = 'all';
let currentSearch = '';
let isDark = true;

function reloadToday() {
  location.reload();
}
window.addEventListener('DOMContentLoaded', function() {
  try { readSet = new Set(JSON.parse(localStorage.getItem('aidaka_read_' + currentDate) || '[]')); } catch(e) {}
  try {
    var saved = localStorage.getItem('aidaka_theme');
    if (saved === 'light') { isDark = false; document.body.classList.add('light'); }
  } catch(e) {}
  updateThemeBtn();
  renderAll(EMBEDDED_DATA);
  setTimeout(function() {
    document.getElementById('loadingOverlay').style.opacity = '0';
    setTimeout(function() { document.getElementById('loadingOverlay').style.display = 'none'; }, 400);
  }, 300);
});

function renderAll(data) {
  currentData = data;
  var sections = data.sections || [];
  var total = sections.reduce(function(a, s) { return a + s.items.length; }, 0);
  var dateStr = fmtDate(data.date);
  document.getElementById('heroTitle').textContent = 'AI打卡网 · ' + dateStr;
  var gen = data.generatedAt ? new Date(data.generatedAt) : new Date();
  document.getElementById('heroSubtitle').textContent = '共收录 ' + total + ' 条资讯 · 来源精选 · 生成于 ' + relTime(gen);
  document.getElementById('navDateLabel').textContent = data.date;
  document.title = 'AI打卡网 · ' + data.date + ' (' + total + '条)';

  var statsEl = document.getElementById('heroStats');
  statsEl.innerHTML = '<div class="stat-chip" onclick="reloadToday()" title="刷新今日数据"><div class="num">' + total + '</div><div class="lbl">今日总条数</div></div>'
    + sections.map(function(s) {
      var cfg = SECTION_CONFIG[s.label] || { icon: '📌', color: '#888' };
      return '<div class="stat-chip" onclick="filterSection(\'' + s.label.replace(/'/g, "\\'") + '\'); scrollToSection(\'' + s.label.replace(/'/g, "\\'") + '\');" title="跳转到 ' + s.label + '"><div class="num" style="font-size:22px">' + cfg.icon + '</div><div class="lbl">' + s.label.replace('/更新','').replace('/观点','') + ' ' + s.items.length + '</div></div>';
    }).join('');

  renderDonut(sections);
  var navEl = document.getElementById('navInner');
  var dateArea = navEl.querySelector('.nav-date-area');
  navEl.querySelectorAll('.nav-sec-link').forEach(function(el) { el.remove(); });
  sections.forEach(function(s) {
    var cfg = SECTION_CONFIG[s.label] || { icon: '📌', color: '#888' };
    var a = document.createElement('a');
    a.className = 'nav-link nav-sec-link';
    a.href = '#sec-' + slugify(s.label);
    a.innerHTML = cfg.icon + ' ' + s.label + ' <span class="nav-badge">' + s.items.length + '</span>';
    a.onclick = function(e) { e.preventDefault(); filterSection(s.label, a); scrollToSection(s.label); };
    navEl.insertBefore(a, dateArea);
  });
  renderAnalytics(sections);
  var main = document.getElementById('main');
  main.querySelectorAll('.dyn-section').forEach(function(el) { el.remove(); });
  var globalIdx = 0;
  var frag = document.createDocumentFragment();
  sections.forEach(function(s) {
    var cfg = SECTION_CONFIG[s.label] || { icon: '📌', color: '#888' };
    var secDiv = document.createElement('div');
    secDiv.className = 'dyn-section';
    secDiv.id = 'sec-' + slugify(s.label);
    var header = document.createElement('div');
    header.className = 'section-header';
    header.innerHTML = '<div class="section-icon" style="background:' + cfg.color + '22; color:' + cfg.color + '">' + cfg.icon + '</div>'
      + '<span class="section-title">' + s.label + '</span>'
      + '<span class="section-count">' + s.items.length + ' 条</span>';
    secDiv.appendChild(header);
    if (s.items.length === 0) {
      secDiv.innerHTML += '<p style="color:var(--text3);font-size:13px;padding:12px 0">今日暂无相关资讯</p>';
    } else {
      var grid = document.createElement('div');
      grid.className = 'card-grid';
      s.items.forEach(function(item) {
        globalIdx++;
        var cardEl = buildCard(item, globalIdx);
        grid.appendChild(cardEl);
      });
      secDiv.appendChild(grid);
    }
    frag.appendChild(secDiv);
  });
  main.insertBefore(frag, main.querySelector('#noResults'));
  updateReadProgress(total);
  updateDateNav(data.date);
  document.getElementById('footerEl').innerHTML = '共 ' + total + ' 条资讯 · 数据来源 <a href="https://aihot.virxact.com" target="_blank" rel="noopener noreferrer" style="color:var(--accent)">aihot.virxact.com</a> · AI打卡网 每日晨报';
  setTimeout(initScrollAnim, 100);
}

function buildCard(item, idx) {
  var isRead = readSet.has(String(idx));
  var card = document.createElement('div');
  card.className = 'card' + (isRead ? ' read' : '');
  card.dataset.idx = idx;
  card.dataset.title = (item.title || '').toLowerCase();
  card.dataset.summary = (item.summary || '').toLowerCase();
  card.dataset.source = (item.sourceName || '').toLowerCase();
  var srcShort = shortSource(item.sourceName || '');
  var titleSafe = escHtml(item.title || '');
  var sourceNameSafe = escHtml(item.sourceName || '');
  var summaryRaw = item.summary || '';
  // Truncate summary to ~60 chars for display
  var summaryShort = summaryRaw.length > 65 ? summaryRaw.slice(0, 62) + '...' : summaryRaw;
  var summarySafe = escHtml(summaryShort);
  var summaryFull = escHtml(summaryRaw);
  var timeStr = item.publishedAt ? relTimeStr(item.publishedAt) : '';
  var sourceHtml = item.sourceUrl ? '<a class="source-btn" href="' + escHtml(item.sourceUrl) + '" target="_blank" rel="noopener noreferrer">原文</a>' : '';

  var inner = '<div class="card-header"><span class="card-num">' + idx + '</span><span class="card-title">' + titleSafe + '</span></div>';
  if (timeStr) { inner += '<span class="time-badge">' + escHtml(timeStr) + '</span>'; }
  inner += '<span class="card-source" title="' + sourceNameSafe + '">' + escHtml(srcShort) + '</span>'
    + '<div class="card-summary collapsed" id="sum-' + idx + '" data-full="' + escHtml(summaryRaw).replace(/"/g, '&quot;') + '">' + summarySafe + '</div>'
    + '<div class="card-footer">'
    + '<button class="expand-btn" onclick="toggleExpand(' + idx + ', this)">展开全文</button>'
    + '<div style="display:flex;gap:8px">'
    + '<button class="read-btn" onclick="markRead(' + idx + ', this)" id="rbtn-' + idx + '">' + (isRead ? '标为未读' : '打卡') + '</button>'
    + sourceHtml
    + '</div></div>';
  card.innerHTML = inner;
  // 点击卡片任意位置展开全文（按钮除外）
  card.addEventListener('click', function(e) {
    var target = e.target;
    if (target.closest('.read-btn') || target.closest('.source-btn') || target.closest('.expand-btn')) return;
    toggleExpand(idx, card.querySelector('.expand-btn'));
  });
  return card;
}

function renderDonut(sections) {
  var total = sections.reduce(function(a, s) { return a + s.items.length; }, 0);
  if (total === 0) return;
  var svgEl = document.getElementById('donutSvg');
  var legendEl = document.getElementById('donutLegend');
  svgEl.innerHTML = '';
  legendEl.innerHTML = '';
  var cx = 50, cy = 50, r = 36, inner = 22;
  var startAngle = -Math.PI / 2;
  sections.forEach(function(s) {
    if (s.items.length === 0) return;
    var cfg = SECTION_CONFIG[s.label] || { icon: '📌', color: '#888' };
    var angle = (s.items.length / total) * Math.PI * 2;
    var endAngle = startAngle + angle;
    var x1 = cx + r * Math.cos(startAngle), y1 = cy + r * Math.sin(startAngle);
    var x2 = cx + r * Math.cos(endAngle), y2 = cy + r * Math.sin(endAngle);
    var ix1 = cx + inner * Math.cos(startAngle), iy1 = cy + inner * Math.sin(startAngle);
    var ix2 = cx + inner * Math.cos(endAngle), iy2 = cy + inner * Math.sin(endAngle);
    var lg = angle > Math.PI ? 1 : 0;
    var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', 'M ' + ix1 + ' ' + iy1 + ' L ' + x1 + ' ' + y1 + ' A ' + r + ' ' + r + ' 0 ' + lg + ' 1 ' + x2 + ' ' + y2 + ' L ' + ix2 + ' ' + iy2 + ' A ' + inner + ' ' + inner + ' 0 ' + lg + ' 0 ' + ix1 + ' ' + iy1 + ' Z');
    path.setAttribute('fill', cfg.color);
    path.setAttribute('opacity', '0.85');
    path.style.cursor = 'pointer';
    path.addEventListener('click', (function(label) { return function() { filterSection(label); scrollToSection(label); }; })(s.label));
    svgEl.appendChild(path);
    startAngle = endAngle;
    var li = document.createElement('div');
    li.className = 'donut-legend-item';
    li.innerHTML = '<span class="dot" style="background:' + cfg.color + '"></span>' + s.label + ' <strong style="color:rgba(255,255,255,0.95)">' + s.items.length + '</strong>';
    li.onclick = (function(label) { return function() { filterSection(label); scrollToSection(label); }; })(s.label);
    legendEl.appendChild(li);
  });
  var text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  text.setAttribute('x', cx); text.setAttribute('y', cy + 1);
  text.setAttribute('text-anchor', 'middle'); text.setAttribute('dominant-baseline', 'middle');
  text.setAttribute('fill', 'rgba(255,255,255,0.9)'); text.setAttribute('font-size', '12');
  text.setAttribute('font-weight', '700'); text.textContent = total;
  svgEl.appendChild(text);
  var sub = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  sub.setAttribute('x', cx); sub.setAttribute('y', cy + 13);
  sub.setAttribute('text-anchor', 'middle'); sub.setAttribute('fill', 'rgba(255,255,255,0.6)'); sub.setAttribute('font-size', '7');
  sub.textContent = '条';
  svgEl.appendChild(sub);
}

function renderAnalytics(sections) {
  var wrap = document.getElementById('analyticsWrap');
  var sourceMap = {};
  sections.forEach(function(s) {
    s.items.forEach(function(item) {
      var src = shortSource(item.sourceName || '未知');
      sourceMap[src] = (sourceMap[src] || 0) + 1;
    });
  });
  var sorted = Object.entries(sourceMap).sort(function(a,b) { return b[1]-a[1]; }).slice(0, 6);
  var maxCount = sorted[0] ? sorted[0][1] : 1;
  var srcHtml = '<div class="analytics-card"><div class="analytics-title">来源排行</div>';
  sorted.forEach(function(entry) {
    var name = entry[0], count = entry[1];
    var pct = Math.round(count / maxCount * 100);
    srcHtml += '<div class="source-rank-item" style="cursor:pointer" onclick="filterBySource(\'' + escHtml(name).replace(/'/g,"\\'") + '\')" title="查看 ' + escHtml(name).replace(/'/g,"\\'") + ' 的全部文章"><span class="source-rank-name">' + escHtml(name) + '</span><div class="source-rank-bar-bg"><div class="source-rank-bar" style="width:' + pct + '%"></div></div><span class="source-rank-count">' + count + '</span></div>';
  });
  srcHtml += '</div>';
  var stopWords = new Set(['的','了','在','是','与','和','AI','以','将','被','其','已','于','从','到','并','为','但','还','也','都','该','这','其中','能够','通过','实现','用于','可以','以及','可能','提供','包含','包括','无需','用户','产品','模型','支持','系统','功能','未','使用','工作','进行','没有']);
  var wordCount = {};
  sections.forEach(function(s) {
    s.items.forEach(function(item) {
      var words = (item.title + ' ' + (item.summary || '')).replace(/[，。、！？【】《》"'·\s]+/g, ' ').split(' ');
      words.forEach(function(w) {
        w = w.trim();
        if (w.length >= 2 && w.length <= 8 && !stopWords.has(w) && !/^[a-zA-Z0-9]{1,2}$/.test(w)) {
          wordCount[w] = (wordCount[w] || 0) + 1;
        }
      });
    });
  });
  var topWords = Object.entries(wordCount).sort(function(a,b) { return b[1]-a[1]; }).slice(0, 18);
  var colors = ['#e8622a','#f08040','#1d9e75','#378add','#7f6af0','#e8a020','#d4537e','#0f6e56','#993c1d','#185fa5'];
  var hotHtml = '<div class="analytics-card"><div class="analytics-title">热词标签</div><div class="hotwords-wrap">';
  topWords.forEach(function(entry, i) {
    var word = entry[0], cnt = entry[1];
    var sz = Math.max(11, Math.min(16, 11 + cnt * 2));
    var col = colors[i % colors.length];
    hotHtml += '<span class="hotword-chip" style="background:' + col + ';font-size:' + sz + 'px;opacity:' + (0.7 + cnt * 0.1) + '" onclick="document.getElementById(\'searchInput\').value=\'' + escHtml(word).replace(/'/g, "\\'") + '\';doSearch(\'' + escHtml(word).replace(/'/g, "\\'") + '\')">' + escHtml(word) + '</span>';
  });
  hotHtml += '</div></div>';
  wrap.innerHTML = srcHtml + hotHtml;
}

function doSearch(val) {
  currentSearch = val.toLowerCase().trim();
  document.getElementById('searchClear').className = 'search-clear' + (val ? ' show' : '');
  applyFilters();
}
function clearSearch() {
  document.getElementById('searchInput').value = '';
  doSearch('');
}
function applyFilters() {
  var cards = document.querySelectorAll('.card');
  var visible = 0;
  cards.forEach(function(card) {
    var secEl = card.closest('.dyn-section');
    var matchSection = currentFilter === 'all' || slugify(currentFilter) === (secEl ? secEl.id.replace('sec-','') : '');
    var matchSearch = !currentSearch
      || card.dataset.title.indexOf(currentSearch) >= 0
      || card.dataset.summary.indexOf(currentSearch) >= 0
      || card.dataset.source.indexOf(currentSearch) >= 0;
    var matchRead = !showOnlyUnread || !readSet.has(card.dataset.idx);
    if (matchSection && matchSearch && matchRead) {
      card.classList.remove('hidden'); visible++;
      if (currentSearch) highlightCard(card, currentSearch); else clearHighlight(card);
    } else {
      card.classList.add('hidden'); clearHighlight(card);
    }
  });
  document.getElementById('searchCount').textContent = currentSearch ? (visible > 0 ? '找到 ' + visible + ' 条' : '') : '';
  document.getElementById('noResults').className = 'no-results' + (visible === 0 && (currentSearch || showOnlyUnread || currentFilter !== 'all') ? ' show' : '');
}
function highlightCard(card, q) {
  var titleEl = card.querySelector('.card-title');
  if (!titleEl) return;
  var orig = titleEl.textContent;
  var re = new RegExp('(' + escRe(q) + ')', 'gi');
  titleEl.innerHTML = escHtml(orig).replace(re, '<mark>$1</mark>');
}
function clearHighlight(card) {
  var titleEl = card.querySelector('.card-title');
  if (titleEl) titleEl.innerHTML = escHtml(titleEl.textContent);
}
function filterSection(label, el) {
  currentFilter = label;
  currentSearch = '';
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.nav-link').forEach(function(a) { a.classList.remove('active'); });
  if (el) el.classList.add('active');
  else { document.querySelectorAll('.nav-link').forEach(function(a) { if (a.textContent.indexOf(label) >= 0) a.classList.add('active'); }); }
  applyFilters();
}
function filterBySource(sourceName) {
  currentFilter = 'all';
  currentSearch = sourceName;
  document.querySelectorAll('.nav-link').forEach(function(a) { a.classList.remove('active'); });
  document.querySelectorAll('.nav-link').forEach(function(a) { if (a.textContent.indexOf('全部') >= 0) a.classList.add('active'); });
  // Set search to the source name so only cards from that source remain visible
  document.getElementById('searchInput').value = sourceName;
  doSearch(sourceName);
  scrollTo(0, 0);
  showToast('已筛选：' + sourceName);
}
function scrollToSection(label) {
  var id = 'sec-' + slugify(label);
  var el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
function toggleExpand(idx, btn) {
  var sum = document.getElementById('sum-' + idx);
  if (!sum) return;
  var full = sum.dataset.full || '';
  if (sum.classList.contains('collapsed')) {
    sum.classList.replace('collapsed', 'expanded');
    sum.textContent = full;
    btn.textContent = '收起';
  } else {
    sum.classList.replace('expanded', 'collapsed');
    var short = full.length > 65 ? full.slice(0, 62) + '...' : full;
    sum.textContent = short;
    btn.textContent = '展开全文';
  }
}
function markRead(idx, btn) {
  var key = String(idx);
  var card = document.querySelector('.card[data-idx="' + key + '"]');
  if (readSet.has(key)) {
    readSet.delete(key);
    if (card) card.classList.remove('read');
    if (btn) btn.textContent = '打卡';
  } else {
    readSet.add(key);
    if (card) card.classList.add('read');
    if (btn) btn.textContent = '已打卡';
  }
  try { localStorage.setItem('aidaka_read_' + currentDate, JSON.stringify(Array.from(readSet))); } catch(e) {}
  var total = document.querySelectorAll('.card').length;
  updateReadProgress(total);
  if (showOnlyUnread) applyFilters();
}
function toggleReadFilter() {
  showOnlyUnread = !showOnlyUnread;
  var btn = document.getElementById('readProgress');
  if (showOnlyUnread) { btn.style.opacity = '0.7'; btn.title = '点击显示全部'; }
  else { btn.style.opacity = '1'; btn.title = '点击筛选未读'; }
  applyFilters();
}
function updateReadProgress(total) {
  var count = readSet.size;
  var pct = total > 0 ? Math.round(count / total * 100) : 0;
  var icon = count >= total && total > 0 ? '✅' : '🕐';
  var label = count >= total && total > 0 ? '今日已读完' : '已打卡 ' + count + '/' + total;
  document.getElementById('readLabel').innerHTML = '<span class="read-progress-label"><span class="icon">' + icon + '</span><span>' + label + '</span></span>';
  document.getElementById('readBarFill').style.width = pct + '%';
}
function toggleTheme() {
  isDark = !isDark;
  document.body.classList.toggle('light', !isDark);
  try { localStorage.setItem('aidaka_theme', isDark ? 'dark' : 'light'); } catch(e) {}
  updateThemeBtn();
}
function updateThemeBtn() {
  document.getElementById('themeBtn').textContent = isDark ? '亮色模式' : '暗色模式';
}
function updateDateNav(dateStr) {
  // For items-based view, we use daily API for history nav
  document.getElementById('nextBtn').disabled = (dateStr >= DAILY_MAX);
  document.getElementById('prevBtn').disabled = false;
}
function navigateDate(delta) {
  var d = new Date(currentDate + 'T00:00:00');
  d.setDate(d.getDate() + delta);
  var newDateRaw = d.toISOString().slice(0, 10);
  if (newDateRaw > DAILY_MAX) { showToast('已是最新日期'); return; }
  loadDate(newDateRaw);
}
function openModal() {
  document.getElementById('datePicker').value = currentDate;
  document.getElementById('datePicker').max = DAILY_MAX;
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }
function goToDate() {
  var val = document.getElementById('datePicker').value;
  closeModal();
  if (val && val !== currentDate && val <= DAILY_MAX) loadDate(val);
  else if (val > DAILY_MAX) showToast('不能选择未来日期');
}
function loadDate(dateStr) {
  currentDate = dateStr;
  document.getElementById('loadingOverlay').style.display = 'flex';
  document.getElementById('loadingOverlay').style.opacity = '1';
  try { readSet = new Set(JSON.parse(localStorage.getItem('aidaka_read_' + dateStr) || '[]')); } catch(e) { readSet = new Set(); }
  document.querySelectorAll('.dyn-section').forEach(function(el) { el.remove(); });
  currentSearch = ''; currentFilter = 'all';
  showOnlyUnread = false;
  document.getElementById('searchInput').value = '';
  document.getElementById('searchCount').textContent = '';
  document.getElementById('readProgress').style.opacity = '1';
  document.getElementById('readProgress').title = '点击筛选未读';
  // Try loading 50 items from items API for the selected date
  var sinceStr = dateStr + 'T00:00:00Z';
  fetch('https://aihot.virxact.com/api/public/items?mode=selected&since=' + sinceStr + '&take=50')
    .then(function(r) { return r.json(); })
    .then(function(apiData) {
      // Transform items API response to daily-like format
      var categories = {
        'ai-models': '模型发布/更新',
        'ai-products': '产品发布/更新',
        'industry': '行业动态',
        'paper': '论文研究',
        'tip': '技巧与观点'
      };
      var sectionMap = {};
      var idx = 0;
      (apiData.items || []).forEach(function(item) {
        var cat = item.category || '';
        var label = categories[cat] || '行业动态';
        if (!sectionMap[label]) {
          sectionMap[label] = { label: label, items: [] };
        }
        idx++;
        sectionMap[label].items.push({
          idx: idx,
          title: item.title,
          sourceName: item.source || '',
          sourceUrl: item.url || '',
          summary: item.summary || '',
          publishedAt: item.publishedAt || ''
        });
      });
      var sections = [];
      var order = ['模型发布/更新','产品发布/更新','行业动态','论文研究','技巧与观点'];
      order.forEach(function(lbl) {
        if (sectionMap[lbl]) sections.push(sectionMap[lbl]);
        else sections.push({ label: lbl, items: [] });
      });
      var transformed = {
        date: dateStr,
        generatedAt: apiData.items && apiData.items.length > 0 ? apiData.items[0].publishedAt : new Date().toISOString(),
        lead: null,
        sections: sections
      };
      renderAll(transformed);
      document.getElementById('loadingOverlay').style.opacity = '0';
      setTimeout(function() { document.getElementById('loadingOverlay').style.display = 'none'; }, 400);
      showToast('已加载 ' + dateStr + ' (' + idx + '条)');
    })
    .catch(function() {
      // Fallback to daily API
      fetch('https://aihot.virxact.com/api/public/daily/' + dateStr)
        .then(function(r) { return r.json(); })
        .then(function(dailyData) {
          renderAll(dailyData);
          document.getElementById('loadingOverlay').style.opacity = '0';
          setTimeout(function() { document.getElementById('loadingOverlay').style.display = 'none'; }, 400);
          showToast('已加载 ' + dateStr + ' 日报');
        })
        .catch(function() {
          showToast('加载失败，网络请求受限');
          document.getElementById('loadingOverlay').style.opacity = '0';
          setTimeout(function() { document.getElementById('loadingOverlay').style.display = 'none'; }, 400);
        });
    });
}
function initScrollAnim() {
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }
    });
  }, { threshold: 0.05, rootMargin: '0px 0px -20px 0px' });
  document.querySelectorAll('.card').forEach(function(c) { observer.observe(c); });
}
var toastTimer;
function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.classList.remove('show'); }, 2500);
}
function slugify(s) { return s.replace(/[\/\s]/g, '-'); }
function escHtml(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
function shortSource(name) {
  if (!name) return '';
  // Group all X/Twitter sources under "X"
  if (/^X[：:]/.test(name)) return 'X';
  var trimmed = name.replace(/（.*?）/g,'').replace(/\(.*?\)/g,'').trim();
  return trimmed.length > 16 ? trimmed.slice(0, 16) + '...' : trimmed;
}
function fmtDate(dateStr) {
  if (!dateStr) return '';
  var d = new Date(dateStr + 'T00:00:00+08:00');
  var mm = d.getMonth() + 1;
  var dd = d.getDate();
  var days = ['日','一','二','三','四','五','六'];
  return mm + ' 月 ' + dd + ' 日 周' + days[d.getDay()];
}
function fmtDateShort(iso) { return iso ? iso.slice(0, 10) : ''; }
function relTime(date) {
  var now = Date.now();
  var diff = now - date.getTime();
  var mins = Math.floor(diff / 60000);
  var hours = Math.floor(mins / 60);
  if (diff < 0) return '刚刚';
  if (mins < 1) return '刚刚';
  if (mins < 60) return mins + ' 分钟前';
  if (hours < 24) {
    var hh = String(date.getHours()).padStart(2,'0');
    var mm = String(date.getMinutes()).padStart(2,'0');
    var period = date.getHours() < 12 ? '上午' : (date.getHours() < 18 ? '下午' : '晚上');
    return '今天' + period + ' ' + hh + ':' + mm;
  }
  return fmtDateShort(date.toISOString());
}
function relTimeStr(isoStr) {
  if (!isoStr) return '';
  var d = new Date(isoStr);
  return relTime(d);
}
</script>
