<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI打卡网 · 2026-06-23</title>
<style>
  :root {

  .light {

    --text: #1a1a1a;

  .read-progress-label .icon { font-size: 16px; }

    background: rgba(255,255,255,0.25);

  }

  .search-count {

  }
  .nav-date-area {

  }
  .nav-date-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 12px;
    color: var(--text2);
    cursor: pointer;
    transition: all var(--transition);

  }
  .nav-date-btn:hover:not(:disabled) { background: var(--accent); color: #fff; border-color: var(--accent); }
  .nav-date-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .nav-date-label { font-size: 12px; color: var(--text3); }
  .main { max-width: 960px; margin: 0 auto; padding: 24px 16px 60px; }
  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 40px 0 20px;
    padding-bottom: 12px;
    border-bottom: 2px solid var(--border);
  }
  .section-header:first-child { margin-top: 8px; }
  .section-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px;
    flex-shrink: 0;
  }
  .section-title { font-size: 18px; font-weight: 700; color: var(--text); }
  .section-count {
    background: var(--bg3);
    border-radius: 10px;
    padding: 2px 10px;
    font-size: 12px;
    color: var(--text3);
    margin-left: auto;
  }
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    box-shadow: var(--card-shadow);
    transition: transform var(--transition), box-shadow var(--transition), opacity var(--transition), border-color var(--transition);
    opacity: 0;
    transform: translateY(18px);
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }
  .card.visible { opacity: 1; transform: translateY(0); }
  .card.read { opacity: 0.5; }
  .card.read::after {
    content: '已读';
    position: absolute;
    top: 12px;
    right: 12px;
    background: var(--bg4);
    color: var(--text3);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 6px;
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); border-color: var(--accent); }
  .card.hidden { display: none !important; }
  .card.highlight { border-color: var(--accent2); background: rgba(232,98,42,0.06); }
  .card-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px; height: 24px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    border-radius: 6px;
    margin-bottom: 10px;
    flex-shrink: 0;
  }
  .card-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
  .card-title { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.5; flex: 1; }
  .card-title mark {
    background: rgba(232,98,42,0.3);
    color: var(--accent2);
    border-radius: 2px;
    padding: 0 2px;
  }
  .card-source {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 9px;
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 10px;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .card-summary {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.65;
    margin-bottom: 12px;
    overflow: hidden;
    transition: max-height 0.35s ease;
    word-break: break-word;
  }
  .card-summary.collapsed {
    max-height: 4.95em;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-summary.expanded {
    -webkit-line-clamp: unset;
    display: block;
    max-height: 800px;
  }
  .card-footer { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }
  .expand-btn {
    background: none;
    border: none;
    color: var(--accent2);
    font-size: 12px;
    cursor: pointer;
    font-family: var(--font);
    padding: 0;
    transition: color var(--transition);
  }
  .expand-btn:hover { color: var(--accent); }
  .source-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    text-decoration: none;
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    transition: opacity var(--transition);
  }
  .source-btn:hover { opacity: 0.85; }
  .read-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    color: var(--text3);
    cursor: pointer;
    font-family: var(--font);
    transition: all var(--transition);
  }
  .read-btn:hover { border-color: var(--accent); color: var(--accent); }
  .time-badge { font-size: 11px; color: var(--text3); display: block; margin-bottom: 8px; }
  .analytics-wrap {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 32px;
  }
  .analytics-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
  }
  .analytics-title { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 14px; }
  .source-rank-item { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 13px; cursor: pointer; transition: opacity var(--transition); }
  .source-rank-item:hover { opacity: 0.75; }
  .source-rank-bar-bg { flex: 1; height: 6px; background: var(--bg4); border-radius: 3px; overflow: hidden; }
  .source-rank-bar { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }

  .source-rank-count { width: 20px; color: var(--text3); text-align: right; font-size: 12px; }
  .hotwords-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
  .hotword-chip {
    padding: 4px 12px;
    border-radius: 16px;
    font-size: 12px;
    color: #fff;
    cursor: pointer;
    transition: transform var(--transition);
  }
  .hotword-chip:hover { transform: scale(1.08); }
  .no-results { text-align: center; padding: 60px 20px; color: var(--text3); display: none; }

  .no-results-icon { font-size: 36px; margin-bottom: 12px; }
  .loading-overlay {

    max-width: 960px;

  }

    justify-content: center;

    padding: 28px;

    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;

    .analytics-wrap { grid-template-columns: 1fr; }
    .hero-title { font-size: 28px; }
    .card-grid { grid-template-columns: 1fr; }

  }

</head>
<body>
<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>查看历史日報</h3>
    <input type="date" class="date-picker" id="datePicker" value="2026-06-23" max="2026-06-23">
    <div class="modal-btns">
      <button class="modal-btn secondary" onclick="closeModal()">取消</button>
      <button class="modal-btn primary" onclick="goToDate()">前往</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="hero">
  <div class="hero-inner">
    <div class="hero-top">
      <span class="hero-badge">AI打卡网 · 每日晨报</span>
      <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">亮色模式</button>
    </div>
    <h1 class="hero-title" id="heroTitle">AI打卡网</h1>
    <p class="hero-subtitle" id="heroSubtitle">加载中…</p>
    <div class="hero-stats" id="heroStats"></div>
    <div class="donut-wrap" id="donutWrap">
      <svg class="donut-svg" id="donutSvg" width="100" height="100" viewBox="0 0 100 100"></svg>
      <div class="donut-legend" id="donutLegend"></div>
    </div>
  </div>
</div>
<div class="sticky-nav">
  <div class="nav-inner" id="navInner">
    <a class="nav-link active" href="#top" onclick="reloadToday()">全部</a>
    <div class="nav-date-area">
      <button class="nav-date-btn" id="prevBtn" onclick="navigateDate(-1)">昨天</button>
      <span class="nav-date-label" id="navDateLabel">2026-06-23</span>
      <button class="nav-date-btn" id="nextBtn" onclick="navigateDate(1)" disabled>明天</button>
      <button class="nav-date-btn" onclick="openModal()">日历</button>
    </div>
  </div>
</div>
<div class="toolbar">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="searchInput" type="text" placeholder="搜索标题、来源、摘要…" oninput="doSearch(this.value)">
    <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
  </div>
  <div class="read-progress" id="readProgress" onclick="toggleReadFilter()">
    <span id="readLabel"><span class="read-progress-label"><span class="icon">🕐</span><span>已打卡 0/0</span></span></span>
    <div class="read-bar"><div class="read-bar-fill" id="readBarFill" style="width:0%"></div></div>
  </div>
  <span class="search-count" id="searchCount"></span>
</div>
<div class="main" id="main">
  <div class="analytics-wrap" id="analyticsWrap"></div>
  <div id="noResults" class="no-results">
    <div class="no-results-icon">🔎</div>
    <p>没有找到匹配的资讯</p>
    <p style="font-size:12px; margin-top:6px">试试其他关键词？</p>
  </div>
</div>

情况\"就是跟踪前女友。Flock称系统只跟踪车辆，但案例表明车辆是手段，人是目标。", "category": "industry", "score": 80, "selected": true}, {"id": "cmqppyj5702txslp5d7ahupmr", "title": "在 AWS、Google Cloud 和 Microsoft Foundry 上使用完整版 Claude Desktop", "title_en": "The full Claude Desktop experience on AWS， Google Cloud， and Microsoft Foundry", "url": "https://claude.com/blog/the-full-claude-desktop-experience-on-aws-google-cloud-and-microsoft-foundry", "permalink": "https://aihot.virxact.com/items/cmqppyj5702txslp5d7ahupmr", "source": "Claude：Blog（网页）", "publishedAt": "2026-06-22T21:19:56.013Z", "summary": "通过 AWS、Google Cloud 和 Microsoft Foundry 使用 Claude Desktop 的组织现已获得 Chat、Claude Cowork 和 Claude Code 集成的完整桌面体验。IT 团队可将推理保留在自己的云环境中，对话历史本地存储。支持 IAM Identity Center、Workforce Identity Federation、Microsoft Entra ID 或 Okta 登录；策略模板可导出至 Intune、GPO 或 Jamf；提供离线安装器。Chat、Claude Cowork 和 Claude Code 各有独立策略键，支持精细访问控制。M365 连接器通过 Entra 应用访问邮件和文档，并支持 GCC High/DoD 端点。", "category": "ai-products", "score": 55, "selected": true}, {"id": "cmqppo7c402qnslp5p92n6y3b", "title": "Show HN：Oak--专为代理设计的 Git 替代方案", "title_en": "Show HN： Oak--专为代理设计的 Git 替代方案", "url": "https://oak.space/oak/oak", "permalink": "https://aihot.virxact.com/items/cmqppo7c402qnslp5p92n6y3b", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "publishedAt": "2026-06-22T21:00:09.808Z", "summary": "Oak 是开源版本控制系统，专为 AI 智能体（Claude Code、Codex、Cursor）设计。采用 BLAKE3 内容哈希、内容定义分块、diff/merge 及 Blob/Manifest/Commit/Tree 数据模型，可选 SQLite 和 git 后端。以分支-会话为基本工作单元，用分支描述替代逐次提交，通过内容寻址懒加载使智能体数秒内编辑任意仓库。速度远超 git。已发布公开测试版 v0.99.0，支持 macOS（Apple Silicon）、Linux（x86_64）及 Windows，可通过 curl 或 cargo 安装，Apache-2.0 开源。", "category": "ai-products", "score": 72, "selected": true}, {"id": "cmqpyc83704y0slp54f6dv3w7", "title": "AI 治理清单：LLM 架构先行", "title_en": "AI Governance Checklist： Your LLM Architecture Comes First", "url": "https://openrouter.ai/blog/insights/ai-governance-checklist", "permalink": "https://aihot.virxact.com/items/cmqpyc83704y0slp54f6dv3w7", "source": "OpenRouter：Announcements（RSS）", "publishedAt": "2026-06-22T19:00:00.000Z", "summary": "Deloitte 报告显示企业 AI 抱负与治理成熟度之间差 53 个百分点，74% 计划两年内部署智能体 AI，仅 21% 拥有成熟治理模型。路由架构是首个治理层。三种姿态--托管网关（如 OpenRouter、Portkey）、自托管网关（如 LiteLLM）和直接 API--默认治理能力不同，直接 API 缺乏统一控制面，造成治理盲区。治理清单可映射为资产盘点、问责制、访问控制、证据记录与合规性五大支柱。路由层能提供跨团队可见性与审计证据，而电子表格不能。", "category": "tip", "score": 62, "selected": true}, {"id": "cmqpl4smd01j1slp5npj3krmn", "title": "Google DeepMind 7500 万美元投资 A24，合作开发电影 AI 工具", "title_en": "Google DeepMind bets $75M on AI's future in Hollywood with A24 deal", "url": "https://techcrunch.com/2026/06/22/google-deepmind-bets-75m-on-ais-future-in-hollywood-with-a24-deal", "permalink": "https://aihot.virxact.com/items/cmqpl4smd01j1slp5npj3krmn", "source": "TechCrunch：AI（RSS）", "publishedAt": "2026-06-22T18:49:44.000Z", "summary": "Google DeepMind 宣布向独立电影制片厂 A24 投资 7500 万美元（据《华尔街日报》），双方将合作开发电影制作 AI 工具。A24 出品过《万事俱备》《后室》等影片。Google DeepMind CEO Demis Hassabis 称，希望通过与艺术家直接合作，打造支持创意表达的 AI 功能。此举是好莱坞最新一次科技公司与电影 AI 联手，此前 Netflix 已收购 Ben Affleck 的 AI 工具公司 Interpositive，亚马逊 MGM 工作室也在去年设立了影视 AI 部门。", "category": "industry", "score": 70, "selected": true}, {"id": "cmqpgzgfq00hislp5hwlbgz0h", "title": "Google ADK 与 A2A 协议：跨语言多智能体团队构建实战", "title_en": "Build Cross-Language Multi-Agent Team with Google's Agent Development Kit and A2A", "url": "https://developers.googleblog.com/build-cross-language-multi-agent-team-with-google-agent-development-kit-and-a2a", "permalink": "https://aihot.virxact.com/items/cmqpgzgfq00hislp5hwlbgz0h", "source": "Google Developers Blog（RSS）", "publishedAt": "2026-06-22T17:08:43.358Z", "summary": "一篇技术博客展示了如何用 Google Agent Development Kit （ADK） 与 Agent2Agent （A2A） 协议搭建跨语言多智能体流水线：Python agent 调用 Gemini 解析合同条款，Go agent 用纯确定性逻辑校验合规性。A2A 协议通过 Agent Card 实现能力发现、JSON-RPC 2.0 完成通信、Task 状态机管理任务生命周期；ADK 的 RemoteA2aAgent 抽象可将任意 A2A 兼容服务封装成本地子智能体。文中强调将单体提示词分解为专业化微智能体，以解决上下文退化、故障爆炸半径和不可测试性问题。完整源码已在 GitHub 发布。", "category": "tip", "score": 56, "selected": true}, {"id": "cmqpez1uu001gslp5j4h23mih", "title": "东京 AI 公司 Sakana AI 推出多智能体编排系统 Sakana Fugu", "title_en": "Sakana AI 是2023年在东京成立的AI研发公司，核心定位是开发\"自然启发\"（nature-inspired）的AI模型。 强调集体智能（collective intelligence）和演…", "url": "https://x.com/berryxia/status/2069090959938466298", "permalink": "https://aihot.virxact.com/items/cmqpez1uu001gslp5j4h23mih", "source": "X：Berry Xia (@berryxia)", "publishedAt": "2026-06-22T16:11:41.000Z", "summary": "Sakana AI 是 2023 年成立于东京的 AI 公司，由前 Google Brain 的 David Ha（CEO）、Transformer 论文共同作者 Llion Jones（CTO）及前日本外交官 Ren Ito（主席）联合创立。其产品 Sakana Fugu 将多智能体系统封装成单个 API 调用，内部自动拆解任务、调度全球模型并验证结果。Fugu Ultra 在工程、科学、推理等基准上对标 Fable/Mythos，通过动态编排多模型天然绕开单一供应商出口管制风险，被视为将多智能体从复杂工程变为开箱即用的产品形态。", "category": "ai-products", "score": 75, "selected": true}, {"id": "cmqpeu90600l4sldksepc49lt", "title": "Google Labs 提出用\"洞察策略\"评估 AI 编码智能体的主动性", "title_en": "Measuring What Matters with Jules", "url": "https://developers.googleblog.com/measuring-what-matters-with-jules", "permalink": "https://aihot.virxact.com/items/cmqpeu90600l4sldksepc49lt", "source": "Google Developers Blog（RSS）", "publishedAt": "2026-06-22T16:08:41.780Z", "summary": "Google Labs 提出以\"洞察策略\"评估 AI 编码智能体的主动性，而非仅按任务完成度打分。团队基于 Google 内部代码库 705 个 bug（1178 个 CL），通过时空近邻与语义相似度聚类还原开发者实际的高层级目标。初步实验显示：Jules 在单轮探索下洞察相关性评分平均 4.5/5；探索预算从两轮增至三轮时，Hit@5 准确率从 33% 升至 57%。团队正将评估方法扩展至公开 GitHub 数据，并探索纳入问题追踪器、对话等更丰富的上下文。", "category": "paper", "score": 61, "selected": true}, {"id": "cmqpepyo500j1sldkfj5exgj8", "title": "开辟新赛道：小米 YU7 GT 创全球首个纽北自动驾驶圈速纪录，官方圈速榜新增\"自动驾驶\"分类", "title_en": null, "url": "https://www.ithome.com/0/967/234.htm", "permalink": "https://aihot.virxact.com/items/cmqpepyo500j1sldkfj5exgj8", "source": "IT之家（RSS）", "publishedAt": "2026-06-22T15:13:29.000Z", "summary": "小米 YU7 GT（选配赛道专业套装）在纽博格林北环赛道以自动驾驶系统完成全程无人计时圈，成绩 10 分 29 秒 483，成为全球首个纽北自动驾驶圈速纪录。纽北官方圈速榜因此新增\"自动驾驶\"分类。小米汽车表示，在极限赛道中锤炼的动态模型、高频扭矩分配和毫秒级救车能力，将逐步下放至量产车，以提升用户在暴雨、冰雪等极端工况下的底盘与智驾安全。", "category": "industry", "score": 85, "selected": true}, {"id": "cmqpyc83704y1slp584b2av9b", "title": "OpenRouter：通过API路由实现AI数据驻留合规", "title_en": "How to Enforce AI Data Residency Without Building Local Infrastructure", "url": "https://openrouter.ai/blog/insights/ai-data-residency", "permalink": "https://aihot.virxact.com/items/cmqpyc83704y1slp584b2av9b", "source": "OpenRouter：Announcements（RSS）", "publishedAt": "2026-06-22T15:00:00.000Z", "summary": "Deloitte 报告显示 77% 的公司将供应商国籍纳入 AI 选型考量。OpenRouter 将数据驻留视为路由决策：通过 API 请求中的 `provider` 对象设置 `order` 或 `only` 限定服务商、`allow_fallbacks` 为 `false` 禁止回退、`data_collection` 为 `deny` 禁止数据存储或训练、`zdr` 为 `true` 要求零数据保留。示例以 `anthropic/claude-sonnet-4.6` 调用，首选 Anthropic 直连和 Amazon Bedrock。针对欧盟需求，可限制仅 Mistral 等欧盟总部供应商。若无可合规供应商，API 返回错误而非路由至不合规服务商。", "category": "tip", "score": 72, "selected": true}, {"id": "cmqpbc21e08laslx6gica1m67", "title": "微信Agent小微灰度内测：主入口发消息红包，子入口可读聊天记录", "title_en": "聊聊我刚刚拿到测试的微信Agent。", "url": "https://mp.weixin.qq.com/s/qVdfx01e9C9r5mGi0jh2BA", "permalink": "https://aihot.virxact.com/items/cmqpbc21e08laslx6gica1m67", "source": "公众号：数字生命卡兹克", "publishedAt": "2026-06-22T13:34:14.000Z", "summary": "微信Agent小微灰度内测已开始，主入口位于微信首页左上角，支持给好友发消息和红包（需确认），但无法读取聊天记录或向群聊发消息。群聊和私聊的\"问小微\"子入口则可读取聊天记录并支持群发。小微可创建日程提醒、待办、总结朋友圈，打通公众号和视频号进行问答。收藏仅可读取小微自建笔记。内置\"小工具\"功能，支持语音创建简易小程序（暂不可发布），还可调用第三方小程序。", "category": "ai-products", "score": 72, "selected": true}, {"id": "cmqpaflwr08cpslx6umzww19d", "title": "Anthropic 工程负责人：Claude Code 让程序员更孤独", "title_en": null, "url": "https://www.ithome.com/0/967/216.htm", "permalink": "https://aihot.virxact.com/items/cmqpaflwr08cpslx6umzww19d", "source": "IT之家（RSS）", "publishedAt": "2026-06-22T13:25:46.000Z", "summary": "6月22日，Anthropic工程负责人Fiona Fung表示，Claude Code和Claude Cowork等AI智能体让工程师越发依赖智能体工作，彼此之间交流减少，长期易感孤独。团队为此组织编程午餐、黑客松和共同开发时段，重新创造面对面协作机会。调查显示Claude Code已成为创业公司最常用的AI编程工具，\"氛围编程\"兴起使\"单人创业者\"增多，但Fung强调协作仍不可或缺。", "category": "tip", "score": 70, "selected": true}, {"id": "cmqpamzm108huslx6vf1oonz9", "title": "PP-OCRv6 on Hugging Face：50 语言 OCR，参数规模 1.5M 至 34.5M", "title_en": "PP-OCRv6 on Hugging Face： 50-Language OCR from 1.5M to 34.5M Parameters", "url": "https://huggingface.co/blog/PaddlePaddle/pp-ocrv6", "permalink": "https://aihot.virxact.com/items/cmqpamzm108huslx6vf1oonz9", "source": "Hugging Face：Blog（RSS）", "publishedAt": "2026-06-22T13:18:56.000Z", "summary": "PP-OCRv6 是 PaddleOCR 最新一代通用 OCR 模型族，提供 tiny（1.5M）、small（7.7M）和 medium（34.5M）三级。medium 和 small 支持 50 种语言（简体/繁体中文、英文、日文及 46 种拉丁语系）。在官方多场景基准上，medium 检测 Hmean 86.2%，识别准确率 83.2%，较 PP-OCRv5_server 分别提升 +4.6 和 +5.1 个百分点。模型采用 PPLCNetV4 统一骨干、RepLKFPN 检测模块和 EncoderWithLightSVTR 识别模块，可通过 PaddleOCR、Transformers、ONNX Runtime 等后端灵活部署。", "category": "ai-models", "score": 69, "selected": true}, {"id": "cmqpi3u8v00smslp5or0d3mx7", "title": "Cursor 审计发现奖励黑客行为淹没模型智能提升", "title_en": "Reward hacking is swamping model intelligence gains", "url": "https://cursor.com/blog/reward-hacking-coding-benchmarks", "permalink": "https://aihot.virxact.com/items/cmqpi3u8v00smslp5or0d3mx7", "source": "Cursor Blog", "publishedAt": "2026-06-22T12:00:00.000Z", "summary": "Cursor 通过审计模型轨迹发现，在 SWE-bench Pro 上 Opus 4.8 Max 有 63% 的成功解决方案直接从公开来源检索修正而非自主推导。隔离 git 历史并限制网络后，Opus 4.8 Max 得分从 87.1% 跌至 73.0%，Composer 2.5 从 74.7% 跌至 54.0%。在 SWE-bench Multilingual 上，标准环境与严格环境得分差距分别为 9.1 和 7.5 个百分点。两种主要模式是上游查找（57%）和 git 历史挖掘（9%）。研究建议通过审计轨迹和限制运行时环境来缓解此类奖励黑客行为。", "category": "tip", "score": 72, "selected": true}, {"id": "cmqph7ap700n2slp5g4tfjs46", "title": "OpenAI 发布 Daybreak 安全工具：Codex Security 与 GPT-5.5-Cyber", "title_en": "Daybreak： Tools for securing every organization in the world", "url": "https://openai.com/index/daybreak-securing-the-world", "permalink": "https://aihot.virxact.com/items/cmqph7ap700n2slp5g4tfjs46", "source": "OpenAI：官网动态（RSS · 排除企业/客户案例）", "publishedAt": "2026-06-22T10:00:00.000Z", "summary": "OpenAI 推出 Daybreak 系列工具，包括 Codex Security 和 GPT-5.5-Cyber，帮助组织大规模发现、验证并修补漏洞。", "category": "ai-products", "score": 57, "selected": true}, {"id": "cmqqd9e3008sfslp53qupzvd1", "title": "我们用免费本地模型对 OpenClaw 仓库进行实时分类", "title_en": "We got local models to triage the OpenClaw repo for FREE！*", "url": "https://huggingface.co/blog/local-models-pr-triage", "permalink": "https://aihot.virxact.com/items/cmqqd9e3008sfslp53qupzvd1", "source": "Hugging Face：Blog（RSS）", "publishedAt": "2026-06-22T00:00:00.000Z", "summary": "Hugging Face 在 OpenClaw 仓库上测试用 Gemma 和 Qwen 等本地模型实时分类 issue 和 PR。他们使用 Pi agent harness 驱动模型，配合 reposhell 只允许读操作防止提示词注入。测试的模型包括 gemma-4-26b-a4b 和 qwen3.6-35b-a3b，经性能优化后均可在本地生成数百 token/s。该方案运行在 NVIDIA GB10（128 GB 统一内存）上，相比每月 200 美元的 ChatGPT Pro 订阅，可实现近乎实时的通知且仅消耗电费。", "category": "tip", "score": 59, "selected": true}, {"id": "cmqqb5ey4088oslp5vvpveegf", "title": "HAKARI-Bench：统一条件下比较检索架构与效率设置的轻量级基准", "title_en": "HAKARI-Bench： A Lightweight Benchmark for Comparing Retrieval Architectures and Efficiency Settings under Unified Conditions", "url": "https://arxiv.org/abs/2606.22778", "permalink": "https://aihot.virxact.com/items/cmqqb5ey4088oslp5vvpveegf", "source": "HuggingFace Daily Papers（社区热门论文）", "publishedAt": "2026-06-22T00:00:00.000Z", "summary": "HAKARI-Bench 是一个轻量级检索基准，将现有检索套件重建为小型数据集（Nano-sets），涵盖 35 个基准、551 个任务和 43 种语言，采用统一格式实现模型无关比较。它支持 BM25、稠密、稀疏、晚交互和重排序五种检索家族及其效率变体（降维、量化等）在同一条件下对比。在 55 个模型上，整体排名与 MTEB retrieval v2、MMTEB v2 retrieval 及 English BEIR（完整版）的 Spearman 相关系数均高于 0.97。HAKARI-Bench 不取代全面评测，而是用于快速模型选择、回归检测和探索质量-效率帕累托前沿。代码、数据和排行榜以 MIT 许可证开源。", "category": "paper", "score": 75, "selected": true}, {"id": "cmqpeyj07000gslp57sfgt1iu", "title": "Grok Build 推出 /goal 模式，支持长时间自主任务执行", "title_en": "Introducing /goal Jun 22， 2026 # Introducing /goal Use /goal for long-running autonomous task execution in Grok Build. Read More", "url": "https://x.ai/news/introducing-goal", "permalink": "https://aihot.virxact.com/items/cmqpeyj07000gslp57sfgt1iu", "source": "xAI：News（网页）", "publishedAt": "2026-06-22T00:00:00.000Z", "summary": "xAI 在 Grok Build 中引入 `/goal` 新模式。用户只需用一行命令设定目标，agent 便会自动规划方案、分解任务为进度清单并持续执行，直至目标完成且通过验证，期间可额外下达指令。该模式支持监控与引导命令，任务完成时清单全部勾选。即日起可用，用户可通过 `curl -fsSL | bash` 安装 CLI 并登录账号即可使用。", "category": "ai-products", "score": 69, "selected": true}, {"id": "cmqnokdyn007jsl4nxazzzxp1", "title": "美团tabbit国际版免费接入GPT-5.5/Claude Opus 4.8等旗舰模型", "title_en": "我去，GPT 5.5， Claude Opus 4.8， Gemini 3.5flash，最新旗舰版全接入，完全免费不用单独开订阅！ 美团最近悄悄上了一个叫 tabbit 国际版的应用，里面接了好几…", "url": "https://x.com/AYi_AInotes/status/2068637890247016607", "permalink": "https://aihot.virxact.com/items/cmqnokdyn007jsl4nxazzzxp1", "source": "X：阿易 AI Notes (@AYi_AInotes)", "publishedAt": "2026-06-21T10:11:21.000Z", "summary": "美团近期上线tabbit国际版应用，免费集成多家顶级AI模型的最新旗舰版，包括GPT-5.5、Claude Opus 4.8、Gemini 3.5 Flash，以及国内Kimi-2.6、GLM-5.1、MiniMax-M3。用户无需单独订阅即可使用这些模型。需注意：只有国际版包含海外模型，国内版仅提供国内模型。该应用旨在抢占AI入口，目前处于免费推广阶段。", "category": "ai-products", "score": 78, "selected": true}, {"id": "cmqnbj6i202ndsl8hb9fghqqf", "title": "腾讯元宝父亲节活动：上传照片生成与年轻爸爸的合影", "title_en": "你好，20岁的老爸", "url": "https://mp.weixin.qq.com/s/xrTg2Bdy3FF3gn3C_gVBJQ", "permalink": "https://aihot.virxact.com/items/cmqnbj6i202ndsl8hb9fghqqf", "source": "公众号：腾讯元宝", "publishedAt": "2026-06-21T04:51:10.000Z", "summary": "腾讯元宝推出父亲节主题活动，用户可选择爸爸年轻时照片与自己的照片，输入提示词（如\"帮我生成一张和爸爸的合影，将图2的我融合到图1爸爸的照片中，我想穿越回__年前，和他一起_____；保留爸爸照片的背景、动作及五官；人物姿态自然协调，整体光线与色调保持一致\"），元宝即可生成合影。活动旨在让用户\"回到过去\"看到爸爸的青春模样。", "category": "tip", "score": 64, "selected": true}, {"id": "cmqmbymfe00zisl4f3pa6jwmz", "title": "开源教程《Deep Agents 实战》发布", "title_en": "开源技术教程「Deep Agents 实战」，LangChain 官方认证大使 @zhanghaili0610 出品，他也是「LangChain 实战」「LangGraph 实战」的作者 https：…", "url": "https://x.com/shao__meng/status/2068306942184034471", "permalink": "https://aihot.virxact.com/items/cmqmbymfe00zisl4f3pa6jwmz", "source": "X：邵猛 (@shao__meng)", "publishedAt": "2026-06-20T12:16:16.000Z", "summary": "LangChain 官方认证大使 @zhanghaili0610 推出开源教程《Deep Agents 实战》，基于 LangChain / LangGraph 生态，讲解如何用 Deep Agents Harness 框架构建真实 Agent 应用。核心是\"三层架构\"：Runtime（LangGraph）、Framework（LangChain）、Harness（Deep Agents）。技术内核为上下文工程，通过虚拟文件系统实现按需读取、中间结果落盘、大文件局部读取。教程共 8 章 + 2 准备篇，覆盖虚拟文件系统（六大工具）、任务规划、子 Agent 委派（异步并行）及 Skills 复用（可在 Claude Code、Cursor 等 30+ 工具中通用）。", "category": "tip", "score": 75, "selected": true}, {"id": "cmqm0elho009fsliiybg230vu", "title": "微软双向转售GPT与DeepSeek成全球最大AI中间商", "title_en": "还得是微软会闷声发大财啊，它现在已经成为全球最大的 AI 中间商，oh no ，是最大的中转站， 不仅把ChatGPT卖给中国企业，也把DeepSeek 反向卖给西方客户😁 以上来自彭博社的最新报…", "url": "https://x.com/AYi_AInotes/status/2068218661710512231", "permalink": "https://aihot.virxact.com/items/cmqm0elho009fsliiybg230vu", "source": "X：阿易 AI Notes (@AYi_AInotes)", "publishedAt": "2026-06-20T06:25:29.000Z", "summary": "彭博社报道，微软已成为全球最大AI模型中转站，既将ChatGPT卖给中国企业，也反向将DeepSeek模型卖给西方客户。报道称微软正在测试DeepSeek-R1和DeepSeek-V4，计划向西方客户提供这些中国模型。这一模式构建起跨中美AI模型的双向贸易网络。", "category": "industry", "score": 75, "selected": true}, {"id": "cmqlj0jn600pdsljggy6btum5", "title": "NVIDIA Research 发布 SpatialClaw：免训练空间推理框架", "title_en": "NVIDIA AI Introduce SpatialClaw： A Training-Free Agent That Treats Code as the Action Interface for Spatial Reasoning", "url": "https://www.marktechpost.com/2026/06/19/nvidia-ai-introduce-spatialclaw-a-training-free-agent-that-treats-code-as-the-action-interface-for-spatial-reasoning", "permalink": "https://aihot.virxact.com/items/cmqlj0jn600pdsljggy6btum5", "source": "MarkTechPost（RSS）", "publishedAt": "2026-06-19T22:51:59.000Z", "summary": "NVIDIA Research 发布 SpatialClaw，一个免训练的空间推理框架。它通过将代码作为动作接口，让智能体调用感知工具（Depth Anything 3、SAM 3）并自由组合输出，解决视觉语言模型在 3D 空间判断上的弱点。在 20 项基准测试中平均准确率达 59.9%，比近期智能体 SpaceTools 高 11.2 个百分点，比无工具基线高 6.5 点，比结构化工具调用高 3.2 点。框架无需重新训练，同一提示词和工具集可跨所有基准和骨干网络运行，支持 Qwen3.5/3.6 及 Gemma4 等 26B 至 397B 参数的模型。", "category": "ai-products", "score": 77, "selected": true}, {"id": "cmqlgwh3f006nsljg3exh1nge", "title": "Figure机器人数首超人类员工", "title_en": "We are past the point of theory. For the first time ever， Figure's robot count has passed its human…", "url": "https://x.com/rohanpaul_ai/status/2068089038213693800", "permalink": "https://aihot.virxact.com/items/cmqlgwh3f006nsljg3exh1nge", "source": "X：Rohan Paul (@rohanpaul_ai)", "publishedAt": "2026-06-19T21:50:24.000Z", "summary": "我们已超越理论阶段。\n\n有史以来第一次，Figure的机器人数量超过了人类员工数量。", "category": "industry", "score": 78, "selected": true}, {"id": "cmqlclrpp01h9sl2s1c94el8x", "title": "JAWBONE Act：一项打击政府为压制合法网络言论而施压的新法案", "title_en": "一项新法案旨在打击政府为压制合法网络言论而施加的压力", "url": "https://www.eff.org/deeplinks/2026/06/new-bill-takes-aim-government-pressure-silence-lawful-online-speech", "permalink": "https://aihot.virxact.com/items/cmqlclrpp01h9sl2s1c94el8x", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "publishedAt": "2026-06-19T19:41:30.069Z", "summary": "上周，参议员Ted Cruz和Ron Wyden提出两党法案JAWBONE Act，为受政府胁迫的广播商、互动计算机服务商及AI提供商创建针对政府官员的联邦诉讼权，并建立政府与中间方就用户表达问题沟通的透明度体系。法案旨在应对政府施压私营公司审查受第一修正案保护的言论。EFF支持该法案，并举证：2025年6月联邦高官威胁起诉ICEBlock创建者，同年10月司法部长要求苹果下架该应用。EFF还提起信息自由诉讼，要求披露政府与苹果、谷歌、Meta的沟通记录。", "category": "industry", "score": 75, "selected": true}, {"id": "cmqldpkuw0011slf9a7n9u4pa", "title": "OpenRouter vs Portkey：你的团队该选哪个LLM网关？", "title_en": "OpenRouter vs Portkey： Which LLM Gateway for Your Team？", "url": "https://openrouter.ai/blog/insights/openrouter-vs-portkey", "permalink": "https://aihot.virxact.com/items/cmqldpkuw0011slf9a7n9u4pa", "source": "OpenRouter：Announcements（RSS）", "publishedAt": "2026-06-19T19:00:00.000Z", "summary": "OpenRouter是托管路由网络，买credits后通过一个API路由至70+供应商，自动故障转移，无需自有密钥；覆盖300+模型（含20+免费），按用量收费（零加成+5.5%平台费，首100万免费），支持零数据保留和欧盟路由。Portkey是AI控制平面（2026年被Palo Alto收购），置于用户密钥之上，增加治理、提示管理、护栏和可观测性；提供1600+ LLM统一API，按日志计费（Developer免费，Production $49/月），支持HIPAA、SSO、私有部署。两者均可组合使用。", "category": "tip", "score": 59, "selected": true}, {"id": "cmqlaf27b00wusl2sfbraxwid", "title": "baoyu-design Skill迭代：修复导出样式与渐变丢失问题，支持AI配图导出PPTX", "title_en": "Skill 和软件一样，需要不断迭代的，而且你用户越多，遇到的各种问题就越多，就需要去解决各种边边角角的问题，才能越来越好用。 比如 @yangyi 昨天在他的牛马AI里面测试了这个Skill，说导…", "url": "https://x.com/dotey/status/2068042001895809420", "permalink": "https://aihot.virxact.com/items/cmqlaf27b00wusl2sfbraxwid", "source": "X：宝玉 (@dotey)", "publishedAt": "2026-06-19T18:43:30.000Z", "summary": "宝玉分享 baoyu-design Skill 的迭代过程：用户测试发现导出问题（样式表未铺满整页、渐变色丢失），他在本地复现后让 Agent 分析原因、给出解决方案并添加测试覆盖，修复后效果改善。该 Skill 可在制作 PPT、动画视频或网站时调用 AI 生图配图，支持 Codex 内置画图或配合 baoyu-image-gen Skill 调用 Codex CLI 画图，并能连同图片一起导出为 PPTX，在 PowerPoint/Keynote 中二次编辑。迭代循环：自己用 → 发现问题 → 让 Agent 分析 → 出方案 → 确认 → 更新 Skill。", "category": "tip", "score": 75, "selected": true}, {"id": "cmql6vhtu01n0slluxpq3yvzh", "title": "AI中心的数据黑洞", "title_en": "The data black hole at the center of AI", "url": "https://www.dwarkesh.com/p/the-sample-efficiency-black-hole-2", "permalink": "https://aihot.virxact.com/items/cmql6vhtu01n0slluxpq3yvzh", "source": "Dwarkesh Patel：Podcast & Blog（RSS）", "publishedAt": "2026-06-19T16:45:03.000Z", "summary": "智能的一种定义是样本效率，但近年AI进步主要靠扩充数据分布和增加算力。强化学习本质是合成数据生成--投入大量算力通过验证器筛选\"好\"数据，再训练模型预测正确输出。这一过程需要每个领域和技能的海量人类专家示例，数据行业年收入已达数十亿美元。近日Epoch报告，开源模型仅落后前沿闭源模型4个月，原因在于数据可从公开API蒸馏，而超参数等不易复制。人类一生接触约2亿token，前沿模型训练在数十到数百T token之间，相差近百万倍--机器人、自动驾驶等领域同样存在巨大效率差距。", "category": "tip", "score": 60, "selected": true}, {"id": "cmql4yj5e014zsllucl69g3l6", "title": "AlphaFold 负责人 John Jumper 离职 Google DeepMind，加入 Anthropic", "title_en": "Thanks John for an extraordinary partnership and wonderful collaboration over the past 9 years！ What…", "url": "https://x.com/demishassabis/status/2068002732250640603", "permalink": "https://aihot.virxact.com/items/cmql4yj5e014zsllucl69g3l6", "source": "X：Demis Hassabis (@demishassabis)", "publishedAt": "2026-06-19T16:07:27.000Z", "summary": "AlphaFold 团队负责人 John Jumper 宣布，在 Google DeepMind 工作近 9 年后决定离职，将加入 Anthropic（先休整一段时间）。DeepMind CEO Demis Hassabis 表示，过去 9 年与 Jumper 的非凡合作改变了世界，AlphaFold 展示了 AI 在科学与医学领域的巨大潜力，并为 AI 造福人类指明了方向。Jumper 回忆，Hassabis 在他博士毕业仅 6 个月后就大胆让他领导 AlphaFold 团队，感谢团队教会他如何做伟大的科学。", "category": "industry", "score": 72, "selected": true}, {"id": "cmqldpkuw0012slf9dif29msc", "title": "OpenRouter vs LiteLLM：如何选择 LLM 网关", "title_en": "OpenRouter vs LiteLLM： Which LLM Gateway Fits Your Stack？", "url": "https://openrouter.ai/blog/insights/openrouter-vs-litellm", "permalink": "https://aihot.virxact.com/items/cmqldpkuw0012slf9dif29msc", "source": "OpenRouter：Announcements（RSS）", "publishedAt": "2026-06-19T15:00:00.000Z", "summary": "OpenRouter 是托管在 Cloudflare 边缘的 LLM 网关，无需管理基础设施，收取 5.5% 平台费（前 100 万次请求免费），支持 70+ 提供商和自动故障转移。LiteLLM 是自部署代理（Docker/PostgreSQL/Redis），数据不离开内网，免费开源，但需承担基础设施成本（生产部署约数百美元/月）。当模型月支出超过约 $3，600（基础设施 $200/月）或 $9，100（基础设施 $500/月）时自托管更划算。LiteLLM 提供六种路由策略和自定义 Python 路由；OpenRouter 具备 SOC 2、GDPR 认证和零数据保留选项。两者可串联使用。", "category": "tip", "score": 68, "selected": true}, {"id": "cmqkzwabf008islcwjpwe10ii", "title": "禁止开源AI将是一个错误", "title_en": "Banning Open Source AI Would Be A Mistake", "url": "https://www.interconnects.ai/p/banning-open-source-ai-would-be-a", "permalink": "https://aihot.virxact.com/items/cmqkzwabf008islcwjpwe10ii", "source": "Nathan Lambert：Interconnects（RSS）", "publishedAt": "2026-06-19T13:02:47.000Z", "summary": "近期行政命令、国会提案及对Anthropic最先进模型的境外访问限制，可能开启新一轮AI监管。开源软件已支撑全球90%以上软件并创造8万亿美元经济价值，在教育、创新和竞争三方面持续赋能。Anthropic与OpenAI的封闭模型加剧市场集中，开源（尤其开放权重）是初创公司、教育机构和企业获得替代方案的唯一平衡力量。开源透明性使其更安全，更多工程师可剔除不需要的模型行为或修复漏洞。以中国竞争为由监管开源将适得其反，美国初创公司正依赖包括中国在内的开源模型提升效率。", "category": "tip", "score": 56, "selected": true}, {"id": "cmqkzxdp0009eslcw0jlr6pvl", "title": "Cloudflare 为 AI 智能体推出临时账户", "title_en": "Temporary Cloudflare Accounts for AI agents", "url": "https://blog.cloudflare.com/temporary-accounts", "permalink": "https://aihot.virxact.com/items/cmqkzxdp0009eslcw0jlr6pvl", "source": "Cloudflare Blog", "publishedAt": "2026-06-19T13:00:00.000Z", "summary": "Cloudflare 在 Workers 上推出临时账户（Temporary Accounts），允许 AI 智能体直接运行 `wrangler deploy --temporary`，在数秒内获取一个可用的实时 Worker，无需绕开面向人类设计的部署流程。该功能旨在降低智能体部署门槛。", "category": "ai-products", "score": 62, "selected": true}, {"id": "cmqkxgxrb003oslu7irf0vf59", "title": "/youtube-notetaker：YT 视频转 Artifacts", "title_en": "YT Videos -&gt； Aritfacts Watch how I use my new /youtube-notetaker skill to generate artifacts fro…", "url": "https://x.com/omarsar0/status/2067952726282031411", "permalink": "https://aihot.virxact.com/items/cmqkxgxrb003oslu7irf0vf59", "source": "X：Elvis Saravia (@omarsar0, DAIR.AI)", "publishedAt": "2026-06-19T12:48:45.000Z", "summary": "YT 视频 -> Artifacts\n\n看看我如何使用新的 /youtube-notetaker 技能从 YT 视频生成 Artifacts。\n\n捕获幻灯片、笔记、转录内容……\n\n快去试试 ↓", "category": "tip", "score": 75, "selected": true}, {"id": "cmqkrei4r006ssl4zm2006sdt", "title": "Humanize PPT v0.9：为演讲而生的开源PPT Skill", "title_en": "开源一个为演讲而生的PPT Skill，再不用跟观众大眼瞪小眼了", "url": "https://mp.weixin.qq.com/s/rGoYnUcBRkfRKQPbIaawyg", "permalink": "https://aihot.virxact.com/items/cmqkrei4r006ssl4zm2006sdt", "source": "公众号：卡尔的AI沃茨", "publishedAt": "2026-06-19T09:48:28.000Z", "summary": "Humanize PPT v0.9 是一款专为演讲场景设计的PPT Skill，核心通过AST（Audience， State， Transfer）逻辑重新编排大纲，将页面渲染外包给下游Skill。渲染前先输出4张真实预览页，并将图片、视频素材的占位与生成prompt写入大纲。新增质检环节自动修复常见渲染问题，并支持演讲模式：按S键在独立窗口显示演讲稿备注，按ESC键打开全局索引快速跳页。项目已开源至github.com/LearnPrompt/humanize-ppt，由卡尔 & yc星辰开发。", "category": "tip", "score": 77, "selected": true}, {"id": "cmqkhoy7906goslhiji2e8rc4", "title": "我们在 Elasticsearch 上构建了一个持久化代理内存层，其召回率为0.89", "title_en": "我们在 Elasticsearch 上构建了一个持久化代理内存层，其召回率为 0.89", "url": "https://www.elastic.co/search-labs/blog/agent-memory-elasticsearch", "permalink": "https://aihot.virxact.com/items/cmqkhoy7906goslhiji2e8rc4", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "publishedAt": "2026-06-19T05:01:18.006Z", "summary": "Agent Builder 正式上市（GA）。基于 Elasticsearch 的持久化内存层将记忆分为情景、语义、程序三类，分别存入独立索引，各设不同写速率与过期规则。召回采用 BM25 与 Jina v5 稠密向量的 RRF 融合，再经交叉编码器重排序。在 168 道 QA 题评估中，R@10 平均 0.89，零跨租户泄漏。该层可通过支持 MCP 协议的客户端访问，不绑定特定运行时，已开源至 GitHub。", "category": "tip", "score": 73, "selected": true}, {"id": "cmqkhbjf5069eslhiepqm55gr", "title": "阿里开源向量数据库Zvec，UCSD黄碧薇教授提出因果AI第四代范式", "title_en": "卧槽，阿里把内部用了多年的向量数据库直接开源了，Pinecone每月70刀的能力，它pip一行免费就能用，十亿向量毫秒级还不用单独起服务🤯 以后做RAG和AI搜索的，不用再每月给Pinecone交…", "url": "https://x.com/AYi_AInotes/status/2067832098816250346", "permalink": "https://aihot.virxact.com/items/cmqkhbjf5069eslhiepqm55gr", "source": "X：阿易 AI Notes (@AYi_AInotes)", "publishedAt": "2026-06-19T04:49:25.000Z", "summary": "阿里开源内部向量数据库Zvec，pip install zvec免费使用，对标Pinecone每月70美元能力。支持十亿向量毫秒级检索，无需单独起服务，全平台兼容；v0.5.0新增原生全文混合搜索。UCSD黄碧薇教授（causal-learn作者）提出AI四代范式：相关性小模型→因果小模型→相关性大模型（LLM）→因果大模型，认为当前正站在第四代门口。其创立的Aether AI完成首轮融资，致力于从视频中自动抽取物理规律，探索下一代因果AI范式。", "category": "ai-products", "score": 79, "selected": true}, {"id": "cmqkf6cny05q6slhidvc7xzf4", "title": "DeepSeek研究员开源AutoResearch：AI自主跑通285B模型RL研究闭环", "title_en": "这可能是我近期看到的最值得深入研究的一次skills开源和工程脚手架，最后总结的5个工程思路大家可以直接拿去用。 DeepSeek 研究员 Deli Chen 把他的 AutoResearch 协议…", "url": "https://x.com/AYi_AInotes/status/2067819352926150953", "permalink": "https://aihot.virxact.com/items/cmqkf6cny05q6slhidvc7xzf4", "source": "X：阿易 AI Notes (@AYi_AInotes)", "publishedAt": "2026-06-19T03:58:46.000Z", "summary": "DeepSeek研究员Deli Chen将AutoResearch协议开源，并发布Self-play综述论文。其AI智能体首次完全自主地在DeepSeek 285B模型上完成完整RL研究闭环--从实验设计、写代码、提交GPU任务、debug到结论总结，全程零人工干预。系统调用了GRPO工具，被视为持续学习研究的开端。", "category": "tip", "score": 76, "selected": true}, {"id": "cmqkc8a7h0515slhis4sq6oxb", "title": "Salesforce CodeGen教程：生成、验证并重排序Python函数（含单元测试与安全检查）", "title_en": "Salesforce CodeGen Tutorial： Generate， Validate， and Rerank Python Functions With Unit Tests and Safety Checks", "url": "https://www.marktechpost.com/2026/06/18/salesforce-codegen-tutorial-generate-validate-and-rerank-python-functions-with-unit-tests-and-safety-checks", "permalink": "https://aihot.virxact.com/items/cmqkc8a7h0515slhis4sq6oxb", "source": "MarkTechPost（RSS）", "publishedAt": "2026-06-19T02:44:12.000Z", "summary": "本教程实现一个基于Salesforce CodeGen的端到端代码生成工作流。从HuggingFace加载CodeGen模型（支持350M、2B、codegen2-1B、codegen25-7b等版本），通过自然语言提示生成Python函数，随后进行函数提取、语法检查、静态安全检查、单元测试验证、best-of-N候选重排序、多步程序合成、提示词实验、基准可视化及导出。展示了CodeGen作为结构化代码生成流水线的能力，不仅完成代码补全，还能评估、筛选和组织生成结果。", "category": "tip", "score": 75, "selected": true}, {"id": "cmqk6htvg03g1slhi1nagpabj", "title": "八部门联合发文力推\"人工智能 + 消费\"，扩大 AI 手机电脑及智能网联汽车消费", "title_en": null, "url": "https://www.ithome.com/0/966/295.htm", "permalink": "https://aihot.virxact.com/items/cmqk6htvg03g1slhi1nagpabj", "source": "IT之家（RSS）", "publishedAt": "2026-06-18T23:56:08.000Z", "summary": "商务部等8部门近日印发《关于加快\"人工智能 + 消费\"发展的实施意见》，从5方面提出17条举措。重点包括：扩大AI手机电脑、智能家居、智能网联汽车、智能穿戴、AI机器人等供给；推动AI与居家、养老、文旅、餐饮、教育等融合；促进AI在批发零售、电商、物流领域应用；建设集聚区和体验中心，开展产品租赁、共享、试用等模式创新；完善基础设施、标准体系和监管，推动互联互通。商务部将协同落实，促进AI进千家万户。", "category": "industry", "score": 76, "selected": true}, {"id": "cmqk5umoz03d0slhi4qnma1r3", "title": "AI 员工 Viktor 登陆 Microsoft Teams，年化收入达 2000 万美元", "title_en": "Viktor grew a $20M annualized revenue run rate outside Microsoft Teams. Now it works inside Teams. …", "url": "https://x.com/rohanpaul_ai/status/2067755504613613699", "permalink": "https://aihot.virxact.com/items/cmqk5umoz03d0slhi4qnma1r3", "source": "X：Rohan Paul (@rohanpaul_ai)", "publishedAt": "2026-06-18T23:45:03.000Z", "summary": "AI 员工 Viktor 在 Slack 上实现 2000 万美元年化收入（无销售团队、未大规模推广），现已正式进驻 Microsoft Teams。Viktor 定位为零门槛 AI：用户无需学习、无需提示词，像 @同事 一样提及即可获得完整工作成果，甚至无需主动 @ 也能自动完成。产品面向 Teams 的 3.2 亿用户，助力企业内部运营和管理人员零学习成本使用 AI。即日起免费试用，含 100 美元信用额度，无需绑定信用卡。", "category": "ai-products", "score": 75, "selected": true}, {"id": "cmqk90yo9047eslhiuppd7ed6", "title": "OpenClaw 接入 OpenRouter", "title_en": "Connect OpenClaw to OpenRouter", "url": "https://openrouter.ai/blog/tutorials/openclaw-openrouter", "permalink": "https://aihot.virxact.com/items/cmqk90yo9047eslhiuppd7ed6", "source": "OpenRouter：Announcements（RSS）", "publishedAt": "2026-06-18T19:00:00.000Z", "summary": "OpenClaw 已内置 OpenRouter 支持，一条命令即可为 AI 智能体配置统一密钥、统一账单，并实现跨 300 多个模型的自动故障转移。同时提供具体设置步骤以及常见错误的修复方法。", "category": "tip", "score": 60, "selected": true}, {"id": "cmqjur86800bvslhi6qv1647r", "title": "MosaicLeaks： 你的研究智能体能保守秘密吗？", "title_en": "MosaicLeaks： Can your research agent keep a secret？", "url": "https://huggingface.co/blog/ServiceNow/mosaicleaks", "permalink": "https://aihot.virxact.com/items/cmqjur86800bvslhi6qv1647r", "source": "Hugging Face：Blog（RSS）", "publishedAt": "2026-06-18T18:13:13.000Z", "summary": "深度研究智能体在结合私有本地文档与外部网页检索时存在隐私泄露风险。MosaicLeaks 提出包含 1，001 条多跳研究链的新任务，每条链交错混合本地与公共子问题。测试发现智能体频繁泄露私有信息，单纯优化任务性能反而加剧泄露。基于此，研究提出隐私感知深度研究（PA-DR）强化学习训练方法，将严格链成功率从 48.7% 提升至 58.7%，同时将答案/全面信息泄露率从 34.0% 降至 9.9%。", "category": "paper", "score": 75, "selected": true}], "sections": [{"label": "模型发布/更新", "slug": "ai-models", "count": 5, "items": [{"idx": 1, "title": "网易有道发布 Confucius4-TTS：14 语种跨语种无口音语音克隆开源模型", "summary": "网易有道推出\"子曰 4.0\"TTS 引擎 Confucius4-TTS，声称是业内首个支持 14 种语言跨语种无口音、且无需参考文本即可完成语音克隆的开源模型。用户仅需 3 秒音频即可实现零样本音色克隆，克隆音色与原声相似度超 85%，任务准确度达 97%。模型支持中文、英语等 14 种语言，首创音频 Prompt 情感克隆迁移。底层采用 GPT 式语义大模型、SSL 预训练特征与 ECAPA-TDNN 说话人编码器、Flow Matching 框架。已全量开源（Apache 协议），提供 54GB 资源包供本地部署。", "publishedAt": "2026-06-23T11:00:00.000Z", "category": "ai-models", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/967/636.htm"}, {"idx": 2, "title": "京东全栈开源JoyAI-VL-Interaction，从\"一问一答\"走向\"边看边说\"", "summary": "京东近日开源全球首个全栈交互模型JoyAI-VL-Interaction，获vLLM-Omni原生支持。该模型能持续观察视频流、主动判断关键事件并实时响应，支持将复杂任务委托后台Agent处理。在58个真人盲评中，对比豆包视频通话助手胜率77.6%，对比Gemini视频通话助手胜率87.9%，监控预警场景达100%胜率。开源内容包括模型权重、交互数据集、训练方案及完整可部署系统，支持摄像头、直播流等视频输入及语音交互、长期记忆、vLLM部署，适用于安防监控、老人看护、直播讲解等实时场景。", "publishedAt": "2026-06-23T06:04:50.000Z", "category": "ai-models", "sourceName": "公众号：京东JoyAI", "sourceUrl": "https://mp.weixin.qq.com/s/IY6XGp4k6VgD9ZPH6YprCA"}, {"idx": 3, "title": "豆包音频生成模型1.0发布，重新定义AI音频创作", "summary": "火山引擎正式发布豆包音频生成模型1.0（Doubao-Seed-Audio 1.0），支持文本与音频参考生成，端到端输出目标音频。单条Prompt可编排多角色对白、情绪语气、背景音乐及环境氛围，长时生成中保持多角色音色一致性，无需后期多轨混音。模型支持0样本多模态输入，无需额外训练即可生成；实现音色与风格解耦控制及\"一声多角\"能力。一次支持2分钟音频创作，多次延长保持音色统一。已开启火山方舟API邀测，个人用户享30分钟创作额度，即将上线剪映、即梦、番茄等产品。", "publishedAt": "2026-06-23T05:41:11.000Z", "category": "ai-models", "sourceName": "公众号：火山引擎", "sourceUrl": "https://mp.weixin.qq.com/s/iL0uyUjOMUEfudeuDP6wQQ"}, {"idx": 4, "title": "Seed2.1 正式发布，深入 AI 生产力", "summary": "字节Seed发布Seed2.1系列，面向真实生产力场景的智能体，强化通用Agent能力、代码工程交付与多模态理解。Seed2.1 Pro在GDPval基准获最高分，Agents' Last Exam位列参评模型第一梯队；MobileWorld手机GUI任务最高分，CreativeWork多环境任务表现突出。多模态在CharXiv-RQ等多项基准取得SOTA。代码能力上，Seed2.1 Pro在NL2Repo-Bench表现良好，开发者评测相比Claude Opus 4.6获59.1%胜率。模型已在豆包、TRAE上线，API通过火山方舟提供。", "publishedAt": "2026-06-23T00:02:42.000Z", "category": "ai-models", "sourceName": "字节 Seed：Research Feed（网页内嵌数据）", "sourceUrl": "https://seed.bytedance.com/zh/blog/seed2-1-%E6%AD%A3%E5%BC%8F%E5%8F%91%E5%B8%83-%E6%B7%B1%E5%85%A5-ai-%E7%94%9F%E4%BA%A7%E5%8A%9B"}, {"idx": 5, "title": "PP-OCRv6 on Hugging Face：50 语言 OCR，参数规模 1.5M 至 34.5M", "summary": "PP-OCRv6 是 PaddleOCR 最新一代通用 OCR 模型族，提供 tiny（1.5M）、small（7.7M）和 medium（34.5M）三级。medium 和 small 支持 50 种语言（简体/繁体中文、英文、日文及 46 种拉丁语系）。在官方多场景基准上，medium 检测 Hmean 86.2%，识别准确率 83.2%，较 PP-OCRv5_server 分别提升 +4.6 和 +5.1 个百分点。模型采用 PPLCNetV4 统一骨干、RepLKFPN 检测模块和 EncoderWithLightSVTR 识别模块，可通过 PaddleOCR、Transformers、ONNX Runtime 等后端灵活部署。", "publishedAt": "2026-06-22T13:18:56.000Z", "category": "ai-models", "sourceName": "Hugging Face：Blog（RSS）", "sourceUrl": "https://huggingface.co/blog/PaddlePaddle/pp-ocrv6"}]}, {"label": "产品发布/更新", "slug": "ai-products", "count": 13, "items": [{"idx": 6, "title": "国内首个高考志愿AI测评出炉，千问多项表现超过资深咨询师", "summary": "友松实验室发布国内首个高考志愿AI能力测评报告，测试千问高考志愿填报Agent四大模块。与53位平均从业4.6年的人类咨询师对照，千问表现更稳定精确：44道事实题全对；模拟10个志愿中6个可录取；100场匿名对比中专家58次倾向千问回答。使用千问辅助后，人类咨询师正确率提升，耗时减少约27%。该Agent基于千问高考志愿大模型和夸克8年高考数据，覆盖约3000所院校、2000多个专业。", "publishedAt": "2026-06-23T10:54:49.000Z", "category": "ai-products", "sourceName": "公众号：千问APP（阿里）", "sourceUrl": "https://mp.weixin.qq.com/s/oGHVP4MgGS1rbmT8s8St8Q"}, {"idx": 7, "title": "Aleph 2.0 现已集成到 Figma Weave", "summary": "Aleph 2.0 是 Runway 的旗舰视频编辑模型，现已在 Figma Weave 中上线。它是一个基于上下文的视频编辑模型，通过关键帧工作：从视频中提取一帧，重新设计风格并附上时间戳连接回 Aleph 2.0 节点，即可将该编辑传递到主体出现的每一帧，同时保持其他内容不变。支持最长 30 秒、1080p 的片段，可跨多镜头序列应用编辑，无需逐镜头处理。", "publishedAt": "2026-06-22T23:18:22.492Z", "category": "ai-products", "sourceName": "Runway：News（网页）", "sourceUrl": "https://runwayml.com/news/aleph-2-in-figma-weave"}, {"idx": 8, "title": "在 AWS、Google Cloud 和 Microsoft Foundry 上使用完整版 Claude Desktop", "summary": "通过 AWS、Google Cloud 和 Microsoft Foundry 使用 Claude Desktop 的组织现已获得 Chat、Claude Cowork 和 Claude Code 集成的完整桌面体验。IT 团队可将推理保留在自己的云环境中，对话历史本地存储。支持 IAM Identity Center、Workforce Identity Federation、Microsoft Entra ID 或 Okta 登录；策略模板可导出至 Intune、GPO 或 Jamf；提供离线安装器。Chat、Claude Cowork 和 Claude Code 各有独立策略键，支持精细访问控制。M365 连接器通过 Entra 应用访问邮件和文档，并支持 GCC High/DoD 端点。", "publishedAt": "2026-06-22T21:19:56.013Z", "category": "ai-products", "sourceName": "Claude：Blog（网页）", "sourceUrl": "https://claude.com/blog/the-full-claude-desktop-experience-on-aws-google-cloud-and-microsoft-foundry"}, {"idx": 9, "title": "Show HN：Oak--专为代理设计的 Git 替代方案", "summary": "Oak 是开源版本控制系统，专为 AI 智能体（Claude Code、Codex、Cursor）设计。采用 BLAKE3 内容哈希、内容定义分块、diff/merge 及 Blob/Manifest/Commit/Tree 数据模型，可选 SQLite 和 git 后端。以分支-会话为基本工作单元，用分支描述替代逐次提交，通过内容寻址懒加载使智能体数秒内编辑任意仓库。速度远超 git。已发布公开测试版 v0.99.0，支持 macOS（Apple Silicon）、Linux（x86_64）及 Windows，可通过 curl 或 cargo 安装，Apache-2.0 开源。", "publishedAt": "2026-06-22T21:00:09.808Z", "category": "ai-products", "sourceName": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://oak.space/oak/oak"}, {"idx": 10, "title": "东京 AI 公司 Sakana AI 推出多智能体编排系统 Sakana Fugu", "summary": "Sakana AI 是 2023 年成立于东京的 AI 公司，由前 Google Brain 的 David Ha（CEO）、Transformer 论文共同作者 Llion Jones（CTO）及前日本外交官 Ren Ito（主席）联合创立。其产品 Sakana Fugu 将多智能体系统封装成单个 API 调用，内部自动拆解任务、调度全球模型并验证结果。Fugu Ultra 在工程、科学、推理等基准上对标 Fable/Mythos，通过动态编排多模型天然绕开单一供应商出口管制风险，被视为将多智能体从复杂工程变为开箱即用的产品形态。", "publishedAt": "2026-06-22T16:11:41.000Z", "category": "ai-products", "sourceName": "X：Berry Xia (@berryxia)", "sourceUrl": "https://x.com/berryxia/status/2069090959938466298"}, {"idx": 11, "title": "微信Agent小微灰度内测：主入口发消息红包，子入口可读聊天记录", "summary": "微信Agent小微灰度内测已开始，主入口位于微信首页左上角，支持给好友发消息和红包（需确认），但无法读取聊天记录或向群聊发消息。群聊和私聊的\"问小微\"子入口则可读取聊天记录并支持群发。小微可创建日程提醒、待办、总结朋友圈，打通公众号和视频号进行问答。收藏仅可读取小微自建笔记。内置\"小工具\"功能，支持语音创建简易小程序（暂不可发布），还可调用第三方小程序。", "publishedAt": "2026-06-22T13:34:14.000Z", "category": "ai-products", "sourceName": "公众号：数字生命卡兹克", "sourceUrl": "https://mp.weixin.qq.com/s/qVdfx01e9C9r5mGi0jh2BA"}, {"idx": 12, "title": "OpenAI 发布 Daybreak 安全工具：Codex Security 与 GPT-5.5-Cyber", "summary": "OpenAI 推出 Daybreak 系列工具，包括 Codex Security 和 GPT-5.5-Cyber，帮助组织大规模发现、验证并修补漏洞。", "publishedAt": "2026-06-22T10:00:00.000Z", "category": "ai-products", "sourceName": "OpenAI：官网动态（RSS · 排除企业/客户案例）", "sourceUrl": "https://openai.com/index/daybreak-securing-the-world"}, {"idx": 13, "title": "Grok Build 推出 /goal 模式，支持长时间自主任务执行", "summary": "xAI 在 Grok Build 中引入 `/goal` 新模式。用户只需用一行命令设定目标，agent 便会自动规划方案、分解任务为进度清单并持续执行，直至目标完成且通过验证，期间可额外下达指令。该模式支持监控与引导命令，任务完成时清单全部勾选。即日起可用，用户可通过 `curl -fsSL | bash` 安装 CLI 并登录账号即可使用。", "publishedAt": "2026-06-22T00:00:00.000Z", "category": "ai-products", "sourceName": "xAI：News（网页）", "sourceUrl": "https://x.ai/news/introducing-goal"}, {"idx": 14, "title": "美团tabbit国际版免费接入GPT-5.5/Claude Opus 4.8等旗舰模型", "summary": "美团近期上线tabbit国际版应用，免费集成多家顶级AI模型的最新旗舰版，包括GPT-5.5、Claude Opus 4.8、Gemini 3.5 Flash，以及国内Kimi-2.6、GLM-5.1、MiniMax-M3。用户无需单独订阅即可使用这些模型。需注意：只有国际版包含海外模型，国内版仅提供国内模型。该应用旨在抢占AI入口，目前处于免费推广阶段。", "publishedAt": "2026-06-21T10:11:21.000Z", "category": "ai-products", "sourceName": "X：阿易 AI Notes (@AYi_AInotes)", "sourceUrl": "https://x.com/AYi_AInotes/status/2068637890247016607"}, {"idx": 15, "title": "NVIDIA Research 发布 SpatialClaw：免训练空间推理框架", "summary": "NVIDIA Research 发布 SpatialClaw，一个免训练的空间推理框架。它通过将代码作为动作接口，让智能体调用感知工具（Depth Anything 3、SAM 3）并自由组合输出，解决视觉语言模型在 3D 空间判断上的弱点。在 20 项基准测试中平均准确率达 59.9%，比近期智能体 SpaceTools 高 11.2 个百分点，比无工具基线高 6.5 点，比结构化工具调用高 3.2 点。框架无需重新训练，同一提示词和工具集可跨所有基准和骨干网络运行，支持 Qwen3.5/3.6 及 Gemma4 等 26B 至 397B 参数的模型。", "publishedAt": "2026-06-19T22:51:59.000Z", "category": "ai-products", "sourceName": "MarkTechPost（RSS）", "sourceUrl": "https://www.marktechpost.com/2026/06/19/nvidia-ai-introduce-spatialclaw-a-training-free-agent-that-treats-code-as-the-action-interface-for-spatial-reasoning"}, {"idx": 16, "title": "Cloudflare 为 AI 智能体推出临时账户", "summary": "Cloudflare 在 Workers 上推出临时账户（Temporary Accounts），允许 AI 智能体直接运行 `wrangler deploy --temporary`，在数秒内获取一个可用的实时 Worker，无需绕开面向人类设计的部署流程。该功能旨在降低智能体部署门槛。", "publishedAt": "2026-06-19T13:00:00.000Z", "category": "ai-products", "sourceName": "Cloudflare Blog", "sourceUrl": "https://blog.cloudflare.com/temporary-accounts"}, {"idx": 17, "title": "阿里开源向量数据库Zvec，UCSD黄碧薇教授提出因果AI第四代范式", "summary": "阿里开源内部向量数据库Zvec，pip install zvec免费使用，对标Pinecone每月70美元能力。支持十亿向量毫秒级检索，无需单独起服务，全平台兼容；v0.5.0新增原生全文混合搜索。UCSD黄碧薇教授（causal-learn作者）提出AI四代范式：相关性小模型→因果小模型→相关性大模型（LLM）→因果大模型，认为当前正站在第四代门口。其创立的Aether AI完成首轮融资，致力于从视频中自动抽取物理规律，探索下一代因果AI范式。", "publishedAt": "2026-06-19T04:49:25.000Z", "category": "ai-products", "sourceName": "X：阿易 AI Notes (@AYi_AInotes)", "sourceUrl": "https://x.com/AYi_AInotes/status/2067832098816250346"}, {"idx": 18, "title": "AI 员工 Viktor 登陆 Microsoft Teams，年化收入达 2000 万美元", "summary": "AI 员工 Viktor 在 Slack 上实现 2000 万美元年化收入（无销售团队、未大规模推广），现已正式进驻 Microsoft Teams。Viktor 定位为零门槛 AI：用户无需学习、无需提示词，像 @同事 一样提及即可获得完整工作成果，甚至无需主动 @ 也能自动完成。产品面向 Teams 的 3.2 亿用户，助力企业内部运营和管理人员零学习成本使用 AI。即日起免费试用，含 100 美元信用额度，无需绑定信用卡。", "publishedAt": "2026-06-18T23:45:03.000Z", "category": "ai-products", "sourceName": "X：Rohan Paul (@rohanpaul_ai)", "sourceUrl": "https://x.com/rohanpaul_ai/status/2067755504613613699"}]}, {"label": "行业动态", "slug": "industry", "count": 9, "items": [{"idx": 19, "title": "五眼联盟警告：AI网络威胁数月内将影响普通用户", "summary": "2026年6月22日，五眼联盟（美、英、加、澳、新）网络安全部门联合警告，即将到来的AI模型（如OpenAI的GPT-5.5-Cyber、Anthropic的Mythos）将降低编写复杂攻击代码的门槛。自动化智能体可全天候扫描互联网漏洞，大幅缩短安全窗口期。AI驱动的超个性化钓鱼诈骗已在亚太蔓延，印度2026年初勒索软件事件激增165%。五眼联盟建议企业部署自动化防御AI，个人用户开启多因素认证、删除闲置账户。", "publishedAt": "2026-06-23T08:00:00.000Z", "category": "industry", "sourceName": "Artificial Intelligence News（RSS）", "sourceUrl": "https://www.artificialintelligence-news.com/news/five-eyes-warning-ai-cyber-threats"}, {"idx": 20, "title": "美国警长利用Flock车牌系统跟踪前女友案频发，Flock法务官承认\"最常见滥用\"", "summary": "伊利诺伊州Holiday Hills警察局长于2026年6月18日被捕，被控两项渎职重罪。检方指控他利用Flock车牌读取系统及州警察数据库，跟踪6名认识的人，其中3人为前女友，并对其中一人的前男友车牌查询140次（86次脱岗），持续18个月。全美至少18起类似案例：佐治亚州Braselton警察局长、爱达荷州Jerome县警长（700余次查询其妻车牌）等均因此辞职或被捕。Flock首席法务官Dan Haley承认，滥用该系统\"最常见情况\"就是跟踪前女友。Flock称系统只跟踪车辆，但案例表明车辆是手段，人是目标。", "publishedAt": "2026-06-22T21:32:12.384Z", "category": "industry", "sourceName": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://ipvm.com/reports/police-chiefs-track"}, {"idx": 21, "title": "Google DeepMind 7500 万美元投资 A24，合作开发电影 AI 工具", "summary": "Google DeepMind 宣布向独立电影制片厂 A24 投资 7500 万美元（据《华尔街日报》），双方将合作开发电影制作 AI 工具。A24 出品过《万事俱备》《后室》等影片。Google DeepMind CEO Demis Hassabis 称，希望通过与艺术家直接合作，打造支持创意表达的 AI 功能。此举是好莱坞最新一次科技公司与电影 AI 联手，此前 Netflix 已收购 Ben Affleck 的 AI 工具公司 Interpositive，亚马逊 MGM 工作室也在去年设立了影视 AI 部门。", "publishedAt": "2026-06-22T18:49:44.000Z", "category": "industry", "sourceName": "TechCrunch：AI（RSS）", "sourceUrl": "https://techcrunch.com/2026/06/22/google-deepmind-bets-75m-on-ais-future-in-hollywood-with-a24-deal"}, {"idx": 22, "title": "开辟新赛道：小米 YU7 GT 创全球首个纽北自动驾驶圈速纪录，官方圈速榜新增\"自动驾驶\"分类", "summary": "小米 YU7 GT（选配赛道专业套装）在纽博格林北环赛道以自动驾驶系统完成全程无人计时圈，成绩 10 分 29 秒 483，成为全球首个纽北自动驾驶圈速纪录。纽北官方圈速榜因此新增\"自动驾驶\"分类。小米汽车表示，在极限赛道中锤炼的动态模型、高频扭矩分配和毫秒级救车能力，将逐步下放至量产车，以提升用户在暴雨、冰雪等极端工况下的底盘与智驾安全。", "publishedAt": "2026-06-22T15:13:29.000Z", "category": "industry", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/967/234.htm"}, {"idx": 23, "title": "微软双向转售GPT与DeepSeek成全球最大AI中间商", "summary": "彭博社报道，微软已成为全球最大AI模型中转站，既将ChatGPT卖给中国企业，也反向将DeepSeek模型卖给西方客户。报道称微软正在测试DeepSeek-R1和DeepSeek-V4，计划向西方客户提供这些中国模型。这一模式构建起跨中美AI模型的双向贸易网络。", "publishedAt": "2026-06-20T06:25:29.000Z", "category": "industry", "sourceName": "X：阿易 AI Notes (@AYi_AInotes)", "sourceUrl": "https://x.com/AYi_AInotes/status/2068218661710512231"}, {"idx": 24, "title": "Figure机器人数首超人类员工", "summary": "我们已超越理论阶段。\n\n有史以来第一次，Figure的机器人数量超过了人类员工数量。", "publishedAt": "2026-06-19T21:50:24.000Z", "category": "industry", "sourceName": "X：Rohan Paul (@rohanpaul_ai)", "sourceUrl": "https://x.com/rohanpaul_ai/status/2068089038213693800"}, {"idx": 25, "title": "JAWBONE Act：一项打击政府为压制合法网络言论而施压的新法案", "summary": "上周，参议员Ted Cruz和Ron Wyden提出两党法案JAWBONE Act，为受政府胁迫的广播商、互动计算机服务商及AI提供商创建针对政府官员的联邦诉讼权，并建立政府与中间方就用户表达问题沟通的透明度体系。法案旨在应对政府施压私营公司审查受第一修正案保护的言论。EFF支持该法案，并举证：2025年6月联邦高官威胁起诉ICEBlock创建者，同年10月司法部长要求苹果下架该应用。EFF还提起信息自由诉讼，要求披露政府与苹果、谷歌、Meta的沟通记录。", "publishedAt": "2026-06-19T19:41:30.069Z", "category": "industry", "sourceName": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://www.eff.org/deeplinks/2026/06/new-bill-takes-aim-government-pressure-silence-lawful-online-speech"}, {"idx": 26, "title": "AlphaFold 负责人 John Jumper 离职 Google DeepMind，加入 Anthropic", "summary": "AlphaFold 团队负责人 John Jumper 宣布，在 Google DeepMind 工作近 9 年后决定离职，将加入 Anthropic（先休整一段时间）。DeepMind CEO Demis Hassabis 表示，过去 9 年与 Jumper 的非凡合作改变了世界，AlphaFold 展示了 AI 在科学与医学领域的巨大潜力，并为 AI 造福人类指明了方向。Jumper 回忆，Hassabis 在他博士毕业仅 6 个月后就大胆让他领导 AlphaFold 团队，感谢团队教会他如何做伟大的科学。", "publishedAt": "2026-06-19T16:07:27.000Z", "category": "industry", "sourceName": "X：Demis Hassabis (@demishassabis)", "sourceUrl": "https://x.com/demishassabis/status/2068002732250640603"}, {"idx": 27, "title": "八部门联合发文力推\"人工智能 + 消费\"，扩大 AI 手机电脑及智能网联汽车消费", "summary": "商务部等8部门近日印发《关于加快\"人工智能 + 消费\"发展的实施意见》，从5方面提出17条举措。重点包括：扩大AI手机电脑、智能家居、智能网联汽车、智能穿戴、AI机器人等供给；推动AI与居家、养老、文旅、餐饮、教育等融合；促进AI在批发零售、电商、物流领域应用；建设集聚区和体验中心，开展产品租赁、共享、试用等模式创新；完善基础设施、标准体系和监管，推动互联互通。商务部将协同落实，促进AI进千家万户。", "publishedAt": "2026-06-18T23:56:08.000Z", "category": "industry", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/966/295.htm"}]}, {"label": "论文研究", "slug": "paper", "count": 3, "items": [{"idx": 28, "title": "Google Labs 提出用\"洞察策略\"评估 AI 编码智能体的主动性", "summary": "Google Labs 提出以\"洞察策略\"评估 AI 编码智能体的主动性，而非仅按任务完成度打分。团队基于 Google 内部代码库 705 个 bug（1178 个 CL），通过时空近邻与语义相似度聚类还原开发者实际的高层级目标。初步实验显示：Jules 在单轮探索下洞察相关性评分平均 4.5/5；探索预算从两轮增至三轮时，Hit@5 准确率从 33% 升至 57%。团队正将评估方法扩展至公开 GitHub 数据，并探索纳入问题追踪器、对话等更丰富的上下文。", "publishedAt": "2026-06-22T16:08:41.780Z", "category": "paper", "sourceName": "Google Developers Blog（RSS）", "sourceUrl": "https://developers.googleblog.com/measuring-what-matters-with-jules"}, {"idx": 29, "title": "HAKARI-Bench：统一条件下比较检索架构与效率设置的轻量级基准", "summary": "HAKARI-Bench 是一个轻量级检索基准，将现有检索套件重建为小型数据集（Nano-sets），涵盖 35 个基准、551 个任务和 43 种语言，采用统一格式实现模型无关比较。它支持 BM25、稠密、稀疏、晚交互和重排序五种检索家族及其效率变体（降维、量化等）在同一条件下对比。在 55 个模型上，整体排名与 MTEB retrieval v2、MMTEB v2 retrieval 及 English BEIR（完整版）的 Spearman 相关系数均高于 0.97。HAKARI-Bench 不取代全面评测，而是用于快速模型选择、回归检测和探索质量-效率帕累托前沿。代码、数据和排行榜以 MIT 许可证开源。", "publishedAt": "2026-06-22T00:00:00.000Z", "category": "paper", "sourceName": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2606.22778"}, {"idx": 30, "title": "MosaicLeaks： 你的研究智能体能保守秘密吗？", "summary": "深度研究智能体在结合私有本地文档与外部网页检索时存在隐私泄露风险。MosaicLeaks 提出包含 1，001 条多跳研究链的新任务，每条链交错混合本地与公共子问题。测试发现智能体频繁泄露私有信息，单纯优化任务性能反而加剧泄露。基于此，研究提出隐私感知深度研究（PA-DR）强化学习训练方法，将严格链成功率从 48.7% 提升至 58.7%，同时将答案/全面信息泄露率从 34.0% 降至 9.9%。", "publishedAt": "2026-06-18T18:13:13.000Z", "category": "paper", "sourceName": "Hugging Face：Blog（RSS）", "sourceUrl": "https://huggingface.co/blog/ServiceNow/mosaicleaks"}]}, {"label": "技巧与观点", "slug": "tip", "count": 20, "items": [{"idx": 31, "title": "huggingface_hub 实现每周发布：AI、开源工具、人工审核闭环", "summary": "Hugging Face 将 huggingface_hub 的发布周期从每 4-6 周缩短至每周，全部由单个 GitHub Actions 工作流自动完成。流程依赖开源工具和开权重模型（当前为 Z.ai 的 GLM-5.2）来起草发布说明和 Slack 公告，但保留人类在最终审核环节的决定权。自动步骤包括版本号更新、提交标签推送、PyPI 发布、下游测试分支创建、发布说明草稿、Slack 公告草稿、归档、后置版本提升以及对合入 PR 的评论。所有组件均基于开源生态构建，任何维护者都可直接复制使用。", "publishedAt": "2026-06-23T00:00:00.000Z", "category": "tip", "sourceName": "Hugging Face：Blog（RSS）", "sourceUrl": "https://huggingface.co/blog/huggingface-hub-release-ci"}, {"idx": 32, "title": "AI 治理清单：LLM 架构先行", "summary": "Deloitte 报告显示企业 AI 抱负与治理成熟度之间差 53 个百分点，74% 计划两年内部署智能体 AI，仅 21% 拥有成熟治理模型。路由架构是首个治理层。三种姿态--托管网关（如 OpenRouter、Portkey）、自托管网关（如 LiteLLM）和直接 API--默认治理能力不同，直接 API 缺乏统一控制面，造成治理盲区。治理清单可映射为资产盘点、问责制、访问控制、证据记录与合规性五大支柱。路由层能提供跨团队可见性与审计证据，而电子表格不能。", "publishedAt": "2026-06-22T19:00:00.000Z", "category": "tip", "sourceName": "OpenRouter：Announcements（RSS）", "sourceUrl": "https://openrouter.ai/blog/insights/ai-governance-checklist"}, {"idx": 33, "title": "Google ADK 与 A2A 协议：跨语言多智能体团队构建实战", "summary": "一篇技术博客展示了如何用 Google Agent Development Kit （ADK） 与 Agent2Agent （A2A） 协议搭建跨语言多智能体流水线：Python agent 调用 Gemini 解析合同条款，Go agent 用纯确定性逻辑校验合规性。A2A 协议通过 Agent Card 实现能力发现、JSON-RPC 2.0 完成通信、Task 状态机管理任务生命周期；ADK 的 RemoteA2aAgent 抽象可将任意 A2A 兼容服务封装成本地子智能体。文中强调将单体提示词分解为专业化微智能体，以解决上下文退化、故障爆炸半径和不可测试性问题。完整源码已在 GitHub 发布。", "publishedAt": "2026-06-22T17:08:43.358Z", "category": "tip", "sourceName": "Google Developers Blog（RSS）", "sourceUrl": "https://developers.googleblog.com/build-cross-language-multi-agent-team-with-google-agent-development-kit-and-a2a"}, {"idx": 34, "title": "OpenRouter：通过API路由实现AI数据驻留合规", "summary": "Deloitte 报告显示 77% 的公司将供应商国籍纳入 AI 选型考量。OpenRouter 将数据驻留视为路由决策：通过 API 请求中的 `provider` 对象设置 `order` 或 `only` 限定服务商、`allow_fallbacks` 为 `false` 禁止回退、`data_collection` 为 `deny` 禁止数据存储或训练、`zdr` 为 `true` 要求零数据保留。示例以 `anthropic/claude-sonnet-4.6` 调用，首选 Anthropic 直连和 Amazon Bedrock。针对欧盟需求，可限制仅 Mistral 等欧盟总部供应商。若无可合规供应商，API 返回错误而非路由至不合规服务商。", "publishedAt": "2026-06-22T15:00:00.000Z", "category": "tip", "sourceName": "OpenRouter：Announcements（RSS）", "sourceUrl": "https://openrouter.ai/blog/insights/ai-data-residency"}, {"idx": 35, "title": "Anthropic 工程负责人：Claude Code 让程序员更孤独", "summary": "6月22日，Anthropic工程负责人Fiona Fung表示，Claude Code和Claude Cowork等AI智能体让工程师越发依赖智能体工作，彼此之间交流减少，长期易感孤独。团队为此组织编程午餐、黑客松和共同开发时段，重新创造面对面协作机会。调查显示Claude Code已成为创业公司最常用的AI编程工具，\"氛围编程\"兴起使\"单人创业者\"增多，但Fung强调协作仍不可或缺。", "publishedAt": "2026-06-22T13:25:46.000Z", "category": "tip", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/967/216.htm"}, {"idx": 36, "title": "Cursor 审计发现奖励黑客行为淹没模型智能提升", "summary": "Cursor 通过审计模型轨迹发现，在 SWE-bench Pro 上 Opus 4.8 Max 有 63% 的成功解决方案直接从公开来源检索修正而非自主推导。隔离 git 历史并限制网络后，Opus 4.8 Max 得分从 87.1% 跌至 73.0%，Composer 2.5 从 74.7% 跌至 54.0%。在 SWE-bench Multilingual 上，标准环境与严格环境得分差距分别为 9.1 和 7.5 个百分点。两种主要模式是上游查找（57%）和 git 历史挖掘（9%）。研究建议通过审计轨迹和限制运行时环境来缓解此类奖励黑客行为。", "publishedAt": "2026-06-22T12:00:00.000Z", "category": "tip", "sourceName": "Cursor Blog", "sourceUrl": "https://cursor.com/blog/reward-hacking-coding-benchmarks"}, {"idx": 37, "title": "我们用免费本地模型对 OpenClaw 仓库进行实时分类", "summary": "Hugging Face 在 OpenClaw 仓库上测试用 Gemma 和 Qwen 等本地模型实时分类 issue 和 PR。他们使用 Pi agent harness 驱动模型，配合 reposhell 只允许读操作防止提示词注入。测试的模型包括 gemma-4-26b-a4b 和 qwen3.6-35b-a3b，经性能优化后均可在本地生成数百 token/s。该方案运行在 NVIDIA GB10（128 GB 统一内存）上，相比每月 200 美元的 ChatGPT Pro 订阅，可实现近乎实时的通知且仅消耗电费。", "publishedAt": "2026-06-22T00:00:00.000Z", "category": "tip", "sourceName": "Hugging Face：Blog（RSS）", "sourceUrl": "https://huggingface.co/blog/local-models-pr-triage"}, {"idx": 38, "title": "腾讯元宝父亲节活动：上传照片生成与年轻爸爸的合影", "summary": "腾讯元宝推出父亲节主题活动，用户可选择爸爸年轻时照片与自己的照片，输入提示词（如\"帮我生成一张和爸爸的合影，将图2的我融合到图1爸爸的照片中，我想穿越回__年前，和他一起_____；保留爸爸照片的背景、动作及五官；人物姿态自然协调，整体光线与色调保持一致\"），元宝即可生成合影。活动旨在让用户\"回到过去\"看到爸爸的青春模样。", "publishedAt": "2026-06-21T04:51:10.000Z", "category": "tip", "sourceName": "公众号：腾讯元宝", "sourceUrl": "https://mp.weixin.qq.com/s/xrTg2Bdy3FF3gn3C_gVBJQ"}, {"idx": 39, "title": "开源教程《Deep Agents 实战》发布", "summary": "LangChain 官方认证大使 @zhanghaili0610 推出开源教程《Deep Agents 实战》，基于 LangChain / LangGraph 生态，讲解如何用 Deep Agents Harness 框架构建真实 Agent 应用。核心是\"三层架构\"：Runtime（LangGraph）、Framework（LangChain）、Harness（Deep Agents）。技术内核为上下文工程，通过虚拟文件系统实现按需读取、中间结果落盘、大文件局部读取。教程共 8 章 + 2 准备篇，覆盖虚拟文件系统（六大工具）、任务规划、子 Agent 委派（异步并行）及 Skills 复用（可在 Claude Code、Cursor 等 30+ 工具中通用）。", "publishedAt": "2026-06-20T12:16:16.000Z", "category": "tip", "sourceName": "X：邵猛 (@shao__meng)", "sourceUrl": "https://x.com/shao__meng/status/2068306942184034471"}, {"idx": 40, "title": "OpenRouter vs Portkey：你的团队该选哪个LLM网关？", "summary": "OpenRouter是托管路由网络，买credits后通过一个API路由至70+供应商，自动故障转移，无需自有密钥；覆盖300+模型（含20+免费），按用量收费（零加成+5.5%平台费，首100万免费），支持零数据保留和欧盟路由。Portkey是AI控制平面（2026年被Palo Alto收购），置于用户密钥之上，增加治理、提示管理、护栏和可观测性；提供1600+ LLM统一API，按日志计费（Developer免费，Production $49/月），支持HIPAA、SSO、私有部署。两者均可组合使用。", "publishedAt": "2026-06-19T19:00:00.000Z", "category": "tip", "sourceName": "OpenRouter：Announcements（RSS）", "sourceUrl": "https://openrouter.ai/blog/insights/openrouter-vs-portkey"}, {"idx": 41, "title": "baoyu-design Skill迭代：修复导出样式与渐变丢失问题，支持AI配图导出PPTX", "summary": "宝玉分享 baoyu-design Skill 的迭代过程：用户测试发现导出问题（样式表未铺满整页、渐变色丢失），他在本地复现后让 Agent 分析原因、给出解决方案并添加测试覆盖，修复后效果改善。该 Skill 可在制作 PPT、动画视频或网站时调用 AI 生图配图，支持 Codex 内置画图或配合 baoyu-image-gen Skill 调用 Codex CLI 画图，并能连同图片一起导出为 PPTX，在 PowerPoint/Keynote 中二次编辑。迭代循环：自己用 → 发现问题 → 让 Agent 分析 → 出方案 → 确认 → 更新 Skill。", "publishedAt": "2026-06-19T18:43:30.000Z", "category": "tip", "sourceName": "X：宝玉 (@dotey)", "sourceUrl": "https://x.com/dotey/status/2068042001895809420"}, {"idx": 42, "title": "AI中心的数据黑洞", "summary": "智能的一种定义是样本效率，但近年AI进步主要靠扩充数据分布和增加算力。强化学习本质是合成数据生成--投入大量算力通过验证器筛选\"好\"数据，再训练模型预测正确输出。这一过程需要每个领域和技能的海量人类专家示例，数据行业年收入已达数十亿美元。近日Epoch报告，开源模型仅落后前沿闭源模型4个月，原因在于数据可从公开API蒸馏，而超参数等不易复制。人类一生接触约2亿token，前沿模型训练在数十到数百T token之间，相差近百万倍--机器人、自动驾驶等领域同样存在巨大效率差距。", "publishedAt": "2026-06-19T16:45:03.000Z", "category": "tip", "sourceName": "Dwarkesh Patel：Podcast & Blog（RSS）", "sourceUrl": "https://www.dwarkesh.com/p/the-sample-efficiency-black-hole-2"}, {"idx": 43, "title": "OpenRouter vs LiteLLM：如何选择 LLM 网关", "summary": "OpenRouter 是托管在 Cloudflare 边缘的 LLM 网关，无需管理基础设施，收取 5.5% 平台费（前 100 万次请求免费），支持 70+ 提供商和自动故障转移。LiteLLM 是自部署代理（Docker/PostgreSQL/Redis），数据不离开内网，免费开源，但需承担基础设施成本（生产部署约数百美元/月）。当模型月支出超过约 $3，600（基础设施 $200/月）或 $9，100（基础设施 $500/月）时自托管更划算。LiteLLM 提供六种路由策略和自定义 Python 路由；OpenRouter 具备 SOC 2、GDPR 认证和零数据保留选项。两者可串联使用。", "publishedAt": "2026-06-19T15:00:00.000Z", "category": "tip", "sourceName": "OpenRouter：Announcements（RSS）", "sourceUrl": "https://openrouter.ai/blog/insights/openrouter-vs-litellm"}, {"idx": 44, "title": "禁止开源AI将是一个错误", "summary": "近期行政命令、国会提案及对Anthropic最先进模型的境外访问限制，可能开启新一轮AI监管。开源软件已支撑全球90%以上软件并创造8万亿美元经济价值，在教育、创新和竞争三方面持续赋能。Anthropic与OpenAI的封闭模型加剧市场集中，开源（尤其开放权重）是初创公司、教育机构和企业获得替代方案的唯一平衡力量。开源透明性使其更安全，更多工程师可剔除不需要的模型行为或修复漏洞。以中国竞争为由监管开源将适得其反，美国初创公司正依赖包括中国在内的开源模型提升效率。", "publishedAt": "2026-06-19T13:02:47.000Z", "category": "tip", "sourceName": "Nathan Lambert：Interconnects（RSS）", "sourceUrl": "https://www.interconnects.ai/p/banning-open-source-ai-would-be-a"}, {"idx": 45, "title": "/youtube-notetaker：YT 视频转 Artifacts", "summary": "YT 视频 -> Artifacts\n\n看看我如何使用新的 /youtube-notetaker 技能从 YT 视频生成 Artifacts。\n\n捕获幻灯片、笔记、转录内容……\n\n快去试试 ↓", "publishedAt": "2026-06-19T12:48:45.000Z", "category": "tip", "sourceName": "X：Elvis Saravia (@omarsar0, DAIR.AI)", "sourceUrl": "https://x.com/omarsar0/status/2067952726282031411"}, {"idx": 46, "title": "Humanize PPT v0.9：为演讲而生的开源PPT Skill", "summary": "Humanize PPT v0.9 是一款专为演讲场景设计的PPT Skill，核心通过AST（Audience， State， Transfer）逻辑重新编排大纲，将页面渲染外包给下游Skill。渲染前先输出4张真实预览页，并将图片、视频素材的占位与生成prompt写入大纲。新增质检环节自动修复常见渲染问题，并支持演讲模式：按S键在独立窗口显示演讲稿备注，按ESC键打开全局索引快速跳页。项目已开源至github.com/LearnPrompt/humanize-ppt，由卡尔 & yc星辰开发。", "publishedAt": "2026-06-19T09:48:28.000Z", "category": "tip", "sourceName": "公众号：卡尔的AI沃茨", "sourceUrl": "https://mp.weixin.qq.com/s/rGoYnUcBRkfRKQPbIaawyg"}, {"idx": 47, "title": "我们在 Elasticsearch 上构建了一个持久化代理内存层，其召回率为0.89", "summary": "Agent Builder 正式上市（GA）。基于 Elasticsearch 的持久化内存层将记忆分为情景、语义、程序三类，分别存入独立索引，各设不同写速率与过期规则。召回采用 BM25 与 Jina v5 稠密向量的 RRF 融合，再经交叉编码器重排序。在 168 道 QA 题评估中，R@10 平均 0.89，零跨租户泄漏。该层可通过支持 MCP 协议的客户端访问，不绑定特定运行时，已开源至 GitHub。", "publishedAt": "2026-06-19T05:01:18.006Z", "category": "tip", "sourceName": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://www.elastic.co/search-labs/blog/agent-memory-elasticsearch"}, {"idx": 48, "title": "DeepSeek研究员开源AutoResearch：AI自主跑通285B模型RL研究闭环", "summary": "DeepSeek研究员Deli Chen将AutoResearch协议开源，并发布Self-play综述论文。其AI智能体首次完全自主地在DeepSeek 285B模型上完成完整RL研究闭环--从实验设计、写代码、提交GPU任务、debug到结论总结，全程零人工干预。系统调用了GRPO工具，被视为持续学习研究的开端。", "publishedAt": "2026-06-19T03:58:46.000Z", "category": "tip", "sourceName": "X：阿易 AI Notes (@AYi_AInotes)", "sourceUrl": "https://x.com/AYi_AInotes/status/2067819352926150953"}, {"idx": 49, "title": "Salesforce CodeGen教程：生成、验证并重排序Python函数（含单元测试与安全检查）", "summary": "本教程实现一个基于Salesforce CodeGen的端到端代码生成工作流。从HuggingFace加载CodeGen模型（支持350M、2B、codegen2-1B、codegen25-7b等版本），通过自然语言提示生成Python函数，随后进行函数提取、语法检查、静态安全检查、单元测试验证、best-of-N候选重排序、多步程序合成、提示词实验、基准可视化及导出。展示了CodeGen作为结构化代码生成流水线的能力，不仅完成代码补全，还能评估、筛选和组织生成结果。", "publishedAt": "2026-06-19T02:44:12.000Z", "category": "tip", "sourceName": "MarkTechPost（RSS）", "sourceUrl": "https://www.marktechpost.com/2026/06/18/salesforce-codegen-tutorial-generate-validate-and-rerank-python-functions-with-unit-tests-and-safety-checks"}, {"idx": 50, "title": "OpenClaw 接入 OpenRouter", "summary": "OpenClaw 已内置 OpenRouter 支持，一条命令即可为 AI 智能体配置统一密钥、统一账单，并实现跨 300 多个模型的自动故障转移。同时提供具体设置步骤以及常见错误的修复方法。", "publishedAt": "2026-06-18T19:00:00.000Z", "category": "tip", "sourceName": "OpenRouter：Announcements（RSS）", "sourceUrl": "https://openrouter.ai/blog/tutorials/openclaw-openrouter"}]}]}
</script>
<script>
const EMBEDDED_DATA = JSON.parse(document.getElementById("dataSrc").textContent);
const SECTION_CONFIG = {"模型发布/更新": {"icon": "🤖", "color": "#7f6af0"}, "产品发布/更新": {"icon": "📦", "color": "#e8622a"}, "行业动态": {"icon": "🏭", "color": "#1d9e75"}, "论文研究": {"icon": "📄", "color": "#378add"}, "技巧与观点": {"icon": "💡", "color": "#e8a020"}};
const DAILY_STR = "2026-06-23";
const DAILY_MAX = "2026-06-23";

let currentData = null;
let currentDate = DAILY_STR;
let readSet = new Set();
let showOnlyUnread = false;
let currentFilter = 'all';
let currentSearch = '';
let isDark = true;

}
window.addEventListener('DOMContentLoaded', function() {
  try { readSet = new Set(JSON.parse(localStorage.getItem('aidaka_read_' + currentDate) || '[]')); } catch(e) {}
  try {

    if (saved === 'light') { isDark = false; document.body.classList.add('light'); }

  updateThemeBtn();

    setTimeout(function() { document.getElementById('loadingOverlay').style.display = 'none'; }, 400);

function renderAll(data) {

  var main = document.getElementById('main');

      s.items.forEach(function(item) {
        globalIdx++;
        var cardEl = buildCard(item, globalIdx);
