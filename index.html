<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI打卡网 · 2026-06-01</title>
<style>
  :root {
    --bg: #0f0f0f;
    --bg2: #1a1a1a;

  .light {

    --bg2: #fff;
    --bg3: #f3f3f3;
    --bg4: #e8e8e8;
    --text: #1a1a1a;

    background: var(--bg);

  .hero-badge {

    font-size: 12px;

  .theme-btn {
    background: rgba(255,255,255,0.15);

  .read-progress-label .icon { font-size: 16px; }
  .read-bar {
    height: 6px;
    background: rgba(255,255,255,0.25);
    border-radius: 3px;
    width: 100%;

  }
  .read-bar-fill {

    background: #fff;

    transition: width 0.4s ease;
    box-shadow: 0 0 6px rgba(255,255,255,0.5);
  }
  .search-count {
    font-size: 13px;
    color: var(--text3);

  }
  .nav-date-area {

    align-items: center;

    margin-left: auto;

  }
  .nav-date-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 12px;
    color: var(--text2);
    cursor: pointer;
    transition: all var(--transition);
    font-family: var(--font);
  }
  .nav-date-btn:hover:not(:disabled) { background: var(--accent); color: #fff; border-color: var(--accent); }
  .nav-date-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .nav-date-label { font-size: 12px; color: var(--text3); }
  .main { max-width: 960px; margin: 0 auto; padding: 24px 16px 60px; }
  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 40px 0 20px;
    padding-bottom: 12px;
    border-bottom: 2px solid var(--border);
  }
  .section-header:first-child { margin-top: 8px; }
  .section-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px;
    flex-shrink: 0;
  }
  .section-title { font-size: 18px; font-weight: 700; color: var(--text); }
  .section-count {
    background: var(--bg3);
    border-radius: 10px;
    padding: 2px 10px;
    font-size: 12px;
    color: var(--text3);
    margin-left: auto;
  }
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    box-shadow: var(--card-shadow);
    transition: transform var(--transition), box-shadow var(--transition), opacity var(--transition), border-color var(--transition);
    opacity: 0;
    transform: translateY(18px);
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }
  .card.visible { opacity: 1; transform: translateY(0); }
  .card.read { opacity: 0.5; }
  .card.read::after {
    content: '已读';
    position: absolute;
    top: 12px;
    right: 12px;
    background: var(--bg4);
    color: var(--text3);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 6px;
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); border-color: var(--accent); }
  .card.hidden { display: none !important; }
  .card.highlight { border-color: var(--accent2); background: rgba(232,98,42,0.06); }
  .card-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px; height: 24px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    border-radius: 6px;
    margin-bottom: 10px;
    flex-shrink: 0;
  }
  .card-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
  .card-title { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.5; flex: 1; }
  .card-title mark {
    background: rgba(232,98,42,0.3);
    color: var(--accent2);
    border-radius: 2px;
    padding: 0 2px;
  }
  .card-source {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 9px;
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 10px;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .card-summary {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.65;
    margin-bottom: 12px;
    overflow: hidden;
    transition: max-height 0.35s ease;
    word-break: break-word;
  }
  .card-summary.collapsed {
    max-height: 4.95em;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-summary.expanded {
    -webkit-line-clamp: unset;
    display: block;
    max-height: 800px;
  }
  .card-footer { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }
  .expand-btn {
    background: none;
    border: none;
    color: var(--accent2);
    font-size: 12px;
    cursor: pointer;
    font-family: var(--font);
    padding: 0;
    transition: color var(--transition);
  }
  .expand-btn:hover { color: var(--accent); }
  .source-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    text-decoration: none;
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    transition: opacity var(--transition);
  }
  .source-btn:hover { opacity: 0.85; }
  .read-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    color: var(--text3);
    cursor: pointer;
    font-family: var(--font);
    transition: all var(--transition);
  }
  .read-btn:hover { border-color: var(--accent); color: var(--accent); }
  .time-badge { font-size: 11px; color: var(--text3); display: block; margin-bottom: 8px; }
  .analytics-wrap {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 32px;
  }
  .analytics-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
  }
  .analytics-title { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 14px; }
  .source-rank-item { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 13px; cursor: pointer; transition: opacity var(--transition); }
  .source-rank-item:hover { opacity: 0.75; }
  .source-rank-bar-bg { flex: 1; height: 6px; background: var(--bg4); border-radius: 3px; overflow: hidden; }
  .source-rank-bar { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
  .source-rank-name { width: 120px; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px; }
  .source-rank-count { width: 20px; color: var(--text3); text-align: right; font-size: 12px; }
  .hotwords-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
  .hotword-chip {
    padding: 4px 12px;
    border-radius: 16px;
    font-size: 12px;
    color: #fff;
    cursor: pointer;
    transition: transform var(--transition);
  }
  .hotword-chip:hover { transform: scale(1.08); }
  .no-results { text-align: center; padding: 60px 20px; color: var(--text3); display: none; }
  .no-results.show { display: block; }
  .no-results-icon { font-size: 36px; margin-bottom: 12px; }
  .loading-overlay {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;

  }
  .spinner {

    border: 3px solid var(--bg4);

  @keyframes spin { to { transform: rotate(360deg); } }
  .footer {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 16px 40px;

    border-top: 1px solid var(--border);

  }

    align-items: center;
    justify-content: center;
  }
  .modal-overlay.show { display: flex; }

    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 90%;

  }

    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 14px;
    color: var(--text);

    margin-bottom: 14px;
    outline: none;

    padding: 10px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    font-family: var(--font);
    transition: all var(--transition);

  .modal-btn.primary:hover { background: var(--accent2); }

    border-radius: 10px;
    padding: 10px 20px;
    font-size: 13px;
    color: var(--text);

  @media (max-width: 600px) {
    .analytics-wrap { grid-template-columns: 1fr; }
    .hero-title { font-size: 28px; }
    .card-grid { grid-template-columns: 1fr; }
    .nav-date-area { display: none; }
  }

</head>
<body>
<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>查看历史日報</h3>
    <input type="date" class="date-picker" id="datePicker" value="2026-06-01" max="2026-06-01">
    <div class="modal-btns">
      <button class="modal-btn secondary" onclick="closeModal()">取消</button>
      <button class="modal-btn primary" onclick="goToDate()">前往</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="hero">
  <div class="hero-inner">
    <div class="hero-top">
      <span class="hero-badge">AI打卡网 · 每日晨报</span>
      <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">亮色模式</button>
    </div>
    <h1 class="hero-title" id="heroTitle">AI打卡网</h1>
    <p class="hero-subtitle" id="heroSubtitle">加载中…</p>
    <div class="hero-stats" id="heroStats"></div>
    <div class="donut-wrap" id="donutWrap">
      <svg class="donut-svg" id="donutSvg" width="100" height="100" viewBox="0 0 100 100"></svg>
      <div class="donut-legend" id="donutLegend"></div>
    </div>
  </div>
</div>
<div class="sticky-nav">
  <div class="nav-inner" id="navInner">
    <a class="nav-link active" href="#top" onclick="reloadToday()">全部</a>
    <div class="nav-date-area">
      <button class="nav-date-btn" id="prevBtn" onclick="navigateDate(-1)">昨天</button>
      <span class="nav-date-label" id="navDateLabel">2026-06-01</span>
      <button class="nav-date-btn" id="nextBtn" onclick="navigateDate(1)" disabled>明天</button>
      <button class="nav-date-btn" onclick="openModal()">日历</button>
    </div>
  </div>
</div>
<div class="toolbar">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="searchInput" type="text" placeholder="搜索标题、来源、摘要…" oninput="doSearch(this.value)">
    <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
  </div>
  <div class="read-progress" id="readProgress" onclick="toggleReadFilter()">
    <span id="readLabel"><span class="read-progress-label"><span class="icon">🕐</span><span>已打卡 0/0</span></span></span>
    <div class="read-bar"><div class="read-bar-fill" id="readBarFill" style="width:0%"></div></div>
  </div>
  <span class="search-count" id="searchCount"></span>
</div>
<div class="main" id="main">
  <div class="analytics-wrap" id="analyticsWrap"></div>
  <div id="noResults" class="no-results">
    <div class="no-results-icon">🔎</div>
    <p>没有找到匹配的资讯</p>
    <p style="font-size:12px; margin-top:6px">试试其他关键词？</p>
  </div>
</div>

/109.htm", "source": "IT之家（RSS）", "publishedAt": "2026-06-01T06:13:32.000Z", "summary": null, "category": "industry"}, {"id": "cmpurl8qd009dsl0zyghfa9kw", "title": "介绍Cosmos Coalition", "title_en": "Introducing the Cosmos Coalition", "url": "https://runwayml.com/news/introducing-cosmos-coalition", "source": "Runway：News（网页）", "publishedAt": "2026-06-01T05:24:22.746Z", "summary": "Runway宣布作为创始成员加入Cosmos Coalition，该联盟与NVIDIA及多家领先AI实验室合作，旨在构建并开源面向物理AI的前沿世界模型。首个项目将由Runway与NVIDIA共同开发一个基础模型，以推动下一代开放世界模型的研究与发展。", "category": "industry"}, {"id": "cmpu2kv1z001eslagcgl0irro", "title": "NVIDIA与Google Cloud助力下一波AI构建者", "title_en": "NVIDIA and Google Cloud Empower the Next Wave of AI Builders", "url": "https://blogs.nvidia.com/blog/category/enterprise/cloud-2", "source": "NVIDIA Blog：Generative AI（网页）", "publishedAt": "2026-06-01T05:00:56.000Z", "summary": "在Google I/O大会上，NVIDIA与Google Cloud宣布深化合作，旨在支持其联合开发者社区中超过10万名开发者。合作将重点提供NVIDIA L4 Tensor Core GPU以优化AI推理与图形工作负载，并通过支持Vertex AI平台来增强Gemini模型性能。双方还将提供开源软件工具，以简化AI应用的构建与部署流程。", "category": "industry"}, {"id": "cmpuse81v00hrsl0zr2uqw9km", "title": "NVIDIA 发布工厂运营蓝图，为工厂提供自主智能管理智能体", "title_en": "NVIDIA Factory Operations Blueprint Gives Factories a New AI Brain", "url": "https://blogs.nvidia.com/blog/factory-operations-fox-blueprint-ai-brain", "source": "NVIDIA Blog：Agentic AI（网页）", "publishedAt": "2026-06-01T05:00:47.000Z", "summary": "NVIDIA 在 GTC Taipei 发布了 NVIDIA 工厂运营蓝图（FOX），这是一个用于构建自主工厂管理智能体的参考设计。该蓝图基于 NVIDIA NemoClaw、AI-Q Blueprint 和 NVIDIA Nemotron 开源模型构建，旨在为工厂提供一个统一的决策层，以连接实时机器信号、质量数据和操作警报，实现快速问题解决。蓝图针对 NVIDIA DGX Station 桌面 AI 超级计算机进行了优化。首批采用者包括富士康、和硕、研华和纬创。富士康利用 FOX 和 NemoClaw 构建了 MoMClaw 多智能体系统，预计将根源分析时间缩短 80%，劳动生产率提高 15%，机器故障率降低 10%。", "category": "ai-products"}, {"id": "cmpuqq2mt0024sl0zyjxv22lw", "title": "如何使用 NVIDIA Alpamayo 在闭环中后训练自动驾驶模型", "title_en": "How to Post-Train Autonomous Vehicle Models in Closed-Loop with NVIDIA Alpamayo", "url": "https://developer.nvidia.com/blog/how-to-post-train-autonomous-vehicle-model omberg.com/news/articles/2026-05-30/softbank-to-invest-some-75-billion-in-ai-in-france-reports-say", "source": "Bloomberg：Technology（RSS）", "publishedAt": "2026-05-30T18:55:33.000Z", "summary": "软银集团计划投资高达750亿欧元（约合870亿美元），用于在法国建设人工智能数据中心。该投资计划由《论坛报》与《金融时报》报道。", "category": "industry"}, {"id": "cmpu2kwvj0022slagmtocgkym", "title": "DynoSim：模拟驱动推理堆栈优化", "title_en": "There's a better way to serve your inference stack， you just haven't found it yet. DynoSim is a wor…", "url": "https://x.com/NVIDIAAI/status/2060781385686659416", "source": "X：NVIDIA AI (@NVIDIAAI)", "publishedAt": "2026-05-30T17:52:24.000Z", "summary": "NVIDIA 发布 DynoSim，这是一个针对其 Dynamo 推理服务栈的工作负载驱动仿真工具。它将部署测试转化为\"模拟-验证\"循环：团队无需逐个测试部署选项，而是在单一虚拟时间线上建模整个堆栈，通过高保真仿真快速筛查数千种配置，仅将最佳候选方案投入实机验证。DynoSim 完全使用 Rust 实现，运行速度极快，在测试中达到实时速度的 1，500 倍。", "category": "ai-products"}, {"id": "cmpsoxlpf03azsluzqg5vwo8h", "title": "NVIDIA 或将于六月发布整合 Blackwell GPU 与 AI 单元的 ARM 笔记本芯片 N1X", "title_en": "damn，NVIDIA 这回真是憋了个大的啊， 官号只发了三个词，A new era of PC，配一个坐标：25.0528， 121.5990。 微软和 Arm 几乎同一时间，发了几乎一样的内容。…", "url": "https://x.com/AYi_AInotes/status/2060779431648547016", "source": "X：阿易 AI Notes (@AYi_AInotes)", "publishedAt": "2026-05-30T17:44:38.000Z", "summary": "NVIDIA、微软与 Arm 同步发布指向台北音乐中心的坐标，暗示 6 月 1 日发布会将有重大动作。此举被认为是 NVIDIA 与联发科合作的 ARM 笔记本芯片 N1X 的预告。该芯片整合了 CPU、基于 Blackwell 架构的 GPU 及 AI 单元，目标是使轻薄本具备接近 RTX 4070 的图形性能。这标志着 NVIDIA 的战略转变：从显卡供应商，转型为定义整机核心方案的提供商，将直接冲击 Intel、AMD 和高通在 PC 市场的地位。", "category": "tip"}, {"id": "cmpsl2i5v02fpsluzlu1d98zl", "title": "\"开玩笑吧\"：GitHub Copilot 新的基于 token 的计费模式引发开发者不满", "title_en": "'What a joke'： Github Copilot's new token-based billing spurs consternation among devs", "url": "https://techcrunch.com/2026/05/30/what-a-joke-github-copilots-new-token-based-billing-spurs-consternation-among-devs", "source": "TechCrunch：AI（RSS）", "publishedAt": "2026-05-30T16:30:00.000Z", "summary": "微软旗下 GitHub Copilot 的黄金时代似乎正在终结。其新推出的计费模式改为按 token 计量，这一变化引发了开发者的广泛担忧与不满。", "category": "industry"}, {"id": "cmpsjtxfm022vsluz0pojemz9", "title": "随着成本飙升，美国企业开始对人工智能实施配给", "title_en": null, "url": "https://www.wsj.com/tech/ai/corporate-america-is-starting-to-ration-ai-as-cost-skyrockets-1eb99d7a", "source": "Hacker News 热门（buzzing.cc 中文翻译）", "publishedAt": "2026-05-30T15:40:48.502Z", "summary": "由于运行和使用AI工具的成本持续飙升，美国企业正开始对人工智能的使用实施配给制。企业通过限制使用量、设置分层级审批流程等方式控制开支，以应对AI费用增长过快的问题。这种从广泛采用转向精细化管理的策略，标志着企业在AI应用上从追求速度转向注重成本效益。", "category": "tip"}, {"id": "cmpsii2qb01qhsluzzwifggo3", "title": "免费领取6个月ChatGPT Pro及AI工具思考", "title_en": "免费领6个月ChatGPT Pro， 价值$ 1200🤩 这可能是今年对开发者最实在的福利了， 没有硬性Star数要求， 有项目链接基本都能过， 只要你是任何一个公开开源项目的维护者，哪怕只有…", "url": "https://x.com/AYi_AInotes/status/2060740414273941874", "source": "X：阿易 AI Notes (@AYi_AInotes)", "publishedAt": "2026-05-30T15:09:36.000Z", "summary": "OpenAI为开源项目维护者提供福利，可免费领取6个月ChatGPT Pro（价值$1200），申请无硬性Star数要求，有项目链接即可。同时，文章引用讨论了AI工具的分类：一类是\"agent型\"（如Claude Code、Codex），可自主运行；另一类是\"实习生型\"（如Cursor），需人工决策，有助于使用者以术入道、培养判断力，但受限于需人在场。作者推荐了网易的UU远程工具，称其免费两年，支持4K 144帧无延迟连接Mac并可使用原生终端，解决了\"实习生型\"工具的地点限制问题。", "category": "tip"}, {"id": "cmpsdkdec00j8sluzgrm37l7c", "title": "AI 骗子正在创建虚假的黑人形象来销售 Shein 劣质商品", "title_en": "AI grifters are creating fake Black people to sell Shein junk", "url": "https://www.theverge.com/ai-artificial-intelligence/938844/ai-tiktok-shop-blackface-shein-dropshipping", "source": "The Verge：AI（RSS）", "publishedAt": "2026-05-30T13:00:00.000Z", "summary": "有卖家利用 AI 生成虚假的黑人形象，在 TikTok、Facebook 和 Instagram 上扮演手工制品创作者进行销售。例如一个名为 Aliyah 的 AI 生成形象，以带泪诉说的方式售卖所谓手工皮带扣，但该形象及其产品均为虚构。此类 AI 虚拟网红被用于推广通过代发货模式销售的批量生产品。", "category": "industry"}, {"id": "cmpscn1r60074sluz9xgi8sxm", "title": "新加坡防务论坛：AI 风险超过核武器", "title_en": "AI Dangers Eclipse Nuclear Weapons at Singapore Defense Forum", "url": "https://www.bloomberg.com/news/articles/2026-05-30/ai-dangers-eclipse-nuclear-weapons-at-singapore-defense-forum", "source": "Bloomberg：Technology（RSS）", "publishedAt": "2026-05-30T11:59:32.000Z", "summary": "在新加坡举行的防务论坛上，专家警告AI风险已超越核武器。面板讨论指出，AI可能大幅压缩反应时间，导致决策者做出草率决定，对战 mmary": "Gemini Omni甚至能将简单的草图变为新的现实。\n\n在Gemini应用中亲自尝试。上传一段有人画圆的视频，然后输入这个提示词：当我画完这个圆时，它变成了___。", "category": "ai-products"}, {"id": "cmpr9mxrd0c40slnoz5qvsa20", "title": "Codex现已支持Windows端计算机使用功能", "title_en": "Windows users， this one's for you. Computer use now works on Windows， so Codex can take action on y…", "url": "https://x.com/OpenAI/status/2060428604727771421", "source": "X：OpenAI (@OpenAI)", "publishedAt": "2026-05-29T18:30:34.000Z", "summary": "Windows用户，这条消息是给你的。\n\n计算机使用功能现已在Windows上可用，因此Codex可以在你的Windows电脑上执行操作。\n\n通过ChatGPT移动应用中Codex的Windows支持，你可以在工作继续在Windows电脑上进行时，随时随地启动、审查和引导任务。\n\n这是一项早期体验，但我们正在努力提供更多方式，让你的工作无论身在何处都能持续进行。", "category": "ai-products"}, {"id": "cmpr8syeh0bxsslno0wmufg9r", "title": "当公司过于\"AI上瘾\"时会发生什么？", "title_en": "What happens when companies become too AI-pilled？", "url": "https://techcrunch.com/video/what-happens-when-companies-become-too-ai-pilled", "source": "TechCrunch：AI（RSS）", "publishedAt": "2026-05-29T17:57:05.000Z", "summary": "Box创始人Aaron Levie指出，决定用AI替代员工的人往往最不了解工作的实际内容，他将此称为\"AI psychosis\"。ClickUp近期为部署AI智能体裁员22%即是一例。2026年的科技行业裁员规模已接近2025年全年。", "category": "tip"}], "sections": [{"label": "模型发布/更新", "slug": "ai-models", "count": 6, "items": [{"idx": 1, "title": "使用NVIDIA Cosmos 3开发物理AI推理、世界与行动模型", "summary": "NVIDIA Cosmos 3是一款面向物理AI的前沿基础模型。它能够帮助机器人、自动驾驶车辆和智能空间理解真实世界、预测事件发展并生成适应特定环境与任务的行动。该模型融合了物理推理、世界理解与行动生成能力。", "publishedAt": "2026-06-01T04:43:58.000Z", "category": "ai-models", "sourceName": "NVIDIA Technical Blog（开发者技术博客 · RSS）", "sourceUrl": "https://developer.nvidia.com/blog/develop-physical-ai-reasoning-world-and-action-models-with-nvidia-cosmos-3"}, {"idx": 2, "title": "Nemotron 3 Ultra 本周即将发布", "summary": "Nemotron 3 Ultra 本周即将发布。 ⌛️", "publishedAt": "2026-06-01T04:35:08.000Z", "category": "ai-models", "sourceName": "X：NVIDIA AI (@NVIDIAAI)", "sourceUrl": "https://x.com/NVIDIAAI/status/2061305524700758050"}, {"idx": 3, "title": "MiniMax M3：前沿编码、100万token上下文与原生多模态一体模型", "summary": "MiniMax M3 是一个开源前沿模型，具备先进的编码与AI智能体能力。它支持100万token的超长上下文窗口，并采用名为MSA（MiniMax Sparse Attention）的新型稀疏注意力架构。该架构使模型在100万token上下文下的每token计算成本降至前代的1/20，预填充速度提升9倍以上，解码速度提升15倍以上。在SWE-Bench Pro编码基准上，MiniMax M3得分59.0%，超越GPT-5.5和Gemini 3.1 Pro，性能接近Opus 4.7。该模型可通过MiniMax Code、Token Plan和API服务使用。", "publishedAt": "2026-06-01T03:39:41.634Z", "category": "ai-models", "sourceName": "MiniMax：Blog（网页）", "sourceUrl": "https://www.minimax.io/blog/minimax-m3"}, {"idx": 4, "title": "Nano Banana Pro与Nano Banana 2正式发布", "summary": "ICYMI：Nano Banana Pro 【gemini-3-pro-image】 和 Nano Banana 2 【gemini-3.1-flash-image】 现已正式发布，可通过 Gemini API 投入生产使用。\n\n查看这些优秀的社区示例，了解两个模型的实际能力 🧵", "publishedAt": "2026-05-30T11:30:46.000Z", "category": "ai-models", "sourceName": "X：Google AI for Developers (@googleaidevs)", "sourceUrl": "https://x.com/googleaidevs/status/2060685345738375640"}, {"idx": 5, "title": "小即是美：开源多模态模型发布", "summary": "小即是美。😌", "publishedAt": "2026-05-30T11:04:34.000Z", "category": "ai-models", "sourceName": "X：阶跃星辰 StepFun (@StepFun_ai)", "sourceUrl": "https://x.com/StepFun_ai/status/2060678753030947226"}, {"idx": 6, "title": "OpenAI推出实时翻译模型，支持70+语言输入", "summary": "OpenAI 实时翻译功能--使用70多种输入语言说话，翻译成13种输出语言：\n\ngpt-realtime-translate 接收任意语言的语音输入，并输出目标语言的语音。\n\n大语言模型很棒，但特定用例需要专用模型。\n\n我们正在智能眼镜上运行此功能。", "publishedAt": "2026-05-29T20:03:55.000Z", "category": "ai-models", "sourceName": "X：Greg Brockman (@gdb)", "sourceUrl": "https://x.com/gdb/status/2060452095279415725"}]}, {"label": "产品发布/更新", "slug": "ai-products", "count": 16, "items": [{"idx": 7, "title": "Apache RocketMQ 发布 AI 专用消息引擎", "summary": "🚀 Apache RocketMQ 为 AI 升级！推出 RocketMQ for AI--一个专为长时间会话、多智能体工作流和公平资源调度构建的新消息引擎。凭借 Lite-Topics、有序消息和智能流量整形，它解决了状态丢失、级联故障和突发负载问题。由阿里云大规模构建，现已开源。\n\n了解更多： https：//int.alibabacloud.com/m/1000413178/\n\n#RocketMQ #AI #CloudNative", "publishedAt": "2026-06-01T10:53:26.000Z", "category": "ai-products", "sourceName": "X：阿里云 / Alibaba Cloud (@alibaba_cloud)", "sourceUrl": "https://x.com/alibaba_cloud/status/2061400724018217381"}, {"idx": 8, "title": "腾讯混元发布智能体长期记忆插件Hy-Memory", "summary": "腾讯混元正式发布专为OpenClaw等长期协作智能体（Agent）设计的记忆插件 Hy-Memory。它基于6层记忆框架、System1/System2双系统与三层进化链构建，旨在成为智能体的\"第二大脑\"。该插件解决了记忆碎片化问题，实现了显著性能提升：记忆数量减少70%以上，单条记忆信息密度提升45%以上，在超长上下文场景中token消耗降低35%，记忆更新速度提升20%。", "publishedAt": "2026-06-01T09:01:25.000Z", "category": "ai-products", "sourceName": "X：腾讯混元 (@TencentHunyuan)", "sourceUrl": "https://x.com/TencentHunyuan/status/2061372535267357029"}, {"idx": 9, "title": "NVIDIA 发布工厂运营蓝图，为工厂提供自主智能管理智能体", "summary": "NVIDIA 在 GTC Taipei 发布了 NVIDIA 工厂运营蓝图（FOX），这是一个用于构建自主工厂管理智能体的参考设计。该蓝图基于 NVIDIA NemoClaw、AI-Q Blueprint 和 NVIDIA Nemotron 开源模型构建，旨在为工厂提供一个统一的决策层，以连接实时机器信号、质量数据和操作警报，实现快速问题解决。蓝图针对 NVIDIA DGX Station 桌面 AI 超级计算机进行了优化。首批采用者包括富士康、和硕、研华和纬创。富士康利用 FOX 和 NemoClaw 构建了 MoMClaw 多智能体系统，预计将根源分析时间缩短 80%，劳动生产率提高 15%，机器故障率降低 10%。", "publishedAt": "2026-06-01T05:00:47.000Z", "category": "ai-products", "sourceName": "NVIDIA Blog：Agentic AI（网页）", "sourceUrl": "https://blogs.nvidia.com/blog/factory-operations-fox-blueprint-ai-brain"}, {"idx": 10, "title": "NVIDIA 发布 RTX Spark 及本地 AI 智能体安全与性能更新", "summary": "NVIDIA 发布了 RTX Spark，一款专为本地 AI 智能体设计的 Windows 电脑，提供 1 petaflops AI 算力与 128GB 统一内存。其推出的 OpenShell 运行时与微软合作，基于新的 Windows 安全原语，确保智能体在设备端安全私密运行。性能方面，通过在 llama.cpp 中采用多 token 预测等优化，Qwen 3.6 和 3.5 27B 模型推理吞吐量提升最高达 2 倍，35B 模型提升 1.6 倍；多 GPU 优化使 llama.cpp 和 ComfyUI 获得最高 2 倍性能提升。此外，Adobe、Blender 等应用也进行了更新。", "publishedAt": "2026-06-01T04:30:11.000Z", "category": "ai-products", "sourceName": "NVIDIA Blog：Agentic AI（网页）", "sourceUrl": "https://blogs.nvidia.com/blog/rtx-ai-garage-computex-spark-local-agents"}, {"idx": 11, "title": "NVIDIA Vera CPU 为AI工厂的智能体工作负载设立新标准", "summary": "NVIDIA Vera CPU 旨在为AI工厂中智能体工作负载树立新性能标杆。文章阐述了AI领域扩展规律的演变：预训练通过更大数据集、更多参数和大规模并行GPU系统扩展智能；后训练通过指令微调扩展实用性，并重新调整GPU用于生成式推理；测试时缩放则通过给模型更多生成token来提升推理能力。当前，智能体AI与强化学习正推动下一阶段的扩展。", "publishedAt": "2026-06-01T03:59:15.000Z", "category": "ai-products", "sourceName": "NVIDIA Technical Blog（开发者技术博客 · RSS）", "sourceUrl": "https://developer.nvidia.com/blog/nvidia-vera-cpu-sets-a-new-standard-for-agentic-workloads-in-ai-factories"}, {"idx": 12, "title": "NVIDIA DSX OS 提供开放、模块化软件用于规模化运营AI工厂", "summary": "NVIDIA DSX 平台为设计、模拟和构建 AI 工厂提供完整解决方案，旨在应对不断增长的智能需求。该平台通过开放、模块化的软件栈，帮助运营方更快地扩展规模、提高效率，并降低从能源、芯片、基础设施、模型到应用这五层架构的整体智能成本。", "publishedAt": "2026-06-01T03:36:52.000Z", "category": "ai-products", "sourceName": "NVIDIA Technical Blog（开发者技术博客 · RSS）", "sourceUrl": "https://developer.nvidia.com/blog/nvidia-dsx-os-delivers-open-modular-software-for-operating-ai-factories-at-scale"}, {"idx": 13, "title": "OpenAI发布生物防御AI工具Rosalind", "summary": "我们希望帮助世界在生物防御领域抢占先机：", "publishedAt": "2026-05-31T15:05:55.000Z", "category": "ai-products", "sourceName": "X：Sam Altman (@sama)", "sourceUrl": "https://x.com/sama/status/2061101875303530871"}, {"idx": 14, "title": "DynoSim：模拟驱动推理堆栈优化", "summary": "NVIDIA 发布 DynoSim，这是一个针对其 Dynamo 推理服务栈的工作负载驱动仿真工具。它将部署测试转化为\"模拟-验证\"循环：团队无需逐个测试部署选项，而是在单一虚拟时间线上建模整个堆栈，通过高保真仿真快速筛查数千种配置，仅将最佳候选方案投入实机验证。DynoSim 完全使用 Rust 实现，运行速度极快，在测试中达到实时速度的 1，500 倍。", "publishedAt": "2026-05-30T17:52:24.000Z", "category": "ai-products", "sourceName": "X：NVIDIA AI (@NVIDIAAI)", "sourceUrl": "https://x.com/NVIDIAAI/status/2060781385686659416"}, {"idx": 15, "title": "Show HN： Tiny-vLLM--基于 C 和 CUDA 的高性能大型语言模型推理引擎", "summary": "Tiny-vLLM 是一个用 C 和 CUDA 编写的高性能大语言模型推理引擎，项目代码已开源至 GitHub。", "publishedAt": "2026-05-30T03:25:01.798Z", "category": "ai-products", "sourceName": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://github.com/jmaczan/tiny-vllm"}, {"idx": 16, "title": "ComfyUI现已支持OpenRouter模型直接调用", "summary": "现在你可以直接在ComfyUI工作流中使用你的OpenRouter模型了！\n\n【引用 @ComfyUI】：ComfyUI刚刚添加了@OpenRouter支持。\n\n你不再局限于单一的大语言模型，现在可以直接在Comfy中访问20多个模型。\n\n更多灵活性，更少摩擦，同样的工作流。\n\n工作流链接在下方👇", "publishedAt": "2026-05-29T23:58:32.000Z", "category": "ai-products", "sourceName": "X：OpenRouter (@OpenRouter)", "sourceUrl": "https://x.com/OpenRouter/status/2060511136932315259"}, {"idx": 17, "title": "Codex可自主管理对话线程与并行任务", "summary": "Codex用于管理Codex "X：OpenAI (@OpenAI)", "sourceUrl": "https://x.com/OpenAI/status/2060428604727771421"}]}, {"label": "行业动态", "slug": "industry", "count": 15, "items": [{"idx": 23, "title": "Runway 在伦敦设立欧洲总部及世界模型研究中心", "summary": "Runway 宣布在伦敦建立新的欧洲总部和专注于通用世界模型的研究中心。公司计划在未来18个月向英国AI生态投资$100M，到2028年投资额将翻倍以上。过去12个月，其在欧洲的订阅销量增长了50%，企业客户占比超20%。新总部将扩大其在欧洲的研究与商业布局，公司正招聘欧洲负责人以组建跨研究、产品、工程和销售的团队，并深化与BBC、Fremantle、WPP等企业的合作。世界模型是其研究的核心，旨在将生成式AI的应用扩展至机器人、科学研究与工业模拟等领域。", "publishedAt": "2026-06-01T10:24:49.447Z", "category": "industry", "sourceName": "Runway：News（网页）", "sourceUrl": "https://runwayml.com/news/runway-opens-london-hq"}, {"idx": 24, "title": "英伟达和台积电将 AI 引入晶圆厂，推动半导体设计与制造发展", "summary": "", "publishedAt": "2026-06-01T06:13:32.000Z", "category": "industry", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/958/109.htm"}, {"idx": 25, "title": "介绍Cosmos Coalition", "summary": "Runway宣布作为创始成员加入Cosmos Coalition，该联盟与NVIDIA及多家领先AI实验室合作，旨在构建并开源面向物理AI的前沿世界模型。首个项目将由Runway与NVIDIA共同开发一个基础模型，以推动下一代开放世界模型的研究与发展。", "publishedAt": "2026-06-01T05:24:22.746Z", "category": "industry", "sourceName": "Runway：News（网页）", "sourceUrl": "https://runwayml.com/news/introducing-cosmos-coalition"}, {"idx": 26, "title": "NVIDIA与Google Cloud助力下一波AI构建者", "summary": "在Google I/O大会上，NVIDIA与Google Cloud宣布深化合作，旨在支持其联合开发者社区中超过10万名开发者。合作将重点提供NVIDIA L4 Tensor Core GPU以优化AI推理与图形工作负载，并通过支持Vertex AI平台来增强Gemini模型性能。双方还将提供开源软件工具，以简化AI应用的构建与部署流程。", "publishedAt": "2026-06-01T05:00:56.000Z", "category": "industry", "sourceName": "NVIDIA Blog：Generative AI（网页）", "sourceUrl": "https://blogs.nvidia.com/blog/category/enterprise/cloud-2"}, {"idx": 27, "title": "上海：支持多模态智能体开发与应用，有序推进智能驾驶在共享出行、物流运输等多场景应用", "summary": "上海市人民政府办公厅印发《上海市服务业发展\"十五五\"规划》，提出发展AI软件技术及服务产业集群。规划支持多模态智能体开发与应用，推动智能客服等工具规模化；有序推进智能驾驶在共享出行、物流运输等多场景应用；做强算运存协同布局的智算云网络，推广模型即服务（MaaS）；并支持开发面向家庭、养老、文旅等场景的具身智能整机产品，加速机器人向通用智能与精细化服务跃升。", "publishedAt": "2026-06-01T02:16:40.000Z", "category": "industry", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/957/985.htm"}, {"idx": 28, "title": "全球首次：MWC26 上海将举办\"人形机器人点球大战\"，宇树科技等 8 支队伍参赛、参演", "summary": "全球首次\"人形机器人点球大战\"将于2026年6月在MWC上海举行。8支中国顶尖具身智能战队将进行自主对抗，无需人工操控或预设脚本。赛事旨在集中展示人形机器人在动态平衡、精准控制与自主决策等方面的技术突破。", "publishedAt": "2026-06-01T00:55:00.000Z", "category": "industry", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/957/938.htm"}, {"idx": 29, "title": "OpenAI正式进军机器人领域并启动招聘", "summary": "OpenAI宣布成立OpenAI Robotics团队，并开始招聘全栈硬件、系统及ML工程师，以编程和制造能服务社会的机器人。该项目由Aditya Ramesh领导，其世界模拟研究计划已演变为机器人研究，强调硬件与ML研究的协同设计。短期目标是支持技术工人构建未来基础设施，长期愿景是为每个人提供个人机器人。", "publishedAt": "2026-05-31T16:07:13.000Z", "category": "industry", "sourceName": "X：Sam Altman (@sama)", "sourceUrl": "https://x.com/sama/status/2061117302528188712"}, {"idx": 30, "title": "苹果WWDC将推AI升级：Gemini蒸馏模型本地运行，但技术栈外部依赖显著", "summary": "苹果下月WWDC将重点展示延迟已久的Siri及设备端AI升级，核心是在iPhone芯片本地运行从Google Gemini蒸馏而来的更小模型，以强调隐私与降低token成本。但该技术栈大部分源自外部：本地模型由Gemini蒸馏，设备无法处理的复杂查询将路由至Google Cloud处理，并采用了Nvidia的机密计算技术。苹果据称正在寻觅小型设备端AI初创公司以加速模型缩减工作。此外，苹果2024年承诺的Private Cloud Compute方案原计划使用苹果芯片，因无法承载完整Gemini模型，现已部分转向谷歌云，但该名称仍将保留。", "publishedAt": "2026-05-31T12:12:02.000Z", "category": "industry", "sourceName": "X：Kim (@kimmonismus)", "sourceUrl": "https://x.com/kimmonismus/status/2061058117304262999"}, {"idx": 31, "title": "6000 多公里全程零干预：特斯拉 FSD 完成全球首次横穿加拿大自动驾驶", "summary": "一辆特斯拉汽车搭载 FSD V14.3.3 版本软件，完成了全球首次全程零人工干预、横穿加拿大的自动驾驶行程。车辆从温哥华出发，历时 4 天 21 小时，行驶 3760 英里（6051 公里）抵达哈利法克斯，全程所有驾驶操作（包括高速并线、应对复杂路况与自动泊车）均由系统自主完成，无任何系统退出或人工修正。该版本随 2026.14.6.6 更新推送，整合了春季软件功能。", "publishedAt": "2026-05-31T01:30:46.000Z", "category": "industry", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/957/718.htm"}, {"idx": 32, "title": "据报道：软银将在法国投资750亿欧元用于AI", "summary": "软银集团计划投资高达750亿欧元（约合870亿美元），用于在法国建设人工智能数据中心。该投资计划由《论坛报》与《金融时报》报道。", "publishedAt": "2026-05-30T18:55:33.000Z", "category": "industry", "sourceName": "Bloomberg：Technology（RSS）", "sourceUrl": "https://www.bloomberg.com/news/articles/2026-05-30/softbank-to-invest-some-75-billion-in-ai-in-france-reports-say"}, {"idx": 33, "title": "\"开玩笑吧\"：GitHub Copilot 新的基于 token 的计费模式引发开发者不满", "summary": "微软旗下 GitHub Copilot 的黄金时代似乎正在终结。其新推出的计费模式改为按 token 计量，这一变化引发了开发者的广泛担忧与不满。", "publishedAt": "2026-05-30T16:30:00.000Z", "category": "industry", "sourceName": "TechCrunch：AI（RSS）", "sourceUrl": "https://techcrunch.com/2026/05/30/what-a-joke-github-copilots-new-token-based-billing-spurs-consternation-among-devs"}, {"idx": 34, "title": "AI 骗子正在创建虚假的黑人形象来销售 Shein 劣质商品", "summary": "有卖家利用 AI 生成虚假的黑人形象，在 TikTok、Facebook 和 Instagram 上扮演手工制品创作者进行销售。例如一个名为 Aliyah 的 AI 生成形象，以带泪诉说的方式售卖所谓手工皮带扣，但该形象及其产品均为虚构。此类 AI 虚拟网红被用于推广通过代发货模式销售的批量生产品。", "publishedAt": "2026-05-30T13:00:00.000Z", "category": "industry", "sourceName": "The Verge：AI（RSS）", "sourceUrl": "https://www.theverge.com/ai-artificial-intelligence/938844/ai-tiktok-shop-blackface-shein-dropshipping"}, {"idx": 35, "title": "新加坡防务论坛：AI 风险超过核武器", "summary": "在新加坡举行的防务论坛上，专家警告AI风险已超越核武器。面板讨论指出，AI可能大幅压缩反应时间，导致决策者做出草率决定，对战略稳定构成威胁。", "publishedAt": "2026-05-30T11:59:32.000Z", "category": "industry", "sourceName": "Bloomberg：Technology（RSS）", "sourceUrl": "https://www.bloomberg.com/news/articles/2026-05-30/ai-dangers-eclipse-nuclear-weapons-at-singapore-defense-forum"}, {"idx": 36, "title": "xAI放弃JAX GPU转向自研训练框架", "summary": "突发新闻：JAX NVIDIA GPU & XLA：GPU最大客户刚刚宣布已放弃JAX GPU，宁愿用Grok Build\"氛围编程\"一个C训练框架。据报道xAI的JAX堆栈MFU低于10%。NVIDIA JAX团队过去两年全部主力996专注于支持xAI却失败了，我想他们现在可以休息并兑现期权了。", "publishedAt": "2026-05-30T04:00:09.000Z", "category": "industry", "sourceName": "X：SemiAnalysis (@SemiAnalysis_)", "sourceUrl": "https://x.com/SemiAnalysis_/status/2060571944575963482"}, {"idx": 37, "title": "阿里云与Qwen成为UEFA多年全球AI合作伙伴", "summary": "阿里云和Qwen成为UEFA官方独家AI、云计算与电子商务合作伙伴，合作期覆盖2027/2028赛季至2032/2033赛季的UEFA男子俱乐部赛事，以及UEFA EURO 2028。阿里巴巴集团主席蔡崇信表示，将投入云计算、全栈AI及全球电商平台能力，支持赛事运营。合作将利用Qwen大语言模型部署先进AI技术，增强球迷互动与媒体内容体验，并依托阿里云基础设施打造全球沉浸式观赛体验。", "publishedAt": "2026-05-30T00:36:05.000Z", "category": "industry", "sourceName": "X：阿里云 / Alibaba Cloud (@alibaba_cloud)", "sourceUrl": "https://x.com/alibaba_cloud/status/2060520586489770167"}]}, {"label": "技巧与观点", "slug": "tip", "count": 13, "items": [{"idx": 38, "title": "如何使用 NVIDIA Alpamayo 在闭环中后训练自动驾驶模型", "summary": "开发自动驾驶策略需要弥合训练与部署之间的鸿沟。现有的视觉-语言-动作模型虽然能推理更复杂的驾驶场景并产生更丰富的中间推理，但主要在开放循环中训练，即模型输出与真实行为直接比较，而不考虑其对环境产生的实际影响。NVIDIA Alpamayo 提供了一种在闭环环境中进行后训练的方法。", "publishedAt": "2026-06-01T04:49:15.000Z", "category": "tip", "sourceName": "NVIDIA Technical Blog（开发者技术博客 · RSS）", "sourceUrl": "https://developer.nvidia.com/blog/how-to-post-train-autonomous-vehicle-models-in-closed-loop-with-nvidia-alpamayo"}, {"idx": 39, "title": "教皇似乎比Geoffrey Hinton更懂人工智能", "summary": "这一观点强调，单纯分析AI的输出内容，无法还原其生成过程与背后的推理逻辑，触及了当前AI可解释性研究的核心挑战。", "publishedAt": "2026-05-31T16:38:20.000Z", "category": "tip", "sourceName": "Gary Marcus：The Road to AI We Can Trust（RSS）", "sourceUrl": "https://garymarcus.substack.com/p/the-pope-appears-to-understand-ai"}, {"idx": 40, "title": "我花200英镑把一台数据中心级GPU装进了我的游戏电脑", "summary": "一名用户以200英镑的价格购入了一块数据中心级GPU，并将其成功安装到自己的游戏电脑中。文章记述了这一非标准硬件改装过程、遇到的技术挑战以及最终实现本地运行大语言模型的体验。", "publishedAt": "2026-05-31T15:55:27.025Z", "category": "tip", "sourceName": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://blog.tymscar.com/posts/v100localllm"}, {"idx": 41, "title": "在浏览器中通过 Pyodide 和 Service Worker 运行 Python ASGI 应用", "summary": "作者展示了如何在浏览器中通过 Pyodide 和 Service Worker 运行 Python ASGI 应用。此前的 Datasette Lite 使用 Web Workers，但无法执行 `<script>` 标签中的 JavaScript。新方案由 Claude Opus 4.8 协助完成开发，解决了这一问题。作者已展示了基础的 ASGI FastCGI 演示和运行 Datasette 1.0a31 的演示，并计划后续将此方法应用于升级 Datasette Lite。", "publishedAt": "2026-05-30T21:02:16.000Z", "category": "tip", "sourceName": "Simon Willison 博客", "sourceUrl": "https://simonwillison.net/2026/May/30/pyodide-asgi-browser"}, {"idx": 42, "title": "NVIDIA 或将于六月发布整合 Blackwell GPU 与 AI 单元的 ARM 笔记本芯片 N1X", "summary": "NVIDIA、微软与 Arm 同步发布指向台北音乐中心的坐标，暗示 6 月 1 日发布会将有重大动作。此举被认为是 NVIDIA 与联发科合作的 ARM 笔记本芯片 N1X 的预告。该芯片整合了 CPU、基于 Blackwell 架构的 GPU 及 AI 单元，目标是使轻薄本具备接近 RTX 4070 的图形性能。这标志着 NVIDIA 的战略转变：从显卡供应商，转型为定义整机核心方案的提供商，将直接冲击 Intel、AMD 和高通在 PC 市场的地位。", "publishedAt": "2026-05-30T17:44:38.000Z", "category": "tip", "sourceName": "X：阿易 AI Notes (@AYi_AInotes)", "sourceUrl": "https://x.com/AYi_AInotes/status/2060779431648547016"}, {"idx": 43, "title": "随着成本飙升，美国企业开始对人工智能实施配给", "summary": "由于运行和使用AI工具的成本持续飙升，美国企业正开始对人工智能的使用实施配给制。企业通过限制使用量、设置分层级审批流程等方式控制开支，以应对AI费用增长过快的问题。这种从广泛采用转向精细化管理的策略，标志着企业在AI应用上从追求速度转向注重成本效益。", "publishedAt": "2026-05-30T15:40:48.502Z", "category": "tip", "sourceName": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://www.wsj.com/tech/ai/corporate-america-is-starting-to-ration-ai-as-cost-skyrockets-1eb99d7a"}, {"idx": 44, "title": "免费领取6个月ChatGPT Pro及AI工具思考", "summary": "OpenAI为开源项目维护者提供福利，可免费领取6个月ChatGPT Pro（价值$1200），申请无硬性Star数要求，有项目链接即可。同时，文章引用讨论了AI工具的分类：一类是\"agent型\"（如Claude Code、Codex），可自主运行；另一类是\"实习生型\"（如Cursor），需人工决策，有助于使用者以术入道、培养判断力，但受限于需人在场。作者推荐了网易的UU远程工具，称其免费两年，支持4K 144帧无延迟连接Mac并可使用原生终端，解决了\"实习生型\"工具的地点限制问题。", "publishedAt": "2026-05-30T15:09:36.000Z", "category": "tip", "sourceName": "X：阿易 AI Notes (@AYi_AInotes)", "sourceUrl": "https://x.com/AYi_AInotes/status/2060740414273941874"}, {"idx": 45, "title": "最后一次技术面试", "summary": "Steve Yegge 在 Medium 发表观点文章《最后一次技术面试》，探讨 AI 时代传统技术面试的意义变化。文章在 Hacker News 社区获得 100 分关注。", "publishedAt": "2026-05-30T07:25:10.263Z", "category": "tip", "sourceName": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://steve-yegge.medium.com/the-last-technical-interview-bc13ddcf4564"}, {"idx": 46, "title": "DynoSim：模拟帕累托前沿", "summary": "现代大语言模型服务难以调优，因为每个部署都涉及模型后端、张量并行形状、预填充/解码分割、Worker数量、调度器设置、路由策略、KV缓存行为、自动扩展阈值和拓扑等相互关联的选择。这些选择在多个层级相互作用，局部优化可能导致瓶颈转移至其他环节。", "publishedAt": "2026-05-29T22:31:03.000Z", "category": "tip", "sourceName": "NVIDIA Technical Blog（开发者技术博客 · RSS）", "sourceUrl": "https://developer.nvidia.com/blog/dynosim-simulating-the-pareto-frontier"}, {"idx": 47, "title": "这个 skill 看着不错，可将文字、URL 或文章直接生成公众号首图、小红书图文卡、教程步骤卡等视觉物料，支持 28 种布局和 10 种主题。", "summary": "claude-design-card 是一款专为中文内容创作者设计的 Skill。它能将文字、URL 或文章直接转化为可发布的视觉卡片，如公众号首图、小红书图文卡、教程步骤卡等，支持 28 种布局与 10 种主题。其核心价值在于自动化了\"写完文章\"后最繁琐的流程：自动提炼重点、选择版式、生成 HTML 并截图成 PNG，替代了以往手动使用 Figma 或 Canva 等工具的步骤。该工具开源，适合经常撰写相关内容的创作者尝试。", "publishedAt": "2026-05-29T22:23:03.000Z", "category": "tip", "sourceName": "X：洪明 (@hongming731)", "sourceUrl": "https://x.com/hongming731/status/2060487110906527820"}, {"idx": 48, "title": "LlamaIndex 团队基于 Google Agents API 构建 LlamaParse/LiteParse 智能体模板", "summary": "LlamaIndex 团队基于 Google 新发布的 Agents API 构建了一个模板，使智能体能够访问 LlamaParse 和 LiteParse，从而自动处理非结构化文档。其工作流程为：配置数据与输出的 Git 仓库，将仓库克隆至智能体沙箱，安装 LiteParse CLI 与 LlamaParse SDK 及相关技能，最后通过提示词驱动智能体自主执行任务。该模板最终形成一个可直接使用 LlamaParse 和 LiteParse 处理真实世界文档的智能体。", "publishedAt": "2026-05-29T19:15:29.000Z", "category": "tip", "sourceName": "X：Google AI for Developers (@googleaidevs)", "sourceUrl": "https://x.com/googleaidevs/status/2060439904929382700"}, {"idx": 49, "title": "参与我们的 I/O 2026 测验：该测验由 Google AI Studio 氛围编程生成", "summary": "Google 使用其开发工具 Google AI Studio，通过氛围编程（vibe coding）方式，创建了一个关于 Google I/O 2026 主要公告的在线测验。", "publishedAt": "2026-05-29T19:00:00.000Z", "category": "tip", "sourceName": "Google Blog：AI（RSS）", "sourceUrl": "https://blog.google/innovation-and-ai/technology/ai/io-2026-vibe-coded-quiz"}, {"idx": 50, "title": "当公司过于\"AI上瘾\"时会发生什么？", "summary": "Box创始人Aaron Levie指出，决定用AI替代员工的人往往最不了解工作的实际内容，他将此称为\"AI psychosis\"。ClickUp近期为部署AI智能体裁员22%即是一例。2026年的科技行业裁员规模已接近2025年全年。", "publishedAt": "2026-05-29T17:57:05.000Z", "category": "tip", "sourceName": "TechCrunch：AI（RSS）", "sourceUrl": "https://techcrunch.com/video/what-happens-when-companies-become-too-ai-pilled"}]}]}
</script>
<script>
const EMBEDDED_DATA = JSON.parse(document.getElementById("dataSrc").textContent);
const SECTION_CONFIG = {"模型发布/更新": {"icon": "🤖", "color": "#7f6af0"}, "产品发布/更新": {"icon": "📦", "color": "#e8622a"}, "行业动态": {"icon": "🏭", "color": "#1d9e75"}, "论文研究": {"icon": "📄", "color": "#378add"}, "技巧与观点": {"icon": "💡", "color": "#e8a020"}};
const DAILY_STR = "2026-06-01";
const DAILY_MAX = "2026-06-01";

let currentData = null;
let currentDate = DAILY_STR;
let readSet = new Set();
let showOnlyUnread = false;
let currentFilter = 'all';
let currentSearch = '';
let isDark = true;

function reloadToday() {
  location.reload();
}
window.addEventListener('DOMContentLoaded', function() {
  try { readSet = new Set(JSON.parse(localStorage.getItem('aidaka_read_' + currentDate) || '[]')); } catch(e) {}
  try {
    var saved = localStorage.getItem('aidaka_theme');
    if (saved === 'light') { isDark = false; document.body.classList.add('light'); }
  } catch(e) {}
  updateThemeBtn();
  renderAll(EMBEDDED_DATA);
  setTimeout(function() {
    document.getElementById('loadingOverlay').style.opacity = '0';
    setTimeout(function() { document.getElementById('loadingOverlay').style.display = 'none'; }, 400);
  }, 300);
});

function renderAll(data) {
  currentData = data;
  var sections = data.sections || [];
  var total = sections.reduce(function(a, s) { return a + s.items.length; }, 0);
  var dateStr = fmtDate(data.date);
  document.getElementById('heroTitle').textContent = 'AI打卡网 · ' + dateStr;
  var gen = data.generatedAt ? new Date(data.generatedAt) : new Date();
  document.getElementById('heroSubtitle').textContent = '共收录 ' + total + ' 条资讯 · 来源精选 · 生成于 ' + relTime(gen);
  document.getElementById('navDateLabel').textContent = data.date;
  document.title = 'AI打卡网 · ' + data.date + ' (' + total + '条)';

  var statsEl = document.getElementById('heroStats');
  statsEl.innerHTML = '<div class="stat-chip" onclick="reloadToday()" title="刷新今日数据"><div class="num">' + total + '</div><div class="lbl">今日总条数</div></div>'
    + sections.map(function(s) {
      var cfg = SECTION_CONFIG[s.label] || { icon: '📌', color: '#888' };
      return '<div class="stat-chip" onclick="filterSection(\'' + s.label.replace(/'/g, "\\'") + '\'); scrollToSection(\'' + s.label.replace(/'/g, "\\'") + '\');" title="跳转到 ' + s.label + '"><div class="num" style="font-size:22px">' + cfg.icon + '</div><div class="lbl">' + s.label.replace('/更新','').replace('/观点','') + ' ' + s.items.length + '</div></div>';
    }).join('');

  renderDonut(sections);
  var navEl = document.getElementById('navInner');
  var dateArea = navEl.querySelector('.nav-date-area');
  navEl.querySelectorAll('.nav-sec-link').forEach(function(el) { el.remove(); });
  sections.forEach(function(s) {
    var cfg = SECTION_CONFIG[s.label] || { icon: '📌', color: '#888' };
    var a = document.createElement('a');
    a.className = 'nav-link nav-sec-link';
    a.href = '#sec-' + slugify(s.label);
    a.innerHTML = cfg.icon + ' ' + s.label + ' <span class="nav-badge">' + s.items.length + '</span>';
    a.onclick = function(e) { e.preventDefault(); filterSection(s.label, a); scrollToSection(s.label); };
    navEl.insertBefore(a, dateArea);
  });
  renderAnalytics(sections);
  var main = document.getElementById('main');
  main.querySelectorAll('.dyn-section').forEach(function(el) { el.remove(); });
  var globalIdx = 0;
  var frag = document.createDocumentFragment();
  sections.forEach(function(s) {
    var cfg = SECTION_CONFIG[s.label] || { icon: '📌', color: '#888' };
    var secDiv = document.createElement('div');
    secDiv.className = 'dyn-section';
    secDiv.id = 'sec-' + slugify(s.label);
    var header = document.createElement('div');
    header.className = 'section-header';
    header.innerHTML = '<div class="section-icon" style="background:' + cfg.color + '22; color:' + cfg.color + '">' + cfg.icon + '</div>'
      + '<span class="section-title">' + s.label + '</span>'
      + '<span class="section-count">' + s.items.length + ' 条</span>';
    secDiv.appendChild(header);
    if (s.items.length === 0) {
      secDiv.innerHTML += '<p style="color:var(--text3);font-size:13px;padding:12px 0">今日暂无相关资讯</p>';
    } else {
      var grid = document.createElement('div');
      grid.className = 'card-grid';
      s.items.forEach(function(item) {
        globalIdx++;
        var cardEl = buildCard(item, globalIdx);
        grid.appendChild(cardEl);
      });
      secDiv.appendChild(grid);
    }
    frag.appendChild(secDiv);
  });
  main.insertBefore(frag, main.querySelector('#noResults'));
  updateReadProgress(total);
  updateDateNav(data.date);
  document.getElementById('footerEl').innerHTML = '共 ' + total + ' 条资讯 · 数据来源 <a href="https://aihot.virxact.com" target="_blank" rel="noopener noreferrer" style="color:var(--accent)">aihot.virxact.com</a> · AI打卡网 每日晨报';
  setTimeout(initScrollAnim, 100);
}

function buildCard(item, idx) {
  var isRead = readSet.has(String(idx));
  var card = document.createElement('div');
  card.className = 'card' + (isRead ? ' read' : '');
  card.dataset.idx = idx;
  card.dataset.title = (item.title || '').toLowerCase();
  card.dataset.summary = (item.summary || '').toLowerCase();
  card.dataset.source = (item.sourceName || '').toLowerCase();
  var srcShort = shortSource(item.sourceName || '');
  var titleSafe = escHtml(item.title || '');
  var sourceNameSafe = escHtml(item.sourceName || '');
  var summaryRaw = item.summary || '';
  // Truncate summary to ~60 chars for display
  var summaryShort = summaryRaw.length > 65 ? summaryRaw.slice(0, 62) + '...' : summaryRaw;
  var summarySafe = escHtml(summaryShort);
  var summaryFull = escHtml(summaryRaw);
  var timeStr = item.publishedAt ? relTimeStr(item.publishedAt) : '';
  var sourceHtml = item.sourceUrl ? '<a class="source-btn" href="' + escHtml(item.sourceUrl) + '" target="_blank" rel="noopener noreferrer">原文</a>' : '';

  var inner = '<div class="card-header"><span class="card-num">' + idx + '</span><span class="card-title">' + titleSafe + '</span></div>';
  if (timeStr) { inner += '<span class="time-badge">' + escHtml(timeStr) + '</span>'; }
  inner += '<span class="card-source" title="' + sourceNameSafe + '">' + escHtml(srcShort) + '</span>'
    + '<div class="card-summary collapsed" id="sum-' + idx + '" data-full="' + escHtml(summaryRaw).replace(/"/g, '&quot;') + '">' + summarySafe + '</div>'
    + '<div class="card-footer">'
    + '<button class="expand-btn" onclick="toggleExpand(' + idx + ', this)">展开全文</button>'
    + '<div style="display:flex;gap:8px">'
    + '<button class="read-btn" onclick="markRead(' + idx + ', this)" id="rbtn-' + idx + '">' + (isRead ? '标为未读' : '打卡') + '</button>'
    + sourceHtml
    + '</div></div>';
  card.innerHTML = inner;
  // 点击卡片任意位置展开全文（按钮除外）
  card.addEventListener('click', function(e) {
    var target = e.target;
    if (target.closest('.read-btn') || target.closest('.source-btn') || target.closest('.expand-btn')) return;
    toggleExpand(idx, card.querySelector('.expand-btn'));
  });
  return card;
}

function renderDonut(sections) {
  var total = sections.reduce(function(a, s) { return a + s.items.length; }, 0);
  if (total === 0) return;
  var svgEl = document.getElementById('donutSvg');
  var legendEl = document.getElementById('donutLegend');
  svgEl.innerHTML = '';
  legendEl.innerHTML = '';
  var cx = 50, cy = 50, r = 36, inner = 22;
  var startAngle = -Math.PI / 2;
  sections.forEach(function(s) {
    if (s.items.length === 0) return;
    var cfg = SECTION_CONFIG[s.label] || { icon: '📌', color: '#888' };
    var angle = (s.items.length / total) * Math.PI * 2;
    var endAngle = startAngle + angle;
    var x1 = cx + r * Math.cos(startAngle), y1 = cy + r * Math.sin(startAngle);
    var x2 = cx + r * Math.cos(endAngle), y2 = cy + r * Math.sin(endAngle);
    var ix1 = cx + inner * Math.cos(startAngle), iy1 = cy + inner * Math.sin(startAngle);
    var ix2 = cx + inner * Math.cos(endAngle), iy2 = cy + inner * Math.sin(endAngle);
    var lg = angle > Math.PI ? 1 : 0;
    var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', 'M ' + ix1 + ' ' + iy1 + ' L ' + x1 + ' ' + y1 + ' A ' + r + ' ' + r + ' 0 ' + lg + ' 1 ' + x2 + ' ' + y2 + ' L ' + ix2 + ' ' + iy2 + ' A ' + inner + ' ' + inner + ' 0 ' + lg + ' 0 ' + ix1 + ' ' + iy1 + ' Z');
    path.setAttribute('fill', cfg.color);
    path.setAttribute('opacity', '0.85');
    path.style.cursor = 'pointer';
    path.addEventListener('click', (function(label) { return function() { filterSection(label); scrollToSection(label); }; })(s.label));
    svgEl.appendChild(path);
    startAngle = endAngle;
    var li = document.createElement('div');
    li.className = 'donut-legend-item';
    li.innerHTML = '<span class="dot" style="background:' + cfg.color + '"></span>' + s.label + ' <strong style="color:rgba(255,255,255,0.95)">' + s.items.length + '</strong>';
    li.onclick = (function(label) { return function() { filterSection(label); scrollToSection(label); }; })(s.label);
    legendEl.appendChild(li);
  });
  var text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  text.setAttribute('x', cx); text.setAttribute('y', cy + 1);
  text.setAttribute('text-anchor', 'middle'); text.setAttribute('dominant-baseline', 'middle');
  text.setAttribute('fill', 'rgba(255,255,255,0.9)'); text.setAttribute('font-size', '12');
  text.setAttribute('font-weight', '700'); text.textContent = total;
  svgEl.appendChild(text);
  var sub = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  sub.setAttribute('x', cx); sub.setAttribute('y', cy + 13);
  sub.setAttribute('text-anchor', 'middle'); sub.setAttribute('fill', 'rgba(255,255,255,0.6)'); sub.setAttribute('font-size', '7');
  sub.textContent = '条';
  svgEl.appendChild(sub);
}

function renderAnalytics(sections) {
  var wrap = document.getElementById('analyticsWrap');
  var sourceMap = {};
  sections.forEach(function(s) {
    s.items.forEach(function(item) {
      var src = shortSource(item.sourceName || '未知');
      sourceMap[src] = (sourceMap[src] || 0) + 1;
    });
  });
  var sorted = Object.entries(sourceMap).sort(function(a,b) { return b[1]-a[1]; }).slice(0, 6);
  var maxCount = sorted[0] ? sorted[0][1] : 1;
  var srcHtml = '<div class="analytics-card"><div class="analytics-title">来源排行</div>';
  sorted.forEach(function(entry) {
    var name = entry[0], count = entry[1];
    var pct = Math.round(count / maxCount * 100);
    srcHtml += '<div class="source-rank-item" style="cursor:pointer" onclick="filterBySource(\'' + escHtml(name).replace(/'/g,"\\'") + '\')" title="查看 ' + escHtml(name).replace(/'/g,"\\'") + ' 的全部文章"><span class="source-rank-name">' + escHtml(name) + '</span><div class="source-rank-bar-bg"><div class="source-rank-bar" style="width:' + pct + '%"></div></div><span class="source-rank-count">' + count + '</span></div>';
  });
  srcHtml += '</div>';
  var stopWords = new Set(['的','了','在','是','与','和','AI','以','将','被','其','已','于','从','到','并','为','但','还','也','都','该','这','其中','能够','通过','实现','用于','可以','以及','可能','提供','包含','包括','无需','用户','产品','模型','支持','系统','功能','未','使用','工作','进行','没有']);
  var wordCount = {};
  sections.forEach(function(s) {
    s.items.forEach(function(item) {
      var words = (item.title + ' ' + (item.summary || '')).replace(/[，。、！？【】《》"'·\s]+/g, ' ').split(' ');
      words.forEach(function(w) {
        w = w.trim();
        if (w.length >= 2 && w.length <= 8 && !stopWords.has(w) && !/^[a-zA-Z0-9]{1,2}$/.test(w)) {
          wordCount[w] = (wordCount[w] || 0) + 1;
        }
      });
    });
  });
  var topWords = Object.entries(wordCount).sort(function(a,b) { return b[1]-a[1]; }).slice(0, 18);
  var colors = ['#e8622a','#f08040','#1d9e75','#378add','#7f6af0','#e8a020','#d4537e','#0f6e56','#993c1d','#185fa5'];
  var hotHtml = '<div class="analytics-card"><div class="analytics-title">热词标签</div><div class="hotwords-wrap">';
  topWords.forEach(function(entry, i) {
    var word = entry[0], cnt = entry[1];
    var sz = Math.max(11, Math.min(16, 11 + cnt * 2));
    var col = colors[i % colors.length];
    hotHtml += '<span class="hotword-chip" style="background:' + col + ';font-size:' + sz + 'px;opacity:' + (0.7 + cnt * 0.1) + '" onclick="document.getElementById(\'searchInput\').value=\'' + escHtml(word).replace(/'/g, "\\'") + '\';doSearch(\'' + escHtml(word).replace(/'/g, "\\'") + '\')">' + escHtml(word) + '</span>';
  });
  hotHtml += '</div></div>';
  wrap.innerHTML = srcHtml + hotHtml;
}

function doSearch(val) {
  currentSearch = val.toLowerCase().trim();
  document.getElementById('searchClear').className = 'search-clear' + (val ? ' show' : '');
  applyFilters();
}
function clearSearch() {
  document.getElementById('searchInput').value = '';
  doSearch('');
}
function applyFilters() {
  var cards = document.querySelectorAll('.card');
  var visible = 0;
  cards.forEach(function(card) {
    var secEl = card.closest('.dyn-section');
    var matchSection = currentFilter === 'all' || slugify(currentFilter) === (secEl ? secEl.id.replace('sec-','') : '');
    var matchSearch = !currentSearch
      || card.dataset.title.indexOf(currentSearch) >= 0
      || card.dataset.summary.indexOf(currentSearch) >= 0
      || card.dataset.source.indexOf(currentSearch) >= 0;
    var matchRead = !showOnlyUnread || !readSet.has(card.dataset.idx);
    if (matchSection && matchSearch && matchRead) {
      card.classList.remove('hidden'); visible++;
      if (currentSearch) highlightCard(card, currentSearch); else clearHighlight(card);
    } else {
      card.classList.add('hidden'); clearHighlight(card);
    }
  });
  document.getElementById('searchCount').textContent = currentSearch ? (visible > 0 ? '找到 ' + visible + ' 条' : '') : '';
  document.getElementById('noResults').className = 'no-results' + (visible === 0 && (currentSearch || showOnlyUnread || currentFilter !== 'all') ? ' show' : '');
}
function highlightCard(card, q) {
  var titleEl = card.querySelector('.card-title');
  if (!titleEl) return;
  var orig = titleEl.textContent;
  var re = new RegExp('(' + escRe(q) + ')', 'gi');
  titleEl.innerHTML = escHtml(orig).replace(re, '<mark>$1</mark>');
}
function clearHighlight(card) {
  var titleEl = card.querySelector('.card-title');
  if (titleEl) titleEl.innerHTML = escHtml(titleEl.textContent);
}
function filterSection(label, el) {
  currentFilter = label;
  currentSearch = '';
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.nav-link').forEach(function(a) { a.classList.remove('active'); });
  if (el) el.classList.add('active');
  else { document.querySelectorAll('.nav-link').forEach(function(a) { if (a.textContent.indexOf(label) >= 0) a.classList.add('active'); }); }
  applyFilters();
}
function filterBySource(sourceName) {
  currentFilter = 'all';
  currentSearch = sourceName;
  document.querySelectorAll('.nav-link').forEach(function(a) { a.classList.remove('active'); });
  document.querySelectorAll('.nav-link').forEach(function(a) { if (a.textContent.indexOf('全部') >= 0) a.classList.add('active'); });
  // Set search to the source name so only cards from that source remain visible
  document.getElementById('searchInput').value = sourceName;
  doSearch(sourceName);
  scrollTo(0, 0);
  showToast('已筛选：' + sourceName);
}
function scrollToSection(label) {
  var id = 'sec-' + slugify(label);
  var el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
function toggleExpand(idx, btn) {
  var sum = document.getElementById('sum-' + idx);
  if (!sum) return;
  var full = sum.dataset.full || '';
  if (sum.classList.contains('collapsed')) {
    sum.classList.replace('collapsed', 'expanded');
    sum.textContent = full;
    btn.textContent = '收起';
  } else {
    sum.classList.replace('expanded', 'collapsed');
    var short = full.length > 65 ? full.slice(0, 62) + '...' : full;
    sum.textContent = short;
    btn.textContent = '展开全文';
  }
}
function markRead(idx, btn) {
  var key = String(idx);
  var card = document.querySelector('.card[data-idx="' + key + '"]');
  if (readSet.has(key)) {
    readSet.delete(key);
    if (card) card.classList.remove('read');
    if (btn) btn.textContent = '打卡';
  } else {
    readSet.add(key);
    if (card) card.classList.add('read');
    if (btn) btn.textContent = '已打卡';
  }
  try { localStorage.setItem('aidaka_read_' + currentDate, JSON.stringify(Array.from(readSet))); } catch(e) {}
  var total = document.querySelectorAll('.card').length;
  updateReadProgress(total);
  if (showOnlyUnread) applyFilters();
}
function toggleReadFilter() {
  showOnlyUnread = !showOnlyUnread;
  var btn = document.getElementById('readProgress');
  if (showOnlyUnread) { btn.style.opacity = '0.7'; btn.title = '点击显示全部'; }
  else { btn.style.opacity = '1'; btn.title = '点击筛选未读'; }
  applyFilters();
}
function updateReadProgress(total) {
  var count = readSet.size;
  var pct = total > 0 ? Math.round(count / total * 100) : 0;
  var icon = count >= total && total > 0 ? '✅' : '🕐';
  var label = count >= total && total > 0 ? '今日已读完' : '已打卡 ' + count + '/' + total;
  document.getElementById('readLabel').innerHTML = '<span class="read-progress-label"><span class="icon">' + icon + '</span><span>' + label + '</span></span>';
  document.getElementById('readBarFill').style.width = pct + '%';
}
function toggleTheme() {
  isDark = !isDark;
  document.body.classList.toggle('light', !isDark);
  try { localStorage.setItem('aidaka_theme', isDark ? 'dark' : 'light'); } catch(e) {}
  updateThemeBtn();
}
function updateThemeBtn() {
  document.getElementById('themeBtn').textContent = isDark ? '亮色模式' : '暗色模式';
}
function updateDateNav(dateStr) {
  // For items-based view, we use daily API for history nav
  document.getElementById('nextBtn').disabled = (dateStr >= DAILY_MAX);
  document.getElementById('prevBtn').disabled = false;
}
function navigateDate(delta) {
  var d = new Date(currentDate + 'T00:00:00');
  d.setDate(d.getDate() + delta);
  var newDateRaw = d.toISOString().slice(0, 10);
  if (newDateRaw > DAILY_MAX) { showToast('已是最新日期'); return; }
  loadDate(newDateRaw);
}
function openModal() {
  document.getElementById('datePicker').value = currentDate;
  document.getElementById('datePicker').max = DAILY_MAX;
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }
function goToDate() {
  var val = document.getElementById('datePicker').value;
  closeModal();
  if (val && val !== currentDate && val <= DAILY_MAX) loadDate(val);
  else if (val > DAILY_MAX) showToast('不能选择未来日期');
}
function loadDate(dateStr) {
  currentDate = dateStr;
  document.getElementById('loadingOverlay').style.display = 'flex';
  document.getElementById('loadingOverlay').style.opacity = '1';
  try { readSet = new Set(JSON.parse(localStorage.getItem('aidaka_read_' + dateStr) || '[]')); } catch(e) { readSet = new Set(); }
  document.querySelectorAll('.dyn-section').forEach(function(el) { el.remove(); });
  currentSearch = ''; currentFilter = 'all';
  showOnlyUnread = false;
  document.getElementById('searchInput').value = '';
  document.getElementById('searchCount').textContent = '';
  document.getElementById('readProgress').style.opacity = '1';
  document.getElementById('readProgress').title = '点击筛选未读';
  // Try loading 50 items from items API for the selected date
  var sinceStr = dateStr + 'T00:00:00Z';
  fetch('https://aihot.virxact.com/api/public/items?mode=selected&since=' + sinceStr + '&take=50')
    .then(function(r) { return r.json(); })
    .then(function(apiData) {
      // Transform items API response to daily-like format
      var categories = {
        'ai-models': '模型发布/更新',
        'ai-products': '产品发布/更新',
        'industry': '行业动态',
        'paper': '论文研究',
        'tip': '技巧与观点'
      };
      var sectionMap = {};
      var idx = 0;
      (apiData.items || []).forEach(function(item) {
        var cat = item.category || '';
        var label = categories[cat] || '行业动态';
        if (!sectionMap[label]) {
          sectionMap[label] = { label: label, items: [] };
        }
        idx++;
        sectionMap[label].items.push({
          idx: idx,
          title: item.title,
          sourceName: item.source || '',
          sourceUrl: item.url || '',
          summary: item.summary || '',
          publishedAt: item.publishedAt || ''
        });
      });
      var sections = [];
      var order = ['模型发布/更新','产品发布/更新','行业动态','论文研究','技巧与观点'];
      order.forEach(function(lbl) {
        if (sectionMap[lbl]) sections.push(sectionMap[lbl]);
        else sections.push({ label: lbl, items: [] });
      });
      var transformed = {
        date: dateStr,
        generatedAt: apiData.items && apiData.items.length > 0 ? apiData.items[0].publishedAt : new Date().toISOString(),
        lead: null,
        sections: sections
      };
      renderAll(transformed);
      document.getElementById('loadingOverlay').style.opacity = '0';
      setTimeout(function() { document.getElementById('loadingOverlay').style.display = 'none'; }, 400);
      showToast('已加载 ' + dateStr + ' (' + idx + '条)');
    })
    .catch(function() {
      // Fallback to daily API
      fetch('https://aihot.virxact.com/api/public/daily/' + dateStr)
        .then(function(r) { return r.json(); })
        .then(function(dailyData) {
          renderAll(dailyData);
          document.getElementById('loadingOverlay').style.opacity = '0';
          setTimeout(function() { document.getElementById('loadingOverlay').style.display = 'none'; }, 400);
          showToast('已加载 ' + dateStr + ' 日报');
        })
        .catch(function() {
          showToast('加载失败，网络请求受限');
          document.getElementById('loadingOverlay').style.opacity = '0';
          setTimeout(function() { document.getElementById('loadingOverlay').style.display = 'none'; }, 400);
        });
    });
}
function initScrollAnim() {
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }
    });
  }, { threshold: 0.05, rootMargin: '0px 0px -20px 0px' });
  document.querySelectorAll('.card').forEach(function(c) { observer.observe(c); });
}
var toastTimer;
function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.classList.remove('show'); }, 2500);
}
function slugify(s) { return s.replace(/[\/\s]/g, '-'); }
function escHtml(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
function shortSource(name) {
  if (!name) return '';
  // Group all X/Twitter sources under "X"
  if (/^X[：:]/.test(name)) return 'X';
  var trimmed = name.replace(/（.*?）/g,'').replace(/\(.*?\)/g,'').trim();
  return trimmed.length > 16 ? trimmed.slice(0, 16) + '...' : trimmed;
}
function fmtDate(dateStr) {
  if (!dateStr) return '';
  var d = new Date(dateStr + 'T00:00:00+08:00');
  var mm = d.getMonth() + 1;
  var dd = d.getDate();
  var days = ['日','一','二','三','四','五','六'];
  return mm + ' 月 ' + dd + ' 日 周' + days[d.getDay()];
}
function fmtDateShort(iso) { return iso ? iso.slice(0, 10) : ''; }
function relTime(date) {
  var now = Date.now();
  var diff = now - date.getTime();
  var mins = Math.floor(diff / 60000);
  var hours = Math.floor(mins / 60);
  if (diff < 0) return '刚刚';
  if (mins < 1) return '刚刚';
  if (mins < 60) return mins + ' 分钟前';
  if (hours < 24) {
    var hh = String(date.getHours()).padStart(2,'0');
    var mm = String(date.getMinutes()).padStart(2,'0');
    var period = date.getHours() < 12 ? '上午' : (date.getHours() < 18 ? '下午' : '晚上');
    return '今天' + period + ' ' + hh + ':' + mm;
  }
  return fmtDateShort(date.toISOString());
}
function relTimeStr(isoStr) {
  if (!isoStr) return '';
  var d = new Date(isoStr);
  return relTime(d);
}
</script>
