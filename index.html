<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI打卡网 · 2026-05-29</title>
<style>
  :root {

  }

  .nav-date-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .nav-date-label { font-size: 12px; color: var(--text3); }
  .main { max-width: 960px; margin: 0 auto; padding: 24px 16px 60px; }
  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 40px 0 20px;

  }

  .section-title { font-size: 18px; font-weight: 700; color: var(--text); }

  }
  .card-grid {
    display: grid;

  }
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    box-shadow: var(--card-shadow);
    transition: transform var(--transition), box-shadow var(--transition), opacity var(--transition), border-color var(--transition);
    opacity: 0;
    transform: translateY(18px);
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }
  .card.visible { opacity: 1; transform: translateY(0); }
  .card.read { opacity: 0.5; }
  .card.read::after {
    content: '已读';
    position: absolute;
    top: 12px;
    right: 12px;
    background: var(--bg4);
    color: var(--text3);
    font-size: 11px;
    padding: 2px 8px;

  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); border-color: var(--accent); }
  .card.hidden { display: none !important; }
  .card.highlight { border-color: var(--accent2); background: rgba(232,98,42,0.06); }
  .card-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px; height: 24px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    border-radius: 6px;
    margin-bottom: 10px;
    flex-shrink: 0;
  }
  .card-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }

    display: inline-flex;

    border: 1px solid var(--border);

    padding: 3px 9px;
    font-size: 11px;
    color: var(--text3);

    text-overflow: ellipsis;

  }
  .card-summary {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.65;
    margin-bottom: 12px;
    overflow: hidden;
    transition: max-height 0.35s ease;
    word-break: break-word;
  }
  .card-summary.collapsed {
    max-height: 4.95em;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-summary.expanded {
    -webkit-line-clamp: unset;
    display: block;

  }
  .card-footer { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }
  .expand-btn {
    background: none;
    border: none;
    color: var(--accent2);
    font-size: 12px;
    cursor: pointer;
    font-family: var(--font);
    padding: 0;
    transition: color var(--transition);
  }
  .expand-btn:hover { color: var(--accent); }
  .source-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    text-decoration: none;
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    transition: opacity var(--transition);
  }
  .source-btn:hover { opacity: 0.85; }
  .read-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    color: var(--text3);
    cursor: pointer;
    font-family: var(--font);
    transition: all var(--transition);
  }
  .read-btn:hover { border-color: var(--accent); color: var(--accent); }
  .time-badge { font-size: 11px; color: var(--text3); display: block; margin-bottom: 8px; }
  .analytics-wrap {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 32px;
  }
  .analytics-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
  }
  .analytics-title { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 14px; }

  .source-rank-bar-bg { flex: 1; height: 6px; background: var(--bg4); border-radius: 3px; overflow: hidden; }

</head>
<body>
<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>查看历史日報</h3>
    <input type="date" class="date-picker" id="datePicker" value="2026-05-29" max="2026-05-29">
    <div class="modal-btns">
      <button class="modal-btn secondary" onclick="closeModal()">取消</button>
      <button class="modal-btn primary" onclick="goToDate()">前往</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="hero">
  <div class="hero-inner">
    <div class="hero-top">
      <span class="hero-badge">AI打卡网 · 每日晨报</span>

    <p class="hero-subtitle" id="heroSubtitle">加载中…</p>
    <div class="hero-stats" id="heroStats"></div>
    <div class="donut-wrap" id="donutWrap">
      <svg class="donut-svg" id="donutSvg" width="100" height="100" viewBox="0 0 100 100"></svg>
      <div class="donut-legend" id="donutLegend"></div>
    </div>
  </div>
</div>

    <a class="nav-link active" href="#top" onclick="reloadToday()">全部</a>

      <button class="nav-date-btn" id="prevBtn" onclick="navigateDate(-1)">昨天</button>

      <button class="nav-date-btn" onclick="openModal()">日历</button>
    </div>
  </div>
</div>
<div class="toolbar">
  <div class="search-box">
    <span class="search-icon">🔍</span>

    <div class="read-bar"><div class="read-bar-fill" id="readBarFill" style="width:0%"></div></div>
  </div>
  <span class="search-count" id="searchCount"></span>
</div>
<div class="main" id="main">
  <div class="analytics-wrap" id="analyticsWrap"></div>
  <div id="noResults" class="no-results">
    <div class="no-results-icon">🔎</div>
    <p>没有找到匹配的资讯</p>
    <p style="font-size:12px; margin-top:6px">试试其他关键词？</p>
  </div>
</div>

{"date": "2026-05-29", "generatedAt": "2026-05-29T00:00:00.281Z", "lead": null, "totalItems": 50, "items": [{"id": "cmpqppxpf075oslno4jxz0h8b", "title": "小米开源可控视频音效生成模型 ControlFoley，让声音\"按你想要的来\"", "title_en": null, "url": "https://www.ithome.com/0/957/282.htm", "source": "IT之家（RSS）", "publishedAt": "2026-05-29T09:13:13.000Z", "summary": "小米大模型应用团队发布开源可控视频音效生成模型 ControlFoley，旨在解决创作中的可控性难题。该模型统一支持文本引导视频配音、文本控制视频配音和参考音频控制视频配音三类任务。ControlFoley 在 VGGSound-Test 等多个 benchmark 上取得开源 SOTA 表现，其代码、模型权重和在线 Demo 均已开放。", "category": "ai-models"}, {"id": "cmpqlfk6e061aslno4pjxqpuu", "title": "谷歌 DeepMind CEO 哈萨比斯：AGI 最快三年内到来，研发速度远超预期", "title_en": null, "url": "https://www.ithome.com/0/957/154.htm", "source": "IT之家（RSS）", "publishedAt": "2026-05-29T07:18:53.000Z", "summary": "谷歌 DeepMind 首席执行官德米斯·哈萨比斯预测，AGI 研发速度远超预期，最快可能在 2029 年至 2030 年前后出现。作为 AlphaGo、AlphaFold 的主导者，他认为当前 AI 智能体是未来更强智能的预演，随着多模态和自主决策能力成熟，三年内迎来 AGI 关键突破已非科幻。但他同时警示，全球社会对 AGI 到来的准备严重不足，必须提前建立规则与防护机制。", "category": "tip"}, {"id": "cmpqlfk6e061bslnoitk181h9", "title": "阿里云开源百炼 CLI，Agent 可调用全套模型和应用能力", "title_en": null, "url": "https://www.ithome.com/0/957/149.htm", "source": "IT之家（RSS）", "publishedAt": "2026-05-29T07:15:20.000Z", "summary": null, "category": "ai-products"}, {"id": "cmpqfgdvc04itslnodti0cguk", "title": "Adam's Law：用高频词写Prompt效果更好", "title_en": "别特么给AI拽\"高级词汇\"\"冷门词\"了！！ 大家还在拼命把Prompt写得文雅、专业、结构严密，以为这样模型就会更听话、输出更准，结果正好相反。 FaceMind团队用100种语言、四大核心任务的…", "url": "https://x.com/berryxia/status/2060212428584202428", "source": "X：Berry Xia (@berryxia)", "publishedAt": "2026-05-29T04:11:34.000Z", "summary": "FaceMind团队用100种语言和四大核心任务实验发现，在语义不变的前提下，使用预训练语料中出现频率更高的词汇（高频表达）来撰写提示词或进行微调，可以显著提升大语言模型的表现。这被总结为Adam's Law（文本频率定律），它为数据工程补上了\"频率\"这一新维度。原理在于高频表达能让模型在它最熟悉的概率空间内工作，从而优化输出质量。", "category": "tip"}, {"id": "cmpqbiyn103k8slnohvxcc9y7", "title": "15秒动画IP预告片制作全流程分享", "title_en": "#1 We built a 15-second animated IP teaser - from character sheet to final video. Meet MILO &amp； BU…", "url": "https://x.com/PixVerse_/status/2060184048920826340", "source": "X：PixVerse (@PixVerse_)", "publishedAt": "2026-05-29T02:18:48.000Z", "summary": "我们制作了一个15秒的动画IP预告片--从角色设定到最终视频。认识一下MILO和BUMBLE：地下邮政骑手\n转发+关注+回复=我们会私信发送工作流程和提示词", "category": "tip"}, {"id": "cmpq988q102xdslnoe0k3fp1h", "title": "Cursor 团队发布《开发者习惯报告》", "title_en": "Cursor 最新发布「开发者习惯报告」 AI Coding 已经不再只是\"写代码更快\"，它正在强烈改变软件开发的工作形态：开发者提交更大的变更，Agent 做更深的任务，更多 AI 代码进入代码库…", "url": "https://x.com/shao__meng/status/2060167182777249886", "source": "X：邵猛 (@shao__meng)", "publishedAt": "2026-05-29T01:11:47.000Z", "summary": "报告显示，AI正深刻改变开发工作形态。开发者周均代码产出从约3.6K行增至8.6K行，更大规模的PR（千行以上）占比上升。AI智能体在单次会话中的工具调用数增加约30%，正在处理更复杂的任务。同时，被接受的AI代码在60分钟后的留存率从约76%提升至约81%，表明更多AI生成内容进入了实际代码库。这些趋势共同指向AI已从个人辅助工具，演进为推动开发向更大规模任务与自动化基础设施发展的核心力量。", "category": "tip"}, {"id": "cmpq8kjw502qfslno2639yx6x", "title": "特斯拉 FSD 安全性宣称遭质疑", "title_en": "FSD 比人类安全十倍？特斯拉 AI 训练师自己都不信", "url": "https://www.ithome.com/0/956/864.htm", "source": "IT之家（RSS）", "publishedAt": "2026-05-29T01:07:40.000Z", "summary": "特斯拉声称其全自动驾驶软件（FSD）安全性最高可达人类的10倍，但路透社调查发现此数据经不起推敲。参与训练FSD的员工表示该技术远未成熟，其安全演示高度依赖人工。统计方法被11位交通安全研究人员指出存在缺陷，例如与更广泛的联邦事故数据进行不恰当比较。相比之下，竞争对手Waymo采用了更严谨的统计方法。目前，特斯拉FSD仍需驾驶员主动监督，安全部署可能还需数年。", "category": "tip"}, {"id": "cmpq8kjw502qrslnouugetmfh", "title": "三星电子业内率先出样 HBM4E 内存", "title_en": null, "url": "https://www.ithome.com/0/956/851.htm", "source": "IT之家（RSS）", "publishedAt": "2026-05-29T00:45:13.000Z", "summary": null, "category": "industry"}, {"id": "cmpq60e9m022kslnocucomhik", "title": "阶跃星辰 Step 3.7 Flash 发布，聚焦智能体效率", "title_en": "⚡️ Step 3.7 Flash is here： The new frontier is agent efficiency. #1 ClawEval-1.1 （67.1）， #1 SimpleV…", "url": "https://x.com/StepFun_ai/status/2060149124117475791", "source": "X：阶跃星辰 StepFun (@StepFun_ai)", "publishedAt": "2026-05-29T00:00:01.000Z", "summary": "阶跃星辰（Step）发布了开源大模型 Step 3.7 Flash，主打智能体（Agent）工作流的效率。该模型在 ClawEval-1.1（67.1分）和 SimpleVQA Search（79.2分）评测中排名第一。其架构为 198B 参数的 MoE，约 11B 为活跃参数，支持 256K 上下文。模型具备多模态理解能力，能处理图像、文档并生成代码或调用工具执行任务。在工具使用方面 k doesn't happen in a chat box. You need space to explore ideas， create variants，…", "url": "https://x.com/Replit/status/2060097656207413613", "source": "X：Replit (@Replit)", "publishedAt": "2026-05-28T20:35:30.000Z", "summary": "最好的设计工作不会在聊天框里发生。你需要空间来探索想法、创建变体并进行迭代。\n认识新的 Replit Canvas。\n你的智能体设计工具，用于构建精美的网站、应用、营销资产等。", "category": "ai-products"}, {"id": "cmppv6bhy01dlslm6hh647pnl", "title": "Gemini Omni向印度用户开放视频编辑功能", "title_en": "You're in luck！ Users in India can now upload videos （from their camera roll or saved files） and use…", "url": "https://x.com/GeminiApp/status/2060074415304610168", "source": "X：Gemini (@GeminiApp)", "publishedAt": "2026-05-28T19:03:09.000Z", "summary": "好消息！印度用户现在可以上传视频（来自相册或已保存文件），并使用Gemini Omni进行编辑和转换。快来试试，并告诉我们你的想法。", "category": "ai-products"}, {"id": "cmppvr37p01lgslm6udm3v6qa", "title": "MiniMax M2.7 免费智能体编程限时开放", "title_en": "Free agentic coding with MiniMax M2.7 on @OpenHandsDev？ Yes， please！ Available for a limited time …", "url": "https://x.com/MiniMax_AI/status/2060071852970844377", "source": "X：MiniMax (@MiniMax_AI)", "publishedAt": "2026-05-28T18:52:58.000Z", "summary": "在 @OpenHandsDev 上使用 MiniMax M2.7 进行免费智能体编程？\n\n是的，请给我！限时提供 ⚡👀", "category": "ai-products"}, {"id": "cmppua8gx0183slm67cnmtqp8", "title": "使用 Google Pay & Wallet Developer MCP server 加速你的集成工作流", "title_en": "Supercharge your integration workflow with the Google Pay & Wallet Developer MCP server", "url": "https://developers.googleblog.com/supercharge-your-integration-workflow-with-the-google-pay-wallet-developer-mcp-server", "source": "Google Developers Blog（RSS）", "publishedAt": "2026-05-28T18:41:20.382Z", "summary": "Google 推出 Google Pay & Wallet Developer MCP server，这是一款开放标准工具，旨在将 AI 开发助手和 IDE 安全连接到实时的 API 与账户上下文。开发者无需离开开发环境，即可搜索官方文档、验证 Wallet pass 定义、检查集成状态以及管理商户账户。该集成旨在通过减少上下文切换并提供实时、可靠的 AI 支持来减少开发摩擦，从而加速开发工作流。", "category": "ai-products"}, {"id": "cmppu2sce013dslm6rliijffw", "title": "Anthropic 完成 650 亿美元 H 轮融资，估值达 9650 亿美元", "title_en": "Anthropic raises $65B in Series H funding at $965B post-money valuation", "url": "https://www.anthropic.com/news/series-h", "source": "Anthropic：Newsroom（网页）", "publishedAt": "2026-05-28T18:35:40.238Z", "summary": "Anthropic 宣布完成由 Altimeter Capital 等领投的 650 亿美元 H 轮融资，投后估值达 9650 亿美元。公司表示其旗舰模型 Claude 的企业部署持续增长，年化收入已突破 470 亿美元。此轮融资将用于推进 AI 安全与可解释性研究、扩展算力以满足 Claude 的需求，并规模化产品与合作伙伴关系。Anthropic 近期已显著扩大计算容量，并宣布 Claude 已登陆 AWS、Google Cloud 和 Microsoft Azure 三大云平台。", "category": "industry"}, {"id": "cmppuiqqt01a5slm6n7mhtwo5", "title": "Apple 正努力将庞大的 Gemini 模型塞进 iPhone 以驱动新 Siri", "title_en": "Apple working to cram massive Gemini model into iPhone to power new Siri", "url": "https://arstechnica.com/ai/2026/05/apple-reportedly-trying-to-distill-googles-multi-trillion-parameter-gemini-ai-to-run-on-iphone", "source": "Ars Technica：AI（RSS）", "publishedAt": "2026-05-28T18:30:48.000Z", "summary": "Apple 正尝试将大型 Gemini 模型集成到 iPhone 中，以支持全新的 Siri 功能。由于模型规模庞大，本地处理可能无法完全实现，因此一个云端组件很可能是必然的选择。", "category": "industry"}, {"id": "cmppuejv9019eslm6zx7qtdep", "title": "hexoai开源SIA框架：AI智能体实现递归自我改进", "title_en": "Big release - Open Source Recursive Self Improvement from @hexoai Shows AI agent can improve both …", "url": "https://x.com/rohanpaul_ai/status/2060063592448446778", "source": "X：Rohan Paul (@rohanpaul_ai)", "publishedAt": "2026-05-28T18:20:09.000Z", "summary": "hexoai开源了SIA（自我改进AI）框架。该框架展示了AI智能体不仅能优化其外部工作流（harness），还能通过任务反馈直接更新自身的模型权重，从而在领域知识和能力上实现自主提升，而非仅依赖人类提供的提示或工具改进。论文报告显示，SIA在LawBench基准上性能提升56.6%，在GPU kernels运行上耗时减少91.9%，在单细胞RNA去噪任务中相比基线提升502%。", "category": "paper"}, {"id": "cmppsj2o500svslm6jst6o7tj", "title": "四步保障AI生成应用安全", "title_en": "How to secure your vibecoded app in 4 steps 🔒 Speed without security is a liability. Here's how to…", "url": "https://x.com/Replit/status/2060052289155375532", "source": "X：Replit (@Replit)", "publishedAt": "2026-05-28T17:35:14.000Z", "summary": "如何用四步保障你的vibecoded应用安全 🔒\n\n速度若无安全加持，便是隐患。以下是使用Replit发布应用时，如何避免留下后门的方法。\n\n🧵展开阅读 ↓", "category": "tip"}, {"id": "cmpps64fo00p9slm6g6j53psu", "title": "Nano Banana Pro与Nano Banana 2正式发布", "title_en": "🍌 Nano Banana Pro 【gemini-3-pro-image】 and Nano Banana 2 【gemini-3.1-flash-image】 are now GA and re…", "url": "https://x.com/googleaidevs/status/2060049962356916377", "source": "X：Google AI for Developers (@googleaidevs)", "publishedAt": "2026-05-28T17:25:59.000Z", "summary": "🍌 Nano Banana Pro 【gemini-3-pro-image】 和 Nano Banana 2 【gemini-3.1-flash-image】 现已正式发布，可通过 Gemini API 投入生产使用。查看这些优秀的社区示例，了解两个模型的实际能力 🧵↓", "category": "ai-models"}, {"id": "cmpprfa7400hmslm6nclfncqk", "title": "在Claude Code中引入动态工作流", "title_en": "Introducing dynamic workflows in Claude Code", "url": "https://claude.com/blog/introducing-dynamic-workflows-in-claude-code", "source": "Claude：Blog（网页）", "publishedAt": "2026-05-28T17:21:01.868Z", "summary": "Claude Code 推出\"动态工作流\"功能，使 Claude 能端到端处理复杂任务。该功能通过动态编写脚本，在单个会话中并行运行数十到数百个子智能体来完成工作，并会在结果呈现前进行验证。它适用于跨代码库的 bug 查找、大规模迁移（如将 Bun 从 Zig 移植到 Rust）等需要多角度分析的任务。该功能现已在研究预览阶段可用，支持 Claude Code CLI、桌面端、VS Code 扩展以及 API、Amazon Bedrock、Vertex AI 等平台，面向 Max、Team 及已启用的 Enterprise 计划用户。", "category": "ai-products"}, {"id": "cmppqv0si0097slm6pmeqwf45", "title": "Claude Opus 4.8 发布：在编码、智能体技能与推理方面实现全面升级", "title_en": "Introducing Claude Opus 4.8", "url": "https://www.anthropic.com/news/claude-opus-4-8", "source": "Anthropic：Newsroom（网页）", "publishedAt": "2026-05-28T17:05:39.037Z", "summary": "Anthropic 发布了新一代模型 Claude Opus 4.8，作为 Opus 4.7 的升级版本，其在编码、智能体技能、推理和实用知识工作等各项基准测试中均取得进步。Claude Opus 4.8 现已可用，价格与前代相同。同步推出的新功能包括：用户可控制任务投入程度、Claude Code 新增\"动态工作流\"特性，以及 Opus 4.8 的 2.5 倍速模式价格降低为以往的三分之一。早期测试者反馈其在智能体任务中的判断力更可靠、工具调用更高效。该模型在 Online-Mind2Web 测评中得分 84%，超越了 Opus 4.7 和 GPT-5.5。此外，其诚实度与对齐表现也得到提升，代码错误漏检率降低了约 75%。", "category": "ai-models"}, {"id": "cmppprn04028nslvyqxgosjyn", "title": "SGLang 团队与 AMD 合作，使 AMD InstinctTM MI355X GPU 的大规模 DeepSeek-R1 分离式推理在总拥有成本上具备竞争力", "title_en": "Blog Win on TCO： How AMD InstinctTM MI355X Achieves Cost-Competitive Distributed Inference Through SGLang with MoRI The SGLang and AMD team has worked closely to unlock competitive Total Cost of Ownership （TCO） for large-scale DeepSeek-R1 disaggregated inference on AMD InstinctTM MI355X GPUs. Building on SGLang's se… AMD & SGLang Team", "url": "https://www.lmsys.org/blog/2026-05-28-mori", "source": "LMSYS：Blog（Chatbot Arena 团队）", "publishedAt": "2026-05-28T16:34:57.702Z", "summary": "SGLang 与 AMD 团队合作，通过一系列全栈优化，使 AMD InstinctTM MI355X GPU 在运行 DeepSeek-R1 大模型推理时实现了极具竞争力的总拥有成本。在 129 tok/s/user 的交互延迟下，其成本为每百万 token $0.169，比 NVIDIA B200（Dynamo TRT-LLM）方案低 5%，比 B200（SGLang）方案低 40%。吞吐量方面，24 块 AMD GPU 达到 2，436 tok/s/GPU，比使用 48 块 GPU 的 B200 SGLang 方案每 GPU 吞吐量高 1.25 倍。核心优化包括：MoRI 混合 FP4/FP8 量化全到全通信、MoRI-IO KV Cache 后端、两批重叠与 SDMA、ROCm 上的 Specv2 MTP 以及 CPU 流式处理优化。", "category": "paper"}, {"id": "cmpppb2nv026tslvycbh7zsqj", "title": "Data Formulator 推出企业数据 AI 分析工具", "title_en": "Data Formulator introduces AI-powered analytics for enterprise data workflows. Data teams can easily…", "url": "https://x.com/MSFTResearch/status/2060028999229735199", "source": "X：Microsoft Research (@MSFTResearch)", "publishedAt": "2026-05-28T16:02:41.000Z", "summary": "Data Formulator 为企业数据工作流引入了 AI 驱动的分析功能。数据团队可以轻松将企业数据带入一个 AI 就绪的工作空间，用户可以使用 AI 智能体来探索、分析和可视化数据，将原始数据转化为可操作的洞察：https：//msft.it/6013vZzUl", "category": "ai-products"}, {"id": "cmppnuoiu01szslvy16yzs9c0", "title": "社区如何利用Tunix和TPU训练Gemma学会\"思考\"", "title_en": "How the community trained Gemma to \"Think\" with Tunix and TPUs", "url": "https://developers.googleblog.com/how-the-community-trained-gemma-to-think-with-tunix-and-tpus", "source": "Google Developers Blog（RSS）", "publishedAt": "2026-05-28T15:41:17.293Z", "summary": "Google在Kaggle举办的Tunix黑客马拉松，挑战开发者利用TPU和有限算力，将小型基础模型转变为通用推理引擎。获胜团队通过多阶段后训练流程实现了这一目标，该流程结合了监督微调（SFT）与GRPO、SimPO等先进对齐技术。比赛结果表明，社区能够借助开源资源成功训练出高能力的结构化推理模型。", "category": "tip"}, {"id": "cmppnwspx01u1slvyd9y65jz0", "title": "Sesame，这家由Oculus创始人创办的对话式AI初创公司，发布其iOS应用", "title_en": "Sesame， the conversational AI startup from Oculus founders， launches its iOS app", "url": "https://techcrunch.com/2026/05/28/sesame-the-conversational-ai-startup-from-oculus-founders-launches-its-ios-app", "source": "TechCrunch：AI（RSS）", "publishedAt": "2026-05-28T15:35:43.000Z", "summary": "由Oculus创始人创办的AI初创公司Sesame发布了其iOS应用，该应用将对话式AI智能体带给公众。应用提供更自然的来回交互体验，设计上区别于传统聊天机器人，旨在让用户感觉更像在和真人对话。", "category": "ai-products"}, {"id": "cmppnohkd01ptslvyykqn3897", "title": "商汤发布信息图生成模型升级，增强多项核心能力", "title_en": "How our upgraded infographic generation model - SenseN…", "url": "https://x.com/SenseTime_AI/status/2060015749826240724", "source": "X：商汤 SenseTime (@SenseTime_AI)", "publishedAt": "2026-05-28T15:10:02.000Z", "summary": "商汤科技介绍了其升级后的信息图生成模型 SenseNova-U1-8B-MoT-Infographic。该模型参数为8B，在四个关键维度进行了优化：文本准确性与可读性增强，减少了重复和不当放大；布局的一致性与合理性提升，背景更稳定；图表与示意图的质量提高；并新增了学术内容的渲染支持。推文提供了在 Hugging Face 上的模型页面链接及能力展示页面。", "category": "ai-models"}, {"id": "cmppmltf501fhslvyqsj7bfug", "title": "Perplexity Computer现已集成微软Office套件", "title_en": "Perplexity Computer is now available inside Microsoft Excel， Word， PowerPoint， and Outlook. Orchest…", "url": "https://x.com/perplexity_ai/status/2060013442720010598", "source": "X：Perplexity (@perplexity_ai)", "publishedAt": "2026-05-28T15:00:52.000Z", "summary": "Perplexity Computer现已登陆Microsoft Excel、Word、PowerPoint和Outlook。\n\n您可以在应用程序的侧边栏中直接使用Computer来协调工作，起草文档、建模、制作演示文稿并处理电子邮件。\n\n现已推出：https：//www.perplexity.ai/hub/products/integrations/microsoft", "category": "ai-products"}, {"id": "cmppoquyb01zqslvyr95y5eme", "title": "Google I/O 2026 一文速览：12 大重要时刻", "title_en": "Catch up on 12 major I/O 2026 moments", "url": "https://blog.google/innovation-and-ai/technology/ai/io-2026-keynote-moment-videos", "source": "Google Blog：AI（RSS）", "publishedAt": "2026-05-28T15:00:00.000Z", "summary": "Google I/O 2026 发布会上披露了 12 个重要时刻，其中包括 Gemini Omni 和 Gemini 3.5 Flash 等产品的相关消息。", "category": "ai-products"}, {"id": "cmppmk7v801e1slvy1g30z6wl", "title": "OpenRouter 支持模型现可选 Flex 与 Priority 服务层级", "title_en": "TIP： You can u lkit", "url": "https://mistral.ai/news/search-toolkit", "source": "Mistral AI：News（网页）", "publishedAt": "2026-05-28T12:47:09.083Z", "summary": "Mistral AI 发布了 Search Toolkit 的公共预览版。这是一个用于构建 AI 应用生产级搜索管道的可组合框架。该框架旨在解决团队在搭建搜索基础设施时，因数据摄取、检索和评估工具分散而耗费过多工程时间的问题。Search Toolkit 将这三者整合到单一框架与共享接口中，使团队能更专注于提升搜索质量。该工具开源，可部署在云端、本地或边缘环境，并支持企业搜索、RAG 等多种检索场景。", "category": "ai-products"}, {"id": "cmppe159m0eavslv4sq3myhrs", "title": "DeepSeek计划在完成融资后立即申请科创板IPO", "title_en": "Exclusive： DeepSeek plans to file for a STAR Market （A-share） IPO immediately after closing its curr…", "url": "https://x.com/thexpin/status/2059947998302679059", "source": "X：X.PIN (@thexpin)", "publishedAt": "2026-05-28T10:40:49.000Z", "summary": "独家：DeepSeek计划在完成当前约500亿美元（3500亿人民币）融资轮后，立即申请科创板（A股）IPO。\n来源：参与本轮融资的一位大型基金经理。", "category": "industry"}, {"id": "cmpp9s8g90d5pslv4cdirb5qo", "title": "Qwen3.7-Max 登顶 OpenRouter 热门大模型榜", "title_en": "Qwen3.7-Max hits #1 on the @OpenRouter Trending LLM chart with 77.3B tokens in usage. And we are ju…", "url": "https://x.com/alibaba_cloud/status/2059918150997623004", "source": "X：阿里云 / Alibaba Cloud (@alibaba_cloud)", "publishedAt": "2026-05-28T08:42:13.000Z", "summary": "Qwen3.7-Max 以 77.3B tokens 的使用量登顶 @OpenRouter 热门大语言模型榜单。\n\n而我们才刚刚开始。\n\n👇 https：//int.alibabacloud.com/m/1000413314/", "category": "industry"}, {"id": "cmpp7qya40cn8slv4q1nr2ceg", "title": "pgvector驱动的语义、混合、稀疏与量化向量搜索系统构建编码指南", "title_en": "A Coding Guide to Implement a pgvector-Powered Semantic， Hybrid， Sparse， and Quantized Vector Search System", "url": "https://www.marktechpost.com/2026/05/28/a-coding-guide-to-implement-a-pgvector-powered-semantic-hybrid-sparse-and-quantized-vector-search-system", "source": "MarkTechPost（RSS）", "publishedAt": "2026-05-28T08:07:09.000Z", "summary": "本教程在Google Colab中构建一个完整的pgvector实验环境，展示PostgreSQL如何作为向量数据库服务于现代AI应用。内容涵盖安装PostgreSQL、编译pgvector扩展、通过Psycopg建立连接，并注册向量类型以实现与Python的平滑集成。最后使用SentenceTransformers创建并存储嵌入向量。", "category": "tip"}, {"id": "cmpp7sbi50cnwslv4ukd PI 边界放置智能体来接入 GRPO 训练。实验显示，基于 Qwen3.5-4B 模型，Polar 将 Codex 在 SWE-Bench Verified 上的 pass@1 分数从 3.8% 提升至 26.4%（增涨 594.74%）。效率上，其 prefix_merging 技术将训练步骤从 1185 次降至 218 次，速度提升约 5.39 倍，GPU 平均利用率从 20.4% 升至 87.7%。", "category": "tip"}, {"id": "cmpov1f1w09gwslv4ficn4lei", "title": "人民日报专访华为何庭波：今年秋季的新麒麟手机芯片，性能等相比去年是\"跳跃性\"提升", "title_en": null, "url": "https://www.ithome.com/0/956/274.htm", "source": "IT之家（RSS）", "publishedAt": "2026-05-28T01:24:27.000Z", "summary": "华为何庭波提出半导体新演进路径\"韬（τ）定律\"，以\"时间缩微\"（如逻辑折叠）替代\"几何缩微\"作为新指导原则。她表示，过去6年华为已基于此自主研发381款芯片。今年秋季将发布新的麒麟手机芯片，这是首个完整的\"韬芯片\"，其性能、集成度相比去年是\"跳跃性\"提升。", "category": "tip"}, {"id": "cmpqjlfr105k3slnoo00wtyvu", "title": "彩色噪声扩散采样", "title_en": "Colored Noise Diffusion Sampling", "url": "https://arxiv.org/abs/2605.30332", "source": "HuggingFace Daily Papers（社区热门论文）", "publishedAt": "2026-05-28T00:00:00.000Z", "summary": "扩散模型的生成轨迹具有频谱偏差，早期处理低频全局结构，后期处理高频细节。传统随机微分方程求解器在整个过程中均匀注入白噪声，能量分配效率低。本研究提出彩色噪声采样（CNS），一种免训练的即插即用采样器。它通过动态、随时间和频率调整的噪声调度，更高效地将能量分配给尚未解析的频段。在SiT、JiT、FLUX等架构上的实验表明，CNS作为推理时的替换采样器显著提升了生成质量：在ImageNet-256上，无引导FID在SiT-XL/2上从8.26降至6.27，在JiT-B/16上从32.39降至26.69，在JiT-H/16上从11.88降至8.31，并且在使用无分类器引导时带来一致改进。", "category": "paper"}, {"id": "cmpqd5x5k03xvslno4auivqbj", "title": "WorldMemArena：通过行动-世界交互循环评估多模态智能体记忆", "title_en": "WorldMemArena： Evaluating Multimodal Agent Memory Through Action-World Interaction", "url": "https://arxiv.org/abs/2605.29341", "source": "HuggingFace Daily Papers（社区热门论文）", "publishedAt": "2026-05-28T00:00:00.000Z", "summary": "针对现有基准无法精确诊断多模态智能体记忆在动态环境中的具体失败阶段，研究提出了\"行动-世界交互循环\"记忆模型，并构建了WorldMemArena基准。该基准包含400个多会话多模态任务，涵盖\"终身进化\"和\"智能体执行\"两类场景，支持对记忆写入、维护、检索和使用的阶段级评估。研究首次对长上下文、RAG等手工设计系统与基于框架的记忆智能体进行直接比较，发现记忆写入与存储质量的提升不直接带来性能改善，且多模态记忆在利用视觉证据及跨领域稳定性上仍存在挑战。", "category": "paper"}, {"id": "cmppubmxw0190slm6mre7svcq", "title": "Grok Build 0.1 on API", "title_en": "Grok Build 0.1 on API Latest post May 28， 2026 # Grok Build 0.1 on API Grok Build 0.1， our fastest coding model， is now available via the xAI API in public beta. 【Read More】（http：//x.ai/news/grok-build-0-1）", "url": "https://x.ai/news/grok-build-0-1", "source": "xAI：News（网页）", "publishedAt": "2026-05-28T00:00:00.000Z", "summary": "xAI 的最新编码模型 Grok Build 0.1 已通过 xAI API 进入公开测试阶段。该模型专为智能体编码任务训练，支持网页开发、调试和 MCP，同时也是驱动 Grok Build CLI 的同一模型。其推理速度超过 100 tokens/秒，定价为输入 $1/m tokens，输出 $2/m tokens。除编码外，它也适用于通用智能体及工具调用场景，并可通过 OpenRouter 和 Vercel AI Gateway 获取。", "category": "ai-models"}, {"id": "cmppppbp2028islvycnmyohzq", "title": "AI智能体时代下的安全变革", "title_en": "Security in the Age of AI Agents： Office Hours with Jonathan Jaffe", "url": "https://www.tomtunguz.com/jonathan-jaffe-office-hours-post-event", "source": "Tomer Tunguz 博客（VC 分析）", "publishedAt": "2026-05-28T00:00:00.000Z", "summary": "Lemonade的CISO Jonathan Jaffe探讨了AI智能体时代的安全新挑战。他指出，AI对攻击者和防御者同样强大，但可被利用的漏洞窗口正在缩小，因为AI能更快地生成、审查和修补代码。为此，安全团队正向工程团队转型，例如Lemonade的安全部门均由工程师组成，并构建了包含智能体的内部AI平台。同时，每个智能体（单个终端上可能运行200到10000个）都需要被赋予身份，并在操作点由策略进行更复杂的管控，这超越了当前身份与访问管理系统的能力。", "category": "tip"}, {"id": "cmpppj8oq027jslvy6zrnekat", "title": "OpenAI 的前沿治理框架", "title_en": "OpenAI's Frontier Governance Framework", "url": "https://openai.com/index/openai-frontier-governance-framework", "source": "OpenAI：官网动态（RSS · 排除企业/客户案例）", "publishedAt": "2026-05-28T00:00:00.000Z", "summary": "OpenAI 发布了\"前沿治理框架\"，阐述其 AI 安全、安全与风险管理实践如何与欧盟和加州新出台的法规要求对齐。该框架旨在规范其前沿模型的开发与部署流程。", "category": "industry"}, {"id": "cmpop686i07ypslv41a160cay", "title": "用好 Coding Agent，重点是两头，尤其是开头的部分，如果一开始就走偏了后面怎么改都改不好。", "title_en": "用好 Coding Agent，重点是两头，尤其是开头的部分，如果一开始就走偏了后面怎么改都改不好。 比如我要开发一个新功能，首先不是直接叫给 Agent 去写，会把需求简单整理一下，发给三个不同的…", "url": "https://x.com/dotey/status/2059773942500298934", "source": "X：宝玉 (@dotey)", "publishedAt": "2026-05-27T23:09:11.000Z", "summary": "用好 Coding Agent 的关键在于初始规划。方法是先将需求整理后，用最强模型（如 GPT-5.5、Claude Opus 4.7）分别在 Codex、Claude Code、Cursor 的 Plan 模式下生成设计方案，选择最优方案并借鉴其他版本。对于复杂计划，可将其拆分为多个 Phases 并明确要求与验证标准，形成 Markdown 文档。执行时按 Phases 进行，并辅以人工审核纠偏。最后的代码审核（Code Review）用 GPT-5.5 审核代码质量与设计符合度即可。应避免让多个智能体交叉 Review，否则可能导致代码越改越多。", "category": "tip"}], "sections": [{"label": "模型发布/更新", "slug": "ai-models", "count": 6, "items": [{"idx": 1, "title": "小米开源可控视频音效生成模型 ControlFoley，让声音\"按你想要的来\"", "summary": "小米大模型应用团队发布开源可控视频音效生成模型 ControlFoley，旨在解决创作中的可控性难题。该模型统一支持文本引导视频配音、文本控制视频配音和参考音频控制视频配音三类任务。ControlFoley 在 VGGSound-Test 等多个 benchmark 上取得开源 SOTA 表现，其代码、模型权重和在线 Demo 均已开放。", "publishedAt": "2026-05-29T09:13:13.000Z", "category": "ai-models", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/957/282.htm"}, {"idx": 2, "title": "阶跃星辰 Step 3.7 Flash 发布，聚焦智能体效率", "summary": "阶跃星辰（Step）发布了开源大模型 Step 3.7 Flash，主打智能体（Agent）工作流的效率。该模型在 ClawEval-1.1（67.1分）和 SimpleVQA Search（79.2分）评测中排名第一。其架构为 198B 参数的 MoE，约 11B 为活跃参数，支持 256K 上下文。模型具备多模态理解能力，能处理图像、文档并生成代码或调用工具执行任务。在工具使用方面，它致力于高可靠性，τ2-bench 得分超过 98%。Step 3.7 Flash 兼容 Claude Code、MCP 协议等工具链，并支持在 Mac Studio M4 Max 等设备上本地运行。模型权重以 Apache 2.0 许可开源。", "publishedAt": "2026-05-29T00:00:01.000Z", "category": "ai-models", "sourceName": "X：阶跃星辰 StepFun (@StepFun_ai)", "sourceUrl": "https://x.com/StepFun_ai/status/2060149124117475791"}, {"idx": 3, "title": "Nano Banana Pro与Nano Banana 2正式发布", "summary": "🍌 Nano Banana Pro 【gemini-3-pro-image】 和 Nano Banana 2 【gemini-3.1-flash-image】 现已正式发布，可通过 Gemini API 投入生产使用。查看这些优秀的社区示例，了解两个模型的实际能力 🧵↓", "publishedAt": "2026-05-28T17:25:59.000Z", "category": "ai-models", "sourceName": "X：Google AI for Developers (@googleaidevs)", "sourceUrl": "https://x.com/googleaidevs/status/2060049962356916377"}, {"idx": 4, "title": "Claude Opus 4.8 发布：在编码、智能体技能与推理方面实现全面升级", "summary": "Anthropic 发布了新一代模型 Claude Opus 4.8，作为 Opus 4.7 的升级版本，其在编码、智能体技能、推理和实用知识工作等各项基准测试中均取得进步。Claude Opus 4.8 现已可用，价格与前代相同。同步推出的新功能包括：用户可控制任务投入程度、Claude Code 新增\"动态工作流\"特性，以及 Opus 4.8 的 2.5 倍速模式价格降低为以往的三分之一。早期测试者反馈其在智能体任务中的判断力更可靠、工具调用更高效。该模型在 Online-Mind2Web 测评中得分 84%，超越了 Opus 4.7 和 GPT-5.5。此外，其诚实度与对齐表现也得到提升，代码错误漏检率降低了约 75%。", "publishedAt": "2026-05-28T17:05:39.037Z", "category": "ai-models", "sourceName": "Anthropic：Newsroom（网页）", "sourceUrl": "https://www.anthropic.com/news/claude-opus-4-8"}, {"idx": 5, "title": "商汤发布信息图生成模型升级，增强多项核心能力", "summary": "商汤科技介绍了其升级后的信息图生成模型 SenseNova-U1-8B-MoT-Infographic。该模型参数为8B，在四个关键维度进行了优化：文本准确性与可读性增强，减少了重复和不当放大；布局的一致性与合理性提升，背景更稳定；图表与示意图的质量提高；并新增了学术内容的渲染支持。推文提供了在 Hugging Face 上的模型页面链接及能力展示页面。", "publishedAt": "2026-05-28T15:10:02.000Z", "category": "ai-models", "sourceName": "X：商汤 SenseTime (@SenseTime_AI)", "sourceUrl": "https://x.com/SenseTime_AI/status/2060015749826240724"}, {"idx": 6, "title": "Grok Build 0.1 on API", "summary": "xAI 的最新编码模型 Grok Build 0.1 已通过 xAI API 进入公开测试阶段。该模型专为智能体编码任务训练，支持网页开发、调试和 MCP，同时也是驱动 Grok Build CLI 的同一模型。其推理速度超过 100 tokens/秒，定价为输入 $1/m tokens，输出 $2/m tokens。除编码外，它也适用于通用智能体及工具调用场景，并可通过 OpenRouter 和 Vercel AI Gateway 获取。", "publishedAt": "2026-05-28T00:00:00.000Z", "category": "ai-models", "sourceName": "xAI：News（网页）", "sourceUrl": "https://x.ai/news/grok-build-0-1"}]}, {"label": "产品发布/更新", "slug": "ai-products", "count": 18, "items": [{"idx": 7, "title": "阿里云开源百炼 CLI，Agent 可调用全套模型和应用能力", "summary": "", "publishedAt": "2026-05-29T07:15:20.000Z", "category": "ai-products", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/957/149.htm"}, {"idx": 8, "title": "llm-anthropic 0.25.1", "summary": "llm-anthropic 发布 0.25.1 版本。主要更新包括：新增 Claude Opus 4.8 （`claude-opus-4.8`） 模型；为账户启用了该功能的组织新增了 `-o fast 1` 选项以使用快速模式；调整了各模型的默认 `max_tokens` 值，使其直接使用模型的最大输出长度，而非固定的 8，192。", "publishedAt": "2026-05-28T23:54:56.000Z", "category": "ai-products", "sourceName": "Simon Willison 博客", "sourceUrl": "https://simonwillison.net/2026/May/28/llm-anthropic"}, {"idx": 9, "title": "别只看基准测试，要看全面表现", "summary": "不要只依赖基准测试；要看全面情况！\n\n试试我们的新比较页面，它还能让你可视化模型性能：https：//openrouter.ai/compare/openai/gpt-5.5/anthropic/claude-opus-4.7/anthropic/claude-opus-4.8", "publishedAt": "2026-05-28T23:33:21.000Z", "category": "ai-products", "sourceName": "X：OpenRouter (@OpenRouter)", "sourceUrl": "https://x.com/OpenRouter/status/2060142412408717518"}, {"idx": 10, "title": "Grok Build 0.2.7 发布，新增多项功能", "summary": "Grok Build 0.2.7 现已发布，包含 /usage、/login、跨子智能体共享终端，以及改进的图像理解功能。\n所有更新请查看 https：//x.ai/build/changelog", "publishedAt": "2026-05-28T20:55:06.000Z", "category": "ai-products", "sourceName": "X：xAI (@xai)", "sourceUrl": "https://x.com/xai/status/2060102590122385460"}, {"idx": 11, "title": "Replit Canvas：智能体设计工具发布", "summary": "最好的设计工作不会在聊天框里发生。你需要空间来探索想法、创建变体并进行迭代。\n认识新的 Replit Canvas。\n你的智能体设计工具，用于构建精美的网站、应用、营销资产等。", "publishedAt": "2026-05-28T20:35:30.000Z", "category": "ai-products", "sourceName": "X：Replit (@Replit)", "sourceUrl": "https://x.com/Replit/status/2060097656207413613"}, {"idx": 12, "title": "Gemini Omni向印度用户开放视频编辑功能", "summary": "好消息！印度用户现在可以上传视频（来自相册或已保存文件），并使用Gemini Omni进行编辑和转换。快来试试，并告诉我们你的想法。", "publishedAt": "2026-05-28T19:03:09.000Z", "category": "ai-products", "sourceName": "X：Gemini (@GeminiApp)", "sourceUrl": "https://x.com/GeminiApp/status/2060074415304610168"}, {"idx": 13, "title": "MiniMax M2.7 免费智能体编程限时开放", "summary": "在 @OpenHandsDev 上使用 MiniMax M2.7 进行免费智能体编程？\n\n是的，请给我！限时提供 ⚡👀", "publishedAt": "2026-05-28T18:52:58.000Z", "category": "ai-products", "sourceName": "X：MiniMax (@MiniMax_AI)", "sourceUrl": "https://x.com/MiniMax_AI/status/2060071852970844377"}, {"idx": 14, "title": "使用 Google Pay & Wallet Developer MCP server 加速你的集成工作流", "summary": "Google 推出 Google Pay & Wallet Developer MCP server，这是一款开放标准工具，旨在将 AI 开发助手和 IDE 安全连接到实时的 API 与账户上下文。开发者无需离开开发环境，即可搜索官方文档、验证 Wallet pass 定义、检查集成状态以及管理商户账户。该集成旨在通过减少上下文切换并提供实时、可靠的 AI 支持来减少开发摩擦，从而加速开发工作流。", "publishedAt": "2026-05-28T18:41:20.382Z", "category": "ai-products", "sourceName": "Google Developers Blog（RSS）", "sourceUrl": "https://developers.googleblog.com/supercharge-your-integration-workflow-with-the-google-pay-wallet-developer-mcp-server"}, {"idx": 15, "title": "在Claude Code中引入动态工作流", "summary": "Claude Code 推出\"动态工作流\"功能，使 Claude 能端到端处理复杂任务。该功能通过动态编写脚本，在单个会话中并行运行数十到数百个子智能体来完成工作，并会在结果呈现前进行验证。它适用于跨代码库的 bug 查找、大规模迁移（如将 Bun 从 Zig 移植到 Rust）等需要多角度分析的任务。该功能现已在研究预览阶段可用，支持 Claude Code CLI、桌面端、VS Code 扩展以及 API、Amazon Bedrock、Vertex AI 等平台，面向 Max、Team 及已启用的 Enterprise 计划用户。", "publishedAt": "2026-05-28T17:21:01.868Z", "category": "ai-products", "sourceName": "Claude：Blog（网页）", "sourceUrl": "https://claude.com/blog/introducing-dynamic-workflows-in-claude-code"}, {"idx": 16, "title": "Data Formulator 推出企业数据 AI 分析工具", "summary": "Data Formulator 为企业数据工作流引入了 AI 驱动的分析功能。数据团队可以轻松将企业数据带入一个 AI 就绪的工作空间，用户可以使用 AI 智能体来探索、分析和可视化数据，将原始数据转化为可操作的洞察：https：//msft.it/6013vZzUl", "publishedAt": "2026-05-28T16:02:41.000Z", "category": "ai-products", "sourceName": "X：Microsoft Research (@MSFTResearch)", "sourceUrl": "https://x.com/MSFTResearch/status/2060028999229735199"}, {"idx": 17, "title": "Sesame，这家由Oculus创始人创办的对话式AI初创公司，发布其iOS应用", "summary": "由Oculus创始人创办的AI初创公司Sesame发布了其iOS应用，该应用将对话式AI智能体带给公众。应用提供更自然的来回交互体验，设计上区别于传统聊天机器人，旨在让用户感觉更像在和真人对话。", "publishedAt": "2026-05-28T15:35:43.000Z", "category": "ai-products", "sourceName": "TechCrunch：AI（RSS）", "sourceUrl": "https://techcrunch.com/2026/05/28/sesame-the-conversational-ai-startup-from-oculus-founders-launches-its-ios-app"}, {"idx": 18, "title": "Perplexity Computer现已集成微软Office套件", "summary": "Perplexity Computer现已登陆Microsoft Excel、Word、PowerPoint和Outlook。\n\n您可以在应用程序的侧边栏中直接使用Computer来协调工作，起草文档、建模、制作演示文稿并处理电子邮件。\n\n现已推出：https：//www.perplexity.ai/hub/products/integrations/microsoft", "publishedAt": "2026-05-28T15:00:52.000Z", "category": "ai-products", "sourceName": "X：Perplexity (@perplexity_ai)", "sourceUrl": "https://x.com/perplexity_ai/status/2060013442720010598"}, {"idx": 19, "title": "Google I/O 2026 一文速览：12 大重要时刻", "summary": "Google I/O 2026 发布会上披露了 12 个重要时刻，其中包括 Gemini Omni 和 Gemini 3.5 Flash 等产品的相关消息。", "publishedAt": "2026-05-28T15:00:00.000Z", "category": "ai-products", "sourceName": "Google Blog：AI（RSS）", "sourceUrl": "https://blog.google/innovation-and-ai/technology/ai/io-2026-keynote-moment-videos"}, {"idx": 20, "title": "AI生成短片《昨夜》探索记忆碎片中的东京之夜", "summary": "昨夜。一部完全由AI生成的短片，通过破碎记忆的视角，探索了在东京改变人生的一个夜晚。由一人使用Runway在一天内创作完成。\n\n这是Project Luxo的一部分：一个探索AI生成视频如何跨越恐怖谷的新项目。\n\n通过下方链接了解更多关于《昨夜》和Project Luxo的信息。", "publishedAt": "2026-05-28T14:02:29.000Z", "category": "ai-products", "sourceName": "X：Runway (@runwayml)", "sourceUrl": "https://x.com/runwayml/status/2059998751742128635"}, {"idx": 21, "title": "OpenClaw 2026.5.27 版本发布", "summary": "OpenClaw 2026.5.27 已上线 🦞\n\n🔒 更严格的运行时/安全边界\n⚡ 更快的网关 + 回复路径\n🧠 更稳定的 Codex/应用服务器内存\n📡 更好的频道、提供商、Pixverse 视频\n\n更少阻碍，更多掌控。\nhttps：//github.com/openclaw/openclaw/releases/tag/v2026.5.27", "publishedAt": "2026-05-28T13:10:54.000Z", "category": "ai-products", "sourceName": "X：OpenClaw (@openclaw)", "sourceUrl": "https://x.com/openclaw/status/2059985767456231751"}, {"idx": 22, "title": "发布 Search Toolkit", "summary": "Mistral AI 发布了 Search Toolkit 的公共预览版。这是一个用于构建 AI 应用生产级搜索管道的可组合框架。该框架旨在解决团队在搭建搜索基础设施时，因数据摄取、检索和评估工具分散而耗费过多工程时间的问题。Search Toolkit 将这三者整合到单一框架与共享接口中，使团队能更专注于提升搜索质量。该工具开源，可部署在云端、本地或边缘环境，并支持企业搜索、RAG 等多种检索场景。", "publishedAt": "2026-05-28T12:47:09.083Z", "category": "ai-products", "sourceName": "Mistral AI：News（网页）", "sourceUrl": "https://mistral.ai/news/search-toolkit"}, {"idx": 23, "title": "阿里云DataWorks推出AI数据智能体", "summary": "🚀 认识 DataWorks Data Agent--阿里云的AI数据智能体！\n\n借助AI简化数据工作流，加速洞察，让数据管理更智能。\n\n了解更多：https：//int.alibabacloud.com/m/1000413560/\n\n#AlibabaCloud #DataWorks #AI #DataAgent #BigData #DataAnalytics", "publishedAt": "2026-05-28T03:33:17.000Z", "category": "ai-products", "sourceName": "X：阿里云 / Alibaba Cloud (@alibaba_cloud)", "sourceUrl": "https://x.com/alibaba_cloud/status/2059840407618396391"}, {"idx": 24, "title": "MuleRun登陆阿里云市场，提供全天候AI劳动力", "summary": "在阿里云市场遇见 MuleRun--一个全天候的AI劳动力，用于研究、报告、代码、设计等。功能强大，适合个人使用；企业就绪，适合团队协作--支持SSO、RBAC、私有网络、团队知识管理和无缝集成。\n\n想得更大。让 MuleRun 处理其余事务。\n\n方案起价 $20/月 → https：//int.alibabacloud.com/m/1000413520/\n\n#AlibabaCloud #AIAgents #AIWorkforce #FutureOfWork #EnterpriseAI", "publishedAt": "2026-05-28T02:19:27.000Z", "category": "ai-products", "sourceName": "X：阿里云 / Alibaba Cloud (@alibaba_cloud)", "sourceUrl": "https://x.com/alibaba_cloud/status/2059821825140367565"}]}, {"label": "行业动态", "slug": "industry", "count": 9, "items": [{"idx": 25, "title": "三星电子业内率先出样 HBM4E 内存", "summary": "", "publishedAt": "2026-05-29T00:45:13.000Z", "category": "industry", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/956/851.htm"}, {"idx": 26, "title": "萨姆·阿尔特曼和达里奥·阿莫代伊都纷纷收回了关于AI将引发就业危机的预测", "summary": "", "publishedAt": "2026-05-28T21:49:31.492Z", "category": "industry", "sourceName": "Hacker News 热门（buzzing.cc 中文翻译）", "sourceUrl": "https://fortune.com/2026/05/26/sam-altman-dario-amodei-walking-back-ai-jobs-apocalypse-prophecies-ipo"}, {"idx": 27, "title": "Anthropic 完成 650 亿美元 H 轮融资，估值达 9650 亿美元", "summary": "Anthropic 宣布完成由 Altimeter Capital 等领投的 650 亿美元 H 轮融资，投后估值达 9650 亿美元。公司表示其旗舰模型 Claude 的企业部署持续增长，年化收入已突破 470 亿美元。此轮融资将用于推进 AI 安全与可解释性研究、扩展算力以满足 Claude 的需求，并规模化产品与合作伙伴关系。Anthropic 近期已显著扩大计算容量，并宣布 Claude 已登陆 AWS、Google Cloud 和 Microsoft Azure 三大云平台。", "publishedAt": "2026-05-28T18:35:40.238Z", "category": "industry", "sourceName": "Anthropic：Newsroom（网页）", "sourceUrl": "https://www.anthropic.com/news/series-h"}, {"idx": 28, "title": "Apple 正努力将庞大的 Gemini 模型塞进 iPhone 以驱动新 Siri", "summary": "Apple 正尝试将大型 Gemini 模型集成到 iPhone 中，以支持全新的 Siri 功能。由于模型规模庞大，本地处理可能无法完全实现，因此一个云端组件很可能是必然的选择。", "publishedAt": "2026-05-28T18:30:48.000Z", "category": "industry", "sourceName": "Ars Technica：AI（RSS）", "sourceUrl": "https://arstechnica.com/ai/2026/05/apple-reportedly-trying-to-distill-googles-multi-trillion-parameter-gemini-ai-to-run-on-iphone"}, {"idx": 29, "title": "OpenRouter 获得1.13亿美元B轮融资", "summary": "AI模型聚合平台OpenRouter宣布完成1.13亿美元B轮融资。本轮融资由CapitalG领投，NVentures、ServiceNow Ventures等多家机构参投，现有投资者Andreessen Horowitz与Menlo Ventures也参与了本轮融资。", "publishedAt": "2026-05-28T14:00:00.000Z", "category": "industry", "sourceName": "OpenRouter：Announcements（RSS）", "sourceUrl": "https://openrouter.ai/announcements/series-b"}, {"idx": 30, "title": "DeepSeek计划在完成融资后立即申请科创板IPO", "summary": "独家：DeepSeek计划在完成当前约500亿美元（3500亿人民币）融资轮后，立即申请科创板（A股）IPO。\n来源：参与本轮融资的一位大型基金经理。", "publishedAt": "2026-05-28T10:40:49.000Z", "category": "industry", "sourceName": "X：X.PIN (@thexpin)", "sourceUrl": "https://x.com/thexpin/status/2059947998302679059"}, {"idx": 31, "title": "Qwen3.7-Max 登顶 OpenRouter 热门大模型榜", "summary": "Qwen3.7-Max 以 77.3B tokens 的使用量登顶 @OpenRouter 热门大语言模型榜单。\n\n而我们才刚刚开始。\n\n👇 https：//int.alibabacloud.com/m/1000413314/", "publishedAt": "2026-05-28T08:42:13.000Z", "category": "industry", "sourceName": "X：阿里云 / Alibaba Cloud (@alibaba_cloud)", "sourceUrl": "https://x.com/alibaba_cloud/status/2059918150997623004"}, {"idx": 32, "title": "可灵AI将在AI电影节展示20部4K原创短片", "summary": "可灵AI将在全球最大AI影视会议AI on the Lot的社区日上，展示由Prompt Club的电影制作人创作的20部原创AI短片。所有短片均为原生4K分辨率，旨在探索AI电影的边界。该展示将于5月29日在加州卡尔弗市的卡尔弗剧院举行。", "publishedAt": "2026-05-28T08:02:23.000Z", "category": "industry", "sourceName": "X：可灵 Kling AI (@Kling_ai)", "sourceUrl": "https://x.com/Kling_ai/status/2059908126611292645"}, {"idx": 33, "title": "OpenAI 的前沿治理框架", "summary": "OpenAI 发布了\"前沿治理框架\"，阐述其 AI 安全、安全与风险管理实践如何与欧盟和加州新出台的法规要求对齐。该框架旨在规范其前沿模型的开发与部署流程。", "publishedAt": "2026-05-28T00:00:00.000Z", "category": "industry", "sourceName": "OpenAI：官网动态（RSS · 排除企业/客户案例）", "sourceUrl": "https://openai.com/index/openai-frontier-governance-framework"}]}, {"label": "论文研究", "slug": "paper", "count": 4, "items": [{"idx": 34, "title": "hexoai开源SIA框架：AI智能体实现递归自我改进", "summary": "hexoai开源了SIA（自我改进AI）框架。该框架展示了AI智能体不仅能优化其外部工作流（harness），还能通过任务反馈直接更新自身的模型权重，从而在领域知识和能力上实现自主提升，而非仅依赖人类提供的提示或工具改进。论文报告显示，SIA在LawBench基准上性能提升56.6%，在GPU kernels运行上耗时减少91.9%，在单细胞RNA去噪任务中相比基线提升502%。", "publishedAt": "2026-05-28T18:20:09.000Z", "category": "paper", "sourceName": "X：Rohan Paul (@rohanpaul_ai)", "sourceUrl": "https://x.com/rohanpaul_ai/status/2060063592448446778"}, {"idx": 35, "title": "SGLang 团队与 AMD 合作，使 AMD InstinctTM MI355X GPU 的大规模 DeepSeek-R1 分离式推理在总拥有成本上具备竞争力", "summary": "SGLang 与 AMD 团队合作，通过一系列全栈优化，使 AMD InstinctTM MI355X GPU 在运行 DeepSeek-R1 大模型推理时实现了极具竞争力的总拥有成本。在 129 tok/s/user 的交互延迟下，其成本为每百万 token $0.169，比 NVIDIA B200（Dynamo TRT-LLM）方案低 5%，比 B200（SGLang）方案低 40%。吞吐量方面，24 块 AMD GPU 达到 2，436 tok/s/GPU，比使用 48 块 GPU 的 B200 SGLang 方案每 GPU 吞吐量高 1.25 倍。核心优化包括：MoRI 混合 FP4/FP8 量化全到全通信、MoRI-IO KV Cache 后端、两批重叠与 SDMA、ROCm 上的 Specv2 MTP 以及 CPU 流式处理优化。", "publishedAt": "2026-05-28T16:34:57.702Z", "category": "paper", "sourceName": "LMSYS：Blog（Chatbot Arena 团队）", "sourceUrl": "https://www.lmsys.org/blog/2026-05-28-mori"}, {"idx": 36, "title": "彩色噪声扩散采样", "summary": "扩散模型的生成轨迹具有频谱偏差，早期处理低频全局结构，后期处理高频细节。传统随机微分方程求解器在整个过程中均匀注入白噪声，能量分配效率低。本研究提出彩色噪声采样（CNS），一种免训练的即插即用采样器。它通过动态、随时间和频率调整的噪声调度，更高效地将能量分配给尚未解析的频段。在SiT、JiT、FLUX等架构上的实验表明，CNS作为推理时的替换采样器显著提升了生成质量：在ImageNet-256上，无引导FID在SiT-XL/2上从8.26降至6.27，在JiT-B/16上从32.39降至26.69，在JiT-H/16上从11.88降至8.31，并且在使用无分类器引导时带来一致改进。", "publishedAt": "2026-05-28T00:00:00.000Z", "category": "paper", "sourceName": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2605.30332"}, {"idx": 37, "title": "WorldMemArena：通过行动-世界交互循环评估多模态智能体记忆", "summary": "针对现有基准无法精确诊断多模态智能体记忆在动态环境中的具体失败阶段，研究提出了\"行动-世界交互循环\"记忆模型，并构建了WorldMemArena基准。该基准包含400个多会话多模态任务，涵盖\"终身进化\"和\"智能体执行\"两类场景，支持对记忆写入、维护、检索和使用的阶段级评估。研究首次对长上下文、RAG等手工设计系统与基于框架的记忆智能体进行直接比较，发现记忆写入与存储质量的提升不直接带来性能改善，且多模态记忆在利用视觉证据及跨领域稳定性上仍存在挑战。", "publishedAt": "2026-05-28T00:00:00.000Z", "category": "paper", "sourceName": "HuggingFace Daily Papers（社区热门论文）", "sourceUrl": "https://arxiv.org/abs/2605.29341"}]}, {"label": "技巧与观点", "slug": "tip", "count": 13, "items": [{"idx": 38, "title": "谷歌 DeepMind CEO 哈萨比斯：AGI 最快三年内到来，研发速度远超预期", "summary": "谷歌 DeepMind 首席执行官德米斯·哈萨比斯预测，AGI 研发速度远超预期，最快可能在 2029 年至 2030 年前后出现。作为 AlphaGo、AlphaFold 的主导者，他认为当前 AI 智能体是未来更强智能的预演，随着多模态和自主决策能力成熟，三年内迎来 AGI 关键突破已非科幻。但他同时警示，全球社会对 AGI 到来的准备严重不足，必须提前建立规则与防护机制。", "publishedAt": "2026-05-29T07:18:53.000Z", "category": "tip", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/957/154.htm"}, {"idx": 39, "title": "Adam's Law：用高频词写Prompt效果更好", "summary": "FaceMind团队用100种语言和四大核心任务实验发现，在语义不变的前提下，使用预训练语料中出现频率更高的词汇（高频表达）来撰写提示词或进行微调，可以显著提升大语言模型的表现。这被总结为Adam's Law（文本频率定律），它为数据工程补上了\"频率\"这一新维度。原理在于高频表达能让模型在它最熟悉的概率空间内工作，从而优化输出质量。", "publishedAt": "2026-05-29T04:11:34.000Z", "category": "tip", "sourceName": "X：Berry Xia (@berryxia)", "sourceUrl": "https://x.com/berryxia/status/2060212428584202428"}, {"idx": 40, "title": "15秒动画IP预告片制作全流程分享", "summary": "我们制作了一个15秒的动画IP预告片--从角色设定到最终视频。认识一下MILO和BUMBLE：地下邮政骑手\n转发+关注+回复=我们会私信发送工作流程和提示词", "publishedAt": "2026-05-29T02:18:48.000Z", "category": "tip", "sourceName": "X：PixVerse (@PixVerse_)", "sourceUrl": "https://x.com/PixVerse_/status/2060184048920826340"}, {"idx": 41, "title": "Cursor 团队发布《开发者习惯报告》", "summary": "报告显示，AI正深刻改变开发工作形态。开发者周均代码产出从约3.6K行增至8.6K行，更大规模的PR（千行以上）占比上升。AI智能体在单次会话中的工具调用数增加约30%，正在处理更复杂的任务。同时，被接受的AI代码在60分钟后的留存率从约76%提升至约81%，表明更多AI生成内容进入了实际代码库。这些趋势共同指向AI已从个人辅助工具，演进为推动开发向更大规模任务与自动化基础设施发展的核心力量。", "publishedAt": "2026-05-29T01:11:47.000Z", "category": "tip", "sourceName": "X：邵猛 (@shao__meng)", "sourceUrl": "https://x.com/shao__meng/status/2060167182777249886"}, {"idx": 42, "title": "特斯拉 FSD 安全性宣称遭质疑", "summary": "特斯拉声称其全自动驾驶软件（FSD）安全性最高可达人类的10倍，但路透社调查发现此数据经不起推敲。参与训练FSD的员工表示该技术远未成熟，其安全演示高度依赖人工。统计方法被11位交通安全研究人员指出存在缺陷，例如与更广泛的联邦事故数据进行不恰当比较。相比之下，竞争对手Waymo采用了更严谨的统计方法。目前，特斯拉FSD仍需驾驶员主动监督，安全部署可能还需数年。", "publishedAt": "2026-05-29T01:07:40.000Z", "category": "tip", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/956/864.htm"}, {"idx": 43, "title": "四步保障AI生成应用安全", "summary": "如何用四步保障你的vibecoded应用安全 🔒\n\n速度若无安全加持，便是隐患。以下是使用Replit发布应用时，如何避免留下后门的方法。\n\n🧵展开阅读 ↓", "publishedAt": "2026-05-28T17:35:14.000Z", "category": "tip", "sourceName": "X：Replit (@Replit)", "sourceUrl": "https://x.com/Replit/status/2060052289155375532"}, {"idx": 44, "title": "社区如何利用Tunix和TPU训练Gemma学会\"思考\"", "summary": "Google在Kaggle举办的Tunix黑客马拉松，挑战开发者利用TPU和有限算力，将小型基础模型转变为通用推理引擎。获胜团队通过多阶段后训练流程实现了这一目标，该流程结合了监督微调（SFT）与GRPO、SimPO等先进对齐技术。比赛结果表明，社区能够借助开源资源成功训练出高能力的结构化推理模型。", "publishedAt": "2026-05-28T15:41:17.293Z", "category": "tip", "sourceName": "Google Developers Blog（RSS）", "sourceUrl": "https://developers.googleblog.com/how-the-community-trained-gemma-to-think-with-tunix-and-tpus"}, {"idx": 45, "title": "OpenRouter 支持模型现可选 Flex 与 Priority 服务层级", "summary": "提示：您可以为支持的模型（OpenAI、Google Vertex 等）使用 Flex 和 Priority 层级。\n定价信息请查看各模型页面。文档：https：//openrouter.ai/docs/guides/features/service-tiers", "publishedAt": "2026-05-28T14:38:45.000Z", "category": "tip", "sourceName": "X：OpenRouter (@OpenRouter)", "sourceUrl": "https://x.com/OpenRouter/status/2060007875590697088"}, {"idx": 46, "title": "pgvector驱动的语义、混合、稀疏与量化向量搜索系统构建编码指南", "summary": "本教程在Google Colab中构建一个完整的pgvector实验环境，展示PostgreSQL如何作为向量数据库服务于现代AI应用。内容涵盖安装PostgreSQL、编译pgvector扩展、通过Psycopg建立连接，并注册向量类型以实现与Python的平滑集成。最后使用SentenceTransformers创建并存储嵌入向量。", "publishedAt": "2026-05-28T08:07:09.000Z", "category": "tip", "sourceName": "MarkTechPost（RSS）", "sourceUrl": "https://www.marktechpost.com/2026/05/28/a-coding-guide-to-implement-a-pgvector-powered-semantic-hybrid-sparse-and-quantized-vector-search-system"}, {"idx": 47, "title": "英伟达推出 AI 框架 Polar，让 Codex 跑分暴涨 594.74%", "summary": "英伟达研究团队开源了智能体强化学习框架 Polar。该框架无需重写现有智能体执行框架（如 Codex CLI、Claude Code、Qwen Code、Pi），通过在模型 API 边界放置智能体来接入 GRPO 训练。实验显示，基于 Qwen3.5-4B 模型，Polar 将 Codex 在 SWE-Bench Verified 上的 pass@1 分数从 3.8% 提升至 26.4%（增涨 594.74%）。效率上，其 prefix_merging 技术将训练步骤从 1185 次降至 218 次，速度提升约 5.39 倍，GPU 平均利用率从 20.4% 升至 87.7%。", "publishedAt": "2026-05-28T02:14:52.000Z", "category": "tip", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/956/293.htm"}, {"idx": 48, "title": "人民日报专访华为何庭波：今年秋季的新麒麟手机芯片，性能等相比去年是\"跳跃性\"提升", "summary": "华为何庭波提出半导体新演进路径\"韬（τ）定律\"，以\"时间缩微\"（如逻辑折叠）替代\"几何缩微\"作为新指导原则。她表示，过去6年华为已基于此自主研发381款芯片。今年秋季将发布新的麒麟手机芯片，这是首个完整的\"韬芯片\"，其性能、集成度相比去年是\"跳跃性\"提升。", "publishedAt": "2026-05-28T01:24:27.000Z", "category": "tip", "sourceName": "IT之家（RSS）", "sourceUrl": "https://www.ithome.com/0/956/274.htm"}, {"idx": 49, "title": "AI智能体时代下的安全变革", "summary": "Lemonade的CISO Jonathan Jaffe探讨了AI智能体时代的安全新挑战。他指出，AI对攻击者和防御者同样强大，但可被利用的漏洞窗口正在缩小，因为AI能更快地生成、审查和修补代码。为此，安全团队正向工程团队转型，例如Lemonade的安全部门均由工程师组成，并构建了包含智能体的内部AI平台。同时，每个智能体（单个终端上可能运行200到10000个）都需要被赋予身份，并在操作点由策略进行更复杂的管控，这超越了当前身份与访问管理系统的能力。", "publishedAt": "2026-05-28T00:00:00.000Z", "category": "tip", "sourceName": "Tomer Tunguz 博客（VC 分析）", "sourceUrl": "https://www.tomtunguz.com/jonathan-jaffe-office-hours-post-event"}, {"idx": 50, "title": "用好 Coding Agent，重点是两头，尤其是开头的部分，如果一开始就走偏了后面怎么改都改不好。", "summary": "用好 Coding Agent 的关键在于初始规划。方法是先将需求整理后，用最强模型（如 GPT-5.5、Claude Opus 4.7）分别在 Codex、Claude Code、Cursor 的 Plan 模式下生成设计方案，选择最优方案并借鉴其他版本。对于复杂计划，可将其拆分为多个 Phases 并明确要求与验证标准，形成 Markdown 文档。执行时按 Phases 进行，并辅以人工审核纠偏。最后的代码审核（Code Review）用 GPT-5.5 审核代码质量与设计符合度即可。应避免让多个智能体交叉 Review，否则可能导致代码越改越多。", "publishedAt": "2026-05-27T23:09:11.000Z", "category": "tip", "sourceName": "X：宝玉 (@dotey)", "sourceUrl": "https://x.com/dotey/status/2059773942500298934"}]}]}
</script>
<script>
const EMBEDDED_DATA = JSON.parse(document.getElementById("dataSrc").textContent);
const SECTION_CONFIG = {"模型发布/更新": {"icon": "🤖", "color": "#7f6af0"}, "产品发布/更新": {"icon": "📦", "color": "#e8622a"}, "行业动态": {"icon": "🏭", "color": "#1d9e75"}, "论文研究": {"icon": "📄", "color": "#378add"}, "技巧与观点": {"icon": "💡", "color": "#e8a020"}};
const DAILY_STR = "2026-05-29";
const DAILY_MAX = "2026-05-29";

let currentData = null;
let currentDate = DAILY_STR;
let readSet = new Set();
let showOnlyUnread = false;
let currentFilter = 'all';
let currentSearch = '';
let isDark = true;

function reloadToday() {
  location.reload();
}
window.addEventListener('DOMContentLoaded', function() {
  try { readSet = new Set(JSON.parse(localStorage.getItem('aidaka_read_' + currentDate) || '[]')); } catch(e) {}
  try {
    var saved = localStorage.getItem('aidaka_theme');
    if (saved === 'light') { isDark = false; document.body.classList.add('light'); }
  } catch(e) {}
  updateThemeBtn();
  renderAll(EMBEDDED_DATA);
  setTimeout(function() {
    document.getElementById('loadingOverlay').style.opacity = '0';
    setTimeout(function() { document.getElementById('loadingOverlay').style.display = 'none'; }, 400);
  }, 300);
});

function renderAll(data) {
  currentData = data;
  var sections = data.sections || [];
  var total = sections.reduce(function(a, s) { return a + s.items.length; }, 0);
  var dateStr = fmtDate(data.date);
  document.getElementById('heroTitle').textContent = 'AI打卡网 · ' + dateStr;
  var gen = data.generatedAt ? new Date(data.generatedAt) : new Date();
  document.getElementById('heroSubtitle').textContent = '共收录 ' + total + ' 条资讯 · 来源精选 · 生成于 ' + relTime(gen);
  document.getElementById('navDateLabel').textContent = data.date;
  document.title = 'AI打卡网 · ' + data.date + ' (' + total + '条)';

  var statsEl = document.getElementById('heroStats');
  statsEl.innerHTML = '<div class="stat-chip" onclick="reloadToday()" title="刷新今日数据"><div class="num">' + total + '</div><div class="lbl">今日总条数</div></div>'
    + sections.map(function(s) {
      var cfg = SECTION_CONFIG[s.label] || { icon: '📌', color: '#888' };
      return '<div class="stat-chip" onclick="filterSection(\'' + s.label.replace(/'/g, "\\'") + '\'); scrollToSection(\'' + s.label.replace(/'/g, "\\'") + '\');" title="跳转到 ' + s.label + '"><div class="num" style="font-size:22px">' + cfg.icon + '</div><div class="lbl">' + s.label.replace('/更新','').replace('/观点','') + ' ' + s.items.length + '</div></div>';
    }).join('');

  renderDonut(sections);
  var navEl = document.getElementById('navInner');
  var dateArea = navEl.querySelector('.nav-date-area');
  navEl.querySelectorAll('.nav-sec-link').forEach(function(el) { el.remove(); });
  sections.forEach(function(s) {
    var cfg = SECTION_CONFIG[s.label] || { icon: '📌', color: '#888' };
    var a = document.createElement('a');
    a.className = 'nav-link nav-sec-link';
    a.href = '#sec-' + slugify(s.label);
    a.innerHTML = cfg.icon + ' ' + s.label + ' <span class="nav-badge">' + s.items.length + '</span>';
    a.onclick = function(e) { e.preventDefault(); filterSection(s.label, a); scrollToSection(s.label); };
    navEl.insertBefore(a, dateArea);
  });
  renderAnalytics(sections);
  var main = document.getElementById('main');
  main.querySelectorAll('.dyn-section').forEach(function(el) { el.remove(); });
  var globalIdx = 0;
  var frag = document.createDocumentFragment();
  sections.forEach(function(s) {
    var cfg = SECTION_CONFIG[s.label] || { icon: '📌', color: '#888' };
    var secDiv = document.createElement('div');
    secDiv.className = 'dyn-section';
    secDiv.id = 'sec-' + slugify(s.label);
    var header = document.createElement('div');
    header.className = 'section-header';
    header.innerHTML = '<div class="section-icon" style="background:' + cfg.color + '22; color:' + cfg.color + '">' + cfg.icon + '</div>'
      + '<span class="section-title">' + s.label + '</span>'
      + '<span class="section-count">' + s.items.length + ' 条</span>';
    secDiv.appendChild(header);
    if (s.items.length === 0) {
      secDiv.innerHTML += '<p style="color:var(--text3);font-size:13px;padding:12px 0">今日暂无相关资讯</p>';
    } else {
      var grid = document.createElement('div');
      grid.className = 'card-grid';
      s.items.forEach(function(item) {
        globalIdx++;
        var cardEl = buildCard(item, globalIdx);
        grid.appendChild(cardEl);
      });
      secDiv.appendChild(grid);
    }
    frag.appendChild(secDiv);
  });
  main.insertBefore(frag, main.querySelector('#noResults'));
  updateReadProgress(total);
  updateDateNav(data.date);
  document.getElementById('footerEl').innerHTML = '共 ' + total + ' 条资讯 · 数据来源 <a href="https://aihot.virxact.com" target="_blank" rel="noopener noreferrer" style="color:var(--accent)">aihot.virxact.com</a> · AI打卡网 每日晨报';
  setTimeout(initScrollAnim, 100);
}

function buildCard(item, idx) {
  var isRead = readSet.has(String(idx));
  var card = document.createElement('div');
  card.className = 'card' + (isRead ? ' read' : '');
  card.dataset.idx = idx;
  card.dataset.title = (item.title || '').toLowerCase();
  card.dataset.summary = (item.summary || '').toLowerCase();
  card.dataset.source = (item.sourceName || '').toLowerCase();
  var srcShort = shortSource(item.sourceName || '');
  var titleSafe = escHtml(item.title || '');
  var sourceNameSafe = escHtml(item.sourceName || '');
  var summaryRaw = item.summary || '';
  // Truncate summary to ~60 chars for display
  var summaryShort = summaryRaw.length > 65 ? summaryRaw.slice(0, 62) + '...' : summaryRaw;
  var summarySafe = escHtml(summaryShort);
  var summaryFull = escHtml(summaryRaw);
  var timeStr = item.publishedAt ? relTimeStr(item.publishedAt) : '';
  var sourceHtml = item.sourceUrl ? '<a class="source-btn" href="' + escHtml(item.sourceUrl) + '" target="_blank" rel="noopener noreferrer">原文</a>' : '';

  var inner = '<div class="card-header"><span class="card-num">' + idx + '</span><span class="card-title">' + titleSafe + '</span></div>';
  if (timeStr) { inner += '<span class="time-badge">' + escHtml(timeStr) + '</span>'; }
  inner += '<span class="card-source" title="' + sourceNameSafe + '">' + escHtml(srcShort) + '</span>'
    + '<div class="card-summary collapsed" id="sum-' + idx + '" data-full="' + escHtml(summaryRaw).replace(/"/g, '&quot;') + '">' + summarySafe + '</div>'
    + '<div class="card-footer">'
    + '<button class="expand-btn" onclick="toggleExpand(' + idx + ', this)">展开全文</button>'
    + '<div style="display:flex;gap:8px">'
    + '<button class="read-btn" onclick="markRead(' + idx + ', this)" id="rbtn-' + idx + '">' + (isRead ? '标为未读' : '打卡') + '</button>'
    + sourceHtml
    + '</div></div>';
  card.innerHTML = inner;
  // 点击卡片任意位置展开全文（按钮除外）
  card.addEventListener('click', function(e) {
    var target = e.target;
    if (target.closest('.read-btn') || target.closest('.source-btn') || target.closest('.expand-btn')) return;
    toggleExpand(idx, card.querySelector('.expand-btn'));
  });
  return card;
}

function renderDonut(sections) {
  var total = sections.reduce(function(a, s) { return a + s.items.length; }, 0);
  if (total === 0) return;
  var svgEl = document.getElementById('donutSvg');
  var legendEl = document.getElementById('donutLegend');
  svgEl.innerHTML = '';
  legendEl.innerHTML = '';
  var cx = 50, cy = 50, r = 36, inner = 22;
  var startAngle = -Math.PI / 2;
  sections.forEach(function(s) {
    if (s.items.length === 0) return;
    var cfg = SECTION_CONFIG[s.label] || { icon: '📌', color: '#888' };
    var angle = (s.items.length / total) * Math.PI * 2;
    var endAngle = startAngle + angle;
    var x1 = cx + r * Math.cos(startAngle), y1 = cy + r * Math.sin(startAngle);
    var x2 = cx + r * Math.cos(endAngle), y2 = cy + r * Math.sin(endAngle);
    var ix1 = cx + inner * Math.cos(startAngle), iy1 = cy + inner * Math.sin(startAngle);
    var ix2 = cx + inner * Math.cos(endAngle), iy2 = cy + inner * Math.sin(endAngle);
    var lg = angle > Math.PI ? 1 : 0;
    var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', 'M ' + ix1 + ' ' + iy1 + ' L ' + x1 + ' ' + y1 + ' A ' + r + ' ' + r + ' 0 ' + lg + ' 1 ' + x2 + ' ' + y2 + ' L ' + ix2 + ' ' + iy2 + ' A ' + inner + ' ' + inner + ' 0 ' + lg + ' 0 ' + ix1 + ' ' + iy1 + ' Z');
    path.setAttribute('fill', cfg.color);
    path.setAttribute('opacity', '0.85');
    path.style.cursor = 'pointer';
    path.addEventListener('click', (function(label) { return function() { filterSection(label); scrollToSection(label); }; })(s.label));
    svgEl.appendChild(path);
    startAngle = endAngle;
    var li = document.createElement('div');
    li.className = 'donut-legend-item';
    li.innerHTML = '<span class="dot" style="background:' + cfg.color + '"></span>' + s.label + ' <strong style="color:rgba(255,255,255,0.95)">' + s.items.length + '</strong>';
    li.onclick = (function(label) { return function() { filterSection(label); scrollToSection(label); }; })(s.label);
    legendEl.appendChild(li);
  });
  var text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  text.setAttribute('x', cx); text.setAttribute('y', cy + 1);
  text.setAttribute('text-anchor', 'middle'); text.setAttribute('dominant-baseline', 'middle');
  text.setAttribute('fill', 'rgba(255,255,255,0.9)'); text.setAttribute('font-size', '12');
  text.setAttribute('font-weight', '700'); text.textContent = total;
  svgEl.appendChild(text);
  var sub = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  sub.setAttribute('x', cx); sub.setAttribute('y', cy + 13);
  sub.setAttribute('text-anchor', 'middle'); sub.setAttribute('fill', 'rgba(255,255,255,0.6)'); sub.setAttribute('font-size', '7');
  sub.textContent = '条';
  svgEl.appendChild(sub);
}

function renderAnalytics(sections) {
  var wrap = document.getElementById('analyticsWrap');
  var sourceMap = {};
  sections.forEach(function(s) {
    s.items.forEach(function(item) {
      var src = shortSource(item.sourceName || '未知');
      sourceMap[src] = (sourceMap[src] || 0) + 1;
    });
  });
  var sorted = Object.entries(sourceMap).sort(function(a,b) { return b[1]-a[1]; }).slice(0, 6);
  var maxCount = sorted[0] ? sorted[0][1] : 1;
  var srcHtml = '<div class="analytics-card"><div class="analytics-title">来源排行</div>';
  sorted.forEach(function(entry) {
    var name = entry[0], count = entry[1];
    var pct = Math.round(count / maxCount * 100);
    srcHtml += '<div class="source-rank-item" style="cursor:pointer" onclick="filterBySource(\'' + escHtml(name).replace(/'/g,"\\'") + '\')" title="查看 ' + escHtml(name).replace(/'/g,"\\'") + ' 的全部文章"><span class="source-rank-name">' + escHtml(name) + '</span><div class="source-rank-bar-bg"><div class="source-rank-bar" style="width:' + pct + '%"></div></div><span class="source-rank-count">' + count + '</span></div>';
  });
  srcHtml += '</div>';
  var stopWords = new Set(['的','了','在','是','与','和','AI','以','将','被','其','已','于','从','到','并','为','但','还','也','都','该','这','其中','能够','通过','实现','用于','可以','以及','可能','提供','包含','包括','无需','用户','产品','模型','支持','系统','功能','未','使用','工作','进行','没有']);
  var wordCount = {};
  sections.forEach(function(s) {
    s.items.forEach(function(item) {
      var words = (item.title + ' ' + (item.summary || '')).replace(/[，。、！？【】《》"'·\s]+/g, ' ').split(' ');
      words.forEach(function(w) {
        w = w.trim();
        if (w.length >= 2 && w.length <= 8 && !stopWords.has(w) && !/^[a-zA-Z0-9]{1,2}$/.test(w)) {
          wordCount[w] = (wordCount[w] || 0) + 1;
        }
      });
    });
  });
  var topWords = Object.entries(wordCount).sort(function(a,b) { return b[1]-a[1]; }).slice(0, 18);
  var colors = ['#e8622a','#f08040','#1d9e75','#378add','#7f6af0','#e8a020','#d4537e','#0f6e56','#993c1d','#185fa5'];
  var hotHtml = '<div class="analytics-card"><div class="analytics-title">热词标签</div><div class="hotwords-wrap">';
  topWords.forEach(function(entry, i) {
    var word = entry[0], cnt = entry[1];
    var sz = Math.max(11, Math.min(16, 11 + cnt * 2));
    var col = colors[i % colors.length];
    hotHtml += '<span class="hotword-chip" style="background:' + col + ';font-size:' + sz + 'px;opacity:' + (0.7 + cnt * 0.1) + '" onclick="document.getElementById(\'searchInput\').value=\'' + escHtml(word).replace(/'/g, "\\'") + '\';doSearch(\'' + escHtml(word).replace(/'/g, "\\'") + '\')">' + escHtml(word) + '</span>';
  });
  hotHtml += '</div></div>';
  wrap.innerHTML = srcHtml + hotHtml;
}

function doSearch(val) {
  currentSearch = val.toLowerCase().trim();
  document.getElementById('searchClear').className = 'search-clear' + (val ? ' show' : '');
  applyFilters();
}
function clearSearch() {
  document.getElementById('searchInput').value = '';
  doSearch('');
}
function applyFilters() {
  var cards = document.querySelectorAll('.card');
  var visible = 0;
  cards.forEach(function(card) {
    var secEl = card.closest('.dyn-section');
    var matchSection = currentFilter === 'all' || slugify(currentFilter) === (secEl ? secEl.id.replace('sec-','') : '');
    var matchSearch = !currentSearch
      || card.dataset.title.indexOf(currentSearch) >= 0
      || card.dataset.summary.indexOf(currentSearch) >= 0
      || card.dataset.source.indexOf(currentSearch) >= 0;
    var matchRead = !showOnlyUnread || !readSet.has(card.dataset.idx);
    if (matchSection && matchSearch && matchRead) {
      card.classList.remove('hidden'); visible++;
      if (currentSearch) highlightCard(card, currentSearch); else clearHighlight(card);
    } else {
      card.classList.add('hidden'); clearHighlight(card);
    }
  });
  document.getElementById('searchCount').textContent = currentSearch ? (visible > 0 ? '找到 ' + visible + ' 条' : '') : '';
  document.getElementById('noResults').className = 'no-results' + (visible === 0 && (currentSearch || showOnlyUnread || currentFilter !== 'all') ? ' show' : '');
}
function highlightCard(card, q) {
  var titleEl = card.querySelector('.card-title');
  if (!titleEl) return;
  var orig = titleEl.textContent;
  var re = new RegExp('(' + escRe(q) + ')', 'gi');
  titleEl.innerHTML = escHtml(orig).replace(re, '<mark>$1</mark>');
}
function clearHighlight(card) {
  var titleEl = card.querySelector('.card-title');
  if (titleEl) titleEl.innerHTML = escHtml(titleEl.textContent);
}
function filterSection(label, el) {
  currentFilter = label;
  currentSearch = '';
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.nav-link').forEach(function(a) { a.classList.remove('active'); });
  if (el) el.classList.add('active');
  else { document.querySelectorAll('.nav-link').forEach(function(a) { if (a.textContent.indexOf(label) >= 0) a.classList.add('active'); }); }
  applyFilters();
}
function filterBySource(sourceName) {
  currentFilter = 'all';
  currentSearch = sourceName;
  document.querySelectorAll('.nav-link').forEach(function(a) { a.classList.remove('active'); });
  document.querySelectorAll('.nav-link').forEach(function(a) { if (a.textContent.indexOf('全部') >= 0) a.classList.add('active'); });
  // Set search to the source name so only cards from that source remain visible
  document.getElementById('searchInput').value = sourceName;
  doSearch(sourceName);
  scrollTo(0, 0);
  showToast('已筛选：' + sourceName);
}
function scrollToSection(label) {
  var id = 'sec-' + slugify(label);
  var el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
function toggleExpand(idx, btn) {
  var sum = document.getElementById('sum-' + idx);
  if (!sum) return;
  var full = sum.dataset.full || '';
  if (sum.classList.contains('collapsed')) {
    sum.classList.replace('collapsed', 'expanded');
    sum.textContent = full;
    btn.textContent = '收起';
  } else {
    sum.classList.replace('expanded', 'collapsed');
    var short = full.length > 65 ? full.slice(0, 62) + '...' : full;
    sum.textContent = short;
    btn.textContent = '展开全文';
  }
}
function markRead(idx, btn) {
  var key = String(idx);
  var card = document.querySelector('.card[data-idx="' + key + '"]');
  if (readSet.has(key)) {
    readSet.delete(key);
    if (card) card.classList.remove('read');
    if (btn) btn.textContent = '打卡';
  } else {
    readSet.add(key);
    if (card) card.classList.add('read');
    if (btn) btn.textContent = '已打卡';
  }
  try { localStorage.setItem('aidaka_read_' + currentDate, JSON.stringify(Array.from(readSet))); } catch(e) {}
  var total = document.querySelectorAll('.card').length;
  updateReadProgress(total);
  if (showOnlyUnread) applyFilters();
}
function toggleReadFilter() {
  showOnlyUnread = !showOnlyUnread;
  var btn = document.getElementById('readProgress');
  if (showOnlyUnread) { btn.style.opacity = '0.7'; btn.title = '点击显示全部'; }
  else { btn.style.opacity = '1'; btn.title = '点击筛选未读'; }
  applyFilters();
}
function updateReadProgress(total) {
  var count = readSet.size;
  var pct = total > 0 ? Math.round(count / total * 100) : 0;
  var icon = count >= total && total > 0 ? '✅' : '🕐';
  var label = count >= total && total > 0 ? '今日已读完' : '已打卡 ' + count + '/' + total;
  document.getElementById('readLabel').innerHTML = '<span class="read-progress-label"><span class="icon">' + icon + '</span><span>' + label + '</span></span>';
  document.getElementById('readBarFill').style.width = pct + '%';
}
function toggleTheme() {
  isDark = !isDark;
  document.body.classList.toggle('light', !isDark);
  try { localStorage.setItem('aidaka_theme', isDark ? 'dark' : 'light'); } catch(e) {}
  updateThemeBtn();
}
function updateThemeBtn() {
  document.getElementById('themeBtn').textContent = isDark ? '亮色模式' : '暗色模式';
}
function updateDateNav(dateStr) {
  // For items-based view, we use daily API for history nav
  document.getElementById('nextBtn').disabled = (dateStr >= DAILY_MAX);
  document.getElementById('prevBtn').disabled = false;
}
function navigateDate(delta) {
  var d = new Date(currentDate + 'T00:00:00');
  d.setDate(d.getDate() + delta);
  var newDateRaw = d.toISOString().slice(0, 10);
  if (newDateRaw > DAILY_MAX) { showToast('已是最新日期'); return; }
  loadDate(newDateRaw);
}
function openModal() {
  document.getElementById('datePicker').value = currentDate;
  document.getElementById('datePicker').max = DAILY_MAX;
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }
function goToDate() {
  var val = document.getElementById('datePicker').value;
  closeModal();
  if (val && val !== currentDate && val <= DAILY_MAX) loadDate(val);
  else if (val > DAILY_MAX) showToast('不能选择未来日期');
}
function loadDate(dateStr) {
  currentDate = dateStr;
  document.getElementById('loadingOverlay').style.display = 'flex';
  document.getElementById('loadingOverlay').style.opacity = '1';
  try { readSet = new Set(JSON.parse(localStorage.getItem('aidaka_read_' + dateStr) || '[]')); } catch(e) { readSet = new Set(); }
  document.querySelectorAll('.dyn-section').forEach(function(el) { el.remove(); });
  currentSearch = ''; currentFilter = 'all';
  showOnlyUnread = false;
  document.getElementById('searchInput').value = '';
  document.getElementById('searchCount').textContent = '';
  document.getElementById('readProgress').style.opacity = '1';
  document.getElementById('readProgress').title = '点击筛选未读';
  // Try loading 50 items from items API for the selected date
  var sinceStr = dateStr + 'T00:00:00Z';
  fetch('https://aihot.virxact.com/api/public/items?mode=selected&since=' + sinceStr + '&take=50')
    .then(function(r) { return r.json(); })
    .then(function(apiData) {
      // Transform items API response to daily-like format
      var categories = {
        'ai-models': '模型发布/更新',
        'ai-products': '产品发布/更新',
        'industry': '行业动态',
        'paper': '论文研究',
        'tip': '技巧与观点'
      };
      var sectionMap = {};
      var idx = 0;
      (apiData.items || []).forEach(function(item) {
        var cat = item.category || '';
        var label = categories[cat] || '行业动态';
        if (!sectionMap[label]) {
          sectionMap[label] = { label: label, items: [] };
        }
        idx++;
        sectionMap[label].items.push({
          idx: idx,
          title: item.title,
          sourceName: item.source || '',
          sourceUrl: item.url || '',
          summary: item.summary || '',
          publishedAt: item.publishedAt || ''
        });
      });
      var sections = [];
      var order = ['模型发布/更新','产品发布/更新','行业动态','论文研究','技巧与观点'];
      order.forEach(function(lbl) {
        if (sectionMap[lbl]) sections.push(sectionMap[lbl]);
        else sections.push({ label: lbl, items: [] });
      });
      var transformed = {
        date: dateStr,
        generatedAt: apiData.items && apiData.items.length > 0 ? apiData.items[0].publishedAt : new Date().toISOString(),
        lead: null,
        sections: sections
      };
      renderAll(transformed);
      document.getElementById('loadingOverlay').style.opacity = '0';
      setTimeout(function() { document.getElementById('loadingOverlay').style.display = 'none'; }, 400);
      showToast('已加载 ' + dateStr + ' (' + idx + '条)');
    })
    .catch(function() {
      // Fallback to daily API
      fetch('https://aihot.virxact.com/api/public/daily/' + dateStr)
        .then(function(r) { return r.json(); })
        .then(function(dailyData) {
          renderAll(dailyData);
          document.getElementById('loadingOverlay').style.opacity = '0';
          setTimeout(function() { document.getElementById('loadingOverlay').style.display = 'none'; }, 400);
          showToast('已加载 ' + dateStr + ' 日报');
        })
        .catch(function() {
          showToast('加载失败，网络请求受限');
          document.getElementById('loadingOverlay').style.opacity = '0';
          setTimeout(function() { document.getElementById('loadingOverlay').style.display = 'none'; }, 400);
        });
    });
}
function initScrollAnim() {
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }
    });
  }, { threshold: 0.05, rootMargin: '0px 0px -20px 0px' });
  document.querySelectorAll('.card').forEach(function(c) { observer.observe(c); });
}
var toastTimer;
function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.classList.remove('show'); }, 2500);
}
function slugify(s) { return s.replace(/[\/\s]/g, '-'); }
function escHtml(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
function shortSource(name) {
  if (!name) return '';
  // Group all X/Twitter sources under "X"
  if (/^X[：:]/.test(name)) return 'X';
  var trimmed = name.replace(/（.*?）/g,'').replace(/\(.*?\)/g,'').trim();
  return trimmed.length > 16 ? trimmed.slice(0, 16) + '...' : trimmed;
}
function fmtDate(dateStr) {
  if (!dateStr) return '';
  var d = new Date(dateStr + 'T00:00:00+08:00');
  var mm = d.getMonth() + 1;
  var dd = d.getDate();
  var days = ['日','一','二','三','四','五','六'];
  return mm + ' 月 ' + dd + ' 日 周' + days[d.getDay()];
}
function fmtDateShort(iso) { return iso ? iso.slice(0, 10) : ''; }
function relTime(date) {
  var now = Date.now();
  var diff = now - date.getTime();
  var mins = Math.floor(diff / 60000);
  var hours = Math.floor(mins / 60);
  if (diff < 0) return '刚刚';
  if (mins < 1) return '刚刚';
  if (mins < 60) return mins + ' 分钟前';
  if (hours < 24) {
    var hh = String(date.getHours()).padStart(2,'0');
    var mm = String(date.getMinutes()).padStart(2,'0');
    var period = date.getHours() < 12 ? '上午' : (date.getHours() < 18 ? '下午' : '晚上');
    return '今天' + period + ' ' + hh + ':' + mm;
  }
  return fmtDateShort(date.toISOString());
}
function relTimeStr(isoStr) {
  if (!isoStr) return '';
  var d = new Date(isoStr);
  return relTime(d);
}
</script>
